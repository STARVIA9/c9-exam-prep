<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#7c3aed,#7c3aeddd);padding:24px 20px;text-align:center}
.header h1{font-size:1.4em;color:#fff;margin-bottom:8px}
.header p{color:rgba(255,255,255,.85);font-size:.95em}
.stats{display:flex;justify-content:center;gap:16px;padding:12px 20px;background:#1e293b}

.stat .label{font-size:.8em;color:#94a3b8}
.controls{padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#7c3aed;color:#fff}

.btn-outline{background:transparent;border:2px solid #7c3aed;color:#7c3aed}

.progress-fill{height:100%;background:#7c3aed;transition:width .3s;width:0%}
.quiz-area{padding:20px;max-width:800px;margin:0 auto}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #7c3aed}
.q-num{color:#7c3aed;font-weight:700;font-size:.9em;margin-bottom:8px}

.choice{padding:10px 14px;margin:6px 0;border-radius:8px;cursor:pointer;transition:all .2s;background:#334155;border:2px solid transparent}

.result-score{font-size:3em;font-weight:700;color:#7c3aed}
.result-text{font-size:1.1em;color:#94a3b8;margin:12px 0}
.footer{text-align:center;padding:20px;color:#64748b;font-size:.85em}

<script>
const questions=[{"num": 451, "q": "ตามหลักเกณฑ์และระยะเวลาอายุความหนี้เงินกู้ อายุความในการฟ้องร้องเรียกคืน \"ต้นเงินกู้\" ที่กำหนดชำระคืนคราว เดียว (เช่น เงินกู้เพื่อเป็นค่าใช้จ่าย) มีระยะเวลากี่ปี?", "choices": [{"key": "ก", "text": "5 ปี"}, {"key": "ข", "text": "10 ปี"}, {"key": "ค", "text": "15 ปี"}, {"key": "ง", "text": "20 ปี"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก 10 ปี"}, {"num": 452, "q": "เหตุการณ์ใดต่อไปนี้ ที่มีผลทางกฎหมายทำให้ \"อายุความสะดุดหยุดลง\" (รีเซ็ตเวลากลับไปนับ 1 ใหม่ทั้งหมด)?", "choices": [{"key": "ก", "text": "ลูกค้าย้ายถิ่นฐานไปจากภูมิลำเนา"}, {"key": "ข", "text": "ธนาคารส่งจดหมายทวงถามหนี้ทางไปรษณีย์ตอบรับ"}, {"key": "ค", "text": "ลูกค้านำเงินมาชำระหนี้บางส่วน (แม้เพียงเล็กน้อย เช่น 500 บาท)"}, {"key": "ง", "text": "ลูกค้าเปลี่ยนตัวผู้ค้ำประกันใหม่"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ลูกค้านำเงินมาชำระหนี้บางส่วน (แม้เพียงเล็กน้อย เช่น 500 บาท)"}, {"num": 453, "q": "ตามเงื่อนไขการหลุดพ้นหนี้เสีย (NPLs Exit) สำหรับ \"ลูกค้าเกษตรกร หรือ บุคคลธรรมดา\" หากต้องการให้สถานะหนี้ กลับมาจัดชั้นเป็น \"หนี้ปกติ (ชั้น 1)\" จะต้องชำระหนี้ให้ครบถ้วนตามสัญญาใหม่อย่างน้อยกี่งวด?", "choices": [{"key": "ก", "text": "1 งวดชำระ"}, {"key": "ข", "text": "2 งวดติดต่อกัน"}, {"key": "ค", "text": "3 งวดติดต่อกัน"}, {"key": "ง", "text": "6 งวดติดต่อกัน"}], "answer": "ก", "explanation": "คำตอบที่ถูกต้องคือ ก เนื่องจาก 1 งวดชำระ"}, {"num": 454, "q": "จากข้อที่แล้ว หากเป็นลูกค้าประเภท \"กลุ่มสถาบัน หรือ ผู้ประกอบการ\" จะหลุดพ้นจากหนี้ NPLs กลับมาเป็นชั้น 1 ได้ จะต้องชำระครบถ้วนตามเงื่อนไขอย่างน้อยกี่งวด?", "choices": [{"key": "ก", "text": "1 งวด"}, {"key": "ข", "text": "2 งวดติดต่อกัน"}, {"key": "ค", "text": "3 งวดติดต่อกัน"}, {"key": "ง", "text": "6 งวดติดต่อกัน"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก 3 งวดติดต่อกัน"}, {"num": 455, "q": "นโยบายบัญชีและการตั้งสำรองกำหนดว่า บัญชีต้นเงินกู้ที่ถูกจัดชั้นเป็น NPLs (ตั้งแต่ชั้น 3 ถึงชั้น 5) ระบบจะเปลี่ยน เกณฑ์การรับรู้รายได้ (Revenue Recognition) เป็นแบบใดทันที?", "choices": [{"key": "ก", "text": "เกณฑ์คงค้าง (Accrual Basis - AA)"}, {"key": "ข", "text": "เกณฑ์เงินสด (Non-Accrual Basis - NA)"}, {"key": "ค", "text": "รับรู้ตามเปอร์เซ็นต์ความสำเร็จของโครงการ"}, {"key": "ง", "text": "หยุดการรับรู้รายได้และตัดหนี้สูญ"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก เกณฑ์เงินสด (Non-Accrual Basis - NA)"}, {"num": 456, "q": "ในการจัดทำมาตรการปรับปรุงโครงสร้างหนี้ (เช่น มาตรการสร้างสุข) ข้อใดคือ \"กฎเหล็ก (The Golden Rule)\" ที่ธนาคาร ห้ามปฏิบัติโดยเด็ดขาด?", "choices": [{"key": "ก", "text": "ห้ามขยายเวลาชำระหนี้เกิน 10 ปี"}, {"key": "ข", "text": "ห้ามนำ \"หนี้ปกติ หรือหนี้ค้างชำระ 0-3 เดือน\" มารวมกับ \"หนี้ NPLs\" ในสัญญาเดียวกันเด็ดขาด"}, {"key": "ค", "text": "ห้ามรวมบัญชีต้นเงินและบัญชีดอกเบี้ยเข้าด้วยกัน"}, {"key": "ง", "text": "ห้ามทำ ปปน. กับลูกค้าที่อายุเกิน 60 ปี"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ห้ามนำ \"หนี้ปกติ หรือหนี้ค้างชำระ 0-3 เดือน\" มารวมกับ \"หนี้ NPLs\" ในสัญญาเดียวกันเด็ดขาด"}, {"num": 457, "q": "ตามกลไกการปรับปรุงโครงสร้างหนี้แบบแยกบัญชี (The Split Stream) สำหรับ \"บัญชีรวมดอกเบี้ย\" ธนาคารกำหนดอัตรา ดอกเบี้ยไว้อย่างไร?", "choices": [{"key": "ก", "text": "คิดอัตราดอกเบี้ยเท่ากับ MRR หรือ MLR"}, {"key": "ข", "text": "คิดอัตราดอกเบี้ยปรับ (Late Charge) เต็มจำนวน"}, {"key": "ค", "text": "คิดอัตราดอกเบี้ยร้อยละ 3 ต่อปี"}, {"key": "ง", "text": "คิดอัตราดอกเบี้ย 0% (ไม่คิดดอกเบี้ย)"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก คิดอัตราดอกเบี้ย 0% (ไม่คิดดอกเบี้ย)"}, {"num": 458, "q": "กรณีตรวจสอบพบว่า \"ลูกหนี้ถึงแก่ความตาย\" และพนักงานตรวจสอบพบว่า \"ไม่มีหลักประกันหรือทรัพย์สินใดๆ เลย\" พนักงานจะต้องจัดชั้นลูกหนี้และกันสำรองอย่างไร?", "choices": [{"key": "ก", "text": "จัดเป็นหนี้ชั้น 1 กันสำรอง 1%"}, {"key": "ข", "text": "จัดเป็นหนี้ชั้น 3 (ต่ำกว่ามาตรฐาน) กันสำรอง 100%"}, {"key": "ค", "text": "จัดชั้นและกันสำรองคงเดิมตามสถานะก่อนเสียชีวิต"}, {"key": "ง", "text": "จัดเป็นหนี้ชั้น 5 (สงสัยจะสูญ) กันสำรอง 100% และรับรู้รายได้ด้วยเกณฑ์เงินสด (NA)"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก จัดเป็นหนี้ชั้น 5 (สงสัยจะสูญ) กันสำรอง 100% และรับรู้รายได้ด้วยเกณฑ์เงินสด (NA)"}, {"num": 459, "q": "เพื่อป้องกันไม่ให้ลูกค้าที่ถูกศาลสั่งพิทักษ์ทรัพย์มาเปิดบัญชีเงินฝากหรือเงินกู้ใหม่ พนักงานต้องบันทึกรหัสอายัดใดใน ระบบ WebCSR เพื่อล็อคข้อมูลลูกค้าไว้?", "choices": [{"key": "ก", "text": "รหัส NPL"}, {"key": "ข", "text": "รหัส HOLD"}, {"key": "ค", "text": "รหัส ZBKR (บุคคลล้มละลาย)"}, {"key": "ง", "text": "รหัส FREEZE"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก รหัส ZBKR (บุคคลล้มละลาย)"}, {"num": 460, "q": "กรณีลูกหนี้เดิมเกิด \"เหตุผิดปกติ\" ธนาคารจึงจะอนุญาตให้เปลี่ยนตัวลูกหนี้/รับใช้หนี้ได้ ข้อใดต่อไปนี้ \"ไม่ใช่\" เหตุ ผิดปกติที่ธนาคารยินยอมให้เปลี่ยนตัว (ข้อห้าม)?", "choices": [{"key": "ก", "text": "ผู้กู้เสียชีวิต หรือ วิกลจริต"}, {"key": "ข", "text": "ผู้กู้เพียงแค่ไปทำงานต่างประเทศชั่วคราว"}, {"key": "ค", "text": "ผู้กู้สาบสูญหรือหลบหนี"}, {"key": "ง", "text": "ผู้กู้ไม่สามารถประกอบอาชีพได้ถาวร (เช่น ป่วยเรื้อรัง)"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ผู้กู้เพียงแค่ไปทำงานต่างประเทศชั่วคราว"}, {"num": 461, "q": "ตามหลักเกณฑ์และระยะเวลาอายุความหนี้เงินกู้ \"ดอกเบี้ยค้างชำระ\" ทุกประเภทบัญชีเงินกู้ มีกำหนดอายุความฟ้องร้อง กี่ปี?", "choices": [{"key": "ก", "text": "2 ปี"}, {"key": "ข", "text": "5 ปี"}, {"key": "ค", "text": "10 ปี"}, {"key": "ง", "text": "เท่ากับอายุความของต้นเงินในสัญญานั้นๆ"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก 5 ปี"}, {"num": 462, "q": "หากตรวจสอบพบว่าบัญชีเงินกู้ของลูกค้า \"ต้นเงินขาดอายุความฟ้องร้องไปแล้ว\" ธนาคารจะต้องให้ลูกค้าจัดทำเอกสาร ใด เพื่อกู้ชีพหนี้และป้องกันมิให้ลูกค้ายกเรื่องอายุความขึ้นเป็นข้อต่อสู้ในศาล?", "choices": [{"key": "ก", "text": "หนังสือรับสภาพหนี้"}, {"key": "ข", "text": "หนังสือรับสภาพความรับผิด"}, {"key": "ค", "text": "สัญญาประนีประนอมยอมความ"}, {"key": "ง", "text": "หนังสือผ่อนผันชำระหนี้"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจา let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
