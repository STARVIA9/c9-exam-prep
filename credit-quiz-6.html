<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#7c3aed,#7c3aeddd);padding:24px 20px;text-align:center}
.header h1{font-size:1.4em;color:#fff;margin-bottom:8px}
.header p{color:rgba(255,255,255,.85);font-size:.95em}
.stats{display:flex;justify-content:center;gap:16px;padding:12px 20px;background:#1e293b}
.stat{text-align:center}
.stat .num{font-size:1.5em;font-weight:700;color:#7c3aed}
.stat .label{font-size:.8em;color:#94a3b8}
.controls{padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#7c3aed;color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid #7c3aed;color:#7c3aed}
.btn-outline:hover{background:#7c3aed22}
.progress-bar{height:4px;background:#334155;margin:0 20px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#7c3aed;transition:width .3s;width:0%}
.quiz-area{padding:20px;max-width:800px;margin:0 auto}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #7c3aed}
.q-num{color:#7c3aed;font-weight:700;font-size:.9em;margin-bottom:8px}
.q-text{font-size:1.05em;line-height:1.6;margin-bottom:12px}
.choice{padding:10px 14px;margin:6px 0;border-radius:8px;cursor:pointer;transition:all .2s;background:#334155;border:2px solid transparent}
.choice:hover{border-color:#7c3aed;background:#7c3aed22}

.choice.wrong{border-color:#ef4444;background:#ef444422}
.explanation{margin-top:12px;padding:12px;background:#0f172a;border-radius:8px;border-left:4px solid #22c55e;font-size:.9em;line-height:1.6;color:#94a3b8}
.explanation strong{color:#22c55e}
.choice .key{font-weight:700;color:#7c3aed;margin-right:8px}
.result-card{text-align:center;padding:40px 20px;display:none}
.result-card h2{font-size:1.8em;margin-bottom:12px}
.result-score{font-size:3em;font-weight:700;color:#7c3aed}
.result-text{font-size:1.1em;color:#94a3b8;margin:12px 0}
.footer{text-align:center;padding:20px;color:#64748b;font-size:.85em}
</style>

<script>
const questions=[{"num":451,"q":"ตามหลักเกณฑ์และระยะเวลาอายุความหนี้เงินกู้ อายุความในการฟ้องร้องเรียกคืน \"ต้นเงินกู้\" ที่กำหนดชำระคืนคราว เดียว (เช่น เงินกู้เพื่อเป็นค่าใช้จ่าย) มีระยะเวลากี่ปี?","choices":[{"key":"ก","text":"5 ปี"},{"key":"ข","text":"10 ปี"},{"key":"ค","text":"15 ปี"},{"key":"ง","text":"20 ปี"}],"answer":"ข","explanation":"ตามหลักเกณฑ์อายุความฟ้องเรียกหนี้เงินกู้ หากเป็น \"ต้นเงินกู้ที่กำหนดชำระคืนคราวเดียว\" จะมีอายุความ 10 ปี นับแต่วันถัดจากวันครบกำหนดชำระเสร็จ แต่ถ้าเป็นแบบแบ่งชำระเป็นงวด หรือดอกเบี้ยค้างชำระ จะมีอายุความ 5 ปี"},{"num":452,"q":"เหตุการณ์ใดต่อไปนี้ ที่มีผลทางกฎหมายทำให้ \"อายุความสะดุดหยุดลง\" (รีเซ็ตเวลากลับไปนับ 1 ใหม่ทั้งหมด)?","choices":[{"key":"ก","text":"ลูกค้าย้ายถิ่นฐานไปจากภูมิลำเนา"},{"key":"ข","text":"ธนาคารส่งจดหมายทวงถามหนี้ทางไปรษณีย์ตอบรับ"},{"key":"ค","text":"ลูกค้านำเงินมาชำระหนี้บางส่วน (แม้เพียงเล็กน้อย เช่น 500 บาท)"},{"key":"ง","text":"ลูกค้าเปลี่ยนตัวผู้ค้ำประกันใหม่"}],"answer":"ค","explanation":"การที่ลูกค้านำเงินมา \"ชำระหนี้บางส่วน (แม้เพียงเล็กน้อย)\" หรือการจัดทำ \"หนังสือรับสภาพหนี้\" จะส่งผล ให้ \"อายุความสะดุดหยุดลง\" ทันที ซึ่งหมายความว่าเวลาที่ผ่านไปแล้วจะไม่ถูกนับรวม และให้เริ่มนับอายุความใหม่ทั้งหมดใน วันรุ่งขึ้น"},{"num":453,"q":"ตามเงื่อนไขการหลุดพ้นหนี้เสีย (NPLs Exit) สำหรับ \"ลูกค้าเกษตรกร หรือ บุคคลธรรมดา\" หากต้องการให้สถานะหนี้ กลับมาจัดชั้นเป็น \"หนี้ปกติ (ชั้น 1)\" จะต้องชำระหนี้ให้ครบถ้วนตามสัญญาใหม่อย่างน้อยกี่งวด?","choices":[{"key":"ก","text":"1 งวดชำระ"},{"key":"ข","text":"2 งวดติดต่อกัน"},{"key":"ค","text":"3 งวดติดต่อกัน"},{"key":"ง","text":"6 งวดติดต่อกัน"}],"answer":"ก","explanation":"เงื่อนไขการออกจากหนี้เสีย (NPLs Exit) เพื่อกลับเป็นชั้นปกติ (Class 1) สำหรับลูกค้าเกษตรกร บุคคล หรือ กองทุนหมู่บ้าน ลูกค้าจะต้อง จ่ายครบ 1 งวดชำระ ตามสัญญาใหม่"},{"num":454,"q":"จากข้อที่แล้ว หากเป็นลูกค้าประเภท \"กลุ่มสถาบัน หรือ ผู้ประกอบการ\" จะหลุดพ้นจากหนี้ NPLs กลับมาเป็นชั้น 1 ได้ จะต้องชำระครบถ้วนตามเงื่อนไขอย่างน้อยกี่งวด?","choices":[{"key":"ก","text":"1 งวด"},{"key":"ข","text":"2 งวดติดต่อกัน"},{"key":"ค","text":"3 งวดติดต่อกัน"},{"key":"ง","text":"6 งวดติดต่อกัน"}],"answer":"ค","explanation":"สำหรับลูกค้ากลุ่มสถาบัน ผู้ประกอบการ หรือ Non-Farmers เงื่อนไขจะเข้มงวดกว่า โดยต้อง จ่ายครบ 3 งวด ชำระติดต่อกัน จึงจะสามารถหลุดพ้นจากหนี้ NPLs กลับมาเป็นชั้นปกติ (Class 1) ได้"},{"num":455,"q":"นโยบายบัญชีและการตั้งสำรองกำหนดว่า บัญชีต้นเงินกู้ที่ถูกจัดชั้นเป็น NPLs (ตั้งแต่ชั้น 3 ถึงชั้น 5) ระบบจะเปลี่ยน เกณฑ์การรับรู้รายได้ (Revenue Recognition) เป็นแบบใดทันที?","choices":[{"key":"ก","text":"เกณฑ์คงค้าง (Accrual Basis - AA)"},{"key":"ข","text":"เกณฑ์เงินสด (Non-Accrual Basis - NA)"},{"key":"ค","text":"รับรู้ตามเปอร์เซ็นต์ความสำเร็จของโครงการ"},{"key":"ง","text":"หยุดการรับรู้รายได้และตัดหนี้สูญ"}],"answer":"ข","explanation":"ตามนโยบายบัญชีและการรับรู้รายได้ หากบัญชีตกเป็นความเสี่ยง (หนี้ชั้น 3 ถึงชั้น 5) ธนาคารจะให้กันสำรอง 100% และระบบจะเปลี่ยนการรับรู้รายได้เป็น เกณฑ์เงินสด (Non-Accrual Basis : NA) ทันที"},{"num":456,"q":"ในการจัดทำมาตรการปรับปรุงโครงสร้างหนี้ (เช่น มาตรการสร้างสุข) ข้อใดคือ \"กฎเหล็ก (The Golden Rule)\" ที่ธนาคาร ห้ามปฏิบัติโดยเด็ดขาด?","choices":[{"key":"ก","text":"ห้ามขยายเวลาชำระหนี้เกิน 10 ปี"},{"key":"ข","text":"ห้ามนำ \"หนี้ปกติ หรือหนี้ค้างชำระ 0-3 เดือน\" มารวมกับ \"หนี้ NPLs\" ในสัญญาเดียวกันเด็ดขาด"},{"key":"ค","text":"ห้ามรวมบัญชีต้นเงินและบัญชีดอกเบี้ยเข้าด้วยกัน"},{"key":"ง","text":"ห้ามทำ ปปน. กับลูกค้าที่อายุเกิน 60 ปี"}],"answer":"ข","explanation":"กฎเหล็ก (The Golden Rule) ของการปรับปรุงโครงสร้างหนี้ คือ \"ห้ามนำหนี้ปกติ/ค้างชำระ 0-3 เดือน มารวม กับหนี้ด้อยคุณภาพ (NPLs) ในสัญญาเดียวกันเด็ดขาด\" เพื่อป้องกันการประมวลผลจัดชั้นที่ผิดพลาดตามเกณฑ์ ธปท."},{"num":457,"q":"ตามกลไกการปรับปรุงโครงสร้างหนี้แบบแยกบัญชี (The Split Stream) สำหรับ \"บัญชีรวมดอกเบี้ย\" ธนาคารกำหนดอัตรา ดอกเบี้ยไว้อย่างไร?","choices":[{"key":"ก","text":"คิดอัตราดอกเบี้ยเท่ากับ MRR หรือ MLR"},{"key":"ข","text":"คิดอัตราดอกเบี้ยปรับ (Late Charge) เต็มจำนวน"},{"key":"ค","text":"คิดอัตราดอกเบี้ยร้อยละ 3 ต่อปี"},{"key":"ง","text":"คิดอัตราดอกเบี้ย 0% (ไม่คิดดอกเบี้ย)"}],"answer":"ง","explanation":"การแยกบัญชี (Split Stream) ในกระบวนการ ปปน. \"บัญชีรวมดอกเบี้ย\" (Interest Account) ที่แยกออกมานั้น ธนาคารกำหนดให้ \"อัตราดอกเบี้ย 0% (ไม่คิดดอกเบี้ย)\" และไม่อนุญาตให้ปลอดชำระ (ต้องผ่อนชำระ) ควบคู่ไปกับบัญชี ต้นเงิน"},{"num":458,"q":"กรณีตรวจสอบพบว่า \"ลูกหนี้ถึงแก่ความตาย\" และพนักงานตรวจสอบพบว่า \"ไม่มีหลักประกันหรือทรัพย์สินใดๆ เลย\" พนักงานจะต้องจัดชั้นลูกหนี้และกันสำรองอย่างไร?","choices":[{"key":"ก","text":"จัดเป็นหนี้ชั้น 1 กันสำรอง 1%"},{"key":"ข","text":"จัดเป็นหนี้ชั้น 3 (ต่ำกว่ามาตรฐาน) กันสำรอง 100%"},{"key":"ค","text":"จัดชั้นและกันสำรองคงเดิมตามสถานะก่อนเสียชีวิต"},{"key":"ง","text":"จัดเป็นหนี้ชั้น 5 (สงสัยจะสูญ) กันสำรอง 100% และรับรู้รายได้ด้วยเกณฑ์เงินสด (NA)"}],"answer":"ง","explanation":"แนวทางการจัดชั้นระบุว่า หากลูกหนี้ถึงแก่ความตาย และ \"ไม่มีหลักประกันหรือทรัพย์สินใดๆ เลย\" ธนาคาร จะต้องปรับสถานะเป็น หนี้ชั้น 5 (สงสัยจะสูญ) กันสำรอง 100% และรับรู้ด้วยเกณฑ์เงินสด (NA) ทันที"},{"num":459,"q":"เพื่อป้องกันไม่ให้ลูกค้าที่ถูกศาลสั่งพิทักษ์ทรัพย์มาเปิดบัญชีเงินฝากหรือเงินกู้ใหม่ พนักงานต้องบันทึกรหัสอายัดใดใน ระบบ WebCSR เพื่อล็อคข้อมูลลูกค้าไว้?","choices":[{"key":"ก","text":"รหัส NPL"},{"key":"ข","text":"รหัส HOLD"},{"key":"ค","text":"รหัส ZBKR (บุคคลล้มละลาย)"},{"key":"ง","text":"รหัส FREEZE"}],"answer":"ค","explanation":"จุดควบคุมสำคัญในระบบ WebCSR คือ หัวหน้าพนักงานต้องลงบันทึก รหัสอายัด ZBKR (บุคคลล้มละลาย) ทันทีเมื่อลูกค้าถูกศาลพิทักษ์ทรัพย์ เพื่อล็อคระบบไม่ให้ลูกค้ามาเปิดบัญชีเงินฝากหรือกู้เงินใหม่ได้อีก"},{"num":460,"q":"กรณีลูกหนี้เดิมเกิด \"เหตุผิดปกติ\" ธนาคารจึงจะอนุญาตให้เปลี่ยนตัวลูกหนี้/รับใช้หนี้ได้ ข้อใดต่อไปนี้ \"ไม่ใช่\" เหตุ ผิดปกติที่ธนาคารยินยอมให้เปลี่ยนตัว (ข้อห้าม)?","choices":[{"key":"ก","text":"ผู้กู้เสียชีวิต หรือ วิกลจริต"},{"key":"ข","text":"ผู้กู้เพียงแค่ไปทำงานต่างประเทศชั่วคราว"},{"key":"ค","text":"ผู้กู้สาบสูญหรือหลบหนี"},{"key":"ง","text":"ผู้กู้ไม่สามารถประกอบอาชีพได้ถาวร (เช่น ป่วยเรื้อรัง)"}],"answer":"ข","explanation":"ข้อยกเว้นและกรณีที่ธนาคาร \"ไม่ยินยอม\" ให้เปลี่ยนตัวลูกหนี้ คือ \"ผู้กู้เพียงแค่ไปทำงานต่างประเทศ ชั่วคราว\" หรือ \"ผู้กู้ต้องโทษจำคุกไม่เกิน 3 ปี\" (เพราะถือว่ายังสามารถกลับมารับผิดชอบหนี้ต่อได้)"},{"num":461,"q":"ตามหลักเกณฑ์และระยะเวลาอายุความหนี้เงินกู้ \"ดอกเบี้ยค้างชำระ\" ทุกประเภทบัญชีเงินกู้ มีกำหนดอายุความฟ้องร้อง กี่ปี?","choices":[{"key":"ก","text":"2 ปี"},{"key":"ข","text":"5 ปี"},{"key":"ค","text":"10 ปี"},{"key":"ง","text":"เท่ากับอายุความของต้นเงินในสัญญานั้นๆ"}],"answer":"ข","explanation":"ตามหลักเกณฑ์และระยะเวลาอายุความ ดอกเบี้ยค้างชำระ (ทุกประเภทเงินกู้) มีกำหนดอายุความ 5 ปี โดยเริ่ม นับพร้อมต้นเงิน หรือเริ่มนับถัดจากวันครบกำหนดชำระของแต่ละงวด,."},{"num":462,"q":"หากตรวจสอบพบว่าบัญชีเงินกู้ของลูกค้า \"ต้นเงินขาดอายุความฟ้องร้องไปแล้ว\" ธนาคารจะต้องให้ลูกค้าจัดทำเอกสาร ใด เพื่อกู้ชีพหนี้และป้องกันมิให้ลูกค้ายกเรื่องอายุความขึ้นเป็นข้อต่อสู้ในศาล?","choices":[{"key":"ก","text":"หนังสือรับสภาพหนี้"},{"key":"ข","text":"หนังสือรับสภาพความรับผิด"},{"key":"ค","text":"สัญญาประนีประนอมยอมความ"},{"key":"ง","text":"หนังสือผ่อนผันชำระหนี้"}],"answer":"ข","explanation":"หากหนี้ \"ขาดอายุความฟ้องร้องไปแล้ว\" ธนาคารต้องให้ลูกค้าทำ \"หนังสือรับสภาพความรับผิด\" ซึ่งจะทำ ให้เกิดอายุความฟ้องร้องขึ้นมาใหม่ มีกำหนดอายุความ 10 ปีนับแต่วันที่ทำหนังสือ,."},{"num":463,"q":"กรณีที่ลูกค้าค้างชำระหนี้มาเป็นเวลานาน แต่ต่อมาได้นำเงินมาชำระหนี้บางส่วน (ทำให้ \"อายุความสะดุดหยุดลง\") จะมี ผลทางกฎหมายอย่างไรต่อการนับอายุความ?","choices":[{"key":"ก","text":"อายุความจะขยายออกไปอีก 10 ปีโดยอัตโนมัติ"},{"key":"ข","text":"ระยะเวลาที่ล่วงไปก่อนนั้นย่อมไม่นับเข้าในอายุความ และให้เริ่มนับอายุความใหม่ทั้งหมดในวันรุ่งขึ้น"},{"key":"ค","text":"ทำให้ลูกหนี้ร่วมคนอื่นหลุดพ้นจากหนี้ทันที"},{"key":"ง","text":"หนี้เงินกู้จะตกเป็นโมฆะทั้งหมด"}],"answer":"ข","explanation":"การที่ลูกค้านำเงินมาชำระหนี้บางส่วน (แม้เพียงเล็กน้อย) จะทำให้ \"อายุความสะดุดหยุดลง\" ซึ่งมีผลทำให้ ระยะเวลาที่ล่วงไปก่อนนั้นย่อมไม่นับเข้าในอายุความ และให้เริ่มนับอายุความใหม่ทั้งหมดในวันรุ่งขึ้น,."},{"num":464,"q":"ตามเกณฑ์การปรับชั้นหนี้ให้กลับมาเป็น \"ชั้นปกติ (Exit Strategy to Class 1)\" คำว่า \"การชำระที่สมบูรณ์ (Paid)\" ในกรณีที่ ลูกค้ามีต้นเงินถึงกำหนดชำระ ลูกค้าจะต้องชำระในสัดส่วนเท่าใด?","choices":[{"key":"ก","text":"ต้นเงิน 100% + ดอกเบี้ย 100%"},{"key":"ข","text":"ต้นเงิน 100% + ดอกเบี้ยไม่น้อยกว่า 75% ของยอดที่ถึงกำหนด"},{"key":"ค","text":"ต้นเงิน 50% + ดอกเบี้ย 100%"},{"key":"ง","text":"จ่ายเฉพาะดอกเบี้ย 100%"}],"answer":"ข","explanation":"นิยามของการชำระหนี้ที่สมบูรณ์ (Paid) เพื่อให้บัญชีกลับมาเป็นชั้น 1 ได้สำเร็จ หากมีต้นเงินถึงกำหนดชำระ ลูกค้าจะต้องจ่าย ต้นเงิน 100% + ดอกเบี้ยไม่น้อยกว่า 75% ของยอดที่ถึงกำหนด จึงจะถือว่าชำระสมบูรณ์ตามเกณฑ์ NPL Exit."},{"num":465,"q":"เมื่อธนาคารตรวจสอบพบว่าลูกค้ามีสถานะ \"ถูกศาลมีคำสั่งพิทักษ์ทรัพย์\" สาขาจะต้องดำเนินการกับ \"บัญชีเงินฝาก\" ของลูกค้ารายนั้นอย่างไรเป็นลำดับแรกเพื่อป้องกันความเสียหาย?","choices":[{"key":"ก","text":"รับฝากเงินได้ตามปกติ แต่ห้ามถอนเงิน"},{"key":"ข","text":"อนุญาตให้ถอนได้เฉพาะส่วนที่เป็นดอกเบี้ยรับเท่านั้น"},{"key":"ค","text":"ให้ระงับการรับฝากเงินและระงับการถอนเงินทุกประเภท"},{"key":"ง","text":"ปิดบัญชีและโอนเงินคืนให้ลูกค้าทั้งหมดทันที"}],"answer":"ค","explanation":"ทันทีที่ทราบว่าลูกค้าถูกศาลสั่งพิทักษ์ทรัพย์ 3 ขั้นตอนปฏิบัติฉุกเฉินคือต้องระงับการทำนิติกรรม (Freeze) โดย สำหรับบัญชีเงินฝาก ให้งดรับฝากและไม่อนุญาตให้ถอนเงินทุกประเภท และต้องบันทึกรหัส ZBKR ในระบบ WebCSR ทันที,."},{"num":466,"q":"ตามตารางการเปลี่ยนรหัสระบบ CBS กรณีลูกค้านำหลักประกันที่อยู่ระหว่างถูกยึดและ \"ประกาศขายทอดตลาดแบบ จำนองติดไป (รหัส 20)\" มาทำสัญญาปรับปรุงโครงสร้างหนี้ (DR) พนักงานต้องเปลี่ยนรหัสหลักประกันเป็นรหัสใดเพื่อล็อค สิทธิ์?","choices":[{"key":"ก","text":"รหัส 21"},{"key":"ข","text":"รหัส 23"},{"key":"ค","text":"รหัส 24"},{"key":"ง","text":"รหัส 27"}],"answer":"ข","explanation":"ตามตารางการเปลี่ยนรหัสระบบ CBS หากหลักประกันอยู่ระหว่างถูกขายทอดตลาดแบบ \"จำนองติดไป\" (รหัส 20) ถ้านำมาทำ ปปน. ต้องเปลี่ยนรหัสใน CBS เป็น \"รหัส 23\" เพื่อให้ทราบว่าอยู่ในสถานะ ปปน. และห้ามเป็นหลักประกัน เงินกู้สัญญาอื่นเด็ดขาด."},{"num":467,"q":"ในการปรับปรุงโครงสร้างหนี้แบบแยกบัญชี (The Split Stream) การกำหนดงวดชำระหนี้งวดสุดท้าย (Balloon Payment) สำหรับ \"บัญชีรวมดอกเบี้ย\" ธนาคารกำหนดให้มียอดชำระไม่เกินร้อยละเท่าใดของบัญชีรวมดอกเบี้ย?","choices":[{"key":"ก","text":"ร้อยละ 10"},{"key":"ข","text":"ร้อยละ 20"},{"key":"ค","text":"ร้อยละ 30"},{"key":"ง","text":"ร้อยละ 50"}],"answer":"ค","explanation":"การปรับปรุงโครงสร้างหนี้แบบแยกบัญชี สำหรับ \"บัญชีรวมดอกเบี้ย (Interest Account)\" ธนาคารกำหนดว่ายอด ชำระงวดสุดท้าย (Balloon Payment) จะต้องไม่เกิน 30% ของบัญชีรวมดอกเบี้ย,."},{"num":468,"q":"ตาม \"กฎเหล็ก (The Golden Rule)\" ของมาตรการปรับปรุงโครงสร้างหนี้ ข้อใดคือสิ่งที่ธนาคาร \"ห้ามปฏิบัติ\" โดยเด็ดขาด ในการทำสัญญารวมหนี้?","choices":[{"key":"ก","text":"ห้ามแยกบัญชีต้นเงินกับบัญชีดอกเบี้ยออกจากกัน"},{"key":"ข","text":"ห้ามขยายเวลาชำระหนี้เกินกว่า 10 ปี"},{"key":"ค","text":"ห้ามนำหนี้สถานะปกติ หรือหนี้ค้างชำระ 0-3 เดือน มารวมกับหนี้ด้อยคุณภาพ (NPLs) ในสัญญาเดียวกันเด็ดขาด"},{"key":"ง","text":"ห้ามลดดอกเบี้ยปรับค้างรับ (Late Charge) ให้แก่ลูกค้า"}],"answer":"ค","explanation":"กฎเหล็ก (The Golden Rule) ที่ห้ามพลาดเด็ดขาดในการทำ ปปน. คือ \"ห้ามนำหนี้ปกติ/ค้างชำระ 0-3 เดือน มา รวมกับหนี้ NPLs (หนี้ชั้น 3-5) ในสัญญาเดียวกันเด็ดขาด\" เพื่อป้องกันความผิดพลาดในการจัดชั้นและการกันสำรองของระบบ ธนาคาร."},{"num":469,"q":"\"โครงการสินเชื่อแทนคุณ\" มีเป้าหมายเพื่อรักษาทรัพย์สินให้คงอยู่ในครอบครัว โดยโอนหนี้และทรัพย์สินให้แก่ทายาท โครงการนี้มุ่งช่วยเหลือลูกค้ากลุ่มใดเป็นหลัก?","choices":[{"key":"ก","text":"ลูกค้าวัยทำงานที่ขาดสภาพคล่องจากภัยพิบัติ"},{"key":"ข","text":"เกษตรกรลูกค้าสูงอายุ (อายุตั้งแต่ 60 ปีขึ้นไป) ที่มีหนี้สินเป็นภาระหนัก"},{"key":"ค","text":"ลูกค้า NPLs ที่ถูกศาลมีคำสั่งพิทักษ์ทรัพย์เด็ดขาดแล้ว"},{"key":"ง","text":"เกษตรกรรุ่นใหม่ (Smart Farmer) ที่ต้องการกู้เงินเพื่อลงทุนครั้งแรก"}],"answer":"ข","explanation":"โครงการสินเชื่อแทนคุณ มุ่งเป้าหมายหลักไปที่ เกษตรกรลูกค้าสูงอายุ (ที่มีอายุตั้งแต่ 60 ปีขึ้นไป) ซึ่งมี หนี้สินเป็นภาระหนัก ไม่สามารถชำระหนี้ได้ด้วยตนเอง โดยเปิดโอกาสให้ทายาทที่มีคุณสมบัติเข้ารับช่วงหนี้ต่อเพื่อรักษา ทรัพย์สินของครอบครัวไว้,."},{"num":470,"q":"ตามหลักเกณฑ์การจัดลำดับการรับช่วงต่อหนี้ (เปลี่ยนตัวลูกหนี้/รับใช้หนี้) บุคคลใดถือเป็น \"ผู้มีสิทธิรับช่วงต่อหนี้ใน ลำดับที่ 1\"?","choices":[{"key":"ก","text":"บิดามารดาของผู้กู้"},{"key":"ข","text":"พี่น้องร่วมบิดามารดาเดียวกัน"},{"key":"ค","text":"คู่สมรส และ/หรือ บุตรที่บรรลุนิติภาวะแล้ว"},{"key":"ง","text":"ปู่ ย่า ตา ยาย หรือผู้ค้ำประกัน"}],"answer":"ค","explanation":"การเรียงลำดับผู้มีสิทธิรับช่วงต่อหนี้ (เปลี่ยนตัวลูกหนี้/รับใช้หนี้) ลำดับที่ 1 คือ คู่สมรส และ/หรือ บุตรที่ บรรลุนิติภาวะแล้ว (รองลงมาคือ บิดามารดา -> พี่น้องร่วมบิดามารดา -> ปู่ย่าตายาย ตามลำดับ)."},{"num":471,"q":"ลูกค้ากลุ่ม Good Bank มีเหตุจำเป็นเร่งด่วนต้องเข้าร่วมมาตรการ แต่พบว่ามี \"ดอกเบี้ยค้างชำระเกิน 15 เดือน\" สาขาต้อง ดำเนินการขออนุมัติเปลี่ยนแปลงสิทธิ์ (Override) ผ่านระบบ BAAC Loan จากบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) หรือ พนักงานระดับ 8 ขึ้นไปใน สนจ. ที่ได้รับมอบหมาย"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"},{"key":"ง","text":"ผู้จัดการศูนย์จัดการหนี้"}],"answer":"ข","explanation":"การขอ Override ระบบกรณีลูกค้ามีดอกเบี้ยค้างชำระเกิน 15 เดือน (ซึ่งขัดกับ Control Limit ของมาตรการ) อำนาจการปลดล็อคจะอยู่ที่ ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) หรือ พนักงานระดับ 8 ขึ้นไปใน สนจ. ที่ได้รับ มอบหมาย ครับ"},{"num":472,"q":"บัญชีต้นเงินกู้ที่ถูกจัดชั้น \"กล่าวถึงเป็นพิเศษ (ชั้น 2)\" ที่เข้าร่วมมาตรการ Restructuring Loan จะถูกกันเงินสำรองในอัตรา ร้อยละเท่าใด?","choices":[{"key":"ก","text":"ร้อยละ 1 ของยอดหนี้"},{"key":"ข","text":"ร้อยละ 20 ของยอดหนี้"},{"key":"ค","text":"ร้อยละ 50 ของยอดหนี้"},{"key":"ง","text":"ร้อยละ 100 ของยอดหนี้"}],"answer":"ง","explanation":"หนี้ที่จัดชั้น 2 (SM) หรือหนี้ที่มีความเสี่ยงสูง ระบบจะบังคับให้ กันเงินสำรองร้อยละ 100 ของยอดหนี้ ครับ"},{"num":473,"q":"ตามมาตรการ Restructuring Loan บัญชีต้นเงินกู้ที่มีสถานะเป็น \"หนี้ปกติ (ชั้น 1)\" ก่อนเข้าร่วมมาตรการ จะถูกจัดชั้นหนี้ อย่างไรเมื่อเข้าร่วมมาตรการแล้ว?","choices":[{"key":"ก","text":"ปรับเป็นหนี้ชั้น 2"},{"key":"ข","text":"ให้คงการจัดชั้นเป็นหนี้ปกติ (ชั้น 1) ตามเดิม"},{"key":"ค","text":"ปรับเป็นหนี้ NPLs"},{"key":"ง","text":"ปรับเป็นหนี้จัดชั้น 3"}],"answer":"ข","explanation":"สำหรับบัญชีที่ก่อนเข้า ปปน. ยังเป็นหนี้ปกติ (ชั้น 1) เมื่อเข้าสู่มาตรการ ปปน. เชิงป้องกัน ธนาคารจะ ให้คง การจัดชั้นเป็นหนี้ปกติ (ชั้น 1) ตามเดิม ครับ"},{"num":474,"q":"ลูกค้าเข้าร่วมมาตรการและได้ทำคำรับรองแผนการชำระดอกเบี้ยส่วนที่เหลือ พนักงานจะต้องกำหนดระยะเวลาให้ลูกค้า ส่งชำระดอกเบี้ยส่วนที่เหลือนี้ให้ครบถ้วนภายในระยะเวลาเท่าใด?","choices":[{"key":"ก","text":"ภายใน 3 เดือน"},{"key":"ข","text":"ภายใน 6 เดือน"},{"key":"ค","text":"ภายในกำหนดระยะเวลาที่ขยายออกไปไม่เกิน 12 เดือน จากงวดชำระเดิม"},{"key":"ง","text":"ชำระในงวดสุดท้ายของสัญญา (Balloon)"}],"answer":"ค","explanation":"การจัดการดอกเบี้ยส่วนที่เหลือจากการปรับโครงสร้างหนี้ พนักงานต้องทำแผนให้ลูกค้าชำระดอกเบี้ยที่ค้างอยู่ ให้เสร็จสิ้น ภายในกำหนดระยะเวลาที่ขยายออกไปแต่ต้องไม่เกิน 12 เดือน จากงวดชำระเดิม ครับ"},{"num":475,"q":"ลูกค้ากู้เงินแบบชำระคืนคราวเดียวทั้งหมด กำหนดชำระคืนเสร็จสิ้นภายในวันที่ 31 มีนาคม 2565 การนับอายุความของ ต้นเงินจะเริ่มนับเมื่อใด?","choices":[{"key":"ก","text":"1 มกราคม 2565"},{"key":"ข","text":"31 มีนาคม 2565"},{"key":"ค","text":"1 เมษายน 2565"},{"key":"ง","text":"31 ธันวาคม 2565"}],"answer":"ค","explanation":"อายุความจะเริ่มนับใน \"วันถัดจากวันครบกำหนดชำระ\" ดังนั้นหากครบกำหนด 31 มี.ค. 2565 อายุความจะ เริ่มนับ 1 ในวันที่ 1 เมษายน 2565 ครับ"},{"num":476,"q":"\"หนังสือรับสภาพความรับผิด\" (ใช้กรณีหนี้ขาดอายุความฟ้องร้องไปแล้ว) มีกำหนดอายุความกี่ปีนับแต่วันที่ทำหนังสือ?","choices":[{"key":"ก","text":"1 ปี"},{"key":"ข","text":"2 ปี"},{"key":"ค","text":"5 ปี"},{"key":"ง","text":"10 ปี"}],"answer":"ง","explanation":"หนังสือรับสภาพความรับผิด (ใช้สำหรับหนี้ที่ขาดอายุความแล้วเพื่อกู้ชีพหนี้) จะทำให้เกิดอายุความฟ้องร้อง ขึ้นมาใหม่ โดยมีกำหนดอายุความ 10 ปี นับแต่วันที่ทำหนังสือครับ"},{"num":477,"q":"[Case Study] ลูกค้ามีหนี้เงินกู้แบ่งชำระ 7 งวด แต่ปล่อยค้างชำระจน \"ขาดอายุความแล้ว\" เมื่อพนักงานตามตัวพบและให้ ทำ \"หนังสือรับสภาพความรับผิด\" พนักงานต้องกำหนดการชำระเงินของหนี้ทั้ง 7 งวดอย่างไรในหนังสือ?","choices":[{"key":"ก","text":"ให้กำหนดชำระตามกำหนดเดิมของแต่ละงวดต่อไป"},{"key":"ข","text":"นำต้นเงินกู้ทั้งหมดไปกำหนดชำระให้เสร็จสิ้นภายใน 1 ปี นับแต่วันทำหนังสือรับสภาพความรับผิด"},{"key":"ค","text":"ให้ผ่อนชำระใหม่เป็นรายเดือน เดือนละเท่าๆ กัน ภายใน 5 ปี"},{"key":"ง","text":"นำยอดรวมทั้งหมดให้ลูกค้าชำระภายใน 30 วันทันที"}],"answer":"ข","explanation":"ทริคการทำหนังสือรับสภาพความรับผิดสำหรับหนี้ที่ขาดอายุความแล้ว คือ ต้องรวมต้นเงินกู้ทั้งหมดมาจัดทำ และกำหนดให้ชำระให้เสร็จสิ้น ภายใน 1 ปี นับแต่วันทำหนังสือ ครับ"},{"num":478,"q":"หากพบว่าดอกเบี้ยใกล้จะขาดอายุความ หรือค้างชำระเกิน 5 ปี แต่ \"ต้นเงินกู้ยังไม่ขาดอายุความ\" ธนาคารจะต้องให้ ลูกค้าจัดทำเอกสารใดเพื่อป้องกันสิทธิเรียกร้อง?","choices":[{"key":"ก","text":"หนังสือรับสภาพความรับผิด"},{"key":"ข","text":"หนังสือรับสภาพหนี้ (18-015)"},{"key":"ค","text":"สัญญาเปลี่ยนตัวลูกหนี้"},{"key":"ง","text":"สัญญารับใช้หนี้"}],"answer":"ข","explanation":"หาก \"ต้นเงินยังไม่ขาดอายุความ\" แต่ดอกเบี้ยกำลังจะขาด เราจะใช้ \"หนังสือรับสภาพหนี้\" ธรรมดาครับ (หนังสือรับสภาพความรับผิด จะใช้ก็ต่อเมื่อ 'ต้นเงิน' ขาดอายุความไปแล้วเท่านั้น)"},{"num":479,"q":"กรณีหลักประกันถูกยึดทรัพย์และสำนักงานบังคับคดีแถลงขายแบบ \"จำนองติดไป\" หากภายหลังลูกค้ามาชำระหนี้จน \"มูลหนี้ลดลง\" จากยอดที่เคยแถลงไว้ สาขาต้องดำเนินการอย่างไร?","choices":[{"key":"ก","text":"แจ้งยกเลิกการขายทอดตลาดทันที"},{"key":"ข","text":"ให้ลูกค้านำเงินไปจ่ายที่สำนักงานบังคับคดีเท่านั้น"},{"key":"ค","text":"แจ้งยอดหนี้ปัจจุบันให้สำนักงานบังคับคดีทราบโดยเร็ว"},{"key":"ง","text":"ไม่ต้องแจ้งยอดหนี้ที่ลดลงให้สำนักงานบังคับคดีทราบ"}],"answer":"ค","explanation":"หากขายทอดตลาดแบบ \"จำนองติดไป\" (ธนาคารยังเป็นเจ้าหนี้จำนอง) ถ้ายอดหนี้ของลูกค้าลดลง สาขา ต้อง แจ้งยอดหนี้ปัจจุบันให้สำนักงานบังคับคดีทราบโดยเร็ว เสมอ เพราะจะมีผลต่อการกำหนดราคาขายและส่วนต่างครับ"},{"num":480,"q":"นิติกรรมการทำสัญญากู้เงินและการรับเงินกู้ที่เกิดขึ้น \"หลัง\" วันที่ศาลมีคำสั่งพิทักษ์ทรัพย์ มีผลทางกฎหมายตามข้อ ใด?","choices":[{"key":"ก","text":"มีผลสมบูรณ์ แต่ต้องคิดดอกเบี้ยปรับเพิ่ม"},{"key":"ข","text":"ตกเป็นโมฆียะ สามารถบอกล้างได้"},{"key":"ค","text":"ตกเป็นโมฆะทั้งหมด รวมตลอดถึงสัญญาค้ำประกันและจำนอง"},{"key":"ง","text":"มีผลสมบูรณ์หากผู้จัดการสาขาอนุมัติ"}],"answer":"ค","explanation":"ลูกค้าที่ถูกศาลพิทักษ์ทรัพย์ จะหมดอำนาจในการจัดการทรัพย์สินของตนเองโดยเด็ดขาด หากแอบมาทำนิติ กรรมกู้เงินใหม่ นิติกรรมนั้นจะ ตกเป็นโมฆะทั้งหมด รวมตลอดถึงสัญญาค้ำประกันและจำนอง ด้วยครับ"},{"num":481,"q":"ตามกฎหมายล้มละลาย ธนาคารจะถูกจัดสถานะเป็น \"เจ้าหนี้มีประกัน\" ในกรณีใดต่อไปนี้?","choices":[{"key":"ก","text":"ลูกหนี้ใช้บุคคลค้ำประกันที่มีความน่าเชื่อถือสูง"},{"key":"ข","text":"ลูกหนี้ใช้หลักประกันจำนองหรือจำนำซึ่งเป็น \"กรรมสิทธิ์ของลูกหนี้เอง\""},{"key":"ค","text":"ลูกหนี้ใช้หลักประกันจำนองที่ดินของคู่สมรส"},{"key":"ง","text":"ลูกหนี้ใช้หลักประกันรับรองรับผิดอย่างลูกหนี้ร่วม"}],"answer":"ข","explanation":"ตามกฎหมายล้มละลาย เจ้าหนี้มีประกัน หมายถึง เจ้าหนี้ที่มีสิทธิเหนือทรัพย์สินของลูกหนี้ในทางจำนอง จำนำ หรือสิทธิยึดหน่วง ดังนั้นหลักประกันนั้นต้องเป็น \"กรรมสิทธิ์ของลูกหนี้เอง\" จึงจะถือเป็นเจ้าหนี้มีประกันครับ"},{"num":482,"q":"ข้อใดต่อไปนี้ ถือว่าธนาคารอยู่ในฐานะ \"เจ้าหนี้ไม่มีประกัน\" เมื่อพิจารณาในคดีล้มละลาย?","choices":[{"key":"ก","text":"ลูกหนี้ใช้ที่ดินของตนเองจำนอง"},{"key":"ข","text":"ลูกหนี้ใช้สลากออมทรัพย์ของตนเองเป็นประกัน"},{"key":"ค","text":"ลูกหนี้ใช้บุคคลค้ำประกัน หรือที่ดินของบุคคลอื่นจำนอง"},{"key":"ง","text":"ลูกหนี้ใช้บัญชีเงินฝากของตนเองจำนำเป็นประกัน"}],"answer":"ค","explanation":"หากลูกหนี้ใช้ บุคคลค้ำประกัน หรือที่ดินของบุคคลอื่นมาจำนอง ธนาคารจะอยู่ในฐานะ \"เจ้าหนี้ไม่มี ประกัน\" ในคดีของตัวลูกหนี้หลักครับ (เพราะสิทธิเหนือทรัพย์ไม่ได้ตกอยู่กับกองทรัพย์สินของลูกหนี้)"},{"num":483,"q":"ลูกหนี้มีหนี้เงินกู้ 200,000 บาท ถูกศาลสั่งพิทักษ์ทรัพย์เด็ดขาดเมื่อวันที่ 1 ตุลาคม 2559 หากธนาคารต้องการใช้สิทธิ \"หัก กลบลบหนี้ (Right of Setoff)\" จากบัญชีเงินฝากที่ค้ำประกันอยู่ การคำนวณดอกเบี้ยเงินกู้จะต้องทำอย่างไร?","choices":[{"key":"ก","text":"คำนวณดอกเบี้ยเงินกู้จนถึงวันที่ธนาคารทำรายการหักบัญชี"},{"key":"ข","text":"คำนวณดอกเบี้ยเงินกู้จนถึงวันที่ลูกหนี้ผิดนัดชำระงวดแรก"},{"key":"ค","text":"คำนวณดอกเบี้ยเงินกู้จนถึงวันที่ศาลมีคำสั่งพิทักษ์ทรัพย์ (1 ต.ค. 2559) เท่านั้น"},{"key":"ง","text":"ห้ามนำดอกเบี้ยมาหักกลบ ให้หักได้เฉพาะต้นเงินกู้เท่านั้น"}],"answer":"ค","explanation":"กฎเหล็กของการหักกลบลบหนี้ (Right of Setoff) เมื่อลูกค้าถูกพิทักษ์ทรัพย์ คือ การคำนวณยอดหนี้ฝั่งธนาคาร จะต้องคำนวณ ต้นเงินกู้ + ดอกเบี้ยถึงแค่วันที่ศาลมีคำสั่งพิทักษ์ทรัพย์เท่านั้น (ห้ามนำดอกเบี้ยหลังจากนั้นมาหักกลบ เด็ดขาด)"},{"num":484,"q":"ในกรณีที่ธนาคารต้องการใช้สิทธิหักกลบลบหนี้ จากเงินฝากที่ \"ไม่มีภาระค้ำประกัน\" ธนาคารจะต้องเลือกลำดับการหัก ชำระหนี้สัญญาประเภทใด \"เป็นลำดับแรก\" เพื่อประโยชน์สูงสุดของธนาคาร?","choices":[{"key":"ก","text":"สัญญากู้เงินที่ใช้หลักประกันบุคคลค้ำประกัน"},{"key":"ข","text":"สัญญากู้เงินที่ใช้หลักประกันรับรองรับผิดอย่างลูกหนี้ร่วม"},{"key":"ค","text":"สัญญากู้เงินที่ใช้หลักประกันจำนองหรือจำนำ"},{"key":"ง","text":"สัญญากู้เงินที่มีวงเงินสูงที่สุด"}],"answer":"ก","explanation":"หากเงินฝากที่นำมาหักกลบลบหนี้ไม่ได้มีภาระค้ำประกันสัญญาใดเป็นพิเศษ ธนาคารจะต้องเลือกหักหนี้ที่ ธนาคารมีความเสี่ยงสูงสุดก่อน คือ สัญญากู้เงินที่ใช้หลักประกันบุคคลค้ำประกัน หรือสัญญาที่ไม่มีหลักประกันครับ"},{"num":485,"q":"การยื่น \"คำขอรับชำระหนี้\" ต่อเจ้าพนักงานพิทักษ์ทรัพย์ในคดีล้มละลาย นิติกรต้องดำเนินการภายในระยะเวลาเท่าใด ตามที่กฎหมายกำหนด?","choices":[{"key":"ก","text":"ภายใน 30 วัน นับจากวันที่ศาลมีคำสั่งพิทักษ์ทรัพย์"},{"key":"ข","text":"ภายใน 2 เดือน นับจากวันโฆษณาคำสั่งพิทักษ์ทรัพย์ในราชกิจจานุเบกษา"},{"key":"ค","text":"ภายใน 6 เดือน นับจากวันที่ทราบข่าว"},{"key":"ง","text":"ภายใน 1 ปี นับจากวันทำสัญญากู้"}],"answer":"ข","explanation":"นิติกรหรือผู้รับมอบอำนาจ จะต้องยื่นคำขอรับชำระหนี้ต่อเจ้าพนักงานพิทักษ์ทรัพย์ ภายใน 2 เดือน นับจาก วันโฆษณาคำสั่งพิทักษ์ทรัพย์เด็ดขาดในราชกิจจานุเบกษา ครับ (หากอยู่ต่างประเทศขยายได้อีกไม่เกิน 2 เดือน)"},{"num":486,"q":"หากธนาคาร \"ไม่ได้ยื่นคำขอรับชำระหนี้\" ในคดีล้มละลาย ภายในระยะเวลาที่กฎหมายกำหนด จะเกิดผลกระทบต่อสิทธิ ของธนาคารอย่างไร?","choices":[{"key":"ก","text":"หนี้เงินกู้ของลูกหนี้จะระงับไปทันที ธนาคารต้องตัดหนี้สูญ"},{"key":"ข","text":"ธนาคารหมดสิทธิเรียกร้องให้ตัวลูกหนี้ชำระหนี้ แต่หนี้ยงไม่ระงับ และยังติดตามจากผู้ค้ำประกันหรือยึดทรัพย์จำนองได้"},{"key":"ค","text":"สิทธิเรียกร้องของธนาคารจะถูกเปลี่ยนไปเป็นแบบไม่มีประกันโดยอัตโนมัติ"},{"key":"ง","text":"ธนาคารสามารถยื่นอุทธรณ์ต่อศาลแพ่งเพื่อขอขยายเวลาได้เสมอ"}],"answer":"ข","explanation":"หากธนาคารไม่ยื่นขอรับชำระหนี้ตามกำหนด ธนาคารจะ หมดสิทธิเรียกร้องหนี้จากกองทรัพย์สินของตัว ลูกหนี้ แต่หนี้ยงไม่ระงับสูญไป ธนาคารยังสามารถไปติดตามทวงถามจากผู้ค้ำประกัน หรือบังคับเอาจากทรัพย์จำนองได้ ตามปกติ ครับ"},{"num":487,"q":"เมื่อศาลมีคำสั่ง \"ปลดจากการล้มละลาย\" ให้ลูกหนี้หลุดพ้นจากหนี้ทั้งปวง (โดยธนาคารไม่ได้ยื่นขอรับชำระหนี้ไว้) สาขา ยังสามารถดำเนินการเรียกร้องให้บุคคลใดชำระหนี้เงินกู้นี้ได้อีกหรือไม่?","choices":[{"key":"ก","text":"ไม่ได้ ต้องยุติการติดตามหนี้กับทุกฝ่าย"},{"key":"ข","text":"เรียกได้เฉพาะจากตัวลูกหนี้หลักที่เพิ่งปลดล้มละลาย"},{"key":"ค","text":"เรียกได้จากทายาทของลูกหนี้เท่านั้น"},{"key":"ง","text":"เรียกให้ลูกหนี้ร่วม ผู้ค้ำประกัน หรือบุคคลอื่นที่จำนองเป็นประกัน ชำระหนี้ได้ตามปกติ"}],"answer":"ง","explanation":"การปลดล้มละลายมีผลทำให้ \"ลูกหนี้หลัก\" หลุดพ้นจากหนี้เท่านั้น แต่ ไม่เป็นเหตุให้ลูกหนี้ร่วม ผู้ค้ำประกัน หรือบุคคลอื่นที่จำนองเป็นประกัน หลุดพ้นความรับผิดไปด้วย สาขาจึงติดตามจากกลุ่มบุคคลเหล่านี้ต่อได้ครับ"},{"num":488,"q":"ลูกหนี้มีเงินฝากออมทรัพย์ฝากเมื่อปี 2558 จำนวน 300,000 บาท ต่อมาถูกศาลพิทักษ์ทรัพย์ในวันที่ 1 ต.ค. 2559 และนำ เงินมา \"ฝากเพิ่ม\" อีก 100,000 บาท ในวันที่ 31 ต.ค. 2559 ธนาคารจะใช้สิทธิหักกลบลบหนี้ได้สูงสุดจากยอดเงินใด?","choices":[{"key":"ก","text":"400,000 บาท"},{"key":"ข","text":"300,000 บาท (บวกดอกเบี้ยถึงวันที่พิทักษ์ทรัพย์)"},{"key":"ค","text":"100,000 บาท"},{"key":"ง","text":"ไม่สามารถหักกลบลบหนี้ได้เลย"}],"answer":"ข","explanation":"ธนาคารจะหักกลบลบหนี้ได้เฉพาะทรัพย์สินที่เป็นของลูกหนี้ \"ก่อนหรือในวันที่ศาลมีคำสั่งพิทักษ์ทรัพย์\" ดังนั้น จึงหักได้สูงสุดเพียง 300,000 บาท (บวกดอกเบี้ยเงินฝากถึงวันพิทักษ์ทรัพย์) เท่านั้น ส่วนเงิน 1 แสนบาทที่นำมาฝากทีหลัง ธนาคารไม่มีสิทธิหักกลบครับ"},{"num":489,"q":"ลูกค้าประเภท \"ผู้ประกอบการ (ฉ.45)\" ค้างชำระหนี้จนต้นเงินกู้ใกล้ขาดอายุความ สาขาจึงต้องเรียกให้มาทำ \"หนังสือรับ สภาพหนี้\" บุคคลในตำแหน่งใดต่อไปนี้ มีอำนาจลงนามดำเนินการแทนธนาคารได้ในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ ระดับ 7"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"พนักงานระดับ 8 ขึ้นไป"}],"answer":"ข","explanation":"ตามระเบียบ 83 ว่าด้วยอำนาจการดำเนินการหลังการให้กู้ ข้อ 6(4) และ 5(4) การจัดทำหนังสือรับสภาพหนี้ สำหรับลูกค้าบุคคลและผู้ประกอบการ อำนาจในระดับสาขาเป็นของ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":490,"q":"สหกรณ์นอกภาคการเกษตร (ตามข้อบังคับฉบับที่ 46) ประสงค์ขอ \"ผัดชำระเงินรายงวด หรือผ่อนเวลาชำระหนี้เงินกู้\" บุคคลในข้อใดมีอำนาจอนุมัติพิจารณาเป็นลำดับแรกสุด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ข","explanation":"ตามตารางอำนาจระเบียบ 83 ข้อ 7(1) การผัดชำระเงินรายงวด หรือผ่อน/ขยายเวลาชำระหนี้ สำหรับกลุ่ม สหกรณ์นอกภาคการเกษตร (ฉ.46) อำนาจการอนุมัติระดับแรกสุดเริ่มต้นที่ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":491,"q":"ลูกค้าถูกศาลสั่งพิทักษ์ทรัพย์ แต่ต่อมา \"ผู้ค้ำประกัน\" นำเงินสดมาชำระหนี้แทน พนักงานการเงินจะต้องดำเนินการ บันทึกข้อความใดลงในใบเสร็จรับเงินให้ชัดเจน?","choices":[{"key":"ก","text":"\"ชำระหนี้ปิดบัญชีบุคคลล้มละลาย\""},{"key":"ข","text":"\"ข้าพเจ้า...เป็นผู้ชำระหนี้ตามใบเสร็จรับชำระหนี้ฉบับนี้\" พร้อมให้ผู้ชำระลงลายมือชื่อ"},{"key":"ค","text":"\"รับชำระเงินตามคำสั่งศาลล้มละลาย\""},{"key":"ง","text":"ไม่ต้องบันทึกข้อความใดเพิ่มเติม พิมพ์ใบเสร็จตามปกติ"}],"answer":"ข","explanation":"หากลูกค้าถูกพิทักษ์ทรัพย์และผู้ค้ำประกันมาจ่ายแทน พนักงานต้องระบุในใบเสร็จว่า \"ข้าพเจ้า...เป็นผู้ชำระ หนี้ตามใบเสร็จรับชำระหนี้ฉบับนี้\" พร้อมให้ผู้ชำระลงลายมือชื่อ เพื่อเก็บไว้เป็นหลักฐานให้ผู้ค้ำประกันนำไปใช้สิทธิไล่เบี้ย ในทางกฎหมายได้"},{"num":492,"q":"หากลูกค้าจงใจมากู้เงินและรับเงินกู้จากธนาคารไปจำนวน 50,000 บาท \"โดยปกปิดสถานะว่าตนถูกศาลสั่งพิทักษ์ ทรัพย์อยู่ก่อนแล้ว\" ธนาคารสามารถดำเนินการทางกฎหมายอย่างไรได้บ้าง?","choices":[{"key":"ก","text":"ฟ้องเรียกค่าเสียหายในมูลละเมิด และดำเนินคดีอาญาตาม พ.ร.บ.ล้มละลาย"},{"key":"ข","text":"ฟ้องบังคับตามสัญญากู้เงินฉบับนั้นได้ตามปกติ"},{"key":"ค","text":"ให้ลูกค้าทำสัญญาใหม่ย้อนหลังไปก่อนถูกพิทักษ์ทรัพย์"},{"key":"ง","text":"ทำได้เพียงรอรับส่วนแบ่งจากเจ้าพนักงานพิทักษ์ทรัพย์เท่านั้น"}],"answer":"ก","explanation":"การที่ลูกค้าถูกศาลสั่งพิทักษ์ทรัพย์แล้ว ถือว่าหมดอำนาจจัดการทรัพย์สิน หากแอบมากู้เงิน สัญญานั้นจะตก เป็น \"โมฆะ\" ธนาคารฟ้องเรียกเงินตามสัญญาไม่ได้ แต่ต้อง ฟ้องเรียกค่าเสียหายในมูลละเมิด และดำเนินคดีอาญาตาม พ.ร.บ.ล้มละลาย ฐานฉ้อโกงและปกปิดข้อมูล"},{"num":493,"q":"ลูกค้ามีหนี้เงินกู้กับธนาคาร 2 สัญญา คือ สัญญาที่ 1 (กู้ \"ก่อน\" ถูกพิทักษ์ทรัพย์) และ สัญญาที่ 2 (กู้ \"หลัง\" ถูกพิทักษ์ ทรัพย์) ธนาคารต้องนำหนี้สัญญายื่นขอรับชำระหนี้ต่อเจ้าพนักงานพิทักษ์ทรัพย์อย่างไร?","choices":[{"key":"ก","text":"ยื่นขอรับชำระหนี้ทั้ง 2 สัญญา"},{"key":"ข","text":"ยื่นขอรับชำระหนี้เฉพาะสัญญาที่ 1"},{"key":"ค","text":"ยื่นขอรับชำระหนี้เฉพาะสัญญาที่ 2"},{"key":"ง","text":"นำสัญญาที่ 2 มาหักกลบกับสัญญาที่ 1 แล้วยื่นยอดสุทธิ"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก ต้องฟ้องให้เพิกถอนสัญญา เนื่องจากทำขึ้นหลังถูกพิทักษ์ทรัพย์"},{"num":494,"q":"หลังจากที่ศาลมีคำสั่ง \"ปลดจากการล้มละลาย\" แล้ว หากลูกค้ารายนี้มีความประสงค์จะขอกู้เงินก้อนใหม่กับธนาคาร ธนาคารกำหนดแนวทางปฏิบัติไว้อย่างไร?","choices":[{"key":"ก","text":"ปฏิเสธการให้สินเชื่อทุกกรณีตลอดชีพ"},{"key":"ข","text":"ให้ลูกค้ารายเดิมยื่นกู้ได้ แต่คิดอัตราดอกเบี้ยสูงขึ้น"},{"key":"ค","text":"ให้สาขาพิจารณารับคู่สมรสขึ้นทะเบียนเป็นลูกค้าแทน และพิจารณาให้กู้เงินต่อไป"},{"key":"ง","text":"ให้ลูกค้านำทรัพย์สินมาวางเป็นเงินประกันเต็มจำนวน 100%"}],"answer":"ก","explanation":"ตามนโยบายความเสี่ยง (Negative List) ของธนาคาร บุคคลที่เคยล้มละลายแม้จะได้รับการปลดล้มละลายแล้ว ธนาคารมีข้อกำหนด ปฏิเสธการให้สินเชื่อทุกกรณีตลอดชีพ เนื่องจากประวัติความเสี่ยงขั้นสูงสุด"},{"num":495,"q":"ในการจัดทำสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.) ตามมาตรการปรับปรุงโครงสร้างหนี้ ขยายโอกาสและเสริมสร้าง ศักยภาพลูกหนี้ ธนาคารกำหนดให้อายุของลูกหนี้ ณ \"วันสิ้นสุดสัญญา\" ต้องไม่เกินกี่ปี?","choices":[{"key":"ก","text":"60 ปี"},{"key":"ข","text":"75 ปี"},{"key":"ค","text":"80 ปี"},{"key":"ง","text":"85 ปี"}],"answer":"ข","explanation":"ในการจัดทำสัญญา ปปน. ตามมาตรการขยายโอกาสและเสริมสร้างศักยภาพลูกหนี้ ธนาคารกำหนดให้บวก อายุของลูกหนี้และระยะเวลาผ่อนชำระรวมกัน ณ วันสิ้นสุดสัญญาจะต้อง ไม่เกิน 75 ปี"},{"num":496,"q":"ตามกฎเหล็กของการปรับปรุงโครงสร้างหนี้ หากลูกค้ามีหนี้หลายสัญญา โดยมีทั้ง \"หนี้ปกติ (ชั้น 1)\" และ \"หนี้ด้อย คุณภาพ (NPLs ชั้น 3-5)\" ธนาคารกำหนดแนวทางปฏิบัติไว้อย่างไร?","choices":[{"key":"ก","text":"ให้นำหนี้ทุกสัญญามารวมกันเป็นสัญญาเดียวเพื่อความสะดวก"},{"key":"ข","text":"ห้ามนำหนี้ปกติ หรือค้างชำระ 0-3 เดือน มารวมกับหนี้ NPLs ในสัญญาเดียวกันเด็ดขาด"},{"key":"ค","text":"ให้โอนหนี้ปกติไปเป็นหนี้ NPLs ก่อนแล้วค่อยทำสัญญา"},{"key":"ง","text":"ให้ยกเลิกบัญชีหนี้ NPLs ทั้งหมด"}],"answer":"ข","explanation":"กฎเหล็ก (Golden Rule) ของการทำ ปปน. คือ ห้ามนำหนี้ปกติ หรือค้างชำระ 0-3 เดือน มารวมกับหนี้ NPLs (ชั้น 3-5) ในสัญญาเดียวกันเด็ดขาด เพื่อป้องกันระบบจัดชั้นและการกันสำรองของธนาคารผิดเพี้ยน"},{"num":497,"q":"ตามเงื่อนไข NPLs Exit สำหรับลูกค้ากลุ่มเกษตรกรและบุคคล บัญชีที่ตกเป็นหนี้จัดชั้น 2 (SM) หรือ NPLs จะกลับมาเป็น \"หนี้ปกติ (ชั้น 1)\" ได้ตามเงื่อนไขใด?","choices":[{"key":"ก","text":"เมื่อชำระเงินตามสัญญา ปปน. ได้ 1 งวดชำระตามสัญญาใหม่"},{"key":"ข","text":"เมื่อชำระเงินตามสัญญา ปปน. ได้ 2 งวดชำระติดต่อกัน"},{"key":"ค","text":"เมื่อชำระเงินตามสัญญา ปปน. ได้ 3 งวดชำระติดต่อกัน"},{"key":"ง","text":"เมื่อชำระดอกเบี้ยค้างรับทั้งหมดเสร็จสิ้น"}],"answer":"ก","explanation":"กฎ NPLs Exit สำหรับเกษตรกร บุคคล หรือกองทุนหมู่บ้าน ที่มีรอบชำระเป็นรายปี/ตามฤดูกาล บัญชีจะออก จากหนี้เสียและกลับมาเป็นชั้น 1 (ปกติ) ได้ เมื่อลูกค้า ชำระครบ 1 งวดชำระ ตามสัญญาใหม่"},{"num":498,"q":"จากข้อที่แล้ว สำหรับลูกค้าประเภทอื่นๆ (เช่น ผู้ประกอบการ นิติบุคคล) ที่จ่ายชำระเป็นรายเดือน บัญชีจะกลับมาเป็น หนี้ปกติ (ชั้น 1) ได้เมื่อใด?","choices":[{"key":"ก","text":"เมื่อชำระเงินได้ 1 งวดชำระ"},{"key":"ข","text":"เมื่อชำระเงินได้ 2 งวดชำระติดต่อกัน"},{"key":"ค","text":"เมื่อชำระเงินได้ 3 งวดชำระติดต่อกัน"},{"key":"ง","text":"เมื่อชำระเงินได้ 6 งวดชำระติดต่อกัน"}],"answer":"ค","explanation":"กฎ NPLs Exit สำหรับสถาบัน ผู้ประกอบการนิติบุคคล หรือลูกค้าที่มีรอบการชำระต่ำกว่า 3 เดือน (เช่น ชำระ รายเดือน) จะมีเงื่อนไขเข้มงวดกว่า คือต้อง ชำระให้ครบ 3 งวดชำระติดต่อกัน จึงจะกลับมาเป็นชั้น 1 ได้"},{"num":499,"q":"[Case Study: NPLs Exit] นาย ช เป็นเกษตรกร มีบัญชีถูกจัดชั้น 2 ภายหลังเข้า ปปน. หากถึงงวดชำระที่มีเงื่อนไขต้องส่ง ทั้ง \"ต้นเงินและดอกเบี้ย\" นาย ช ต้องชำระเงินอย่างไรจึงจะถือว่า \"ชำระสมบูรณ์\" และกลับมาจัดชั้น 1 ได้?","choices":[{"key":"ก","text":"ชำระดอกเบี้ย 100% โดยสามารถค้างชำระต้นเงินไว้ได้"},{"key":"ข","text":"ชำระต้นเงิน 100% และดอกเบี้ยไม่น้อยกว่า 50%"},{"key":"ค","text":"ชำระต้นเงิน 100% และดอกเบี้ยไม่น้อยกว่า 75% ของที่ถึงกำหนดชำระ โดยไม่มีบิลค้าง"},{"key":"ง","text":"ชำระเพียงร้อยละ 50 ของยอดเรียกเก็บทั้งหมด"}],"answer":"ค","explanation":"กรณีที่งวดชำระมี \"ต้นเงินถึงกำหนด\" คำว่าชำระสมบูรณ์เพื่อให้ Exit ได้ ลูกค้าจะต้องจ่าย ต้นเงิน 100% และดอกเบี้ยไม่น้อยกว่า 75% ของที่ถึงกำหนดชำระ (และห้ามมีบิลค้างในระบบ)"},{"num":500,"q":"[Case Study: NPLs Exit] นาง ญ เข้า ปปน. และได้รับเงื่อนไข \"ปลอดชำระต้นเงิน (Grace Period) 3 ปี\" ในงวดแรกนาง ญ ต้องชำระเงินอย่างไร จึงจะถือว่า \"ชำระสมบูรณ์\" และกลับมาจัดเป็นชั้น 1 (Exit) ได้?","choices":[{"key":"ก","text":"ไม่ต้องชำระใดๆ เลย เนื่องจากอยู่ในช่วงปลอดหนี้"},{"key":"ข","text":"ชำระดอกเบี้ยให้ครบ 100% ของดอกเบี้ยที่ถึงกำหนด โดยต้องไม่มีบิลค้างชำระ"},{"key":"ค","text":"ชำระดอกเบี้ยเพียง 75% ก็เพียงพอ"},{"key":"ง","text":"ชำระต้นเงิน 100% แม้จะอยู่ในช่วงปลอดต้นเงินก็ตาม"}],"answer":"ข","explanation":"กรณีที่ลูกค้าได้เงื่อนไข \"ปลอดชำระต้นเงิน (Grace Period)\" แปลว่าไม่ต้องจ่ายต้นเงิน แต่เพื่อให้ Exit กลับมาเป็น หนี้ปกติได้ ลูกค้าจะต้อง ชำระดอกเบี้ยให้ครบ 100% ของที่ถึงกำหนดชำระ โดยไม่มีบิลค้างครับ"},{"num":501,"q":"[Case Study] นาง ฐ มีหนี้ 2 สัญญา (สัญญาที่ 1 จัดชั้น 1, สัญญาที่ 2 จัดชั้น 2) ก่อนทำ ปปน. นาง ฐ \"นำเงินมาชำระ ดอกเบี้ยค้างรับได้ทั้งหมด\" เมื่อรวมสัญญาเป็นบัญชีเดียว บัญชีรวมต้นเงินจะถูกจัดชั้นและรับรู้รายได้ตามข้อใด?","choices":[{"key":"ก","text":"จัดชั้น 1, กันสำรอง 1%, รับรู้รายได้ AA"},{"key":"ข","text":"จัดชั้น 2, กันสำรอง 100%, รับรู้รายได้ NA"},{"key":"ค","text":"จัดชั้น 2, กันสำรอง 1%, รับรู้รายได้ NA"},{"key":"ง","text":"จัดชั้น 1, กันสำรอง 100%, รับรู้รายได้ AA"}],"answer":"ก","explanation":"ตามผังการจัดชั้นหนี้ หากนำเงินมาชำระ \"ดอกเบี้ยค้างรับได้ทั้งหมด\" ก่อนทำ ปปน. สัญญารวมต้นเงินจะถูก จัดเป็น ชั้น 1, กันสำรอง 1% และรับรู้รายได้ด้วยเกณฑ์คงค้าง (AA) เสมอครับ"},{"num":502,"q":"[Case Study] บริษัท ฑ มีหนี้ OD สถานะ Active จัดชั้น 1 ขอทำ ปปน. รวมต้นเงิน (โดยไม่เคยทำ Pre-emptive มาก่อน) และ \"ไม่ได้ชำระดอกเบี้ยค้างรับ\" บัญชีรวมต้นเงินจะมีสถานะตามข้อใด?","choices":[{"key":"ก","text":"จัดชั้น 1, กันสำรอง 1%, รับรู้รายได้ AA"},{"key":"ข","text":"จัดชั้น 1, กันสำรอง 1%, รับรู้รายได้ NA"},{"key":"ค","text":"จัดชั้น 1, กันสำรอง 100%, รับรู้รายได้ NA"},{"key":"ง","text":"จัดชั้น 2, กันสำรอง 100%, รับรู้รายได้ NA"}],"answer":"ข","explanation":"หากลูกค้าเดิมเป็นชั้น 1 (ไม่เคยทำ Pre-emptive) แต่ทำ ปปน. โดย \"ไม่ได้ชำระดอกเบี้ยค้างรับ\" ระบบจะคงชั้น หนี้เดิมคือ ชั้น 1, กันสำรอง 1% แต่จะปรับการรับรู้รายได้เป็น เกณฑ์เงินสด (NA) ทันทีครับ"},{"num":503,"q":"[Case Study] สหกรณ์ ฒ เคยเข้า ปปน. แบบ Type 8900 ปัจจุบันหนี้จัดชั้น 2 หากขอเข้า ปปน. ระยะที่ 2 โดย \"ไม่ชำระ ดอกเบี้ยค้างรับ\" บัญชีรวมต้นเงินจะมีสถานะจัดชั้นและกันสำรองอย่างไร?","choices":[{"key":"ก","text":"จัดชั้น 1, กันสำรอง 100%"},{"key":"ข","text":"จัดชั้น 2, กันสำรอง 1%"},{"key":"ค","text":"จัดชั้น 2, กันสำรอง 100%"},{"key":"ง","text":"จัดชั้น 3, กันสำรอง 100%"}],"answer":"ค","explanation":"ตามผังบัญชี หากลูกค้า \"เคยผ่าน ปปน. แบบ Pre-emptive (Type 8900) มาก่อน\" ระบบจะบังคับให้คงชั้นหนี้เดิม แต่ต้อง กันสำรอง 100% ทุกกรณี ดังนั้นบัญชีนี้จะคงสถานะชั้น 2 และกันสำรอง 100% ครับ"},{"num":504,"q":"[Case Study: NPLs Exit] นาย ด ต้องการชำระหนี้ในงวดแรกเพื่อ Exit จากชั้น 2 ไปชั้น 1 แต่เงินสดไม่พอจึง \"ชำระน้อยกว่า จำนวนเงินในใบจัดสรรหนี้\" ทำให้มีบิลค้างชำระ ผลของการกระทำนี้คือข้อใด?","choices":[{"key":"ก","text":"ระบบจะให้ Exit เป็นชั้น 1 แบบมีเงื่อนไข"},{"key":"ข","text":"ระบบจะถือว่าชำระครบแล้วหากจ่ายเกิน 50%"},{"key":"ค","text":"ไม่นับเป็น 1 งวดชำระ และไม่สามารถกลับมาเป็นชั้น 1 (Exit) ได้"},{"key":"ง","text":"ระบบจะยกเลิกสัญญา ปปน. ทันที"}],"answer":"ค","explanation":"นิยามของการชำระที่สมบูรณ์ (Paid) คือ ต้องไม่มีบิลค้าง หากชำระขาดไปทำให้มีบิลค้าง จะ ไม่นับเป็น 1 งวดชำระ และไม่สามารถกลับมาเป็นชั้น 1 (Exit) ได้ ครับ"},{"num":505,"q":"[Case Study: NPLs Exit] นาง ต เป็นเกษตรกร ผิดนัดชำระหนี้งวดแรกทำให้ \"มีบิลค้าง\" แต่เดือนต่อมาหาเงินมาชำระงวดที่ ค้างได้ครบถ้วน ระบบจะนับว่าผ่านเกณฑ์การชำระเพื่อทำ Exit หรือไม่?","choices":[{"key":"ก","text":"นับเป็น 1 งวดชำระ และกลับมาเป็นชั้น 1 ทันที"},{"key":"ข","text":"นับเป็นครึ่งงวดชำระ ต้องจ่ายเดือนถัดไปอีกครั้ง"},{"key":"ค","text":"ไม่นับเป็น 1 งวดชำระ และสถานะสัญญาจะไม่เป็นไปตามเงื่อนไขหลักเกณฑ์การติดตาม"},{"key":"ง","text":"ให้นำยอดที่จ่ายไปหักลบกับบัญชีรวมดอกเบี้ยแทน"}],"answer":"ค","explanation":"เงื่อนไข NPLs Exit ระบุชัดเจนว่า หากชำระหลังเกิดบิลค้าง (แม้ภายหลังจะจ่ายครบ) ก็จะ ไม่นับเป็น 1 งวด ชำระ และสถานะสัญญาจะไม่เป็นไปตามเงื่อนไขหลักเกณฑ์การติดตามครับ"},{"num":506,"q":"หากลูกค้าประเภท \"กลุ่มเกษตรกร\" ประสบภัยแล้ง ทำให้ไม่สามารถชำระหนี้ได้ตามกำหนด สาขาต้องการอนุมัติ \"ผัด ชำระเงินรายงวดหรือขยายเวลาชำระหนี้\" บุคคลในตำแหน่งใดต่อไปนี้ \"ไม่มีอำนาจ\" ในการอนุมัติตามระเบียบ?","choices":[{"key":"ก","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ข","text":"ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผช.ผอจ.)"},{"key":"ค","text":"รองผู้อำนวยการฝ่ายกิจการสาขาภาค"},{"key":"ง","text":"ผู้จัดการสาขา (ผจข.)"}],"answer":"ง","explanation":"ตามตารางอำนาจระเบียบ 83 สำหรับ \"กลุ่มเกษตรกร\" อำนาจการอนุมัติผัดชำระเงินรายงวดหรือขยายเวลา จะ เริ่มต้นที่ระดับสำนักงาน ธ.ก.ส. จังหวัด ดังนั้น ผู้จัดการสาขา (ผจข.) ไม่มีอำนาจอนุมัติ ครับ"},{"num":507,"q":"หาก \"สหกรณ์ออมทรัพย์\" (ตามข้อบังคับฉบับที่ 46) ประสงค์ขอ \"ปรับเปลี่ยนตารางกำหนดชำระหนี้\" ให้สอดคล้องกับ สภาพคล่อง บุคคลในข้อใดมีอำนาจอนุมัติพิจารณาเป็นลำดับแรกสุด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ค","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ก","explanation":"สำหรับ \"สหกรณ์นอกภาคการเกษตร\" (ฉ.46) การผัดชำระเงินรายงวดหรือปรับเปลี่ยนตารางชำระหนี้ อำนาจ อนุมัติพิจารณาในลำดับแรกสุดคือ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":508,"q":"กรณีลูกค้ารายใหญ่ถูกประเมินปัจจัยเสี่ยงแล้วคะแนนไม่ผ่านเกณฑ์ ทำให้ต้องปรับเพิ่มอัตราดอกเบี้ย แต่ลูกค้ามี หลักฐานพิสูจน์ได้ว่าผลประกอบการตกต่ำเกิดจากเหตุสุจริต อำนาจในการพิจารณา \"ผ่อนปรนหลักเกณฑ์การประเมินเพื่อ กำหนดอัตราดอกเบี้ย\" ใหม่ เป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักธุรกิจสินเชื่อรายใหญ่"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"รองผู้จัดการด้านธุรกิจ (รอง.ผจก. ธจ.) หรือ ผู้ช่วยผู้จัดการสายงานบริหารงานสินเชื่อ (ผช.ผจก. บส.)"}],"answer":"ง","explanation":"การผ่อนปรนหลักเกณฑ์การประเมินเพื่อกำหนดอัตราดอกเบี้ยสำหรับลูกค้ารายใหญ่ เป็นอำนาจระดับสูง ซึ่ง ตกเป็นของ รองผู้จัดการด้านธุรกิจ (รอง.ผจก. ธจ.) หรือ ผู้ช่วยผู้จัดการสายงานบริหารงานสินเชื่อ (ผช.ผจก. บส.) ครับ"},{"num":509,"q":"ตามมาตรการขยายโอกาสและเสริมสร้างศักยภาพลูกหนี้ หากลูกหนี้มีสัญญาจัดชั้น 1 หรือ 2 และมี \"ต้นเงินคงเหลือน้อย กว่า 100,000 บาท\" ต้องชำระต้นเงินก่อนปรับปรุงโครงสร้างหนี้อย่างน้อยเท่าใด?","choices":[{"key":"ก","text":"100 บาท"},{"key":"ข","text":"500 บาท"},{"key":"ค","text":"1,000 บาท"},{"key":"ง","text":"ร้อยละ 1 ของต้นเงินคงเหลือ"}],"answer":"ง","explanation":"สำหรับลูกหนี้จัดชั้น 1 หรือ 2 ที่มีต้นเงินน้อยกว่า 100,000 บาท ก่อนเข้า ปปน. ขยายโอกาสฯ ต้องชำระต้นเงิน อย่างน้อย ร้อยละ 1 ของต้นเงินคงเหลือ ครับ"},{"num":510,"q":"ตามเงื่อนไข NPLs Exit สำหรับการกำหนดชำระหนี้งวดแรกตั้งแต่ 3 เดือนขึ้นไป (เช่น เกษตรกรชำระรายปี) ลูกหนี้ต้อง ปฏิบัติอย่างไรจึงจะผ่านเกณฑ์เป็นหนี้จัดชั้นปกติ (ชั้น 1)?","choices":[{"key":"ก","text":"ชำระเฉพาะดอกเบี้ยทั้งหมดโดยไม่ต้องชำระต้นเงิน"},{"key":"ข","text":"ชำระหนี้ติดต่อกัน 3 งวด"},{"key":"ค","text":"ชำระต้นเงิน 50% ของยอดหนี้ทั้งหมด"},{"key":"ง","text":"ชำระต้นเงินและดอกเบี้ยถึงกำหนดได้ครบถ้วน หรือชำระต้นเงินครบและดอกเบี้ยไม่ต่ำกว่าร้อยละ 75 ของงวดนั้น"}],"answer":"ง","explanation":"กฎการออกจากหนี้ (NPLs Exit) สำหรับเกษตรกรที่มีรอบชำระรายปี จะถือว่าชำระสมบูรณ์เมื่อ จ่ายต้นเงิน ครบ 100% และดอกเบี้ยไม่ต่ำกว่าร้อยละ 75 ของที่ถึงกำหนดในงวดนั้น (โดยต้องไม่มีบิลค้าง) ครับ"},{"num":511,"q":"กระบวนการปฏิบัติงาน (SLA) สำหรับการบริหารจัดการหนี้ถึงกำหนดชำระหรือหนี้ค้างชำระ 0-3 เดือน (สำหรับกลุ่ม สินเชื่อเกษตรกร) ธนาคารกำหนดเป้าหมายเวลาตั้งแต่เริ่มวางแผนจนถึงจัดเก็บเอกสารแล้วเสร็จ รวมทั้งสิ้นกี่วันทำการ?","choices":[{"key":"ก","text":"7 วันทำการ"},{"key":"ข","text":"13 วันทำการ"},{"key":"ค","text":"15 วันทำการ"},{"key":"ง","text":"30 วันทำการ"}],"answer":"ข","explanation":"โครงสร้างกระบวนการปฏิบัติงาน (SLA) สำหรับการบริหารจัดการหนี้ 0-3 เดือน แบ่งเป็น 3 ช่วง (วางแผน 5 วัน + อนุมัติ 7 วัน + จัดเก็บ 1 วัน) รวมเป้าหมายเวลาทั้งสิ้น 13 วันทำการ ครับ"},{"num":512,"q":"ในการจัดทำมาตรการปรับปรุงโครงสร้างหนี้ (ปปน.) ตามมาตรการสร้างสุข บัญชีรวมต้นเงินสามารถกำหนด \"ระยะเวลา ปลอดชำระต้นเงิน (Grace Period)\" ได้สูงสุดไม่เกินกี่ปี?","choices":[{"key":"ก","text":"ไม่เกิน 1 ปี"},{"key":"ข","text":"ไม่เกิน 2 ปี"},{"key":"ค","text":"ไม่เกิน 3 ปี"},{"key":"ง","text":"ไม่เกิน 5 ปี"}],"answer":"ค","explanation":"ตามมาตรการปรับปรุงโครงสร้างหนี้ (เช่น สร้างสุข) การกำหนดระยะเวลา \"ปลอดชำระต้นเงิน (Grace Period)\" สำหรับบัญชีรวมต้นเงิน ธนาคารอนุญาตให้ทำได้ ไม่เกิน 3 ปี ครับ"},{"num":513,"q":"ตามหลักเกณฑ์การปรับปรุงโครงสร้างหนี้ กรณีที่ลูกค้ามี \"ดอกเบี้ยปรับ (Late Charge)\" ค้างชำระจากสัญญาเดิม ธนาคาร ให้ดำเนินการอย่างไรเมื่อรวมเป็นสัญญาใหม่?","choices":[{"key":"ก","text":"ให้นำดอกเบี้ยปรับรวมเข้าในบัญชีรวมต้นเงิน"},{"key":"ข","text":"ให้นำดอกเบี้ยปรับรวมเข้าในบัญชีรวมดอกเบี้ย"},{"key":"ค","text":"ห้ามรวมดอกเบี้ยปรับเข้าไปในสัญญาใหม่ โดยให้ลดยกเว้นดอกเบี้ยปรับทั้งจำนวน ณ วันที่โอนหนี้"},{"key":"ง","text":"ให้จัดทำสัญญาแยกต่างหากสำหรับดอกเบี้ยปรับเท่านั้น"}],"answer":"ค","explanation":"จุดสำคัญ (Golden Rule) ของการทำสัญญาใหม่ คือ \"ต้องไม่รวมดอกเบี้ยปรับ (Late Charge) ของแต่ละสัญญา เดิม\" เข้าไปในยอดหนี้ใหม่ โดยให้ธนาคารลดดอกเบี้ยปรับทั้งจำนวน ณ วันที่โอนหนี้ครับ"},{"num":514,"q":"[Case Study: Market Code] กรณีลูกหนี้เดิมเสียชีวิต แต่สถานะหนี้เดิมก่อนเสียชีวิตยังเป็น \"หนี้ปกติ (PL)\" เมื่อทายาทเข้ามา ทำสัญญา \"เปลี่ยนตัวลูกหนี้\" สัญญาใหม่ของผู้รับโอนหนี้จะต้องใช้ Market Code รหัสใด?","choices":[{"key":"ก","text":"MK 2692"},{"key":"ข","text":"MK 2693"},{"key":"ค","text":"MK 2694"},{"key":"ง","text":"MK 1633"}],"answer":"ก","explanation":"หากหนี้เดิมเป็นหนี้ปกติ (PL) และมีการทำสัญญา \"เปลี่ยนตัวลูกหนี้\" ให้แก่ทายาท รหัสบัญชีสัญญาใหม่จะต้อง ใช้ Market Code 2692"},{"num":515,"q":"[Case Study: Market Code] จากข้อที่แล้ว หากสถานะหนี้เดิมก่อนเสียชีวิตเป็น \"หนี้ด้อยคุณภาพ (NPLs ชั้น 3-5)\" เมื่อทายาท เข้ามาทำสัญญา \"รับใช้หนี้\" สัญญาใหม่จะต้องเปลี่ยนไปใช้ Market Code รหัสใด?","choices":[{"key":"ก","text":"MK 2692"},{"key":"ข","text":"MK 2693"},{"key":"ค","text":"MK 2694"},{"key":"ง","text":"MK 8900"}],"answer":"ข","explanation":"แต่หากหนี้เดิมตกเป็นหนี้เสีย (NPLs ชั้น 3-5) ไปแล้ว เมื่อทายาทมาทำสัญญา \"รับใช้หนี้\" รหัสบัญชีใหม่ในระบบ จะต้องใช้ Market Code 2693"},{"num":516,"q":"ในการแก้ไขรหัส Subtype สำหรับการเปลี่ยนตัวลูกหนี้ (ทั้งกรณีหนี้ปกติและหนี้ NPLs) พนักงานจะต้องใช้รหัส Subtype ใด ในระบบเพื่อให้สอดคล้องกับนโยบาย \"เปลี่ยนตัวลูกหนี้\"?","choices":[{"key":"ก","text":"40007"},{"key":"ข","text":"40008"},{"key":"ค","text":"40009"},{"key":"ง","text":"02002"}],"answer":"ค","explanation":"ในการเปลี่ยนตัวลูกหนี้ พนักงานจะต้องเข้าไปแก้ไขรหัส Subtype ในระบบให้เป็น 40009 (เปลี่ยนตัวลูกหนี้) เสมอครับ"},{"num":517,"q":"โครงการ \"สินเชื่อแทนคุณ\" มีเงื่อนไขว่า \"ทายาทลูกค้า\" ที่จะเข้ามารับโอนทรัพย์สินและหนี้สิน จะต้องมีอายุคุณสมบัติ ตามข้อใด ณ วันที่ขอกู้?","choices":[{"key":"ก","text":"อายุไม่เกิน 50 ปี"},{"key":"ข","text":"อายุไม่เกิน 55 ปี"},{"key":"ค","text":"อายุไม่เกิน 60 ปี"},{"key":"ง","text":"อายุไม่เกิน 65 ปี"}],"answer":"ค","explanation":"ตามเงื่อนไขโครงการ \"สินเชื่อแทนคุณ\" ทายาทที่จะเข้ามารับโอนหนี้และทรัพย์สินจากเกษตรกรลูกค้าสูงอายุ จะต้องมีอายุ ไม่เกิน 60 ปี ณ วันกู้ ครับ"},{"num":518,"q":"อัตราดอกเบี้ยตามโครงการ \"สินเชื่อแทนคุณ\" สำหรับสัญญาต้นเงิน (รวมต้นเงินเดิม) Market Code 2622 ธนาคาร กำหนดให้คิดอัตราดอกเบี้ย \"ในปีที่ 1 - 5\" เท่ากับอัตราใด?","choices":[{"key":"ก","text":"อัตรา 0% (ปลอดดอกเบี้ย)"},{"key":"ข","text":"อัตรา MRR"},{"key":"ค","text":"อัตรา MRR - 1"},{"key":"ง","text":"อัตรา MRR - 2"}],"answer":"ข","explanation":"โครงสร้างอัตราดอกเบี้ยโครงการสินเชื่อแทนคุณ สำหรับบัญชีรวมต้นเงิน (MK 2622) ธนาคารจะคิดดอกเบี้ยในปี ที่ 1 - 5 เท่ากับอัตรา MRR (ส่วนปีที่ 6-10 เป็น MRR-1 และปีที่ 11 ขึ้นไป เป็น MRR-2)"},{"num":519,"q":"ตามกฎเหล็กข้อห้ามเด็ดขาด (Strictly Prohibited) กรณีที่ลูกหนี้ \"ถูกศาลสั่งพิทักษ์ทรัพย์หรือเป็นบุคคลล้มละลาย\" ธนาคารมีแนวทางปฏิบัติเกี่ยวกับการจัดทำสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.) อย่างไร?","choices":[{"key":"ก","text":"อนุญาตให้ทำ ปปน. ได้หากมีผู้ค้ำประกันใหม่ 2 คนขึ้นไป"},{"key":"ข","text":"อนุญาตเฉพาะการปรับลดอัตราดอกเบี้ยเท่านั้น"},{"key":"ค","text":"ไม่อนุญาตให้ทำ ปปน. โดยเด็ดขาด"},{"key":"ง","text":"ให้ทำ ปปน. แบบบัญชีรวมดอกเบี้ยเป็น 0% ได้เท่านั้น"}],"answer":"ค","explanation":"กฎเหล็กข้อห้ามเด็ดขาด (Strictly Prohibited) ระบุว่า ห้ามนำลูกหนี้ที่ถูกดำเนินคดี/ล้มละลาย/พิทักษ์ทรัพย์ มา ทำ ปปน. โดยเด็ดขาด เนื่องจากสถานะทางกฎหมายของลูกหนี้ถือว่าโมฆะไปแล้วครับ,"},{"num":520,"q":"ตามเส้นทางสู่การปรับชั้นหนี้เป็นหนี้ปกติ (NPLs Exit) สำหรับลูกค้าประเภท \"สถาบัน / ผู้ประกอบการ / Non-Farmers\" ที่มี รอบรายได้ไม่สอดคล้องกับฤดูกาลผลิต บัญชีจะกลับมาเป็นหนี้ชั้น 1 ได้ก็ต่อเมื่อปฏิบัติได้ตามเงื่อนไขใด?","choices":[{"key":"ก","text":"จ่ายครบ 1 งวดชำระ"},{"key":"ข","text":"จ่ายครบ 2 งวดชำระติดต่อกัน"},{"key":"ค","text":"จ่ายครบ 3 งวดชำระติดต่อกัน"},{"key":"ง","text":"จ่ายดอกเบี้ยได้ 100% โดยไม่ต้องชำระต้นเงิน"}],"answer":"ค","explanation":"สำหรับกลุ่มสถาบัน ผู้ประกอบการ หรือ Non-Farmers เงื่อนไขการ Exit ออกจากหนี้เสียเพื่อกลับเป็นชั้น 1 จะ เข้มงวดกว่าเกษตรกร โดยต้อง \"จ่ายครบ 3 งวดชำระติดต่อกัน\" ครับ,"},{"num":521,"q":"ตามโครงการ \"แก้หนี้เรื้อรัง หั่นดอกเบี้ย\" บัญชีสัญญารวมต้นเงินของลูกหนี้ต้องมีคุณสมบัติและสถานะตามข้อใด จึงจะ เข้าข่ายได้รับสิทธิประโยชน์?","choices":[{"key":"ก","text":"เป็นหนี้ NPLs (ชั้น 3 ขึ้นไป) และค้างชำระไม่เกิน 12 เดือน"},{"key":"ข","text":"สามารถชำระได้ตามเงื่อนไข NPL Exit เป็นหนี้ปกติ (ชั้น 1) และไม่มีดอกเบี้ยค้างชำระเกิน 15 เดือน"},{"key":"ค","text":"ต้องเป็นสัญญารวมต้นเงินที่มีการตัดหนี้สูญแล้วบางส่วน"},{"key":"ง","text":"ต้องมีการโอนหลักประกันเพื่อชำระหนี้รวมต้นเงินให้เสร็จสิ้นก่อน"}],"answer":"ข","explanation":"การจะได้รับสิทธิประโยชน์จากโครงการแก้หนี้เรื้อรัง หั่นดอกเบี้ย บัญชีรวมต้นเงินจะต้องสามารถชำระจนผ่าน เกณฑ์ NPL Exit (กลับเป็นชั้น 1) ได้สำเร็จ และต้องไม่มีดอกเบี้ยค้างชำระสะสมเกิน 15 เดือน"},{"num":522,"q":"บัญชีสัญญาปรับปรุงโครงสร้างหนี้ (สัญญารวมต้นเงิน) จะถูกเปลี่ยนการรับรู้รายได้กลับมาเป็น \"เกณฑ์คงค้าง (AA)\" และ มีอัตราการ \"กันเงินสำรองลดลงเหลือร้อยละ 1\" เมื่อเกิดเหตุการณ์ใด?","choices":[{"key":"ก","text":"เมื่อลูกหนี้ชำระบัญชีรวมต้นเงินเสร็จสิ้น"},{"key":"ข","text":"ทันทีที่ผู้จัดการสาขาอนุมัติให้เข้าร่วมโครงการแก้หนี้เรื้อรังฯ"},{"key":"ค","text":"เมื่อลูกหนี้ชำระ \"สัญญารวมดอกเบี้ย\" เสร็จสิ้นตามเงื่อนไข"},{"key":"ง","text":"เมื่อลูกหนี้จ่ายชำระค่างวดติดต่อกันเป็นเวลา 3 เดือน"}],"answer":"ค","explanation":"สำหรับบัญชีที่มีทั้งบัญชีต้นเงินและบัญชีดอกเบี้ย บัญชีรวมต้นเงินจะกลับมารับรู้รายได้ตามเกณฑ์คงค้าง (AA) และกันสำรอง 1% ได้ ก็ต่อเมื่อลูกหนี้ได้ชำระ \"สัญญารวมดอกเบี้ย\" จนเสร็จสิ้นตามเงื่อนไขแล้ว (Account Close)"},{"num":523,"q":"สิทธิประโยชน์หลักของการเข้าร่วม \"โครงการแก้หนี้เรื้อรัง หั่นดอกเบี้ย\" ที่เกี่ยวข้องกับการลดดอกเบี้ยส่วนที่เหลือ คือข้อ ใด ายาทร่วมใน กรรมสิทธิ์ที่ดิน\" แปลงที่จำนองของลูกค้าสูงอายุ เพื่อให้ทายาทมีสิทธิในทรัพย์สินที่ตนมารับภาระหนี้"},{"num":531,"q":"ตามตารางการเปลี่ยนรหัสระบบ CBS เมื่อลูกหนี้นำหลักประกันที่อยู่ในสถานะถูกยึดและ \"ประกาศขายทอดตลาดแบบ ปลอดจำนอง (รหัส 21)\" มาทำสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.) พนักงานจะต้องเปลี่ยนรหัสหลักประกันเป็นรหัสใดเพื่อ ล็อคสิทธิ์?","choices":[{"key":"ก","text":"รหัส 23"},{"key":"ข","text":"รหัส 24"},{"key":"ค","text":"รหัส 27"},{"key":"ง","text":"รหัส 28"}],"answer":"ค","explanation":"ตามตารางการเปลี่ยนรหัสระบบ CBS เพื่อล็อคสิทธิ์ หากหลักประกันเดิมเป็น รหัส 21 (ขายทอดตลาดแบบ ปลอดจำนอง) เมื่อนำมาทำ ปปน. จะต้องเปลี่ยนรหัสเป็น รหัส 27"},{"num":532,"q":"ภายหลังการทำสัญญา ปปน. หากลูกค้ามาชำระหนี้ทำให้ยอดหนี้รวมลดลงจากยอดที่เคยแถลงไว้ สาขามีหน้าที่ \"ต้อง\" แจ้งยอดหนี้ปัจจุบันให้สำนักงานบังคับคดีทราบโดยเร็วที่สุด ในกรณีที่แถลงขายทอดตลาดแบบใด?","choices":[{"key":"ก","text":"ขายทอดตลาดแบบปลอดจำนอง (รหัส 27)"},{"key":"ข","text":"ขายทอดตลาดแบบจำนองติดไป (รหัส 23)"},{"key":"ค","text":"ขายทอดตลาดตามคำสั่งศาลล้มละลาย"},{"key":"ง","text":"การขายทอดตลาดทุกรูปแบบต้องแจ้งเสมอ"}],"answer":"ข","explanation":"สำหรับการแจ้งยอดหนี้ให้กรมบังคับคดีทราบ กรณีที่ต้องแจ้ง \"โดยเร็ว\" เมื่อยอดหนี้ลดลง คือกรณีแถลงขาย แบบ \"จำนองติดไป\" (รหัส 23) เพราะมีผลต่อการกำหนดราคาขายและส่วนต่าง ส่วนแบบปลอดจำนอง (รหัส 27) สาขาไม่ ต้องแจ้ง"},{"num":533,"q":"กรณีที่มี \"หนังสือถอนการยึดทรัพย์\" จากสำนักงานบังคับคดีมายังสาขา (กรมบังคับคดียกเลิกการยึด) สาขาจะต้อง ดำเนินการแก้ไขข้อมูลรหัสหลักประกันในระบบ CBS อย่างไรในขั้นตอนสุดท้าย (End-of-Process)?","choices":[{"key":"ก","text":"เปลี่ยนเป็นรหัส 24"},{"key":"ข","text":"เปลี่ยนเป็นรหัส 28"},{"key":"ค","text":"แก้ไขข้อมูลกลับไปเป็น \"สถานะก่อนถูกยึด\" ตามเดิม"},{"key":"ง","text":"เปลี่ยนรหัสเป็น 99 (ปิดการบังคับคดี)"}],"answer":"ค","explanation":"ในขั้นตอนการจัดการระบบ CBS เมื่อมีกรณีแจ้งถอนการยึดทรัพย์ และกรมบังคับคดียกเลิกการยึด พนักงาน จะต้อง แก้ไขข้อมูลในระบบให้กลับไปเป็น \"สถานะก่อนถูกยึด\" ตามเดิม"},{"num":534,"q":"ตามเกณฑ์การจัดชั้นหนี้และการรับรู้รายได้ของ ธปท. ร่วมกับ ธ.ก.ส. ลูกหนี้ที่ถูกจัดเป็น \"หนี้ปกติ (ชั้น 1)\" จะมีอัตราการ กันเงินสำรอง และเกณฑ์การรับรู้รายได้ตามข้อใด?","choices":[{"key":"ก","text":"กันสำรองร้อยละ 1 และรับรู้รายได้เกณฑ์คงค้าง (AA)"},{"key":"ข","text":"กันสำรองร้อยละ 1 และรับรู้รายได้เกณฑ์เงินสด (NA)"},{"key":"ค","text":"กันสำรองร้อยละ 2 และรับรู้รายได้เกณฑ์คงค้าง (AA)"},{"key":"ง","text":"กันสำรองร้อยละ 100 และรับรู้รายได้เกณฑ์เงินสด (NA)"}],"answer":"ก","explanation":"ตามตารางเกณฑ์การรับรู้รายได้และการกันเงินสำรอง หนี้จัดชั้น 1 (ปกติ) จะต้อง กันสำรองร้อยละ 1 และ รับรู้รายได้ตามเกณฑ์คงค้าง (Accrual Basis : AA)"},{"num":535,"q":"จากปัจจัยในการพิจารณาจัดชั้นสินทรัพย์ (เกณฑ์ Aging) ลูกหนี้ที่มีระยะเวลาค้างชำระ \"มากกว่า 1 เดือน แต่ไม่ถึง 3 เดือน\" จะถูกจัดชั้นเป็นลูกหนี้ในกลุ่มใด?","choices":[{"key":"ก","text":"หนี้ปกติ (ชั้น 1)"},{"key":"ข","text":"หนี้กล่าวถึงเป็นพิเศษ (ชั้น 2)"},{"key":"ค","text":"หนี้ต่ำกว่ามาตรฐาน (ชั้น 3)"},{"key":"ง","text":"หนี้สงสัย (ชั้น 4)"}],"answer":"ข","explanation":"ตามเกณฑ์ Aging ปัจจัยด้านระยะเวลาค้างชำระระบุว่า หากลูกหนี้มีหนี้ค้างมากกว่า 1 เดือน แต่ไม่ถึง 3 เดือน จะถูกจัดเป็นหนี้ \"กล่าวถึงเป็นพิเศษ (ชั้น 2)\""},{"num":536,"q":"หากพนักงานตรวจสอบพบว่าลูกหนี้มีพฤติกรรม \"ประวิงเวลาชำระหนี้\" หรือ \"ใช้เงินกู้ผิดวัตถุประสงค์\" ธนาคารจะ ดำเนินการจัดชั้นหนี้ของลูกค้ารายนี้ไว้ในชั้นใดทันที?","choices":[{"key":"ก","text":"หนี้ชั้น 2 (กล่าวถึงเป็นพิเศษ)"},{"key":"ข","text":"หนี้ชั้น 3 (ต่ำกว่ามาตรฐาน)"},{"key":"ค","text":"หนี้ชั้น 4 (สงสัย)"},{"key":"ง","text":"หนี้ชั้น 5 (สงสัยจะสูญ)"}],"answer":"ค","explanation":"ตามหลักเกณฑ์จัดชั้นเชิงคุณภาพ หากลูกหนี้มีพฤติกรรม \"ประวิงเวลาชำระหนี้\" หรือ \"ใช้เงินกู้ผิดวัตถุประสงค์\" ธนาคารจะปรับลดชั้นเป็นหนี้ ชั้น 4 (สงสัย) และกันสำรอง 100% พร้อมเปลี่ยนรับรู้รายได้เป็นเกณฑ์เงินสด (NA)"},{"num":537,"q":"ตามหลักเกณฑ์การใช้หลักประกัน (Collateral Rules) กรณีใช้หลักประกันประเภท \"บุคคลค้ำประกัน\" ตั้งแต่ 2 คนขึ้นไป จะสามารถค้ำประกันหนี้เงินกู้ได้สูงสุดไม่เกินวงเงินเท่าใดต่อสัญญา?","choices":[{"key":"ก","text":"100,000 บาท"},{"key":"ข","text":"300,000 บาท"},{"key":"ค","text":"500,000 บาท"},{"key":"ง","text":"1,000,000 บาท"}],"answer":"ข","explanation":"กฎการใช้บุคคลค้ำประกัน (ตั้งแต่ 2 คนขึ้นไป) อนุญาตให้ค้ำประกันเงินกู้เมื่อรวมทุกสัญญาที่ใช้บุคคลค้ำ ประกันได้ สูงสุดไม่เกิน 300,000 บาท"},{"num":538,"q":"สำหรับบัญชีสินเชื่อด้อยคุณภาพ (NPLs) ที่ค้างชำระเกินกว่า 3 เดือน ธนาคารมีข้อกำหนดในคู่มือปฏิบัติงานด้าน หลักประกัน ว่าต้องทำการ \"ทบทวนราคาประเมินหลักประกันใหม่\" ภายในระยะเวลาเท่าใด?","choices":[{"key":"ก","text":"ทบทวนทุก 1 ปี"},{"key":"ข","text":"ทบทวนทุก 2 ปี"},{"key":"ค","text":"ทบทวนทุก 3 ปี"},{"key":"ง","text":"ทบทวนทุก 5 ปี"}],"answer":"ค","explanation":"ตามคู่มือปฏิบัติงานสินเชื่อระบุว่า หนี้ที่ค้างชำระเกินกว่า 3 เดือน (NPLs) ให้พนักงานดำเนินการ ทบทวน ราคาประเมินหลักประกันใหม่ทุก 3 ปี เพื่อป้องกันความเสี่ยงที่มูลค่าหลักประกันอาจลดลง"},{"num":539,"q":"ตามโครงการสินเชื่อรักษ์ป่าไม้ไทยยั่งยืน (Go Green) ระยะที่ 2 กรณีให้กู้เพื่อเป็นค่าลงทุนในการปลูกไม้เศรษฐกิจ ธนาคาร กำหนดให้ชำระคืนเสร็จสิ้นภายในระยะเวลาสูงสุดไม่เกินกี่ปี (กรณีไม่มีเหตุพิเศษ)?","choices":[{"key":"ก","text":"ไม่เกิน 5 ปี"},{"key":"ข","text":"ไม่เกิน 10 ปี"},{"key":"ค","text":"ไม่เกิน 15 ปี"},{"key":"ง","text":"ไม่เกิน 20 ปี"}],"answer":"ค","explanation":"โครงการสินเชื่อรักษ์ป่าไม้ไทยยั่งยืน กำหนดให้เงินกู้ที่เป็นค่าลงทุนในการปลูกไม้เศรษฐกิจ ต้องชำระคืนเสร็จ สิ้น ไม่เกิน 15 ปี นับแต่วันกู้เงิน (และมีเหตุพิเศษไม่เกิน 20 ปี)"},{"num":540,"q":"ตามข้อควรห้ามปฏิบัติจากการตรวจสอบของ ธปท. ข้อใดคือลักษณะของ \"การปฏิบัติงานที่ขาด Check and Balance\" ซึ่ง ถือเป็นข้อห้ามเด็ดขาด?","choices":[{"key":"ก","text":"การให้พนักงานการเงินทำหน้าที่โอนเงินข้ามเขต"},{"key":"ข","text":"การที่พนักงานคนเดียวกันทำหน้าที่การตลาด วิเคราะห์ และดำเนินพิธีการสินเชื่อ"},{"key":"ค","text":"การให้ผู้จัดการสาขาอนุมัติสินเชื่อโดยไม่อ้างอิงระบบ CBS"},{"key":"ง","text":"การไม่อัปเดตข้อมูล Credit Bureau ทุก 6 เดือน"}],"answer":"ข","explanation":"ข้อห้ามเด็ดขาดของ ธปท. (ข้อ 11) ระบุว่า การปฏิบัติงานที่ขาด Check and Balance คือ การที่พนักงานคน เดียวกันทำหน้าที่ทั้งการตลาด วิเคราะห์ และดำเนินพิธีการสินเชื่อ ซึ่งเสี่ยงต่อการทุจริตและผิดพลาด"},{"num":541,"q":"ตามกฎกระทรวง ฉบับที่ 374 (พ.ศ. 2564) ว่าด้วยการจำหน่ายหนี้สูญจากบัญชีลูกหนี้ ได้แก้ไขจำนวนหนี้ที่ต้องดำเนินการ ฟ้องร้องให้เสร็จสิ้นก่อนการจำหน่ายหนี้สูญ จากเดิม 500,000 บาท เป็นวงเงินเท่าใด?","choices":[{"key":"ก","text":"1,000,000 บาท"},{"key":"ข","text":"2,000,000 บาท"},{"key":"ค","text":"3,000,000 บาท"},{"key":"ง","text":"5,000,000 บาท"}],"answer":"ข","explanation":"กฎกระทรวง ฉบับที่ 374 (พ.ศ. 2564) แก้ไขจำนวนหนี้ที่ต้องดำเนินการก่อนจำหน่ายหนี้สูญ จากเดิม 500,000 บาท เป็น 2,000,000 บาท เพื่อผ่อนคลายหลักเกณฑ์ให้ดำเนินการได้สะดวดยิ่งขึ้น"},{"num":542,"q":"ตามข้อบังคับฉบับที่ 34 การจำหน่ายหนี้เงินกู้ออกจากบัญชีเป็น \"หนี้สูญ\" ของธนาคาร มีผลทางกฎหมายต่อตัวลูกหนี้ อย่างไร?","choices":[{"key":"ก","text":"หนี้ของลูกหนี้ระงับไปทันที ลูกหนี้ไม่ต้องชำระอีก"},{"key":"ข","text":"หนี้ยังไม่ระงับ และธนาคารยังสามารถเรียกเก็บเงินได้ แม้จะได้มีการฟ้องคดีแล้วหรือไม่ก็ตาม"},{"key":"ค","text":"หนี้ระงับเฉพาะดอกเบี้ย ส่วนต้นเงินธนาคารต้องฟ้องร้องเรียกคืน"},{"key":"ง","text":"ธนาคารจะเรียกเก็บหนี้ได้เฉพาะส่วนที่มีหลักประกันคุ้มมูลหนี้เท่านั้น"}],"answer":"ข","explanation":"ตามข้อบังคับฉบับที่ 34 การจำหน่ายหนี้สูญออกจากบัญชีเป็นเพียงการปรับลดยอดทางบัญชีเท่านั้น หนี้ยังไม่ ระงับ และธนาคารไม่สูญเสียสิทธิในการเรียกเก็บเงินจากลูกหนี้"},{"num":543,"q":"คณะกรรมการบริหารจัดการหนี้ \"ระดับธนาคาร (สำนักงานใหญ่)\" มีอำนาจพิจารณาจำหน่ายหนี้สูญ กรณีที่ \"ยังไม่ ดำเนินคดี\" จากต้นเงินรวมทุกบัญชีไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 500,000 บาท"},{"key":"ข","text":"ไม่เกิน 1 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ง","text":"มากกว่า 3 ล้านบาท"}],"answer":"ข","explanation":"อำนาจจำหน่ายหนี้สูญ (กรณีพิจารณาจากต้นเงินรวมทุกบัญชีและยังไม่ดำเนินคดี) ของคณะกรรมการบริหาร จัดการหนี้ระดับธนาคาร กำหนดไว้ที่ไม่เกิน 1 ล้านบาท"},{"num":544,"q":"อำนาจในการพิจารณาจำหน่ายหนี้สูญ กรณีที่ \"ดำเนินคดีแล้ว (บังคับคดีถึงที่สุดแล้ว)\" สำหรับต้นเงินไม่เกิน 10 ล้านบาท เป็นอำนาจของคณะกรรมการชุดใด?","choices":[{"key":"ก","text":"คณะกรรมการบริหารจัดการหนี้ระดับเขต"},{"key":"ข","text":"คณะกรรมการบริหารจัดการหนี้ระดับภาค"},{"key":"ค","text":"คณะกรรมการบริหารจัดการหนี้ระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ข","explanation":"อำนาจจำหน่ายหนี้สูญ (กรณีดำเนินคดีและบังคับคดีถึงที่สุดแล้ว) วงเงินไม่เกิน 10 ล้านบาท เป็นอำนาจของ คณะกรรมการบริหารจัดการหนี้ระดับภาค"},{"num":545,"q":"ลูกหนี้ที่มีสัญญาปรับปรุงโครงสร้างหนี้อยู่ในมาตรการอย่างยั่งยืน ระยะที่ 2 รหัส Market Code 2568 ต้องการเข้าร่วม โครงการ \"แก้หนี้เรื้อรัง หั่นดอกเบี้ย\" หากส่งชำระหนี้ดอกเบี้ยได้ตามเงื่อนไข จะได้รับสิทธิประโยชน์ใดทันที?","choices":[{"key":"ก","text":"ได้ลดดอกเบี้ยทันที โดยไม่ต้องชำระบัญชีรวมต้นเงินเสร็จสิ้น"},{"key":"ข","text":"ได้รับเงินคืน (Cashback) 10% ของยอดผ่อน"},{"key":"ค","text":"ได้ยกเลิกดอกเบี้ยปรับ (Late Charge) แต่ดอกเบี้ยคงค้างต้องจ่ายเต็ม"},{"key":"ง","text":"ไม่สามารถเข้าร่วมได้ เนื่องจากรหัส Market Code ไม่ตรงเงื่อนไข"}],"answer":"ก","explanation":"สิทธิประโยชน์หลักของโครงการ \"แก้หนี้เรื้อรัง หั่นดอกเบี้ย\" คือลูกหนี้จะได้ลดดอกเบี้ยทันทีตามเงื่อนไขที่ ธนาคารกำหนด โดยไม่ต้องรอชำระบัญชีรวมต้นเงินให้เสร็จสิ้นพร้อมกัน"},{"num":546,"q":"การรับรู้รายได้ดอกเบี้ย ของสัญญาปรับปรุงโครงสร้างหนี้ภายใต้ \"มาตรการปรับปรุงโครงสร้างหนี้ ขยายโอกาสและ เสริมสร้างศักยภาพลูกหนี้\" ธนาคารกำหนดให้ใช้เกณฑ์ทางบัญชีในข้อใด?","choices":[{"key":"ก","text":"เกณฑ์คงค้าง (Accrual Basis : AA)"},{"key":"ข","text":"เกณฑ์เงินสด (Non-Accrual Basis : NA)"},{"key":"ค","text":"เกณฑ์หลักปกติ (Normal Basis)"},{"key":"ง","text":"เกณฑ์ผสม (Hybrid Basis)"}],"answer":"ข","explanation":"ตามมาตรการปรับปรุงโครงสร้างหนี้ ขยายโอกาสและเสริมสร้างศักยภาพลูกหนี้ การรับรู้รายได้ดอกเบี้ยของ สัญญา ปปน. ใหม่ ธนาคารกำหนดให้ใช้เกณฑ์เงินสด (Non-Accrual Basis : NA)"},{"num":547,"q":"ตามนโยบายบัญชี ลูกหนี้ด้อยคุณภาพจะถูกจัดชั้นหนี้กลับเป็น \"ลูกหนี้จัดชั้นปกติ (ชั้น 1)\" ได้ในกรณีใด?","choices":[{"key":"ก","text":"ทันทีที่เซ็นสัญญาปรับปรุงโครงสร้างหนี้เสร็จ"},{"key":"ข","text":"เมื่อลูกหนี้ชำระเงินงวดแรกได้ครบถ้วน"},{"key":"ค","text":"เมื่อลูกหนี้สามารถปฏิบัติตามเงื่อนไขการปรับปรุงโครงสร้างหนี้ (NPLs Exit) ได้ตามเงื่อนไขที่กำหนด"},{"key":"ง","text":"เมื่อลูกหนี้นำหลักประกันใหม่มาจำนองเพิ่มเติม"}],"answer":"ค","explanation":"นโยบายบัญชีกำหนดให้ลูกหนี้ NPLs จะกลับเป็นหนี้ชั้นปกติ (ชั้น 1) ได้ ก็ต่อเมื่อลูกหนี้สามารถปฏิบัติตาม เงื่อนไข NPLs Exit (เช่น จ่ายครบ 1 งวด หรือ 3 งวดติดต่อกัน) ได้ตามที่กำหนดเท่านั้น"},{"num":548,"q":"สำหรับโครงการปรับปรุงโครงสร้างหนี้เฉพาะกิจ กรณี \"ชำระหนี้เสร็จสิ้น\" ลูกหนี้ประเภทที่ \"พบเหตุผิดปกติ\" จะได้รับ ส่วนลดดอกเบี้ยค้างรับสูงสุดเท่าใด?","choices":[{"key":"ก","text":"ลดร้อยละ 25"},{"key":"ข","text":"ลดร้อยละ 50"},{"key":"ค","text":"ลดร้อยละ 75"},{"key":"ง","text":"ลดร้อยละ 100"}],"answer":"ง","explanation":"มาตรการปรับปรุงโครงสร้างหนี้เฉพาะกิจ กรณีลูกค้าชำระหนี้เสร็จสิ้นและ \"พบเหตุผิดปกติ\" (เช่น ตาย, ชรา ภาพ, ประสบเหตุสุดวิสัย) ธนาคารจะพิจารณาลดดอกเบี้ยค้างรับให้สูงสุดร้อยละ 100"},{"num":549,"q":"จากข้อที่แล้ว สำหรับลูกหนี้ที่ \"ไม่พบเหตุผิดปกติ\" เมื่อชำระหนี้เสร็จสิ้นตามโครงการปรับปรุงโครงสร้างหนี้เฉพาะกิจ จะ ได้รับส่วนลดดอกเบี้ยค้างรับสูงสุดไม่เกินร้อยละเท่าใด?","choices":[{"key":"ก","text":"ลดร้อยละ 25"}],"answer":"ข","explanation":"หากลูกหนี้ \"ไม่พบเหตุผิดปกติ\" แต่ชำระหนี้เสร็จสิ้น ธนาคารจะพิจารณาลดดอกเบี้ยปรับค้างรับให้สูงสุดไม่เกิน ร้อยละ 50 ของดอกเบี้ยค้างรับ"},{"num":550,"q":"ลูกหนี้ที่ถูกจัดชั้นหนี้เป็น \"สงสัย\" หรือ \"สงสัยจะสูญ\" (ชั้น 4 หรือ ชั้น 5) เมื่อผ่านการทำสัญญาปรับปรุงโครงสร้างหนี้ (NPLs) แล้ว จะถูกปรับการจัดชั้นหนี้ใหม่เป็นกลุ่มใด?","choices":[{"key":"ก","text":"ปกติ (ชั้น 1)"},{"key":"ข","text":"กล่าวถึงเป็นพิเศษ (ชั้น 2)"},{"key":"ค","text":"ต่ำกว่ามาตรฐาน (ชั้น 3)"},{"key":"ง","text":"สงสัยจะสูญ (ชั้น 5)"}],"answer":"ค","explanation":"ตามเงื่อนไขการจัดชั้นหนี้หลังการทำ ปปน. ลูกหนี้ที่เคยอยู่ชั้น \"สงสัย\" หรือ \"สงสัยจะสูญ\" (ชั้น 4-5) เมื่อจัดทำ สัญญา ปปน. เสร็จสิ้น บัญชีใหม่จะถูกดึงกลับมาจัดเป็นหนี้ชั้น \"ต่ำกว่ามาตรฐาน (ชั้น 3)\" ทันที"},{"num":551,"q":"[กิ่ง 1: การรับลูกค้า] ในการประชุมกลุ่มลูกค้าเพื่อพิจารณารับลูกค้าเข้าสังกัดกลุ่ม จะต้องมีลูกค้าในกลุ่มมาประชุม จำนวนเท่าใด จึงจะถือว่าครบ \"องค์ประชุม\"?","choices":[{"key":"ก","text":"ไม่น้อยกว่ากึ่งหนึ่งของจำนวนลูกค้าทั้งหมด"},{"key":"ข","text":"เกินกว่ากึ่งหนึ่งของจำนวนลูกค้าทั้งหมด"},{"key":"ค","text":"ไม่น้อยกว่าสองในสามของจำนวนลูกค้าทั้งหมด"},{"key":"ง","text":"เกินกว่าสองในสามของจำนวนลูกค้าทั้งหมด"}],"answer":"ค","explanation":"ตามคู่มือปฏิบัติงานการรับลูกค้า องค์ประชุมของกลุ่มลูกค้าจะต้องมีลูกค้ามาประชุม \"ไม่น้อยกว่าสองใน สาม\" ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น"},{"num":552,"q":"[กิ่ง 3: การประเมินความเสี่ยง] หากพนักงานตรวจสอบพบว่าลูกหนี้มีพฤติกรรม \"ใช้เงินกู้ผิดวัตถุประสงค์\" ธนาคารจะ ดำเนินการจัดชั้นหนี้ของลูกค้ารายนี้ไว้ในชั้นใดทันที?","choices":[{"key":"ก","text":"หนี้ชั้น 2 (กล่าวถึงเป็นพิเศษ)"},{"key":"ข","text":"หนี้ชั้น 3 (ต่ำกว่ามาตรฐาน)"},{"key":"ค","text":"หนี้ชั้น 4 (สงสัย)"},{"key":"ง","text":"หนี้ชั้น 5 (สงสัยจะสูญ)"}],"answer":"ค","explanation":"หากพบว่าลูกหนี้ใช้เงินกู้ผิดวัตถุประสงค์ หรือประวิงเวลาชำระหนี้ ธนาคารจะจัดเป็น \"หนี้ชั้น 4 (สงสัย)\" พร้อมกันสำรอง 100% และรับรู้รายได้ด้วยเกณฑ์เงินสด (NA)"},{"num":553,"q":"[กิ่ง 4: อำนาจอนุมัติ] ตามตารางอำนาจพิจารณาอนุมัติสินเชื่อ สำหรับลูกค้า \"เกษตรกร\" (ตามข้อบังคับ ฉ.44) \"ผู้จัดการ สาขา (ผจข.)\" มีอำนาจอนุมัติวงเงินกู้รวมสูงสุดไม่เกินเท่าใดต่อราย?","choices":[{"key":"ก","text":"3 ล้านบาท"},{"key":"ข","text":"5 ล้านบาท"},{"key":"ค","text":"10 ล้านบาท"},{"key":"ง","text":"15 ล้านบาท"}],"answer":"ค","explanation":"ตามกรอบอำนาจอนุมัติรวม สำหรับลูกค้าเกษตรกร (ฉ.44) ผู้จัดการสาขา (ผจข.) มีอำนาจอนุมัติได้ ไม่เกิน 10 ล้านบาท"},{"num":554,"q":"[กิ่ง 5: พิธีการและหลักประกัน] ในการออกผลิตภัณฑ์หนังสือค้ำประกัน (LG) หากลูกค้าใช้ \"อสังหาริมทรัพย์\" เป็น หลักประกัน ธนาคารกำหนดเกณฑ์วงเงินค้ำประกันไว้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50% ของราคาประเมิน"},{"key":"ข","text":"ไม่เกิน 70% ของมูลค่าจำนอง"},{"key":"ค","text":"ไม่เกิน 95% ของมูลค่าจำนอง"},{"key":"ง","text":"ได้เต็ม 100% ของราคาประเมิน"}],"answer":"ข","explanation":"หลักเกณฑ์การกำหนดวงเงินหนังสือค้ำประกัน (LG) หากใช้เงินฝาก/สลาก จะค้ำได้ 100% แต่ถ้าใช้ อสังหาริมทรัพย์ จะค้ำได้ \"ไม่เกิน 70% ของมูลค่าจำนอง\""},{"num":555,"q":"[กิ่ง 6: การจัดการหนี้] [Case Study] นาง ญ เป็นเกษตรกร มีงวดชำระรายปี และได้รับเงื่อนไขทำ ปปน. \"ปลอดชำระต้น เงิน (Grace Period) 3 ปี\" ในงวดแรกนาง ญ ต้องชำระเงินอย่างไรจึงจะกลับมาจัดเป็นชั้น 1 (NPLs Exit) ได้?","choices":[{"key":"ก","text":"ไม่ต้องชำระใดๆ เลย เนื่องจากอยู่ในช่วงปลอดหนี้"},{"key":"ข","text":"ชำระเฉพาะดอกเบี้ย 75% ของยอดที่เรียกเก็บ"},{"key":"ค","text":"ชำระดอกเบี้ยให้ครบ 100% ของดอกเบี้ยที่ถึงกำหนด โดยต้องไม่มีบิลค้างชำระ"},{"key":"ง","text":"ชำระต้นเงิน 10% พร้อมดอกเบี้ย"}],"answer":"ค","explanation":"กรณีที่ลูกค้าได้เงื่อนไข \"ปลอดชำระต้นเงิน (Grace Period)\" การจะผ่านเกณฑ์ NPLs Exit กลับมาเป็นชั้น 1 ได้ ลูกค้าจะต้อง \"ชำระดอกเบี้ย 100% ของจำนวนดอกเบี้ยที่ถึงกำหนดชำระในงวดนั้นๆ\" โดยห้ามมีบิลค้าง"}];
let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
