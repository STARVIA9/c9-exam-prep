let score = { correct: 0, wrong: 0 };
let answered = new Set();

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  quizData.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q' + i;
    let optsHtml = '';
    q.opts.forEach((opt, j) => {
      const letter = ['ก','ข','ค','ง'][j];
      optsHtml += `<li class="opt-item" onclick="selectAnswer(${i},${j})" id="opt${i}_${j}">
        <span class="opt-letter">${letter}</span>
        <span>${opt}</span>
      </li>`;
    });
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">${i+1}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <ul class="opt-list">${optsHtml}</ul>
      <div class="explanation" id="exp${i}"><strong>💡 เฉลย:</strong> ${q.ref}</div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qi, oi) {
  if (answered.has(qi)) return;
  answered.add(qi);
  const q = quizData[qi];
  const card = document.getElementById('q' + qi);
  const exp = document.getElementById('exp' + qi);

  q.opts.forEach((_, j) => {
    const el = document.getElementById('opt' + qi + '_' + j);
    el.classList.add('disabled');
    if (j === q.ans) el.classList.add('show-correct');
  });

  if (oi === q.ans) {
    document.getElementById('opt' + qi + '_' + oi).classList.add('selected-correct');
    card.classList.add('answered-correct');
    score.correct++;
  } else {
    document.getElementById('opt' + qi + '_' + oi).classList.add('selected-wrong');
    card.classList.add('answered-wrong');
    score.wrong++;
  }
  exp.classList.add('show');
  updateScore();
}

function updateScore() {
  document.getElementById('scoreTotal').textContent = score.correct;
  document.getElementById('scoreCorrect').textContent = score.correct;
  document.getElementById('scoreWrong').textContent = score.wrong;
}

function resetQuiz() {
  score = { correct: 0, wrong: 0 };
  answered.clear();
  updateScore();
  renderQuiz();
}

renderQuiz();
</script>
