<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#d97706,#d97706dd);padding:24px 20px;text-align:center}
.header h1{font-size:1.4em;color:#fff;margin-bottom:8px}
.header p{color:rgba(255,255,255,.85);font-size:.95em}
.stats{display:flex;justify-content:center;gap:16px;padding:12px 20px;background:#1e293b}
.stat{text-align:center}
.stat .num{font-size:1.5em;font-weight:700;color:#d97706}
.stat .label{font-size:.8em;color:#94a3b8}
.controls{padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#d97706;color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid #d97706;color:#d97706}
.btn-outline:hover{background:#d9770622}
.progress-bar{height:4px;background:#334155;margin:0 20px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#d97706;transition:width .3s;width:0%}
.quiz-area{padding:20px;max-width:800px;margin:0 auto}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #d97706}
.q-num{color:#d97706;font-weight:700;font-size:.9em;margin-bottom:8px}
.q-text{font-size:1.05em;line-height:1.6;margin-bottom:12px}
.choice{padding:10px 14px;margin:6px 0;border-radius:8px;cursor:pointer;transition:all .2s;background:#334155;border:2px solid transparent}
.choice:hover{border-color:#d97706;background:#d9770622}
.choice.selected{border-color:#d97706;background:#d9770633}
.choice.correct{border-color:#22c55e;background:#22c55e22}
.choice.wrong{border-color:#ef4444;background:#ef444422}
.explanation{margin-top:12px;padding:12px;background:#0f172a;border-radius:8px;border-left:4px solid #22c55e;font-size:.9em;line-height:1.6;color:#94a3b8}
.explanation strong{color:#22c55e}
.choice .key{font-weight:700;color:#d97706;margin-right:8px}
.result-card{text-align:center;padding:40px 20px;display:none}
.result-card h2{font-size:1.8em;margin-bottom:12px}
.result-score{font-size:3em;font-weight:700;color:#d97706}
.result-text{font-size:1.1em;color:#94a3b8;margin:12px 0}
.footer{text-align:center;padding:20px;color:#64748b;font-size:.85em}
</style>
</head>

<script>
const questions=[{"num":251,"q":"ตามโครงสร้างอำนาจการพิจารณาอนุมัติสินเชื่อ สำหรับลูกค้า \"เกษตรกร และ บุคคลธรรมดา\" (ข้อบังคับ ฉ.44 และ ฉ.45) ในระดับผู้จัดการสาขา (ผจข.) หรือ ผอ.อส. จะมีอำนาจอนุมัติในเพดานวงเงินกู้รวมสูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 2 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 5 ล้านบาท"}],"answer":"ค","explanation":"สำหรับเกษตรกรและบุคคลธรรมดา อำนาจของสาขา (ผู้จัดการสาขา หรือ ผอ.อส.) จะจำกัดเพดานวงเงินกู้ รวมไว้ที่ ไม่เกิน 3 ล้านบาท ครับ หากเกินกว่านี้จะต้องส่งให้ระดับต้น (CC1) เป็นผู้อนุมัติต่อไป (CC1 เพดานไม่เกิน 10 ล้านบาท) [22, Artifact: ใครมีอำนาจเซ็นอนุมัติเงิน ธ.ก.ส.]"},{"num":252,"q":"หากลูกค้าผู้ประกอบการประเภท \"นิติบุคคล\" (ตามข้อบังคับ ฉ.45) ขอกู้เงินรวมทุกสัญญาเป็นวงเงิน \"40 ล้านบาท\" การอนุมัติสินเชื่อนี้จะตกอยู่ในอำนาจของคณะบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา"},{"key":"ข","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ค","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ค","explanation":"สำหรับลูกค้านิติบุคคลตามข้อบังคับ ฉ.45 อำนาจของคณะกรรมการระดับต้น (CC1) จะอนุมัติได้ไม่เกิน 10 ล้านบาท หากขอกู้ที่ 40 ล้านบาท จะตกไปอยู่ในอำนาจของ คณะกรรมการระดับกลาง (CC2) ซึ่งรับผิดชอบวงเงินของนิติ บุคคลที่ไม่เกิน 50 ล้านบาทครับ [22, Artifact: ใครมีอำนาจเซ็นอนุมัติเงิน ธ.ก.ส.]"},{"num":253,"q":"กองทุนหมู่บ้าน (กทบ.) ขอกู้เงินเพื่อเป็นทุนให้สมาชิกกู้ยืม โดยมีวงเงินกู้รวมทุกสัญญา \"15 ล้านบาท\" อำนาจการ พิจารณาอนุมัติจะตกอยู่ที่ระดับใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ข","explanation":"สำหรับกองทุนหมู่บ้าน (กทบ.) โครงสร้างอำนาจอนุมัติคือ: สาขา <= 3 ล้าน, ระดับต้น (CC1) <= 10 ล้าน, ระดับกลาง (CC2) <= 20 ล้าน, ระดับธนาคาร <= 25 ล้าน. ดังนั้น วงเงิน 15 ล้านบาท จึงอยู่ในอำนาจของ คณะกรรมการ ระดับกลาง (CC2) ครับ"},{"num":254,"q":"ตามระเบียบฉบับที่ 93 ว่าด้วยการให้สินเชื่อ ธนาคารได้มอบอำนาจให้ \"หัวหน้าหน่วยอำเภอ (หนภ.)\" สามารถอนุมัติ \"รายงานเบิกเงินกู้\" (สำหรับหนังสือกู้เงินเครดิตเงินสดและรับรองรับผิดอย่างลูกหนี้ร่วมกัน) ได้ ณ เวลาใดเวลาหนึ่งในวงเงิน รวมสูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 100,000 บาท"},{"key":"ข","text":"ไม่เกิน 200,000 บาท"},{"key":"ค","text":"ไม่เกิน 300,000 บาท"},{"key":"ง","text":"ไม่เกิน 500,000 บาท"}],"answer":"ข","explanation":"ตามระเบียบฉบับที่ 93 ข้อ 11 การอนุมัติรายงานเบิกเงินกู้เป็นอำนาจของ ผจข. หรือ ผช.ผจข. แต่ธนาคาร เปิดช่องให้ หัวหน้าหน่วยอำเภอ (หนภ.) สามารถอนุมัติรายงานเบิกเงินกู้เครดิตเงินสดได้ รวมกันไม่เกิน 200,000 บาท เพื่อความคล่องตัวของสาขาครับ [30, Artifact: ตรายางแผ่นเดียวสูญเงินร้อยล้าน]"},{"num":255,"q":"ในการอนุมัติโครงการสินเชื่อนโยบายรัฐ คณะอนุกรรมการบริหารจัดการเงินกู้ (อบก.) \"ส่วนอำเภอ\" มีอำนาจพิจารณา อนุมัติวงเงินให้ลูกค้าแต่ละรายได้สูงสุดไม่เกินวงเงินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 100,000 บาท"},{"key":"ข","text":"ไม่เกิน 200,000 บาท"},{"key":"ค","text":"ไม่เกิน 300,000 บาท"},{"key":"ง","text":"ไม่เกิน 500,000 บาท"}],"answer":"ค","explanation":"ในกรณีสินเชื่อนโยบายรัฐที่มอบอำนาจให้คณะอนุกรรมการบริหารจัดการเงินกู้ (อบก.) เป็นผู้พิจารณา อบก. ส่วนอำเภอ จะมีอำนาจอนุมัติได้รายละ ไม่เกิน 300,000 บาท (หากเป็น อบก.ส่วนจังหวัด จะอนุมัติได้เกิน 300,000 - 2,500,000 บาท)"},{"num":256,"q":"ระเบียบฉบับที่ 93 กำหนดว่า \"การลงนามในหนังสือสัญญากู้เงิน\" ที่ธนาคารได้อนุมัติไว้แล้ว ให้อยู่ในอำนาจของ ผู้จัดการสาขา หากผู้จัดการสาขาต้องการให้ \"ผู้ช่วยผู้จัดการสาขา\" เป็นผู้ลงนามแทน จะต้องดำเนินการตามข้อใดจึงจะถูกต้อง ตามระเบียบ?","choices":[{"key":"ก","text":"ผู้ช่วยผู้จัดการสาขาสามารถดำเนินการแทนได้ทันทีโดยตำแหน่ง"},{"key":"ข","text":"ต้องได้รับความเห็นชอบจากผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) ก่อน"},{"key":"ค","text":"ต้องจัดทำหนังสือมอบหมายหน้าที่ให้เป็นลายลักษณ์อักษร"},{"key":"ง","text":"ไม่สามารถมอบอำนาจให้ผู้ช่วยผู้จัดการสาขาทำการแทนได้ในทุกกรณี"}],"answer":"ค","explanation":"ตามระเบียบ 93 ข้อ 10 ผู้มีอำนาจลงนามในหนังสือสัญญาคือผู้จัดการสาขา หากต้องการให้ผู้ช่วยผู้จัดการ สาขาทำการแทน จะต้อง \"มอบหมายหน้าที่ให้เป็นลายลักษณ์อักษร\" เสมอครับ"},{"num":257,"q":"[Case Study] การพิจารณาอำนาจอนุมัติของกลุ่มสหกรณ์ หากสหกรณ์การเกษตรแห่งหนึ่งขอกู้เงินตามข้อบังคับ ฉ.31 ข้อ 2(2) เพื่อเป็น \"ทุนขายผลผลิต\" ในวงเงิน \"80 ล้านบาท\" อำนาจการอนุมัติวงเงินนี้จะเป็นของระดับใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการระดับธนาคาร"},{"key":"ง","text":"คณะกรรมการธนาคาร (Board)"}],"answer":"ค","explanation":"ตาม Case Study อำนาจอนุมัติของสถาบันเกษตรกร การกู้เงินเป็น \"ทุนขายผลผลิต\" ตามฉบับที่ 31 ข้อ 2(2) ใน วงเงิน 80 ล้านบาท จะเกินเพดานของ CC2 (CC2 อนุมัติได้ไม่เกิน 60 ล้านบาท) จึงตกเป็นอำนาจของ คณะกรรมการระดับ ธนาคาร (ซึ่งมีเพดานอนุมัติได้ไม่เกิน 100 ล้านบาท)"},{"num":258,"q":"[Case Study] จากข้อที่แล้ว หากพิจารณาถึง \"วงเงินกู้รวม (Total Exposure)\" ของสหกรณ์ดังกล่าว ซึ่งมีหนี้เงินกู้ ฉ.26 จำนวน 60 ลบ., ฉ.31 ข้อ 2(1) จำนวน 450 ลบ., ฉ.31 ข้อ 2(2) จำนวน 80 ลบ. และ ฉ.31 ข้อ 2(3) จำนวน 60 ลบ. คิดเป็น วงเงินกู้รวมทั้งสิ้น \"650 ล้านบาท\" การพิจารณาอนุมัติภาพรวมจะอยู่ในอำนาจของระดับใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ข","text":"คณะกรรมการระดับธนาคาร"},{"key":"ค","text":"คณะอนุกรรมการกลั่นกรอง"},{"key":"ง","text":"คณะกรรมการธนาคาร (Board)"}],"answer":"ข","explanation":"แม้วงเงินกู้รวมของสหกรณ์จะสูงลิ่วถึง 650 ล้านบาท แต่ตามหลักเกณฑ์การกำกับ Total Exposure ของสถาบัน เกษตรกร วงเงินกู้รวมที่ 650 ลบ. จะยังคงถูกสรุปภาพรวมและพิจารณาโดย คณะกรรมการระดับธนาคาร ครับ"},{"num":259,"q":"ตามระเบียบฉบับที่ 93 ธนาคารกำหนดว่า \"อัตราส่วนขั้นต่ำการลงทุนของผู้กู้ ต้องไม่น้อยกว่าร้อยละ 20 ของค่า ลงทุน\" หากโครงการของลูกค้ามีเหตุจำเป็นที่มีเงินลงทุน \"น้อยกว่าร้อยละ 20\" อำนาจในการอนุมัติผ่อนผันสามารถเริ่มต้นได้ที่ บุคคลในระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา"},{"key":"ข","text":"ผู้อำนวยการ/ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"},{"key":"ง","text":"ผู้บริหารระดับรองผู้จัดการขึ้นไป"}],"answer":"ข","explanation":"หากลูกค้ามีเงินลงทุนสมทบในโครงการ \"น้อยกว่าร้อยละ 20\" ระเบียบกำหนดให้ต้องขออนุมัติผ่อนผัน โดยผู้มี อำนาจเริ่มต้นที่ระดับจังหวัด คือ ผู้อำนวยการ หรือผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.), ผอ.ฝ่าย กิจการสาขาภาค, หรือระดับสายงานขึ้นไปครับ"},{"num":260,"q":"ตามระเบียบฉบับที่ 93 ข้อ 12 ในการ \"ตรวจงานตามแผนงานหรือโครงการที่ใช้เงินกู้ของผู้กู้\" บุคคลใดต่อไปนี้ที่ \"ไม่มี\" อำนาจหรือสิทธิในการดำเนินการแทนธนาคาร หากไม่ได้รับมอบหมายเป็นกรณีพิเศษ?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"พนักงานพัฒนาธุรกิจ ระดับ 4-7"},{"key":"ง","text":"พนักงานการเงิน (การเงินสาขา) ระดับ 4-7"}],"answer":"ง","explanation":"ผู้มีอำนาจในการออก \"ตรวจงานตามแผนงานหรือโครงการที่ใช้เงินกู้ของผู้กู้\" ตามระเบียบ 93 ข้อ 12 ได้แก่ ผู้จัดการสาขา, ผู้ช่วยผู้จัดการสาขา, หัวหน้าหน่วยอำเภอ และพนักงานพัฒนาธุรกิจระดับ 4-7. ส่วน พนักงานการเงิน ไม่มี หน้าที่ในส่วนนี้ครับ"},{"num":261,"q":"บริษัทแห่งหนึ่ง (นิติบุคคล ตามข้อบังคับ ฉ.45) ขอกู้เงินเพื่อขยายกิจการรวมวงเงินกู้ทั้งสิ้น \"45 ล้านบาท\" อำนาจการ พิจารณาอนุมัติวงเงินกู้ในครั้งนี้จะตกอยู่ที่คณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"}],"answer":"ข","explanation":"สำหรับลูกค้าผู้ประกอบการประเภท \"นิติบุคคล\" ตามข้อบังคับ ฉ.45 คณะกรรมการระดับต้น (CC1) มีอำนาจ ไม่เกิน 10 ล้านบาท ส่วน คณะกรรมการระดับกลาง (CC2) มีเพดานอำนาจอนุมัติวงเงินกู้รวมอยู่ที่ \"ไม่เกิน 50 ล้านบาท\" ดังนั้นวงเงิน 45 ล้านบาทจึงอยู่ในอำนาจของ CC2 ครับ"},{"num":262,"q":"กองทุนหมู่บ้าน (กทบ.) ยื่นขอกู้เงินรวมเป็นวงเงิน \"40 ล้านบาท\" เพื่อนำไปเป็นทุนให้สมาชิกกู้ยืมต่อ การพิจารณา อนุมัติวงเงินดังกล่าวเป็นอำนาจของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"}],"answer":"ค","explanation":"สำหรับกองทุนหมู่บ้าน (กทบ.) ตาม ฉ.45 โครงสร้างเพดานวงเงินคือ CC1 ไม่เกิน 10 ล้านบาท / CC2 ไม่เกิน 25 ล้านบาท / และ คณะกรรมการระดับธนาคาร มีอำนาจไม่เกิน 50 ล้านบาท ดังนั้นวงเงิน 40 ล้านบาท จึงต้องส่งให้ ระดับธนาคารเป็นผู้อนุมัติครับ"},{"num":263,"q":"[Case Study] สหกรณ์การเกษตรแห่งหนึ่ง ต้องการขอกู้เงินเพื่อเป็น \"ทุนจัดหาวัสดุมาจำหน่าย\" (ตามข้อบังคับ ฉ.31 ข้อ 2(2)) ในวงเงิน \"61 ล้านบาท\" การอนุมัติวงเงินกู้ในครั้งนี้จะอยู่ในอำนาจของระดับใด?","choices":[{"key":"ก","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ง","explanation":"กรณีสหกรณ์การเกษตรขอกู้เพื่อ \"ทุนจัดหาวัสดุมาจำหน่าย\" (ฉ.31 ข้อ 2(2)) อำนาจของคณะกรรมการ ระดับกลาง (CC2) จะถูกจำกัดเพดานไว้ที่ ไม่เกิน 9 เท่าแห่งทุน และ \"ไม่เกิน 60 ล้านบาท\" เมื่อสหกรณ์ขอกู้ถึง 61 ล้านบาท อำนาจจึงขยับขึ้นไปอยู่ที่ คณะกรรมการระดับธนาคาร ทันทีครับ"},{"num":264,"q":"ในการคำนวณวงเงินกู้รวม (Total Group Exposure) เพื่อหาว่าใครคือผู้มีอำนาจอนุมัติ หากลูกค้ามีสัญญากู้เดิมประเภท \"เบิกเงินเกินบัญชี (O/D)\" ซึ่งได้รับอนุมัติวงเงินไว้ 10 ล้านบาท แต่ปัจจุบันเบิกใช้ไปเพียง 4 ล้านบาท พนักงานจะต้องนำตัวเลข ใดมาคำนวณเป็นภาระหนี้เดิม?","choices":[{"key":"ก","text":"4 ล้านบาท (ตามยอดหนี้คงเหลือที่เบิกไปใช้จริง)"},{"key":"ข","text":"6 ล้านบาท (วงเงินส่วนที่เหลือ)"},{"key":"ค","text":"10 ล้านบาท (ตามวงเงินกู้ที่ธนาคารอนุมัติไว้)"},{"key":"ง","text":"14 ล้านบาท (วงเงินอนุมัติรวมกับยอดหนี้คงเหลือ)"}],"answer":"ค","explanation":"ตามหลักเกณฑ์การคิดรวมวงเงินกู้ (Total Group Exposure) หากเป็นหนี้ที่ยังไม่ได้เบิกรับหรือเบิกรับเงินกู้เพียง บางส่วน (เช่น O/D) ธนาคารกำหนดให้ \"ใช้วงเงินกู้ที่ธนาคารอนุมัติไว้ (หน้าตั๋ว) มาคิดคำนวณ\" ความเสี่ยงเต็มจำนวนครับ ในเคสนี้คือ 10 ล้านบาท"},{"num":265,"q":"สหกรณ์การเกษตรขอกู้เงินประเภท Two Step Loan เพื่อเป็นทุนให้สมาชิกกู้ยืมต่อ หากตรวจสอบพบว่า \"ประธาน กรรมการของสหกรณ์\" มีภาระหนี้ส่วนตัวกับธนาคารอยู่ 2 ล้านบาท ตามหลักเกณฑ์การรวมกลุ่ม (SLL) ธนาคารจะนับรวม ภาระหนี้ของประธานท่านนี้เข้ากับสหกรณ์เพื่อหาอำนาจอนุมัติหรือไม่?","choices":[{"key":"ก","text":"นับรวมทันที เพื่อป้องกันความเสี่ยงจากการกระจุกตัว"},{"key":"ข","text":"นับรวมเพียงกึ่งหนึ่ง (1 ล้านบาท) เนื่องจากเป็นภาระหนี้ส่วนตัว"},{"key":"ค","text":"ไม่นับรวมภาระหนี้ส่วนตัวของคณะกรรมการเข้ากับวงเงินกู้ Two Step Loan เด็ดขาดในทุกกรณี"},{"key":"ง","text":"ไม่นับรวมภาระหนี้ส่วนตัวของคณะกรรมการ ยกเว้นจะพบข้อบ่งชี้ว่ามี Chain ธุรกิจเชื่อมโยงกัน จึงจะให้นับรวม"}],"answer":"ง","explanation":"หลักเกณฑ์การประเมิน SLL (Affiliation) สำหรับกลุ่มสถาบันการเกษตรที่มีวัตถุประสงค์กู้ไป \"ให้สมาชิกกู้ยืมต่อ (Two Step Loan)\" ธนาคารมีเกณฑ์ผ่อนปรนให้ \"ไม่นำภาระหนี้ส่วนตัวของคณะกรรมการมานับรวม\" เข้ากับสหกรณ์ \"เว้น แต่จะพบข้อบ่งชี้ว่าหนี้ส่วนตัวของกรรมการมี Chain ธุรกิจที่เชื่อมโยงกัน\" จึงจะถูกนำมารวมครับ"},{"num":266,"q":"นายสมชาย เป็นลูกค้ารายใหญ่ประเภทเกษตรกร (ตามข้อบังคับ ฉ.44) มีความประสงค์จะขอกู้เงินรวมทุกสัญญาเป็น จำนวน \"120 ล้านบาท\" อำนาจการพิจารณาอนุมัติโครงการนี้จะตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"}],"answer":"ง","explanation":"สำหรับลูกค้าเกษตรกร (ฉ.44) คณะกรรมการระดับธนาคารจะสิ้นสุดเพดานวงเงินกู้รวมที่ 100 ล้านบาท หาก มีการขอกู้รวมทะลุ 100 ล้านบาทขึ้นไป อำนาจการอนุมัติจะตกเป็นของ คณะอนุกรรมการกลั่นกรอง หรือ คณะกรรมการ ธนาคาร (Board) ครับ"},{"num":267,"q":"โครงการขอกู้เงินของลูกค้ามีวงเงินลงทุนรวม 10 ล้านบาท แต่ลูกค้ามีเงินทุนสมทบของตนเองเพียง 1 ล้านบาท (คิด เป็น 10% ซึ่งต่ำกว่าเกณฑ์มาตรฐานที่ธนาคารกำหนดไว้ร้อยละ 20) หากต้องการขอผ่อนผัน \"อัตราส่วนขั้นต่ำแห่งการลงทุน\" อำนาจการอนุมัติจะเริ่มต้นที่บุคคลระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ข","explanation":"ระเบียบฉบับที่ 93 ข้อ 7 กำหนดให้ลูกค้าต้องมีเงินลงทุนสมทบขั้นต่ำร้อยละ 20 หากน้อยกว่าเกณฑ์นี้ อำนาจ อนุมัติผ่อนผันจะเริ่มต้นที่ระดับ ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.), ระดับ ภาค, หรือสำนักธุรกิจสินเชื่อรายใหญ่ ตามลำดับครับ"},{"num":268,"q":"ตามกำหนดระยะเวลาการปฏิบัติงาน (SLA) สำหรับการพิจารณาอนุมัติสินเชื่อลูกค้ารายใหญ่ หากโครงการนั้นอยู่ใน อำนาจอนุมัติของ \"คณะกรรมการระดับกลาง (CC2)\" ระบบกำหนดให้ใช้ระยะเวลาดำเนินการรวมทั้งสิ้น (SLA) สูงสุดไม่เกินกี่วัน ทำการ?","choices":[{"key":"ก","text":"15 วันทำการ"},{"key":"ข","text":"22 วันทำการ"},{"key":"ค","text":"30 วันทำการ"},{"key":"ง","text":"35 วันทำการ"}],"answer":"ข","explanation":"ตามกำหนดระยะเวลาการปฏิบัติงาน (SLA) ของสินเชื่อลูกค้ารายใหญ่ หากเป็นอำนาจของ คณะกรรมการ ระดับกลาง (CC2) ให้ใช้เวลาดำเนินการรวม \"22 วันทำการ\" (แบ่งเป็น ผู้ทำหน้าที่วิเคราะห์ 10 วัน + ผู้ทำหน้าที่ กลั่นกรอง 5 วัน + ผู้อนุมัติสินเชื่อ 7 วัน)"},{"num":269,"q":"บริษัทส่งออกสินค้าเกษตรแห่งหนึ่ง (นิติบุคคล) ขอกู้เงินเพื่อการค้าระหว่างประเทศ (Trade Finance ตามข้อบังคับ ฉ.60) วงเงินรวม \"150 ล้านบาท\" อำนาจการพิจารณาอนุมัติจะตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"}],"answer":"ค","explanation":"สำหรับผลิตภัณฑ์สินเชื่อการค้าระหว่างประเทศ (Trade Finance ฉ.60) ของกลุ่มลูกค้านิติบุคคล อำนาจของ คณะกรรมการระดับกลาง (CC2) อนุมัติได้ไม่เกิน 100 ล้านบาท หากขอกู้ที่ 150 ล้านบาท จะตกเป็นอำนาจของ คณะกรรมการระดับธนาคาร (เพดานไม่เกิน 200 ล้านบาท) ครับ"},{"num":270,"q":"จากโครงสร้างอำนาจอนุมัติ หากลูกค้าประเภท \"องค์กร\" (ตามข้อบังคับ ฉ.45) ขอกู้เงินเพื่อนำไปดำเนินงาน คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อ \"ระดับธนาคาร\" มีเพดานอำนาจอนุมัติวงเงินกู้ให้กับลูกค้ารายนี้ได้สูงสุดไม่เกิน เท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 80 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 100 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 200 ล้านบาท"}],"answer":"ง","explanation":"ตามโครงสร้างอำนาจอนุมัติสำหรับลูกค้าประเภท \"องค์กร\" (ตามข้อบังคับ ฉ.45) รวมถึงวงเงินแบบ O/D ของ องค์กร คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อ ระดับธนาคาร จะมีเพดานอนุมัติได้สูงสุด \"ไม่เกิน 200 ล้านบาท\" ครับ"},{"num":271,"q":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับสาขา (ผู้จัดการสาขา) มีอำนาจพิจารณาอนุมัติสินเชื่อให้แก่ลูกค้า \"เกษตรกร (ฉ.44) และบุคคลธรรมดา (ฉ.45)\" วงเงินกู้รวมสูงสุดไม่เกินเท่าใดต่อราย?","choices":[{"key":"ก","text":"ไม่เกิน 1 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 15 ล้านบาท"}],"answer":"ข","explanation":"อำนาจอนุมัติระดับสาขา สำหรับกลุ่มเกษตรกรและบุคคลธรรมดา จะดูแลวงเงินกู้รวมสูงสุด \"ไม่เกิน 3 ล้าน บาท\" ต่อรายครับ"},{"num":272,"q":"ตามระเบียบฉบับที่ 93 \"หัวหน้าหน่วยอำเภอ (หนภ.)\" ได้รับมอบอำนาจให้อนุมัติ \"รายงานเบิกเงินกู้\" (Disbursement) ตามหนังสือกู้เงินเครดิตเงินสด ได้ในวงเงินรวม ณ เวลาใดเวลาหนึ่งไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50,000 บาท"},{"key":"ข","text":"ไม่เกิน 100,000 บาท"},{"key":"ค","text":"ไม่เกิน 200,000 บาท"},{"key":"ง","text":"ไม่เกิน 500,000 บาท"}],"answer":"ค","explanation":"ตามระเบียบ 93 หัวหน้าหน่วยอำเภอ (หนภ.) ได้รับมอบอำนาจเฉพาะการอนุมัติรายงานเบิกเงินกู้ \"เครดิตเงิน สด\" ในวงเงินรวม ณ เวลาใดเวลาหนึ่ง \"ไม่เกิน 200,000 บาท\" เท่านั้น"},{"num":273,"q":"ผู้มีอำนาจในการ \"ลงนามในหนังสือสัญญากู้เงิน\" ที่ธนาคารได้อนุมัติไว้แล้ว คือบุคคลในข้อใด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขาที่ได้รับมอบหมายเป็นลายลักษณ์อักษร"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด"}],"answer":"ค","explanation":"อำนาจการลงนามในหนังสือสัญญากู้เงินที่อนุมัติแล้ว เป็นของ \"ผู้จัดการสาขา (ผจข.)\" โดยสามารถมอบหมาย ให้ ผช.ผจข. ดำเนินการแทนได้ (ต้องมอบหมายเป็นลายลักษณ์อักษร)"},{"num":274,"q":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อ \"ระดับต้น (CC1)\" มีอำนาจพิจารณาอนุมัติสินเชื่อสำหรับกลุ่ม \"ผู้ประกอบการ (นิติบุคคล)\" ในวงเงินกู้รวมสูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 30 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 100 ล้านบาท"}],"answer":"ก","explanation":"คำตอบที่ถูกต้องคือ ก เนื่องจาก ไม่เกิน 5 ล้านบาท"},{"num":275,"q":"ตามระเบียบฉบับที่ 93 ว่าด้วยการให้สินเชื่อ การอนุมัติให้ \"ออกหนังสือรับรองวงเงินสินเชื่อ\" และ \"ลงนามในหนังสือ รับรองวงเงินสินเชื่อ\" เป็นอำนาจของบุคคลใด?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด"}],"answer":"ค","explanation":"ตามระเบียบ 93 ข้อ 13 การอนุมัติให้ออกหนังสือรับรองวงเงินสินเชื่อ และการลงนามในหนังสือรับรองฯ เป็น อำนาจของ \"ผู้จัดการสาขา (ผจข.)\" ครับ"},{"num":276,"q":"ตามตารางอำนาจการดำเนินการหลังการให้กู้ (ระเบียบ 83) การพิจารณาอนุมัติให้ลูกค้าเกษตรกร (ฉ.44) \"เปลี่ยนแปลงวัตถุประสงค์\" การใช้เงินกู้ เป็นอำนาจการพิจารณาเริ่มต้นที่บุคคลใด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"}],"answer":"ข","explanation":"ตามตารางอำนาจหลังการให้กู้ (ระเบียบ 83 ข้อ 4) อำนาจพิจารณาเปลี่ยนแปลงวัตถุประสงค์เงินกู้ของ เกษตรกร เริ่มต้นที่ \"ผู้จัดการสาขา (ผจข.)\""},{"num":277,"q":"การพิจารณาอนุมัติให้ \"กองทุนหมู่บ้าน (กทบ.)\" กู้เงินในวงเงินที่ \"เกินกว่า 50 ล้านบาทขึ้นไป\" จะตกเป็นอำนาจการ พิจารณาของคณะกรรมการชุดใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"}],"answer":"ง","explanation":"วงเงินกองทุนหมู่บ้านที่กู้เกิน 50 ล้านบาท ถือเป็นวงเงินขนาดใหญ่ระดับ Super Size อำนาจจึงตกเป็นของ คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"},{"num":278,"q":"ธนาคารกำหนดอัตราส่วนขั้นต่ำแห่งการลงทุนของผู้กู้ไว้ไม่น้อยกว่าร้อยละ 20 หากพบว่าลูกค้ารายนี้มีเงินทุน \"น้อย กว่าร้อยละ 20\" อำนาจในการอนุมัติผ่อนปรนเกณฑ์นี้ \"ไม่ได้\" อยู่ในอำนาจของใคร?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด"},{"key":"ค","text":"ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการฝ่ายกิจการสาขาภาค"},{"key":"ง","text":"ผู้ช่วยผู้จัดการสายงานบริหารงานสินเชื่อและกิจการสาขาภาค"}],"answer":"ก","explanation":"หากทุนของผู้กู้น้อยกว่าร้อยละ 20 ของค่าลงทุน \"ผู้จัดการสาขา (ผจข.) จะไม่มีอำนาจอนุมัติ\" โดยอำนาจจะ ถูกยกขึ้นไปที่ระดับ ผอจ., ผอ.ฝ่าย หรือระดับบริหารสายงานแทนครับ"},{"num":279,"q":"การพิจารณาอนุมัติ \"ผัดชำระเงินรายงวด หรือ ขยายเวลาชำระหนี้\" (ระเบียบ 83) สำหรับลูกค้ากลุ่มผู้ประกอบการ / กองทุนหมู่บ้าน / องค์กร (ฉ.45) ผู้มีอำนาจอนุมัติระดับแรกสุดคือใคร?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"}],"answer":"ข","explanation":"ตามตารางอำนาจระเบียบ 83 ข้อ 6 การอนุมัติผัดชำระหรือขยายเวลาหนี้ของกลุ่มผู้ประกอบการ/กทบ./ องค์กร อำนาจระดับแรกสุดเริ่มต้นที่ \"ผู้จัดการสาขา (ผจข.)\""},{"num":280,"q":"ตามระเบียบ 83 การพิจารณาทำ \"สัญญายินยอมให้บุคคลอื่นรับใช้หนี้เงินกู้\" สำหรับลูกค้า \"เกษตรกร\" (ฉ.44) ผู้มี อำนาจอนุมัติในระดับแรกสุดคือใคร?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด"}],"answer":"ข","explanation":"ตามตารางอำนาจระเบียบ 83 ข้อ 4 สำหรับการทำสัญญายินยอมให้รับใช้หนี้ของ \"เกษตรกร\" อำนาจระดับ แรกสุดที่ทำได้คือ \"หัวหน้าหน่วยอำเภอ (หนภ.)\" ครับ"},{"num":281,"q":"[Case Study] นิติบุคคล A และ นิติบุคคล B เป็นลูกค้ากลุ่มเดียวกัน (Affiliation) มีภาระหนี้เดิมรวมกัน (Total Group Exposure) อยู่ที่ 70.80 ล้านบาท หากวันนี้นิติบุคคล B ประสงค์ขอสินเชื่อตั๋วสัญญาใช้เงิน (P/N) เพิ่มอีก 800,000 บาท การ พิจารณาอนุมัติวงเงินกู้รวมในครั้งนี้ จะตกเป็นอำนาจของคณะบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ง","explanation":"การคำนวณ Total Group Exposure คือ 70.80 ล้านบาท + 0.80 ล้านบาท = 71.60 ล้านบาท. ตามโครงสร้าง อำนาจอนุมัติของลูกค้านิติบุคคล (ฉ.45) คณะกรรมการระดับกลาง (CC2) มีเพดานอนุมัติได้ \"ไม่เกิน 50 ล้านบาท\" ดังนั้น วงเงินกู้รวมที่ 71.60 ล้านบาท จึงทะลุเพดาน CC2 และตกเป็นอำนาจของ \"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อ ระดับธนาคาร\" (ซึ่งมีเพดานไม่เกิน 200 ล้านบาท) ครับ"},{"num":282,"q":"ในการพิจารณาให้สินเชื่อแก่ลูกค้ากลุ่ม \"นิติบุคคล (บริษัทจำกัด/ห้างหุ้นส่วนจำกัด)\" ธนาคารมีข้อพึงระวังและกฎเหล็ก เกี่ยวกับการสืบค้นข้อมูลเครดิต (Credit Bureau) ของบุคคลที่เกี่ยวข้องอย่างไร?","choices":[{"key":"ก","text":"ต้องสืบค้นข้อมูลเครดิตของกรรมการและผู้ถือหุ้นทุกคนผ่านระบบงานของธนาคาร"},{"key":"ข","text":"ห้ามสืบค้นข้อมูลเครดิตของผู้ที่เกี่ยวข้อง เช่น กรรมการ/ผู้ถือหุ้น ผ่านระบบงานของธนาคารอย่างเด็ดขาด"},{"key":"ค","text":"สืบค้นได้เฉพาะผู้รับมอบอำนาจที่มาทำธุรกรรมแทนบริษัทเท่านั้น"},{"key":"ง","text":"ไม่จำเป็นต้องสืบค้นข้อมูลเครดิตใดๆ เลย หากนิติบุคคลนั้นมีกำไรติดต่อกัน 3 ปี"}],"answer":"ข","explanation":"กฎเหล็กในการตรวจสอบข้อมูลเครดิตบูโร (Bureau Screening) ระบุชัดเจนว่า สำหรับลูกค้านิติบุคคล ธนาคารจะ เช็กเฉพาะเครดิตของนิติบุคคลนั้น \"ห้ามพนักงานดำเนินการสืบค้นข้อมูลเครดิตของบุคคลที่เกี่ยวข้อง เช่น กรรมการ ผู้ถือหุ้น หรือผู้รับมอบอำนาจ ผ่านระบบงานของธนาคารอย่างเด็ดขาด\" (หากต้องการข้อมูล ให้ลูกค้าไปขอผ่านช่องทาง NCB ด้วย ตนเองครับ)"},{"num":283,"q":"บริษัท ส่งออกไทย จำกัด (นิติบุคคล ตามข้อบังคับ ฉ.45) ขอกู้สินเชื่อประเภท \"เบิกเงินเกินบัญชี (O/D)\" เป็นวงเงิน 45 ล้านบาท อำนาจการอนุมัติสินเชื่อในวงเงินนี้ตกเป็นของใคร?","choices":[{"key":"ก","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก ข้อบังคับ ฉบับที่ 56"},{"num":284,"q":"ธุรกิจส่งออกผลไม้แห่งหนึ่ง (ลูกค้านิติบุคคล) มีความประสงค์ขอกู้สินเชื่อ \"เพื่อการค้าระหว่างประเทศ (Trade Finance ตาม ฉ.60)\" เป็นวงเงิน 90 ล้านบาท อำนาจการอนุมัติโครงการนี้ตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ข","explanation":"สำหรับสินเชื่อเพื่อการค้าระหว่างประเทศ (Trade Finance ฉ.60) ของนิติบุคคล เพดานการอนุมัติของ คณะกรรมการระดับกลาง (CC2) คือ \"ไม่เกิน 100 ล้านบาท\" ครับ (หากเกิน 100 ล้าน แต่ไม่เกิน 200 ล้าน จะเป็นของระดับ ธนาคาร)"},{"num":285,"q":"ตามหลักเกณฑ์มาตรฐาน (UWS) กรณีใดต่อไปนี้ที่ธนาคารสามารถ \"ผ่อนปรน (Override)\" ให้พิจารณาสินเชื่อได้ แม้ลูกค้า จะเคยมีประวัติค้างชำระหนี้กับธนาคารจนตกอยู่ในสถานะเฝ้าระวัง?","choices":[{"key":"ก","text":"ลูกค้าที่มีหนี้ NPL ของธนาคาร ที่ได้เสนอขอปรับปรุงโครงสร้างหนี้แล้ว และต้องการขอสินเชื่อฟื้นฟูในการประกอบอาชีพ"},{"key":"ข","text":"ลูกค้าที่กู้เงินเพื่อนำไป Refinance หนี้บัตรเครดิตเกิน 3 ใบ"},{"key":"ค","text":"ลูกค้าที่มีหลักประกันเป็นที่ดินตาบอดแต่มีราคาประเมินสูงกว่าวงเงินกู้"},{"key":"ง","text":"ลูกค้าที่เป็นข้าราชการระดับสูง"}],"answer":"ก","explanation":"ข้อยกเว้นที่ธนาคารอนุญาตให้สามารถพิจารณา \"ผ่อนปรน\" มาตรฐาน Bureau Screening ได้ คือ \"กรณีเป็น ลูกค้าที่มีหนี้ NPL ของธนาคาร และได้เสนอขอปรับปรุงโครงสร้างหนี้เรียบร้อยแล้ว และต้องการขอสินเชื่อฟื้นฟูในการประกอบ อาชีพ\" หรือลูกค้าเก่าที่ชำระหนี้เสร็จสิ้นและต้องการประกอบอาชีพต่อครับ"},{"num":286,"q":"[Case Study] สหกรณ์การเกษตรขอกู้เงินตามข้อบังคับ ฉ.31 ข้อ 2(1) \"เพื่อเป็นทุนให้กู้ยืมแก่สมาชิก\" คณะกรรมการ ระดับกลาง (CC2) จะมีเพดานอำนาจอนุมัติวงเงินสูงสุดให้กับสหกรณ์ได้ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 9 เท่าแห่งทุน และสูงสุดไม่เกิน 60 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 15 เท่าแห่งทุน และสูงสุดไม่เกิน 100 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 15 เท่าแห่งทุน และสูงสุดไม่เกิน 500 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 20 เท่าแห่งทุน และสูงสุดไม่เกิน 1,000 ล้านบาท"}],"answer":"ค","explanation":"ตามเพดานอำนาจอนุมัติของสหกรณ์การเกษตร (ฉ.31 ข้อ 2(1)) \"เพื่อเป็นทุนให้กู้ยืมแก่สมาชิก\" คณะกรรมการระดับกลาง (CC2) สามารถพิจารณาอนุมัติวงเงินสูงสุดได้ \"ไม่เกิน 15 เท่าแห่งทุน และในกรอบวงเงินรวม สูงสุดไม่เกิน 500 ล้านบาท\" ครับ"},{"num":287,"q":"ลูกค้ามีความจำเป็นต้องขอ \"แบ่งแยกหรือปลอดจำนองที่ดิน\" ซึ่งติดจำนองกับธนาคาร เพื่อยกให้เป็นทาง สาธารณประโยชน์ หรือให้แก่ทางราชการ ธนาคารจะพิจารณาอนุญาตให้ดำเนินการได้ก็ต่อเมื่อที่ดินส่วนที่เหลือมีราคา ประเมินตามข้อใด?","choices":[{"key":"ก","text":"ราคาประเมินที่ดินส่วนที่เหลือ ต้องครอบคลุมต้นเงินกู้ร้อยละ 80"},{"key":"ข","text":"ราคาประเมินที่ดินส่วนที่เหลือ ต้องไม่น้อยกว่า 1.5 เท่าของวงเงินจำนอง"},{"key":"ค","text":"ราคาประเมินที่ดินส่วนที่เหลือ ต้องไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ในขณะนั้น"},{"key":"ง","text":"ราคาประเมินที่ดินส่วนที่เหลือ ต้องไม่น้อยกว่า 3 เท่าของมูลค่าทรัพย์สินทั้งหมด"}],"answer":"ค","explanation":"ตามระเบียบการดำเนินการเกี่ยวกับหลักประกัน หากลูกค้าขอแบ่งแยก ยกให้ หรือปลอดจำนองที่ดินเพื่อเป็น ทางสาธารณประโยชน์หรือให้ทางราชการ เงื่อนไขที่สำคัญที่สุดคือ \"ที่ดินส่วนที่เหลือจะต้องมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ในขณะนั้น\" จึงจะสามารถพิจารณาอนุญาตได้ครับ"},{"num":288,"q":"ในการคำนวณวงเงินกู้รวมเพื่อกำกับลูกหนี้รายใหญ่ (SLL) หากนิติบุคคลมีวงเงินกู้ \"สินเชื่อต่างประเทศ (FX)\" ที่ธนาคาร อนุมัติไว้ 10 ล้านบาท แต่ปัจจุบันลูกค้า \"ยังไม่มีภาระหนี้คงเหลือเลย (0 บาท)\" พนักงานจะต้องนำภาระหนี้ FX นี้มาคิดเป็น ความเสี่ยง (CEQA) เท่าใด?","choices":[{"key":"ก","text":"ไม่ต้องนำมาคิดความเสี่ยง เนื่องจากยังไม่มีภาระหนี้คงเหลือ"},{"key":"ข","text":"800,000 บาท (คิดอัตราความเสี่ยงร้อยละ 8 ของวงเงินหน้าตั๋ว)"},{"key":"ค","text":"5,000,000 บาท (คิดความเสี่ยงร้อยละ 50 ของวงเงินหน้าตั๋ว)"}],"answer":"ข","explanation":"ในการคิดเทียบเท่าความเสี่ยงสินเชื่อ (CEQA) เพื่อคำนวณ Total Group Exposure สำหรับ \"วงเงินสินเชื่อ ต่างประเทศ (FX)\" แม้ลูกค้าจะยังไม่มียอดหนี้คงเหลือ ธนาคารจะบังคับให้คิดความเสี่ยงที่ \"ร้อยละ 8 ของวงเงินอนุมัติตาม หน้าตั๋ว\" (10 ล้านบาท x 8% = 800,000 บาท) ครับ"},{"num":289,"q":"ในกระบวนการติดตามทวงถามหนี้ (Debt Collection) ธนาคารมีข้อกำหนดเพื่อความโปร่งใส โดยกำหนดให้ผู้ปฏิบัติงาน ในตำแหน่งใดต่อไปนี้ \"ไม่มีอำนาจ\" ในการติดตามทวงถามหนี้ลูกค้าโดยเด็ดขาด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.) และผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.) และพนักงานพัฒนาธุรกิจ"},{"key":"ค","text":"พนักงานธุรกิจสินเชื่อ (พบส.)"},{"key":"ง","text":"หัวหน้าการเงิน และ พนักงานการเงิน ประจำสาขา"}],"answer":"ง","explanation":"ตามคำสั่งมอบอำนาจในการติดตามทวงถามหนี้ เพื่อให้เป็นไปตาม พ.ร.บ. การทวงถามหนี้ ตำแหน่งที่ \"ไม่มี อำนาจ\" ในการทวงถามหนี้ลูกค้าเลย ได้แก่ หัวหน้าการเงิน, พนักงานการเงิน, พนักงานธุรการ, แม่บ้าน, และ รปภ. ครับ (ส่วนฝ่ายพัฒนาธุรกิจสามารถทวงถามได้ตามปกติ)"},{"num":290,"q":"ในการพิจารณานโยบายให้สินเชื่อ (Credit Policy) หากลูกค้าขอกู้เงินเพื่อนำไป \"ประกอบธุรกิจร้านทองคำ (ซื้อ-ขาย/รับ ฝากขาย/จำนำทองคำ)\" พนักงานจะต้องยึดเงื่อนไข UWS ในข้อใดเพื่อป้องกันความเสี่ยงสูงสุด?","choices":[{"key":"ก","text":"ไม่สนับสนุนเด็ดขาด (Negative List) เนื่องจากมีความเสี่ยงสูง"},{"key":"ข","text":"สนับสนุนได้เสรี หากลูกค้ามีหลักประกันเป็นเงินฝากคุ้มวงเงิน"},{"key":"ค","text":"สนับสนุนเฉพาะรายที่มีประสบการณ์มาแล้ว และให้กู้ \"เพื่อเสริมสภาพคล่อง\" ในกิจการเท่านั้น"},{"key":"ง","text":"สนับสนุนได้เฉพาะนิติบุคคลที่มีทุนจดทะเบียนไม่ต่ำกว่า 10 ล้านบาท"}],"answer":"ค","explanation":"นโยบายสินเชื่อประจำปีของธนาคาร จัดให้ \"ธุรกิจร้านทองคำ\" อยู่ในกลุ่มที่ต้องสนับสนุนอย่างระมัดระวัง โดย กำหนด UWS ว่า \"ให้สนับสนุนเฉพาะรายที่มีประสบการณ์ในการดำเนินธุรกิจนี้มาแล้ว และให้เฉพาะกรณีเพื่อเสริมสภาพ คล่องเท่านั้น\" เนื่องจากเป็นธุรกิจที่ราคามีความผันผวนและเสี่ยงสูงครับ [14, Artifact 7]"},{"num":291,"q":"กลุ่มวิสาหกิจชุมชน (วสช.) ขอกู้เงินเพื่อดำเนินงานรวมเป็นวงเงินทั้งสิ้น \"45 ล้านบาท\" (ตามข้อบังคับ ฉ.45) อำนาจ การพิจารณาอนุมัติวงเงินกู้ในครั้งนี้ จะเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ค","explanation":"ตามตารางโครงสร้างอำนาจอนุมัติของ \"กลุ่มบุคคล (วสช./สถช.)\" ตามข้อบังคับ ฉ.45 คณะกรรมการพิจารณา อนุมัติสินเชื่อระดับกลาง (CC2) จะมีเพดานอนุมัติได้ \"ไม่เกิน 50 ล้านบาท\" ดังนั้นวงเงินขอกู้ 45 ล้านบาท จึงตกอยู่ใน อำนาจของ CC2 ครับ"},{"num":292,"q":"[Case Study] สหกรณ์การเกษตรขอกู้เงินตามข้อบังคับ ฉ.31 ข้อ 2(1) \"เพื่อเป็นทุนให้สมาชิกกู้ยืม\" เป็นวงเงิน \"400 ล้าน บาท\" (ซึ่งอยู่ในเพดานไม่เกิน 15 เท่าแห่งทุน) อำนาจการอนุมัติวงเงินกู้โปรเจ็กต์นี้ตกเป็นของใคร?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะกรรมการธนาคาร (Board)"}],"answer":"ข","explanation":"สำหรับสหกรณ์การเกษตรขอกู้เงินตาม ฉ.31 ข้อ 2(1) \"เพื่อเป็นทุนให้สมาชิกกู้ยืม\" ธนาคารกำหนดเพดานให้ คณะกรรมการระดับกลาง (CC2) อนุมัติได้สูงสุด \"ไม่เกิน 500 ล้านบาท\" ครับ (ซึ่งถือว่าเป็นเพดานที่สูงมากเมื่อเทียบกับ นิติบุคคลทั่วไป) ดังนั้น 400 ลบ. จึงจบที่ CC2 ครับ"},{"num":293,"q":"การพิจารณาอนุมัติ \"การผัดชำระเงินรายงวด หรือ ขยายเวลาชำระหนี้เงินกู้\" สำหรับลูกค้าบุคคลธรรมดาตามข้อบังคับ ฉ.45 (ในกรณีที่ไม่ได้ขัดต่อ UWS หรือต้องขออำนาจพิเศษ) ระเบียบกำหนดให้อยู่ในอำนาจของบุคคลใดเป็นระดับแรก?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก ผู้จัดการสาขา (ผจข.)"},{"num":294,"q":"[Case Study] สหกรณ์นอกภาคการเกษตร ขอกู้เงินตามข้อบังคับ ฉ.46 หากปัจจุบันประสบปัญหาและต้องการขอ พิจารณา \"การผัดชำระเงินรายงวด หรือ ขยายเวลาชำระหนี้เงินกู้\" อำนาจการพิจารณาอนุมัติในเรื่องนี้เป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ก","explanation":"เช่นเดียวกันกับลูกค้ารายย่อย แม้จะเป็นลูกค้ากลุ่มองค์กรอย่าง \"สหกรณ์นอกภาคการเกษตร (ฉ.46)\" ระเบียบ ก็ยังคงมอบอำนาจการพิจารณาเรื่อง \"การผัดชำระเงินรายงวด หรือขยายเวลาชำระหนี้\" ให้อยู่ในขอบเขตการตัดสินใจของ ผู้จัดการสาขา (ผจข.) และระดับจังหวัดขึ้นไปครับ"},{"num":295,"q":"หากผู้กู้ตามข้อบังคับ ฉ.44 (เกษตรกร) ขอ \"ไถ่ถอนที่ดินที่ธนาคารรับจำนองไว้เพื่อเป็นประกันการชำระหนี้\" โดยลูกค้า ได้ \"ชำระหนี้ที่มีอยู่กับธนาคารเสร็จสิ้นทุกสัญญาแล้ว\" บุคคลใดต่อไปนี้มีอำนาจในการอนุมัติการไถ่ถอนจำนองดังกล่าว?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"หากลูกค้าชำระหนี้เงินกู้เสร็จสิ้นทุกสัญญาแล้ว และต้องการขอไถ่ถอนหลักประกันจำนองคืน ระเบียบได้มอบ อำนาจให้ \"ผู้จัดการสาขา (ผจข.)\" สามารถเป็นผู้อนุมัติการไถ่ถอนหลักประกันให้กับลูกค้าได้เลยครับ"},{"num":296,"q":"ลูกค้าขอนำที่ดินที่ติดจำนองกับธนาคาร ไปดำเนินการ \"แบ่งขายหรือแบ่งแยกเพื่อมอบให้เป็นทางสาธารณประโยชน์ หรือทางราชการ\" (ซึ่งไม่ได้เป็นการบังคับตามกฎหมาย) ธนาคารจะพิจารณาอนุญาตให้ดำเนินการได้ ก็ต่อเมื่อที่ดินส่วนที่เหลือ มีราคาประเมินตามข้อใด? (สำหรับหนี้ปกติ)","choices":[{"key":"ก","text":"ไม่น้อยกว่า 1 เท่าของหนี้เงินกู้ในขณะนั้น"},{"key":"ข","text":"ไม่น้อยกว่า 1.5 เท่าของหนี้เงินกู้ในขณะนั้น"},{"key":"ค","text":"ไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ในขณะนั้น"},{"key":"ง","text":"ไม่น้อยกว่า 3 เท่าของมูลค่าทรัพย์สินทั้งหมด"}],"answer":"ค","explanation":"การขอแบ่งแยกที่ดินจำนองให้ทางราชการหรือเป็นทางสาธารณะ สำหรับลูกค้าหนี้ปกติ ธนาคารจะอนุญาตก็ ต่อเมื่อ \"ที่ดินจำนองส่วนที่เหลือจะต้องมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ที่ใช้หลักประกันในขณะนั้น\" เพื่อ ป้องกันไม่ให้ธนาคารสูญเสียมูลค่าหลักประกันครับ"},{"num":297,"q":"จากข้อที่แล้ว หากลูกค้าขอดำเนินการแบ่งแยกที่ดินให้เป็นทางสาธารณประโยชน์ แต่ลูกค้ารายนี้เป็น \"ลูกหนี้ปรับปรุง โครงสร้างหนี้ (ปปน.)\" ธนาคารจะอนุโลมให้ที่ดินจำนองส่วนที่เหลือมีราคาประเมินขั้นต่ำในระดับใดจึงจะสามารถอนุมัติได้?","choices":[{"key":"ก","text":"ไม่น้อยกว่าร้อยละ 80 ของต้นเงินกู้ในขณะนั้น"},{"key":"ข","text":"ไม่น้อยกว่าต้นเงินกู้ในขณะนั้น (1 เท่า)"},{"key":"ค","text":"ไม่น้อยกว่า 1.5 เท่าของต้นเงินกู้ในขณะนั้น"},{"key":"ง","text":"ไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ในขณะนั้น"}],"answer":"ข","explanation":"เป็นข้อยกเว้นพิเศษสำหรับลูกค้าที่เข้าสู่กระบวนการ ปรับปรุงโครงสร้างหนี้ (ปปน.) ธนาคารจะลดความ เข้มงวดลง โดยอนุโลมให้ที่ดินจำนองส่วนที่เหลือ มีราคาประเมินที่ทบทวนใหม่ \"ไม่น้อยกว่าหนี้เงินกู้ในขณะนั้น (ต้นเงิน)\" หรือคิดเป็น 1 เท่าของต้นเงินนั่นเองครับ"},{"num":298,"q":"ตามระเบียบ ฉบับที่ 77 อำนาจในการพิจารณา \"ผ่อนผันการรับขึ้นทะเบียนเป็นลูกค้าประจำสาขา\" สำหรับเกษตรกร (ฉ.44) หรือบุคคล (ฉ.45) ที่มีคุณสมบัติบางประการไม่ครบถ้วนตามเกณฑ์ปกติ บุคคลใดมีอำนาจเริ่มต้นในการอนุมัติผ่อนผัน (โดยต้องบันทึกความเห็นประกอบ)?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"}],"answer":"ข","explanation":"การพิจารณาผ่อนผันการรับบุคคลหรือเกษตรกรขึ้นทะเบียนเป็นลูกค้า แม้คุณสมบัติจะไม่ครบ 100% ตามข้อ 3(1) ของข้อบังคับ อำนาจการอนุมัติผ่อนผันจะเริ่มต้นที่ \"ผู้จัดการสาขา (ผจข.)\" โดยต้องบันทึกเหตุผลความเห็น ประกอบการวินิจฉัยไว้ด้วยเสมอครับ"},{"num":299,"q":"กรณีบุคคลภายนอกหรือนิติบุคคล ขอ \"เช่า\" อาคาร สิ่งปลูกสร้าง หรือที่ดิน ที่ติดภาระจำนองอยู่กับธนาคาร หาก \"อายุการเช่าเกินกว่า 3 ปี\" ธนาคารกำหนดเงื่อนไขในการพิจารณาอนุมัติไว้ตามข้อใด?","choices":[{"key":"ก","text":"สามารถทำสัญญาเช่าธรรมดากับลูกค้าได้เลย โดยมี ผจข. เป็นผู้อนุมัติ"},{"key":"ข","text":"ต้องจัดทำสัญญาเช่าเป็นหนังสือและ \"จดทะเบียนต่อพนักงานเจ้าหน้าที่\" โดยอยู่ในอำนาจอนุมัติของ ผจข. หรือ ผอจ."},{"key":"ค","text":"ไม่อนุญาตให้นำทรัพย์สินที่ติดจำนองไปให้บุคคลอื่นเช่าเกิน 3 ปีในทุกกรณี"},{"key":"ง","text":"ต้องขออนุมัติจากคณะกรรมการระดับธนาคารเพื่อพิจารณาความเสี่ยงเท่านั้น"}],"answer":"ข","explanation":"หากให้ผู้อื่นเช่าทรัพย์สินที่ติดจำนองและ \"มีอายุการเช่าเกินกว่า 3 ปี\" เพื่อความรัดกุมทางกฎหมาย ธนาคาร บังคับว่า \"ต้องทำสัญญาเช่าเป็นหนังสือและจดทะเบียนต่อพนักงานเจ้าหน้าที่\" โดยมี ผจข., ผช.ผอจ. หรือ ผอจ. เป็นผู้ พิจารณาอนุมัติครับ"},{"num":300,"q":"ตามหลักเกณฑ์การกำกับ Total Group Exposure ของสถาบันเกษตรกร หากสหกรณ์การเกษตรขอกู้เงิน \"เพื่อเป็นทุน หมุนเวียนในการรวบรวมผลผลิต\" (ตาม ฉ.31 ข้อ 2(1)) เป็นวงเงิน \"150 ล้านบาท\" อำนาจการพิจารณาอนุมัติโปรเจ็กต์นี้จะตก เป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะกรรมการธนาคาร (Board)"}],"answer":"ค","explanation":"การกู้เงินของสหกรณ์การเกษตร (ฉ.31) ในวัตถุประสงค์ \"รวบรวมผลผลิต\" อำนาจของ CC2 จะสิ้นสุดที่ 80 ล้านบาท ดังนั้น หากขอกู้ที่ 150 ล้านบาท อำนาจการอนุมัติจะขยับขึ้นไปอยู่ที่ \"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อ ระดับธนาคาร\" (เพดานไม่เกิน 200 ล้านบาท) ครับ"},{"num":301,"q":"สหกรณ์การเกษตรขอกู้เงินตามข้อบังคับ ฉ.31 ข้อ 2(2) เพื่อเป็น \"ทุนจัดหาวัสดุมาจำหน่าย\" เป็นวงเงิน 60 ล้านบาท (โดยไม่เกิน 9 เท่าแห่งทุนของสหกรณ์) อำนาจการพิจารณาอนุมัติวงเงินกู้ในครั้งนี้ จะเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"}],"answer":"ค","explanation":"สำหรับสหกรณ์การเกษตรขอกู้เพื่อเป็นทุนจัดหาวัสดุมาจำหน่าย (ฉ.31 ข้อ 2(2)) อำนาจของ คณะกรรมการ ระดับกลาง (CC2) จะถูกจำกัดไว้ที่ไม่เกิน 9 เท่าแห่งทุน และวงเงินสูงสุด ไม่เกิน 60 ล้านบาท พอดีครับ (หากขอกู้ 61 ล้านบาทขึ้นไปจึงจะตกเป็นของระดับธนาคาร)"},{"num":302,"q":"สหกรณ์นอกภาคการเกษตรขอกู้เงินตามข้อบังคับ ฉ.46 ข้อ 3(1) \"เพื่อใช้เป็นทุนหมุนเวียนในการดำเนินธุรกิจ\" เป็น วงเงิน 450 ล้านบาท (โดยอยู่ในกรอบไม่เกิน 15 เท่าแห่งทุน) อำนาจการอนุมัติโปรเจ็กต์นี้ตกเป็นของใคร?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ข","explanation":"ตามโครงสร้างเพดานของสหกรณ์นอกภาคการเกษตร (ฉ.46 ข้อ 3(1)) กู้เพื่อเป็นทุนหมุนเวียน คณะกรรมการระดับกลาง (CC2) มีอำนาจพิจารณาอนุมัติได้สูงสุดไม่เกิน 15 เท่าแห่งทุน และเพดานวงเงินกู้สูงถึง ไม่เกิน 450 ล้านบาท (หรือกรอบอำนาจรวมไม่เกิน 500 ล้านบาท) ครับ"},{"num":303,"q":"เกษตรกรรายใหญ่ (ตามข้อบังคับ ฉ.44) ขอกู้เงินรวมทุกสัญญาเป็นจำนวนเงินทั้งสิ้น \"120 ล้านบาท\" อำนาจการ พิจารณาอนุมัติโครงการนี้ จะตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ค","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"สำหรับกลุ่มเกษตรกรและบุคคลธรรมดา (ฉ.44, 45) อำนาจของคณะกรรมการระดับธนาคารจะสิ้นสุดที่กรอบ ไม่เกิน 100 ล้านบาท หากขอกู้ทะลุเกิน 100 ล้านบาทขึ้นไป (เช่น 120 ล้านบาท) อำนาจจะตกเป็นของ คณะอนุกรรมการ กลั่นกรอง หรือ คณะกรรมการธนาคาร (Board) ครับ"},{"num":304,"q":"บริษัทส่งออกข้าวแห่งหนึ่ง (ลูกค้านิติบุคคล ฉ.45) ขอกู้เงินประเภท \"สินเชื่อเพื่อการค้าระหว่างประเทศ (Trade Finance ตาม ฉ.60)\" เป็นวงเงิน 150 ล้านบาท อำนาจการอนุมัติอยู่ที่คณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ค","explanation":"การขอกู้ประเภท Trade Finance (ฉ.60) ของกลุ่มลูกค้านิติบุคคล อำนาจระดับกลาง (CC2) จะสิ้นสุดที่ไม่เกิน 100 ล้านบาท หากขอกู้ที่ 150 ล้านบาท จะตกเป็นอำนาจของ คณะกรรมการระดับธนาคาร (ซึ่งมีเพดานอนุมัติได้ไม่เกิน 200 ล้านบาท) ครับ"},{"num":305,"q":"กองทุนหมู่บ้าน (กทบ.) ขอกู้เงินเพื่อเป็นทุนให้สมาชิกกู้ยืมต่อ รวมเป็นวงเงินทั้งสิ้น \"40 ล้านบาท\" อำนาจการ พิจารณาอนุมัติวงเงินดังกล่าวเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ค","text":"คณะอนุกรรมการกลั่นกรอง"},{"key":"ง","text":"คณะกรรมการธนาคาร (Board)"}],"answer":"ค","explanation":"โครงสร้างอำนาจของกองทุนหมู่บ้าน (กทบ.) มีเพดานที่ค่อนข้างต่ำเพื่อคุมความเสี่ยง โดย CC2 อนุมัติได้ไม่เกิน 20 ล้าน, ระดับธนาคารไม่เกิน 25 ล้าน และ คณะอนุกรรมการกลั่นกรอง อนุมัติได้ไม่เกิน 50 ล้านบาท ดังนั้นวงเงิน 40 ล้านบาท จึงอยู่ในอำนาจของคณะอนุกรรมการกลั่นกรองครับ"},{"num":306,"q":"ลูกค้าเกษตรกร (ฉ.44) ขอนำที่ดินจำนองไปดำเนินการ \"แบ่งไถ่ถอน หรือไถ่ถอนจากจำนอง\" โดยลูกค้าได้ \"ชำระหนี้ เสร็จสิ้นทุกสัญญาแล้ว\" และไม่มีสัญญากู้เงินเครดิตเงินสดค้างอยู่ ใครเป็นผู้มีอำนาจในการอนุมัติการไถ่ถอนดังกล่าว?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"}],"answer":"ข","explanation":"ตามระเบียบการดำเนินการด้านหลักประกัน กรณีที่ลูกค้าได้ส่งชำระหนี้เสร็จสิ้นทุกสัญญาแล้ว และขอแบ่งไถ่ ถอนหรือไถ่ถอนที่ดินจากจำนอง อำนาจการอนุมัติให้อยู่ที่ ผู้จัดการสาขา (ผจข.) เป็นผู้ดำเนินการได้เลยครับ"},{"num":307,"q":"กลุ่มเกษตรกร ขอกู้เงินตามข้อบังคับ ฉ.23 \"เพื่อเป็นทุนจัดหาวัสดุการเกษตรมาจำหน่าย\" เป็นวงเงิน 20 ล้านบาท (โดยอยู่ในกรอบไม่เกิน 9 เท่าแห่งทุน) อำนาจการพิจารณาอนุมัติจะเป็นของระดับใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ข","explanation":"สำหรับ \"กลุ่มเกษตรกร\" ที่ขอกู้ตาม ฉ.23 (ทุนจัดหา) คณะกรรมการระดับกลาง (CC2) มีเพดานอำนาจ อนุมัติอยู่ที่ ไม่เกิน 9 เท่าแห่งทุน และวงเงินสูงสุด ไม่เกิน 20 ล้านบาท ครับ"},{"num":308,"q":"หากธนาคารตรวจสอบพบว่ากลุ่มวิสาหกิจชุมชนที่ขอกู้เงิน มีคณะกรรมการดำเนินงานไปเป็นกรรมการทับซ้อนกับกลุ่ม วิสาหกิจชุมชนอื่นจำนวน \"4 คน\" ธนาคารจะต้องควบคุมความเสี่ยงโดยการลดวงเงินกู้ลงในสัดส่วนเท่าใด?","choices":[{"key":"ก","text":"ลดลงร้อยละ 2 ของวงเงินกู้เดิม"},{"key":"ข","text":"ลดลงร้อยละ 4 ของวงเงินกู้เดิม"},{"key":"ค","text":"ลดลงร้อยละ 6 ของวงเงินกู้เดิม"},{"key":"ง","text":"ลดลงร้อยละ 10 ของวงเงินกู้เดิม"}],"answer":"ง","explanation":"ตามวิธีปฏิบัติในการควบคุมความเสี่ยงของวิสาหกิจชุมชน หากตรวจพบว่ามีคณะกรรมการซ้ำซ้อนกับกลุ่มอื่น 1 คนให้อนุโลม, 2 คนลด 2%, 3 คนลด 4%, และหาก \"ซ้ำซ้อนตั้งแต่ 4 คนขึ้นไป ให้ปรับลดวงเงินกู้ลงร้อยละ 10 ของวงเงิน กู้เดิม\" ครับ"},{"num":309,"q":"ลูกค้ากลุ่ม \"องค์กร\" (ตามข้อบังคับ ฉ.45) ขอกู้เงินเพื่อดำเนินงานรวมเป็นวงเงินมหาศาลถึง \"400 ล้านบาท\" อำนาจ การพิจารณาอนุมัติวงเงินนี้ จะตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ค","text":"คณะอนุกรรมการกลั่นกรอง"},{"key":"ง","text":"คณะกรรมการธนาคาร (Board)"}],"answer":"ค","explanation":"สำหรับลูกค้ากลุ่ม \"องค์กร\" (ตามข้อบังคับ ฉ.45) โครงสร้างอำนาจคือ CC2 <= 200 ล้านบาท, ระดับธนาคาร <= 200 ล้านบาท (แต่กรอบรวม 500 ล้านบาท), และ คณะอนุกรรมการกลั่นกรอง จะมีอำนาจอนุมัติวงเงินตามวัตถุประสงค์ และกรอบรวมได้สูงสุดไม่เกิน 500 ล้านบาท ครับ วงเงิน 400 ลบ. จึงเป็นของอนุกลั่นกรอง"},{"num":310,"q":"สหกรณ์การเกษตร ขอกู้เงินประเภทเบิกเงินเกินบัญชี (O/D ตามข้อบังคับ ฉ.56) เป็นวงเงิน 60 ล้านบาท อำนาจการ อนุมัติวงเงิน O/D นี้จะเป็นของระดับใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ข","explanation":"สำหรับสหกรณ์การเกษตร ขอกู้สินเชื่อเบิกเงินเกินบัญชี (O/D ฉ.56) อำนาจของ คณะกรรมการระดับกลาง (CC2) จะถูกกำหนดเพดานไว้ที่ ไม่เกิน 60 ล้านบาท ครับ"},{"num":311,"q":"ตามระเบียบว่าด้วยการดำเนินการหลังการให้กู้ (ระเบียบฉบับที่ 83) อำนาจการอนุมัติให้ลูกค้าเกษตรกร (ตาม ข้อบังคับ ฉ.44) \"เปลี่ยนแปลงวัตถุประสงค์การใช้เงินกู้\" ตกเป็นของบุคคลใดในระดับแรกสุด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ (พบส.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามตารางอำนาจการดำเนินการหลังการให้กู้ (ระเบียบ 83) สำหรับลูกค้าเกษตรกร (ฉ.44) การพิจารณา อนุมัติให้ลูกค้า \"เปลี่ยนแปลงวัตถุประสงค์การใช้เงินกู้\" จะเริ่มต้นที่อำนาจของ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":312,"q":"การจัดทำ \"หนังสือรับสภาพหนี้ หรือหนังสือรับสภาพความรับผิด\" สำหรับลูกค้าประเภทบุคคล (ตามข้อบังคับ ฉ.45) ผู้รับมอบอำนาจในระดับแรกสุดที่สามารถดำเนินการได้คือใคร?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ข","explanation":"สำหรับการจัดทำหนังสือรับสภาพหนี้ หรือหนังสือรับสภาพความรับผิด ของลูกค้าบุคคล (ฉ.45) ระเบียบมอบ อำนาจเริ่มต้นให้แก่ หัวหน้าหน่วยอำเภอ (หนภ.) (หรือพนักงานที่ได้รับมอบหมายตามสายงาน) สามารถเป็นผู้จัดทำและ ดำเนินการได้เป็นระดับแรกครับ"},{"num":313,"q":"ตามโครงสร้างอำนาจอนุมัติ สำหรับลูกค้ากลุ่ม \"ผู้ประกอบการ นิติบุคคล\" และ \"องค์กร\" หากลูกค้าผิดเงื่อนไขอย่าง ร้ายแรงจนธนาคารจำเป็นต้องพิจารณา \"เรียกคืนเงินกู้\" อำนาจการพิจารณาเรียกคืนเงินกู้นี้เริ่มต้นที่บุคคลระดับใด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"คณะกรรมการระดับกลาง (CC2)"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก ผู้จัดการสาขา (ผจข.)"},{"num":314,"q":"อำนาจในการอนุมัติ \"ถอนจำนองเดิมและจดจำนองใหม่\" ในกรณีที่มีบุคคลอื่นรับใช้หนี้แทนผู้กู้ หรือเกิดการเปลี่ยนตัว ลูกหนี้ (ตาม ฉ.44, 45, 56, 60) ถือเป็นอำนาจของบุคคลใดในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ไม่สามารถทำได้ที่สาขา ต้องเสนอ ผอจ. เท่านั้น"}],"answer":"ค","explanation":"กิจการเกี่ยวกับที่ดินรับจำนอง (หมวด 1 ข้อ 19) ระบุชัดเจนว่า การ \"ถอนจำนองเดิมและจดจำนองใหม่\" กรณี มีบุคคลอื่นมารับใช้หนี้แทนผู้กู้ หรือเปลี่ยนตัวลูกหนี้ อำนาจการพิจารณาอนุมัติอยู่ที่ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":315,"q":"หากลูกค้า \"สหกรณ์การเกษตร\" ขอกู้เงินประเภท \"เบิกเงินเกินบัญชี (O/D ตามข้อบังคับ ฉ.56)\" เพดานอำนาจอนุมัติ ของ คณะกรรมการระดับกลาง (CC2) และ คณะกรรมการระดับธนาคาร ถูกจำกัดไว้สูงสุดที่ไม่เกินเท่าใดตามลำดับ?","choices":[{"key":"ก","text":"CC2 ไม่เกิน 50 ล้านบาท / ธนาคาร ไม่เกิน 100 ล้านบาท"},{"key":"ข","text":"CC2 ไม่เกิน 60 ล้านบาท / ธนาคาร ไม่เกิน 100 ล้านบาท"},{"key":"ค","text":"CC2 ไม่เกิน 60 ล้านบาท / ธนาคาร ไม่เกิน 200 ล้านบาท"},{"key":"ง","text":"CC2 ไม่เกิน 100 ล้านบาท / ธนาคาร ไม่เกิน 200 ล้านบาท"}],"answer":"ข","explanation":"ตารางเพดานอำนาจอนุมัติสำหรับสหกรณ์การเกษตร ประเภทวงเงิน O/D (ตาม ฉ.56) กำหนดให้ คณะกรรมการระดับกลาง (CC2) อนุมัติได้ไม่เกิน 60 ล้านบาท และ คณะกรรมการระดับธนาคาร อนุมัติได้ไม่เกิน 100 ล้าน บาท ครับ"},{"num":316,"q":"ในการพิจารณาให้สินเชื่อประเภทเบิกเงินเกินบัญชี (O/D) แก่ลูกค้ากลุ่ม \"ผู้ประกอบการนิติบุคคล\" ตามโครงสร้าง เพดานใหม่ คณะกรรมการระดับต้น (CC1) มีอำนาจพิจารณาอนุมัติวงเงินให้ได้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 20 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 50 ล้านบาท"}],"answer":"ก","explanation":"สำหรับลูกค้ากลุ่ม \"ผู้ประกอบการ (นิติบุคคล)\" ที่ขอกู้ประเภทวงเงิน O/D (ฉ.56) โครงสร้างอำนาจใหม่ กำหนดให้ คณะกรรมการระดับต้น (CC1) มีอำนาจพิจารณาได้เฉพาะวงเงินขนาดเล็ก คือ \"ไม่เกิน 3 ล้านบาท\" เท่านั้นครับ (หากเกินนี้แต่ไม่เกิน 50 ล้าน จะเป็นอำนาจของ CC2 ทันที)"},{"num":317,"q":"ตามข้อพึงระวังการใช้ข้อมูลเครดิตบูโร (ตามมาตรา 28) หากธนาคารพิจารณา \"ปฏิเสธสินเชื่อลูกค้าเนื่องจากผลของ ข้อมูลเครดิต\" ธนาคารจะต้องดำเนินการอย่างไรจึงจะไม่ผิดกฎหมาย?","choices":[{"key":"ก","text":"ปฏิเสธด้วยวาจาและไม่ต้องแจ้งเหตุผล เพื่อรักษาสิทธิและความลับของธนาคาร"},{"key":"ข","text":"ออกหนังสือปฏิเสธสินเชื่อโดยระบุเหตุผล และให้ลูกค้าไปขอข้อมูลจาก NCB เองโดยเสียค่าธรรมเนียม"},{"key":"ค","text":"ออกหนังสือปฏิเสธสินเชื่อพร้อมแสดงเหตุผล และแจ้งให้ลูกค้าทราบว่ามีสิทธิตรวจสอบความถูกต้องของข้อมูลโดยไม่เสีย"},{"key":"ง","text":"ส่งข้อมูลการปฏิเสธให้ ธปท. ทราบก่อนออกหนังสือปฏิเสธให้ลูกค้า"}],"answer":"ค","explanation":"ตาม พ.ร.บ. ข้อมูลเครดิต มาตรา 28 กฎหมายคุ้มครองผู้บริโภคกำหนดว่า หากธนาคารปฏิเสธสินเชื่อเพราะ ผลจากเครดิตบูโร ธนาคาร \"ต้องออกหนังสือปฏิเสธพร้อมแสดงเหตุผล และต้องแจ้งให้ลูกค้าทราบว่ามีสิทธิตรวจสอบความ ถูกต้องของข้อมูลนั้นได้โดยไม่เสียค่าธรรมเนียมภายใน 30 วัน\" ครับ"},{"num":318,"q":"ลูกค้าขอนำที่ดินที่ติดจำนองกับธนาคาร ไปดำเนินการ \"แบ่งขายให้แก่ทางราชการหรือเพื่อสาธารณประโยชน์\" (โดยที่ ลูกค้ายังชำระหนี้ไม่เสร็จสิ้น) ธนาคารจะพิจารณาอนุญาตให้ดำเนินการได้ภายใต้เงื่อนไขสำคัญคือข้อใด?","choices":[{"key":"ก","text":"ลูกค้าต้องชำระต้นเงินมาแล้วไม่น้อยกว่าร้อยละ 50"},{"key":"ข","text":"ที่ดินส่วนที่เหลือต้องมีราคาประเมินใหม่ไม่น้อยกว่าราคาประเมินเดิมในอดีต"},{"key":"ค","text":"ที่ดินจำนองส่วนที่เหลือต้องมีราคาประเมิน \"ไม่น้อยกว่า 2 เท่า\" ของหนี้เงินกู้ในขณะนั้น"},{"key":"ง","text":"ที่ดินจำนองส่วนที่เหลือต้องมีราคาประเมินครอบคลุมหนี้เงินกู้ 100%"}],"answer":"ค","explanation":"การขอแบ่งขายหรือแบ่งแยกที่ดินจำนองให้ทางราชการ/สาธารณประโยชน์ ในขณะที่ยังมีหนี้คงค้าง ธนาคาร จะอนุญาตก็ต่อเมื่อ \"ที่ดินจำนองส่วนที่เหลือจะต้องมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ในขณะนั้น\" เพื่อให้ หลักประกันยังคงคุ้มครองหนี้ได้อย่างรัดกุมครับ"},{"num":319,"q":"หากลูกค้าประเภทกลุ่มเกษตรกร หรือ สหกรณ์การเกษตร ขอแบ่งแยกที่ดินซึ่งติดจำนองไว้กับธนาคารเพื่อนำไป \"ขาย\" และนำเงินมาชำระหนี้คืนธนาคาร ธนาคารกำหนดกฎเหล็กให้ลูกค้าต้องนำเงินที่ขายได้นั้น ส่งชำระหนี้คืนในอัตราเท่าใด?","choices":[{"key":"ก","text":"ส่งชำระหนี้ไม่น้อยกว่าร้อยละ 50 ของเงินที่ขายได้"},{"key":"ข","text":"ส่งชำระหนี้ไม่น้อยกว่าร้อยละ 80 ของเงินที่ขายได้"},{"key":"ค","text":"ต้องส่งชำระหนี้ให้ครอบคลุมต้นเงินกู้ทั้งหมด 100%"},{"key":"ง","text":"ให้นำมาชำระเฉพาะส่วนที่ค้างชำระ (Arrears) เท่านั้น"}],"answer":"ข","explanation":"ตามกิจการเกี่ยวกับที่ดินรับจำนอง (ข้อ 20.1.3) หากสหกรณ์การเกษตรขอไถ่ถอนที่ดินเพื่อนำไปขาย ธนาคาร มีกฎบังคับว่า สหกรณ์จะต้องนำเงินที่ได้จากการขายนั้น \"ส่งชำระหนี้คืนธนาคารไม่น้อยกว่าร้อยละ 80\" (และห้ามเป็น ที่ดินแปลงที่ตั้งโครงการด้วย) ครับ"},{"num":320,"q":"ข้อใดต่อไปนี้ ถือเป็น \"ข้อห้ามเด็ดขาด (Negative List)\" จากข้อควรปฏิบัติในการตรวจสอบของธนาคารแห่งประเทศไทย (ธปท.) เกี่ยวกับการพิจารณาให้สินเชื่อ?","choices":[{"key":"ก","text":"ห้ามอนุมัติสินเชื่อโครงการที่อาจไม่ได้ประกอบธุรกิจจริง โดยลูกค้าเบิกใช้เต็มวงเงินในครั้งเดียวไม่เป็นไปตามเงื่อนไข"},{"key":"ข","text":"ห้ามการให้สินเชื่อใหม่เพื่อนำไปชำระหนี้ตามสัญญาเดิมที่ค้างชำระ ซึ่งเข้าข่ายการหลีกเลี่ยงการจัดชั้นหนี้"},{"key":"ค","text":"ห้ามบันทึกข้อมูลในระบบ CBS ไม่ตรงตามเงื่อนไขของผลิตภัณฑ์ และบันทึกอัตราดอกเบี้ยสูงกว่าที่กำหนด"},{"key":"ง","text":"ถูกทุกข้อที่กล่าวมา"}],"answer":"ง","explanation":"จากผลการตรวจของ ธปท. ข้อควรระวังที่เป็น \"ข้อห้ามเด็ดขาด\" มีทั้ง การอนุมัติโครงการที่ไม่ได้ประกอบ ธุรกิจจริง (เบิกใช้เต็มวงเงินผิดเงื่อนไข), การปล่อยสินเชื่อใหม่เพื่ออุ้มหนี้เก่า (หลีกเลี่ยงการจัดชั้น NPLs), รวมถึงการบันทึก ข้อมูลดอกเบี้ยและงวดชำระที่ไม่ตรงกับระบบ CBS ครับ"},{"num":321,"q":"ตามระเบียบฉบับที่ 84 หากลูกค้า \"ยังมีหนี้เงินกู้อยู่กับธนาคาร\" แต่มีความประสงค์ขอนำที่ดินจำนองไป \"ปลอดจำนอง เพื่อแบ่งขายให้แก่ทางราชการ\" (โดยที่ดินส่วนที่เหลือมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้) อำนาจการอนุมัติในกรณีนี้ตก เป็นของใคร?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ/ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"ตามระเบียบ 84 ข้อ 9.2.1 กรณีลูกค้ายังมีหนี้เงินกู้อยู่กับธนาคาร แล้วขอปลอดจำนองที่ดินเพื่อแบ่งขายหรือยก ให้ทางราชการ อำนาจการอนุมัติกำหนดให้เป็นของ ผู้อำนวยการ หรือผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ ผช.ผอจ.) ครับ"},{"num":322,"q":"จากระเบียบเรื่องหลักประกัน กรณีที่ลูกค้า \"ชำระหนี้เงินกู้เสร็จสิ้นทุกสัญญาแล้ว\" และมาขอ \"ไถ่ถอนที่ดินจากจำนอง\" โดยลูกค้าไม่มีสัญญากู้เงินเครดิตเงินสดคงค้างแล้ว บุคคลใดในระดับสาขามีอำนาจพิจารณาอนุมัติให้ไถ่ถอนจำนองได้?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) และ ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ต้องส่งเรื่องให้ ผอจ. อนุมัติเท่านั้น"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 20.3.2 ระบุชัดเจนว่า หากผู้กู้ \"ชำระหนี้เสร็จสิ้นทุกสัญญาแล้ว\" และต้องการไถ่ถอนที่ดิน หรือทรัพย์สินจากจำนอง อำนาจการอนุมัติจะอยู่ที่ ผู้จัดการสาขา (ผจข.) และ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) ครับ"},{"num":323,"q":"หากมีบุคคลภายนอกมาขอ \"เช่า\" ที่ดินหรืออาคารของลูกค้า ซึ่งติดภาระจำนองอยู่กับธนาคาร โดยตกลงทำสัญญาเช่า \"มีอายุการเช่าเกินกว่า 3 ปี\" อำนาจการพิจารณาอนุมัติเงื่อนไขนี้คือบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ/ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"คณะกรรมการระดับต้น (CC1)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก ต้องได้รับอนุญาตเป็นหนังสือจากธนาคารก่อน"},{"num":324,"q":"ตามระเบียบฉบับที่ 83 ว่าด้วยการดำเนินการหลังการให้กู้ หากลูกค้าเกษตรกร (ข้อบังคับ ฉ.44) มาติดต่อขอ \"ผัดชำระ เงินรายงวด หรือผ่อนเวลาชำระหนี้เงินกู้\" ผู้ใดมีอำนาจพิจารณาอนุมัติเป็นระดับแรก?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"คณะกรรมการระดับต้น (CC1)"}],"answer":"ข","explanation":"ตามระเบียบ 83 (ตารางอำนาจหลังการให้กู้) การอนุมัติผัดชำระเงินรายงวด ผ่อนเวลา หรือขยายเวลาชำระหนี้ สำหรับลูกค้าเกษตรกร (ฉ.44) อำนาจจะเริ่มต้นที่ ผู้จัดการสาขา (ผจข.) (ซึ่ง ผช.ผจข. สามารถรับมอบอำนาจแทนได้) ครับ"},{"num":325,"q":"ตามอำนาจหลังการให้กู้ (ระเบียบ 83) การจัดทำ \"หนังสือรับสภาพหนี้ หรือหนังสือรับสภาพความรับผิด\" สำหรับลูกค้า เกษตรกร (ฉ.44) ธนาคารมอบอำนาจให้บุคคลในตำแหน่งใด สามารถดำเนินการเป็นระดับแรกสุด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจระดับ 4"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ง","text":"ผู้จัดการสาขา (ผจข.)"}],"answer":"ข","explanation":"ตามตารางอำนาจหลังการให้กู้ (ระเบียบ 83 ข้อ 4) การจัดทำหนังสือรับสภาพหนี้ หรือหนังสือรับสภาพความรับ ผิด ของลูกค้าเกษตรกร ธนาคารกำหนดให้ผู้รับมอบอำนาจขั้นต้นคือ หัวหน้าหน่วยอำเภอ (หนภ.) รวมถึง ผช.ผจข. และ ผจข. ด้วยครับ"},{"num":326,"q":"[Case Study] สหกรณ์การเกษตร B กู้เงินเป็นทุนหมุนเวียน 50 ลบ., ค่าลงทุน 20 ลบ., และรวบรวมผลผลิต 10 ลบ. หาก พบว่าคู่สมรสของกรรมการ 2 ท่าน ได้กู้เงินเพื่อรวบรวมผลผลิตเกษตรส่วนตัวกับธนาคารด้วย คนละ 1 ล้านบาท ตาม หลักเกณฑ์การกำกับลูกหนี้รายใหญ่ (SLL) จะต้องนับรวม Total Group Exposure เท่าใด?","choices":[{"key":"ก","text":"80 ล้านบาท"},{"key":"ข","text":"81 ล้านบาท"},{"key":"ค","text":"82 ล้านบาท"},{"key":"ง","text":"ไม่ต้องนับรวมหนี้ส่วนตัวของคู่สมรส"}],"answer":"ค","explanation":"กรณีสหกรณ์ B มียอดขอกู้รวม 80 ลบ. และพิสูจน์พบว่า \"คู่สมรส\" ของคณะกรรมการดำเนินการกู้เงินส่วนตัว เพื่อนำไปทำธุรกิจรวบรวมผลผลิต (วัตถุประสงค์สอดคล้องกับกิจการสหกรณ์) ซึ่งถือว่ามีความเกี่ยวโยงกัน จึงต้องนำหนี้ของคู่ สมรสทั้ง 2 ท่าน (ท่านละ 1 ลบ.) มารวมด้วย ทำให้ Total Group Exposure เท่ากับ 82 ล้านบาท ครับ"},{"num":327,"q":"ระเบียบฉบับที่ 77 ระบุว่า หากบุคคลธรรมดาขอขึ้นทะเบียนเป็นลูกค้าประจำสาขา (ตาม ฉ.45) แต่มีปัญหาคุณสมบัติไม่ ครบถ้วนในบางข้อ บุคคลใดที่มีอำนาจ \"ผ่อนผันการรับขึ้นทะเบียน\" โดยต้องบันทึกความเห็นประกอบการวินิจฉัยไว้ด้วย?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"คณะกรรมการสินเชื่อระดับสาขา"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ข","explanation":"ตามระเบียบ 77 (การขึ้นทะเบียนลูกค้า) หากลูกค้าบุคคล (ฉ.45) หรือเกษตรกร (ฉ.44) มีเหตุพิเศษที่ควรยกเว้น คุณสมบัติตามที่บังคับไว้ อำนาจในการอนุมัติผ่อนผันการรับขึ้นทะเบียนจะเป็นของ ผู้จัดการสาขา (ผจข.) โดยต้องบันทึก เหตุผลประกอบการวินิจฉัยครับ"},{"num":328,"q":"ในการกำหนดเพดานอำนาจอนุมัติสำหรับ \"สหกรณ์การเกษตร\" ที่ขอกู้ประเภทเบิกเงินเกินบัญชี (O/D ตามข้อบังคับ ฉ. 56) คณะกรรมการระดับกลาง (CC2) มีอำนาจพิจารณาอนุมัติได้สูงสุดไม่เกินวงเงินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 60 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 80 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 100 ล้านบาท"}],"answer":"ข","explanation":"จากตารางสรุปกรอบอำนาจอนุมัติสินเชื่อใหม่ สำหรับสหกรณ์การเกษตรที่ขอกู้ประเภท เบิกเงินเกินบัญชี (O/D ตาม ฉ.56) คณะกรรมการระดับกลาง (CC2) มีเพดานอนุมัติได้ \"ไม่เกิน 60 ล้านบาท\" ครับ"},{"num":329,"q":"กรณีสหกรณ์ลูกค้าเข้าเกณฑ์เงื่อนไขผ่อนปรน ขอกู้เงินเพื่อ \"ต่ออายุสัญญา\" วงเงินเท่าเดิมและไม่เปลี่ยนแปลงโครงการ ธนาคารอนุโลมให้ \"ยกเว้น\" ขั้นตอนการปฏิบัติงานข้อใดต่อไปนี้?","choices":[{"key":"ก","text":"ยกเว้นการสอบทานธุรกรรมเดิมโดยเด็ดขาด"},{"key":"ข","text":"ยกเว้นการบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อ"},{"key":"ค","text":"ยกเว้นการบันทึกข้อมูลในระบบวิเคราะห์ฟีนิกซ์ และเอกสาร Credit Approval"},{"key":"ง","text":"ยกเว้นการจัดทำนิติกรรมสัญญากู้เงินฉบับใหม่"}],"answer":"ค","explanation":"การต่ออายุสัญญาในเงื่อนไขผ่อนปรน (วงเงินเท่าเดิม/โครงการเดิม/คุณสมบัติครบ) สิ่งที่ธนาคารอนุโลมให้ \"ยกเว้น\" คือ การบันทึกข้อมูลในระบบวิเคราะห์ฟีนิกซ์, การจัดทำ Credit Approval, และการทำรายงานกลั่นกรอง (Credit Write up) ครับ ส่วนการบันทึกเอกสารคำขอยังต้องทำปกติ"},{"num":330,"q":"หากลูกค้าที่มีหนี้ปกติ ต้องการขอ \"ตัดต้นไม้\" ในที่ดินซึ่งธนาคารรับจำนองไว้ ธนาคารสามารถอนุญาตได้โดยที่ดินต้องมี ราคาประเมินใหม่ไม่น้อยกว่าราคาเดิม อยากทราบว่าอำนาจการพิจารณาอนุมัติในระดับสาขาเป็นของใคร?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก อนุญาตได้ หากที่ดินยังมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้"},{"num":331,"q":"ตามระเบียบฉบับที่ 84 หากลูกค้า \"กลุ่มเกษตรกร หรือ สหกรณ์การเกษตร\" ขอไถ่ถอนที่ดินซึ่งติดจำนองกับธนาคาร \"เพื่อนำไปขายและนำเงินส่งชำระหนี้คืนธนาคารไม่น้อยกว่าร้อยละ 80\" (โดยไม่ใช่แปลงที่ตั้งโครงการ) อำนาจการพิจารณา อนุมัติในกรณีนี้เป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"}],"answer":"ข","explanation":"ตามระเบียบ 84 (หมวดกิจการเกี่ยวกับที่ดินรับจำนอง) หากสถาบันเกษตรกรขอไถ่ถอนที่ดินเพื่อไปขายและจะ นำเงินมาชำระหนี้คืนธนาคาร \"ไม่น้อยกว่าร้อยละ 80\" อำนาจการอนุมัติในกรณีนี้คือ ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) (หรือส่งให้ ผอ.พธ. เป็นผู้อนุมัติตามลำดับ)"},{"num":332,"q":"การคำนวณเพื่อกำกับลูกหนี้รายใหญ่ (Single Lending Limit : SLL) เพื่อป้องกันความเสี่ยงจากการกระจุกตัวของสินเชื่อ ธนาคารกำหนดให้วงเงินกู้รวมของกลุ่ม (Total Group Exposure) ต้องไม่เกินร้อยละเท่าใดของเงินกองทุนธนาคารทั้งสิ้น?","choices":[{"key":"ก","text":"ร้อยละ 10"},{"key":"ข","text":"ร้อยละ 15"},{"key":"ค","text":"ร้อยละ 20"},{"key":"ง","text":"ร้อยละ 25"}],"answer":"ข","explanation":"การคำนวณ SLL คือกฎเหล็กเพื่อป้องกันไม่ให้ธนาคารกระจุกตัวในการปล่อยสินเชื่อกับกลุ่มใดกลุ่มหนึ่งมาก เกินไป ธปท. และธนาคารกำหนดให้วงเงินรวมของกลุ่ม (Total Group Exposure) ต้อง ไม่เกินร้อยละ 15 ของเงินกองทุน ธนาคารทั้งสิ้น ครับ"},{"num":333,"q":"[Case Study] สหกรณ์นอกภาคการเกษตร ขอกู้เงินประเภท \"เบิกเงินเกินบัญชี (O/D ตามข้อบังคับ ฉ.56)\" เป็นวงเงิน 80 ล้านบาท อำนาจการพิจารณาอนุมัติโครงการนี้จะตกเป็นของระดับใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ค","explanation":"สำหรับ \"สหกรณ์นอกภาคการเกษตร\" (ฉ.46) หากขอกู้ประเภท O/D (ฉ.56) เพดานของระดับกลาง (CC2) จะสุด อยู่ที่ 60 ล้านบาท ดังนั้น หากขอกู้ถึง 80 ล้านบาท จะตกเป็นอำนาจของ คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับ ธนาคาร (ซึ่งมีเพดานไม่เกิน 100 ล้านบาท) ครับ"},{"num":334,"q":"จากโครงสร้างอำนาจการอนุมัติ สำหรับลูกค้าประเภท \"ผู้ประกอบการ นิติบุคคล\" (ตามข้อบังคับ ฉ.45) หากต้องการขอกู้ เงินเพื่อดำเนินงาน \"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร\" มีเพดานอนุมัติวงเงินกู้รวมได้สูงสุดไม่เกิน เท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 100 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 200 ล้านบาท"}],"answer":"ค","explanation":"โครงสร้างอำนาจอนุมัติสำหรับลูกค้าประเภท \"ผู้ประกอบการ นิติบุคคล\" (ตาม ฉ.45) วงเงินกู้เพื่อดำเนินงาน ของระดับต้น (CC1) <= 10 ลบ. / ระดับกลาง (CC2) <= 50 ลบ. / และ ระดับธนาคาร <= 200 ล้านบาท ครับ"},{"num":335,"q":"กรณีที่ผู้กู้ได้ชำระหนี้เสร็จสิ้นและมีความประสงค์ขอ \"ยกเลิกการจดทะเบียนสัญญาหลักประกันทางธุรกิจ\" ธนาคาร กำหนดให้บุคคลใดมีอำนาจในการอนุมัติดำเนินการได้?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) (หรือ ผช.ผจข. ดำเนินการแทน)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 หมวดการจัดการหลักประกันทางธุรกิจ ข้อ 28.3 การขอยกเลิกการจดทะเบียนสัญญา หลักประกันทางธุรกิจ (เมื่อชำระหนี้เสร็จสิ้น) ธนาคารมอบอำนาจให้ ผู้จัดการสาขา (ผจข.) โดยมี ผช.ผจข. ดำเนินการ แทนได้ เป็นผู้มีอำนาจอนุมัติครับ"},{"num":336,"q":"ตามกำหนดระยะเวลาการปฏิบัติงาน (SLA) สำหรับการพิจารณาอนุมัติสินเชื่อลูกค้ารายใหญ่ หากโครงการนั้นตกอยู่ใน อำนาจอนุมัติของ \"คณะกรรมการระดับต้น (CC1)\" ระบบกำหนดให้ใช้ระยะเวลาดำเนินการรวมทั้งสิ้น (SLA) ไม่เกินกี่วันทำ การ?","choices":[{"key":"ก","text":"10 วันทำการ"},{"key":"ข","text":"15 วันทำการ"},{"key":"ค","text":"22 วันทำการ"},{"key":"ง","text":"35 วันทำการ"}],"answer":"ข","explanation":"ระยะเวลาการปฏิบัติงาน (SLA) ตามบันทึก พธ/ว 548 สำหรับคณะกรรมการระดับต้น (CC1) กำหนดกรอบเวลา ไว้ที่ 15 วันทำการ (แบ่งเป็น ผู้ทำหน้าที่วิเคราะห์ 8 วัน + ผู้กลั่นกรอง 4 วัน + ผู้อนุมัติ 3 วัน) ครับ"},{"num":337,"q":"เพื่อเป็นการป้องกันความเสี่ยงด้านกฎหมาย กฎหมายข้อมูลเครดิต (มาตรา 20) ระบุว่า หากพนักงาน \"สืบค้นข้อมูล เครดิตโดยปราศจากความยินยอมของเจ้าของข้อมูล\" จะต้องรับโทษทางอาญาตามข้อใด?","choices":[{"key":"ก","text":"ปรับไม่เกิน 1 แสนบาท"},{"key":"ข","text":"จำคุกไม่เกิน 1 ปี หรือปรับไม่เกิน 1 แสนบาท"},{"key":"ค","text":"จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท หรือทั้งจำทั้งปรับ"},{"key":"ง","text":"จำคุกไม่เกิน 5 ปี หรือปรับไม่เกิน 5 แสนบาท หรือทั้งจำทั้งปรับ"}],"answer":"ค","explanation":"พระราชบัญญัติการประกอบธุรกิจข้อมูลเครดิต มาตรา 20 มีบทลงโทษรุนแรงสำหรับการ \"ละเมิดหรือสืบค้น ข้อมูลโดยที่ลูกค้าไม่ได้ให้ความยินยอม\" ซึ่งจะมีโทษทางอาญาคือ จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท หรือทั้งจำ ทั้งปรับ ครับ"},{"num":338,"q":"สหกรณ์การเกษตร ขอกู้เงินตามข้อบังคับ ฉ.60 \"เพื่อการค้าระหว่างประเทศ (Trade Finance)\" อำนาจการพิจารณาอนุมัติ ของ \"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร\" จะมีเพดานวงเงินกู้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 80 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 100 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 200 ล้านบาท"}],"answer":"ง","explanation":"โครงสร้างเพดานสำหรับสินเชื่อการค้าระหว่างประเทศ (Trade Finance ตาม ฉ.60) ของกลุ่มสหกรณ์การเกษตร กำหนดให้ระดับกลาง (CC2) อนุมัติได้ไม่เกิน 100 ล้านบาท และ ระดับธนาคาร อนุมัติได้ไม่เกิน 200 ล้านบาท ครับ"},{"num":339,"q":"ในการกำหนดเพดานอำนาจอนุมัติสำหรับกลุ่มลูกค้า \"กองทุนหมู่บ้าน (กทบ.)\" ที่ขอกู้ประเภทเบิกเงินเกินบัญชี (O/D ตาม ฉ.56) คณะกรรมการระดับกลาง (CC2) มีอำนาจพิจารณาอนุมัติวงเงินได้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 20 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 25 ล้านบาท"}],"answer":"ข","explanation":"เพื่อควบคุมความเสี่ยงของ กองทุนหมู่บ้าน (กทบ.) สำหรับการขอกู้แบบ O/D เพดานอำนาจอนุมัติของ คณะกรรมการระดับกลาง (CC2) ถูกจำกัดไว้เพียง \"ไม่เกิน 10 ล้านบาท\" เท่านั้นครับ (ถ้าเกิน 10 ล้านจะเป็นของระดับ ธนาคารทันที)"},{"num":340,"q":"ตามตารางอำนาจการดำเนินการหลังการให้กู้ (ระเบียบ 83) การพิจารณา \"ผัดชำระเงินรายงวด หรือขยายเวลาชำระหนี้\" ให้กับลูกค้า \"กลุ่มสถาบัน (สหกรณ์การเกษตร / สหกรณ์นอกภาคฯ)\" อำนาจการอนุมัติในระดับแรกสุดเริ่มต้นที่บุคคลระดับใด (ระดับสาขาไม่มีอำนาจ)?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ/ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับต้น (CC1)"}],"answer":"ข","explanation":"ตามตารางอำนาจหลังการให้กู้ (ระเบียบ 83) สำหรับลูกค้ากลุ่มสถาบัน (สหกรณ์) การขอผัดชำระเงินรายงวด หรือขยายเวลา \"ระดับสาขาจะไม่มีอำนาจอนุมัติ\" โดยอำนาจแรกสุดจะเริ่มต้นที่ระดับ ผู้อำนวยการ หรือผู้ช่วย ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.) ครับ"},{"num":341,"q":"โครงสร้างอำนาจอนุมัติ สำหรับลูกค้าประเภท \"เกษตรกร\" (ตามข้อบังคับ ฉ.44) หากมีความประสงค์ขอกู้เงินรวมทุก สัญญาเป็นจำนวน \"110 ล้านบาท\" อำนาจการพิจารณาอนุมัติจะตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ค","text":"คณะอนุกรรมการกลั่นกรอง / คณะกรรมการธนาคาร (Board)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามตารางโครงสร้างอำนาจอนุมัติ สำหรับกลุ่มเกษตรกรและบุคคลธรรมดา (ฉ.44, 45) เพดานอำนาจของ ระดับธนาคารจะสิ้นสุดที่ ไม่เกิน 100 ล้านบาท หากมีการขอกู้รวมทะลุเป็น 110 ล้านบาท อำนาจจะถูกส่งต่อไปที่ \"คณะอนุกรรมการกลั่นกรอง หรือ คณะกรรมการธนาคาร (Board)\" ทันทีครับ"},{"num":342,"q":"กลุ่มบุคคล (เช่น วิสาหกิจชุมชน / สถาบันการเงินชุมชน) ขอกู้เงินตามข้อบังคับ ฉ.45 \"คณะกรรมการพิจารณาอนุมัติ สินเชื่อระดับกลาง (CC2)\" จะมีกรอบอำนาจอนุมัติวงเงินกู้รวมสูงสุดได้ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 100 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 200 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 500 ล้านบาท"}],"answer":"ข","explanation":"สำหรับกลุ่มบุคคล (วิสาหกิจชุมชน / สถาบันการเงินชุมชน) คณะกรรมการระดับกลาง (CC2) จะมีกรอบ อำนาจรวม (Total Exposure) สูงสุดที่ \"ไม่เกิน 100 ล้านบาท\" ครับ"},{"num":343,"q":"ลูกค้าสหกรณ์การเกษตรขอกู้เงิน \"เพื่อเป็นทุนให้สมาชิกกู้\" (ตาม ฉ.31 ข้อ 2(1)) โครงสร้างอำนาจกำหนดให้ \"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร\" มีเพดานอำนาจอนุมัติตามวัตถุประสงค์ไว้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 9 เท่าแห่งทุน (กรอบรวมไม่เกิน 700 ล้านบาท)"},{"key":"ข","text":"ไม่เกิน 15 เท่าแห่งทุน (กรอบรวมไม่เกิน 700 ล้านบาท)"},{"key":"ค","text":"ไม่เกิน 20 เท่าแห่งทุน"},{"key":"ง","text":"สูงสุดไม่เกิน 100 ล้านบาท"}],"answer":"ข","explanation":"สหกรณ์การเกษตรขอกู้ตาม ฉ.31 ข้อ 2(1) \"เพื่อเป็นทุนให้สมาชิกกู้\" ระดับธนาคารจะมีเพดานอำนาจอนุมัติ ตามวัตถุประสงค์อยู่ที่ \"ไม่เกิน 15 เท่าแห่งทุน\" (และถูกควบคุมด้วยกรอบอำนาจรวมที่ ไม่เกิน 700 ล้านบาท) ครับ"},{"num":344,"q":"จากเพดานโครงสร้างอำนาจใหม่ ลูกค้ากลุ่ม \"ผู้ประกอบการ นิติบุคคล\" (ตาม ฉ.45) หากขอกู้เงินประเภท \"เบิกเงิน เกินบัญชี (O/D ตาม ฉ.56)\" คณะกรรมการระดับต้น (CC1) จะมีอำนาจพิจารณาอนุมัติวงเงินได้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 25 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 50 ล้านบาท"}],"answer":"ก","explanation":"สำหรับลูกค้านิติบุคคล (ผู้ประกอบการ) ที่ขอกู้ประเภทวงเงิน O/D (ตาม ฉ.56) โครงสร้างใหม่ได้ปรับให้อำนาจ ของคณะกรรมการระดับต้น (CC1) อนุมัติได้เฉพาะวงเงินขนาดเล็กมากคือ \"ไม่เกิน 3 ล้านบาท\" เท่านั้นครับ"},{"num":345,"q":"สหกรณ์นอกภาคการเกษตร (ตาม ฉ.46) ขอกู้เงินเพื่อ \"เป็นค่าลงทุนในการดำเนินธุรกิจ\" (ตามข้อ 3(2)) คณะกรรมการ ระดับกลาง (CC2) มีอำนาจพิจารณาอนุมัติวงเงินกู้สูงสุดได้ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 50 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 60 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 80 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 100 ล้านบาท"}],"answer":"ข","explanation":"สำหรับสหกรณ์นอกภาคการเกษตร (ฉ.46) หากขอกู้เป็น \"ค่าลงทุน\" (ข้อ 3(2)) อำนาจของคณะกรรมการ ระดับกลาง (CC2) จะมีเพดานสูงสุดอยู่ที่ \"ไม่เกิน 60 ล้านบาท\" ครับ"},{"num":346,"q":"ตามตารางอำนาจการดำเนินการหลังการให้กู้ (ระเบียบ 83) การพิจารณา \"เรียกคืนเงินกู้\" สำหรับลูกค้า \"บุคคล (ฉ. 45)\" อำนาจอนุมัติในระดับแรกสุดเริ่มต้นที่บุคคลระดับใด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตารางอำนาจหลังการให้กู้ (ระเบียบ 83 ข้อ 5(3)) ระบุว่า การเรียกคืนเงินกู้สำหรับลูกค้าบุคคล (รวมถึงนิติ บุคคลและกลุ่มบุคคล) อำนาจจะเริ่มต้นที่ \"ผู้จัดการสาขา (ผจข.)\" เป็นผู้ตัดสินใจดำเนินการระงับความเสียหายครับ"},{"num":347,"q":"ตามระเบียบฉบับที่ 83 หากลูกค้ารายใหญ่ (เช่น สหกรณ์การเกษตร) มีสินค้าคงคลังน้อยกว่ามูลค่าหนี้ และต้องการ พิจารณา \"งดเว้นการชำระเงินกู้ส่วนต่าง\" อำนาจในการพิจารณาอนุมัติตกเป็นของใคร?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"ผู้ช่วยผู้จัดการธนาคาร (ผช.ผจก. สายงาน บส.) หรือ รองผู้จัดการธนาคาร (รอง.ผจก. สายงาน ธจ.)"}],"answer":"ง","explanation":"เป็นอำนาจเฉพาะทาง (ตามระเบียบ 83 ข้อ 8(1)) สำหรับลูกค้ารายใหญ่กรณีสินค้าคงคลังน้อยกว่ามูลค่าหนี้ การพิจารณาอนุมัติให้ \"งดเว้นการชำระเงินกู้ส่วนต่าง\" จะถูกดึงขึ้นไปที่ระดับบริหาร คือ \"ผู้ช่วยผู้จัดการธนาคาร (ผช.ผจก. สายงาน บส.) หรือ รองผู้จัดการธนาคาร (รอง.ผจก. สายงาน ธจ.)\" ครับ"},{"num":348,"q":"ตามระเบียบฉบับที่ 77 ว่าด้วยลูกค้าผู้กู้ กรณี \"กลุ่มบุคคล\" ประสงค์ขอกู้เงิน แต่ต้องพิจารณาขอ \"ผ่อนผันการยกเว้น คุณสมบัติรับขึ้นทะเบียนเป็นลูกค้า\" ในบางข้อ อำนาจการอนุมัติผ่อนผันเป็นของใครเป็นระดับแรก (โดยต้องบันทึกความเห็น ประกอบ)?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"คณะกรรมการระดับกลาง (CC2)"}],"answer":"ข","explanation":"ระเบียบ 77 ว่าด้วยการรับขึ้นทะเบียนลูกค้า (หมวดที่ 1) หากลูกค้า \"กลุ่มบุคคล\" มีลักษณะต้องผ่อนผัน ข้อยกเว้นบางประการ อำนาจการพิจารณาเริ่มต้นจะอยู่ที่ \"ผู้จัดการสาขา (ผจข.)\" โดยต้องบันทึกเหตุผลประกอบเสมอ ครับ"},{"num":349,"q":"ตามระเบียบฉบับที่ 84 การอนุญาตให้บุคคลภายนอก \"เช่า\" ที่ดินหรือสิ่งปลูกสร้างที่ติดภาระจำนองกับธนาคาร (สำหรับลูกค้าเกษตรกรและบุคคล) หากอายุการเช่า \"เกินกว่า 3 ปี\" (ต้องจดทะเบียนต่อพนักงานเจ้าหน้าที่) ใครเป็นผู้มีอำนาจ อนุมัติ?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับกลาง (CC2)"}],"answer":"ข","explanation":"การปล่อยให้ผู้อื่นเช่าที่ดินที่ติดจำนองกับธนาคาร \"เกินกว่า 3 ปี\" (ซึ่งมีผลผูกพันทางกฎหมายยาวนาน) ระเบียบ 84 ให้อำนาจพิจารณาแก่ระดับจังหวัด คือ \"ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ ผช.ผอจ.)\" ครับ"},{"num":350,"q":"[Case Study] สหกรณ์การเกษตรแห่งหนึ่งขอกู้เงินเพื่อเป็น \"ทุนขายผลผลิต\" (ตาม ฉ.31 ข้อ 2(3)) ในวงเงิน \"90 ล้าน บาท\" อำนาจการพิจารณาอนุมัติวงเงินกู้ในโปรเจ็กต์นี้ จะตกเป็นของคณะบุคคลใด?","choices":[{"key":"ก","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับต้น (CC1)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง (CC2)"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับธนาคาร"},{"key":"ง","text":"คณะอนุกรรมการกลั่นกรอง"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก คณะกรรมการระดับธนาคาร"}];
let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
</body>
</html>
