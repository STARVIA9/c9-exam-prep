<!DOCTYPE html>
<html lang="th">
<head>

<title>แบบฝึกหัดกิ่งที่ 5: งานพิธีการสินเชื่อ (100 ข้อ)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#dc2626,#dc2626dd);padding:24px 20px;text-align:center}
.header h1{font-size:1.4em;color:#fff;margin-bottom:8px}
.header p{color:rgba(255,255,255,.85);font-size:.95em}
.stats{display:flex;justify-content:center;gap:16px;padding:12px 20px;background:#1e293b}
.stat{text-align:center}
.stat .num{font-size:1.5em;font-weight:700;color:#dc2626}
.stat .label{font-size:.8em;color:#94a3b8}
.controls{padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#dc2626;color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid #dc2626;color:#dc2626}
.btn-outline:hover{background:#dc262622}
.progress-bar{height:4px;background:#334155;margin:0 20px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#dc2626;transition:width .3s;width:0%}
.quiz-area{padding:20px;max-width:800px;margin:0 auto}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #dc2626}
.q-num{color:#dc2626;font-weight:700;font-size:.9em;margin-bottom:8px}
.q-text{font-size:1.05em;line-height:1.6;margin-bottom:12px}
.choice{padding:10px 14px;margin:6px 0;border-radius:8px;cursor:pointer;transition:all .2s;background:#334155;border:2px solid transparent}
.choice:hover{border-color:#dc2626;background:#dc262622}
.choice.selected{border-color:#dc2626;background:#dc262633}
.choice.correct{border-color:#22c55e;background:#22c55e22}
.choice.wrong{border-color:#ef4444;background:#ef444422}
.explanation{margin-top:12px;padding:12px;background:#0f172a;border-radius:8px;border-left:4px solid #22c55e;font-size:.9em;line-height:1.6;color:#94a3b8}
.explanation strong{color:#22c55e}
.choice .key{font-weight:700;color:#dc2626;margin-right:8px}
.result-card{text-align:center;padding:40px 20px;display:none}
.result-card h2{font-size:1.8em;margin-bottom:12px}
.result-score{font-size:3em;font-weight:700;color:#dc2626}
.result-text{font-size:1.1em;color:#94a3b8;margin:12px 0}
.footer{text-align:center;padding:20px;color:#64748b;font-size:.85em}
</style>
</head>
<body>
<div class="header">
<h1>📋 กิ่งที่ 5</h1>
<p>งานพิธีการสินเชื่อ</p>
</div>
<div class="stats">
<div class="stat"><div class="num" id="totalQ">100</div><div class="label">ข้อทั้งหมด</div></div>
<div class="stat"><div class="num" id="answered">0</div><div class="label">ตอบแล้ว</div></div>
<div class="stat"><div class="num" id="score">0</div><div class="label">คะแนน</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="controls">
<button class="btn btn-primary" onclick="showAll()">เปิดทั้งหมด</button>
<button class="btn btn-outline" onclick="showAnswers()">เฉลยทั้งหมด</button>
<button class="btn btn-outline" onclick="reset()">รีเซ็ต</button>
</div>
<div class="quiz-area" id="quizArea"></div>
<div class="result-card" id="result">
<h2>&#127942; ผลลัพธ์</h2>
<div class="result-score" id="resultScore">0/100</div>
<div class="result-text" id="resultText"></div>
<button class="btn btn-primary" onclick="reset()">ทำใหม่</button>
</div>
<div class="footer">ธ.ก.ส. สาขาวังท่าช้าง | แบบฝึกหัดวิชาสินเชื่อ 555 ข้อ</div>
<script>
const questions=[{"num":351,"q":"ตามขั้นตอนงานพิธีการสินเชื่อ การจัดทำ \"สัญญาประธาน\" (สัญญาหลักที่ใช้ก่อหนี้) หมายถึงเอกสารในข้อใดต่อไปนี้?","choices":[{"key":"ก","text":"สัญญาจำนอง"},{"key":"ข","text":"หนังสือค้ำประกันบุคคล"},{"key":"ค","text":"หนังสือสัญญากู้เงิน"},{"key":"ง","text":"สัญญาหลักประกันทางธุรกิจ"}],"answer":"ค","explanation":"\"สัญญาประธาน\" หมายถึง ตัวหนังสือกู้เงินที่ใช้ก่อหนี้โดยตรงครับ เช่น หนังสือสัญญากู้เงินระยะสั้น, ระยะยาว หรือสัญญา ปปน. (ส่วนสัญญาจำนอง หรือหนังสือค้ำประกัน จะถือเป็น \"สัญญาอุปกรณ์\")"},{"num":352,"q":"เพื่อเป็นการคานอำนาจ (Maker / Checker) ในระบบงานของธนาคาร ก่อนที่จะส่งเรื่องไปดำเนินการจ่ายเงินกู้ (Disbursement) ผู้ทำหน้าที่ตรวจสอบ (Checker) จะต้องดำเนินการในข้อใดให้เสร็จสมบูรณ์ในระบบ?","choices":[{"key":"ก","text":"คีย์สร้างคำขอค้ำประกันในระบบ บสย. (AAG)"},{"key":"ข","text":"ผูกความสัมพันธ์บัญชีสินเชื่อและหลักประกัน (Account & Collateral Link)"},{"key":"ค","text":"คีย์สร้างข้อมูลหลักประกัน (Collateral) เบื้องต้น"},{"key":"ง","text":"จัดพิมพ์คู่ฉบับสัญญากู้เงิน"}],"answer":"ข","explanation":"ระบบ Maker/Checker ถูกสร้างมาเพื่อคานอำนาจและลดข้อผิดพลาด ผู้ทำหน้าที่ตรวจสอบ (Checker) เช่น ผจข. หรือ ผช.ผจข. จะต้องตรวจสอบความถูกต้อง และกด \"ผูกความสัมพันธ์บัญชีสินเชื่อ (Account link) และ หลักประกัน (Collateral link)\" ในระบบ ก่อนส่งไปจ่ายเงินกู้เสมอครับ"},{"num":353,"q":"ตามเกณฑ์การมอบอำนาจงานพิธีการสินเชื่อ ผู้จัดการสาขาสามารถมอบอำนาจให้พนักงานสาขาจัดทำเอกสารนิติกรรม สัญญากู้เงิน สำหรับ \"ลูกค้าเกษตรกรและบุคคล\" ที่มีวงเงินกู้รวมกันทุกข้อบังคับสูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 2 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 5 ล้านบาท"}],"answer":"ค","explanation":"ผู้จัดการสาขาสามารถทำคำสั่งมอบหมายให้พนักงานสาขาจัดทำเอกสารนิติกรรมสัญญากู้เงิน/หลักประกัน สำหรับลูกค้า \"เกษตรกรและบุคคล\" ที่มีวงเงินกู้รวมกันทุกข้อบังคับ ไม่เกิน 3 ล้านบาท"},{"num":354,"q":"จากข้อที่แล้ว หากเป็นลูกค้ากลุ่ม \"กลุ่มบุคคล (วิสาหกิจชุมชน) และ กองทุนหมู่บ้าน\" ผู้จัดการสาขาสามารถมอบอำนาจ ให้พนักงานสาขาจัดทำนิติกรรมสัญญาได้ ในวงเงินกู้รวมสูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 2 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 5 ล้านบาท"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก ไม่เกิน 3 ล้านบาท"},{"num":355,"q":"ตามระเบียบฉบับที่ 93 ว่าด้วยการให้สินเชื่อ ธนาคารเปิดช่องให้ \"หัวหน้าหน่วยอำเภอ (หนภ.)\" มีอำนาจอนุมัติ \"รายงาน เบิกเงินกู้\" (เครดิตเงินสด) ได้ในวงเงินสูงสุดรวมกันไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 100,000 บาท"},{"key":"ข","text":"ไม่เกิน 200,000 บาท"},{"key":"ค","text":"ไม่เกิน 300,000 บาท"},{"key":"ง","text":"ไม่เกิน 500,000 บาท"}],"answer":"ข","explanation":"อำนาจการอนุมัติรายงานเบิกเงินกู้ปกติเป็นของ ผจข. และ ผช.ผจข. แต่ธนาคารผ่อนปรนให้ หัวหน้าหน่วย อำเภอ (หนภ.) สามารถอนุมัติรายงานเบิกเงินกู้ (เครดิตเงินสด) ได้ในวงเงินรวมกัน ไม่เกิน 200,000 บาท เพื่อความ รวดเร็วครับ"},{"num":356,"q":"ตามกฎเหล็กบันทึกเวียน พธ/ว 1132 เมื่อลูกค้าลงนามในหนังสือสัญญากู้เงินเสร็จเรียบร้อยแล้ว พนักงานจะต้องจัดทำ \"คู่ฉบับ\" จำนวน 1 ฉบับเพื่อส่งมอบให้ลูกค้า โดยมีเงื่อนไขอย่างไร?","choices":[{"key":"ก","text":"ส่งมอบให้ลูกค้าภายใน 7 วันทำการ"},{"key":"ข","text":"ส่งมอบให้ลูกค้าในวันลงนามทันที พร้อมประทับตรายางรับคู่ฉบับ"},{"key":"ค","text":"ส่งมอบให้เมื่อลูกค้าส่งชำระหนี้งวดแรกเสร็จสิ้น"},{"key":"ง","text":"ไม่ต้องทำคู่ฉบับหากวงเงินกู้ไม่เกิน 1 แสนบาท"}],"answer":"ข","explanation":"กฎเหล็กตาม พธ/ว 1132 กำหนดว่าต้องจัดทำคู่ฉบับให้ลูกค้า และต้อง \"ส่งมอบให้ลูกค้าในวันลงนามทันที\" โดยต้องประทับตรายางบนต้นฉบับว่า \"ได้รับคู่ฉบับหนังสือสัญญากู้เงินแล้ว\" เพื่อเป็นหลักฐานครับ"},{"num":357,"q":"จากกฎเรื่องการจัดทำคู่ฉบับให้ลูกค้า เอกสารการกู้เงินประเภทใดต่อไปนี้ที่ธนาคาร \"อนุโลมให้ไม่ต้องจัดทำคู่ฉบับ\" เพื่อ ส่งมอบให้ลูกค้า?","choices":[{"key":"ก","text":"สัญญากู้ระยะสั้น"},{"key":"ข","text":"หนังสือสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.)"},{"key":"ค","text":"สัญญากู้ระยะยาว"},{"key":"ง","text":"รายงานเบิกเงินกู้ (หนังสือกู้เงินเครดิตเงินสด)"}],"answer":"ง","explanation":"การเบิกเงินกู้ผ่าน \"รายงานเบิกเงินกู้\" (สำหรับหนังสือกู้เงินเครดิตเงินสด) ธนาคารอนุโลมให้พนักงาน ไม่ ต้องทำคู่ฉบับ ส่งมอบให้ลูกค้าครับ (แต่ถ้าเป็นสัญญากู้ปกติ หรือ ปปน. บังคับว่าต้องทำเสมอ)"},{"num":358,"q":"ข้อใดต่อไปนี้ จัดเป็น \"สัญญาอุปกรณ์\" ที่ต้องทำขึ้นเพื่อให้มีผลทางกฎหมายในการเรียกร้องสิทธิตามหลักประกันนั้นๆ?","choices":[{"key":"ก","text":"หนังสือสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.)"},{"key":"ข","text":"หนังสือกู้เงินระยะยาว"},{"key":"ค","text":"หนังสือค้ำประกัน บสย."},{"key":"ง","text":"รายงานเบิกเงินกู้"}],"answer":"ค","explanation":"สัญญาอุปกรณ์ คือสัญญาที่ทำขึ้นเพื่อรองรับสัญญาประธานให้มีผลผูกพันทางกฎหมายด้านหลักประกัน ได้แก่ สัญญาจำนอง, สัญญาค้ำประกันบุคคล, หนังสือค้ำประกัน บสย., และสัญญาหลักประกันทางธุรกิจครับ"},{"num":359,"q":"ในการลงนามนิติกรรมสัญญา หากผู้กู้เป็น \"ลูกค้านิติบุคคล\" พนักงานพิธีการสินเชื่อจะต้องตรวจสอบผู้มีอำนาจลงนาม และเงื่อนไขการลงนามจากเอกสารใดเป็นหลัก?","choices":[{"key":"ก","text":"บัตรประชาชนของกรรมการทุกคน"}],"answer":"ข","explanation":"กรณีลูกค้านิติบุคคล (บริษัท/ห้างหุ้นส่วน) พนักงานพิธีการฯ ต้องตรวจสอบรายชื่อผู้มีอำนาจลงนามผูกพันนิติ บุคคล รวมถึงตราประทับ จาก \"หนังสือรับรองนิติบุคคล\" ที่ออกโดยกระทรวงพาณิชย์เป็นหลักครับ"},{"num":360,"q":"สำหรับการจัดทำ \"สัญญาจำนอง\" ซึ่งเป็นหลักประกันของลูกค้ารายย่อย ธนาคารได้กำหนดให้บุคคลใดสามารถเป็น ผู้จัดทำสัญญานี้ได้เพื่อความคล่องตัว?","choices":[{"key":"ก","text":"นิติกรประจำสาขาเท่านั้น"},{"key":"ข","text":"พนักงานสาขาที่ได้รับมอบหมาย"},{"key":"ค","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) เท่านั้น"},{"key":"ง","text":"เจ้าพนักงานที่ดินเท่านั้น"}],"answer":"ข","explanation":"การทำสัญญาจำนองหลักประกันสำหรับลูกค้ารายย่อย ธนาคารอนุญาตให้ \"พนักงานสาขาที่ได้รับ มอบหมาย\" สามารถดำเนินการเป็นผู้จัดทำ (Maker) นิติกรรมสัญญานี้ได้เลยเพื่อความสะดวกรวดเร็วครับ"},{"num":361,"q":"ตามมาตรฐานระยะเวลาการปฏิบัติงาน (SLA) ของกระบวนการอำนวยสินเชื่อ เมื่อลูกค้าได้ปฏิบัติตามเงื่อนไขอนุมัติและ ได้รับเอกสารครบถ้วนแล้ว \"ฝ่ายพิธีการสินเชื่อ\" จะต้องดำเนินการให้แล้วเสร็จภายในกี่วันทำการ?","choices":[{"key":"ก","text":"1 วันทำการ"},{"key":"ข","text":"2 วันทำการ"},{"key":"ค","text":"3 วันทำการ"},{"key":"ง","text":"5 วันทำการ"}],"answer":"ค","explanation":"ตามมาตรฐาน SLA ของกระบวนการอำนวยสินเชื่อ เมื่อลูกค้าปฏิบัติตามเงื่อนไขครบถ้วนแล้ว ฝ่ายพิธีการ สินเชื่อจะมีเวลาดำเนินการจัดทำนิติกรรมและจ่ายเงินกู้ให้แล้วเสร็จภายใน \"3 วันทำการ\" ครับ"},{"num":362,"q":"\"สัญญาประธาน\" ในความหมายของงานพิธีการสินเชื่อ หมายรวมถึงเอกสารในข้อใดต่อไปนี้ด้วย?","choices":[{"key":"ก","text":"สัญญาจำนองที่ดิน"},{"key":"ข","text":"บันทึกข้อตกลงต่อท้ายสัญญากู้ยืมเงิน"},{"key":"ค","text":"หนังสือค้ำประกัน บสย."},{"key":"ง","text":"สัญญาหลักประกันทางธุรกิจ"}],"answer":"ข","explanation":"\"สัญญาประธาน\" คือสัญญาหลักที่ก่อให้เกิดหนี้ ซึ่งหมายถึงสัญญาหรือหนังสือกู้เงิน และยัง \"รวมถึงบันทึก ข้อตกลงต่อท้ายสัญญากู้ยืมเงิน\" เข้าไปด้วยครับ ส่วนข้ออื่นเป็นสัญญาอุปกรณ์ทั้งหมด"},{"num":363,"q":"กรณีที่ลูกค้าตกลงยอมรับเงื่อนไขการอนุมัติเรียบร้อยแล้ว แต่สาขายังไม่สามารถดำเนินการเบิกจ่ายเงินกู้ให้ได้จริงใน ขณะนั้น พนักงานจะต้องระบุหมายเหตุในเอกสารเตรียมการเบิกจ่ายสินเชื่อว่าอย่างไร?","choices":[{"key":"ก","text":"รอการเบิกจ่ายตามงวดงานที่กำหนด"},{"key":"ข","text":"อำนวยความสะดวกให้แก่ลูกค้าผู้กู้โดยสาขายังไม่สามารถดำเนินการเบิกจ่ายเงินกู้ได้จริง"},{"key":"ค","text":"พักการเบิกจ่ายเงินกู้ชั่วคราวเพื่อรอหลักประกัน"},{"key":"ง","text":"อนุมัติแบบมีเงื่อนไขและรอการเบิกจ่าย"}],"answer":"ข","explanation":"หากลูกค้าตกลงรับเงื่อนไขแล้วแต่สาขายังจ่ายเงินกู้ไม่ได้ พนักงานต้องระบุหมายเหตุใน Disbursement Control Sheet ว่า “อำนวยความสะดวกให้แก่ลูกค้าผู้กู้โดยสาขายังไม่สามารถดำเนินการเบิกจ่ายเงินกู้ได้จริง” เพื่อเป็นหลักฐานใน ระบบครับ"},{"num":364,"q":"ตามบันทึกเวียน พธ/ว 254 ว่าด้วยการขอสินเชื่อเพื่อ \"ซื้อที่ดิน\" หรือ \"Refinance\" การจ่ายเงินกู้เพื่อป้องกันความเสี่ยง จะต้องดำเนินการด้วยวิธีใด?","choices":[{"key":"ก","text":"โอนเงินกู้เข้าบัญชีเงินฝากออมทรัพย์ของผู้กู้โดยตรง"},{"key":"ข","text":"จ่ายเป็นเงินสดให้ลูกค้าไปดำเนินการ ณ สำนักงานที่ดิน"},{"key":"ค","text":"ออก \"แคชเชียร์เช็ค\" ระบุชื่อผู้ขายที่ดินหรือสถาบันการเงินตามวงเงินกู้"},{"key":"ง","text":"ออกดราฟต์ระบุชื่อผู้จัดการสาขาเพื่อนำไปเบิกจ่าย"}],"answer":"ค","explanation":"ตามบันทึก พธ/ว 254 เพื่ออุดช่องโหว่ความเสี่ยง กรณีซื้อที่ดินหรือ Refinance ธนาคารบังคับให้จ่ายเงินกู้โดย ออก “แคชเชียร์เช็ค” ระบุชื่อผู้ขายที่ดินหรือสถาบันการเงิน ตามวงเงินกู้หรือเงื่อนไขที่อนุมัติเท่านั้นครับ"},{"num":365,"q":"จากข้อที่แล้ว ในขั้นตอนการจดทะเบียนนิติกรรมและไถ่ถอน ณ สำนักงานที่ดิน บุคคลในตำแหน่งใดที่ธนาคารกำหนดให้ เป็น \"ผู้รับผิดชอบถือแคชเชียร์เช็ค\" และควบคุมการจดทะเบียน?","choices":[{"key":"ก","text":"ลูกค้าผู้กู้ หรือผู้ขายที่ดิน"},{"key":"ข","text":"เจ้าพนักงานที่ดิน"},{"key":"ค","text":"พนักงานพัฒนาธุรกิจที่วิเคราะห์สินเชื่อ"},{"key":"ง","text":"ผู้จัดการสาขา, ผู้ช่วยผู้จัดการสาขา หรือ หัวหน้าหน่วยอำเภอ"}],"answer":"ง","explanation":"ผู้รับผิดชอบในการถือแคชเชียร์เช็คและควบคุมการจดทะเบียน ณ สำนักงานที่ดิน จะต้องเป็นพนักงานระดับ ควบคุม ได้แก่ ผู้จัดการสาขา, ผู้ช่วยผู้จัดการสาขา หรือ หัวหน้าหน่วยอำเภอ เท่านั้นครับ ไม่อนุญาตให้ลูกค้าถือไปเอง เด็ดขาด"},{"num":366,"q":"ตามบันทึกเวียน พธ/ว 254 การนัดหมายลงนามนิติกรรมสัญญากู้เงิน สัญญาหลักประกัน และการจดทะเบียนจำนอง/ไถ่ ถอน ณ สำนักงานที่ดิน จะต้องดำเนินการให้แล้วเสร็จภายในกรอบเวลาใด?","choices":[{"key":"ก","text":"ภายในวันเดียวกัน"},{"key":"ข","text":"ภายใน 3 วันทำการ"},{"key":"ค","text":"ภายใน 7 วันทำการ"},{"key":"ง","text":"ภายใน 15 วันทำการ"}],"answer":"ก","explanation":"กฎเหล็กอีกข้อของการซื้อที่ดินหรือ Refinance คือ ทุกกระบวนการตั้งแต่การลงนามนิติกรรมสัญญา ไปจนถึง การจดทะเบียนจำนอง/ไถ่ถอน ณ สำนักงานที่ดิน จะต้องทำให้เสร็จสมบูรณ์ \"ภายในวันเดียวกัน\" เท่านั้น ครับ"},{"num":367,"q":"หากการจดทะเบียนจำนองหรือไถ่ถอนที่ดิน ณ สำนักงานที่ดิน \"ไม่สามารถดำเนินการได้สำเร็จภายในวันนัดหมาย\" (เช่น เอกสารผิดพลาด หรือลงนามไม่ครบถ้วน) พนักงานจะต้องดำเนินการอย่างไรกับเงินกู้ก้อนนั้น?","choices":[{"key":"ก","text":"ขยายเวลาออกไปอีก 3 วันทำการ"},{"key":"ข","text":"นำแคชเชียร์เช็คฝากเข้าบัญชีพักรอของสาขา"},{"key":"ค","text":"ให้ผู้ขายที่ดินเก็บแคชเชียร์เช็คไว้เป็นหลักประกันก่อน"},{"key":"ง","text":"ยกเลิกการจ่ายเงินกู้"}],"answer":"ง","explanation":"หากพบปัญหาที่ทำให้การจดทะเบียนจำนอง หรือไถ่ถอนที่ดิน \"ไม่สามารถดำเนินการได้สำเร็จภายในวันนัด หมาย\" หรือลูกค้าลงนามไม่ครบถ้วน กฎของธนาคารคือให้ \"ยกเลิกการจ่ายเงินกู้\" ในทันทีครับ"},{"num":368,"q":"ในการจัดทำนิติกรรมสัญญา (Maker) กรณีขอสินเชื่อเพื่อซื้อที่ดินหรือ Refinance หน้าที่ในการเปิดบัญชีสินเชื่อ/สร้าง หลักประกัน และ \"ผูกความสัมพันธ์บัญชีสินเชื่อในระบบงาน\" เป็นของบุคคลใด?","choices":[{"key":"ก","text":"พนักงานที่ได้รับมอบหมายปฏิบัติงานพิธีการสินเชื่อ (Maker)"},{"key":"ข","text":"พนักงานผู้ตรวจงานพิธีการสินเชื่อ (Checker)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"เจ้าหน้าที่คอมพิวเตอร์ประจำสาขา"}],"answer":"ก","explanation":"หน้าที่จัดทำนิติกรรม เปิดบัญชีสินเชื่อ สร้างหลักประกัน และผูกความสัมพันธ์ (Link) ในระบบ เป็นหน้าที่ของ พนักงานที่ได้รับมอบหมายปฏิบัติงานพิธีการสินเชื่อ (Maker) ครับ หลังจากนั้นจึงส่งให้ Checker ตรวจสอบ"},{"num":369,"q":"ในการควบคุมการจดทะเบียนนิติกรรมซื้อที่ดิน พนักงานผู้ควบคุมจะต้องแจ้งเจ้าพนักงานที่ดินให้จัดทำ \"หนังสือสัญญา ขายที่ดิน (ท.ด.13 หรือ ท.อ.5)\" โดยยึดมูลค่าตามข้อใด?","choices":[{"key":"ก","text":"มูลค่าตามราคาประเมินของกรมที่ดิน"},{"key":"ข","text":"มูลค่าตามวงเงินกู้ที่ธนาคารอนุมัติ"},{"key":"ค","text":"มูลค่าตามสัญญาจะซื้อจะขายที่ดิน"},{"key":"ง","text":"มูลค่าตามราคาประเมินของบริษัทประเมินอิสระภายนอก"}],"answer":"ค","explanation":"เพื่อความโปร่งใสและถูกต้องตามกฎหมาย พนักงานผู้ควบคุมจะต้องแจ้งเจ้าพนักงานที่ดินให้จัดทำหนังสือ สัญญาขายที่ดิน (ท.ด.13 หรือ ท.อ.5) \"ให้มีมูลค่าเป็นไปตามสัญญาจะซื้อจะขายที่ดิน\" จนกว่าการจดทะเบียนจะเสร็จสิ้น ครับ"},{"num":370,"q":"หลังจากที่พนักงานผู้ตรวจงานพิธีการสินเชื่อ (Checker) ตรวจสอบผลการจดทะเบียนจำนองและปรับปรุงระบบงานเสร็จ สิ้นแล้ว ขั้นตอนสุดท้ายที่จะทำให้กระบวนการนี้เสร็จสมบูรณ์คือข้อใด?","choices":[{"key":"ก","text":"ส่งมอบแคชเชียร์เช็คให้ผู้ขายที่ดิน หรือตัวแทนสถาบันการเงิน"},{"key":"ข","text":"ส่งมอบโฉนดที่ดินให้ลูกค้าผู้กู้นำกลับบ้าน"},{"key":"ค","text":"บันทึกข้อมูลกลับเข้าสู่ระบบ Phoenix อีกครั้ง"},{"key":"ง","text":"เรียกเก็บค่าธรรมเนียมการจัดการสินเชื่อเพิ่มเติม"}],"answer":"ก","explanation":"เมื่อทุกอย่างที่สำนักงานที่ดินเรียบร้อย และ Checker ได้ปรับปรุงสถานะในระบบงานแล้ว ขั้นตอนสุดท้ายคือ การ \"ส่งมอบเช็คให้ผู้ขายที่ดิน หรือตัวแทนสถาบันการเงิน\" ถือเป็นการปิดจบกระบวนการ Refinance อย่างสมบูรณ์ครับ"},{"num":371,"q":"ตามข้อควรระวังจากการตรวจสอบของธนาคารแห่งประเทศไทย (ธปท.) ข้อใดถือเป็นการฝ่าฝืนหลักการถ่วงดุลอำนาจ (Check and Balance) ในกระบวนการสินเชื่ออย่างชัดเจน?","choices":[{"key":"ก","text":"การให้พนักงานพัฒนาธุรกิจเป็นผู้จัดทำสัญญาประธาน"},{"key":"ข","text":"การให้ผู้จัดการสาขาเป็นผู้อนุมัติรายงานเบิกเงินกู้"},{"key":"ค","text":"การให้พนักงานคนเดียวกันทำหน้าที่ทั้งการตลาด วิเคราะห์ และดำเนินงานพิธีการสินเชื่อ"},{"key":"ง","text":"การให้ผู้ช่วยผู้จัดการสาขาเป็นผู้ผูกความสัมพันธ์บัญชี (Checker)"}],"answer":"ค","explanation":"ตามข้อควรห้ามปฏิบัติจาก ธปท. (ข้อ 11) ระบุชัดเจนว่า การปฏิบัติงานขาด Check and balance คือ \"การที่ พนักงานคนเดียวกันทำหน้าที่การตลาด วิเคราะห์ และดำเนินพิธีการสินเชื่อ\" ซึ่งถือเป็นข้อห้ามเด็ดขาดเพื่อป้องกันการทุจริต ครับ"},{"num":372,"q":"ในการจัดทำนิติกรรมสัญญา กรณีที่ในแบบพิมพ์มีช่องสดมภ์ข้อความ \"ผู้ตรวจ\" และ \"ผู้รับมอบอำนาจแทนธนาคาร\" พนักงานจะต้องดำเนินการตามข้อใดจึงจะถูกต้องตามระเบียบที่สุด?","choices":[{"key":"ก","text":"ให้ลูกค้าผู้กู้ลงนามก่อน แล้วค่อยให้พนักงานผู้ตรวจลงนามภายหลัง"},{"key":"ข","text":"ให้พนักงานผู้ตรวจและผู้รับมอบอำนาจแทนธนาคาร ลงนามให้เรียบร้อยก่อนส่งมอบเอกสารให้ลูกค้าลงนาม"},{"key":"ค","text":"ให้เว้นว่างไว้เพื่อรอให้ฝ่ายตรวจสอบมาลงนามตอนสิ้นปีบัญชี"},{"key":"ง","text":"ให้ผู้จัดการสาขาลงนามคนเดียวครอบคลุมทุกตำแหน่ง"}],"answer":"ข","explanation":"ตามแนวปฏิบัติงานพิธีการสินเชื่อ หากในแบบพิมพ์มีสดมภ์ \"ผู้ตรวจ\" และ \"ผู้รับมอบอำนาจแทนธนาคาร\" ให้พนักงานลงนามในช่องดังกล่าวให้เรียบร้อยก่อน ที่จะส่งมอบเอกสารให้ลูกค้าลงนาม เพื่อยืนยันความถูกต้องของสัญญา ครับ"},{"num":373,"q":"จากระเบียบเรื่องการจัดทำคู่ฉบับเพื่อส่งมอบให้ลูกค้า เอกสารการกู้เงินประเภทใดต่อไปนี้ที่ธนาคารอนุโลมให้ \"ไม่ต้อง จัดทำคู่ฉบับ\" ส่งมอบให้แก่ลูกค้า?","choices":[{"key":"ก","text":"หนังสือสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.)"},{"key":"ข","text":"หนังสือค้ำประกันบุคคล"},{"key":"ค","text":"หนังสือกู้เงินระยะสั้น"},{"key":"ง","text":"รายงานเบิกเงินกู้"}],"answer":"ง","explanation":"โดยปกติการเซ็นสัญญาเงินกู้ ธนาคารบังคับให้ต้องทำคู่ฉบับให้ลูกค้าเสมอ (พธ/ว 1132) แต่มีข้อยกเว้นสำหรับ \"รายงานเบิกเงินกู้\" (เครดิตเงินสด) ที่ธนาคารอนุโลมให้ไม่ต้องจัดทำคู่ฉบับ ครับ"},{"num":374,"q":"ตามบันทึกเวียน พธ/ว 254 (กรณีขอสินเชื่อซื้อที่ดิน หรือ Refinance) ข้อใดคือหน้าที่ความรับผิดชอบหลักของ \"พนักงานที่ ได้รับมอบหมายปฏิบัติงานพิธีการสินเชื่อ (Maker)\" ในระบบงาน?","choices":[{"key":"ก","text":"ตรวจสอบความถูกต้องก่อนจัดส่งให้พนักงานสาขาเพื่อให้ลูกค้าลงนาม"},{"key":"ข","text":"อนุมัติการเบิกจ่ายเงินกู้ผ่านระบบ CBS"},{"key":"ค","text":"จัดทำนิติกรรมสัญญากู้เงิน เปิดบัญชีสินเชื่อ สร้างหลักประกัน และผูกความสัมพันธ์บัญชีสินเชื่อในระบบงาน"},{"key":"ง","text":"นำแคชเชียร์เช็คไปส่งมอบให้ลูกค้า ณ สำนักงานที่ดิน"}],"answer":"ค","explanation":"ตาม พธ/ว 254 หน้าที่ของพนักงานพิธีการสินเชื่อ (Maker) คือ \"จัดทำนิติกรรมสัญญากู้เงิน นิติกรรมสัญญา หลักประกัน เปิดบัญชีสินเชื่อ/สร้างหลักประกัน และผูกความสัมพันธ์บัญชีสินเชื่อ (Link) ในระบบงาน\" ครับ"},{"num":375,"q":"จากข้อที่แล้ว เมื่อ Maker จัดทำข้อมูลในระบบเสร็จสิ้น \"พนักงานผู้ตรวจงานพิธีการสินเชื่อ (Checker)\" จะต้องดำเนินการ ในข้อใดเป็นลำดับต่อไป?","choices":[{"key":"ก","text":"ตรวจสอบความถูกต้องก่อนจัดส่งให้พนักงานสาขา หรือ ธญ. เพื่อให้ลูกค้าลงนาม"},{"key":"ข","text":"สั่งจ่ายเงินกู้เข้าบัญชีเงินฝากของลูกค้าทันที"},{"key":"ค","text":"ประทับตรายาง \"ได้รับคู่ฉบับแล้ว\" ในระบบ"},{"key":"ง","text":"โทรสอบถามลูกค้าเพื่อยืนยันการทำสัญญา"}],"answer":"ก","explanation":"เมื่อ Maker ทำข้อมูลเสร็จ หน้าที่ของพนักงานผู้ตรวจงานพิธีการสินเชื่อ (Checker) คือต้อง \"ตรวจสอบความถูก ต้องก่อนจัดส่งให้พนักงานสาขา หรือ ธญ. เพื่อให้ลูกค้าลงนาม\" ต่อไปครับ"},{"num":376,"q":"ในงานพิธีการสินเชื่อ เอกสาร \"สัญญาอุปกรณ์\" มีความหมายตรงตามข้อใดมากที่สุด?","choices":[{"key":"ก","text":"สัญญาที่ใช้สำหรับก่อหนี้โดยตรง เช่น สัญญากู้ระยะสั้น"},{"key":"ข","text":"สัญญาที่ทำขึ้นเพื่อให้มีผลทางกฎหมายในการเรียกร้องสิทธิตามหลักประกันนั้นๆ เช่น สัญญาจำนอง"},{"key":"ค","text":"เอกสารรายงานเบิกเงินกู้ทุกประเภท"},{"key":"ง","text":"บันทึกข้อตกลงต่อท้ายสัญญากู้ยืมเงิน"}],"answer":"ข","explanation":"\"สัญญาอุปกรณ์\" คือสัญญาที่ทำขึ้นประกอบสัญญาหลัก \"เพื่อให้มีผลทางกฎหมายในการเรียกร้องสิทธิตาม หลักประกันนั้นๆ\" เช่น สัญญาจำนอง, สัญญาค้ำประกันบุคคล, หนังสือค้ำประกัน บสย. ครับ"},{"num":377,"q":"ตามข้อควรปฏิบัติจากการตรวจของ ธปท. เกี่ยวกับการทำงานในระบบ CBS พนักงานพิธีการสินเชื่อจะต้องให้ ความสำคัญกับการบันทึกข้อมูลในเรื่องใดเป็นพิเศษ เพื่อไม่ให้เกิดข้อบกพร่อง?","choices":[{"key":"ก","text":"ต้องให้ผู้จัดการเป็นคนคีย์ Collateral ด้วยตนเองทุกสัญญา"},{"key":"ข","text":"การสร้าง Collateral และนำมาผูกหลักประกันกับสัญญา (Link) ต้องให้เป็นไปตามวิธีปฏิบัติของธนาคารอย่างเคร่งครัด"},{"key":"ค","text":"ห้ามบันทึกหลักประกันข้ามสาขาโดยเด็ดขาด"},{"key":"ง","text":"ต้องบันทึกข้อมูลให้เสร็จสิ้นภายใน 1 วันทำการเท่านั้น"}],"answer":"ข","explanation":"ข้อควรปฏิบัติจากการตรวจ ธปท. ข้อ 7 เน้นย้ำว่าพนักงานต้อง \"สร้าง Collateral และนำมาผูกหลักประกันกับ สัญญาให้เป็นไปตามวิธีปฏิบัติของธนาคาร\" อย่างเคร่งครัด เพื่อป้องกันหลักประกันหลุดลอยจากระบบครับ"},{"num":378,"q":"ตามมาตรฐานระยะเวลาการปฏิบัติงาน (SLA) \"ฝ่ายพิธีการสินเชื่อ\" มีกรอบระยะเวลาในการปฏิบัติงาน (ทำเอกสารและ จ่ายเงินกู้) ให้แล้วเสร็จภายในกี่วันทำการ หลังจากที่ลูกค้าปฏิบัติตามเงื่อนไขครบถ้วน?","choices":[{"key":"ก","text":"1 วันทำการ"},{"key":"ข","text":"3 วันทำการ"},{"key":"ค","text":"5 วันทำการ"},{"key":"ง","text":"7 วันทำการ"}],"answer":"ข","explanation":"ตามตารางกระบวนการอำนวยสินเชื่อ เมื่อลูกค้าปฏิบัติตามเงื่อนไขครบถ้วนแล้ว กรอบเวลา SLA ของ \"ฝ่าย พิธีการสินเชื่อ\" จะกำหนดไว้ที่ \"3 วันทำการ\" ครับ"},{"num":379,"q":"ในขั้นตอนการเบิกจ่ายเงินกู้ (Disbursement) ข้อใดถือเป็น \"ข้อควรห้ามปฏิบัติ\" อย่างเด็ดขาดตามข้อท้วงติงของ ธปท.?","choices":[{"key":"ก","text":"การจ่ายเงินกู้ผ่านแคชเชียร์เช็คกรณี Refinance"},{"key":"ข","text":"การให้ลูกค้าแบ่งจ่ายเงินกู้เป็นงวดๆ ตามความก้าวหน้าของงาน"},{"key":"ค","text":"การอนุมัติโครงการที่อาจไม่ได้ประกอบธุรกิจจริง โดยให้ลูกค้าเบิกใช้เต็มวงเงินในครั้งเดียวซึ่งไม่เป็นไปตามเงื่อนไข"},{"key":"ง","text":"การพักการเบิกจ่ายเงินกู้ชั่วคราวกรณีลูกค้ายังไม่พร้อมรับเงิน"}],"answer":"ค","explanation":"ข้อควรห้ามปฏิบัติ ธปท. ข้อ 7 ระบุว่า \"ห้ามอนุมัติสินเชื่อโครงการที่อาจไม่ได้ประกอบธุรกิจจริง โดยลูกค้า เบิกใช้เต็มวงเงินในครั้งเดียวไม่เป็นไปตามเงื่อนไขการขออนุมัติสินเชื่อ\" ครับ"},{"num":380,"q":"หากพนักงานพิธีการสินเชื่อ บันทึกข้อมูลอัตราดอกเบี้ยในระบบ CBS \"สูงกว่า\" ที่กำหนดไว้ในเงื่อนไขของผลิตภัณฑ์ จะ ส่งผลเสียอย่างไรตามข้อห้ามปฏิบัติของ ธปท.?","choices":[{"key":"ก","text":"เป็นการเพิ่มรายได้ให้ธนาคาร ซึ่งสามารถอนุโลมให้ทำได้"},{"key":"ข","text":"ถือเป็นการหลีกเลี่ยงการจัดชั้นหนี้"},{"key":"ค","text":"จะทำให้ธนาคารคิดดอกเบี้ยเกินกว่าสัญญาหรือเงื่อนไขของผลิตภัณฑ์ ซึ่งผิดกฎหมายและข้อบังคับ"},{"key":"ง","text":"ทำให้ระบบไม่สามารถพิมพ์ใบเสร็จรับเงินได้"}],"answer":"ค","explanation":"ข้อควรห้ามปฏิบัติ ธปท. ข้อ 4 ระบุว่า ห้ามบันทึกข้อมูลดอกเบี้ยสูงกว่ากำหนด เพราะจะ \"ทำให้ธนาคารคิด ดอกเบี้ยเกินกว่าสัญญาหรือเงื่อนไขของผลิตภัณฑ์\" ซึ่งเป็นการเอาเปรียบผู้บริโภคและผิดกฎหมายครับ"},{"num":381,"q":"ตามหลักเกณฑ์การมอบอำนาจงานด้านพิธีการสินเชื่อ สำหรับนวัตกรรม \"สินเชื่อเงินด่วนทุกประเภท\" (เช่น สินเชื่อกึ่ง แสน, สินเชื่อสิบหมื่น, หรือบัตรเครดิตเงินสด) ผู้จัดการสาขาสามารถมอบหมายให้พนักงานสาขาจัดทำนิติกรรมสัญญาได้ใน วงเงินระดับใด?","choices":[{"key":"ก","text":"ไม่เกิน 1 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 2 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 3 ล้านบาท"},{"key":"ง","text":"สามารถทำได้ใน \"ทุกระดับอำนาจอนุมัติ\" ของผลิตภัณฑ์นั้น"}],"answer":"ง","explanation":"เป็นข้อยกเว้นพิเศษครับ สำหรับผลิตภัณฑ์นวัตกรรม หรือ \"สินเชื่อเงินด่วนทุกประเภท\" (เช่น สินเชื่อเงินด่วน คนดี, สิบหมื่น, บัตรสินเชื่อเกษตรกร) คำสั่งธนาคารกำหนดให้ ผจข. สามารถมอบหมายให้พนักงานสาขาจัดทำนิติกรรมได้ \"ในทุกระดับอำนาจอนุมัติ\" โดยไม่ถูกจำกัดเพดาน 2 หรือ 3 ล้านบาทแบบสินเชื่อปกติครับ."},{"num":382,"q":"ตามคู่มือการปฏิบัติงานสินเชื่อ กรณีลูกหนี้ปรับปรุงโครงสร้างหนี้ (ปปน.) ที่มีหนี้ค้างชำระระดับต้นเงินหรือดอกเบี้ยเกิน กว่า 3 เดือน ธนาคารบังคับให้ต้องทำการ \"ทบทวนราคาประเมินหลักประกัน\" ใหม่อย่างน้อยตามรอบระยะเวลาใด?","choices":[{"key":"ก","text":"ทบทวนทุก 1 ปี"},{"key":"ข","text":"ทบทวนทุก 2 ปี"},{"key":"ค","text":"ทบทวนทุก 3 ปี"},{"key":"ง","text":"ทบทวนทุก 5 ปี"}],"answer":"ค","explanation":"ตามคู่มือการปฏิบัติงานสินเชื่อ เพื่อป้องกันความเสี่ยงมูลค่าหลักประกันลดลง (โดยเฉพาะที่ดิน/สิ่งปลูกสร้าง) สำหรับลูกหนี้ที่ค้างชำระเกิน 3 เดือนขึ้นไป (NPL) ธนาคารบังคับให้ต้องทำการ \"ทบทวนราคาประเมินหลักประกันทุก 3 ปี\" ครับ."},{"num":383,"q":"ในการตรวจสอบข้อมูลของลูกหนี้ก่อนทำสัญญาสินเชื่อใหม่ หากพบว่าสหกรณ์ลูกค้ามีคุณสมบัติที่ \"เจ้าหนี้มีจำนวน มากกว่าลูกหนี้เงินกู้\" ในงบการเงิน ธนาคารจะประเมินสถานการณ์นี้ว่าอย่างไร?","choices":[{"key":"ก","text":"สหกรณ์มีความเข้มแข็งและมีสภาพคล่องสูง"},{"key":"ข","text":"เป็นข้อบกพร่องที่เป็นสาระสำคัญ แสดงว่ามีการใช้เงินกู้ผิดวัตถุประสงค์"},{"key":"ค","text":"สามารถพิจารณาให้สินเชื่อได้ตามปกติ"},{"key":"ง","text":"ต้องบังคับให้สหกรณ์เพิ่มทุนเรือนหุ้นทันที"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก ต้องส่งเรื่องให้คณะกรรมการพิจารณาเป็นพิเศษ"},{"num":384,"q":"ตามข้อห้ามปฏิบัติจากการตรวจสอบของธนาคารแห่งประเทศไทย (ธปท.) การกระทำในข้อใดต่อไปนี้ที่ถือว่าเป็นการ \"หลีกเลี่ยงการจัดชั้นหนี้ (NPL)\" อย่างชัดเจน?","choices":[{"key":"ก","text":"การให้ลูกหนี้แบ่งจ่ายเงินกู้เป็นงวดๆ ตามความก้าวหน้าของงาน"},{"key":"ข","text":"การที่พนักงานคนเดียวกันทำหน้าที่ทั้งการตลาดและงานพิธีการสินเชื่อ"},{"key":"ค","text":"การให้สินเชื่อใหม่เพื่อนำไปชำระหนี้ตามสัญญาเดิมที่กำลังค้างชำระ"},{"key":"ง","text":"การบันทึกข้อมูลในระบบ CBS ล่าช้ากว่าความเป็นจริง 1 วัน"}],"answer":"ค","explanation":"ตามข้อควรห้ามปฏิบัติจากการตรวจของ ธปท. (ข้อ 12) ระบุชัดเจนว่า \"ห้ามการให้สินเชื่อใหม่เพื่อชำระหนี้ ตามสัญญาเดิมที่ค้างชำระ\" เพราะถือเป็นพฤติกรรมที่เข้าข่ายเจตนาหลีกเลี่ยงการจัดชั้นหนี้เสีย (Evergreening) ครับ."},{"num":385,"q":"เพื่อป้องกันความเสี่ยงด้านกฎหมายข้อมูลส่วนบุคคล ตาม พ.ร.บ. การประกอบธุรกิจข้อมูลเครดิต หากพนักงาน \"สืบค้น ข้อมูลเครดิตโดยปราศจากความยินยอมของเจ้าของข้อมูล\" จะต้องรับบทลงโทษทางอาญาสูงสุดตามข้อใด?","choices":[{"key":"ก","text":"ปรับไม่เกิน 1 แสนบาท"},{"key":"ข","text":"จำคุกไม่เกิน 1 ปี"},{"key":"ค","text":"จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท หรือทั้งจำทั้งปรับ"},{"key":"ง","text":"จำคุกไม่เกิน 5 ปี หรือปรับไม่เกิน 5 แสนบาท หรือทั้งจำทั้งปรับ"}],"answer":"ค","explanation":"กฎเหล็กของข้อมูลเครดิต (มาตรา 20) ระบุว่า หากพนักงานสืบค้นข้อมูลโดยไม่ได้รับ \"ความยินยอม (Consent)\" จากเจ้าของข้อมูล จะมีบทลงโทษรุนแรงคือ จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท หรือทั้งจำทั้งปรับ ครับ."},{"num":386,"q":"ในกระบวนการติดตามทวงถามหนี้ (Debt Collection) ธนาคารได้กำหนด \"ข้อห้าม\" อย่างเคร่งครัด บุคคลในตำแหน่งใด ต่อไปนี้ที่ \"ไม่มีอำนาจ\" ในการติดตามทวงถามหนี้ลูกค้าโดยเด็ดขาด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ (พบส.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"หัวหน้าการเงิน, พนักงานการเงิน, และพนักงานธุรการ"}],"answer":"ง","explanation":"ตามคำสั่งมอบอำนาจการติดตามทวงถามหนี้ เพื่อให้เป็นไปตาม พ.ร.บ. การทวงถามหนี้ ผู้ที่ \"ไม่มีอำนาจ\" และห้ามกระทำการทวงถามหนี้ลูกค้าโดยเด็ดขาด ได้แก่ หัวหน้าการเงิน, พนักงานการเงิน, พนักงานธุรการ, แม่บ้าน และ รปภ. ครับ."},{"num":387,"q":"ตามระเบียบฉบับที่ 84 หากลูกค้ามีความจำเป็นต้องการขอ \"ตัดต้นไม้ในที่ดินซึ่งธนาคารรับจำนองไว้\" (โดยที่ดินดังกล่าว ยังคงมีราคาประเมินใหม่ไม่น้อยกว่าราคาประเมินเดิม) อำนาจการอนุมัติในระดับสาขาเป็นของบุคคลใด?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามระเบียบฉบับที่ 84 ว่าด้วยหลักประกัน การอนุญาตให้ลูกค้าตัดต้นไม้ในที่ดินซึ่งติดจำนอง (โดยที่ราคา ประเมินใหม่ต้องไม่ลดลงกว่าเดิม) เป็นอำนาจพิจารณาในระดับสาขาของ ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. ครับ."},{"num":388,"q":"ตามอำนาจหลังการให้กู้ (ระเบียบ 83) หากตรวจพบว่าลูกค้ารายใหญ่มี \"สินค้าคงคลังน้อยกว่ามูลค่าหนี้\" และลูกค้า ต้องการขอพิจารณา \"งดเว้นการชำระเงินกู้ส่วนต่าง\" อำนาจในการพิจารณาอนุมัติเรื่องนี้ตกเป็นของบุคคลระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้ช่วยผู้จัดการธนาคาร (ผช.ผจก. สายงาน บส.) หรือ รองผู้จัดการธนาคาร (รอง.ผจก. สายงาน ธจ.)"}],"answer":"ง","explanation":"กรณีลูกค้านิติบุคคลหรือสหกรณ์มีสินค้าคงคลังน้อยกว่ามูลค่าหนี้ และต้องการพิจารณาผ่อนปรน \"งดเว้นการ ชำระเงินกู้ส่วนต่าง\" เป็นเคสพิเศษที่อำนาจถูกดึงขึ้นไปที่ระดับบริหาร คือ ผู้ช่วยผู้จัดการธนาคาร (ผช.ผจก. สายงาน บส.) หรือ รองผู้จัดการธนาคาร (รอง.ผจก. สายงาน ธจ.) ครับ."},{"num":389,"q":"[Case Study] สหกรณ์ปลาหมอคางดำ ต้องการต่ออายุสัญญากู้เงินเพื่อเป็นทุนขายผลผลิตใน \"วงเงินเท่าเดิม\" ไม่ เปลี่ยนแปลงโครงการ และมีคุณสมบัติครบถ้วน ธนาคารอนุโลมให้ \"ยกเว้น\" การปฏิบัติตามขั้นตอนใดได้บ้าง?","choices":[{"key":"ก","text":"ยกเว้นการบันทึกข้อมูลในระบบวิเคราะห์สินเชื่อฟีนิกซ์"},{"key":"ข","text":"ยกเว้นการจัดทำ Credit Approval และเอกสาร Underwriting Criteria"},{"key":"ค","text":"ยกเว้นการทำรายงานกลั่นกรองสินเชื่อ (Credit Write up)"},{"key":"ง","text":"ยกเว้นได้ถูกทุกข้อที่กล่าวมา"}],"answer":"ง","explanation":"เป็นการอำนวยความสะดวกในกระบวนการพิจารณาสินเชื่อ (Fast track) หากสหกรณ์ขอต่ออายุสัญญาในวงเงิน เท่าเดิม ไม่เปลี่ยนโครงการ ธนาคารอนุโลมให้ \"ยกเว้นการคีย์ข้อมูลในระบบฟีนิกซ์, ยกเว้นการทำเอกสาร Credit Approval, และยกเว้นการทำรายงาน Credit Write up\" ได้ทั้งหมดครับ (แต่ยังต้องบันทึกใบคำขอตามปกติ)."},{"num":390,"q":"เมื่อลูกค้าชำระหนี้เสร็จสิ้นทุกสัญญาแล้ว และมีความประสงค์ขอ \"ยกเลิกหรือไถ่ถอนหลักประกันที่ได้จดทะเบียนสัญญา หลักประกันทางธุรกิจไว้กับธนาคาร\" ใครคือผู้มีอำนาจอนุมัติในระดับแรกสุด?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) (หรือ ผช.ผจข. ดำเนินการแทน)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก ผู้จัดการสาขา (ผจข.)"},{"num":391,"q":"หากมีบุคคลภายนอกหรือนิติบุคคล ขอ \"เช่า\" อาคาร สิ่งปลูกสร้าง หรือที่ดิน ที่ติดภาระจำนองอยู่กับธนาคาร หาก \"อายุ การเช่าเกินกว่า 3 ปี\" ธนาคารกำหนดให้บุคคลใดเป็นผู้มีอำนาจอนุมัติ (โดยต้องจดทะเบียนต่อพนักงานเจ้าหน้าที่)?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด หรือ ผู้ช่วยฯ (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"พนักงานพิธีการสินเชื่อประจำสาขา"}],"answer":"ข","explanation":"ตามระเบียบ 84 การอนุญาตให้บุคคลภายนอกหรือนิติบุคคล เช่าอาคารหรือที่ดินที่ติดจำนอง หากอายุการเช่า \"เกิน 3 ปี\" (ซึ่งมีผลผูกพันระยะยาวและต้องจดทะเบียนต่อพนักงานเจ้าหน้าที่) อำนาจอนุมัติจะเป็นของ ผู้อำนวยการ สำนักงาน ธ.ก.ส. จังหวัด หรือ ผู้ช่วยฯ (ผอจ./ผช.ผอจ.)"},{"num":392,"q":"ลูกค้ามีความจำเป็นต้องขอ \"แบ่งขายหรือแบ่งแยกที่ดิน\" ซึ่งรับจำนองไว้กับธนาคาร เพื่อมอบให้เป็นทาง สาธารณประโยชน์ หรือให้แก่ทางราชการ (ในขณะที่ยังมีหนี้เงินกู้อยู่) ธนาคารจะพิจารณาอนุญาตให้ดำเนินการได้ ก็ต่อเมื่อ ที่ดินส่วนที่เหลือมีราคาประเมินตามข้อใด?","choices":[{"key":"ก","text":"ไม่น้อยกว่า 1 เท่าของหนี้เงินกู้ที่ใช้หลักประกันในขณะนั้น"},{"key":"ข","text":"ไม่น้อยกว่า 1.5 เท่าของหนี้เงินกู้ที่ใช้หลักประกันในขณะนั้น"},{"key":"ค","text":"ไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ที่ใช้หลักประกันในขณะนั้น"},{"key":"ง","text":"ไม่น้อยกว่า 3 เท่าของเงินกู้ทุกสัญญาในขณะนั้น"}],"answer":"ค","explanation":"การขอแบ่งขายหรือแบ่งแยกที่ดินจำนองให้ทางราชการหรือสาธารณประโยชน์ (ในขณะที่มีหนี้เงินกู้ค้างอยู่) เงื่อนไขสำคัญที่สุดคือ \"ที่ดินจำนองส่วนที่เหลือจะต้องมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ที่ใช้หลักประกันใน ขณะนั้น\""},{"num":393,"q":"หากลูกค้าขอนำที่ดินที่ติดจำนองไปจดทะเบียน \"ภาระจำยอม\" ให้แก่ผู้อื่น (เช่น เป็นทางผ่าน) ในขณะที่ยังมีหนี้ค้างชำระ อำนาจการพิจารณาอนุมัติให้จดทะเบียนภาระจำยอมเป็นของบุคคลใดในระดับสาขา (ภายใต้เงื่อนไขราคาประเมินใหม่ไม่น้อย กว่า 2 เท่าของหนี้)?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"},{"key":"ง","text":"พนักงานพัฒนาธุรกิจ (พบส.)"}],"answer":"ก","explanation":"การอนุญาตให้จดทะเบียน \"ภาระจำยอม\" ในที่ดินรับจำนอง (โดยที่ดินมีราคาประเมินใหม่ไม่น้อยกว่าสองเท่า ของหนี้) อำนาจการอนุมัติในระดับสาขาจะเป็นของ ผู้จัดการสาขา (ผจข.)"},{"num":394,"q":"ตามปกติผู้จัดการสาขาสามารถมอบอำนาจให้พนักงานสาขาจัดทำนิติกรรมสัญญาประธานสำหรับเกษตรกรได้ในวงเงิน ไม่เกิน 3 ล้านบาท แต่สำหรับ \"นิติกรรมสัญญาค้ำประกันแบบรับรองรับผิดอย่างลูกหนี้ร่วม (กลุ่มเกษตรกร)\" หากวงเงินกู้รวม \"เกิน 3 ล้านบาท\" ใครคือผู้มีหน้าที่ดำเนินการจัดทำสัญญานี้?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.) ต้องเป็นผู้จัดทำด้วยตนเองเท่านั้น"},{"key":"ข","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ค","text":"พนักงานสาขาที่ได้รับมอบหมาย (Maker)"}],"answer":"ค","explanation":"เป็นข้อยกเว้นเฉพาะครับ สำหรับ \"นิติกรรมสัญญาค้ำประกันร่วมกลุ่มแบบรับรองรับผิดอย่างลูกหนี้ร่วม\" ของลูกค้าเกษตรกร (ฉ.44) แม้วงเงินกู้จะเกิน 3 ล้านบาท ธนาคารก็มอบอำนาจให้ \"พนักงานสาขาที่ได้รับมอบหมาย (Maker)\" เป็นผู้ดำเนินการจัดทำนิติกรรมนี้ได้ครับ"},{"num":395,"q":"การอนุมัติ \"ถอนจำนองเดิมและจดจำนองใหม่\" ในกรณีที่มีบุคคลอื่นมารับใช้หนี้แทนผู้กู้ หรือเกิดการ \"เปลี่ยนตัวลูกหนี้\" อำนาจการพิจารณาอนุมัติในเรื่องนี้ตกเป็นของบุคคลใด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 (ข้อ 19) การ \"ถอนจำนองเดิมและจดจำนองใหม่\" กรณีมีบุคคลอื่นมารับใช้หนี้แทน หรือ เปลี่ยนตัวลูกหนี้ ธนาคารมอบอำนาจพิจารณาอนุมัติไว้ที่ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":396,"q":"กรณีที่ผู้กู้ได้ชำระหนี้เสร็จสิ้นทุกสัญญาแล้ว และมีความประสงค์ขอ \"ยกเลิกการจดทะเบียนสัญญาหลักประกันทาง ธุรกิจ\" ธนาคารกำหนดให้บุคคลใดมีอำนาจในการอนุมัติ?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) หรือ ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"หมวดกิจการเกี่ยวกับหลักประกันทางธุรกิจ (ข้อ 28.3) หากลูกค้าชำระหนี้เสร็จสิ้นและขอยกเลิกการจดทะเบียน สัญญาหลักประกันทางธุรกิจ อำนาจอนุมัติคือ ผู้จัดการสาขา (ผจข.) โดยมี ผช.ผจข. ดำเนินการแทนได้"},{"num":397,"q":"ตามข้อห้ามปฏิบัติจากการตรวจสอบของธนาคารแห่งประเทศไทย (ธปท.) ข้อใดถือเป็นการบันทึกข้อมูลในระบบ CBS ที่ ผิดกฎและต้องระมัดระวังอย่างยิ่ง?","choices":[{"key":"ก","text":"การให้พนักงานที่ได้รับมอบหมาย (Maker) เป็นคนคีย์สร้างหลักประกัน"},{"key":"ข","text":"การบันทึกงวดการชำระหนี้ในระบบ CBS ไม่ตรงกับที่ระบุไว้ในบันทึกอนุมัติสินเชื่อหรือสัญญากู้เงิน"},{"key":"ค","text":"การแบ่งจ่ายเงินกู้เป็นงวดๆ ตามความก้าวหน้าของงาน"},{"key":"ง","text":"การนำหลักประกันของบุคคลอื่นมาผูกความสัมพันธ์ (Link) เข้ากับบัญชีสินเชื่อของลูกค้า"}],"answer":"ข","explanation":"ข้อควรระวังจาก ธปท. (ข้อ 4) คือเรื่องการบันทึกข้อมูลในระบบ CBS ต้องตรงกับความเป็นจริง ห้ามบันทึก งวดการชำระหนี้ไม่ตรงกับที่ระบุไว้ในบันทึกอนุมัติสินเชื่อหรือสัญญากู้เงินเด็ดขาด เพราะจะกระทบต่อการจัดชั้นลูกหนี้ใน ระบบครับ"},{"num":398,"q":"ตามแนวทางการบริหารจัดการหนี้ (NPLs) หากลูกค้ามีหนี้ที่ค้างชำระเกินกว่า 3 เดือนขึ้นไป (ระดับชั้นต่ำกว่ามาตรฐาน) ธนาคารมีกฎเหล็กให้ต้อง \"ทบทวนราคาประเมินหลักประกันใหม่\" ทุกๆ กี่ปี?","choices":[{"key":"ก","text":"ทุก 1 ปี"},{"key":"ข","text":"ทุก 2 ปี"},{"key":"ค","text":"ทุก 3 ปี"},{"key":"ง","text":"ทุก 5 ปี"}],"answer":"ค","explanation":"ตามคู่มือการปฏิบัติงาน หากเป็นหนี้ที่ค้างชำระเกิน 3 เดือน (หนี้ NPL) เพื่อป้องกันความเสี่ยงที่มูลค่า หลักประกันจะลดลง ธนาคารบังคับให้ต้องทบทวนราคาประเมินหลักประกัน ทุกๆ 3 ปี"},{"num":399,"q":"ในการประเมินการจัดชั้นหนี้ หากพบว่า \"ลูกหนี้ถึงแก่ความตาย\" และตรวจสอบพบว่า \"ไม่มีหลักประกันหรือทรัพย์สิน ใดๆ เลย\" พนักงานจะต้องจัดชั้นลูกหนี้รายนี้และกันสำรองอย่างไร?","choices":[{"key":"ก","text":"จัดเป็นหนี้ชั้น 2 (SM) และกันสำรองร้อยละ 50"},{"key":"ข","text":"จัดเป็นหนี้ชั้น 3 (ต่ำกว่ามาตรฐาน) และกันสำรองร้อยละ 100"},{"key":"ค","text":"จัดชั้นคงเดิม แต่ให้พักการคิดดอกเบี้ยชั่วคราว"},{"key":"ง","text":"จัดเป็นหนี้ชั้น 5 (สงสัยจะสูญ) กันสำรอง 100% และรับรู้รายได้ด้วยเกณฑ์เงินสด (Cash Basis)"}],"answer":"ง","explanation":"เกณฑ์การจัดชั้น NPL ระบุว่า หากลูกหนี้ตายและ \"ไม่มีหลักประกันหรือทรัพย์สินใดๆ เลย\" ธนาคารจะต้อง จัดเป็น หนี้ชั้น 5 (สงสัยจะสูญ) ทันที พร้อมกับกันสำรอง 100% และรับรู้รายได้ด้วยเกณฑ์เงินสด (Cash Basis) เนื่องจาก โอกาสได้หนี้คืนมีน้อยมาก"},{"num":400,"q":"หากลูกค้าที่มีหนี้ปกติ ต้องการขอ \"ตัดต้นไม้\" ในที่ดินซึ่งธนาคารรับจำนองไว้ (โดยที่ดินดังกล่าวยังคงมีราคาประเมินใหม่ ไม่น้อยกว่าราคาประเมินเดิม) อำนาจการพิจารณาอนุมัติให้ตัดต้นไม้ในระดับสาขาเป็นของใคร?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก ผู้จัดการสาขา (ผจข.)"},{"num":401,"q":"ตามมาตรฐานระยะเวลาการปฏิบัติงาน (SLA) กระบวนการพิจารณาอนุมัติสินเชื่อลูกค้ารายใหญ่ หากเป็นอำนาจของ \"คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับกลาง (CC2)\" จะใช้ระยะเวลาการปฏิบัติงานรวมทั้งสิ้นกี่วันทำการ?","choices":[{"key":"ก","text":"15 วันทำการ"},{"key":"ข","text":"22 วันทำการ"},{"key":"ค","text":"30 วันทำการ"},{"key":"ง","text":"35 วันทำการ"}],"answer":"ข","explanation":"ตามตารางกำหนดระยะเวลาการปฏิบัติงาน (SLA) ตามบันทึก พธ/ว 548 ระยะเวลาสำหรับคณะกรรมการระดับ ต้น (CC1) = 15 วัน, ระดับกลาง (CC2) = 22 วัน, และระดับธนาคาร/อนุกรรมการ = 35 วันทำการครับ."},{"num":402,"q":"การทบทวนราคาประเมินหลักประกันของสินเชื่อด้อยคุณภาพ (NPLs) ที่ค้างชำระเกินกว่า 3 เดือน ธนาคารกำหนดให้ พนักงานต้อง \"ทบทวนราคาประเมินหลักประกันใหม่\" อย่างน้อยตามรอบระยะเวลาในข้อใด?","choices":[{"key":"ก","text":"ทบทวนทุก 1 ปี"},{"key":"ข","text":"ทบทวนทุก 2 ปี"},{"key":"ค","text":"ทบทวนทุก 3 ปี"},{"key":"ง","text":"ทบทวนทุก 5 ปี"}],"answer":"ค","explanation":"ข้อสังเกตและคู่มือการปฏิบัติงานด้านหลักประกันระบุชัดเจนว่า สำหรับหนี้ที่ค้างชำระเกินกว่า 3 เดือนขึ้นไป (NPLs) ธนาคารบังคับให้ต้องทำการ \"ทบทวนราคาประเมินหลักประกันทุกๆ 3 ปี\" เพื่อสะท้อนมูลค่าความเสี่ยงที่แท้จริง ครับ."},{"num":403,"q":"ตามข้อควรระวังจากการตรวจสอบของธนาคารแห่งประเทศไทย (ธปท.) การที่พนักงานบันทึกอัตราดอกเบี้ยในระบบ CBS \"สูงกว่า\" ที่กำหนดไว้ในเงื่อนไขของผลิตภัณฑ์ จะเกิดผลเสียร้ายแรงตามข้อใด?","choices":[{"key":"ก","text":"ทำให้ระบบ CBS ขัดข้องและไม่สามารถคิดดอกเบี้ยได้"},{"key":"ข","text":"ทำให้การจัดชั้นหนี้ของลูกค้าผิดเพี้ยนไปจากความเป็นจริง"},{"key":"ค","text":"ทำให้ธนาคารคิดดอกเบี้ยเกินกว่าสัญญาหรือเงื่อนไขของผลิตภัณฑ์"},{"key":"ง","text":"ทำให้ธนาคารต้องตั้งสำรองหนี้สงสัยจะสูญเพิ่มขึ้น 100%"}],"answer":"ค","explanation":"จากข้อควรปฏิบัติจากการตรวจของ ธปท. (ข้อ 4) การบันทึกอัตราดอกเบี้ยในระบบ CBS สูงกว่ากำหนด จะ ส่งผลร้ายแรงคือทำให้ธนาคาร \"คิดดอกเบี้ยเกินกว่าสัญญาหรือเงื่อนไขของผลิตภัณฑ์\" ซึ่งถือเป็นการเอาเปรียบผู้บริโภค ครับ."},{"num":404,"q":"ตามกฎหมายข้อมูลเครดิต (มาตรา 20) การสืบค้นหรือเปิดเผยข้อมูลเครดิตของลูกค้าโดย \"ปราศจากความยินยอมของ เจ้าของข้อมูล\" ถือเป็นความผิดทางอาญา ซึ่งมีบทลงโทษสูงสุดตามข้อใด?","choices":[{"key":"ก","text":"ปรับไม่เกิน 1 แสนบาท"},{"key":"ข","text":"จำคุกไม่เกิน 1 ปี หรือปรับไม่เกิน 1 แสนบาท"},{"key":"ค","text":"จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท หรือทั้งจำทั้งปรับ"},{"key":"ง","text":"จำคุกไม่เกิน 5 ปี หรือปรับไม่เกิน 5 แสนบาท หรือทั้งจำทั้งปรับ"}],"answer":"ค","explanation":"กฎหมายการประกอบธุรกิจข้อมูลเครดิต มาตรา 20 วรรคหนึ่ง ระบุบทลงโทษกรณีสืบค้นข้อมูลโดยปราศจาก ความยินยอมของเจ้าของข้อมูลไว้รุนแรงถึง จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท หรือทั้งจำทั้งปรับ ครับ."},{"num":405,"q":"หากลูกค้ามีความจำเป็นต้องการขอจดทะเบียน \"ภาระจำยอม\" (เช่น ทางเข้า-ออก) ในที่ดินซึ่งธนาคารรับจำนองไว้ (ตาม ข้อบังคับ ฉ.44, ฉ.45) ธนาคารจะอนุญาตให้ทำได้ก็ต่อเมื่อที่ดินนั้นมีราคาประเมินตามข้อใด?","choices":[{"key":"ก","text":"ราคาประเมินใหม่ต้องไม่น้อยกว่าราคาประเมินเดิมที่เคยประเมินไว้"},{"key":"ข","text":"ราคาประเมินใหม่ต้องครอบคลุมต้นเงินกู้ทั้งหมด"},{"key":"ค","text":"ราคาประเมินใหม่ต้องไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ที่ใช้หลักประกันจำนองในขณะนั้น"},{"key":"ง","text":"ราคาประเมินใหม่ต้องไม่น้อยกว่า 3 เท่าของมูลค่าทรัพย์สินทั้งหมด"}],"answer":"ค","explanation":"การอนุญาตให้จดทะเบียนภาระจำยอมในที่ดินจำนอง (เช่น แบ่งทางเดิน) ตามระเบียบ 84 ข้อ 5.2.1 กำหนดว่า ทำได้ แต่ \"ที่ดินดังกล่าวยังคงมีราคาประเมินใหม่ไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ซึ่งใช้หลักประกันจำนองในขณะนั้น\" ครับ."},{"num":406,"q":"การขออนุญาตแบ่งไถ่ถอนที่ดินจำนองเพื่อนำไปขาย (โดยนำเงินจากการขายส่งชำระหนี้ธนาคารไม่น้อยกว่าร้อยละ 80) ธนาคารมีข้อห้ามเด็ดขาด \"ไม่ให้แบ่งไถ่ถอนที่ดิน\" ที่มีลักษณะตรงตามข้อใด?","choices":[{"key":"ก","text":"ที่ดินที่อยู่ติดกับทางสาธารณประโยชน์"},{"key":"ข","text":"ที่ดินที่ไม่มีสิ่งปลูกสร้าง"},{"key":"ค","text":"ที่ดินแปลงซึ่งเป็นที่ตั้งโครงการ หรือที่ตั้งสำนักงานของลูกค้า"},{"key":"ง","text":"ที่ดินที่ราคาประเมินใหม่สูงกว่าราคาประเมินเดิม"}],"answer":"ค","explanation":"การขอแบ่งไถ่ถอนเพื่อนำไปขาย (แม้จะนำเงินมาชำระหนี้ร้อยละ 80 ก็ตาม) กฎเหล็กของธนาคารคือ \"ต้องไม่ เป็นการไถ่ถอนที่ดินแปลงซึ่งเป็นที่ตั้งโครงการ หรือที่ตั้งสำนักงานของลูกค้า\" เพราะถือเป็นหัวใจสำคัญของการประกอบ อาชีพครับ."},{"num":407,"q":"หากพบว่า \"ลูกหนี้ถึงแก่ความตาย\" แต่ตรวจสอบแล้วพบว่าลูกหนี้รายนี้ \"มีหลักประกันคุ้มมูลหนี้\" ธนาคารจะต้องจัดชั้น ลูกหนี้และกันเงินสำรองตามแนวทางใด?","choices":[{"key":"ก","text":"จัดชั้น การกันสำรอง และการรับรู้รายได้ให้ \"คงเดิม\""},{"key":"ข","text":"จัดเป็นหนี้ชั้น 2 (SM) และกันสำรองร้อยละ 50"},{"key":"ค","text":"จัดเป็นหนี้ชั้น 4 (สงสัย) และกันสำรองร้อยละ 100"},{"key":"ง","text":"จัดเป็นหนี้ชั้น 5 (สงสัยจะสูญ) กันสำรอง 100% โดยอัตโนมัติ"}],"answer":"ก","explanation":"ตามแนวทางการกันสำรอง หากลูกหนี้ถึงแก่ความตาย แต่บัญชีนั้น \"มีหลักประกัน\" ธนาคารให้ \"จัดชั้น การ กันสำรอง และการรับรู้รายได้คงเดิม\" (แต่ถ้าไม่มีหลักประกันเลย จะถูกปรับเป็นชั้น 5 และสำรอง 100% ทันที)."},{"num":408,"q":"สำหรับลูกค้าประเภทบุคคล (ฉ.45) ทรัพย์สินที่ได้กรรมสิทธิ์มาจากการใช้เงินกู้ประเภทใด ที่ธนาคารบังคับว่า \"ต้องระบุ ข้อความห้ามโอน จำนอง หรือจำนำ ไว้ในเอกสารการกู้เงินด้วยเสมอ\"?","choices":[{"key":"ก","text":"สังหาริมทรัพย์ทุกประเภทที่มีมูลค่าเกิน 5,000 บาท"},{"key":"ข","text":"อสังหาริมทรัพย์ หรือสังหาริมทรัพย์ที่ใช้ดำเนินงานได้เกิน 3 ปี และมีมูลค่าตั้งแต่ 10,000 บาทขึ้นไป"},{"key":"ค","text":"ยานพาหนะทุกชนิดที่ใช้ในการขนส่งสินค้า"},{"key":"ง","text":"ผลผลิตทางการเกษตรที่รอการจำหน่าย"}],"answer":"ข","explanation":"สำหรับลูกค้าบุคคล (ฉ.45) ทรัพย์สินที่ได้มาจากเงินกู้ ที่ต้องระบุข้อห้ามโอน จำนอง หรือจำนำไว้ในสัญญากู้ คือ \"อสังหาริมทรัพย์ หรือสังหาริมทรัพย์ที่ใช้ดำเนินงานได้เกิน 3 ปี และมีค่าตั้งแต่ 10,000 บาทขึ้นไป\" ครับ."},{"num":409,"q":"ตามระเบียบฉบับที่ 84 การพิจารณาอนุมัติให้ \"ยกเลิกการจดทะเบียนสัญญาหลักประกันทางธุรกิจ\" ธนาคารมอบอำนาจ ให้บุคคลใดในระดับสาขาสามารถดำเนินการได้ด้วยตนเอง?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ง","text":"ต้องเสนอขออนุมัติจาก ผอจ. เท่านั้น"}],"answer":"ค","explanation":"ระเบียบ 84 หมวด 2 การดำเนินการด้านหลักประกันทางธุรกิจ ข้อ 28.3 และ 28.4 การยกเลิกและไถ่ถอนสัญญา หลักประกันทางธุรกิจเมื่อชำระหนี้เสร็จสิ้น อำนาจอนุมัติอยู่ที่ ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. ปฏิบัติหน้าที่แทน ครับ."},{"num":410,"q":"กรณีที่ผู้กู้ได้ชำระหนี้เสร็จสิ้นทุกสัญญาแล้ว และมีความประสงค์ขอไถ่ถอนที่ดินจำนอง แต่ตรวจสอบพบว่าลูกค้า \"ยังมี สัญญากู้เงินเครดิตเงินสด (แบบรับรองรับผิดอย่างลูกหนี้ร่วมกัน) ที่ยังไม่สิ้นสุดอายุสัญญา\" ลูกค้าจะไถ่ถอนที่ดินได้หรือไม่?","choices":[{"key":"ก","text":"ได้ทันที เนื่องจากสัญญากู้เงินปกติถูกชำระเสร็จสิ้นแล้ว"},{"key":"ข","text":"ได้ แต่ต้องเพิ่มหลักประกันบุคคลค้ำประกันแทน"},{"key":"ค","text":"ไม่ได้ ลูกค้าต้องทำเรื่องขอยกเลิกสัญญากู้เงินเครดิตเงินสด หรือยกเลิกวงเงินกู้ของตนเองก่อน จึงจะอนุญาตให้ถอนจำนอง"},{"key":"ง","text":"ไม่ได้ ต้องรอให้สัญญากู้เงินเครดิตเงินสดหมดอายุลงตามธรรมชาติเท่านั้น"}],"answer":"ค","explanation":"แม้จะจ่ายหนี้ปกติหมดแล้ว แต่ถ้าลูกค้ายังคงมี \"สัญญากู้เงินเครดิตเงินสดแบบรับรองรับผิดอย่างลูกหนี้ร่วมกัน\" ที่ผูกพันอยู่ ธนาคารจะให้ไถ่ถอนไม่ได้ \"จนกว่าลูกค้าจะทำเรื่องขอยกเลิกสัญญากู้เงินเครดิตเงินสด หรือขอยกเลิกวงเงินกู้ ของตนเอง\" เสียก่อนครับ."},{"num":411,"q":"ตามระเบียบ 84 อำนาจอนุมัติให้ลูกค้า \"รวมเอกสารสิทธิที่ดินระหว่างจำนอง\" โดยต้องเป็นไปตามหลักเกณฑ์ที่ ธนาคารกำหนด เป็นอำนาจของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 16 การพิจารณาอนุมัติให้ \"รวมเอกสารสิทธิที่ดินระหว่างจำนอง\" อำนาจการอนุมัติจะอยู่ ที่ ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"num":412,"q":"กรณีลูกค้าบุคคลธรรมดาต้องการให้ผู้อื่น \"เช่า\" อาคารหรือที่ดินที่ติดจำนองกับธนาคาร โดยมี \"อายุการเช่าเกินกว่า 3 ปี\" (ซึ่งต้องจดทะเบียนต่อพนักงานเจ้าหน้าที่) อำนาจการพิจารณาอนุมัติเป็นของบุคคลใดในระดับพื้นที่?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการสินเชื่อระดับต้น (CC1)"}],"answer":"ข","explanation":"ตามระเบียบ 84 การอนุญาตให้บุคคลภายนอกเช่าอาคาร/ที่ดินที่ติดภาระจำนอง หากอายุการเช่า \"เกิน 3 ปี\" (ซึ่งต้องจดทะเบียนต่อเจ้าหน้าที่) อำนาจพิจารณาจะอยู่ที่ ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"num":413,"q":"ตามอำนาจหลังการให้กู้ (ระเบียบ 83) หากลูกค้ากลุ่ม \"ผู้ประกอบการ นิติบุคคล\" หรือ \"กองทุนหมู่บ้าน\" ทำผิด เงื่อนไขจนธนาคารต้องดำเนินการ \"เรียกคืนเงินกู้\" อำนาจการพิจารณาอนุมัตินี้เริ่มต้นที่ตำแหน่งใด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตามระเบียบ 83 ข้อ 6(2) แม้จะเป็นลูกค้านิติบุคคล หรือ กองทุนหมู่บ้าน/ชุมชน หากต้องเรียกคืนเงินกู้ อำนาจจะเริ่มต้นที่ระดับ ผู้จัดการสาขา (ผจข.) เพื่อระงับความเสียหายเบื้องต้นครับ"},{"num":414,"q":"การอนุญาตให้ \"โอนสิทธิในที่ดินซึ่งธนาคารรับจำนองไว้\" (โดยยังคงติดภาระจำนอง) และต้องทำสัญญายินยอมให้ผู้รับ โอนรับใช้หนี้เงินกู้โดยเพิ่มตัวลูกหนี้ เป็นอำนาจของบุคคลใดในระดับสาขา?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) ปฏิบัติหน้าที่แทน"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตามระเบียบ 84 ข้อ 13 การอนุญาตให้โอนสิทธิในที่ดินซึ่งรับจำนองไว้ (โดยยังติดจำนองและทำสัญญายินยอม เพิ่มตัวลูกหนี้) อำนาจอนุมัติในระดับสาขาเป็นของ ผู้จัดการสาขา (ผจข.) (และ ผช.ผจข. สามารถทำแทนได้)"},{"num":415,"q":"ตามข้อห้ามปฏิบัติจากการตรวจสอบของ ธปท. หากพนักงานบันทึก \"งวดการชำระหนี้ในระบบ CBS เกินกว่าที่ระบุไว้ ในสัญญากู้\" จะส่งผลเสียร้ายแรงตามข้อใด?","choices":[{"key":"ก","text":"ทำให้ธนาคารคิดดอกเบี้ยเกินกว่าสัญญา"},{"key":"ข","text":"ทำให้ระบบเริ่มนับวันค้างชำระหนี้ล่าช้ากว่ากำหนด ส่งผลให้การจัดชั้นหนี้ไม่สอดคล้องกับหลักเกณฑ์"},{"key":"ค","text":"ทำให้ธนาคารไม่สามารถตั้งสำรองหนี้ได้ตามกฎหมาย"},{"key":"ง","text":"ทำให้ระบบ CBS ระงับการเบิกจ่ายเงินกู้โดยอัตโนมัติ"}],"answer":"ข","explanation":"ตามข้อห้ามปฏิบัติจากการตรวจสอบของ ธปท. (ข้อ 10) การบันทึกงวดชำระหนี้ในระบบ CBS เกินกว่าที่ระบุ ในสัญญา จะทำให้ \"ระบบเริ่มนับวันค้างชำระหนี้ล่าช้ากว่ากำหนด ส่งผลให้การจัดชั้นหนี้ไม่สอดคล้องกับหลักเกณฑ์ที่ ธปท. ประกาศกำหนด\""},{"num":416,"q":"ข้อใดคือลักษณะของการปฏิบัติงานสินเชื่อที่ \"ขาด Check and Balance\" ซึ่งถือเป็นข้อห้ามเด็ดขาดตามการตรวจสอบของ ธปท.?","choices":[{"key":"ก","text":"ให้ผู้จัดการสาขาเป็นทั้งคนวิเคราะห์และผู้อนุมัติสินเชื่อ"},{"key":"ข","text":"ให้พนักงานคนเดียวกันทำหน้าที่ทั้งการตลาด วิเคราะห์ และดำเนินพิธีการสินเชื่อ"},{"key":"ค","text":"ให้พนักงานการเงินมาเป็นผู้ทำสัญญากู้เงิน"},{"key":"ง","text":"ให้พนักงานพิธีการสินเชื่อทำหน้าที่ผูกหลักประกันข้ามสาขา"}],"answer":"ข","explanation":"ตามข้อห้ามของ ธปท. (ข้อ 11) การปฏิบัติงานที่ขาด Check and balance คือ \"การที่พนักงานคนเดียวกันทำ หน้าที่การตลาด วิเคราะห์ และดำเนินพิธีการสินเชื่อ\" ซึ่งถือเป็นข้อห้ามเด็ดขาดเพื่อป้องกันทุจริต"},{"num":417,"q":"กรณีลูกค้าขอนำที่ดินแปลงที่ติดจำนองกับธนาคาร ซึ่งอยู่ใน \"เขตจัดรูปที่ดิน\" ไปดำเนินการ \"ออกโฉนดหลังจากการจัด รูปที่ดินใหม่\" (โดยยังคงติดภาระจำนองอยู่) อำนาจพิจารณาอนุมัติเป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"ระเบียบ 84 ข้อ 15.1 กำหนดว่า การนำที่ดินที่รับจำนองซึ่งอยู่ในเขตจัดรูปที่ดิน ไปดำเนินการออกโฉนด หลังจากจัดรูปใหม่ (โดยยังติดจำนอง) อำนาจอนุมัติคือ ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"num":418,"q":"จากข้อห้ามปฏิบัติจากการตรวจสอบของ ธปท. ข้อใดคือตัวอย่างความคลาดเคลื่อนในการบันทึกข้อมูลของลูกหนี้ใน ระบบ CBS ที่มักพบและเป็นข้อห้ามอย่างชัดเจน?","choices":[{"key":"ก","text":"ทำให้ลูกหนี้อายุเกินกว่า 80 ปี หรือต่ำกว่า 20 ปี"},{"key":"ข","text":"ทำให้ลูกหนี้อายุเกินกว่า 100 ปี หรือต่ำกว่า 18 ปี"},{"key":"ค","text":"การไม่บันทึกข้อมูลคู่สมรสของลูกหนี้"},{"key":"ง","text":"การบันทึกข้อมูลหลักประกันด้วยเลขที่บัตรประชาชนแทนเลขโฉนด"}],"answer":"ข","explanation":"ข้อห้ามปฏิบัติ ธปท. (ข้อ 8) ระบุห้ามบันทึกข้อมูลลูกหนี้คลาดเคลื่อน เช่น การไม่แก้ไขข้อมูลเดิมที่มีการบันทึก ไม่ถูกต้อง ทำให้ \"ลูกหนี้อายุเกินกว่า 100 ปี หรือต่ำกว่า 18 ปี\""},{"num":419,"q":"ตามระเบียบ 84 หากผู้กู้ได้ชำระหนี้สัญญากู้เงินเสร็จสิ้นแล้ว และต้องการขอ \"ไถ่ถอนหลักประกันที่ได้จดทะเบียน สัญญาหลักประกันทางธุรกิจไว้กับธนาคาร\" ธนาคารกำหนดให้อำนาจอนุมัติเป็นของใครในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) ปฏิบัติหน้าที่แทน"},{"key":"ง","text":"ต้องขออนุมัติจาก ผอจ. เท่านั้น"}],"answer":"ค","explanation":"ระเบียบ 84 หมวด 3 ข้อ 28.4 การไถ่ถอนหลักประกันที่ได้จดทะเบียนสัญญาหลักประกันทางธุรกิจ กรณี ลูกค้าชำระหนี้เสร็จสิ้น ธนาคารมอบอำนาจให้ ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. เป็นผู้อนุมัติครับ"},{"num":420,"q":"ตามข้อห้ามปฏิบัติของ ธปท. การอนุมัติ \"งวดการชำระหนี้\" ในลักษณะใดที่ถือว่าไม่สอดคล้องกับกระแสเงินสดรับ และ เป็นข้อห้ามสำหรับลูกหนี้รายย่อยนอกภาคการเกษตรที่มีกระแสเงินสดรับเป็นรายเดือน?","choices":[{"key":"ก","text":"อนุมัติให้ชำระหนี้เป็นรายเดือน"},{"key":"ข","text":"อนุมัติให้ชำระหนี้เกินกว่า 6 เดือน"},{"key":"ค","text":"อนุมัติให้ชำระหนี้ปีละ 1 ครั้ง"},{"key":"ง","text":"อนุมัติให้ชำระเฉพาะดอกเบี้ยใน 3 ปีแรก"}],"answer":"ข","explanation":"ข้อห้ามปฏิบัติ ธปท. (ข้อ 13) ห้ามอนุมัติงวดการชำระหนี้ไม่สอดคล้องกับกระแสเงินสดรับ เช่น ลูกหนี้ราย ย่อยนอกภาคการเกษตรที่ลงทุนในธุรกิจที่มีรายรับเป็นรายเดือน แต่ธนาคารไป \"อนุมัติงวดการชำระหนี้เกินกว่า 6 เดือน\" ถือว่าขัดหลักเกณฑ์ครับ"},{"num":421,"q":"ตามระเบียบ 84 หมวดกิจการเกี่ยวกับที่ดินรับจำนอง กรณีมีบุคคลอื่นมารับใช้หนี้แทน หรือมีการเปลี่ยนตัวลูกหนี้ การ พิจารณาอนุมัติให้ \"ถอนจำนองเดิมและจดจำนองใหม่\" เป็นอำนาจของบุคคลใด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"ตามระเบียบ 84 หมวดกิจการที่ดินรับจำนอง (ข้อ 19) การถอนจำนองเดิมและจดจำนองใหม่ กรณีบุคคลอื่น รับใช้หนี้แทนหรือเปลี่ยนตัวลูกหนี้ อำนาจตกเป็นของ ผู้จัดการสาขา (ผจข.)."},{"num":422,"q":"กรณีลูกค้ายังมีหนี้เงินกู้ค้างอยู่ และมีความประสงค์ขอ \"ปลอดจำนอง\" ที่ดินเพื่อแบ่งแยกให้ทางราชการหรือ สาธารณประโยชน์ (โดยที่ดินส่วนที่เหลือมีราคาประเมินไม่น้อยกว่า 2 เท่าของหนี้) อำนาจการอนุมัติจะเป็นของใคร?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"หากหนี้ยังคงอยู่ การขอ \"ปลอดจำนอง\" ที่ดินเพื่อแบ่งแยกให้ทางราชการ อำนาจพิจารณาจะถูกยกขึ้นไปที่ ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)."},{"num":423,"q":"หากผู้จำนองต้องการขอ \"ตัดต้นไม้ในที่ดินซึ่งธนาคารรับจำนองไว้\" (โดยที่ดินดังกล่าวยังคงมีราคาประเมินใหม่ไม่น้อย กว่าราคาประเมินเดิม) อำนาจพิจารณาในระดับสาขาตกเป็นของใคร?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"คณะกรรมการระดับต้น (CC1)"}],"answer":"ข","explanation":"ตามระเบียบ 84 (ข้อ 12) การอนุญาตให้ตัดต้นไม้ในที่ดินจำนอง (ราคาประเมินใหม่ต้องไม่น้อยกว่าเดิม) อำนาจพิจารณาในระดับสาขาคือ ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. ทำหน้าที่แทน."},{"num":424,"q":"ในกรณีที่ลูกค้ามีความจำเป็นต้องขอ \"ยืมหนังสือแสดงสิทธิในที่ดิน\" (เช่น โฉนด) ซึ่งธนาคารรับจำนองไว้ ธนาคารมอบ อำนาจให้บุคคลใดเป็นผู้อนุมัติให้ยืมได้?","choices":[{"key":"ก","text":"ไม่อนุญาตให้ยืมในทุกกรณี"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. ทำหน้าที่แทน"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก อนุญาตให้ยืมได้ โดยต้องมีหนังสือยินยอมจากธนาคาร"},{"num":425,"q":"สำหรับทรัพย์สินอื่นที่เป็นหลักประกัน (เช่น สลากออมทรัพย์, เงินฝาก) หากผู้กู้ \"ชำระหนี้เสร็จสิ้นทุกสัญญาแล้ว\" บุคคลใดมีอำนาจในการอนุมัติไถ่ถอนหลักประกันนั้น?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"ตามหมวดกิจการทรัพย์สินอื่นที่เป็นหลักประกัน (ข้อ 32.1) หากชำระหนี้เสร็จสิ้นทุกสัญญา อำนาจการอนุมัติ ไถ่ถอนจะเป็นของ ผู้จัดการสาขา (ผจข.)."},{"num":426,"q":"ตามข้อควรห้ามปฏิบัติจากการตรวจสอบของ ธปท. ข้อใดคือข้อบกพร่องร้ายแรงเกี่ยวกับการจัดการสัญญา หลักประกันทางธุรกิจ?","choices":[{"key":"ก","text":"การให้พนักงานสาขาคีย์ข้อมูลหลักประกันเอง"},{"key":"ข","text":"การไม่ได้ทำทะเบียนคุมการจดทะเบียนหลักประกันทางธุรกิจ ทำให้ไม่สามารถติดตามหรือควบคุมการบริหารจัดการได้"},{"key":"ค","text":"การจดทะเบียนหลักประกันต่ำกว่ามูลค่าหนี้สิน"},{"key":"ง","text":"การนำหลักประกันทางธุรกิจไปทำประกันภัย"}],"answer":"ข","explanation":"ตามข้อห้ามปฏิบัติจากการตรวจสอบของ ธปท. (ข้อ 6) ระบุชัดเจนว่า ห้าม \"ไม่ได้ทำทะเบียนคุมการจด ทะเบียนหลักประกันทางธุรกิจ\" เพราะจะทำให้ธนาคารไม่สามารถติดตามหรือควบคุมการบริหารจัดการหลักประกันได้."},{"num":427,"q":"ตามข้อห้ามปฏิบัติของ ธปท. การอนุมัติสินเชื่อโครงการที่อาจไม่ได้ประกอบธุรกิจจริง โดยลูกค้า \"เบิกใช้เต็มวงเงินใน ครั้งเดียวซึ่งไม่เป็นไปตามเงื่อนไข\" ถือเป็นการฝ่าฝืนข้อควรระวังเรื่องใด?","choices":[{"key":"ก","text":"การหลีกเลี่ยงการจัดชั้นหนี้"},{"key":"ข","text":"การขาด Check and Balance"},{"key":"ค","text":"การอนุมัติและควบคุมการเบิกจ่ายไม่เป็นไปตามวัตถุประสงค์และเงื่อนไข"},{"key":"ง","text":"การบันทึกข้อมูลในระบบ CBS คลาดเคลื่อน"}],"answer":"ค","explanation":"ข้อห้าม ธปท. (ข้อ 7) ระบุว่า \"ห้ามอนุมัติสินเชื่อโครงการที่อาจไม่ได้ประกอบธุรกิจจริง โดยลูกค้าเบิกใช้เต็ม วงเงินในครั้งเดียวไม่เป็นไปตามเงื่อนไขการขออนุมัติสินเชื่อ\"."},{"num":428,"q":"หากเจ้านำที่ดินซึ่งอยู่ในเขตจัดรูปที่ดินที่จำนองไว้กับธนาคาร ไปดำเนินการ \"ออกโฉนดใหม่แทนเอกสารการแสดงสิทธิ เดิม\" (โดยยังติดจำนอง) อำนาจการอนุมัติตกเป็นของใคร?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"ตามระเบียบ 84 (ข้อ 15.2) การนำที่ดินในเขตจัดรูปที่ดินที่ติดจำนองไป \"ออกโฉนดใหม่แทนเอกสารเดิม\" เป็น อำนาจของ ผู้อำนวยการ หรือ ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)."},{"num":429,"q":"กรณีมีความจำเป็นต้อง \"ทำคำคัดค้าน หรือเพิกถอนหลักประกัน\" ซึ่งธนาคารรับจำนองไว้ต่อพนักงานเจ้าหน้าที่ อำนาจการอนุมัติให้ดำเนินการเป็นของบุคคลระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ค","explanation":"ตามระเบียบ 84 (ข้อ 22) การทำคำคัดค้านและเพิกถอนหลักประกัน เป็นกิจการที่มีผลทางกฎหมายสูง ธนาคารมอบอำนาจให้ ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย) (หรือพนักงานระดับ 10 แทน) เป็นผู้อนุมัติ."},{"num":430,"q":"ตามตารางอำนาจหลังการให้กู้ (ระเบียบ 83) หากต้องการ \"เรียกคืนเงินกู้\" สำหรับลูกค้ากลุ่มบุคคล ผู้ประกอบการ กองทุนหมู่บ้านและองค์กร (ฉ.45) ผู้มีอำนาจอนุมัติระดับแรกเริ่มต้นที่ใคร?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตารางอำนาจหลังการให้กู้ (ระเบียบ 83) การพิจารณาเรียกคืนเงินกู้สำหรับลูกค้ากลุ่มบุคคล, ผู้ประกอบการ, กองทุนหมู่บ้าน/ชุมชน และองค์กร อำนาจอนุมัติแรกสุดจะเริ่มต้นที่ ผู้จัดการสาขา (ผจข.)."},{"num":431,"q":"ตามระเบียบ 84 กรณีที่ผู้กู้ได้ชำระหนี้ที่มีอยู่กับธนาคารเสร็จสิ้นแล้ว และต้องการขอ \"ไถ่ถอนที่ดินหรือทรัพย์สินที่ ธนาคารรับจำนองไว้\" อำนาจอนุมัติให้ไถ่ถอนในระดับสาขาเป็นของใคร?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) (หรือ ผช.ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 20.1.1 อนุญาตให้ไถ่ถอนที่ดินหรือทรัพย์สินที่ธนาคารรับจำนองไว้ กรณีที่ลูกค้าชำระหนี้ที่มี อยู่กับธนาคารเสร็จสิ้นแล้ว อำนาจการพิจารณาในระดับสาขาจะเป็นของ ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช. ผจข.)"},{"num":432,"q":"หาก \"สหกรณ์การเกษตร\" ประสงค์ขอไถ่ถอนที่ดินจำนองเพื่อนำไปขาย และจะนำเงินที่ได้จากการขายส่งชำระหนี้คืน ธนาคาร \"ไม่น้อยกว่าร้อยละ 80\" อำนาจพิจารณาอนุมัติเป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ข","explanation":"ตามระเบียบ 84 ข้อ 20.1.3 กรณีสถาบันเกษตรกรขอไถ่ถอนที่ดินเพื่อนำไปขายและนำเงินมาชำระหนี้ไม่น้อย กว่าร้อยละ 80 อำนาจอนุมัติตกเป็นของ ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"num":433,"q":"การพิจารณาอนุญาตให้นำที่ดินจดจำนองไปไถ่ถอนจากจำนอง (ขณะยังมีหนี้) ในกรณีที่ \"ธนาคารได้รับชำระหนี้ต้นเงินกู้ เต็มจำนวนตามวงเงินที่ได้จดทะเบียนจำนอง พร้อมค่าอุปกรณ์\" เป็นอำนาจพิจารณาของบุคคลระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 20.1.5.1 อนุญาตให้นำที่ดินจำนองไปแบ่งไถ่ถอนขณะยังมีหนี้ หากได้รับชำระต้นเงินกู้เต็ม จำนวนตามวงเงินจำนอง อำนาจการอนุมัติระดับสูงเป็นของ ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"num":434,"q":"หากผู้จำนองมีความจำเป็นต้อง \"เปลี่ยนแปลงสาระสำคัญของการจดทะเบียนจำนอง\" เช่น การแก้ไขเล่มทะเบียนที่ติด ภาระจำนอง ใครคือผู้มีอำนาจอนุมัติในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก คณะกรรมการระดับธนาคาร"},{"num":435,"q":"หากสหกรณ์การเกษตรต้องการนำหลักประกันที่จำนองไว้กับธนาคารเป็นลำดับแรก ไปดำเนินการ \"จดจำนองเป็นลำดับ ที่ 2 ให้กับกรมส่งเสริมสหกรณ์\" อำนาจพิจารณาอนุมัติให้ดำเนินการตกเป็นของบุคคลระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 23 การอนุญาตให้สหกรณ์การเกษตรนำหลักประกันที่จำนองกับธนาคารไปจดจำนองเป็น ลำดับที่ 2 ให้กับกรมส่งเสริมสหกรณ์ เป็นอำนาจของ ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"num":436,"q":"การขอไถ่ถอน \"ทรัพย์สินจำนองอื่น\" ที่ธนาคารรับจำนองไว้เป็นหลักประกัน เมื่อลูกค้าได้ชำระหนี้ที่มีอยู่กับธนาคารเสร็จ สิ้นแล้วทั้งหมด อำนาจพิจารณาในระดับสาขาเป็นของใคร?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตามระเบียบ 84 หมวดทรัพย์สินจำนองอื่น ข้อ 24.1.1 กรณีลูกหนี้ชำระหนี้เสร็จสิ้น อำนาจไถ่ถอนทรัพย์สิน จำนองอื่นในระดับสาขาคือ ผู้จัดการสาขา (ผจข.)"},{"num":437,"q":"ในหมวดกิจการเกี่ยวกับทรัพย์สินที่จดทะเบียน \"สัญญาหลักประกันทางธุรกิจ\" บุคคลใดในระดับสาขามีอำนาจลงนามใน การจดทะเบียนสัญญาหลักประกันทางธุรกิจดังกล่าว?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.) (หรือ ผช.ผจข. ปฏิบัติหน้าที่แทน)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน"}],"answer":"ข","explanation":"ตามระเบียบ 84 หมวด 3 ข้อ 27.1 และ 27.2 การรับหลักประกัน อนุมัติวงเงิน และการลงนามจดทะเบียน สัญญาหลักประกันทางธุรกิจ อำนาจในระดับสาขาเป็นของ ผู้จัดการสาขา (ผจข.) โดยสามารถมอบหมายให้ ผช.ผจข. ดำเนินการแทนได้"},{"num":438,"q":"หากลูกค้าต้องการตัดไม้ยืนต้นที่จดทะเบียนสัญญาหลักประกันทางธุรกิจไว้ เพื่อนำไปขายและนำเงินส่งชำระหนี้คืน ธนาคาร \"ไม่น้อยกว่าร้อยละ 80\" ของราคาขาย อำนาจการอนุมัติเป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ก","explanation":"ตามระเบียบ 84 ข้อ 27.12 การอนุญาตให้ลูกค้าตัดต้นไม้ที่จดทะเบียนสัญญาหลักประกันทางธุรกิจเพื่อนำไป ขาย (ส่งชำระหนี้คืนไม่น้อยกว่าร้อยละ 80) ผู้มีอำนาจอนุมัติคือ ผู้จัดการสาขา (ผจข.)"},{"num":439,"q":"ตามตารางอำนาจการดำเนินการหลังการให้กู้ (ระเบียบ 83) การอนุมัติ \"ผัดชำระเงินรายงวด หรือผ่อนเวลาชำระหนี้ หรือ ขยายเวลาชำระหนี้\" ให้แก่ลูกค้าประเภทเกษตรกร (ตามข้อบังคับ ฉ.44) อำนาจอนุมัติแรกสุดเป็นของบุคคลใด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตามตารางอำนาจหลังการให้กู้ (ระเบียบ 83 ข้อ 4(1)) สำหรับการผัดชำระเงินรายงวดของลูกค้าเกษตรกร อำนาจอนุมัติแรกสุดเริ่มต้นที่ ผู้จัดการสาขา (ผจข.)"},{"num":440,"q":"ตามระเบียบ 83 การพิจารณาทำ \"สัญญายินยอมให้บุคคลอื่นรับใช้หนี้เงินกู้ตามสัญญารับใช้หนี้เงินกู้\" สำหรับลูกค้า เกษตรกร (ฉ.44) ธนาคารมอบอำนาจให้บุคคลใดเป็นผู้มีอำนาจในระดับแรกสุด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจระดับ 4"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ข","explanation":"ตามตารางอำนาจหลังการให้กู้ (ระเบียบ 83 ข้อ 4(5)) อำนาจการทำสัญญายินยอมให้บุคคลอื่นรับใช้หนี้เงินกู้ สำหรับลูกค้าเกษตรกร ธนาคารมอบอำนาจให้ หัวหน้าหน่วยอำเภอ (หนภ.) สามารถอนุมัติได้เป็นระดับแรกสุดครับ"},{"num":441,"q":"ตามตารางอำนาจการดำเนินการหลังการให้กู้ (ระเบียบ 83) การพิจารณาอนุมัติให้ลูกค้าประเภท \"เกษตรกร (ฉ.44)\" เปลี่ยนแปลงวัตถุประสงค์การใช้เงินกู้ อำนาจการพิจารณาในระดับแรกสุดตกเป็นของบุคคลใด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตามระเบียบ 83 ข้อ 4(2) อำนาจการพิจารณาอนุมัติให้ลูกค้าเปลี่ยนแปลงวัตถุประสงค์ สำหรับกลุ่มเกษตรกร (ฉ.44) จะเริ่มต้นที่ระดับ ผู้จัดการสาขา (ผจข.) เป็นระดับแรกสุดครับ"},{"num":442,"q":"หากลูกค้า \"สหกรณ์นอกภาคการเกษตร\" (ตามข้อบังคับ ฉ.46) มีความจำเป็นต้องขอพิจารณา \"ผัดชำระเงินรายงวด หรือ ขยายเวลาชำระหนี้เงินกู้\" บุคคลใดมีอำนาจอนุมัติในระดับแรกสุด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"}],"answer":"ข","explanation":"ตามระเบียบ 83 ข้อ 7(1) การผัดชำระเงินรายงวดสำหรับสหกรณ์นอกภาคการเกษตร (ฉ.46) อำนาจการอนุมัติ แรกสุดเริ่มต้นที่ ผู้จัดการสาขา (ผจข.) (และสามารถมอบให้ ผช.ผจข. ดำเนินการแทนได้) ครับ"},{"num":443,"q":"สำหรับหลักประกันที่จดทะเบียน \"สัญญาหลักประกันทางธุรกิจ\" หากลูกค้าต้องการนำไปดำเนินการ แบ่งขาย จำหน่าย จ่ายโอน หรือนำทรัพย์สินอื่นมาทดแทน ใครเป็นผู้มีอำนาจอนุมัติในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ง","text":"ต้องเสนอขออนุมัติจาก ผอจ. เท่านั้น"}],"answer":"ค","explanation":"ตามระเบียบ 84 หมวด 3 ข้อ 27.8 การอนุญาตนำทรัพย์สินที่จดทะเบียนสัญญาหลักประกันทางธุรกิจไปทำ ธุรกรรม แบ่งขาย จ่ายโอน หรือแลกเปลี่ยน อำนาจในระดับสาขาเป็นของ ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. ครับ"},{"num":444,"q":"หมวดกิจการที่ดินรับจำนอง การพิจารณาให้ \"ระงับจำนอง (ปลดจำนอง) และจดทะเบียนจำนองใหม่\" (เช่น กรณีมีการ รวมหรือแบ่งแยกเอกสารสิทธิ) ธนาคารมีกฎเหล็กเรื่องระยะเวลาการจดทะเบียนอย่างไร?","choices":[{"key":"ก","text":"ต้องดำเนินการให้แล้วเสร็จภายใน 3 วันทำการ"},{"key":"ข","text":"ต้องดำเนินการให้แล้วเสร็จภายในวันเดียวกัน"},{"key":"ค","text":"ต้องดำเนินการให้แล้วเสร็จภายใน 7 วันทำการ"},{"key":"ง","text":"ไม่ได้กำหนดระยะเวลาบังคับ"}],"answer":"ข","explanation":"ตามระเบียบ 84 ข้อ 17.3 กฎเหล็กสำหรับการระงับจำนองและจดจำนองใหม่ คือ \"ต้องดำเนินการให้แล้วเสร็จ ภายในวันเดียวกัน\" เพื่อป้องกันความเสี่ยงที่หลักประกันจะหลุดลอยจากระบบครับ"},{"num":445,"q":"ตามระเบียบ 84 กรณีลูกค้าขอนำที่ดินซึ่งธนาคารรับจำนองไว้ และเป็นที่ดินซึ่งอยู่ใน \"เขตจัดรูปที่ดิน\" ไปดำเนินการ \"ออกโฉนดหลังจากจัดรูปที่ดินใหม่\" (โดยยังติดภาระจำนอง) อำนาจการอนุมัติเป็นของบุคคลใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้อำนวยการสำนักบริหารทรัพย์สิน (ผอ.พธ.)"}],"answer":"ข","explanation":"ตามระเบียบ 84 ข้อ 15.1 การอนุญาตนำที่ดินซึ่งอยู่ในเขตจัดรูปที่ดิน ไปออกโฉนดหลังจากจัดรูปที่ดินใหม่ โดย ยังติดภาระจำนอง เป็นอำนาจของ ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.) ครับ"},{"num":446,"q":"หากลูกค้าผู้กู้มีความจำเป็นต้องขอ \"ยืมหนังสือแสดงสิทธิในที่ดิน (เช่น โฉนดที่ดิน)\" ซึ่งธนาคารรับจำนองไว้ ใครคือผู้มี อำนาจอนุมัติให้ยืมได้ในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานการเงิน"},{"key":"ข","text":"พนักงานพัฒนาธุรกิจที่ดูแลลูกค้า"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 14 การพิจารณาอนุญาตให้ยืมหนังสือแสดงสิทธิในที่ดินซึ่งติดภาระจำนอง อำนาจในระดับ สาขาตกเป็นของ ผู้จัดการสาขา (ผจข.) หรือ ผช.ผจข. ดำเนินการแทนได้ครับ"},{"num":447,"q":"การพิจารณา \"เรียกคืนเงินกู้\" สำหรับกลุ่มลูกค้า \"สหกรณ์การเกษตร และกลุ่มเกษตรกร\" (ตาม ฉ.20, 23, 26, 31) อำนาจ การพิจารณาอนุมัติระดับแรกสุดเป็นหน้าที่ของบุคคลในระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการ / ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ./ผช.ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับต้น (CC1)"}],"answer":"ข","explanation":"ตามตารางอำนาจหลังการให้กู้ระเบียบ 83 ข้อ 3(3) การพิจารณาเรียกคืนเงินกู้สำหรับลูกค้าสหกรณ์การเกษตร และกลุ่มเกษตรกร (ฉ.20, 23, 26, 31) \"ระดับสาขาไม่มีอำนาจ\" โดยอำนาจแรกสุดจะเริ่มต้นที่ ผช.ผอจ. หรือ ผอจ. ครับ"},{"num":448,"q":"ตามระเบียบหลังการให้กู้ (ระเบียบ 83) การพิจารณาผ่อนปรน \"งดเว้นการชำระเงินกู้ส่วนต่าง\" สำหรับลูกค้ารายใหญ่ (กรณีสินค้าคงคลังน้อยกว่ามูลค่าหนี้) อำนาจอนุมัติตกเป็นของใคร?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"ผู้ช่วยผู้จัดการธนาคาร (ผช.ผจก. บส.) หรือ รองผู้จัดการธนาคาร (รอง ผจก. ธจ.)"}],"answer":"ง","explanation":"ตามระเบียบ 83 ข้อ 8(1) การงดเว้นชำระเงินกู้ส่วนต่างสำหรับลูกค้ารายใหญ่ เป็นอำนาจที่ต้องดึงขึ้นไปที่ระดับ บริหาร คือ ผู้ช่วยผู้จัดการธนาคาร (ผช.ผจก. บส.) หรือ รองผู้จัดการธนาคาร (รอง ผจก. ธจ.) ครับ"},{"num":449,"q":"ในกรณีที่มีบุคคลอื่นขอรับใช้หนี้แทนผู้กู้ หรือเกิดการเปลี่ยนตัวลูกหนี้ การลงนามอนุมัติให้ \"ถอนจำนองเดิมและจด จำนองใหม่\" เป็นอำนาจของบุคคลใดในระดับสาขา?","choices":[{"key":"ก","text":"พนักงานพิธีการสินเชื่อ"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 19 การถอนจำนองเดิมและจดจำนองใหม่ กรณีมีบุคคลอื่นรับใช้หนี้แทนหรือเปลี่ยนตัว ลูกหนี้ อำนาจอนุมัติในระดับสาขาเป็นของ ผู้จัดการสาขา (ผจข.) ครับ"},{"num":450,"q":"กรณีมีความจำเป็นต้องทำ \"คำคัดค้าน หรือ การเพิกถอนหลักประกัน\" ซึ่งธนาคารรับจำนองไว้ ต่อพนักงานเจ้าหน้าที่ อำนาจการอนุมัติให้ดำเนินการตกเป็นของบุคคลระดับใด?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย)"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร"}],"answer":"ค","explanation":"ตามระเบียบ 84 ข้อ 22 การทำคำคัดค้านและเพิกถอนหลักประกัน เป็นกิจการที่มีผลผูกพันทางกฎหมายสูง อำนาจการพิจารณาอนุมัติจึงเป็นของ ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย) ครับ"}];
let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
