<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบฝึกหัดกิ่งที่ 1: รากฐานกฎหมายและระเบียบ (50 ข้อ)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#4f46e5,#4f46e5dd);padding:24px 20px;text-align:center}
.header h1{font-size:1.4em;color:#fff;margin-bottom:8px}
.header p{color:rgba(255,255,255,.85);font-size:.95em}
.stats{display:flex;justify-content:center;gap:16px;padding:12px 20px;background:#1e293b}
.stat{text-align:center}
.stat .num{font-size:1.5em;font-weight:700;color:#4f46e5}
.stat .label{font-size:.8em;color:#94a3b8}
.controls{padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#4f46e5;color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid #4f46e5;color:#4f46e5}
.btn-outline:hover{background:#4f46e522}
.progress-bar{height:4px;background:#334155;margin:0 20px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#4f46e5;transition:width .3s;width:0%}
.quiz-area{padding:20px;max-width:800px;margin:0 auto}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #4f46e5}
.q-num{color:#4f46e5;font-weight:700;font-size:.9em;margin-bottom:8px}
.q-text{font-size:1.05em;line-height:1.6;margin-bottom:12px}
.choice{padding:10px 14px;margin:6px 0;border-radius:8px;cursor:pointer;transition:all .2s;background:#334155;border:2px solid transparent}
.choice:hover{border-color:#4f46e5;background:#4f46e522}
.choice.selected{border-color:#4f46e5;background:#4f46e533}
.choice.correct{border-color:#22c55e;background:#22c55e22}
.choice.wrong{border-color:#ef4444;background:#ef444422}
.explanation{margin-top:12px;padding:12px;background:#0f172a;border-radius:8px;border-left:4px solid #22c55e;font-size:.9em;line-height:1.6;color:#94a3b8}
.explanation strong{color:#22c55e}
.choice.wrong{border-color:#ef4444;background:#ef444422}
.choice .key{font-weight:700;color:#4f46e5;margin-right:8px}
.result-card{text-align:center;padding:40px 20px;display:none}
.result-card h2{font-size:1.8em;margin-bottom:12px}
.result-score{font-size:3em;font-weight:700;color:#4f46e5}
.result-text{font-size:1.1em;color:#94a3b8;margin:12px 0}
.footer{text-align:center;padding:20px;color:#64748b;font-size:.85em}
</style>
</head>
<body>
<div class="header">
<h1>📜 กิ่งที่ 1</h1>
<p>รากฐานกฎหมายและระเบียบ</p>
</div>
<div class="stats">
<div class="stat"><div class="num" id="totalQ">50</div><div class="label">ข้อทั้งหมด</div></div>
<div class="stat"><div class="num" id="answered">0</div><div class="label">ตอบแล้ว</div></div>
<div class="stat"><div class="num" id="score">0</div><div class="label">คะแนน</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="controls">
<button class="btn btn-primary" onclick="showAll()">เปิดทั้งหมด</button>
<button class="btn btn-outline" onclick="showAnswers()">เฉลยทั้งหมด</button>
<button class="btn btn-outline" onclick="reset()">รีเซ็ต</button>
</div>
<div class="quiz-area" id="quizArea"></div>
<div class="result-card" id="result">
<h2>&#127942; ผลลัพธ์</h2>
<div class="result-score" id="resultScore">0/50</div>
<div class="result-text" id="resultText"></div>
<button class="btn btn-primary" onclick="reset()">ทำใหม่</button>
</div>
<div class="footer">ธ.ก.ส. สาขาวังท่าช้าง | แบบฝึกหัดวิชาสินเชื่อ 555 ข้อ</div>
<script>
const questions=[{"num":1,"q":"ตาม พ.ร.บ. ธ.ก.ส. พ.ศ. 2509 (รวมที่แก้ไขเพิ่มเติม) ข้อใดกล่าวถึงวัตถุประสงค์และอำนาจของธนาคารได้ \"ไม่ถูกต้อง\" ?","choices":[{"key":"ก","text":"ดำเนินงานเป็นสถาบันการเงินเพื่อการพัฒนาชนบท โดยให้ความช่วยเหลือแก่บุคคล กลุ่มบุคคล และกองทุนหมู่บ้าน"},{"key":"ข","text":"มีอำนาจจัดตั้งบริษัทจำกัด หรือบริษัทมหาชนจำกัด เพื่อประกอบธุรกิจเกี่ยวกับเกษตรกรรม"},{"key":"ค","text":"ประกอบธุรกิจอื่นอันเป็นการส่งเสริมหรือสนับสนุนการสร้างผลตอบแทนที่เพิ่มขึ้นสูงสุดให้กับธนาคารและผู้ถือหุ้น"},{"key":"ง","text":"ให้ความช่วยเหลือทางการเงินแก่สหกรณ์ เพื่อใช้ดำเนินงานภายใต้ขอบเขตวัตถุประสงค์ในการจัดตั้งสหกรณ์"},{"key":"จ","text":"ร่วมลงทุนกับนิติบุคคลที่มีวัตถุประสงค์เพื่อส่งเสริมหรือสนับสนุนการประกอบเกษตรกรรม"}],"answer":"ค","explanation":"ตาม พ.ร.บ. ธ.ก.ส. 2509 มาตรา 9 ระบุวัตถุประสงค์เพื่อช่วยเหลือเกษตรกร สหกรณ์ และการพัฒนาชนบท รวมถึงการประกอบธุรกิจอื่นที่ \"ส่งเสริมหรือสนับสนุนการประกอบเกษตรกรรม\" ไม่ใช่เพื่อสร้างผลตอบแทนสูงสุดให้กับผู้ถือ หุ้น ตัวเลือกอื่น (ก, ข, ง, จ) เป็นอำนาจและวัตถุประสงค์ที่ระบุไว้ในกฎหมายอย่างชัดเจนครับ"},{"num":2,"q":"ข้อใดกล่าวถูกต้องที่สุดเกี่ยวกับการจัดการทุนเรือนหุ้นของ ธ.ก.ส. ตาม พ.ร.บ. ธ.ก.ส. 2509 (รวมที่แก้ไขเพิ่มเติม) ?","choices":[{"key":"ก","text":"ธนาคารสามารถขายหุ้นให้แก่สถาบันการเงินอื่น หรือบุคคลอื่นได้ ตามที่รัฐมนตรีประกาศกำหนด"},{"key":"ข","text":"กระทรวงการคลังต้องถือหุ้นของธนาคารไม่น้อยกว่าร้อยละเจ็ดสิบห้าของจำนวนหุ้นที่จำหน่ายได้แล้วทั้งหมดเสมอ"},{"key":"ค","text":"ทุนเรือนหุ้นของธนาคารมีจำนวนตายตัวที่ไม่สามารถเพิ่มหรือลดได้ เพื่อรักษาเสถียรภาพของกองทุน"},{"key":"ง","text":"การขอเพิ่มทุนเรือนหุ้นเป็นคราวๆ ต้องได้รับความเห็นชอบจากผู้ว่าการธนาคารแห่งประเทศไทย"},{"key":"จ","text":"ทุนเรือนหุ้นเริ่มต้นของธนาคารแบ่งออกเป็นห้าสิบล้านหุ้น มูลค่าหุ้นละหนึ่งร้อยบาท"}],"answer":"ก","explanation":"ตามมาตรา 7 ระบุว่าธนาคารสามารถขายหุ้นให้แก่ กระทรวงการคลัง เกษตรกร กลุ่มเกษตรกร สหกรณ์ สถาบันการเงิน หรือ \"บุคคลอื่น\" ได้ตามที่รัฐมนตรีประกาศกำหนด (ข้อ ค. ผิดเพราะมาตรา 7 ทวิ ให้ขอเพิ่มทุนเรือนหุ้นได้โดย ขออนุมัติคณะรัฐมนตรี, ข้อ จ. ผิดเพราะเริ่มแรกแบ่งเป็น 40 ล้านหุ้น)"},{"num":3,"q":"ปัจจุบัน ธ.ก.ส. มีโครงสร้าง \"ระเบียบ\" และ \"ข้อบังคับ\" ที่ยังคงถือใช้ปฏิบัติอยู่จริงกี่ฉบับ และข้อบังคับหมวดที่เกี่ยวข้องกับ สินเชื่อโดยตรงมีจำนวนเท่าใด ?","choices":[{"key":"ก","text":"ข้อบังคับถือใช้ 62 ฉบับ / หมวดสินเชื่อ 10 ฉบับ"},{"key":"ข","text":"ข้อบังคับถือใช้ 48 ฉบับ / หมวดสินเชื่อ 12 ฉบับ"},{"key":"ค","text":"ระเบียบถือใช้ 98 ฉบับ / หมวดสินเชื่อ 12 ฉบับ"},{"key":"ง","text":"ระเบียบถือใช้ 67 ฉบับ / หมวดบริหารจัดการหนี้ 10 ฉบับ"},{"key":"จ","text":"ข้อบังคับถือใช้ 48 ฉบับ / หมวดสินเชื่อ 10 ฉบับ"}],"answer":"ข","explanation":"ปัจจุบัน \"ข้อบังคับ\" ธนาคารมีการออกมาทั้งหมด 62 ฉบับ ยกเลิกไป 14 ฉบับ คงเหลือถือใช้จริง 48 ฉบับ โดยเป็นข้อบังคับด้านงานสินเชื่อ 12 ฉบับ ส่วน \"ระเบียบ\" มีการถือใช้ 67 ฉบับ โดยเป็นหมวดสินเชื่อ 10 ฉบับ"},{"num":4,"q":"ลูกค้ากลุ่มสหกรณ์แต่ละประเภทอยู่ภายใต้เงื่อนไขข้อบังคับที่ต่างกัน หากมี \"สหกรณ์เครดิตยูเนี่ยน\" และ \"สหกรณ์ร้านค้า\" มาติดต่อขอขึ้นทะเบียนเป็นลูกค้า ธนาคารจะต้องพิจารณาคุณสมบัติตามข้อบังคับฉบับใด ?","choices":[{"key":"ก","text":"ข้อบังคับ ฉบับที่ 20"},{"key":"ข","text":"ข้อบังคับ ฉบับที่ 31"},{"key":"ค","text":"ข้อบังคับ ฉบับที่ 35"},{"key":"ง","text":"ข้อบังคับ ฉบับที่ 45"},{"key":"จ","text":"ข้อบังคับ ฉบับที่ 46"}],"answer":"จ","explanation":"สหกรณ์เครดิตยูเนี่ยน และ สหกรณ์ร้านค้า จัดอยู่ในกลุ่ม \"สหกรณ์นอกภาคการเกษตร\" ซึ่งจะต้องใช้ ข้อบังคับ ฉบับที่ 46 (ว่าด้วยการให้สหกรณ์ร้านค้า สหกรณ์บริการ สหกรณ์ออมทรัพย์ และสหกรณ์เครดิตยูเนี่ยนกู้เงิน) ใน การพิจารณาคุณสมบัติครับ"},{"num":5,"q":"ข้อใดจัดเป็นกลุ่มลูกค้าเป้าหมายที่สามารถรับขึ้นทะเบียนได้ตาม \"ข้อบังคับ ฉบับที่ 45\" ทั้งหมด ?","choices":[{"key":"ก","text":"เกษตรกรรายย่อย, กลุ่มบุคคล, กองทุนหมู่บ้าน"},{"key":"ข","text":"สหกรณ์ร้านค้า, องค์กรปกครองส่วนท้องถิ่น (อปท.), บุคคลธรรมดา"},{"key":"ค","text":"สหกรณ์การเกษตร, นิติบุคคล, กองทุนหมู่บ้าน"},{"key":"ง","text":"บุคคลธรรมดา, กลุ่มบุคคล, วิสาหกิจชุมชน, องค์กรปกครองส่วนท้องถิ่น (อปท.)"},{"key":"จ","text":"เกษตรกร, สหกรณ์บริการ, วิสาหกิจชุมชน"}],"answer":"ง","explanation":"ข้อบังคับ ฉบับที่ 45 เป็นข้อบังคับที่ไม่ได้ครอบคลุมเกษตรกรรายย่อย (ซึ่งอยู่ใน ฉ.44) หรือสหกรณ์ต่างๆ แต่จะ ครอบคลุม 5 กลุ่มหลัก ได้แก่ 1) บุคคลธรรมดา 2) กลุ่มบุคคล (รวมถึงวิสาหกิจชุมชน) 3) ผู้ประกอบการ/นิติบุคคล 4) กองทุน หมู่บ้าน 5) องค์กร/อปท."},{"num":6,"q":"การปฏิบัติงานของพนักงานในข้อใด อ้างอิงระเบียบของธนาคารได้ \"ถูกต้อง\" และตรงกับหมวดหมู่มากที่สุด ?","choices":[{"key":"ก","text":"การรับบุคคลธรรมดาขึ้นทะเบียนเป็นลูกค้าประจำสาขา ต้องปฏิบัติตามระเบียบ ฉบับที่ 93"},{"key":"ข","text":"การพิจารณาอนุมัติจ่ายเงินกู้ (Disbursement) ต้องปฏิบัติตามระเบียบ ฉบับที่ 77"},{"key":"ค","text":"การจัดการหนี้ที่เกินกำหนดชำระจนตกเป็น NPLs ต้องปฏิบัติตามระเบียบ ฉบับที่ 64"},{"key":"ง","text":"การประเมินราคาที่ดินที่นำมาจำนอง และการไถ่ถอนหลักประกัน ต้องปฏิบัติตามระเบียบ ฉบับที่ 84"},{"key":"จ","text":"การระบุลักษณะต้องห้ามเรื่องคนวิกลจริตไม่ให้เป็นลูกค้า ต้องปฏิบัติตามระเบียบ ฉบับที่ 92"}],"answer":"ง","explanation":"ระเบียบ ฉบับที่ 84 คือระเบียบที่ว่าด้วย \"การดำเนินงานเกี่ยวกับหลักประกัน\" ซึ่งรวมถึงการประเมินราคาที่ดิน และการทำนิติกรรมจำนอง/ไถ่ถอน (ข้อ ก ผิดเพราะต้องเป็น ฉ.77, ข้อ ข ผิดเพราะจ่ายเงินกู้คือ ฉ.93, ข้อ ค ผิดเพราะ NPLs คือ ฉ.92)"},{"num":7,"q":"ตามข้อบังคับ ฉบับที่ 44 นิยามของคำว่า \"อาชีพที่เกี่ยวเนื่องกับเกษตรกรรม\" หมายความตามข้อใด ?","choices":[{"key":"ก","text":"การเพาะปลูกและปศุสัตว์เพื่อจำหน่ายเป็นรายได้หลักของครอบครัว"},{"key":"ข","text":"การทำนาเกลือ การเลี้ยงไหม และการปลูกสวนป่าเชิงพาณิชย์"},{"key":"ค","text":"การประกอบอาชีพของเกษตรกรที่นำเอาผลิตผลของตนเองหรือจากแหล่งอื่นมาแปรรูปเพื่อสร้างมูลค่าเพิ่ม"},{"key":"ง","text":"การลงทุนในธุรกิจร้านค้าเพื่อจำหน่ายปัจจัยการผลิตทางการเกษตรให้แก่สมาชิกในชุมชน"},{"key":"จ","text":"การนำเครื่องจักรหรือเทคโนโลยีมาใช้ในการลดต้นทุนการผลิตทางการเกษตรของครัวเรือน"}],"answer":"ค","explanation":"ในหมวดนิยามของข้อบังคับ ฉบับที่ 44 \"อาชีพที่เกี่ยวเนื่องกับเกษตรกรรม\" หมายถึง การประกอบอาชีพที่ เกษตรกรนำเอาผลิตผลของตนเอง หรือที่จัดหาจากแหล่งอื่นมาแปรรูปเป็นผลิตภัณฑ์เพื่อเพิ่มมูลค่า (ส่วนข้อ ข คือ \"เกษตรกรรม\" ตรงๆ)"},{"num":8,"q":"ลำดับศักดิ์ของกฎหมายและกฎระเบียบที่ใช้ในการปฏิบัติงานของ ธ.ก.ส. จากโครงสร้างระดับสูงสุดลงมาถึงระดับ ปฏิบัติการ ข้อใดเรียงลำดับได้ถูกต้องที่สุด ?","choices":[{"key":"ก","text":"กฎกระทรวง -> พระราชบัญญัติ ธ.ก.ส. -> ระเบียบธนาคาร -> ข้อบังคับธนาคาร"},{"key":"ข","text":"พระราชบัญญัติ ธ.ก.ส. -> ข้อบังคับธนาคาร -> กฎกระทรวง -> ระเบียบธนาคาร"},{"key":"ค","text":"พระราชบัญญัติ ธ.ก.ส. -> ระเบียบธนาคาร -> กฎกระทรวง -> ข้อบังคับธนาคาร"},{"key":"ง","text":"กฎกระทรวง -> ข้อบังคับธนาคาร -> พระราชบัญญัติ ธ.ก.ส. -> ระเบียบธนาคาร"},{"key":"จ","text":"พระราชบัญญัติ ธ.ก.ส. -> กฎกระทรวง -> ข้อบังคับธนาคาร -> ระเบียบธนาคาร"}],"answer":"จ","explanation":"คำตอบที่ถูกต้องคือ จ เนื่องจาก พระราชบัญญัติ ธ.ก.ส. -> กฎกระทรวง -> ข้อบังคับธนาคาร -> ระเบียบธนาคาร"},{"num":9,"q":"เพื่อเป็นการรักษาการบริหารความเสี่ยงและวินัยการเงินระดับมหภาค ธนาคารมีการกำหนดเพดานภาพรวมสำหรับการ ปล่อยสินเชื่อให้กับลูกค้าตามข้อบังคับ ฉบับที่ 45 และ 46 ไว้อย่างไร ?","choices":[{"key":"ก","text":"ยอดวงเงินกู้รวมของข้อบังคับ ฉ.45 และ ฉ.46 ณ วันสิ้นปีบัญชี ต้องไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"},{"key":"ข","text":"ยอดอนุมัติสินเชื่อใหม่ของข้อบังคับ ฉ.45 และ ฉ.46 ในแต่ละปี ต้องไม่เกินร้อยละ 30 ของเงินให้กู้ยืมทั้งหมด"},{"key":"ค","text":"ยอดหนี้คงเหลือเฉพาะข้อบังคับ ฉ.46 ณ วันสิ้นปีบัญชี ต้องไม่เกินร้อยละ 10 ของยอดหนี้คงเหลือทั้งหมด"},{"key":"ง","text":"ยอดหนี้คงเหลือรวมของข้อบังคับ ฉ.45 และ ฉ.46 ในแต่ละไตรมาส ต้องไม่เกินร้อยละ 25 ของเงินกองทุนของธนาคาร"},{"key":"จ","text":"ยอดหนี้คงเหลือรวมของข้อบังคับ ฉ.45 และ ฉ.46 ณ วันสิ้นปีบัญชี ต้องไม่เกินร้อยละ 20 ของยอดหนี้คงเหลือทั้งหมด"}],"answer":"จ","explanation":"เพื่อควบคุมความเสี่ยงภาพรวม ธนาคารได้กำหนดเพดานการปล่อยสินเชื่อสำหรับกลุ่มข้อบังคับ 45 และ 46 ไว้ ว่า \"หนี้คงเหลือรวมต้องไม่เกินร้อยละ 20 ของยอดหนี้คงเหลือทั้งหมด ณ สิ้นปีบัญชี\" (เว้นแต่จะได้รับอนุญาตจาก รัฐมนตรี) (ข้อ ก เป็นเกณฑ์ SLL ไม่เกิน 15% ของเงินกองทุน)"},{"num":10,"q":"นายสมชาย ไม่ได้เป็นเกษตรกร แต่ต้องการขอกู้เงินเพื่อเปิดร้านกาแฟและเบเกอรี่ในชุมชน พนักงานต้องใช้ข้อบังคับใด เพื่อตรวจสอบสิทธิการเป็นลูกค้า และใช้ระเบียบใดเพื่อเป็นหลักเกณฑ์ในการอนุมัติขึ้นทะเบียน ?","choices":[{"key":"ก","text":"ตรวจสอบสิทธิตามข้อบังคับ ฉ.45 และ อนุมัติขึ้นทะเบียนตามระเบียบ ฉ.77"},{"key":"ข","text":"ตรวจสอบสิทธิตามข้อบังคับ ฉ.44 และ อนุมัติขึ้นทะเบียนตามระเบียบ ฉ.93"},{"key":"ค","text":"ตรวจสอบสิทธิตามข้อบังคับ ฉ.46 และ อนุมัติขึ้นทะเบียนตามระเบียบ ฉ.84"}],"answer":"ก","explanation":"การตรวจสอบสิทธิและการรับลูกค้าผู้ประกอบการรายย่อย/บุคคลธรรมดา ต้องพิจารณาคุณสมบัติตาม ข้อบังคับ ฉบับที่ 45 และในการอนุมัติรับขึ้นทะเบียนเข้าระบบพนักงานจะต้องปฏิบัติตามวิธีการที่ระบุใน ระเบียบ ฉบับที่ 77 (ว่าด้วยลูกค้าผู้กู้)"},{"num":11,"q":"ข้อบังคับของธนาคารหมวดสินเชื่อ มีจำนวน 12 ฉบับที่ใช้งานอยู่ หากมีกลุ่มลูกค้าเป้าหมายที่เป็น \"กลุ่มเกษตรกร\" มา ติดต่อขอกู้เงินเพื่อนำไปเป็น \"ค่าลงทุนระยะยาวเพื่อการเกษตร\" พนักงานจะต้องพิจารณาคุณสมบัติและเงื่อนไขตามข้อบังคับ ฉบับใด?","choices":[{"key":"ก","text":"ข้อบังคับ ฉบับที่ 23"},{"key":"ข","text":"ข้อบังคับ ฉบับที่ 26"},{"key":"ค","text":"ข้อบังคับ ฉบับที่ 31"},{"key":"ง","text":"ข้อบังคับ ฉบับที่ 35"},{"key":"จ","text":"ข้อบังคับ ฉบับที่ 56"}],"answer":"ข","explanation":"ตามโครงสร้างข้อบังคับธนาคาร [Source 7 หน้า 35] การให้กู้เงินแก่ \"กลุ่มเกษตรกรและสหกรณ์การเกษตร\" จะ อยู่ในกลุ่ม ฉ.23, 26, 31, 46 แต่ถ้าเจาะจงว่าเป็นการกู้เงิน \"ระยะยาวเพื่อการเกษตร\" สำหรับกลุ่มเกษตรกรหรือสหกรณ์ฯ จะต้องใช้ ข้อบังคับ ฉบับที่ 26 ครับ (ส่วน ฉ.23 เป็นเรื่องจัดหาวัสดุเกษตร, ฉ.31 คือสหกรณ์การเกษตรกู้เงินทั่วไป และ ฉ.46 เป็นของสหกรณ์นอกภาคการเกษตร)"},{"num":12,"q":"นายสมศักดิ์ ประกอบอาชีพช่างไม้และรับเหมาก่อสร้าง (บุคคลธรรมดา) ย้ายภูมิลำเนาและสถานประกอบการมาอยู่ใน พื้นที่ดำเนินงานของสาขา A ได้ 8 เดือน และต้องการขอกู้เงินเพื่อขยายกิจการ ธนาคารสามารถรับขึ้นทะเบียนเป็นลูกค้าได้ หรือไม่ และอ้างอิงตามข้อบังคับใด?","choices":[{"key":"ก","text":"รับได้ ตามข้อบังคับ ฉ.44 เนื่องจากอาชีพช่างไม้ถือเป็นอาชีพที่เกี่ยวเนื่องกับการเกษตร และอยู่มาเกิน 6 เดือนแล้ว"},{"key":"ข","text":"รับไม่ได้ ตามข้อบังคับ ฉ.45 เนื่องจากผู้ขอขึ้นทะเบียนเป็นบุคคลธรรมดาต้องอาศัยอยู่ในพื้นที่มาแล้วไม่น้อยกว่า 1 ปี"},{"key":"ค","text":"รับได้ ตามข้อบังคับ ฉ.45 เนื่องจากมีถิ่นที่อยู่และประกอบอาชีพในพื้นที่ติดต่อกันมาแล้วไม่น้อยกว่า 6 เดือน"},{"key":"ง","text":"รับไม่ได้ ตามข้อบังคับ ฉ.44 เนื่องจากยังอยู่อาศัยในพื้นที่ไม่ครบ 1 ปีบริบูรณ์ตามเกณฑ์ปกติ"},{"key":"จ","text":"รับได้ ตามข้อบังคับ ฉ.45 แต่ต้องให้ผู้จัดการสาขา (ผจข.) พิจารณาผ่อนผันเป็นลายลักษณ์อักษรก่อนเท่านั้น"}],"answer":"ค","explanation":"ลูกค้าบุคคลธรรมดาที่ประกอบอาชีพอุตสาหกรรม/พาณิชยกรรม/บริการ (ช่างไม้/รับเหมา) จะเข้าเกณฑ์ คุณสมบัติตาม ข้อบังคับ ฉบับที่ 45 ซึ่งมีเงื่อนไขสำคัญคือ ต้องมีถิ่นที่อยู่และประกอบอาชีพอยู่ในพื้นที่ดำเนินงานของสาขา ติดต่อกันมาแล้ว ไม่น้อยกว่า 6 เดือน (ต่างจากเกษตรกร ฉ.44 ที่ต้องใช้เวลา 1 ปี) ดังนั้นเคสนี้อยู่มา 8 เดือน จึงรับขึ้น ทะเบียนได้เลยโดยไม่ต้องขอผ่อนผัน [Source 8 หน้า 64, Source 7 หน้า 41]"},{"num":13,"q":"สหกรณ์ออมทรัพย์แห่งหนึ่งกู้เงินตามข้อบังคับ ฉบับที่ 46 โดยมีหลักประกันเป็นโฉนดที่ดินพร้อมสิ่งปลูกสร้าง ระหว่างที่ ยังมีหนี้ค้างชำระกับธนาคาร สหกรณ์ประสงค์จะนำทรัพย์สินไปทำธุรกรรมเพิ่มเติม การกระทำในข้อใดที่สหกรณ์ \"สามารถทำ ได้ทันทีโดยไม่ต้องขออนุญาตเป็นหนังสือจากธนาคาร\"?","choices":[{"key":"ก","text":"โอนกรรมสิทธิ์ที่ดินบางส่วนที่ไม่ได้ใช้งานให้แก่สมาชิกเพื่อใช้ทำกิน"},{"key":"ข","text":"นำโฉนดที่ดินแปลงที่จำนองไว้กับ ธ.ก.ส. ไปจดทะเบียนจำนองเป็นลำดับที่สองกับสถาบันการเงินอื่นเพื่อเสริมสภาพคล่อง"},{"key":"ค","text":"นำโฉนดที่ดินแปลงอื่นของสหกรณ์ (ที่ไม่ได้ติดภาระจำนองกับ ธ.ก.ส.) ไปขายทอดตลาดเพื่อนำเงินมาเป็นทุนหมุนเวียน"},{"key":"ง","text":"นำทรัพย์สินที่ติดจำนองไปจำนำหรือทำสัญญาหลักประกันทางธุรกิจซ้อนกับเจ้าหนี้รายอื่น"},{"key":"จ","text":"แจ้งจดทะเบียนสิทธิเก็บกินบนที่ดินจำนองแปลงดังกล่าวให้แก่บุคคลภายนอกเพื่อหารายได้พิเศษ"}],"answer":"ค","explanation":"ตามข้อจำกัดด้านทรัพย์สินระหว่างยังมีหนี้สินกับธนาคารของข้อบังคับ ฉ.46 ธนาคาร \"ห้ามโอนกรรมสิทธิ์ให้ บุคคลอื่น, ห้ามนำไปจำนองต่อ, และห้ามนำไปจำนำต่อ\" โดยเด็ดขาด เว้นแต่จะได้รับอนุญาตเป็นหนังสือจากธนาคาร แต่ สำหรับ \"ที่ดินแปลงอื่นที่ไม่ได้ติดจำนองกับ ธ.ก.ส.\" (ข้อ ค.) สหกรณ์มีอิสระในการบริหารจัดการและนำไปขายทอดตลาด ได้ทันทีโดยไม่ต้องขออนุญาตธนาคารครับ [Source 7 หน้า 51]"},{"num":14,"q":"ตามระเบียบ ฉบับที่ 93 ว่าด้วยการให้สินเชื่อ หากลูกค้าต้องการกู้เงินเพื่อเป็น \"ค่าลงทุนในทรัพย์สินระยะยาว\" (เช่น สร้าง โรงเรือน) โดยมีระยะเวลาชำระหนี้ 5 ปี วงเงิน 100,000 บาท ลูกค้าจะต้องมีส่วนร่วมในการลงทุน (Equity) จากเงินของตนเองขั้น ต่ำตามข้อใด?","choices":[{"key":"ก","text":"ไม่ต้องมีส่วนร่วมในการลงทุน เนื่องจากวงเงินกู้ไม่เกิน 500,000 บาท"},{"key":"ข","text":"ต้องลงทุนเองร่วมด้วย ไม่น้อยกว่าร้อยละ 10 ของค่าลงทุนในแผนงาน"},{"key":"ค","text":"ต้องลงทุนเองร่วมด้วย ไม่น้อยกว่าร้อยละ 20 ของค่าลงทุนในแผนงาน"},{"key":"ง","text":"ต้องลงทุนเองร่วมด้วย ไม่น้อยกว่าร้อยละ 30 ของค่าลงทุนในแผนงาน"},{"key":"จ","text":"ธนาคารสามารถให้กู้ได้เต็ม 100% ของค่าลงทุนหากมีหลักประกันคุ้มมูลค่าหนี้และค่าความเสี่ยงต่ำ"}],"answer":"ค","explanation":"ตามระเบียบว่าด้วยการให้สินเชื่อ (และข้อบังคับที่เกี่ยวข้อง) กำหนดอัตราส่วนขั้นต่ำแห่งการลงทุนไว้ว่า หากผู้ กู้ขอกู้เงินเกินกว่า 50,000 บาท และมีระยะเวลาชำระต้นเงิน/ดอกเบี้ยเกินกว่า 3 ปี ผู้กู้ \"ต้องลงทุนเอง (มีส่วนร่วม) ไม่น้อย กว่าร้อยละ 20 ของค่าลงทุนในแผนงาน\" เสมอ เพื่อให้เป็นไปตามหลักเกณฑ์ร่วมลงทุนสร้างความมั่นคง [Source 7 หน้า 46, 51]"},{"num":15,"q":"นางสาว A เป็นเกษตรกร มีภูมิลำเนาอยู่ในเขตอำเภอของสาขา ข. แต่ต้องการขอขึ้นทะเบียนเป็นลูกค้าที่สาขา ค. ซึ่งอยู่ ติดกับแปลงเกษตรของตนมากกว่า หากมีเหตุพิเศษอันควรยกเว้นคุณสมบัติเรื่อง \"ถิ่นที่อยู่\" บุคคลในตำแหน่งใดมีอำนาจเป็นผู้ วินิจฉัยและผ่อนผันให้รับขึ้นทะเบียนได้ ตามระเบียบ ฉบับที่ 77?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ (พพธ.) ประจำพื้นที่"}],"answer":"ค","explanation":"ตามระเบียบ ฉบับที่ 77 ว่าด้วยลูกค้าผู้กู้ อำนาจในการพิจารณาลดหย่อนเกณฑ์หรือยกเว้นคุณสมบัติตามข้อ 3(1)(5)(6) และ (10) แห่งข้อบังคับ ฉ.44 (ซึ่งครอบคลุมเรื่องระยะเวลาถิ่นที่อยู่ และสถานที่ตั้ง) ถูกกำหนดให้เป็นอำนาจของ \"ผู้จัดการสาขา (ผจข.)\" เป็นผู้วินิจฉัยและพิจารณาผ่อนผันครับ [Source 1 หน้า 3, Source 7 หน้า 36, 53]"},{"num":16,"q":"ข้อใดต่อไปนี้ ถือเป็นลักษณะที่ \"ขัดต่อ\" คุณสมบัติในการรับขึ้นทะเบียนเป็นลูกค้าประจำสาขา (ประเภทบุคคล/ ผู้ประกอบการ) ตามข้อบังคับ ฉบับที่ 45 อย่างเด็ดขาด และไม่สามารถนำมาตรการผ่อนผันใดๆ มาใช้ได้?","choices":[{"key":"ก","text":"ผู้ขอขึ้นทะเบียนเคยได้รับโทษจำคุกจากความผิดลหุโทษ (เช่น ขับรถประมาท)"},{"key":"ข","text":"ผู้ขอขึ้นทะเบียนที่เป็นนิติบุคคล ดำเนินธุรกิจมาแล้วเพียง 8 เดือน (ไม่ครบ 1 รอบปีบัญชี)"},{"key":"ค","text":"ผู้ขอขึ้นทะเบียนมีความพิการทางร่างกาย (เช่น นั่งรถเข็น) แต่ยังสามารถบริหารจัดการกิจการได้ตามปกติ"},{"key":"ง","text":"ผู้ขอขึ้นทะเบียนมีสถานะเป็นบุคคลล้มละลาย หรือเป็นผู้มีหนี้สินล้นพ้นตัว ณ วันที่ขอขึ้นทะเบียน"},{"key":"จ","text":"ผู้ขอขึ้นทะเบียนมีผลกำไรทางบัญชีติดลบในปีแรกของการดำเนินธุรกิจ"}],"answer":"ง","explanation":"ลักษณะต้องห้ามร้ายแรงที่ธนาคาร ไม่สามารถรับเป็นลูกค้าได้เด็ดขาด (NO Exception) คือ \"เป็นบุคคล ล้มละลาย หรือมีหนี้สินล้นพ้นตัว\" รวมถึงคนวิกลจริตจิตฟั่นเฟือน ส่วนข้ออื่นๆ เช่น ความผิดลหุโทษ (ข้อ ก.) ไม่ถือเป็นข้อ ห้าม, ระยะเวลาธุรกิจไม่ครบ 1 ปี หรือกำไรติดลบ (ข้อ ข. และ จ.) ผู้จัดการสาขาสามารถพิจารณาผ่อนผันได้ตามสมควรหากมี แนวโน้มธุรกิจที่ดี และความพิการทางร่างกายที่ไม่เป็นอุปสรรคต่อการทำงาน (ข้อ ค.) สามารถรับขึ้นทะเบียนได้ปกติครับ [Source 8 หน้า 65, Source 7 หน้า 42]"},{"num":17,"q":"ตามเกณฑ์หลักประกันเงินกู้ หากลูกค้าเกษตรกรต้องการใช้ \"บุคคลค้ำประกัน\" (ค้ำประกันส่วนตัวอย่างน้อย 2 คน) จะ สามารถค้ำประกันวงเงินกู้รวมกันได้สูงสุดเท่าใดตามเกณฑ์ปกติ และหากมีความจำเป็น ผู้จัดการสาขาสามารถพิจารณาผ่อน ผันวงเงินกู้สูงสุดได้ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ปกติ 100,000 บาท / ผู้จัดการสาขาผ่อนผันได้ไม่เกิน 200,000 บาท"},{"key":"ข","text":"ปกติ 200,000 บาท / ผู้จัดการสาขาผ่อนผันได้ไม่เกิน 300,000 บาท"},{"key":"ค","text":"ปกติ 300,000 บาท / ผู้จัดการสาขาผ่อนผันได้ไม่เกิน 500,000 บาท"},{"key":"ง","text":"ปกติ 500,000 บาท / ผู้จัดการสาขาผ่อนผันได้ไม่เกิน 1,000,000 บาท"},{"key":"จ","text":"ปกติ 1,000,000 บาท / ผู้จัดการสาขาผ่อนผันได้ไม่เกิน 1,500,000 บาท"}],"answer":"ข","explanation":"ในหมวดหลักประกันเงินกู้ตามข้อบังคับ ระบุชัดเจนว่า หากใช้ลูกค้าสาขาหรือบุคคลอื่นเป็นผู้ค้ำประกัน (อย่าง น้อย 2 คน) จะสามารถให้กู้ได้ ไม่เกิน 200,000 บาท (เกณฑ์ปกติ) แต่ธนาคารให้อำนาจ \"ผู้จัดการสาขา\" สามารถ พิจารณาผ่อนผันให้ผู้กู้กู้เงินได้ ไม่เกิน 300,000 บาท หากวิเคราะห์แล้วเห็นสมควร [Source 7 หน้า 44-45]"},{"num":18,"q":"ตามข้อบังคับ ฉบับที่ 46 ข้อใด **ไม่ใช่** เหตุผลที่ทำให้ผู้จัดการมีอำนาจเรียกให้สหกรณ์ผู้กู้ต้องชำระคืนต้นเงินพร้อม ดอกเบี้ยทั้งหมด \"ทันที\" แม้จะยังไม่ถึงกำหนดชำระตามสัญญาก็ตาม?","choices":[{"key":"ก","text":"สหกรณ์ถูกประเมินลดระดับชั้นความเสี่ยงลงมาอยู่ในเกณฑ์สีเหลือง (Minor Risk) เนื่องจากเศรษฐกิจชะลอตัว"},{"key":"ข","text":"สหกรณ์เลิกกิจการ ไม่ว่าด้วยกรณีใดๆ"},{"key":"ค","text":"สหกรณ์นำเงินกู้ไปใช้ผิดวัตถุประสงค์โดยไม่ได้รับอนุญาตให้เปลี่ยนแปลง"},{"key":"ง","text":"สหกรณ์ฝ่าฝืนข้อกำหนดเรื่องหลักประกัน เช่น ลักลอบนำทรัพย์สินไปโอนหรือจำนองต่อ"},{"key":"จ","text":"สหกรณ์ไม่ให้ความร่วมมือในการตรวจงาน หรือไม่ส่งรายงานตามกำหนด"}],"answer":"ก","explanation":"เหตุผลที่ผู้จัดการมีอำนาจเรียกคืนเงินกู้พร้อมดอกเบี้ย \"ทันที\" (Immediate Recall) ตามข้อบังคับ 46 มี 7 ข้อหลัก เช่น สหกรณ์เลิกกิจการ (ข้อ ข.), ใช้เงินผิดวัตถุประสงค์ (ข้อ ค.), ฝ่าฝืนนำหลักประกันไปโอน/จำนอง (ข้อ ง.), ไม่ให้ความ ร่วมมือตรวจงาน (ข้อ จ.) รวมถึงผิดนัดชำระหนี้ และไม่ปฏิบัติตามคำแนะนำธนาคาร แต่ \"การถูกประเมินลดระดับชั้นความ เสี่ยง (Credit Rating Downgrade)\" (ข้อ ก.) ไม่ใช่เหตุให้เรียกเงินคืนทันทีตราบใดที่ลูกค้ายังไม่ได้ทำผิดสัญญาหรือผิดนัดชำระครับ [Source 7 หน้า 51]"},{"num":19,"q":"\"การผัดชำระเงินรายงวด การผ่อนเวลาชำระหนี้ หรือการขยายระยะเวลาชำระหนี้\" ซึ่งเป็นกระบวนการบริหารจัดการ ลูกหนี้ พนักงานจะต้องอ้างอิงและปฏิบัติตามระเบียบของธนาคารหมวดใด และฉบับใดเป็นหลัก?","choices":[{"key":"ก","text":"ระเบียบ ฉบับที่ 77 ว่าด้วยลูกค้าผู้กู้"},{"key":"ข","text":"ระเบียบ ฉบับที่ 84 ว่าด้วยการดำเนินงานเกี่ยวกับหลักประกัน"},{"key":"ค","text":"ระเบียบ ฉบับที่ 93 ว่าด้วยการให้สินเชื่อ"},{"key":"ง","text":"ระเบียบ ฉบับที่ 83 ว่าด้วยการดำเนินการหลังการให้กู้"},{"key":"จ","text":"ระเบียบ ฉบับที่ 64 ว่าด้วยการดำเนินคดีที่เกี่ยวข้องกับลูกค้าเงินกู้"}],"answer":"ง","explanation":"การผัดชำระเงินรายงวด, ผ่อนเวลาชำระหนี้, หรือการแก้ไขเปลี่ยนแปลงงวดชำระ เป็นกระบวนการที่เกิดขึ้น \"หลังจากที่ธนาคารจ่ายเงินกู้ไปแล้ว\" จึงถูกกำหนดหลักเกณฑ์และวิธีปฏิบัติไว้ใน ระเบียบ ฉบับที่ 83 ว่าด้วยการดำเนินการ หลังการให้กู้ (ส่วน ฉ.77 คือตอนรับลูกค้าครั้งแรก และ ฉ.93 คือตอนอนุมัติ/จ่ายเงิน) [Source 7 หน้า 52, 61]"},{"num":20,"q":"หากมี \"กลุ่มวิสาหกิจชุมชน\" ที่รวมตัวกันและจดทะเบียนถูกต้องตามกฎหมาย มาติดต่อขอขึ้นทะเบียนเป็นลูกค้าและขอกู้ เงินเพื่อนำไปสร้างโรงเรือนแปรรูปผลผลิต พนักงานจะต้องใช้โครงสร้างกฎระเบียบใดในการทำงาน \"ตั้งแต่รับลูกค้า ไปจนถึง อนุมัติจ่ายเงินกู้\" เรียงลำดับได้ถูกต้องที่สุด?","choices":[{"key":"ก","text":"พิจารณาสิทธิตาม ข้อบังคับ ฉ.44 -> รับขึ้นทะเบียนตาม ระเบียบ ฉ.77 -> อนุมัติสินเชื่อตาม ระเบียบ ฉ.93"}],"answer":"ข","explanation":"สำหรับกลุ่มลูกค้าเป้าหมายที่ไม่ใช่เกษตรกรรายย่อย เช่น \"วิสาหกิจชุมชน, กลุ่มบุคคล, ผู้ประกอบการ\" กฎหมายกำหนดให้ต้องร้อยเรียงขั้นตอนดังนี้: 1. พิจารณาสิทธิคุณสมบัติในการขอกู้ ตาม ข้อบังคับ ฉบับที่ 45 (ว่าด้วยบุคคล กลุ่มบุคคล วิสาหกิจ กทบ.) 2. ดำเนินการรับขึ้นทะเบียนเข้าระบบและทำประวัติ ตาม ระเบียบ ฉบับที่ 77 (ว่าด้วยลูกค้าผู้กู้) 3. วิเคราะห์สินเชื่อและอนุมัติวงเงิน ตาม ระเบียบ ฉบับที่ 93 (ว่าด้วยการให้สินเชื่อ) จึงตอบข้อ ข. เรียงลำดับได้ถูกต้องที่สุดตามกระบวนการอำนวยสินเชื่อครับ [Source 7 หน้า 35, 52, 54]"},{"num":21,"q":"ข้อใดกล่าว \"ไม่ถูกต้อง\" เกี่ยวกับการที่ลูกค้าประจำสาขาจะพ้นจากการเป็นลูกค้าตามข้อบังคับฉบับที่ 44 ?","choices":[{"key":"ก","text":"ลูกค้าเลิกประกอบอาชีพการเกษตร"},{"key":"ข","text":"ลูกค้าขอลาออกจากการเป็นลูกค้าโดยไม่มีหนี้สินในฐานะผู้กู้ แต่ยังคงมีภาระค้ำประกันหนี้เงินกู้ให้บุคคลอื่นอยู่"},{"key":"ค","text":"ลูกค้าถูกให้ออกจากการเป็นลูกค้า เนื่องจากถูกธนาคารเรียกคืนเงินกู้เมื่อไม่ชำระเงินรายงวดตามกำหนด"},{"key":"ง","text":"ลูกค้าเสียชีวิต"},{"key":"จ","text":"ลูกค้าขาดคุณสมบัติหรือมีลักษณะต้องห้ามตามที่ข้อบังคับกำหนด"}],"answer":"ข","explanation":"ตามคู่มือปฏิบัติงานสินเชื่อ การลาออกจากการเป็นลูกค้าประจำสาขา (ข้อบังคับ 44) ลูกค้าจะสามารถลาออกได้ ก็ต่อเมื่อ \"ไม่มีหนี้สินอยู่ในฐานะผู้กู้ และต้องไม่มีภาระค้ำประกันหนี้เงินกู้ให้บุคคลอื่นค้างอยู่\" ดังนั้นข้อ ข. ที่ระบุว่า ลาออกได้แม้จะมีภาระค้ำประกันอยู่จึงเป็นคำตอบที่ \"ไม่ถูกต้อง\" ครับ ส่วนข้ออื่นๆ เป็นเหตุให้พ้นจากการเป็นลูกค้าตาม ระเบียบ"},{"num":22,"q":"การจัดนัดประชุมเพื่อพิจารณา \"รับลูกค้าเข้าสังกัดกลุ่ม\" ตามข้อบังคับฉบับที่ 44 มติที่ประชุมจะต้องได้รับการรับรองด้วย คะแนนเสียงตามข้อใด จึงจะถือว่าสมบูรณ์และมีผลผูกพันลูกค้าทุกคนในกลุ่ม ?","choices":[{"key":"ก","text":"เสียงข้างมากของลูกค้าที่มาประชุมในวันนั้น"},{"key":"ข","text":"เสียงไม่น้อยกว่ากึ่งหนึ่งของจำนวนลูกค้าที่มาประชุมในวันนั้น"},{"key":"ค","text":"เสียงเกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น"},{"key":"ง","text":"เสียงไม่น้อยกว่าสองในสามของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น"},{"key":"จ","text":"เสียงเกินสองในสามของจำนวนลูกค้าที่มาประชุม"}],"answer":"ค","explanation":"หลักการประชุมของกลุ่มลูกค้าปกติจะใช้มติเสียงข้างมาก แต่สำหรับ \"การประชุมเพื่อรับลูกค้าเข้าสังกัด กลุ่ม\" ถือเป็นวาระสำคัญที่นำความเสี่ยงเรื่องการค้ำประกันร่วมมาสู่กลุ่ม ระเบียบจึงกำหนดให้ต้องมีมติรับรองด้วยคะแนน เสียง \"เกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น\" (ไม่ใช่แค่กึ่งหนึ่งของคนที่มาประชุม) จึงจะมีผลผูกพันตามกฎหมาย"},{"num":23,"q":"เกษตรกรรายใหม่สมัครเป็นลูกค้า ธ.ก.ส. ตามข้อบังคับ ฉบับที่ 44 และเข้าสู่กระบวนการประเมินเพื่อพิจารณาจัดชั้น ลูกค้าใหม่ หากได้คะแนนประเมินรวม 85 คะแนน ลูกค้ารายนี้จะได้รับการจัดชั้นลูกค้าและได้รับโครงสร้างอัตราดอกเบี้ย อ้างอิงตามข้อใด ?","choices":[{"key":"ก","text":"ชั้น AA / อัตราดอกเบี้ย MRR + 1.50"},{"key":"ข","text":"ชั้น AAA / อัตราดอกเบี้ย MRR + 0.75"},{"key":"ค","text":"ชั้น A / อัตราดอกเบี้ย MRR + 2.25"},{"key":"ง","text":"ชั้น AAA / อัตราดอกเบี้ย MRR + 1.00"},{"key":"จ","text":"ชั้น AA / อัตราดอกเบี้ย MRR + 0.75"}],"answer":"ข","explanation":"ตามเกณฑ์การจัดชั้นลูกค้าใหม่ (ฉ.44) ธนาคารจะจัดชั้นและกำหนดดอกเบี้ยตามคะแนนประเมินดังนี้: * คะแนน 80 - 100 = ชั้น AAA / ดอกเบี้ย MRR + 0.75 * คะแนน 70 - 79 = ชั้น AA / ดอกเบี้ย MRR + 1.50 * คะแนนต่ำกว่า 70 = ชั้น A / ดอกเบี้ย MRR + 2.25"},{"num":24,"q":"ตามข้อบังคับฉบับที่ 31 กรณีสหกรณ์ขอกู้เงินเพื่อดำเนินการขายผลิตผลการเกษตร โดยใช้ \"ผลิตผลการเกษตรมาจำนำแก่ ธนาคาร\" เป็นหลักประกัน หากสหกรณ์ต้องการขอรับเงินกู้ไปใช้หมุนเวียนล่วงหน้าก่อนที่จะนำผลิตผลมาจำนำ ธนาคารมี หลักเกณฑ์ในการพิจารณาจ่ายเงินกู้ล่วงหน้าให้อย่างไร ?","choices":[{"key":"ก","text":"จ่ายเงินกู้ให้ได้ไม่เกินร้อยละ 80 ของราคาประเมินผลิตผลที่คาดว่าจะนำมาจำนำ"},{"key":"ข","text":"จ่ายเงินกู้ให้ได้ไม่เกินร้อยละ 50 ของวงเงินกู้ที่ได้รับอนุมัติในแต่ละคราว"},{"key":"ค","text":"จ่ายเงินกู้ให้แก่สหกรณ์ผู้กู้ในวงเงินไม่เกินร้อยละ 30 ของวงเงินกู้รายปี"},{"key":"ง","text":"จ่ายเงินกู้ให้ได้เต็มจำนวนวงเงินกู้ แต่ต้องนำผลิตผลมาส่งมอบจำนำภายใน 15 วัน"},{"key":"จ","text":"ไม่อนุญาตให้จ่ายเงินกู้ล่วงหน้า ต้องมีผลิตผลมาส่งมอบจำนำให้ธนาคารก่อนเท่านั้น"}],"answer":"ค","explanation":"ตามข้อบังคับฉบับที่ 31 ว่าด้วยสหกรณ์การเกษตร หากสหกรณ์กู้เพื่อรวบรวมผลิตผลและมีเหตุต้องใช้เงินก่อนที่ ผลิตผลจะมาถึงมือ ผู้มีอำนาจอนุมัติสามารถพิจารณาจ่ายเงินกู้ให้ล่วงหน้าได้ \"ในวงเงินไม่เกินร้อยละสามสิบ (30%) ของ วงเงินกู้รายปี\" โดยเมื่อได้รับเงินกู้ไปแล้ว สหกรณ์จะต้องนำผลิตผลมูลค่าไม่น้อยกว่า 90% ของเงินกู้นั้นมาจำนำแก่ธนาคารใน เวลาที่กำหนด"},{"num":25,"q":"การจำหน่ายหนี้เงินกู้ออกจากบัญชีเป็นหนี้สูญ กฎกระทรวง ฉบับที่ 374 (พ.ศ. 2564) ได้แก้ไขเพิ่มเติมเกณฑ์วงเงินหนี้ของ ลูกหนี้แต่ละราย ที่ธนาคารสามารถดำเนินการจำหน่ายหนี้สูญได้ \"โดยไม่ต้องดำเนินการฟ้องร้องลูกหนี้\" (กรณีมีหลักฐานการ ติดตามทวงถามและลูกหนี้ตาย/สาบสูญ/เลิกกิจการ) วงเงินดังกล่าวถูกปรับเพิ่มขึ้นเป็นไม่เกินเท่าใด ?","choices":[{"key":"ก","text":"ไม่เกิน 500,000 บาท"},{"key":"ข","text":"ไม่เกิน 1,000,000 บาท"},{"key":"ค","text":"ไม่เกิน 1,500,000 บาท"},{"key":"ง","text":"ไม่เกิน 2,000,000 บาท"}],"answer":"ง","explanation":"กฎกระทรวง ฉบับที่ 374 (พ.ศ. 2564) ออกมาเพื่อผ่อนคลายและแก้ไขกฎกระทรวง ฉบับที่ 186 เดิม ให้สามารถ ทำงานได้สะดวกขึ้น โดยปรับเพิ่มวงเงินหนี้ที่สามารถตัดหนี้สูญได้โดยไม่ต้องผ่านกระบวนการฟ้องร้องทางศาล (กรณีมี หลักฐานติดตามแล้วลูกค้าสาบสูญ/ตาย/เลิกกิจการ) จากเดิม 500,000 บาท ขยายเป็น ไม่เกิน 2,000,000 บาท"},{"num":26,"q":"ตามระเบียบธนาคาร ฉบับที่ 92 ว่าด้วยการสั่งจำหน่ายลูกหนี้ออกจากบัญชีเป็นหนี้สูญ หากเป็นกรณีที่ \"ดำเนินคดีแล้ว (บังคับคดีถึงที่สุด)\" และลูกหนี้มียอดต้นเงินคงเหลือรวมทุกบัญชี 12 ล้านบาท อำนาจในการพิจารณาอนุมัติให้จำหน่ายหนี้สูญ เป็นของคณะบุคคลใด ?","choices":[{"key":"ก","text":"คณะกรรมการการบริหารจัดการหนี้ระดับเขต"},{"key":"ข","text":"คณะกรรมการการบริหารจัดการหนี้ระดับภาค"},{"key":"ค","text":"คณะอนุกรรมการกลั่นกรอง"},{"key":"ง","text":"คณะกรรมการการบริหารจัดการหนี้ระดับธนาคาร"},{"key":"จ","text":"คณะกรรมการ ธ.ก.ส."}],"answer":"ง","explanation":"การพิจารณาอำนาจจำหน่ายหนี้สูญตามระเบียบ ฉบับที่ 92 กรณี \"ดำเนินคดีแล้ว\" แบ่งเป็น: * ระดับเขต: ไม่เกิน 5 ล้านบาท * ระดับภาค: ไม่เกิน 10 ล้านบาท * ระดับธนาคาร: ไม่เกิน 15 ล้านบาท (ดังนั้นวงเงิน 12 ล้านบาท จึงอยู่ในอำนาจระดับธนาคาร) * อนุกรรมการกลั่นกรอง: ไม่เกิน 30 ล้านบาท และ คณะกรรมการ ธ.ก.ส.: มากกว่า 30 ล้านบาทขึ้นไป"},{"num":27,"q":"ตามโครงสร้างอำนาจอนุมัติและการปฏิบัติงานหลังการให้กู้ (ข้อบังคับ 45) หากพบว่าลูกค้าผู้ประกอบการหรือกองทุน หมู่บ้านปฏิบัติผิดเงื่อนไขร้ายแรง และธนาคารจำเป็นต้องพิจารณา \"เรียกคืนเงินกู้\" ทั้งหมดก่อนถึงกำหนดชำระ ตำแหน่งใด ต่อไปนี้เป็นตำแหน่งระดับต่ำสุดที่มีอำนาจอนุมัติสั่งเรียกคืนเงินกู้ได้ ?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ (พพธ.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ง","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"จ","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}],"answer":"ค","explanation":"ตามตารางอำนาจการปฏิบัติงานหลังการให้กู้ (ข้อ 45) วาระเรื่อง \"การเรียกคืนเงินกู้\" ผู้ที่มีอำนาจพิจารณา อนุมัติระดับต่ำสุดที่สามารถสั่งการได้คือ ผู้จัดการสาขา (ผจข.) และไล่ระดับขึ้นไปตามสายบังคับบัญชา (ผู้ช่วยผู้จัดการ สาขา หรือ หนภ. ไม่มีอำนาจสั่งเรียกคืนเงินกู้)"},{"num":28,"q":"สหกรณ์ออมทรัพย์แห่งหนึ่งที่เป็นลูกค้าระดับ \"ขนาดเล็ก\" (มีสินทรัพย์รวม 3,500 ล้านบาท) ขอกู้เงินภายใต้มาตรการ สนับสนุนสินเชื่อให้กับสหกรณ์ออมทรัพย์ประเภทราชการหรือรัฐวิสาหกิจ ธนาคารจะต้องพิจารณาคุณสมบัติด้าน \"อัตราส่วน หนี้สินรวมต่อทุนตนเอง (D/E Ratio)\" ของสหกรณ์แห่งนี้ให้เป็นไปตามเกณฑ์ข้อใด ?","choices":[{"key":"ก","text":"D/E Ratio ต้องไม่เกิน 1.50 เท่า"},{"key":"ข","text":"D/E Ratio ต้องไม่เกิน 2.00 เท่า"},{"key":"ค","text":"D/E Ratio ต้องไม่เกิน 2.50 เท่า"},{"key":"ง","text":"D/E Ratio ต้องไม่เกิน 3.00 เท่า"},{"key":"จ","text":"D/E Ratio ต้องไม่เกิน 3.50 เท่า"}],"answer":"ค","explanation":"สำหรับมาตรการสนับสนุนสหกรณ์ออมทรัพย์ราชการ/รัฐวิสาหกิจ ธนาคารกำหนดเกณฑ์ความเสี่ยง D/E Ratio ไว้ 2 ระดับ คือ: * สหกรณ์ขนาดใหญ่ (สินทรัพย์ $\\ge$ 5,000 ล้านบาท) D/E ต้องไม่เกิน 2.00 เท่า * สหกรณ์ขนาดเล็ก (สินทรัพย์ < 5,000 ล้านบาท) D/E ต้องไม่เกิน 2.50 เท่า"},{"num":29,"q":"ตามโครงการสนับสนุนสินเชื่อธุรกิจชุมชนสร้างไทย (ข้อบังคับ 45) หากวิสาหกิจชุมชนขอกู้เงิน \"เพื่อเป็นค่าลงทุน\" ธนาคารมีการสนับสนุนและลดภาระทางการเงินให้แก่ผู้กู้ในช่วงเริ่มต้นโครงการ โดยคิดอัตราดอกเบี้ยในปีที่ 1 ถึงปีที่ 3 ตาม เงื่อนไขข้อใด ?","choices":[{"key":"ก","text":"ปลอดชำระดอกเบี้ย (อัตราดอกเบี้ยร้อยละ 0 ต่อปี) ในช่วง 3 ปีแรก"},{"key":"ข","text":"คิดอัตราดอกเบี้ยที่เรียกเก็บจากผู้กู้ ร้อยละ 0.01 ต่อปี"},{"key":"ค","text":"คิดอัตราดอกเบี้ยคงที่ ร้อยละ 1.00 ต่อปี"},{"key":"ง","text":"คิดอัตราดอกเบี้ยอ้างอิง MLR ลบร้อยละ 1.00 ต่อปี"},{"key":"จ","text":"คิดอัตราดอกเบี้ยอ้างอิง MRR ลบร้อยละ 1.25 ต่อปี"}],"answer":"ข","explanation":"โครงการธุรกิจชุมชนสร้างไทย เป็นโครงการพิเศษที่ต้องการสนับสนุนการลงทุนของชุมชน โดยหากขอกู้เพื่อ \"เป็นค่าลงทุน\" ธนาคารจะเรียกเก็บดอกเบี้ยในอัตราที่ต่ำมาก คือ ร้อยละ 0.01 ต่อปี ในช่วงปีที่ 1 ถึงปีที่ 3 และตั้งแต่ปีที่ 4 เป็นต้นไปจึงจะปรับเป็นอัตรา MRR หรือ MLR ตามปกติ"},{"num":30,"q":"ตามระเบียบธนาคารเกี่ยวกับการดำเนินงานหลักประกัน กรณีสหกรณ์การเกษตรประสงค์จะขอไถ่ถอนที่ดิน (ที่ธนาคาร รับจำนองไว้) เพื่อนำไปขาย และตกลงจะนำเงินที่ได้จากการขายมาส่งชำระหนี้คืนธนาคาร \"ไม่น้อยกว่าร้อยละ 80\" ของราคา ขาย อำนาจในการอนุญาตให้ไถ่ถอนหลักประกันในกรณีนี้เป็นของใคร ?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"}],"answer":"ข","explanation":"ตามหลักปฏิบัติเรื่องการไถ่ถอนหลักประกัน หากสหกรณ์ต้องการขอไถ่ถอนที่ดินเพื่อไปขายและนำเงินมาตัด ชำระหนี้ ธนาคารมีเงื่อนไขว่าต้องส่งชำระหนี้คืนไม่น้อยกว่าร้อยละ 80 ของราคาขาย โดยอำนาจการอนุญาตในกรณีนี้ตกเป็น ของ ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) หรือ ผู้ช่วย ผอจ. ที่ได้รับมอบหมาย"},{"num":31,"q":"ตามตารางกำหนดเพดานอำนาจอนุมัติวงเงินกู้รวมของธนาคาร สำหรับลูกค้าประเภท \"บุคคลธรรมดา\" ตามข้อบังคับ ฉบับที่ 45 คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับธนาคาร (สำนักงานใหญ่) มีอำนาจอนุมัติวงเงินกู้รวมสูงสุดไม่เกินเท่าใด ?","choices":[{"key":"ก","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 25 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 30 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 50 ล้านบาท"},{"key":"จ","text":"ไม่เกิน 100 ล้านบาท"}],"answer":"ง","explanation":"ตามตารางโครงสร้างอำนาจอนุมัติตามข้อบังคับฉบับที่ 45 สำหรับ \"บุคคล\" (บุคคลธรรมดา) เพดานอำนาจ อนุมัติสูงสุดที่ระดับคณะกรรมการธนาคาร (Bank Level) คือ ไม่เกิน 50 ล้านบาท (หากเกิน 50 ล้านบาท จะต้องเป็นอำนาจ ของคณะอนุกรรมการกลั่นกรอง หรือ คณะกรรมการ บอร์ด ธ.ก.ส.)."},{"num":32,"q":"ในการพิจารณาจัดชั้นและกำหนดอัตราดอกเบี้ยให้แก่ลูกค้าเกษตรกรตามข้อบังคับฉบับที่ 44 หากลูกค้ามีประวัติการชำระ หนี้ได้ตามกำหนด \"ติดต่อกันตั้งแต่ 4 ปีขึ้นไป\" ลูกค้ารายนี้จะได้รับการจัดชั้นและอัตราดอกเบี้ยตามข้อใด ?","choices":[{"key":"ก","text":"ชั้น AAA / อัตราดอกเบี้ย MRR + 0.75"},{"key":"ข","text":"ชั้น AAA / อัตราดอกเบี้ย MRR"},{"key":"ค","text":"ชั้น AAA+ / อัตราดอกเบี้ย MRR + 0.00"},{"key":"ง","text":"ชั้น AA / อัตราดอกเบี้ย MRR + 1.50"},{"key":"จ","text":"ชั้น AAA+ / อัตราดอกเบี้ย MRR - 0.50"}],"answer":"ค","explanation":"ตามหลักเกณฑ์การจัดชั้นลูกค้าและการจัดประวัติการชำระหนี้ (ข้อบังคับ 44) หากลูกค้าสามารถชำระหนี้ได้ ตามกำหนด \"ติดต่อกัน 4 ปีขึ้นไป\" จะได้รับการปรับเลื่อนชั้นเป็น ชั้น AAA+ และได้รับโครงสร้างอัตราดอกเบี้ยต่ำสุดที่ MRR + 0.00."},{"num":33,"q":"สหกรณ์การเกษตร A มีสมาชิกจำนวน 40 คน ได้จัดการประชุมกลุ่มเพื่อพิจารณารับเกษตรกรเข้าสังกัดกลุ่มใหม่เพิ่มอีก 5 คน ตามระเบียบข้อบังคับฉบับที่ 44 มติที่ประชุมจะต้องได้รับการรับรองด้วยคะแนนเสียง \"อย่างน้อยกี่คน\" จึงจะถือว่าสมบูรณ์ และมีผลผูกพัน ?","choices":[{"key":"ก","text":"15 คน (เสียงข้างมากขององค์ประชุม)"},{"key":"ข","text":"16 คน"},{"key":"ค","text":"20 คน (กึ่งหนึ่งของสมาชิกทั้งหมด)"},{"key":"ง","text":"21 คน"},{"key":"จ","text":"27 คน (สองในสามของสมาชิกทั้งหมด)"}],"answer":"ง","explanation":"การประชุมเพื่อ \"รับลูกค้าเข้าสังกัดกลุ่ม\" ถือเป็นวาระพิเศษที่ระเบียบกำหนดให้ต้องมีมติรับรองด้วยคะแนน เสียง \"เกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น\" (ไม่ใช่แค่กึ่งหนึ่งของคนที่มาประชุม) ในกรณีนี้กลุ่มมีสมาชิกทั้งหมด 40 คน กึ่งหนึ่งคือ 20 คน ดังนั้น \"เกินกึ่งหนึ่ง\" จึงต้องใช้อย่างน้อย 21 คน."},{"num":34,"q":"ตามข้อบังคับฉบับที่ 46 ว่าด้วยการให้สหกรณ์นอกภาคการเกษตรกู้เงิน หากสหกรณ์ดังกล่าวมีความประสงค์ขอกู้เงินเพื่อ นำไปเป็น \"ทุนหมุนเวียนในการทำธุรกิจ\" ธนาคารกำหนดเพดานวงเงินกู้สูงสุดไว้ตามข้อใด ?","choices":[{"key":"ก","text":"ไม่เกิน 9 เท่าของทุนสหกรณ์"},{"key":"ข","text":"ไม่เกิน 10 เท่าของทุนสหกรณ์"},{"key":"ค","text":"ไม่เกิน 15 เท่าของทุนสหกรณ์"},{"key":"ง","text":"ไม่เกิน 50 ล้านบาท"},{"key":"จ","text":"ไม่เกิน 100 ล้านบาท"}],"answer":"ค","explanation":"ตามข้อบังคับฉบับที่ 46 ว่าด้วยสหกรณ์นอกภาคการเกษตร ข้อ 3(1) กำหนดวงเงินกู้เพื่อใช้เป็น \"ทุนหมุนเวียน\" ไว้สูงสุด ไม่เกิน 15 เท่าของทุนสหกรณ์ (ส่วนกรณีเพื่อเป็นค่าลงทุน ตามข้อ 3(2) จะกำหนดไว้ไม่เกิน 100 ล้านบาท)."},{"num":35,"q":"ตามข้อบังคับฉบับที่ 56 ว่าด้วยการให้กู้เบิกเงินเกินบัญชี (O/D) ธนาคารได้กำหนดเพดานวงเงินกู้สูงสุดสำหรับกลุ่มลูกค้า ประเภท \"เกษตรกรและบุคคลธรรมดา\" ไว้ที่ไม่เกินจำนวนเท่าใด ?","choices":[{"key":"ก","text":"ไม่เกิน 5 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 25 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 50 ล้านบาท"}],"answer":"ค","explanation":"ตามข้อบังคับฉบับที่ 56 ว่าด้วยการให้กู้เบิกเงินเกินบัญชี (O/D) ได้จำกัดเพดานวงเงิน O/D ของกลุ่ม \"เกษตรกร และบุคคล\" (ข้อ 5(3)) ไว้สูงสุด ไม่เกิน 25 ล้านบาท (ส่วนกลุ่มนิติบุคคล สหกรณ์ หรือองค์กร จะได้เพดานสูงกว่าคือ 100- 200 ล้านบาท)."},{"num":36,"q":"หากลูกค้ามีความประสงค์ขอแบ่งแยกที่ดินซึ่งได้จดทะเบียนจำนองเป็นประกันหนี้เงินกู้ไว้กับธนาคาร เพื่อมอบให้แก่ทาง ราชการสำหรับทำสาธารณประโยชน์ในท้องถิ่น และหลังจากการแบ่งแยก ที่ดินส่วนที่เหลือยังมีราคาประเมินมากกว่า 2 เท่า ของหนี้เงินกู้ ตำแหน่งใดมีอำนาจอนุมัติให้แบ่งแยกที่ดินจำนองในกรณีนี้ ?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ข","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) หรือ ผช.ผอจ."},{"key":"ค","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"},{"key":"ง","text":"ผู้อำนวยการฝ่ายพัฒนาธุรกิจ (ผอ.พธ.)"},{"key":"จ","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับธนาคาร"}],"answer":"ข","explanation":"ตามระเบียบธนาคารฉบับที่ 93 ว่าด้วยการให้สินเชื่อ (ข้อ 8) การอนุญาตให้แบ่งแยกที่ดินจำนองให้แก่ทาง ราชการหรือเพื่อสาธารณประโยชน์ โดยที่ดินส่วนที่เหลือยังมีราคาประเมินไม่น้อยกว่าสองเท่าของหนี้ เป็นอำนาจอนุมัติของ ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) หรือ ผู้ช่วย ผอจ.."},{"num":37,"q":"ในกรณีที่ผู้ขอขึ้นทะเบียนเป็นลูกค้า มีสถานประกอบอาชีพอยู่หลายแห่ง หรือมีถิ่นที่อยู่ไกลจากที่ตั้งของสถานประกอบ อาชีพ ธนาคารมีข้อยกเว้นเรื่องสถานที่รับขึ้นทะเบียนไว้อย่างไร ?","choices":[{"key":"ก","text":"ต้องให้สาขาในพื้นที่ถิ่นที่อยู่ตามทะเบียนบ้านเป็นผู้รับขึ้นทะเบียนเท่านั้น"},{"key":"ข","text":"ต้องให้สาขาในพื้นที่ที่สถานประกอบอาชีพตั้งอยู่เป็นผู้รับขึ้นทะเบียนเท่านั้น"},{"key":"ค","text":"ให้สาขาตามถิ่นที่อยู่พิจารณารับ เว้นแต่ผู้ขอขึ้นทะเบียนสะดวกใช้บริการจากสาขาที่ตั้งสถานประกอบอาชีพ ก็ให้สาขาที่ตั้ง"},{"key":"ง","text":"ผู้ขอขึ้นทะเบียนต้องแบ่งสัดส่วนการขอกู้เงินระหว่างสาขาตามถิ่นที่อยู่และสาขาสถานประกอบอาชีพคนละครึ่ง"},{"key":"จ","text":"ให้ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) เป็นผู้ชี้ขาดว่าสาขาใดควรเป็นผู้รับขึ้นทะเบียน"}],"answer":"ค","explanation":"ตามคู่มือสินเชื่อเล่ม 1 ว่าด้วยการรับลูกค้า (ข้อยกเว้นคุณสมบัติ) ระบุชัดเจนว่าให้สาขาตามถิ่นที่อยู่พิจารณารับ ขึ้นทะเบียน \"เว้นแต่ผู้ขอขึ้นทะเบียนสะดวกจะใช้บริการจากสาขาที่ตั้งของสถานประกอบอาชีพ ก็ให้สาขาที่ตั้งสถาน ประกอบอาชีพหลักพิจารณารับขึ้นทะเบียนได้\" เพื่อเป็นการอำนวยความสะดวกแก่ลูกค้า."},{"num":38,"q":"ตามกฎเกณฑ์การบริหารจัดการหนี้ หากพบว่าลูกหนี้เงินกู้ของธนาคาร \"หายสาบสูญ ตามตัวไม่พบ\" และจากการ ตรวจสอบพบว่าลูกหนี้รายนี้ \"ไม่มีหลักประกันหรือทรัพย์สินใดๆ เลย\" ธนาคารจะต้องดำเนินการจัดชั้นหนี้และการกันสำรอง ตามข้อใด ?","choices":[{"key":"ก","text":"จัดชั้น 4 / กันเงินสำรอง 100% / รับรู้รายได้เกณฑ์เงินสด"},{"key":"ข","text":"จัดชั้น 5 (สงสัยจะสูญ) / กันเงินสำรอง 100% / รับรู้รายได้เกณฑ์เงินสด"},{"key":"ค","text":"คงการจัดชั้นเดิมไว้จนกว่าจะครบอายุความฟ้องร้อง"},{"key":"ง","text":"ตัดหนี้สูญออกจากบัญชีทันทีโดยไม่ต้องกันสำรอง"},{"key":"จ","text":"จัดชั้น 3 / กันเงินสำรอง 50% / รับรู้รายได้เกณฑ์คงค้าง"}],"answer":"ข","explanation":"ตามแนวทางการบริหารจัดการหนี้ หากลูกหนี้หายสาบสูญ เลิกกิจการ หรือหยุดกิจการ โดยที่ \"ไม่มี หลักประกันหรือทรัพย์สิน\" ธนาคารจะต้องดำเนินการ จัดชั้น 5 (สงสัยจะสูญ) พร้อมกับ กันเงินสำรอง 100% และ ปรับการรับรู้รายได้เป็น เกณฑ์เงินสด (NA)."},{"num":39,"q":"สำหรับลูกค้าบุคคลธรรมดาตามข้อบังคับฉบับที่ 45 หากขอกู้เงินประเภท \"ค่าใช้จ่ายหมุนเวียน\" ธนาคารกำหนดระยะเวลา ชำระคืนเงินกู้ตามเกณฑ์ปกติไว้ที่ไม่เกินระยะเวลาเท่าใด ?","choices":[{"key":"ก","text":"ไม่เกิน 6 เดือน นับแต่วันกู้"},{"key":"ข","text":"ไม่เกิน 12 เดือน นับแต่วันกู้"},{"key":"ค","text":"ไม่เกิน 18 เดือน นับแต่วันกู้"},{"key":"ง","text":"ไม่เกิน 3 ปี นับแต่วันกู้"},{"key":"จ","text":"ไม่เกิน 5 ปี นับแต่วันกู้"}],"answer":"ข","explanation":"ระยะเวลาการชำระคืนตามข้อบังคับฉบับที่ 45 สำหรับสินเชื่อ \"ค่าใช้จ่าย (Working Capital)\" กำหนดเกณฑ์ปกติไว้ ไม่เกิน 12 เดือน นับแต่วันกู้ (หากมีเหตุพิเศษสามารถขยายได้ไม่เกิน 18 เดือน)."},{"num":40,"q":"ในการรับโอนลูกค้าข้ามข้อบังคับ กรณีโอนลูกค้าที่เป็น \"บุคคลธรรมดา (ฉ.45)\" มาเป็น \"เกษตรกรลูกค้า (ฉ.44)\" ธนาคารมี นโยบายให้สาขาถือปฏิบัติตามข้อใดเป็นลำดับแรก ?","choices":[{"key":"ก","text":"ให้ลูกค้ายกเลิกสัญญาเงินกู้เดิมทั้งหมดก่อนรับโอน"},{"key":"ข","text":"ให้ลูกค้านำหลักประกันประเภทที่ดินมาจำนองเท่านั้นจึงจะโอนได้"},{"key":"ค","text":"ให้สาขารับเข้าเป็นลูกค้าประเภท \"สังกัดกลุ่ม\" เป็นลำดับแรก"}],"answer":"ค","explanation":"คู่มือสินเชื่อว่าด้วยการรับลูกค้า ระบุวิธีการโอนลูกค้าจากบุคคล (ฉ.45) มาเป็นเกษตรกร (ฉ.44) ไว้ว่า \"ให้สาขา รับเข้าเป็นลูกค้าประเภท 'สังกัดกลุ่ม' เป็นลำดับแรก\" หากลูกค้ามีความจำเป็นไม่สามารถเข้าสังกัดกลุ่มได้ (เช่น ใช้ที่ดิน จำนอง) จึงจะให้ผู้จัดการสาขาพิจารณาผ่อนผันรับเป็นลูกค้าไม่สังกัดกลุ่มได้."},{"num":41,"q":"ตามระเบียบธนาคาร ฉบับที่ 83 ว่าด้วยการดำเนินการหลังการให้กู้ กรณีลูกค้าบุคคลธรรมดา (ข้อบังคับ ฉ.45) มีความ ประสงค์ขอ \"เปลี่ยนแปลงวัตถุประสงค์การใช้เงินกู้\" อำนาจในการพิจารณาอนุมัติให้เปลี่ยนแปลงวัตถุประสงค์ เป็นของบุคคล ในตำแหน่งใด?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ (พพธ.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"จ","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"}],"answer":"ค","explanation":"ตามระเบียบฉบับที่ 83 ว่าด้วยการดำเนินการหลังการให้กู้ (ข้อ 5(2)) อำนาจในการอนุมัติให้ลูกค้าบุคคล เปลี่ยนแปลงวัตถุประสงค์การใช้เงินกู้ เป็นของ ผู้จัดการสาขา (ผจข.) และสามารถไล่ระดับขึ้นไปถึง ผอจ. หรือ ผอ.ฝ่าย ได้ตามความเหมาะสม"},{"num":42,"q":"ตามคู่มือการปฏิบัติงานด้านหลักประกัน กรณีลูกค้าประสงค์จะขอจดทะเบียน \"ภาระจำยอม\" ในที่ดินซึ่งธนาคารรับ จำนองไว้ โดยหลังจากจดทะเบียนแล้ว \"ที่ดินแปลงดังกล่าวยังคงมีราคาประเมินใหม่ ไม่น้อยกว่า 2 เท่าของหนี้เงินกู้ที่ใช้ หลักประกันจำนองในขณะนั้น\" การพิจารณาอนุมัติให้จดทะเบียนภาระจำยอมได้ เป็นอำนาจของตำแหน่งใดเป็นระดับ ต่ำสุด?","choices":[{"key":"ก","text":"ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายพัฒนาธุรกิจ (ผอ.พธ.)"},{"key":"จ","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับธนาคาร"}],"answer":"ข","explanation":"ตามคู่มือการปฏิบัติงานด้านหลักประกัน (ระเบียบข้อ 5.2.1) กรณีที่ดินยังคงมีราคาประเมินใหม่ไม่น้อยกว่า \"สองเท่า\" ของหนี้เงินกู้ที่ใช้หลักประกันจำนอง อำนาจในการอนุมัติให้จดทะเบียนภาระจำยอมเป็นของ ผู้จัดการสาขา (ผจข.), ผช.ผอจ. หรือ ผอจ."},{"num":43,"q":"หากลูกหนี้เงินกู้ของธนาคาร ถูกศาลสั่งพิทักษ์ทรัพย์หรือตกเป็นบุคคลล้มละลาย ธนาคารมีวิธีปฏิบัติตามนโยบายการ บริหารจัดการหนี้และนิติกรรมสัญญา อย่างไร?","choices":[{"key":"ก","text":"สามารถให้กู้ยืมเงินใหม่ได้ หากลูกหนี้นำหลักประกันเป็นเงินฝากมาค้ำประกัน 100%"},{"key":"ข","text":"อนุญาตให้ทำสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.) ได้ เฉพาะกรณีที่ลูกค้าต้องการฟื้นฟูกิจการ"},{"key":"ค","text":"โอนยอดหนี้เป็นหนี้สูญ และตัดออกจากบัญชีทันทีโดยไม่ต้องกันสำรอง"},{"key":"ง","text":"ไม่อนุญาตให้ทำการปรับปรุงโครงสร้างหนี้ (ปปน.) ในทุกกรณี"},{"key":"จ","text":"ให้ผู้จัดการสาขาพิจารณายกเว้นดอกเบี้ยปรับ (Late Charge) ให้ทั้งหมดเพื่อช่วยเหลือ"}],"answer":"ง","explanation":"ตามหลักเกณฑ์และข้อห้ามของการปรับปรุงโครงสร้างหนี้ (ปปน.) ระบุไว้อย่างชัดเจนว่า หากลูกหนี้ถูกศาลสั่ง พิทักษ์ทรัพย์เด็ดขาด หรือตกเป็นบุคคลล้มละลาย ธนาคาร \"ไม่อนุญาตให้ทำการปรับปรุงโครงสร้างหนี้\" ในทุกกรณี เนื่องจากอำนาจการจัดการทรัพย์สินและหนี้สินทั้งหมดจะตกไปอยู่กับเจ้าพนักงานพิทักษ์ทรัพย์"},{"num":44,"q":"ตามหลักกฎหมายแพ่งและพาณิชย์ รวมถึงคู่มือการจัดการหนี้ของธนาคาร \"หนังสือกู้เงินซึ่งกำหนดให้ชำระคืนต้นเงิน เสร็จสิ้นแบบคราวเดียวทั้งหมด\" (เช่น เงินกู้เพื่อเป็นค่าใช้จ่ายระยะสั้น) ต้นเงินในสัญญากู้มีกำหนดอายุความฟ้องร้องกี่ปี?","choices":[{"key":"ก","text":"2 ปี"},{"key":"ข","text":"5 ปี"},{"key":"ค","text":"10 ปี"},{"key":"ง","text":"15 ปี"},{"key":"จ","text":"20 ปี"}],"answer":"ค","explanation":"ตามหลักกฎหมาย อายุความฟ้องร้องเรียกคืนหนี้เงินกู้จะแบ่งเป็น 2 กรณีหลักคือ: 1) สัญญากู้ที่กำหนดชำระคืนเป็น \"งวดๆ\" (เช่น ค่าลงทุน) จะมีอายุความ 5 ปี 2) สัญญากู้ที่กำหนดชำระคืน \"คราวเดียวทั้งหมด\" (เช่น ค่าใช้จ่าย P/N) จะมีอายุความ 10 ปี"},{"num":45,"q":"หากธนาคารตรวจสอบพบว่า \"ดอกเบี้ยเงินกู้\" ของลูกค้าใกล้จะขาดอายุความ หรือค้างชำระมาแล้วเกิน 5 ปี แต่ \"ต้น เงินกู้\" ตามสัญญายังไม่ขาดอายุความ พนักงานจะต้องดำเนินการให้ลูกค้าจัดทำเอกสารใด เพื่อป้องกันมิให้ธนาคารเสียสิทธิใน การเรียกร้องดอกเบี้ย?","choices":[{"key":"ก","text":"สัญญาเปลี่ยนตัวลูกหนี้"},{"key":"ข","text":"หนังสือรับสภาพหนี้"}],"answer":"ค","explanation":"หากต้นเงินยังไม่ขาดอายุความ แต่ดอกเบี้ยกำลังจะขาด หรือค้างชำระมาเกิน 5 ปี ธนาคารจะต้องให้ลูกค้า จัดทำ \"หนังสือรับสภาพความรับผิด\" เพื่อเป็นการรีเซ็ตอายุความของดอกเบี้ยใหม่ ป้องกันธนาคารเสียประโยชน์ทาง กฎหมาย (ส่วน \"หนังสือรับสภาพหนี้\" จะใช้กรณีหนี้ขาดอายุความไปแล้ว)"},{"num":46,"q":"กรณีลูกค้าเงินกู้เสียชีวิต และ \"ทายาท\" มาติดต่อขอรับโอนหนี้โดยตกลงทำนิติกรรม \"สัญญารับใช้หนี้เงินกู้\" ตามระเบียบ แล้วผู้จัดการสาขาสามารถทำคำสั่งมอบอำนาจช่วงให้พนักงานในตำแหน่งใดต่อไปนี้ เป็นผู้ดำเนินการจัดทำสัญญาแทน ธนาคารได้บ้าง?","choices":[{"key":"ก","text":"ผู้ช่วยผู้จัดการสาขา หรือ หัวหน้าหน่วยอำเภอ หรือ พนักงานพัฒนาธุรกิจ ระดับ 4 – 7"},{"key":"ข","text":"พนักงานการเงิน หรือ พนักงานธุรกิจ"},{"key":"ค","text":"นิติกรประจำสำนักงาน ธ.ก.ส. จังหวัด"},{"key":"ง","text":"ไม่สามารถมอบอำนาจได้ ผู้จัดการสาขาต้องเป็นผู้ดำเนินการและลงนามด้วยตนเองเท่านั้น"},{"key":"จ","text":"พนักงานระดับ 8 ขึ้นไป ในสังกัดฝ่ายกิจการสาขาภาค"}],"answer":"ก","explanation":"ตามคู่มือปฏิบัติงาน เมื่อลูกค้าเสียชีวิตและทายาทขอเข้ามาทำสัญญารับใช้หนี้เงินกู้ ผู้จัดการสาขามีอำนาจสั่ง การหรือทำคำสั่งมอบอำนาจช่วงให้ ผู้ช่วยผู้จัดการสาขา หรือ หัวหน้าหน่วยอำเภอ หรือ พนักงานพัฒนาธุรกิจ ระดับ 4 – 7 เป็นผู้ดำเนินการจัดทำนิติกรรมสัญญาแทนธนาคารได้"},{"num":47,"q":"โครงสร้างคณะกรรมการพิจารณาอนุมัติการให้สินเชื่อของ ธ.ก.ส. ในระดับ \"สำนักงาน ธ.ก.ส. จังหวัด (สนจ.)\" ถูก กำหนดให้บุคคลในตำแหน่งใดทำหน้าที่เป็น \"เลขานุการ\" ของคณะกรรมการชุดนี้?","choices":[{"key":"ก","text":"ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผช.ผอจ.)"},{"key":"ข","text":"พนักงานบริหารเงินทุน หรือ พนักงานพัฒนาลูกค้า ระดับ 9"},{"key":"ค","text":"พนักงานบริหารสินเชื่อ ที่ได้รับมอบหมาย"},{"key":"ง","text":"ผู้จัดการสาขา 2 สาขา ที่ได้รับมอบหมาย"},{"key":"จ","text":"นิติกรประจำสำนักงาน ธ.ก.ส. จังหวัด"}],"answer":"ค","explanation":"ตามคำสั่งแต่งตั้งคณะกรรมการพิจารณาอนุมัติการให้สินเชื่อ โครงสร้างของระดับจังหวัด (สนจ.) จะมี ผอจ. เป็นประธานกรรมการ และมี \"พนักงานบริหารสินเชื่อ\" ที่ได้รับมอบหมาย ทำหน้าที่เป็น \"เลขานุการ\" ของคณะกรรมการ"},{"num":48,"q":"ตามตารางสรุปกรอบอำนาจอนุมัติสินเชื่อใหม่ สำหรับลูกค้ากลุ่ม \"สหกรณ์การเกษตรและกลุ่มเกษตรกร\" คณะกรรมการ พิจารณาอนุมัติการให้สินเชื่อ \"ระดับสาขา\" (Branch Level) มีอำนาจอนุมัติวงเงินกู้สูงสุดรวมกันไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 10 ล้านบาท"},{"key":"ข","text":"ไม่เกิน 15 ล้านบาท"},{"key":"ค","text":"ไม่เกิน 30 ล้านบาท"},{"key":"ง","text":"ไม่เกิน 50 ล้านบาท"},{"key":"จ","text":"ไม่มีอำนาจอนุมัติ (N/A) ในทุกระดับวงเงิน (ต้องเสนอระดับจังหวัดขึ้นไปพิจารณา)"}],"answer":"จ","explanation":"สำหรับกลุ่มสถาบัน (สหกรณ์การเกษตรและกลุ่มเกษตรกร) เพดานอำนาจอนุมัติจะเริ่มต้นที่ \"ระดับจังหวัด (Provincial Level)\" เป็นต้นไป ดังนั้นใน \"ระดับสาขา (Branch Level)\" จึง ไม่มีอำนาจอนุมัติ (N/A) ในกลุ่มลูกค้าประเภทนี้เลย,,"},{"num":49,"q":"ตามข้อบังคับฉบับที่ 31 ว่าด้วยการให้สหกรณ์การเกษตรกู้เงิน กรณีสหกรณ์ขอกู้เงิน \"เพื่อเป็นทุนให้สมาชิกกู้\" คณะกรรมการระดับธนาคาร (สำนักงานใหญ่) มีอำนาจอนุมัติวงเงินกู้รวมสูงสุดตามเพดานในข้อใด?","choices":[{"key":"ก","text":"ไม่เกิน 9 เท่าของทุนสหกรณ์"},{"key":"ข","text":"ไม่เกิน 15 เท่าของทุนสหกรณ์"},{"key":"ค","text":"ไม่เกิน 20 เท่าของทุนสหกรณ์"},{"key":"ง","text":"ไม่เกิน 100 ล้านบาท"},{"key":"จ","text":"เกิน 20 เท่าของทุนสหกรณ์ขึ้นไป"}],"answer":"ข","explanation":"ตามข้อบังคับฉบับที่ 31 ข้อ 2(1) ทุนให้สมาชิกกู้ กรอบอำนาจอนุมัติใน \"ระดับธนาคาร (Bank Level)\" จะถูก กำหนดไว้ที่ \"ไม่เกิน 15 เท่าแห่งทุน\" (ส่วนระดับกลางก็ 15 เท่าแห่งทุนแต่เพดานเงินบาทไม่เกิน 500 ลบ. และระดับ คณะอนุกรรมการกลั่นกรอง ไม่เกิน 20 เท่าแห่งทุน)"},{"num":50,"q":"การรับเกษตรกรขึ้นทะเบียนเป็นลูกค้าประจำสาขากรณี \"เกณฑ์ลดหย่อน\" โดยเป็นการรับเกษตรกรที่มีสถานที่ประกอบ อาชีพอยู่ในท้องที่ \"หลายสาขา\" หรืออยู่นอกเขตดำเนินงานของสาขา ตามระเบียบ ฉบับที่ 77 ธนาคารกำหนดให้สาขาใดเป็น ผู้รับขึ้นทะเบียนเป็นลูกค้าประจำสาขาและสอบสวนประวัติ?","choices":[{"key":"ก","text":"สาขาที่ผู้ขอขึ้นทะเบียนมีภูมิลำเนาตามทะเบียนบ้านเท่านั้น เป็นผู้รับขึ้นทะเบียน"},{"key":"ข","text":"ให้ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) เป็นผู้วินิจฉัยสั่งการเป็นรายกรณี"}],"answer":"ค","explanation":"ในกรณีที่ลูกค้าประกอบอาชีพข้ามเขต หรือมีสถานประกอบการหลายสาขา เพื่อให้การกำกับดูแลและการ วิเคราะห์ความเป็นไปได้ของโครงการแม่นยำที่สุด ระเบียบกำหนดให้ \"สาขาซึ่งเป็นสถานที่ตั้งของโครงการ หรือ สถานที่"}];
let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
</body>
</html>
