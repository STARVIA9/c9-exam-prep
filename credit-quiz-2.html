{"num":74,"q":"นายนนน มีภูมิลำเนาตามทะเบียนบ้านอยู่ที่อำเภอเมือง จ.ชลบุรี แต่มีสถานประกอบอาชีพ (สวนทุเรียน 20 ไร่) อยู่ที่ อำเภอแกลง จ.ระยอง หากนายนนนต้องการขอขึ้นทะเบียนเป็นลูกค้าและกู้เงินเพื่อปรับปรุงสวนทุเรียน พนักงานสาขาแกลง ควรพิจารณาดำเนินการอย่างไรตามระเบียบ?","choices":[{"key":"ก","text":"ต้องให้สาขาชลบุรี (ตามทะเบียนบ้าน) เป็นผู้รับขึ้นทะเบียนเท่านั้น แล้วจึงทำหนังสือขอความร่วมมือให้สาขาแกลง"},{"key":"ข","text":"สาขาแกลงสามารถรับขึ้นทะเบียนได้ โดยส่งพนักงานไปสอบรายการขอขึ้นทะเบียนที่ภูมิลำเนาของนายนนน หรือขอความ"},{"key":"ค","text":"ปฏิเสธการรับขึ้นทะเบียน เนื่องจากภูมิลำเนาและสถานประกอบอาชีพไม่ได้อยู่ในเขตจังหวัดเดียวกัน"},{"key":"ง","text":"ให้นายนนนย้ายทะเบียนบ้านมาอยู่ที่จังหวัดระยองก่อนเป็นเวลาอย่างน้อย 6 เดือน จึงจะรับขึ้นทะเบียนได้"},{"key":"จ","text":"ให้ผู้จัดการสาขาทั้งสองแห่งทำบันทึกตกลงแบ่งสัดส่วนการให้สินเชื่อคนละครึ่งเพื่อกระจายความเสี่ยง"}],"answer":"ข"},

{"num":77,"q":"กองทุนหมู่บ้าน A ได้รับการประเมินศักยภาพเพื่อจัดระดับชั้นและกำหนดวงเงินกู้ โดยทำคะแนนในหมวดการบริหารได้ 20 คะแนน และหมวดฐานะทางการเงินได้ 50 คะแนน (คะแนนรวม 70 คะแนน) กองทุนหมู่บ้านแห่งนี้จะได้รับพิจารณาวงเงิน กู้สูงสุดตามข้อใด?","choices":[{"key":"ก","text":"วงเงินกู้สูงสุดไม่เกิน 14 เท่าของทุนตนเอง"},{"key":"ข","text":"วงเงินกู้สูงสุดไม่เกิน 16 เท่าของทุนตนเอง"},{"key":"ค","text":"วงเงินกู้สูงสุดไม่เกิน 18 เท่าของทุนตนเอง"},{"key":"ง","text":"วงเงินกู้สูงสุดไม่เกิน 20 เท่าของทุนตนเอง"},{"key":"จ","text":"ยังไม่สามารถพิจารณาให้เงินกู้ได้ เนื่องจากคะแนนไม่ถึงเกณฑ์ขั้นต่ำ"}],"answer":"ข"},

{"num":79,"q":"กรณีที่ลูกค้าถูกจัดประวัติการชำระหนี้เป็น \"ลูกค้าผิดนัดชำระหนี้ (ตกชั้น B)\" แต่ภายหลังสามารถหาเงินมาชำระหนี้จน เสร็จสิ้น หรือได้รับการแก้ไขด้วยเครื่องมือแก้ไขหนี้ (Loan Review / Revolving) จนกลับมาเป็นหนี้ปกติ สาขาสามารถพิจารณา แก้ไขประวัติให้กลับเป็น \"ชั้นเดิมก่อนตกชั้น\" ได้ โดยอำนาจอนุมัตินี้เป็นของตำแหน่งใด?","choices":[{"key":"ก","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ข","text":"ผู้จัดการสาขา (ผจข.) โดยต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา"},{"key":"ค","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ง","text":"ผู้อำนวยการฝ่ายบริหารจัดการคุณภาพหนี้ (ผอ.ฝ่าย)"},{"key":"จ","text":"ระบบคอมพิวเตอร์ (CBS) จะดำเนินการปรับแก้ให้โดยอัตโนมัติเมื่อสิ้นวันทำการ"}],"answer":"ข"},
{"num":80,"q":"ในการพิจารณาตรวจสอบความเกี่ยวข้องกลุ่มลูกหนี้ (SLL) ของสถาบันเกษตรกร หากสหกรณ์การเกษตร A มีเงินกู้กับ ธนาคาร และพบว่า \"คู่สมรสของคณะกรรมการดำเนินงานสหกรณ์\" จำนวน 2 ราย มากู้เงินส่วนตัวเพื่อประกอบธุรกิจที่มี วัตถุประสงค์เดียวกันกับสหกรณ์ (เช่น รวบรวมผลผลิต) ธนาคารมีหลักเกณฑ์ในการนับรวมกลุ่ม (Total Group Exposure) อย่างไร?","choices":[{"key":"ก","text":"ไม่ต้องนับรวม เนื่องจากคู่สมรสกู้เงินในนามบุคคลธรรมดา แยกต่างหากจากนิติบุคคลของสหกรณ์"},{"key":"ข","text":"ไม่ต้องนับรวม เนื่องจากคู่สมรสไม่ใช่ผู้บริหารหรือคณะกรรมการดำเนินงานของสหกรณ์โดยตรง"},{"key":"ค","text":"ต้องนับรวม เฉพาะกรณีที่คู่สมรสเหล่านั้นนำหลักประกันของสหกรณ์มาจำนองค้ำประกันหนี้ของตนเองเท่านั้น"},{"key":"ง","text":"ต้องนับรวมเป็นกลุ่มเดียวกัน เนื่องจากคู่สมรสถือเป็นผู้เกี่ยวข้องกับคณะกรรมการ และทำธุรกิจวัตถุประสงค์เดียวกัน"},{"key":"จ","text":"ให้ผู้จัดการสาขาใช้ดุลพินิจพิจารณาเป็นรายๆ ไป โดยไม่ถูกบังคับตามเกณฑ์ SLL"}],"answer":"ง"},

{"num":82,"q":"หากบุคคลธรรมดาประสงค์จะขอขึ้นทะเบียนเป็นลูกค้า (ข้อบังคับ ฉ.45) แต่พบว่ามีถิ่นที่อยู่หรือประกอบอาชีพในพื้นที่ ดำเนินงาน \"ไม่ถึง 6 เดือน\" (ขาดคุณสมบัติตามข้อ 3(1)) ตำแหน่งใดต่อไปนี้มีอำนาจระดับต่ำสุดในการพิจารณา \"ผ่อนผัน\" ยกเว้นคุณสมบัติและรับขึ้นทะเบียนเป็นลูกค้าได้?","choices":[{"key":"ก","text":"พนักงานพัฒนาธุรกิจ (พพธ.)"},{"key":"ข","text":"หัวหน้าหน่วยอำเภอ (หนภ.)"},{"key":"ค","text":"ผู้จัดการสาขา (ผจข.)"},{"key":"ง","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"จ","text":"ผู้อำนวยการฝ่ายกิจการสาขาภาค"}],"answer":"ค"},

{"num":85,"q":"กรณีลูกค้าบุคคลธรรมดา (ฉ.45) แจ้งความประสงค์ขอโอนเปลี่ยนประเภทมาเป็น \"เกษตรกรลูกค้า (ฉ.44)\" แต่ปรากฏ ว่าลูกค้ารายดังกล่าวยังคงมีหนี้เงินกู้ตามข้อบังคับ ฉ.45 เดิมที่ \"ยังชำระไม่เสร็จสิ้น\" ธนาคารมีวิธีปฏิบัติเกี่ยวกับเงื่อนไขของ สัญญาเดิมอย่างไร?","choices":[{"key":"ก","text":"ให้ปรับลดอัตราดอกเบี้ยให้ตรงกับโครงสร้างของเกษตรกร ฉ.44 ทันทีเพื่อความช่วยเหลือ"},{"key":"ข","text":"ให้ลูกค้านำเงินสดมาปิดบัญชีเดิมให้เสร็จสิ้นก่อน จึงจะสามารถรับโอนประเภทลูกค้าได้"}],"answer":"ค"},
{"num":86,"q":"ตามหลักเกณฑ์ของข้อบังคับฉบับที่ 44 การรวมตัวกันเพื่อจัดตั้ง \"กลุ่มลูกค้า (กลุ่มใหม่)\" จะต้องประกอบด้วยลูกค้า ประจำสาขาจำนวนอย่างน้อยกี่คน จึงจะสามารถจัดตั้งเป็นกลุ่มได้สำเร็จ?","choices":[{"key":"ก","text":"อย่างน้อย 3 คน"},{"key":"ข","text":"อย่างน้อย 5 คน"},{"key":"ค","text":"อย่างน้อย 7 คน"},{"key":"ง","text":"อย่างน้อย 10 คน"},{"key":"จ","text":"อย่างน้อย 15 คน"}],"answer":"ข"},

{"num":88,"q":"นายเอก เป็นลูกค้าที่มีภูมิลำเนาตามทะเบียนบ้านอยู่ในเขต \"สาขา ก.\" แต่มีที่ดินทำกินและประกอบอาชีพส่วนใหญ่อยู่ ในเขตพื้นที่ของ \"สาขา ข.\" นายเอกประสงค์จะขอกู้เงินเพื่อลงทุนในที่ดินแปลงดังกล่าว ธนาคารควรพิจารณาเรื่องสถานที่รับ ขึ้นทะเบียนและการสอบสวนข้อมูลอย่างไรจึงจะเหมาะสมตามระเบียบ?","choices":[{"key":"ก","text":"ต้องให้ สาขา ก. (ตามทะเบียนบ้าน) เป็นผู้รับขึ้นทะเบียนเท่านั้น และไม่อนุญาตให้กู้ข้ามเขต"},{"key":"ข","text":"ให้ สาขา ข. (ที่ตั้งโครงการ/ประกอบอาชีพ) เป็นผู้รับขึ้นทะเบียน และทำหนังสือขอความร่วมมือให้ สาขา ก. ช่วยสอบสวน"},{"key":"ค","text":"นายเอกต้องย้ายทะเบียนบ้านไปอยู่เขต สาขา ข. เป็นเวลาไม่น้อยกว่า 6 เดือนก่อนจึงจะทำธุรกรรมได้"},{"key":"ง","text":"ให้ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด เป็นผู้ตัดสินใจชี้ขาดว่าสาขาใดควรเป็นผู้รับผิดชอบ"},{"key":"จ","text":"สาขา ก. รับขึ้นทะเบียน แต่เวลาทำสัญญากู้เงินต้องไปทำที่ สาขา ข."}],"answer":"ข"},

{"num":130,"q":"ตามระเบียบข้อบังคับ การที่ลูกค้าประจำสาขาจะสามารถยื่นเรื่อง \"ขอลาออก\" และพ้นสภาพจากการเป็นลูกค้าของ ธนาคารได้อย่างสมบูรณ์ จะต้องปราศจากเงื่อนไขในข้อใด?","choices":[{"key":"ก","text":"ลูกค้าเลิกประกอบอาชีพการเกษตร"},{"key":"ข","text":"ลูกค้ามีการย้ายถิ่นฐานออกนอกเขตดำเนินงานของสาขา"},{"key":"ค","text":"ลูกค้าไม่มีหนี้สินกับธนาคารในฐานะผู้กู้ แต่ \"ยังมีภาระเป็นผู้ค้ำประกันหนี้\" ให้กับสมาชิกรายอื่น"},{"key":"ง","text":"ลูกค้าเสียชีวิต"}],"answer":"ค"},

{"num":122,"q":"ในการวิเคราะห์ความเสี่ยงด้านหลักประกัน (Collateral Risk) นอกเหนือจากการพิจารณากรรมสิทธิ์และทำเลที่ตั้งของ ทรัพย์สินแล้ว ธนาคารยังกำหนดให้พนักงานต้องวิเคราะห์ปัจจัยใดเพิ่มเติม เพื่อเป็นตัวช่วยในการปิดความเสี่ยงหากลูกค้าหลัก ไม่สามารถชำระหนี้ได้?","choices":[{"key":"ก","text":"โครงสร้างเงินทุนของกิจการ"},{"key":"ข","text":"ความตั้งใจในการชำระหนี้ (Willing to pay)"},{"key":"ค","text":"ภาวะอุตสาหกรรมและการแข่งขัน"},{"key":"ง","text":"การพิจารณาความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม"},{"key":"จ","text":"สถานการณ์เศรษฐกิจในระดับมหภาค"}],"answer":"ง"},
{"num":123,"q":"หากลูกค้าผู้ประกอบการประสงค์จะกู้เงินเพื่อนำไปทำธุรกิจค้าระหว่างประเทศ (Trade Finance) พนักงานสินเชื่อจะต้อง เพิ่มการวิเคราะห์หลัก 7'C ในด้านใดเข้ามาเป็นพิเศษ เพื่อประเมินความเสี่ยงด้านการเมือง เศรษฐกิจ และอัตราแลกเปลี่ยน ของประเทศปลายทาง?","choices":[{"key":"ก","text":"Character (คุณลักษณะ)"},{"key":"ข","text":"Capacity (ความสามารถชำระหนี้)"},{"key":"ค","text":"Condition (สถานการณ์)"},{"key":"ง","text":"Control (การควบคุมเงื่อนไข)"},{"key":"จ","text":"Country (ประเทศคู่ค้า)"}],"answer":"จ"},

{"num":125,"q":"ในกรณีที่ลูกค้ายื่นขอสินเชื่อ แต่ธนาคารพบว่ามีประวัติเครดิตบูโรที่ค้างชำระอย่างหนักจึงต้อง \"ปฏิเสธการให้สินเชื่อ\" ธนาคารมีหน้าที่ต้องออกหนังสือปฏิเสธให้ลูกค้าทราบ โดยลูกค้าสามารถนำหนังสือนี้ไปตรวจสอบความถูกต้องของข้อมูล ตนเองที่บริษัทข้อมูลเครดิตแห่งชาติได้ฟรี \"ภายในระยะเวลากี่วัน\"?","choices":[{"key":"ก","text":"ภายใน 7 วัน นับแต่วันที่ได้รับคำปฏิเสธ"},{"key":"ข","text":"ภายใน 15 วัน นับแต่วันที่ได้รับคำปฏิเสธ"},{"key":"ค","text":"ภายใน 30 วัน นับแต่วันที่ได้รับคำปฏิเสธ"}],"answer":"ค"},
{"num":126,"q":"ตามหลักการวิเคราะห์สินเชื่อ 7'C การประเมินในข้อใดต่อไปนี้ที่ตรงกับความหมายของการวิเคราะห์ด้าน \"Capital (เงินทุนของกิจการ)\" มากที่สุด?","choices":[{"key":"ก","text":"การวิเคราะห์ประวัติความซื่อสัตย์และเครดิตบูโรของลูกค้า"},{"key":"ข","text":"การวิเคราะห์งบกระแสเงินสดและกำไรสุทธิในแต่ละเดือน"},{"key":"ค","text":"การประเมินโครงสร้างเงินทุนและสัดส่วนหนี้สินต่อทุน (D/E Ratio)"},{"key":"ง","text":"การตั้งเงื่อนไขการเบิกจ่ายเงินกู้เป็นงวดๆ ตามความก้าวหน้า"},{"key":"จ","text":"การประเมินสภาพคล่องในการขายทอดตลาดของที่ดินจำนอง"}],"answer":"ค"},

{"num":130,"q":"แม้ว่ากฎเหล็กของการพิจารณาสินเชื่อคือการระมัดระวังลูกค้าที่มีประวัติหนี้เสีย แต่ธนาคารมี \"ข้อยกเว้นพิเศษ\" ที่ให้ ผ่อนปรนการสนับสนุนสินเชื่อได้ สำหรับลูกค้าที่มีประวัติตกอยู่ในกลุ่มสีแดง หรือเป็น NPL ในกรณีใดต่อไปนี้?","choices":[{"key":"ก","text":"ลูกค้าที่ขอกู้เงินเพื่อนำไป Refinance ปิดหนี้บัตรเครดิต"},{"key":"ข","text":"ลูกค้าขอกู้เงินไปซื้อสินทรัพย์เก็งกำไรและยินยอมจ่ายดอกเบี้ยสูง"},{"key":"ค","text":"ลูกค้า NPL ของ ธ.ก.ส. ที่ขอเข้าปรับปรุงโครงสร้างหนี้แล้ว และต้องการขอ \"สินเชื่อเพื่อฟื้นฟูอาชีพ\""},{"key":"ง","text":"ลูกค้าที่เป็นนิติบุคคลจดทะเบียนในตลาดหลักทรัพย์ที่กำลังเข้าสู่กระบวนการล้มละลาย"}],"answer":"ค"},

let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
