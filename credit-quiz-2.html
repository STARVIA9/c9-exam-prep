<script>
const questions=[{"num": 1, "q": "ตามนโยบายการให้สินเชื่อของธนาคาร ข้อใดต่อไปนี้จัดอยู่ในกลุ่ม \"นโยบายที่ไม่สนับสนุน (Negative List)\" ซึ่งธนาคารจะ ปฏิเสธการให้สินเชื่อ", "choices": {"ก": "การขอสินเชื่อเพื่อลงทุนในธุรกิจอาหารเพื่อสุขภาพ (Plant-based Food)", "ข": "การขอสินเชื่อเพื่อซื้อสมาร์ทโฟน (Smart Phone) สำหรับพัฒนาคุณภาพชีวิต", "ค": "การขอสินเชื่อเพื่อนำไปชำระหนี้สินภายนอกระบบของเกษตรกรหรือบุคคล", "ง": "การขอสินเชื่อเพื่อประกอบธุรกิจในลักษณะแฟรนไชส์ (Franchise)", "จ": "การขอสินเชื่อเพื่อติดตั้งระบบพลังงานทดแทนในสถานประกอบการ"}, "answer": "ค", "explanation": "ตามนโยบายการให้สินเชื่อของ ธ.ก.ส. ธุรกิจที่เกี่ยวกับการขอสินเชื่อเพื่อชำระหนี้สินภายนอกระบบของ เกษตรกรหรือบุคคล ถือเป็น **\"นโยบายที่ไม่สนับสนุน (Negative List)\"** ส่วนข้ออื่นๆ เช่น การซื้อ Smart Phone, ธุรกิจ Plant- based Food และธุรกิจแฟรนไชส์ ถือเป็นสินเชื่อที่ธนาคารให้การสนับสนุนเพื่อพัฒนาคุณภาพชีวิตและสร้างมูลค่าเพิ่ม"}, {"num": 2, "q": "นโยบายการสนับสนุนสินเชื่ออย่างระมัดระวัง (พิจารณาเป็นพิเศษ) กรณีลูกค้าขอ Re-finance หนี้จากสถาบันการเงินอื่น ลูกค้าจะต้องมีคุณสมบัติตามข้อใดจึงจะเข้าเกณฑ์พิจารณา", "choices": {"ก": "มีประวัติค้างชำระกับสถาบันการเงินเดิมไม่เกิน 3 งวด", "ข": "เป็นลูกค้าที่ผ่านการปรับปรุงโครงสร้างหนี้ (ปปน.) จากสถาบันอื่นมาแล้วไม่น้อยกว่า 2 ปี และชำระต้นเงินพร้อมดอกเบี้ย มาแล้วไม่น้อยกว่า 12 งวด (รายเดือน)", "ค": "เป็นลูกค้าที่อยู่ระหว่างมาตรการปรับปรุงโครงสร้างหนี้เชิงป้องกัน (Pre-emptive) กับสถาบันอื่น และชำระเงินมาแล้ว 6 งวด", "ง": "นำหลักประกันที่เป็นที่ดินพร้อมสิ่งปลูกสร้างมาค้ำประกันเต็ม 100% ของวงเงินกู้", "จ": "มีบัญชีเงินฝากกับ ธ.ก.ส. ในจำนวนไม่น้อยกว่าร้อยละ 20 ของวงเงินที่จะขอ Re-finance"}, "answer": "ข", "explanation": "สำหรับการขอ Re-finance จากสถาบันการเงินอื่น ธนาคารมีนโยบายสนับสนุนอย่างระมัดระวัง โดยมีเงื่อนไข สำคัญคือ หากลูกค้าเคยมีการปรับปรุงโครงสร้างหนี้ (ปปน.) กับสถาบันอื่น **\"ต้องผ่านการ ปปน. มาแล้วไม่น้อยกว่า 2 ปี และชำระหนี้ต้นเงินพร้อมดอกเบี้ยมาแล้วไม่น้อยกว่า 12 งวดรายเดือน\"** และต้องเข้าเกณฑ์ NPL Exit ด้วย"}, {"num": 3, "q": "บริษัท แห่งหนึ่ง ยื่นขอสินเชื่อระยะสั้นเพื่อชำระค่าที่ดิน โดยชี้แจงว่าอยู่ \"ระหว่างรอเงินเพิ่มทุนจากผู้ถือหุ้นใหม่\" ที่จะเข้า มาในอีก 3 เดือนข้างหน้าเพื่อดำเนินโครงการ ธนาคารควรพิจารณาคำขอนี้อย่างไรตามนโยบายสินเชื่อ", "choices": {"ก": "สนับสนุนได้ทันที เนื่องจากมีแหล่งที่มาของรายได้ (เงินเพิ่มทุน) ที่ชัดเจนในอนาคต", "ข": "สนับสนุนอย่างระมัดระวัง โดยกำหนดให้จดทะเบียนจำนองที่ดินแปลงดังกล่าวเป็นหลักประกัน", "ค": "ไม่สนับสนุน เนื่องจากเข้าข่ายการลงทุนซื้อที่ดินโดยไม่มีแผนการดำเนินงานที่ชัดเจนในปัจจุบัน", "ง": "ไม่สนับสนุน เนื่องจากเข้าข่ายเป็นสินเชื่อในลักษณะ Bridge Financing (สินเชื่อระยะสั้นเพื่อรอเงินทุนระยะยาว) ซึ่งผิด วัตถุประสงค์", "จ": "สนับสนุนได้ หากบริษัทตกลงใช้อัตราดอกเบี้ยบวกค่าความเสี่ยงสูงสุด (MRR + 3.00)"}, "answer": "ง", "explanation": "การขอสินเชื่อระยะสั้นเพื่อชำระค่าที่ดินโดยอ้างว่า \"รอเงินเพิ่มทุนจากผู้ถือหุ้น\" เข้าข่ายเป็นสินเชื่อประเภท ** \"Bridge Financing หรือ Bridging Loan\"** (การใช้สินเชื่อระยะสั้นมาเป็นสะพานเชื่อมเพื่อรอเงินทุนระยะยาว) ซึ่งเป็นลักษณะที่ ธนาคารไม่ให้การสนับสนุน"}, {"num": 4, "q": "ตามระเบียบ ฉบับที่ 77 ว่าด้วยลูกค้าผู้กู้ กรณีรับเกษตรกรขึ้นทะเบียนเป็นลูกค้าประจำสาขาตาม \"เกณฑ์ปกติ\" (ข้อบังคับ ฉ.44 ข้อ 5) ตำแหน่งใดต่อไปนี้เป็นตำแหน่งระดับต่ำสุดที่มีอำนาจอนุมัติรับขึ้นทะเบียนในระบบได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.)", "ข": "พนักงานการเงิน (พกง.)", "ค": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ง": "ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.)", "จ": "ผู้จัดการสาขา (ผจข.)"}, "answer": "ค", "explanation": "ตามตารางมอบอำนาจของระเบียบ ฉบับที่ 77 หมวดที่ 1 (การรับขึ้นทะเบียนเป็นลูกค้าประจำสาขา) สำหรับ ลูกค้าเกษตรกรตาม \"เกณฑ์ปกติ (ข้อ 5)\" อำนาจการอนุมัติระดับต่ำสุดที่ทำได้คือ **\"หัวหน้าหน่วยอำเภอ (หนภ.)\"** และไล่ เรียงขึ้นไปจนถึง ผจข., ผอจ., ฯลฯ"}, {"num": 5, "q": "หากเกษตรกรผู้ขอขึ้นทะเบียนเป็นลูกค้าตามข้อบังคับ ฉ.44 ขาดคุณสมบัติบางประการ เช่น \"มีถิ่นที่อยู่หรือประกอบ อาชีพในพื้นที่มาไม่ถึง 1 ปี\" ตำแหน่งใดมีอำนาจในการพิจารณาวินิจฉัยและ \"ผ่อนผัน\" ให้รับขึ้นทะเบียนเป็นกรณีพิเศษได้", "choices": {"ก": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ข": "ผู้จัดการสาขา (ผจข.)", "ค": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)", "ง": "ผู้อำนวยการฝ่ายกิจการสาขาภาค (ผอ.ฝ่าย) จ. คณะอนุกรรมการกลั่นกรองระดับจังหวัด"}, "answer": "ข", "explanation": "ตามระเบียบ ฉบับที่ 77 หากลูกค้าเกษตรกรมีลักษณะข้อห้ามหรือขาดคุณสมบัติบางประการตามข้อบังคับ ฉ.44 (เช่น ระยะเวลาในพื้นที่ไม่ครบ) ตำแหน่งที่มีอำนาจพิจารณาวินิจฉัยและ **ผ่อนผันรับขึ้นทะเบียน** คือ **\"ผู้จัดการสาขา (ผจข.)\"** โดยผู้ช่วยผู้จัดการสามารถปฏิบัติหน้าที่แทนได้หากได้รับมอบอำนาจ"}, {"num": 6, "q": "นายรชต ได้ขึ้นทะเบียนเป็นลูกค้าใหม่ตามข้อบังคับ ฉ.44 และได้รับการประเมินความเสี่ยงตามแบบประเมินลูกค้าใหม่ หากนายรชตได้คะแนนประเมินรวม \"79 คะแนน\" จะได้รับการจัดชั้นลูกค้าและอัตราดอกเบี้ยตามข้อใด", "choices": {"ก": "ชั้น AAA / โครงสร้างอัตราดอกเบี้ย MRR + 0.75", "ข": "ชั้น AAA / โครงสร้างอัตราดอกเบี้ย MRR + 1.50", "ค": "ชั้น AA / โครงสร้างอัตราดอกเบี้ย MRR + 1.50", "ง": "ชั้น AA / โครงสร้างอัตราดอกเบี้ย MRR + 0.75", "จ": "ชั้น A / โครงสร้างอัตราดอกเบี้ย MRR + 2.25"}, "answer": "ค", "explanation": "ตามแบบประเมินเพื่อพิจารณาจัดชั้นลูกค้าใหม่ (ข้อบังคับ ฉ.44) หากลูกค้าได้คะแนน 80-100 จะได้ชั้น AAA (MRR+0.75), **หากได้คะแนน 70-79 จะได้ \"ชั้น AA\" และได้โครงสร้างอัตราดอกเบี้ย \"MRR + 1.50\"** และหากต่ำกว่า 70 จะได้ชั้น A (MRR+2.25)"}, {"num": 7, "q": "ในการพิจารณาจัดการประชุมกลุ่มลูกค้าประจำสาขาตามข้อบังคับ ฉบับที่ 44 การประชุมจะถือว่าครบ \"องค์ประชุม\" ก็ ต่อเมื่อมีลูกค้าประจำสาขาในกลุ่มมาร่วมประชุมตามเกณฑ์ในข้อใด", "choices": {"ก": "ไม่น้อยกว่ากึ่งหนึ่งของจำนวนลูกค้าประจำสาขาในกลุ่มลูกค้าทั้งหมด", "ข": "ไม่น้อยกว่าสองในสามของจำนวนลูกค้าประจำสาขาในกลุ่มลูกค้าทั้งหมด", "ค": "เกินกว่ากึ่งหนึ่งของจำนวนลูกค้าที่ลงชื่อเข้าสังกัดกลุ่ม", "ง": "ต้องมาประชุมครบทุกคนแบบเอกฉันท์ (ร้อยละ 100)", "จ": "ไม่น้อยกว่าหนึ่งในสามของจำนวนลูกค้าประจำสาขาในกลุ่มลูกค้าทั้งหมด"}, "answer": "ข", "explanation": "ตามหลักการดำเนินงานของกลุ่มลูกค้า (ข้อบังคับ ฉ.44) การเรียกประชุมกลุ่มลูกค้าประจำสาขา จะถือว่าเป็น \"องค์ประชุม\" ได้ ก็ต่อเมื่อมีลูกค้าประจำสาขาในกลุ่มมาร่วมประชุม **\"ไม่น้อยกว่าสองในสามของจำนวนลูกค้าประจำสาขาใน กลุ่มลูกค้าทั้งหมด\"**"}, {"num": 8, "q": "ตามข้อบังคับ ฉบับที่ 45 เหตุผลในข้อใดที่ทำให้ผู้จัดการสาขาสามารถสั่งให้ลูกค้า \"ออกจาก\" การเป็นลูกค้าประจำสาขาได้ ทันที", "choices": {"ก": "ลูกค้ามีผลประกอบการขาดทุนติดต่อกัน 2 ปีบัญชี", "ข": "ลูกค้าย้ายทะเบียนบ้านแต่สถานประกอบการยังอยู่ในพื้นที่ดำเนินการของสาขา", "ค": "ลูกค้าขอเปลี่ยนประเภทหลักประกันจากอสังหาริมทรัพย์เป็นบุคคลค้ำประกัน", "ง": "ลูกค้าฝ่าฝืนข้อบังคับหรือระเบียบของธนาคารเกี่ยวกับการกู้เงิน หรือประพฤติตนไม่ซื่อสัตย์สุจริต", "จ": "ลูกค้าปฏิเสธการเข้าร่วมโครงการสินเชื่อของรัฐบาล"}, "answer": "ง", "explanation": "ตามข้อบังคับ ฉบับที่ 45 ข้อ 6 ผู้จัดการมีอำนาจสั่งให้ออกจากการเป็นลูกค้าประจำสาขาได้หากลูกค้ากระทำผิด เช่น ถูกเรียกคืนเงินกู้, **ฝ่าฝืนข้อบังคับ/ระเบียบของธนาคารเกี่ยวกับการกู้เงิน, ไม่ซื่อสัตย์สุจริต หรือทำให้เสื่อมเสียแก่ ธนาคาร** และมิได้อยู่เป็นปกติในท้องที่"}, {"num": 9, "q": "หากลูกค้าประเภทบุคคลธรรมดา (ข้อบังคับ ฉ.45) มีเหตุพิเศษอันควรยกเว้นคุณสมบัติการรับขึ้นทะเบียน (เช่น อาศัยอยู่ ในพื้นที่มาไม่ครบ 6 เดือน) บุคคลใดเป็นผู้มีอำนาจต่ำสุดในการ \"ผ่อนผัน\" รับขึ้นทะเบียนให้แก่ลูกค้ารายนี้", "choices": {"ก": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ข": "ผู้จัดการสาขา (ผจข.)", "ค": "ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผช.ผอจ.)", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)", "จ": "นิติกรประจำสำนักงาน ธ.ก.ส. จังหวัด"}, "answer": "ข", "explanation": "เช่นเดียวกับกรณีของเกษตรกร หากลูกค้าประเภทบุคคลธรรมดา (ฉ.45) จำเป็นต้องได้รับการ \"ผ่อนผัน\" หรือ ยกเว้นคุณสมบัติตามเกณฑ์ (เช่น ระยะเวลาในพื้นที่ไม่ครบ 6 เดือน) บุคคลที่มีอำนาจพิจารณาให้ความเห็นชอบรับขึ้นทะเบียน คือ **\"ผู้จัดการสาขา (ผจข.)\"**"}, {"num": 10, "q": "ตามเกณฑ์คุณสมบัติสหกรณ์ที่สามารถขอกู้เงินจาก ธ.ก.ส. ได้ หากเป็น \"สหกรณ์ออมทรัพย์ประเภทราชการหรือ รัฐวิสาหกิจ\" ที่ถูกจัดเป็น \"สหกรณ์ขนาดเล็ก\" (มีสินทรัพย์รวมต่ำกว่า 5,000 ล้านบาท) จะต้องควบคุมอัตราส่วนหนี้สินรวมต่อ ทุนตนเอง (D/E Ratio) ไว้ไม่เกินเท่าใด", "choices": {"ก": "ไม่เกิน 1.50 เท่า", "ข": "ไม่เกิน 2.00 เท่า", "ค": "ไม่เกิน 2.50 เท่า", "ง": "ไม่เกิน 3.00 เท่า", "จ": "ไม่เกิน 4.00 เท่า  --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 6 : กิ่งที่ 2)** **51. เฉลย: ค.** **คำอธิบาย:** ตามนโยบายการให้สินเชื่อของ ธ.ก.ส. ธุรกิจที่เกี่ยวกับการขอสินเชื่อเพื่อชำระหนี้สินภายนอกระบบของ เกษตรกรหรือบุคคล ถือเป็น **\"นโยบายที่ไม่สนับสนุน (Negative List)\"** ส่วนข้ออื่นๆ เช่น การซื้อ Smart Phone, ธุรกิจ Plant- based Food และธุรกิจแฟรนไชส์ ถือเป็นสินเชื่อที่ธนาคารให้การสนับสนุนเพื่อพัฒนาคุณภาพชีวิตและสร้างมูลค่าเพิ่ม **52. เฉลย: ข.** **คำอธิบาย:** สำหรับการขอ Re-finance จากสถาบันการเงินอื่น ธนาคารมีนโยบายสนับสนุนอย่างระมัดระวัง โดยมีเงื่อนไข สำคัญคือ หากลูกค้าเคยมีการปรับปรุงโครงสร้างหนี้ (ปปน.) กับสถาบันอื่น **\"ต้องผ่านการ ปปน. มาแล้วไม่น้อยกว่า 2 ปี และชำระหนี้ต้นเงินพร้อมดอกเบี้ยมาแล้วไม่น้อยกว่า 12 งวดรายเดือน\"** และต้องเข้าเกณฑ์ NPL Exit ด้วย **53. เฉลย: ง.** **คำอธิบาย:** การขอสินเชื่อระยะสั้นเพื่อชำระค่าที่ดินโดยอ้างว่า \"รอเงินเพิ่มทุนจากผู้ถือหุ้น\" เข้าข่ายเป็นสินเชื่อประเภท ** \"Bridge Financing หรือ Bridging Loan\"** (การใช้สินเชื่อระยะสั้นมาเป็นสะพานเชื่อมเพื่อรอเงินท..."}, "answer": "ค", "explanation": "ตามคุณสมบัติสหกรณ์ที่สามารถขอกู้เงินได้ (เงื่อนไขมาตรการสนับสนุนสินเชื่อฯ) หากเป็นสหกรณ์ออมทรัพย์ ประเภทราชการหรือรัฐวิสาหกิจขนาดใหญ่ (สินทรัพย์ $≥$ 5,000 ลบ.) D/E Ratio ต้องไม่เกิน 2.00 เท่า แต่ถ้าเป็น **\"สหกรณ์ ขนาดเล็ก (สินทรัพย์ < 5,000 ลบ.)\" จะผ่อนปรนให้ D/E Ratio ต้องไม่เกิน 2.50 เท่า** --- ### **แบบทดสอบ Batch 7: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 61 - 70)**"}, {"num": 11, "q": "ตามคุณสมบัติและลักษณะต้องห้ามของผู้ขอขึ้นทะเบียนเป็นลูกค้า (ข้อบังคับ ฉ.44 และ ฉ.45) บุคคลในข้อใดต่อไปนี้ ธนาคารสามารถพิจารณารับขึ้นทะเบียนเป็นลูกค้าประจำสาขาได้ตามปกติโดยไม่ต้องขอผ่อนผันลักษณะต้องห้าม", "choices": {"ก": "บุคคลที่ศาลมีคำสั่งพิทักษ์ทรัพย์เด็ดขาด แต่ยังไม่ถูกตัดสินให้เป็นบุคคลล้มละลาย", "ข": "บุคคลที่มีอาการทางจิตฟั่นเฟือนเป็นบางครั้ง แต่ยังมีสติสัมปชัญญะรับรู้ได้", "ค": "บุคคลที่เคยถูกให้ออกจากการเป็นลูกค้าประจำสาขาอื่นเมื่อ 5 ปีที่แล้ว และปัจจุบันปรับปรุงตัวแล้ว", "ง": "บุคคลที่มีความพิการทางร่างกาย แต่ความพิการนั้นไม่เป็นอุปสรรคต่อการประกอบอาชีพ", "จ": "บุคคลที่มีหนี้สินล้นพ้นตัว แต่ยืนยันว่ามีญาติพี่น้องพร้อมให้ความช่วยเหลือทางการเงิน"}, "answer": "ง", "explanation": "ตามคู่มือการรับลูกค้า ผู้ที่มีลักษณะต้องห้ามเด็ดขาดคือ คนล้มละลาย/หนี้สินล้นพ้นตัว (ข้อ ก, จ), คนวิกลจริต (ข้อ ข), และคนที่เคยถูกให้ออกจากธนาคาร (ข้อ ค) ส่วน \"ผู้มีความพิการทางร่างกายแต่ไม่เป็นอุปสรรคต่อการประกอบอาชีพ\" สามารถรับขึ้นทะเบียนได้ตามปกติครับ"}, {"num": 12, "q": "ตามระเบียบว่าด้วยการรับลูกค้าผู้กู้ ธนาคารได้กำหนดกรอบระยะเวลา (SLA) ในการดำเนินการรับขึ้นทะเบียนเป็นลูกค้า ใหม่ ตั้งแต่วันที่รับแจ้งความประสงค์ไปจนถึงวันที่แจ้งผลการพิจารณาให้ลูกค้าทราบ ไว้ตามข้อใดจึงจะถูกต้องที่สุด", "choices": {"ก": "ดำเนินการให้แล้วเสร็จภายใน 3 วันทำการ", "ข": "ดำเนินการให้แล้วเสร็จภายใน 15 วันทำการ", "ค": "ดำเนินการให้แล้วเสร็จภายใน 20 วันทำการ", "ง": "ดำเนินการให้แล้วเสร็จภายใน 30 วันทำการ", "จ": "ตามปกติใช้เวลาภายใน 7 วันทำการ และต้องวางแผนให้แล้วเสร็จไม่เกิน 10 วันทำการ"}, "answer": "จ", "explanation": "ระยะเวลามาตรฐาน (SLA) ในการดำเนินการรับลูกค้าใหม่ตั้งแต่รับแจ้งความประสงค์จนถึงการแจ้งผล ธนาคาร กำหนดให้ **\"ปกติใช้เวลาภายใน 7 วันทำการ และให้สาขาวางแผนให้แล้วเสร็จภายใน 10 วัน\"** **63. เฉลย: ก.** **คำอธิบาย:** ตามข้อ 8 ของการพ้นสภาพลูกค้า \"การลาออก\" จะทำได้ก็ต่อเมื่อ **\"ไม่มีหนี้สินอยู่ต่อธนาคารในฐานะผู้กู้ ผู้ค้ำ ประกัน หรือลูกหนี้ร่วม\"** หากนายสมศักดิ์ยังมีภาระค้ำประกันอยู่ จะไม่สามารถยื่นขอลาออกจากการเป็นลูกค้าได้จนกว่า สัญญาค้ำประกันนั้นจะสิ้นสุดลง"}, {"num": 13, "q": "นายสมศักดิ์ ต้องการ \"ลาออก\" จากการเป็นลูกค้าประจำสาขาของ ธ.ก.ส. โดยปัจจุบันนายสมศักดิ์ได้ส่งชำระหนี้ในฐานะ \"ผู้กู้\" ของตนเองเสร็จสิ้นหมดแล้ว แต่ยังคงเป็น \"ผู้ค้ำประกัน\" ให้กับเพื่อนในกลุ่มอีก 1 สัญญา การขอลาออกของนายสมศักดิ์ จะสามารถทำได้หรือไม่", "choices": {"ก": "ไม่สามารถทำได้ เนื่องจากผู้ขอลาออกต้องไม่มีหนี้สินอยู่ต่อธนาคารทั้งในฐานะผู้กู้ ผู้ค้ำประกัน หรือลูกหนี้ร่วม", "ข": "ทำได้ทันที เนื่องจากหนี้ในฐานะผู้กู้หลักได้ถูกชำระเสร็จสิ้นแล้ว", "ค": "ทำได้ หากเพื่อนในกลุ่มยินยอมให้โอนภาระการค้ำประกันไปให้บุคคลภายนอกรับแทน", "ง": "ไม่สามารถทำได้ เนื่องจากต้องได้รับอนุมัติจากผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด ก่อนทุกกรณี", "จ": "ทำได้ หากนายสมศักดิ์ยอมลาออกจากกลุ่มลูกค้าเป็นลำดับแรก"}, "answer": "ก", "explanation": "ตามข้อ 8 ของการพ้นสภาพลูกค้า \"การลาออก\" จะทำได้ก็ต่อเมื่อ **\"ไม่มีหนี้สินอยู่ต่อธนาคารในฐานะผู้กู้ ผู้ค้ำ ประกัน หรือลูกหนี้ร่วม\"** หากนายสมศักดิ์ยังมีภาระค้ำประกันอยู่ จะไม่สามารถยื่นขอลาออกจากการเป็นลูกค้าได้จนกว่า สัญญาค้ำประกันนั้นจะสิ้นสุดลง"}, {"num": 14, "q": "กรณีที่ผู้ขอขึ้นทะเบียนเป็นลูกค้า มีถิ่นที่อยู่ (ทะเบียนบ้าน) อยู่ในพื้นที่ของสาขา A แต่มีสถานประกอบอาชีพหลักอยู่ใน พื้นที่ของสาขา B ซึ่งอยู่ห่างไกลกัน ธนาคารมีหลักเกณฑ์ในการกำหนด \"สาขาที่จะรับขึ้นทะเบียน\" อย่างไร", "choices": {"ก": "ต้องให้สาขา A (ตามถิ่นที่อยู่) เป็นผู้รับขึ้นทะเบียนเท่านั้น เพื่อความถูกต้องทางกฎหมายทะเบียนราษฎร์", "ข": "ให้สาขา A พิจารณารับขึ้นทะเบียน เว้นแต่ผู้ขอขึ้นทะเบียนสะดวกจะใช้บริการจากสาขา B ก็ให้สาขา B พิจารณารับขึ้น ทะเบียนได้", "ค": "ต้องให้สาขา B (ตามสถานประกอบอาชีพ) เป็นผู้รับขึ้นทะเบียนเท่านั้น เพื่อให้ง่ายต่อการตรวจสอบกิจการ", "ง": "ผู้ขอขึ้นทะเบียนต้องแบ่งการทำธุรกรรมกับทั้งสาขา A และสาขา B ควบคู่กันไป", "จ": "ให้ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด เป็นผู้วินิจฉัยชี้ขาดว่าสาขาใดควรเป็นผู้ดูแล"}, "answer": "ข", "explanation": "ข้อยกเว้นการรับลูกค้าที่มีถิ่นที่อยู่กับสถานประกอบการอยู่คนละแห่ง ระเบียบกำหนดให้ **\"สาขาตามถิ่นที่ อยู่\"** เป็นผู้พิจารณารับขึ้นทะเบียน **\"เว้นแต่ผู้ขอขึ้นทะเบียนสะดวกจะใช้บริการจากสาขาที่ตั้งของสถานประกอบอาชีพ ก็ ให้สาขาที่ตั้งสถานประกอบอาชีพหลักพิจารณารับขึ้นทะเบียนได้\"** เพื่อให้เกิดความคล่องตัวต่อลูกค้า"}, {"num": 15, "q": "ตามนโยบายการให้สินเชื่อ (Credit Policy) ธนาคารจัดให้การขอ \"Refinance หนี้จากสถาบันการเงินอื่น\" อยู่ในกลุ่มนโยบาย สนับสนุนอย่างระมัดระวัง ข้อใดคือเงื่อนไขสำคัญที่สุดที่ลูกค้าจะต้องปฏิบัติเพื่อให้ธนาคารพิจารณาสนับสนุน", "choices": {"ก": "ลูกค้าสามารถเลือก Refinance เฉพาะหนี้บางส่วนได้ เพื่อกระจายความเสี่ยง", "ข": "ลูกค้าต้องมีประวัติการปรับปรุงโครงสร้างหนี้ (TDR) กับสถาบันการเงินเดิมมาแล้วไม่น้อยกว่า 1 ปี", "ค": "ธนาคารให้การสนับสนุนเฉพาะการ Refinance หนี้ที่เป็นสินเชื่อไม่มีหลักประกัน (Clean Loan) เท่านั้น", "ง": "ลูกค้าต้องมีอาชีพรับราชการหรือเป็นพนักงานรัฐวิสาหกิจที่มีรายได้ประจำชัดเจน จ. ต้องเป็นการปิดภาระหนี้ทั้งหมดทุกสัญญาในคราวเดียว บัญชีมีสถานะ \"ปกติ\" และ ธ.ก.ส. ต้องได้รับบุริมสิทธิใน หลักประกัน", "จ": "ต้องเป็นการปิดภาระหนี้ทั้งหมดในคราวเดียว โดยสถานะต้องเป็นหนี้ปกติ (ไม่ใช่ NPLs หรือ Pre-emptive) และ ธ.ก.ส. ต้องได้รับบุริมสิทธิเป็นอันดับแรก"}, "answer": "จ", "explanation": "การ Refinance จากสถาบันอื่นถือเป็นนโยบายที่ธนาคารให้ความระมัดระวัง (Caution) โดยเงื่อนไขหลักคือ ** \"ต้องเป็นการปิดภาระหนี้ทั้งหมดในคราวเดียว สถานะต้องเป็นหนี้ปกติ (ไม่ใช่ NPLs หรือ Pre-emptive) และ ธ.ก.ส. ต้องได้รับ บุริมสิทธิเป็นอันดับแรก\"** [Artifact: กิ่งที่ 2 เสาหลักสินเชื่อฯ]"}, {"num": 16, "q": "เกษตรกรรายใหม่สมัครเป็นลูกค้าประจำสาขา (ตามข้อบังคับ ฉ.44) และเมื่อพนักงานประเมินตาม \"แบบประเมินเพื่อ พิจารณาจัดชั้นลูกค้าใหม่\" ปรากฏว่าลูกค้าได้คะแนนรวมเพียง \"65 คะแนน\" ลูกค้ารายนี้จะได้รับการจัดชั้นเป็นลูกค้าชั้นใด และต้องใช้อัตราดอกเบี้ยตามโครงสร้างใด", "choices": {"ก": "ชั้น A / อัตราดอกเบี้ย MRR + 2.25", "ข": "ชั้น AA / อัตราดอกเบี้ย MRR + 1.50", "ค": "ชั้น AAA / อัตราดอกเบี้ย MRR + 0.75", "ง": "ชั้น AAA+ / อัตราดอกเบี้ย MRR", "จ": "ชั้น C / อัตราดอกเบี้ย MLR"}, "answer": "ก", "explanation": "ตามเกณฑ์การพิจารณาจัดชั้นลูกค้าใหม่ (ฉ.44) หากลูกค้าประเมินได้คะแนน: * 80 - 100 คะแนน = ชั้น AAA (MRR + 0.75) * 70 - 79 คะแนน = ชั้น AA (MRR + 1.50) * **ต่ำกว่า 70 คะแนน = ชั้น A (MRR + 2.25)** ดังนั้น 65 คะแนน จึงตกอยู่ในชั้น A ครับ"}, {"num": 17, "q": "ในขั้นตอนการสอบสวนและบันทึกข้อมูลเพื่อรับลูกค้าใหม่เข้าสู่ระบบ ข้อใดกล่าวถูกต้องเกี่ยวกับการจัดการเอกสารของ \"คู่สมรส\" ของผู้ขอขึ้นทะเบียน", "choices": {"ก": "คู่สมรสจะต้องลงนามเป็น \"ผู้กู้ร่วม\" ในสัญญาทุกกรณี", "ข": "กฎหมายห้ามมิให้คู่สมรสลงนามในเอกสารใดๆ เพื่อป้องกันความเสี่ยงด้านหนี้สิน", "ค": "คู่สมรสต้องลงนามในคำรับรองเฉพาะกรณีที่ขอกู้เงินเกินกว่า 1 ล้านบาทขึ้นไปเท่านั้น", "ง": "ต้องให้คู่สมรสลงลายมือชื่อในคำรับรองและยินยอมในแบบรายการขอขึ้นทะเบียน โดยการลงนามต้องเป็นไปด้วยความ สมัครใจ", "จ": "คู่สมรสต้องเป็นลูกค้าประจำสาขาของ ธ.ก.ส. ก่อน จึงจะสามารถให้ความยินยอมได้"}, "answer": "ง", "explanation": "คู่มือการปฏิบัติงานรับลูกค้ากำหนดให้พนักงานต้องให้คู่สมรสลงลายมือชื่อใน \"คำรับรองและยินยอมของคู่ สมรส\" ในแบบรายการขอขึ้นทะเบียน โดยมีข้อแม้สำคัญว่า **\"การลงลายมือชื่อนั้นต้องเป็นไปด้วยความสมัครใจ\"**"}, {"num": 18, "q": "ตามข้อบังคับของธนาคาร เหตุผลในข้อใดที่ทำให้ผู้จัดการสาขาสามารถสั่งให้ลูกค้า \"พ้นสภาพ (ให้ออก)\" จากการเป็น ลูกค้าประจำสาขาได้ทันที", "choices": {"ก": "ลูกค้าขอสินเชื่อส่วนบุคคลที่มีวงเงินขนาดเล็กจากธนาคารพาณิชย์อื่น", "ข": "ลูกค้าเปลี่ยนแปลงชนิดของพืชที่ปลูกโดยไม่ได้แจ้งให้ธนาคารทราบล่วงหน้า", "ค": "ลูกค้ายื่นคำร้องขอขยายระยะเวลาชำระหนี้เนื่องจากประสบภัยธรรมชาติ", "ง": "ลูกค้าขาดการประชุมกลุ่มลูกค้า 1 ครั้ง เนื่องจากปัญหาสุขภาพ", "จ": "ลูกค้ากู้ยืมเงินภายนอกจนเป็นภาระหนัก หรือประพฤติมิชอบ ไม่ซื่อสัตย์สุจริต"}, "answer": "จ", "explanation": "ตามข้อ 9 \"เหตุแห่งการให้ออก\" ประกอบด้วย: ถูกเรียกคืนเงินกู้, ทิ้งถิ่นที่อยู่, ฝ่าฝืนระเบียบ, ประพฤติมิชอบ/ไม่ ซื่อสัตย์, ฝ่าฝืนมติกลุ่มเนืองนิตย์, และ **\"กู้ยืมเงินภายนอกจนเป็นภาระหนัก\"** ซึ่งถือเป็นความเสี่ยงขั้นรุนแรงที่ทำให้ผู้จัดการ สามารถสั่งให้ออกได้"}, {"num": 19, "q": "กรณีรับเกษตรกรขึ้นทะเบียนเป็นลูกค้า หากพบว่าเกษตรกรรายนี้อาศัยอยู่ในพื้นที่มาเพียง 8 เดือน (ไม่ถึง 1 ปีตามเกณฑ์ ข้อ 3(1)(ง) แห่งข้อบังคับ ฉ.44) ตำแหน่งใดต่อไปนี้เป็นตำแหน่ง \"ต่ำสุด\" ที่มีอำนาจวินิจฉัยและผ่อนผันรับขึ้นทะเบียนให้ได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.)", "ข": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ค": "ผู้ช่วยผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผช.ผอจ.)", "ง": "ผู้จัดการสาขา (ผจข.)", "จ": "ผู้อำนวยการฝ่ายกิจการสาขาภาค"}, "answer": "ง", "explanation": "หากลูกค้าเกษตรกรขาดคุณสมบัติเรื่องระยะเวลาในการอยู่อาศัย (ข้อ 3(1)(ง)) ตามระเบียบ ฉบับที่ 77 หมวด การข้อยกเว้น อำนาจใน **การผ่อนผันและวินิจฉัยจะเริ่มต้นที่ \"ผู้จัดการสาขา (ผจข.)\"** (ส่วน หนภ. ทำได้แค่รับลูกค้าเกณฑ์ ปกติที่ครบถ้วนเท่านั้น)"}, {"num": 20, "q": "เพื่อเป็นการควบคุมทิศทางและความเสี่ยงระดับมหภาค นโยบายของธนาคารกำหนดให้สัดส่วนของ \"สินเชื่อนอกภาค การเกษตร\" ต้องถูกบริหารจัดการให้มีสัดส่วนไม่เกินจำนวนเท่าใดของพอร์ตสินเชื่อ", "choices": {"ก": "ไม่เกินร้อยละ 10", "ข": "ไม่เกินร้อยละ 15", "ค": "ไม่เกินร้อยละ 20", "ง": "ไม่เกินร้อยละ 25", "จ": "ไม่เกินร้อยละ 30 --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 7 : กิ่งที่ 2)** **61. เฉลย: ง.** **คำอธิบาย:** ตามคู่มือการรับลูกค้า ผู้ที่มีลักษณะต้องห้ามเด็ดขาดคือ คนล้มละลาย/หนี้สินล้นพ้นตัว (ข้อ ก, จ), คนวิกลจริต (ข้อ ข), และคนที่เคยถูกให้ออกจากธนาคาร (ข้อ ค) ส่วน \"ผู้มีความพิการทางร่างกายแต่ไม่เป็นอุปสรรคต่อการประกอบอาชีพ\" สามารถรับขึ้นทะเบียนได้ตามปกติครับ **62. เฉลย: จ.** **คำอธิบาย:** ระยะเวลามาตรฐาน (SLA) ในการดำเนินการรับลูกค้าใหม่ตั้งแต่รับแจ้งความประสงค์จนถึงการแจ้งผล ธนาคาร กำหนดให้ **\"ปกติใช้เวลาภายใน 7 วันทำการ และให้สาขาวางแผนให้แล้วเสร็จภายใน 10 วัน\"** **63. เฉลย: ก.** **คำอธิบาย:** ตามข้อ 8 ของการพ้นสภาพลูกค้า \"การลาออก\" จะทำได้ก็ต่อเมื่อ **\"ไม่มีหนี้สินอยู่ต่อธนาคารในฐานะผู้กู้ ผู้ค้ำ ประกัน หรือลูกหนี้ร่วม\"** หากนายสมศักดิ์ยังมีภาระค้ำประกันอยู่ จะไม่สามารถยื่นขอลาออกจากการเป็นลูกค้าได้จนกว่า สัญญาค้ำประกันนั้นจะสิ้นสุดลง  **64. เฉลย: ข.** **คำอธิบาย:** ข้อยกเว้นการรับลูกค้าที่มีถิ่นที่อยู่กับสถานประกอบการอยู่คนละแห่ง ระเบียบกำหนดให้ **\"สาขาตามถิ่นที่ อยู่\"** เป็นผู้พิจารณ..."}, "answer": "ค", "explanation": "ตามทิศทางนโยบายสินเชื่อและการบริหารพอร์ตความเสี่ยง ธนาคารกำหนดให้สัดส่วนของสินเชื่อเพื่อเสริม สภาพคล่อง และ **\"สินเชื่อนอกภาคการเกษตร\" ต้องถูกบริหารจัดการให้มีสัดส่วนไม่เกินร้อยละ 20** ของพอร์ตทั้งหมด ### **แบบทดสอบ Batch 8: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 71 - 80)**"}, {"num": 21, "q": "เกี่ยวกับการจัดประชุมเพื่อรับลูกค้าเข้าสังกัดกลุ่มลูกค้า (ตามข้อบังคับ ฉ.44) หากกลุ่มลูกค้าแห่งหนึ่งมีสมาชิกในกลุ่ม ทั้งหมด 30 คน และได้นัดประชุมเพื่อพิจารณารับสมาชิกใหม่เพิ่มอีก 5 คน การประชุมในวันนั้นจะต้องมี \"ลูกค้าเดิม\" มาร่วม ประชุมอย่างน้อยกี่คน จึงจะถือว่าเปิดประชุมได้ (ครบองค์ประชุม)", "choices": {"ก": "15 คน", "ข": "16 คน", "ค": "20 คน", "ง": "21 คน", "จ": "27 คน"}, "answer": "ค", "explanation": "ตามระเบียบว่าด้วยการประชุมกลุ่มลูกค้า (ข้อบังคับ ฉ.44) การจะเปิดการประชุมเพื่อพิจารณารับลูกค้าเข้า สังกัดกลุ่มได้ จะต้องมีสมาชิกในกลุ่มมาร่วมประชุม **\"ไม่น้อยกว่าสองในสาม (2/3) ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น\"** ดังนั้น สมาชิก 30 คน $×$ (2/3) = **20 คน** จึงจะถือว่าครบองค์ประชุมครับ"}, {"num": 22, "q": "จากกรณีในข้อ 71 หากการประชุมรับลูกค้าเข้าสังกัดกลุ่มสามารถเปิดประชุมได้ถูกต้องตามเกณฑ์แล้ว มติที่ประชุมจะต้อง ได้รับการรับรองด้วยคะแนนเสียงในข้อใด จึงจะสามารถรับสมาชิกใหม่ได้สำเร็จและมีผลผูกพันทางกฎหมาย", "choices": {"ก": "เสียงข้างมากของผู้ที่มาประชุมในวันนั้น (เกิน 10 คน)", "ข": "เสียงเกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น (ตั้งแต่ 16 คนขึ้นไป)", "ค": "เสียงไม่น้อยกว่า 2 ใน 3 ของผู้มาประชุม (ตั้งแต่ 14 คนขึ้นไป)", "ง": "เสียงเกิน 2 ใน 3 ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น (ตั้งแต่ 21 คนขึ้นไป)", "จ": "ต้องได้รับคะแนนเสียงเอกฉันท์จากผู้ที่มาประชุม (20 คน)"}, "answer": "ข", "explanation": "แม้การเปิดประชุมจะใช้เสียง 2 ใน 3 แต่สำหรับการลงมติเพื่อ **\"รับลูกค้าเข้าสังกัดกลุ่ม\"** ถือเป็นวาระที่มีผล ผูกพันภาระค้ำประกันร่วมของทุกคน ระเบียบจึงกำหนดให้ต้องมีมติรับรองด้วยคะแนนเสียง **\"เกินกึ่งหนึ่งของจำนวนลูกค้า ทั้งหมดในกลุ่มนั้น\"** (สมาชิก 30 คน กึ่งหนึ่งคือ 15 คน ดังนั้นต้องได้มติรับรองตั้งแต่ **16 คนขึ้นไป**)"}, {"num": 23, "q": "ตามเกณฑ์ลดหย่อนและข้อยกเว้นในการรับลูกค้าประจำสาขา ธนาคารอนุญาตให้รับ \"สมาชิกของสถาบันเกษตรกร (สหกรณ์/กลุ่มเกษตรกร)\" ขึ้นทะเบียนเป็นลูกค้าประจำสาขา (รายคน) ได้ในกรณีใดต่อไปนี้", "choices": {"ก": "เฉพาะรายที่ต้องการกู้เงินเพื่อนำไปชำระหนี้สินภายนอก", "ข": "เฉพาะรายที่ต้องการกู้เงินจากธนาคารตามโครงการร่วมระหว่างธนาคารกับส่วนราชการ หรือภาคเอกชน", "ค": "เฉพาะรายที่ต้องการกู้เงินเพื่อเป็นค่าลงทุนในการประกอบอาชีพ หรือพัฒนาคุณภาพชีวิต", "ง": "เฉพาะรายที่ต้องการนำที่ดินของตนเองมาค้ำประกันหนี้ให้สหกรณ์ต้นสังกัด", "จ": "ถูกทั้งข้อ ก.,"}, "answer": "จ", "explanation": "ตามหลักเกณฑ์การรับลูกค้าเกษตรกร (ฉ.44) หมวดเกณฑ์ลดหย่อน ธนาคารเปิดช่องให้รับ \"สมาชิกของสถาบัน เกษตรกร\" เข้ามาเป็นลูกค้าแบบรายคนได้ในกรณีพิเศษ ได้แก่: 1) กู้ตามโครงการนโยบายรัฐ/เอกชน 2) กู้เพื่อชำระหนี้สินภายนอก 3) กู้เพื่อเป็นค่าลงทุนประกอบอาชีพ หรือพัฒนาคุณภาพชีวิต"}, {"num": 24, "q": "นายนนน มีภูมิลำเนาตามทะเบียนบ้านอยู่ที่อำเภอเมือง จ.ชลบุรี แต่มีสถานประกอบอาชีพ (สวนทุเรียน 20 ไร่) อยู่ที่ อำเภอแกลง จ.ระยอง หากนายนนนต้องการขอขึ้นทะเบียนเป็นลูกค้าและกู้เงินเพื่อปรับปรุงสวนทุเรียน พนักงานสาขาแกลง ควรพิจารณาดำเนินการอย่างไรตามระเบียบ", "choices": {"ก": "ต้องให้สาขาชลบุรี (ตามทะเบียนบ้าน) เป็นผู้รับขึ้นทะเบียนเท่านั้น แล้วจึงทำหนังสือขอความร่วมมือให้สาขาแกลง ตรวจสอบที่ตั้งโครงการ", "ข": "สาขาแกลงสามารถรับขึ้นทะเบียนได้ โดยส่งพนักงานไปสอบรายการขอขึ้นทะเบียนที่ภูมิลำเนาของนายนนน หรือขอความ ร่วมมือสาขาชลบุรี", "ค": "ปฏิเสธการรับขึ้นทะเบียน เนื่องจากภูมิลำเนาและสถานประกอบอาชีพไม่ได้อยู่ในเขตจังหวัดเดียวกัน", "ง": "ให้นายนนนย้ายทะเบียนบ้านมาอยู่ที่จังหวัดระยองก่อนเป็นเวลาอย่างน้อย 6 เดือน จึงจะรับขึ้นทะเบียนได้", "จ": "ให้ผู้จัดการสาขาทั้งสองแห่งทำบันทึกตกลงแบ่งสัดส่วนการให้สินเชื่อคนละครึ่งเพื่อกระจายความเสี่ยง"}, "answer": "ข", "explanation": "ตามคู่มือการรับลูกค้า (ข้อยกเว้นคุณสมบัติ) กรณีผู้ขอขึ้นทะเบียนมีสถานประกอบอาชีพหลักอยู่คนละพื้นที่กับ ภูมิลำเนา **\"สาขาที่ตั้งสถานประกอบอาชีพ (สาขาแกลง) สามารถพิจารณารับขึ้นทะเบียนได้\"** เพื่อความสะดวกในการดูแล โครงการ โดยส่งพนักงานไปสอบประวัติที่ภูมิลำเนา หรือส่งหนังสือขอความร่วมมือให้สาขาตามทะเบียนบ้านช่วยสอบสวน ประวัติให้ได้"}, {"num": 25, "q": "จากกรณีนายนนนในข้อ 74 หากสาขาแกลงรับเป็นผู้ดำเนินการขึ้นทะเบียนตาม \"ข้อยกเว้น\" (เนื่องจากสถานประกอบ อาชีพหลักอยู่ในพื้นที่) บุคคลในตำแหน่งใดต่อไปนี้ เป็นผู้มีอำนาจระดับต่ำสุดในการ \"ผ่อนผันวินิจฉัย\" อนุมัติรับขึ้นทะเบียน เป็นลูกค้าให้ได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.) ข. หัวหน้าหน่วยอำเภอ (หนภ.)", "ค": "ผู้จัดการสาขา (ผจข.) หรือ ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) ที่ได้รับมอบหมาย", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)", "จ": "ผู้อำนวยการฝ่ายกิจการสาขาภาค"}, "answer": "ค", "explanation": "การรับลูกค้าที่ขาดคุณสมบัติหรือเข้าข้อยกเว้นบางประการตามข้อ 3(1) (เช่น เรื่องถิ่นที่อยู่ไม่ตรงทะเบียนบ้าน หรืออยู่ไม่ครบ 1 ปี) อำนาจในการพิจารณาวินิจฉัยและผ่อนผันรับขึ้นทะเบียน ตกเป็นของ **\"ผู้จัดการสาขา (ผจข.)\"** หรือ ผู้ช่วยผู้จัดการสาขาที่ได้รับมอบหมาย"}, {"num": 26, "q": "ในกรณีที่ลูกค้าบุคคลธรรมดา (ตามข้อบังคับ ฉ.45) ประสงค์จะขอโอนเปลี่ยนประเภทมาเป็น \"เกษตรกรลูกค้า (ตาม ข้อบังคับ ฉ.44)\" ข้อใดต่อไปนี้กล่าว \"ไม่ถูกต้อง\" เกี่ยวกับแนวทางการรับโอนลูกค้า", "choices": {"ก": "ให้สาขารับเข้าเป็นลูกค้าประเภท \"สังกัดกลุ่ม\" เป็นลำดับแรก", "ข": "หากลูกค้ายังมีหนี้เงินกู้ตามข้อบังคับ ฉ.45 ที่ชำระไม่เสร็จสิ้น ให้เปลี่ยนเงื่อนไขสัญญา (เช่น อัตราดอกเบี้ย) ให้เป็นไปตาม โครงสร้างของลูกค้า ฉ.44 ทันทีเพื่อความสอดคล้อง", "ค": "หากข้อมูลของลูกค้าไม่มีการเปลี่ยนแปลง ธนาคารอนุโลมให้ไม่ต้องสอบสวนข้อมูลลูกค้าตามแบบรายการขอขึ้นทะเบียน ใหม่", "ง": "ลูกค้าที่มีประวัติการชำระหนี้ได้ตามกำหนดติดต่อกัน 2 ปี ให้แก้ไขประวัติการชำระหนี้เป็นชั้น AA", "จ": "หากลูกค้าใช้หลักประกันจำนอง สามารถพิจารณารับเป็นลูกค้าประเภทไม่สังกัดกลุ่มได้"}, "answer": "ข", "explanation": "ข้อ ข. ผิดครับ เพราะคู่มือการปฏิบัติงานระบุชัดเจนว่า หากโอนลูกค้าจาก ฉ.45 มาเป็น ฉ.44 และลูกค้า **\"ยัง มีหนี้เงินกู้ตาม ฉ.45 ที่ยังชำระไม่เสร็จสิ้น\"** เงื่อนไขของสัญญากู้เงินฉบับเดิม (เช่น อัตราดอกเบี้ย) **จะต้องให้เป็นไปตาม เงื่อนไขเดิมจนกว่าจะชำระหนี้เสร็จสิ้น** จะไม่สามารถเปลี่ยนตามใจชอบกลางทางได้"}, {"num": 27, "q": "กองทุนหมู่บ้าน A ได้รับการประเมินศักยภาพเพื่อจัดระดับชั้นและกำหนดวงเงินกู้ โดยทำคะแนนในหมวดการบริหารได้ 20 คะแนน และหมวดฐานะทางการเงินได้ 50 คะแนน (คะแนนรวม 70 คะแนน) กองทุนหมู่บ้านแห่งนี้จะได้รับพิจารณาวงเงิน กู้สูงสุดตามข้อใด", "choices": {"ก": "วงเงินกู้สูงสุดไม่เกิน 14 เท่าของทุนตนเอง", "ข": "วงเงินกู้สูงสุดไม่เกิน 16 เท่าของทุนตนเอง", "ค": "วงเงินกู้สูงสุดไม่เกิน 18 เท่าของทุนตนเอง", "ง": "วงเงินกู้สูงสุดไม่เกิน 20 เท่าของทุนตนเอง", "จ": "ยังไม่สามารถพิจารณาให้เงินกู้ได้ เนื่องจากคะแนนไม่ถึงเกณฑ์ขั้นต่ำ"}, "answer": "ข", "explanation": "ตามคู่มือวิธีปฏิบัติ ฉ.45 ว่าด้วยกองทุนหมู่บ้านและชุมชน (กทบ.) ธนาคารจะกำหนดวงเงินกู้สูงสุดตามคะแนน ประเมินศักยภาพดังนี้: * 90 - 100 คะแนน = 20 เท่าของทุนตนเอง * 80 - 89 คะแนน = 18 เท่าของทุนตนเอง * **70 - 79 คะแนน = 16 เท่าของทุนตนเอง** (ข้อนี้ได้ 70 คะแนนพอดี) * 60 - 69 คะแนน = 14 เท่าของทุนตนเอง"}, {"num": 28, "q": "ตามข้อบังคับ ฉบับที่ 45 นิยามของคำว่า \"องค์กร\" ที่ธนาคารสามารถรับขึ้นทะเบียนและให้การสนับสนุนสินเชื่อได้นั้น หมายความครอบคลุมถึงหน่วยงานใดต่อไปนี้", "choices": {"ก": "การยางแห่งประเทศไทย (กยท.)", "ข": "องค์การคลังสินค้า (อคส.)", "ค": "องค์การตลาดเพื่อเกษตรกร (อ.ต.ก.)", "ง": "องค์กรปกครองส่วนท้องถิ่น (อปท.) เช่น อบจ., กทม., พัทยา", "จ": "ถูกทุกข้อ"}, "answer": "จ", "explanation": "ตามนิยามในข้อบังคับ ฉ.45 กลุ่มลูกค้า \"องค์กร\" รวมถึงองค์กรที่จัดตั้งขึ้นเพื่อสนับสนุนอาชีพของเกษตรกรและ ชุมชน (เช่น กยท., อคส., อ.ต.ก.) และยังครอบคลุมไปถึง **\"องค์กรปกครองส่วนท้องถิ่น (อปท.)\"** เช่น อบจ., อบต., กทม., และเมืองพัทยา อีกด้วย"}, {"num": 29, "q": "กรณีที่ลูกค้าถูกจัดประวัติการชำระหนี้เป็น \"ลูกค้าผิดนัดชำระหนี้ (ตกชั้น B)\" แต่ภายหลังสามารถหาเงินมาชำระหนี้จน เสร็จสิ้น หรือได้รับการแก้ไขด้วยเครื่องมือแก้ไขหนี้ (Loan Review / Revolving) จนกลับมาเป็นหนี้ปกติ สาขาสามารถพิจารณา แก้ไขประวัติให้กลับเป็น \"ชั้นเดิมก่อนตกชั้น\" ได้ โดยอำนาจอนุมัตินี้เป็นของตำแหน่งใด", "choices": {"ก": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ข": "ผู้จัดการสาขา (ผจข.) โดยต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา", "ค": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)", "ง": "ผู้อำนวยการฝ่ายบริหารจัดการคุณภาพหนี้ (ผอ.ฝ่าย)", "จ": "ระบบคอมพิวเตอร์ (CBS) จะดำเนินการปรับแก้ให้โดยอัตโนมัติเมื่อสิ้นวันทำการ"}, "answer": "ข", "explanation": "ตามคู่มือปฏิบัติงานการจัดชั้นลูกค้า หากลูกค้าตกชั้นเป็นผิดนัดชำระหนี้ (ชั้น B) แล้วภายหลังสามารถแก้ไขหนี้ จนเป็นปกติได้ (เช่น หาลูกหนี้ร่วม หรือ ปรับโครงสร้าง 0-3 เดือนสำเร็จ) สาขาสามารถแก้ไขประวัติกลับเป็นชั้นเดิมก่อนตกได้ โดยผ่อนปรนให้ **\"ผู้จัดการสาขา เป็นผู้อนุมัติ ซึ่งต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา\"**"}, {"num": 30, "q": "ในการพิจารณาตรวจสอบความเกี่ยวข้องกลุ่มลูกหนี้ (SLL) ของสถาบันเกษตรกร หากสหกรณ์การเกษตร A มีเงินกู้กับ ธนาคาร และพบว่า \"คู่สมรสของคณะกรรมการดำเนินงานสหกรณ์\" จำนวน 2 ราย มากู้เงินส่วนตัวเพื่อประกอบธุรกิจที่มี วัตถุประสงค์เดียวกันกับสหกรณ์ (เช่น รวบรวมผลผลิต) ธนาคารมีหลักเกณฑ์ในการนับรวมกลุ่ม (Total Group Exposure) อย่างไร", "choices": {"ก": "ไม่ต้องนับรวม เนื่องจากคู่สมรสกู้เงินในนามบุคคลธรรมดา แยกต่างหากจากนิติบุคคลของสหกรณ์", "ข": "ไม่ต้องนับรวม เนื่องจากคู่สมรสไม่ใช่ผู้บริหารหรือคณะกรรมการดำเนินงานของสหกรณ์โดยตรง", "ค": "ต้องนับรวม เฉพาะกรณีที่คู่สมรสเหล่านั้นนำหลักประกันของสหกรณ์มาจำนองค้ำประกันหนี้ของตนเองเท่านั้น", "ง": "ต้องนับรวมเป็นกลุ่มเดียวกัน เนื่องจากคู่สมรสถือเป็นผู้เกี่ยวข้องกับคณะกรรมการ และทำธุรกิจวัตถุประสงค์เดียวกัน", "จ": "ให้ผู้จัดการสาขาใช้ดุลพินิจพิจารณาเป็นรายๆ ไป โดยไม่ถูกบังคับตามเกณฑ์ SLL --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 8 : กิ่งที่ 2)** **71. เฉลย: ค.** **คำอธิบาย:** ตามระเบียบว่าด้วยการประชุมกลุ่มลูกค้า (ข้อบังคับ ฉ.44) การจะเปิดการประชุมเพื่อพิจารณารับลูกค้าเข้า สังกัดกลุ่มได้ จะต้องมีสมาชิกในกลุ่มมาร่วมประชุม **\"ไม่น้อยกว่าสองในสาม (2/3) ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น\"** ดังนั้น สมาชิก 30 คน $×$ (2/3) = **20 คน** จึงจะถือว่าครบองค์ประชุมครับ **72. เฉลย: ข.** **คำอธิบาย:** แม้การเปิดประชุมจะใช้เสียง 2 ใน 3 แต่สำหรับการลงมติเพื่อ **\"รับลูกค้าเข้าสังกัดกลุ่ม\"** ถือเป็นวาระที่มีผล ผูกพันภาระค้ำประกันร่วมของทุกคน ระเบียบจึงกำหนดให้ต้องมีมติรับรองด้วยคะแนนเสียง **\"เกินกึ่งหนึ่งของจำนวนลูกค้า ทั้งหมดในกลุ่มนั้น\"** (สมาชิก 30 คน กึ่งหนึ่งคือ 15 คน ดังนั้นต้องได้มติรับรองตั้งแต่ **16 คนขึ้นไป**) **73. เฉลย: จ.** **คำอธิบาย:** ตามหลักเกณฑ์การรับลูกค้าเกษตรกร (ฉ.44) หมวดเกณฑ์ลดหย่อน ธนาคารเปิดช่องให้รับ \"สมาชิกของสถาบัน เกษตรกร\" เข้ามาเป็นลูกค้าแบบรายคนได้ในกรณีพิเศษ ได้แก่: 1) กู้ตามโครงการ..."}, "answer": "ง", "explanation": "ตามแนวทางการพิสูจน์ SLL (Single Lending Limit / Sherlock Holmes Test) ธนาคารจะต้องนับรวม \"คู่สมรสของ คณะกรรมการดำเนินงานสหกรณ์\" เข้าเป็นกลุ่มลูกหนี้เดียวกันกับสหกรณ์ (Total Group Exposure) หากพิสูจน์ได้ว่าบุคคล เหล่านั้นทำธุรกิจที่มีวัตถุประสงค์เดียวกัน เพื่อสะท้อนความเสี่ยงที่แท้จริงและป้องกันการกระจุกตัวของหนี้ --- ### **แบบทดสอบ Batch 9: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 81 - 90)**"}, {"num": 31, "q": "ตามข้อบังคับธนาคาร การกระทำในข้อใดต่อไปนี้ ถือเป็นเหตุผลที่ทำให้ผู้จัดการสาขาสามารถวินิจฉัยและสั่งให้ลูกค้า \"พ้นสภาพ (ให้ออก)\" จากการเป็นลูกค้าประจำสาขาได้", "choices": {"ก": "ลูกค้าผิดนัดชำระหนี้ (ตกเป็น NPLs) ติดต่อกัน 1 ปี", "ข": "ลูกค้าขอปรับปรุงโครงสร้างหนี้ (ปปน.) และขอยกเว้นดอกเบี้ยปรับ", "ค": "ลูกค้ากู้ยืมเงินภายนอกจนเป็นภาระหนัก หรือประพฤติมิชอบไม่ซื่อสัตย์สุจริต", "ง": "ลูกค้าเปลี่ยนแปลงชนิดพืชที่ปลูกโดยไม่ได้แจ้งให้ธนาคารทราบ", "จ": "ลูกค้าย้ายทะเบียนบ้านแต่สถานประกอบอาชีพยังอยู่ที่เดิม"}, "answer": "ค", "explanation": "ตามคู่มือและข้อบังคับ เหตุผลที่ผู้จัดการสาขาสามารถสั่งให้ลูกค้าพ้นสภาพหรือ \"ให้ออก\" จากธนาคารได้แก่: การฝ่าฝืนระเบียบธนาคาร, ประพฤติมิชอบ/ไม่ซื่อสัตย์สุจริต, ฝ่าฝืนมติกลุ่มเนืองนิตย์, และ **\"การกู้ยืมเงินภายนอกจนเป็น ภาระหนัก\"** ซึ่งส่งผลต่อความสามารถในการชำระหนี้กับธนาคารโดยตรง"}, {"num": 32, "q": "หากบุคคลธรรมดาประสงค์จะขอขึ้นทะเบียนเป็นลูกค้า (ข้อบังคับ ฉ.45) แต่พบว่ามีถิ่นที่อยู่หรือประกอบอาชีพในพื้นที่ ดำเนินงาน \"ไม่ถึง 6 เดือน\" (ขาดคุณสมบัติตามข้อ 3(1)) ตำแหน่งใดต่อไปนี้มีอำนาจระดับต่ำสุดในการพิจารณา \"ผ่อนผัน\" ยกเว้นคุณสมบัติและรับขึ้นทะเบียนเป็นลูกค้าได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.)", "ข": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ค": "ผู้จัดการสาขา (ผจข.)", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)", "จ": "ผู้อำนวยการฝ่ายกิจการสาขาภาค"}, "answer": "ค", "explanation": "กรณีมีเหตุพิเศษอันควรยกเว้นคุณสมบัติตามข้อ 3(1) (เช่น เรื่องถิ่นที่อยู่หรือระยะเวลาในพื้นที่ไม่ครบ 6 เดือน ของลูกค้าบุคคล ฉ.45) ผู้ที่มีอำนาจอนุมัติ \"ผ่อนผัน\" ให้รับขึ้นทะเบียนเป็นลูกค้าได้คือ **ผู้จัดการสาขา (ผจข.)** โดยต้อง บันทึกความเห็นประกอบการวินิจฉัยไว้ด้วย"}, {"num": 33, "q": "นโยบายการให้สินเชื่อ (Credit Policy Guide) ระบุว่า \"ธุรกิจร้านทองคำ\" จัดอยู่ในกลุ่มที่ต้องให้การสนับสนุนอย่าง ระมัดระวัง (Caution) ธนาคารมีเงื่อนไขสำคัญในการพิจารณาสนับสนุนธุรกิจประเภทนี้อย่างไร", "choices": {"ก": "สนับสนุนได้เต็มที่ หากลูกค้ามีที่ดินมาจำนองคุ้มมูลค่าหนี้ 100%", "ข": "ให้กู้ได้เฉพาะเพื่อ \"เป็นค่าลงทุนขยายสาขาใหม่\" เท่านั้น", "ค": "ให้กู้ได้เฉพาะเพื่อ \"เสริมสภาพคล่อง\" เท่านั้น และผู้กู้ต้องมีประสบการณ์ดำเนินธุรกิจนี้มาแล้ว", "ง": "ไม่สนับสนุนในทุกกรณี เนื่องจากราคาทองคำมีความผันผวนสูงและจัดอยู่ใน Negative List", "จ": "ให้กู้ได้เฉพาะนิติบุคคลขนาดใหญ่ที่จดทะเบียนในตลาดหลักทรัพย์เท่านั้น"}, "answer": "ค", "explanation": "ตาม Credit Policy ของธนาคาร ธุรกิจร้านทองคำเป็นธุรกิจที่มีความเสี่ยงจากความผันผวนของราคา ธนาคารจึง กำหนดเงื่อนไขว่า **\"ให้กู้ได้เฉพาะเพื่อเสริมสภาพคล่อง (Working Capital) เท่านั้น และผู้กู้ต้องมีประสบการณ์ดำเนินธุรกิจนี้ มาแล้ว\"** ห้ามกู้เพื่อไปลงทุนเปิดร้านใหม่เด็ดขาด [Audio 6]"}, {"num": 34, "q": "ในการรับบุคคลเข้าขึ้นทะเบียนเป็นลูกค้าตาม \"โครงการพิเศษ\" ของส่วนราชการหรือภาคเอกชน ซึ่งผู้ขอขึ้นทะเบียนอาจ ขาดคุณสมบัติบางประการตามข้อบังคับปกติ ธนาคารจะจัดสถานะรหัสลูกค้า (Customer Code) รายนี้ในระบบ CBS ไว้ตามข้อ ใด", "choices": {"ก": "รหัส 00 (ลูกค้าขึ้นทะเบียนตามข้อบังคับ)", "ข": "รหัส 01 (ลูกค้าขึ้นทะเบียนเฉพาะกิจ)", "ค": "รหัส 02 (ลูกค้านโยบายรัฐบาล)", "ง": "รหัส 89 (ลูกค้ารอการโอนย้าย)", "จ": "รหัส 99 (ลูกค้าที่ถูกระงับธุรกรรม)"}, "answer": "ข", "explanation": "สำหรับการรับเกษตรกรตาม \"โครงการพิเศษ\" หรือ \"โครงการนโยบายรัฐ\" ที่ผู้กู้ขาดคุณสมบัติตามข้อบังคับ ปกติ ธนาคารจะรับขึ้นทะเบียนโดยจัดสถานะไว้เป็น **\"01 : ลูกค้าขึ้นทะเบียนเฉพาะกิจ\"** (ส่วนลูกค้าที่เข้าเกณฑ์ปกติ สมบูรณ์จะใช้รหัส 00)"}, {"num": 35, "q": "กรณีลูกค้าบุคคลธรรมดา (ฉ.45) แจ้งความประสงค์ขอโอนเปลี่ยนประเภทมาเป็น \"เกษตรกรลูกค้า (ฉ.44)\" แต่ปรากฏ ว่าลูกค้ารายดังกล่าวยังคงมีหนี้เงินกู้ตามข้อบังคับ ฉ.45 เดิมที่ \"ยังชำระไม่เสร็จสิ้น\" ธนาคารมีวิธีปฏิบัติเกี่ยวกับเงื่อนไขของ สัญญาเดิมอย่างไร", "choices": {"ก": "ให้ปรับลดอัตราดอกเบี้ยให้ตรงกับโครงสร้างของเกษตรกร ฉ.44 ทันทีเพื่อความช่วยเหลือ", "ข": "ให้ลูกค้านำเงินสดมาปิดบัญชีเดิมให้เสร็จสิ้นก่อน จึงจะสามารถรับโอนประเภทลูกค้าได้ ค. ให้เงื่อนไขของสัญญาเดิม (เช่น อัตราดอกเบี้ย) เป็นไปตามเงื่อนไขเดิมต่อไป โดยไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้เสร็จ สิ้น", "ง": "ให้จัดทำสัญญาปรับปรุงโครงสร้างหนี้ (ปปน.) เพื่อรวบยอดหนี้ทั้งหมดเข้าสู่มาตรฐาน ฉ.44", "จ": "ให้โอนหนี้เดิมไปให้บุคคลในครอบครัวรับช่วงต่อแทน", "ค": "ให้เงื่อนไขของสัญญาเดิม เช่น อัตราดอกเบี้ย เป็นไปตามเงื่อนไขเดิมโดยไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้เสร็จสิ้น"}, "answer": "ค", "explanation": "คู่มือการรับลูกค้าระบุชัดเจนว่า หากโอนลูกค้าจาก ฉ.45 เป็น ฉ.44 และลูกค้ายังมีหนี้เงินกู้ตาม ฉ.45 เดิมค้าง อยู่ **\"เงื่อนไขของสัญญาเดิม เช่น อัตราดอกเบี้ย ให้เป็นไปตามเงื่อนไขเดิมโดยไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้เสร็จ สิ้น\"** ไม่สามารถลดดอกเบี้ยหรือเปลี่ยนโครงสร้างสัญญากลางทางได้"}, {"num": 36, "q": "ตามหลักเกณฑ์ของข้อบังคับฉบับที่ 44 การรวมตัวกันเพื่อจัดตั้ง \"กลุ่มลูกค้า (กลุ่มใหม่)\" จะต้องประกอบด้วยลูกค้า ประจำสาขาจำนวนอย่างน้อยกี่คน จึงจะสามารถจัดตั้งเป็นกลุ่มได้สำเร็จ", "choices": {"ก": "อย่างน้อย 3 คน", "ข": "อย่างน้อย 5 คน", "ค": "อย่างน้อย 7 คน", "ง": "อย่างน้อย 10 คน", "จ": "อย่างน้อย 15 คน"}, "answer": "ข", "explanation": "ตามข้อบังคับฉบับที่ 44 ข้อ 10 กำหนดสัดส่วนของกลุ่มลูกค้าไว้ชัดเจนว่า **\"กลุ่มลูกค้าประกอบด้วยลูกค้า ประจำสาขาอย่างน้อยห้าคน\"** จึงจะสามารถจัดตั้งเป็นกลุ่มที่สมบูรณ์ได้ **87. เฉลย: ง.** **คำอธิบาย:** ลักษณะต้องห้ามเด็ดขาดที่ไม่สามารถรับเข้าเป็นลูกค้าได้เลย (No Exception) คือ 1) บุคคลล้มละลาย 2) คน วิกลจริต 3) **\"ผู้ที่เคยถูกให้ออกจากการเป็นลูกค้าประจำสาขาใดๆ ของธนาคารมาก่อน\"** (ส่วนความพิการทางร่างกายหาก ไม่เป็นอุปสรรคต่ออาชีพ สามารถรับได้ตามปกติ)"}, {"num": 37, "q": "คุณสมบัติและลักษณะต้องห้ามของผู้ขอขึ้นทะเบียนเป็นลูกค้า ธนาคารห้ามมิให้รับบุคคลใดต่อไปนี้เข้าเป็นลูกค้าอย่าง เด็ดขาด (ห้ามรับและไม่มีการผ่อนผัน)", "choices": {"ก": "ผู้ที่มีความพิการทางร่างกาย แต่ไม่เป็นอุปสรรคต่อการประกอบอาชีพ", "ข": "ผู้ที่เคยถูกฟ้องร้องคดีแพ่งในข้อหาละเมิด", "ค": "ผู้ที่มีหนี้สินค้างชำระกับกองทุนหมู่บ้านในชุมชน", "ง": "ผู้ที่เคยถูก \"ให้ออก\" จากการเป็นลูกค้าประจำสาขาใดๆ ของธนาคารมาก่อน", "จ": "ผู้ที่ประกอบอาชีพรับจ้างทั่วไปและไม่มีที่ดินทำกินเป็นของตนเอง"}, "answer": "ง", "explanation": "ลักษณะต้องห้ามเด็ดขาดที่ไม่สามารถรับเข้าเป็นลูกค้าได้เลย (No Exception) คือ 1) บุคคลล้มละลาย 2) คน วิกลจริต 3) **\"ผู้ที่เคยถูกให้ออกจากการเป็นลูกค้าประจำสาขาใดๆ ของธนาคารมาก่อน\"** (ส่วนความพิการทางร่างกายหาก ไม่เป็นอุปสรรคต่ออาชีพ สามารถรับได้ตามปกติ)"}, {"num": 38, "q": "นายเอก เป็นลูกค้าที่มีภูมิลำเนาตามทะเบียนบ้านอยู่ในเขต \"สาขา ก.\" แต่มีที่ดินทำกินและประกอบอาชีพส่วนใหญ่อยู่ ในเขตพื้นที่ของ \"สาขา ข.\" นายเอกประสงค์จะขอกู้เงินเพื่อลงทุนในที่ดินแปลงดังกล่าว ธนาคารควรพิจารณาเรื่องสถานที่รับ ขึ้นทะเบียนและการสอบสวนข้อมูลอย่างไรจึงจะเหมาะสมตามระเบียบ", "choices": {"ก": "ต้องให้ สาขา", "ข": "ให้ สาขา", "ค": "นายเอกต้องย้ายทะเบียนบ้านไปอยู่เขต สาขา", "ง": "ให้ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด เป็นผู้ตัดสินใจชี้ขาดว่าสาขาใดควรเป็นผู้รับผิดชอบ", "จ": "สาขา"}, "answer": "ข", "explanation": "กรณีถิ่นที่อยู่กับสถานประกอบการอยู่คนละพื้นที่ ธนาคารอนุโลมให้ **\"สาขาซึ่งเป็นสถานที่ตั้งของโครงการ หรือสถานประกอบอาชีพส่วนใหญ่ (สาขา ข.)\"** เป็นผู้รับขึ้นทะเบียนได้เพื่อความสะดวกในการติดตามดูแล และให้ทำหนังสือ ขอความร่วมมือไปยังสาขาตามทะเบียนบ้าน (สาขา ก.) เพื่อให้ส่งพนักงานไปช่วยสอบสวนรายการทรัพย์สินตามภูมิลำเนา"}, {"num": 39, "q": "ตามกรอบระยะเวลาปฏิบัติงาน (SLA) ของธนาคาร กระบวนการตั้งแต่การรับแจ้งความประสงค์ขอขึ้นทะเบียนเป็นลูกค้า ไปจนถึงวันที่แจ้งผลการรับผู้ขอขึ้นทะเบียนให้ลูกค้าทราบ ปกติธนาคารกำหนดให้ใช้เวลาดำเนินการแล้วเสร็จภายในระยะเวลา เท่าใด", "choices": {"ก": "ภายใน 3 วันทำการ", "ข": "ภายใน 5 วันทำการ", "ค": "ภายใน 7 วันทำการ (โดยให้สาขาวางแผนให้แล้วเสร็จภายใน 10 วัน)", "ง": "ภายใน 15 วันทำการ", "จ": "ภายใน 30 วันทำการ"}, "answer": "ค", "explanation": "กรอบระยะเวลามาตรฐาน (SLA) ของกระบวนการรับลูกค้า ตั้งแต่เริ่มแจ้งความประสงค์จนถึงการแจ้งผล ธนาคารกำหนดให้ **\"ปกติใช้เวลาภายใน 7 วันทำการ\"** โดยให้สาขาควบคุมและวางแผนงานให้แล้วเสร็จช้าที่สุดต้องไม่เกิน 10 วัน"}, {"num": 40, "q": "หากลูกค้าประจำสาขามีความประสงค์จะ \"ยื่นขอลาออก\" จากการเป็นลูกค้า ธนาคารจะพิจารณาอนุมัติให้ลาออกได้ อย่างสมบูรณ์ก็ต่อเมื่อลูกค้ามีคุณสมบัติตรงตามข้อใด", "choices": {"ข": "ลูกค้าโอนเงินฝากทั้งหมดที่มีอยู่ไปค้ำประกันหนี้ให้กลุ่มเรียบร้อยแล้ว", "ค": "ลูกค้าต้องไม่มีหนี้สินค้างชำระ และต้องไม่ติดภาระค้ำประกันใดๆ อยู่กับธนาคาร", "ง": "ลูกค้าย้ายภูมิลำเนาออกไปอยู่ต่างจังหวัดเกินกว่า 1 ปี", "จ": "ลูกค้าได้รับความเห็นชอบและเซ็นอนุมัติรับรองจากประธานกลุ่มลูกค้าแล้ว --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 9 : กิ่งที่ 2)** **81. เฉลย: ค.** **คำอธิบาย:** ตามคู่มือและข้อบังคับ เหตุผลที่ผู้จัดการสาขาสามารถสั่งให้ลูกค้าพ้นสภาพหรือ \"ให้ออก\" จากธนาคารได้แก่: การฝ่าฝืนระเบียบธนาคาร, ประพฤติมิชอบ/ไม่ซื่อสัตย์สุจริต, ฝ่าฝืนมติกลุ่มเนืองนิตย์, และ **\"การกู้ยืมเงินภายนอกจนเป็น ภาระหนัก\"** ซึ่งส่งผลต่อความสามารถในการชำระหนี้กับธนาคารโดยตรง **82. เฉลย: ค.** **คำอธิบาย:** กรณีมีเหตุพิเศษอันควรยกเว้นคุณสมบัติตามข้อ 3(1) (เช่น เรื่องถิ่นที่อยู่หรือระยะเวลาในพื้นที่ไม่ครบ 6 เดือน ของลูกค้าบุคคล ฉ.45) ผู้ที่มีอำนาจอนุมัติ \"ผ่อนผัน\" ให้รับขึ้นทะเบียนเป็นลูกค้าได้คือ **ผู้จัดการสาขา (ผจข.)** โดยต้อง บันทึกความเห็นประกอบการวินิจฉัยไว้ด้วย **83. เฉลย: ค.** **คำอธิบาย:** ตาม Credit Policy ของธนาคาร ธุรกิจร้านทองคำเป็นธุรกิจที่มีความเสี่ยงจากความผันผวนของราคา ธนาคารจึง กำหนดเงื่อนไขว่า **\"ให้กู้ได้เฉพาะเพื่อเสริมสภาพคล่อง (Working Capital) เท่านั้น และผู้กู้ต้องมีประสบการณ์ดำเนินธุรกิจนี้ มาแล้ว\"** ห้ามกู้...", "ก": "ชำระหนี้เงินกู้ในฐานะ \"ผู้กู้\" เสร็จสิ้นแล้ว (แม้จะยังค้ำประกันให้บุคคลอื่นอยู่ก็ตาม)"}, "answer": "ค", "explanation": "ตามระเบียบการดำเนินการหลังรับลูกค้า หมวดการลาออก (ข้อ 203.08) ลูกค้าจะสามารถทำเรื่องขอลาออก ได้ก็ต่อเมื่อ **\"ต้องไม่มีหนี้ (ในฐานะผู้กู้) และ ไม่ติดภาระค้ำประกันใดๆ ให้กับบุคคลอื่น\"** ค้างอยู่กับธนาคารเลย --- ### **แบบทดสอบ Batch 10: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 91 - 100)**"}, {"num": 41, "q": "ในการจัดประชุมเพื่อรับลูกค้าเข้าสังกัดกลุ่ม (ตามข้อบังคับ ฉ.44) หากในวันประชุมมีลูกค้ามาประชุม \"ไม่ครบองค์ ประชุม\" (ไม่ถึง 2 ใน 3) ระเบียบกำหนดให้ต้องเรียกและดำเนินการประชุมใหม่ภายในระยะเวลาเท่าใด", "choices": {"ก": "ภายใน 7 วันทำการ โดยนับจากวันประชุม", "ข": "ภายใน 14 วัน โดยนับจากวันประชุม", "ค": "ภายใน 14 วัน โดยนับถัดจากวันประชุม", "ง": "ภายใน 15 วัน โดยนับจากวันประชุม", "จ": "ภายใน 15 วัน โดยนับถัดจากวันประชุม"}, "answer": "ค", "explanation": "ตามระเบียบว่าด้วยการประชุมกลุ่มลูกค้า หากครั้งแรกมาไม่ครบองค์ประชุม (ไม่ถึง 2 ใน 3) ธนาคาร กำหนดให้ต้องเรียกและดำเนินการประชุมใหม่ **\"ภายใน 14 วัน โดยนับถัดจากวันประชุม\"** **92. เฉลย: ง.** **คำอธิบาย:** กฎหมายได้เปิดช่องเพื่อไม่ให้งานสะดุด โดยระบุว่าในการประชุมคราวหลัง (ครั้งที่ 2) **\"แม้ลูกค้ามาร่วม ประชุมไม่ถึงสองในสามของจำนวนลูกค้าทั้งหมดในกลุ่ม ก็ให้ถือว่าเป็นองค์ประชุม\"** สามารถดำเนินการและลงมติต่อไปได้ เลย"}, {"num": 42, "q": "จากข้อ 91 ในการเรียกประชุมกลุ่มลูกค้า \"คราวหลัง\" (ครั้งที่ 2) หากยังมีลูกค้ามาร่วมประชุม \"ไม่ถึง\" สองในสามของ จำนวนลูกค้าทั้งหมดในกลุ่ม การประชุมครั้งนี้จะถือว่าครบองค์ประชุมและสามารถดำเนินการรับลูกค้าเข้ากลุ่มได้หรือไม่", "choices": {"ก": "ไม่ได้ ต้องเลื่อนการประชุมออกไปอีกจนกว่าจะครบ 2 ใน 3", "ข": "ไม่ได้ ต้องให้ผู้จัดการสาขาเข้ามาเป็นประธานที่ประชุมเพื่อใช้อำนาจผ่อนผัน", "ค": "ไม่ได้ ต้องยุบกลุ่มเดิมและจัดตั้งกลุ่มใหม่", "ง": "ได้ ให้ถือว่าเป็นองค์ประชุมที่สมบูรณ์และดำเนินวาระต่อไปได้เลย", "จ": "ได้ แต่ต้องได้รับมติเอกฉันท์ 100% จากผู้ที่มาร่วมประชุมเท่านั้น"}, "answer": "ง", "explanation": "กฎหมายได้เปิดช่องเพื่อไม่ให้งานสะดุด โดยระบุว่าในการประชุมคราวหลัง (ครั้งที่ 2) **\"แม้ลูกค้ามาร่วม ประชุมไม่ถึงสองในสามของจำนวนลูกค้าทั้งหมดในกลุ่ม ก็ให้ถือว่าเป็นองค์ประชุม\"** สามารถดำเนินการและลงมติต่อไปได้ เลย"}, {"num": 43, "q": "กรณีการโอนลูกค้าบุคคล (ตามข้อบังคับ ฉ.45) มาเป็นเกษตรกรลูกค้า (ตามข้อบังคับ ฉ.44) หากลูกค้ายังมีหนี้เงินกู้ตาม ข้อบังคับ ฉ.45 เดิมที่ยังชำระไม่เสร็จสิ้น เงื่อนไขของสัญญากู้เงินฉบับเดิมจะเป็นอย่างไร", "choices": {"ก": "ให้ปรับลดอัตราดอกเบี้ยให้เท่ากับอัตราของลูกค้าชั้น AAA ทันทีเพื่อจูงใจ", "ข": "ให้เปลี่ยนเงื่อนไขสัญญาทั้งหมดให้เป็นไปตามข้อบังคับ ฉ.44 นับแต่วันที่โอน", "ค": "ให้เป็นไปตามเงื่อนไขเดิมไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้เสร็จสิ้น", "ง": "ต้องให้ลูกค้านำหลักประกันเป็นที่ดินมาค้ำประกันเพิ่ม จึงจะคงเงื่อนไขเดิมได้", "จ": "ให้ยกเลิกสัญญาเดิมและจัดทำสัญญาใหม่ด้วยยอดหนี้คงเหลือ"}, "answer": "ค", "explanation": "คู่มือการรับลูกค้าระบุชัดเจนว่า หากโอนลูกค้าจาก ฉ.45 มาเป็น ฉ.44 และลูกค้ายังมีหนี้เงินกู้ตาม ฉ.45 ที่ยัง ชำระไม่เสร็จสิ้น **\"ให้เงื่อนไขของสัญญาเดิม เช่น อัตราดอกเบี้ย เป็นไปตามเงื่อนไขเดิมไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้ เสร็จสิ้น\"**"}, {"num": 44, "q": "หากลูกค้าถูกจัดประวัติเป็น \"ลูกค้าผิดนัดชำระหนี้ (ตกเป็นชั้น B)\" แต่ภายหลังสามารถแก้ไขตามเครื่องมือแก้ไขหนี้ (Loan Review หรือ Revolving Credit) จนเป็นหนี้ปกติ สาขาสามารถพิจารณาแก้ไขประวัติให้กลับเป็นชั้นเดิมได้ โดยต้องได้รับอนุมัติจาก บุคคลในข้อใด", "choices": {"ก": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ข": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)", "ค": "ผู้จัดการสาขา (ผจข.) โดยต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) โดยต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา", "จ": "ผู้อำนวยการฝ่ายกิจการสาขาภาค"}, "answer": "ค", "explanation": "กรณีที่ลูกค้าตกเป็นลูกค้าผิดนัดชำระหนี้ (ตกชั้น B) แต่สามารถแก้ไขหนี้ได้สำเร็จตามเวลาที่กำหนด ธนาคาร ผ่อนปรนให้สามารถปรับประวัติกลับเป็นชั้นเดิมได้ โดย **\"ผู้จัดการสาขาเป็นผู้มีอำนาจอนุมัติ ซึ่งต้องผ่านความเห็นชอบของ คณะกรรมการสินเชื่อระดับสาขา\"**"}, {"num": 45, "q": "นายนนน มีภูมิลำเนาตามทะเบียนบ้านอยู่ที่ อ.เมือง จ.ชลบุรี แต่มีสวนทุเรียน 20 ไร่อยู่ที่ อ.แกลง จ.ระยอง หากนายนน นต้องการขึ้นทะเบียนเป็นลูกค้าเพื่อขอกู้เงินไปปรับปรุงสวนทุเรียน ธนาคารกำหนดวิธีปฏิบัติในการรับขึ้นทะเบียนที่ถูกต้อง ที่สุดตามข้อใด", "choices": {"ก": "ให้สาขาชลบุรีรับขึ้นทะเบียน โดยขอความร่วมมือสาขาแกลงตรวจสอบที่ตั้งโครงการ", "ข": "สาขาแกลงรับขึ้นทะเบียนได้ โดยส่งพนักงานไปสอบรายการขึ้นทะเบียนที่ชลบุรี หรือขอความร่วมมือสาขาชลบุรีตรวจสอบ ให้", "ค": "ไม่สามารถขึ้นทะเบียนได้เนื่องจากสถานที่อยู่ข้ามเขตจังหวัด ง. ต้องให้ผู้อำนวยการฝ่ายกิจการสาขาภาค เป็นผู้วินิจฉัยสั่งการ", "จ": "ให้โอนชื่อทะเบียนบ้านนายนนนมาระยองก่อนล่วงหน้า 6 เดือน"}, "answer": "ข", "explanation": "สำหรับข้อยกเว้นกรณีสถานประกอบอาชีพอยู่คนละพื้นที่กับภูมิลำเนาตามทะเบียนบ้าน ธนาคารอำนวยความ สะดวกให้ **\"สาขาที่ตั้งสถานประกอบอาชีพ (สาขาแกลง) รับขึ้นทะเบียนได้\"** โดยสามารถส่งพนักงานไปสอบประวัติ หรือ ทำหนังสือขอความร่วมมือสาขาตามทะเบียนบ้าน (ชลบุรี) ให้ช่วยสอบสวนประวัติแทนได้"}, {"num": 46, "q": "สหกรณ์การเกษตรแห่งหนึ่ง มีวงเงินกู้กับธนาคารประกอบด้วย: ทุนหมุนเวียนให้สมาชิกกู้ 50 ล้านบาท, ค่าลงทุน 20 ล้านบาท, และทุนหมุนเวียนรวบรวมผลผลิต 10 ล้านบาท ต่อมาตรวจสอบพบว่า \"คู่สมรส\" ของคณะกรรมการดำเนินงาน 2 ราย มากู้เงินส่วนตัวเพื่อทำธุรกิจรวบรวมผลผลิตคนละ 1 ล้านบาท ตามแนวทาง SLL ธนาคารต้องนับยอดสินเชื่อกลุ่มนี้ (Total Group Exposure) เป็นจำนวนเท่าใด", "choices": {"ก": "80 ล้านบาท (ไม่นับรวมคู่สมรส)", "ข": "81 ล้านบาท (นับรวมคู่สมรสเฉพาะประธาน)", "ค": "82 ล้านบาท", "ง": "10 ล้านบาท (แยกนับเฉพาะหนี้วัตถุประสงค์เดียวกัน)", "จ": "12 ล้านบาท"}, "answer": "ค", "explanation": "ตามหลักการรวมกลุ่มลูกหนี้ SLL สหกรณ์มีหนี้รวม 50+20+10 = 80 ล้านบาท และการที่คู่สมรสของ กรรมการดำเนินงานไปกู้เงินส่วนตัวเพื่อทำธุรกิจ \"รวบรวมผลผลิต\" (ซึ่งเป็นวัตถุประสงค์เดียวกันกับสหกรณ์) จำนวน 2 คน คนละ 1 ล้านบาท จะถือเป็นผู้เกี่ยวข้องที่ต้องนับรวมด้วย ดังนั้น Total Group Exposure = 80 + 2 = **82 ล้านบาท**"}, {"num": 47, "q": "ตามปฏิทินงานสหกรณ์ การออกตรวจเยี่ยมสหกรณ์นอกภาคการเกษตร (เช่น สหกรณ์ออมทรัพย์) ผ่านระบบ CRS ธนาคารกำหนดความถี่ในการดำเนินการไว้ตามข้อใด", "choices": {"ก": "อย่างน้อยปีละ 1 ครั้ง ภายใน 150 วันหลังสิ้นปีบัญชี", "ข": "อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 หลังสิ้นปีบัญชีก่อนประชุมใหญ่ และครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)", "ค": "ทุกๆ ไตรมาส (ปีละ 4 ครั้ง)", "ง": "อย่างน้อยปีละ 2 ครั้ง (ก่อนให้เงินกู้ และก่อนถึงกำหนดชำระหนี้)", "จ": "ไม่ต้องออกตรวจเยี่ยม หากสหกรณ์นั้นถูกจัดอยู่ในระดับความเสี่ยงต่ำ"}, "answer": "ข", "explanation": "ตามปฏิทินงานสหกรณ์ การตรวจเยี่ยมผ่านระบบ CRS สำหรับสหกรณ์นอกภาค (เช่น สหกรณ์ออมทรัพย์, สหกรณ์ร้านค้า) ต้องทำ **\"อย่างน้อยปีละ 2 ครั้ง\"** คือ ครั้งที่ 1 หลังสิ้นปีบัญชีสหกรณ์ก่อนการประชุมใหญ่สามัญประจำปี และ ครั้งที่ 2 หลังจากตรวจเยี่ยมครั้งแรก 6 เดือน"}, {"num": 48, "q": "กรณีมีเหตุพิเศษอันควรยกเว้นคุณสมบัติการรับขึ้นทะเบียนลูกค้าประเภทบุคคล กลุ่มบุคคล หรือผู้ประกอบการ (ตาม ข้อบังคับ ฉ.45) ตำแหน่งใดต่อไปนี้มีอำนาจในการผ่อนผันและพิจารณารับขึ้นทะเบียนให้ได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.)", "ข": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ค": "ผู้จัดการสาขา (ผจข.) และสามารถมอบอำนาจช่วงให้ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) ได้", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) เท่านั้น", "จ": "คณะกรรมการพิจารณาอนุมัติการให้สินเชื่อระดับสาขา"}, "answer": "ค", "explanation": "ตามระเบียบ ฉบับที่ 77 ว่าด้วยลูกค้าผู้กู้ กรณีมีเหตุพิเศษอันควรยกเว้นคุณสมบัติรับขึ้นทะเบียน (เช่น อาศัย ในพื้นที่ไม่ครบเกณฑ์) **ผู้จัดการสาขา (ผจข.)** มีอำนาจในการผ่อนผันรับขึ้นทะเบียน โดยสามารถทำคำสั่งมอบหมายงาน และมอบอำนาจช่วงให้ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) ทำการแทนได้"}, {"num": 49, "q": "นายเอก ได้ขึ้นทะเบียนเป็นลูกค้าใหม่ และได้รับการประเมินตามแบบประเมินพิจารณาจัดชั้น หากนายเอกได้คะแนน รวม \"65 คะแนน\" จะได้รับการจัดชั้นลูกค้าและโครงสร้างอัตราดอกเบี้ยตามข้อใด", "choices": {"ก": "ชั้น A / โครงสร้างอัตราดอกเบี้ย MRR + 2.25", "ข": "ชั้น AA / โครงสร้างอัตราดอกเบี้ย MRR + 1.50", "ค": "ชั้น AAA / โครงสร้างอัตราดอกเบี้ย MRR + 0.75", "ง": "ชั้น B / โครงสร้างอัตราดอกเบี้ย MRR + 3.00", "จ": "ชั้น C / โครงสร้างอัตราดอกเบี้ย MLR"}, "answer": "ก", "explanation": "ตามหลักเกณฑ์การจัดชั้นลูกค้าที่ขึ้นทะเบียนใหม่ (ฉ.44) หากลูกค้าประเมินได้คะแนน: 80-100 = ชั้น AAA (MRR+0.75), 70-79 = ชั้น AA (MRR+1.50) และหากได้คะแนน **\"ต่ำกว่า 70 คะแนน\" จะได้ชั้น A และใช้อัตราดอกเบี้ย MRR+2.25** (65 คะแนนจึงตกอยู่เกณฑ์นี้)"}, {"num": 50, "q": "ตามปฏิทินงานสหกรณ์ของธนาคาร กิจกรรมในข้อใดที่เป็นจุดแตกต่างระหว่าง \"สหกรณ์ในภาค (เช่น สหกรณ์ การเกษตร)\" กับ \"สหกรณ์นอกภาค (เช่น สหกรณ์ออมทรัพย์)\"", "choices": {"ก": "การเข้าร่วมประชุมใหญ่ประจำปี", "ข": "การรวบรวมข้อมูลกรณีผู้กู้มีหนี้ค้างชำระ", "ค": "การจัดทำตารางกำหนดชำระหนี้ ง. การทบทวนหลักประกันและตัวอย่างลายมือชื่อ", "จ": "การแจ้งอัตราดอกเบี้ยเงินกู้ --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 10 : กิ่งที่ 2)** **91. เฉลย: ค.** **คำอธิบาย:** ตามระเบียบว่าด้วยการประชุมกลุ่มลูกค้า หากครั้งแรกมาไม่ครบองค์ประชุม (ไม่ถึง 2 ใน 3) ธนาคาร กำหนดให้ต้องเรียกและดำเนินการประชุมใหม่ **\"ภายใน 14 วัน โดยนับถัดจากวันประชุม\"** **92. เฉลย: ง.** **คำอธิบาย:** กฎหมายได้เปิดช่องเพื่อไม่ให้งานสะดุด โดยระบุว่าในการประชุมคราวหลัง (ครั้งที่ 2) **\"แม้ลูกค้ามาร่วม ประชุมไม่ถึงสองในสามของจำนวนลูกค้าทั้งหมดในกลุ่ม ก็ให้ถือว่าเป็นองค์ประชุม\"** สามารถดำเนินการและลงมติต่อไปได้ เลย **93. เฉลย: ค.** **คำอธิบาย:** คู่มือการรับลูกค้าระบุชัดเจนว่า หากโอนลูกค้าจาก ฉ.45 มาเป็น ฉ.44 และลูกค้ายังมีหนี้เงินกู้ตาม ฉ.45 ที่ยัง ชำระไม่เสร็จสิ้น **\"ให้เงื่อนไขของสัญญาเดิม เช่น อัตราดอกเบี้ย เป็นไปตามเงื่อนไขเดิมไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้ เสร็จสิ้น\"** **94. เฉลย: ค.** **คำอธิบาย:** กรณีที่ลูกค้าตกเป็นลูกค้าผิดนัดชำระหนี้ (ตกชั้น B) แต่สามารถแก้ไขหนี้ได้สำเร็จตามเวลาที่กำหนด ธนาคาร ผ่อนปรนให้สามารถปรับประวัติกลับเป็นชั้นเดิมได้ โดย **\"ผู้จัดการสาขา..."}, "answer": "ค", "explanation": "ตามตารางปฏิทินงานสหกรณ์ จุดที่แตกต่างกันชัดเจนคือ **\"การจัดทำตารางกำหนดชำระหนี้\"** โดยสหกรณ์ ในภาคจะทำภายใน 1 เดือนหลังสิ้นปีบัญชีและก่อนเบิกครั้งแรก ส่วนสหกรณ์นอกภาคจะทำก่อนสิ้นปีบัญชีสหกรณ์ --- ### **แบบทดสอบ Batch 18: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 101 - 110)**"}, {"num": 51, "q": "ตามกรอบทิศทางนโยบายการให้สินเชื่อ (Credit Policy Guide) ข้อใดต่อไปนี้จัดอยู่ในกลุ่ม \"นโยบายที่ไม่สนับสนุน (Negative List)\" ซึ่งธนาคารห้ามปล่อยสินเชื่ออย่างเด็ดขาด", "choices": {"ก": "การให้สินเชื่อเพื่อนำไปลงทุนในธุรกิจที่พักและรีสอร์ทชุมชน", "ข": "การให้สินเชื่อเพื่อเป็นค่าลงทุนซื้อที่ดินเพื่อการเกษตร", "ค": "การให้สินเชื่อเพื่อเสริมสภาพคล่องให้กับธุรกิจร้านทองคำ", "ง": "การให้สินเชื่อเพื่อนำไป Refinance หนี้ที่กำลังผิดนัดชำระกับสถาบันการเงินอื่น"}, "answer": "ง", "explanation": "ตามนโยบาย Credit Policy Guide ธุรกิจหรือวัตถุประสงค์ที่อยู่ใน Negative List (ห้ามสนับสนุนเด็ดขาด) ได้แก่ ธุรกิจแชร์ลูกโซ่, ธุรกิจก่อมลพิษ, การเก็งกำไรที่ดิน, การสร้างอาคารให้เช่าที่ไม่มีส่วนร่วมกับชุมชน, และ **\"การขอกู้เพื่อนำไป Refinance หนี้ที่กำลังผิดนัดชำระกับสถาบันการเงินอื่น\"** (ส่วนที่พักรีสอร์ท/ร้านทอง/ซื้อที่ดิน เป็นกลุ่ม Caution ที่สามารถให้กู้ ได้แต่ต้องพิจารณาอย่างระมัดระวัง) [Artifact: กฎเหล็กและไฟจราจรคัดกรองสินเชื่อเกษตรกร]"}, {"num": 52, "q": "ลักษณะต้องห้ามของผู้ขอขึ้นทะเบียนเป็นลูกค้าตามข้อบังคับของธนาคาร บุคคลในข้อใดต่อไปนี้ที่ธนาคาร \"ห้ามรับเข้า เป็นลูกค้าโดยเด็ดขาด\" (ไม่มีข้อยกเว้น)", "choices": {"ก": "ผู้ที่เคยมีประวัติค้างชำระหนี้กับธนาคารพาณิชย์มาก่อน", "ข": "ผู้ที่มีความพิการทางร่างกาย แต่ยังสามารถประกอบอาชีพได้", "ค": "บุคคลที่ศาลมีคำสั่งให้เป็นบุคคลล้มละลาย", "ง": "ผู้ที่มีภูมิลำเนาอยู่ในพื้นที่ดำเนินงานของสาขาเพียง 4 เดือน"}, "answer": "ค", "explanation": "ตามคุณสมบัติลักษณะต้องห้ามของผู้ขอขึ้นทะเบียนเป็นลูกค้า ธนาคารห้ามรับ **\"บุคคลล้มละลาย หรือมี หนี้สินล้นพ้นตัว\"**, คนวิกลจริต (จิตฟั่นเฟือน), และผู้ที่เคยถูกให้ออกจากการเป็นลูกค้าธนาคารมาก่อน เข้าเป็นลูกค้าอย่าง เด็ดขาด (ส่วนเรื่องระยะเวลาพำนัก 4 เดือน สามารถผ่อนผันได้) [Artifact: กฎเหล็กและไฟจราจรคัดกรองสินเชื่อเกษตรกร]"}, {"num": 53, "q": "ในการรับเกษตรกรขึ้นทะเบียนเป็นลูกค้าตาม \"โครงการพิเศษ\" ของรัฐบาล ซึ่งเกษตรกรอาจขาดคุณสมบัติบางประการ ตามข้อบังคับปกติ ธนาคารจะจัดสถานะรหัสลูกค้า (Customer Code) รายนี้ไว้ตามข้อใด", "choices": {"ก": "รหัส 00 (ลูกค้าขึ้นทะเบียนตามข้อบังคับ)", "ข": "รหัส 01 (ลูกค้าขึ้นทะเบียนเฉพาะกิจ)", "ค": "รหัส 02 (ลูกค้าโครงการรัฐ)", "ง": "รหัส 99 (ลูกค้ารอการผ่อนผัน)"}, "answer": "ข", "explanation": "สำหรับการรับเกษตรกรขึ้นทะเบียนตามโครงการพิเศษ (โครงการนโยบายรัฐ) ที่ขาดคุณสมบัติบางประการ ตามปกติ (เช่น ข้อบังคับ ฉ.44) ธนาคารจะให้ระบุสถานะการขึ้นทะเบียนเป็น **\"รหัส 01 : ลูกค้าขึ้นทะเบียนเฉพาะกิจ\"** (ส่วน รหัส 00 คือลูกค้าที่ขึ้นทะเบียนตามข้อบังคับปกติ)"}, {"num": 54, "q": "กรณีที่ลูกค้าบุคคลธรรมดา (ตามข้อบังคับ ฉ.45) โอนเปลี่ยนประเภทมาเป็นเกษตรกรลูกค้า (ตามข้อบังคับ ฉ.44) แต่ ลูกค้ายังมีหนี้เงินกู้ตาม ฉ.45 เดิมที่ \"ยังชำระไม่เสร็จสิ้น\" ธนาคารกำหนดให้จัดการกับเงื่อนไขของสัญญาเดิมอย่างไร", "choices": {"ก": "ให้ยกเลิกสัญญาเดิมแล้วทำสัญญาใหม่ตามโครงสร้างของ ฉ.44 ทันที", "ข": "ให้ปรับลดอัตราดอกเบี้ยลงให้เท่ากับลูกค้า ฉ.44 ทันทีเพื่อความช่วยเหลือ", "ค": "ให้เงื่อนไขของสัญญาเดิม เช่น อัตราดอกเบี้ย เป็นไปตามเงื่อนไขเดิมโดยไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้เสร็จสิ้น", "ง": "ให้ลูกค้านำเงินก้อนมาปิดบัญชีเดิมให้เสร็จสิ้นก่อน จึงจะสามารถรับโอนได้"}, "answer": "ค", "explanation": "ตามวิธีปฏิบัติ หากลูกค้ายังคงมีหนี้เงินกู้ตามข้อบังคับ ฉ.45 เดิมค้างอยู่ แม้จะโอนประเภทเป็น ฉ.44 แล้ว ** \"เงื่อนไขของสัญญากู้เงินฉบับเดิม เช่น อัตราดอกเบี้ยเงินกู้ ให้เป็นไปตามเงื่อนไขเดิมไม่ต้องเปลี่ยนแปลงจนกว่าจะชำระหนี้ เสร็จสิ้น\"**"}, {"num": 55, "q": "ตาม Credit Policy ของธนาคาร นโยบายการสนับสนุนธุรกิจ \"ร้านทองคำ\" มีการกำหนดเงื่อนไขที่ต้องระมัดระวังไว้ อย่างไร", "choices": {"ก": "ห้ามให้การสนับสนุนในทุกกรณีเนื่องจากเป็นธุรกิจที่มีความเสี่ยงสูง", "ข": "สนับสนุนให้กู้ได้เฉพาะเพื่อ \"เสริมสภาพคล่อง\" เท่านั้น และผู้กู้ต้องมีประสบการณ์ดำเนินธุรกิจนี้มาแล้ว", "ค": "สนับสนุนให้กู้เพื่อเป็นค่าลงทุนสร้างสาขาใหม่ได้ หากมีหลักประกันคุ้มมูลค่า 100%", "ง": "สนับสนุนได้เต็มที่หากร้านทองคำนั้นจดทะเบียนในรูปแบบนิติบุคคล"}, "answer": "ข", "explanation": "ตามนโยบายสนับสนุนอย่างระมัดระวัง (Caution) ธุรกิจร้านทองคำมีความเสี่ยงด้านความผันผวนของราคาสูง ธนาคารจึงกำหนดเงื่อนไขว่า **\"ให้กู้ได้เฉพาะเพื่อเสริมสภาพคล่อง (Working Capital) เท่านั้น และผู้กู้ต้องมีประสบการณ์ดำเนิน ธุรกิจนี้มาแล้ว\"** ห้ามให้กู้เพื่อเป็นค่าลงทุนสร้างสาขาใหม่เด็ดขาด [Artifact: กฎเหล็กและไฟจราจรคัดกรองสินเชื่อเกษตรกร]"}, {"num": 56, "q": "ในการจัดประชุมกลุ่มลูกค้า (ตามข้อบังคับ ฉ.44) เพื่อพิจารณารับสมาชิกใหม่เข้าสังกัดกลุ่ม จะต้องมีลูกค้าเดิมมาประชุม จำนวนเท่าใด จึงจะถือว่า \"ครบองค์ประชุม\"", "choices": {"ก": "ไม่น้อยกว่ากึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น", "ข": "เกินกว่ากึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น", "ค": "ไม่น้อยกว่าสองในสาม (2/3) ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น", "ง": "เกินกว่าสองในสาม (2/3) ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น"}, "answer": "ค", "explanation": "ตามข้อบังคับว่าด้วยการรับลูกค้า การจะเปิดประชุมกลุ่มลูกค้าได้ องค์ประชุมจะต้องมีลูกค้ามาประชุม **\"ไม่ น้อยกว่าสองในสาม (2/3) ของจำนวนลูกค้าทั้งหมดที่มีอยู่ในกลุ่มนั้น\"** **107. เฉลย: ค.** **คำอธิบาย:** กรณีมีเหตุพิเศษอันควรยกเว้นคุณสมบัติการรับขึ้นทะเบียนตามข้อบังคับ (เช่น เรื่องระยะเวลาอาศัยอยู่ในพื้นที่) **\"ผู้จัดการสาขา (ผจข.)\"** มีอำนาจในการผ่อนผันรับขึ้นทะเบียนให้ได้ โดยต้องบันทึกความเห็นประกอบการวินิจฉัยไว้ด้วย (และ ผจข. สามารถมอบอำนาจช่วงให้ ผช.ผจข. ทำการแทนได้)"}, {"num": 57, "q": "หากมีเหตุพิเศษอันควรยกเว้นคุณสมบัติการรับขึ้นทะเบียนลูกค้า (เช่น อาศัยในพื้นที่ไม่ครบ 6 เดือน) บุคคลในตำแหน่ง ใดต่อไปนี้ มีอำนาจในการวินิจฉัย \"ผ่อนผัน\" อนุมัติรับขึ้นทะเบียนเป็นลูกค้าได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.)", "ข": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ค": "ผู้จัดการสาขา (ผจข.)", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"}, "answer": "ค", "explanation": "กรณีมีเหตุพิเศษอันควรยกเว้นคุณสมบัติการรับขึ้นทะเบียนตามข้อบังคับ (เช่น เรื่องระยะเวลาอาศัยอยู่ในพื้นที่) **\"ผู้จัดการสาขา (ผจข.)\"** มีอำนาจในการผ่อนผันรับขึ้นทะเบียนให้ได้ โดยต้องบันทึกความเห็นประกอบการวินิจฉัยไว้ด้วย (และ ผจข. สามารถมอบอำนาจช่วงให้ ผช.ผจข. ทำการแทนได้)"}, {"num": 58, "q": "หากลูกค้าประจำสาขามีความประสงค์จะยื่นเรื่อง \"ขอลาออก\" จากการเป็นลูกค้าของธนาคาร จะสามารถทำได้เมื่อใด", "choices": {"ก": "เมื่อลูกค้าโอนย้ายหลักประกันไปให้ธนาคารอื่นเรียบร้อยแล้ว", "ข": "เมื่อลูกค้าไม่มีหนี้คงค้างในฐานะผู้กู้ และไม่ติดภาระค้ำประกันใดๆ อยู่กับธนาคาร", "ค": "เมื่อลูกค้าชำระหนี้ของตนเองเสร็จสิ้นแล้ว (แม้จะยังค้ำประกันให้สมาชิกในกลุ่มอยู่ก็ตาม)", "ง": "เมื่อลูกค้าย้ายถิ่นฐานออกนอกพื้นที่ดำเนินงานเกินกว่า 1 ปี"}, "answer": "ข", "explanation": "การสิ้นสุดสภาพโดยการ \"ขอลาออก\" จากการเป็นลูกค้าประจำสาขาด้วยตนเอง ลูกค้าจะสามารถทำได้ก็ ต่อเมื่อ **\"ไม่มีหนี้คงค้างอยู่กับธนาคาร และ ต้องไม่ติดภาระค้ำประกันใดๆ ให้กับบุคคลอื่น\"** เรียบร้อยแล้วเท่านั้น [Artifact: กฎเหล็กและไฟจราจรคัดกรองสินเชื่อเกษตรกร]"}, {"num": 59, "q": "นายรชต ได้ขึ้นทะเบียนเป็นลูกค้าใหม่ที่สาขาแกลง และได้รับการประเมินตามแบบพิจารณาจัดชั้นลูกค้าใหม่ได้คะแนน \"79 คะแนน\" นายรชต จะได้รับการจัดชั้นลูกค้าและโครงสร้างอัตราดอกเบี้ยตามข้อใด", "choices": {"ก": "ชั้น AAA / โครงสร้างอัตราดอกเบี้ย MRR + 0.75", "ข": "ชั้น AA / โครงสร้างอัตราดอกเบี้ย MRR + 1.50", "ค": "ชั้น A / โครงสร้างอัตราดอกเบี้ย MRR + 2.25", "ง": "ชั้น A / โครงสร้างอัตราดอกเบี้ย MRR + 1.50 --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 18 : กิ่งที่ 2 นโยบายและการรับลูกค้า)** **101. เฉลย: ง.** **คำอธิบาย:** ตามนโยบาย Credit Policy Guide ธุรกิจหรือวัตถุประสงค์ที่อยู่ใน Negative List (ห้ามสนับสนุนเด็ดขาด) ได้แก่ ธุรกิจแชร์ลูกโซ่, ธุรกิจก่อมลพิษ, การเก็งกำไรที่ดิน, การสร้างอาคารให้เช่าที่ไม่มีส่วนร่วมกับชุมชน, และ **\"การขอกู้เพื่อนำไป Refinance หนี้ที่กำลังผิดนัดชำระกับสถาบันการเงินอื่น\"** (ส่วนที่พักรีสอร์ท/ร้านทอง/ซื้อที่ดิน เป็นกลุ่ม Caution ที่สามารถให้กู้ ได้แต่ต้องพิจารณาอย่างระมัดระวัง) [Artifact: กฎเหล็กและไฟจราจรคัดกรองสินเชื่อเกษตรกร] **102. เฉลย: ค.** **คำอธิบาย:** ตามคุณสมบัติลักษณะต้องห้ามของผู้ขอขึ้นทะเบียนเป็นลูกค้า ธนาคารห้ามรับ **\"บุคคลล้มละลาย หรือมี หนี้สินล้นพ้นตัว\"**, คนวิกลจริต (จิตฟั่นเฟือน), และผู้ที่เคยถูกให้ออกจากการเป็นลูกค้าธนาคารมาก่อน เข้าเป็นลูกค้าอย่าง เด็ดขาด (ส่วนเรื่องระยะเวลาพำนัก 4 เดือน สามารถผ่อนผันได้) [Artifact: กฎเหล็กและไฟจราจรคัดกรองสินเชื่อเกษตรกร] **103. เฉลย: ข.** **คำอธิบาย:** สำหรับการรับเกษต..."}, "answer": "ข", "explanation": "ตามเกณฑ์การพิจารณาจัดชั้นลูกค้าใหม่ (ฉ.44) หากลูกค้าได้คะแนนประเมิน 80-100 จะได้ชั้น AAA (MRR+0.75), แต่หากได้คะแนน **70-79 คะแนน จะถูกจัดอยู่ในชั้น AA และใช้อัตราดอกเบี้ย MRR+1.50** (ถ้าน้อยกว่า 70 จะเป็นชั้น A / MRR+2.25) --- ### **แบบทดสอบ Batch 19: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 111 - 120)**"}, {"num": 60, "q": "ในการจัดประชุมเพื่อรับสมาชิกใหม่เข้าสังกัด \"กลุ่มลูกค้า\" ข้อบังคับกำหนดให้ต้องใช้มติที่ประชุมตามเกณฑ์ในข้อใด จึง จะสามารถรับเข้าเป็นสมาชิกกลุ่มได้สำเร็จ", "choices": {"ก": "ได้รับมติรับรองด้วยคะแนนเสียง \"เกินกึ่งหนึ่ง\" ของผู้ที่มาร่วมประชุม", "ข": "ได้รับมติรับรองด้วยคะแนนเสียง \"เกินกึ่งหนึ่ง\" ของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น", "ค": "ได้รับมติรับรองด้วยคะแนนเสียง \"ไม่น้อยกว่าสองในสาม\" ของผู้ที่มาร่วมประชุม", "ง": "ได้รับมติรับรองด้วยมติเอกฉันท์ 100% จากลูกค้าทั้งหมดในกลุ่มนั้น"}, "answer": "ข", "explanation": "ตามระเบียบข้อบังคับว่าด้วยการรับลูกค้า การประชุมเพื่อรับลูกค้าเข้าสังกัดกลุ่ม จะต้องได้รับมติรับรองด้วย คะแนนเสียง **\"เกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น\"** (ไม่ใช่แค่เกินกึ่งหนึ่งของผู้ที่มาร่วมประชุม) จึงจะมีผลผูกพัน ให้รับเข้าสังกัดกลุ่มได้"}, {"num": 61, "q": "ตามทิศทางนโยบายการให้สินเชื่อของธนาคาร (Credit Policy Guide) ธนาคารมุ่งเน้นให้การสนับสนุนสินเชื่อที่ขับเคลื่อน ด้วยโมเดลเศรษฐกิจแบบใดเป็นหลัก", "choices": {"ก": "EEC Economy ข. BCG Economy (Bio, Circular, Green)", "ค": "SME D-Scale", "ง": "NPLs Zero Initiative", "ข": "BCG Economy (Bio, Circular, Green) - ขับเคลื่อนด้วย Value Chain Financing"}, "answer": "ข", "explanation": "ตาม Credit Policy ของธนาคาร นโยบายที่ธนาคารให้การสนับสนุนหลักคือการให้สินเชื่อตลอดห่วงโซ่มูลค่า (Value Chain Financing) และขับเคลื่อนภายใต้โมเดล **BCG Economy (Bio, Circular, Green)** ซึ่งคำนึงถึงนวัตกรรมและผลกระทบ ต่อสิ่งแวดล้อม [Audio 6]"}, {"num": 62, "q": "หากลูกค้ามีความประสงค์จะขอกู้เงินเพื่อนำไป \"Refinance\" หนี้จากสถาบันการเงินอื่น ธนาคารมีเงื่อนไขสำคัญในการ พิจารณาให้การสนับสนุนอย่างไร", "choices": {"ก": "ห้ามสนับสนุนเด็ดขาดเนื่องจากจัดอยู่ในกลุ่ม Negative List", "ข": "ให้กู้ได้เพียงร้อยละ 50 ของยอดหนี้คงเหลือที่สถาบันเดิม", "ค": "สนับสนุนได้ แต่ต้องเป็นการปิดภาระหนี้ทั้งหมดทุกสัญญาในคราวเดียว บัญชีเดิมต้องเป็นหนี้ปกติ และ ธ.ก.ส. ต้องได้รับ บุริมสิทธิในหลักประกัน", "ง": "สนับสนุนได้เฉพาะหนี้ที่ตกเป็น NPLs ไปแล้วเท่านั้นเพื่อช่วยฟื้นฟูอาชีพลูกค้า"}, "answer": "ค", "explanation": "การ Refinance หนี้จากสถาบันการเงินอื่น จัดอยู่ในนโยบาย \"สนับสนุนอย่างระมัดระวัง (Caution List)\" โดยให้การ สนับสนุนได้ภายใต้เงื่อนไขว่า **\"ต้องเป็นการปิดภาระหนี้ทั้งหมดทุกสัญญาในคราวเดียว, บัญชีเดิมต้องมีสถานะเป็นหนี้ปกติ, และ ธ.ก.ส. ต้องได้รับบุริมสิทธิในหลักประกันเป็นลำดับแรก\"** [Audio 6]"}, {"num": 63, "q": "นางสาวนิด ขอขึ้นทะเบียนเป็นเกษตรกรลูกค้าใหม่ และได้รับการประเมินพิจารณาจัดชั้นลูกค้าใหม่ได้คะแนน \"65 คะแนน\" นางสาวนิดจะได้รับการจัดชั้นและโครงสร้างอัตราดอกเบี้ยในระดับใด", "choices": {"ก": "ชั้น AAA / โครงสร้างอัตราดอกเบี้ย MRR + 0.75", "ข": "ชั้น AA / โครงสร้างอัตราดอกเบี้ย MRR + 1.50", "ค": "ชั้น A / โครงสร้างอัตราดอกเบี้ย MRR + 2.25", "ง": "ชั้น B / โครงสร้างอัตราดอกเบี้ย MRR + 3.00"}, "answer": "ค", "explanation": "ตามเกณฑ์การพิจารณาจัดชั้นลูกค้าใหม่ หากลูกค้าประเมินได้คะแนนตั้งแต่ 80-100 จะได้ชั้น AAA (MRR+0.75), คะแนน 70-79 ได้ชั้น AA (MRR+1.50) แต่หากได้คะแนน **ต่ำกว่า 70 คะแนน (เช่น 65 คะแนน) ลูกค้าจะถูกจัดให้อยู่ในชั้น A และ ใช้อัตราดอกเบี้ย MRR + 2.25**"}, {"num": 64, "q": "วัตถุประสงค์การขอกู้เงินในข้อใดต่อไปนี้ จัดอยู่ในนโยบายที่ธนาคาร \"สนับสนุนอย่างระมัดระวัง (Caution List)\" ซึ่งสาขา ต้องพิจารณาความเสี่ยงเป็นพิเศษ", "choices": {"ก": "ธุรกิจที่พัก รีสอร์ท โรงแรม และการท่องเที่ยวชุมชน", "ข": "ธุรกิจสถานศึกษาเอกชน", "ค": "การขอกู้เพื่อนำไปลงทุนในแชร์ลูกโซ่", "ง": "การลงทุนสร้างหรือซื้ออาคารเพื่อให้เช่าพักที่ไม่ได้เกี่ยวข้องกับชุมชน"}, "answer": "ก", "explanation": "นโยบายที่ธนาคาร \"สนับสนุนอย่างระมัดระวัง (Caution List)\" ได้แก่ ธุรกิจร้านทองคำ, การลงทุนซื้อที่ดิน, และ **ธุรกิจที่พัก รีสอร์ท โรงแรม หรือการท่องเที่ยวชุมชน** (ส่วนแชร์ลูกโซ่, การสร้างอาคารให้เช่าที่ไม่เกี่ยวกับชุมชน, และ สถานศึกษาเอกชน จัดอยู่ในกลุ่มห้ามสนับสนุนเด็ดขาด หรือ Negative List) [Audio 6]"}, {"num": 65, "q": "กรณีที่ลูกค้าถูกจัดประวัติเป็น \"ลูกค้าผิดนัดชำระหนี้ (ตกชั้น B)\" ในวันที่ 30 เมษายน แต่ภายหลังสามารถแก้ไขหนี้ผ่าน เครื่องมือ (เช่น Loan Review หรือ Revolving Credit) จนเป็นหนี้ปกติ บุคคลใดมีอำนาจอนุมัติ \"แก้ไขประวัติการชำระหนี้ให้กลับ เป็นชั้นเดิม\" ได้", "choices": {"ก": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด ข. ผู้จัดการสาขา โดยต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา", "ค": "หัวหน้าหน่วยอำเภอ โดยผ่านความเห็นชอบของผู้จัดการสาขา", "ง": "ผู้อำนวยการฝ่ายกิจการสาขาภาค", "ข": "ผู้จัดการสาขา โดยต้องผ่านความเห็นชอบของคณะกรรมการสินเชื่อระดับสาขา"}, "answer": "ข", "explanation": "ธนาคารมีข้อผ่อนปรนให้แก้ไขประวัติการชำระหนี้จากชั้น B กลับเป็นชั้นปกติได้ (หากลูกหนี้แก้ไขตามเครื่องมือ แก้ไขหนี้สำเร็จ) โดยอำนาจการพิจารณาอนุมัติให้แก้ไขประวัตินี้ เป็นของ **\"ผู้จัดการสาขา ซึ่งต้องผ่านความเห็นชอบของ คณะกรรมการสินเชื่อระดับสาขา\"**"}, {"num": 66, "q": "นายเอก ต้องการยื่นเรื่อง \"ขอลาออก\" จากการเป็นลูกค้าประจำสาขา แต่ธนาคารไม่อนุมัติ เหตุผลในข้อใดที่สอดคล้อง กับระเบียบและทำให้ธนาคารไม่อนุมัติการลาออกของนายเอก", "choices": {"ก": "นายเอกมีการย้ายภูมิลำเนาออกไปอยู่ต่างจังหวัดได้เพียง 3 เดือน", "ข": "นายเอกเปลี่ยนไปประกอบอาชีพรับจ้างทั่วไปแทนการเกษตร", "ค": "นายเอกได้ชำระหนี้ของตนเองหมดแล้ว แต่ \"ยังคงมีภาระเป็นผู้ค้ำประกันเงินกู้\" ให้กับสมาชิกในกลุ่มอยู่", "ง": "นายเอกเคยมีประวัติการชำระหนี้ล่าช้าเกิน 90 วันในอดีต"}, "answer": "ค", "explanation": "การขอลาออกจากการเป็นลูกค้าประจำสาขาด้วยตนเองจะกระทำได้ก็ต่อเมื่อ **\"ลูกค้าไม่มีหนี้คงค้างในฐานะผู้ กู้ และ ต้องไม่ติดภาระค้ำประกันใดๆ ให้กับบุคคลอื่นอยู่\"** หากยังคงค้ำประกันให้สมาชิกในกลุ่มอยู่ จะไม่สามารถยื่นขอ ลาออกได้ [Audio 6]"}, {"num": 67, "q": "ตามกรอบ Credit Policy วัตถุประสงค์การกู้เงินในข้อใดต่อไปนี้ จัดอยู่ในกลุ่ม \"นโยบายที่ไม่สนับสนุน (Negative List)\" อย่าง เด็ดขาด", "choices": {"ก": "สินเชื่อเพื่อเป็นค่าลงทุนซื้อที่ดินเพื่อประกอบอาชีพเกษตรกรรม", "ข": "สินเชื่อเพื่อเป็นค่าใช้จ่ายหมุนเวียนในธุรกิจร้านทองคำ", "ค": "สินเชื่อเพื่อก่อสร้างอาคารโกดังที่ดำเนินงานไปแล้วบางส่วนแต่ยังไม่เสร็จ", "ง": "สินเชื่อเพื่อขอคืนส่วนทุน (Refund) หรือนำไปดำเนินธุรกิจสถานศึกษาเอกชน"}, "answer": "ง", "explanation": "วัตถุประสงค์ต้องห้ามที่อยู่ใน Negative List (ห้ามธนาคารให้กู้เด็ดขาด) ได้แก่ ธุรกิจผิดกฎหมาย/แชร์ลูกโซ่, การ เก็งกำไรที่ดิน, การสร้างห้องพักให้เช่าที่ไม่เกี่ยวกับชุมชน, ธุรกิจที่ทำลายสิ่งแวดล้อม และ **\"สินเชื่อเพื่อขอคืนส่วนทุน (Refund) หรือเพื่อนำไปดำเนินธุรกิจสถานศึกษาเอกชน\"** (ส่วนข้ออื่นเป็นกลุ่มสนับสนุนอย่างระมัดระวัง) [Audio 6]"}, {"num": 68, "q": "ในการประเมินเพื่อพิจารณาจัดชั้นลูกค้าใหม่ (ตามข้อบังคับ ฉ.44) เพื่อให้ได้คะแนนระดับ A, AA หรือ AAA ธนาคารจะ พิจารณาให้คะแนนจากปัจจัยต่างๆ ยกเว้นข้อใด", "choices": {"ก": "คุณลักษณะของผู้ขอขึ้นทะเบียน", "ข": "การจัดการและการตลาด", "ค": "หลักประกันที่ใช้ในการกู้เงิน", "ง": "ประวัติการกู้ยืมและยอดหนี้สินกับเจ้าหนี้นอกระบบ"}, "answer": "ง", "explanation": "การพิจารณาจัดชั้นลูกค้าที่รับขึ้นทะเบียนใหม่ (เพื่อให้คะแนน 1-100) ธนาคารจะพิจารณาจาก 5 ปัจจัยหลักคือ: **คุณลักษณะผู้ขอขึ้นทะเบียน, การผลิต, การตลาด, การจัดการ, และหลักประกันที่ใช้** (ธนาคารไม่ได้นำประวัติหนี้นอกระบบ มาใช้ในการคิดคะแนนจัดชั้นลูกค้าใหม่)"}, {"num": 69, "q": "ในสภาวะปกติ (ที่ลูกค้ามีคุณสมบัติครบถ้วนและไม่มีเหตุต้องผ่อนผัน) บุคคลในตำแหน่งใดต่อไปนี้ มีอำนาจตามระเบียบ ในการพิจารณา \"รับขึ้นทะเบียนบุคคลเป็นลูกค้าประจำสาขา\"", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.)", "ข": "พนักงานการเงิน (พกง.)", "ค": "ผู้จัดการสาขา, ผู้ช่วยผู้จัดการสาขา, และหัวหน้าหน่วยอำเภอ ง. ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) เท่านั้น --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 19 : กิ่งที่ 2 นโยบายและการรับลูกค้า)** **111. เฉลย: ข.** **คำอธิบาย:** ตามระเบียบข้อบังคับว่าด้วยการรับลูกค้า การประชุมเพื่อรับลูกค้าเข้าสังกัดกลุ่ม จะต้องได้รับมติรับรองด้วย คะแนนเสียง **\"เกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมดในกลุ่มนั้น\"** (ไม่ใช่แค่เกินกึ่งหนึ่งของผู้ที่มาร่วมประชุม) จึงจะมีผลผูกพัน ให้รับเข้าสังกัดกลุ่มได้ **112. เฉลย: ข.** **คำอธิบาย:** ตาม Credit Policy ของธนาคาร นโยบายที่ธนาคารให้การสนับสนุนหลักคือการให้สินเชื่อตลอดห่วงโซ่มูลค่า (Value Chain Financing) และขับเคลื่อนภายใต้โมเดล **BCG Economy (Bio, Circular, Green)** ซึ่งคำนึงถึงนวัตกรรมและผลกระทบ ต่อสิ่งแวดล้อม [Audio 6] **113. เฉลย: ค.** **คำอธิบาย:** การ Refinance หนี้จากสถาบันการเงินอื่น จัดอยู่ในนโยบาย \"สนับสนุนอย่างระมัดระวัง (Caution List)\" โดยให้การ สนับสนุนได้ภายใต้เงื่อนไขว่า **\"ต้องเป็นการปิดภาระหนี้ทั้งหมดทุกสัญญาในคราวเดียว, บัญชีเดิมต้องมีสถานะเป็นหนี้ปกต...", "ง": "ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.) เท่านั้น"}, "answer": "ค", "explanation": "ตามคู่มือข้อ 6 ระบุไว้ชัดเจนว่า การรับขึ้นทะเบียนบุคคลเป็นลูกค้าประจำสาขา (ในกรณีปกติ) ให้อยู่ในอำนาจ ของ **\"ผู้จัดการสาขา, ผู้ช่วยผู้จัดการสาขา, และหัวหน้าหน่วยอำเภอ\"** (ส่วนกรณีที่ขาดคุณสมบัติและต้อง \"ผ่อนผัน\" จะเป็น อำนาจของ ผจข. แต่เพียงผู้เดียว) ### **แบบทดสอบ Batch 20: กิ่งที่ 2 นโยบายและการรับลูกค้า (ข้อ 121 - 130)**"}, {"num": 70, "q": "ตามกฎหมาย พ.ร.บ. การประกอบธุรกิจข้อมูลเครดิต หากพนักงานของธนาคารฝ่าฝืนนำข้อมูลเครดิตของลูกค้าไป \"เปิดเผยหรือเผยแพร่\" ให้กับบุคคลอื่นที่ไม่มีสิทธิรับรู้ข้อมูล จะต้องระวางโทษสูงสุดตามข้อใด", "choices": {"ก": "จำคุกไม่เกิน 1 ปี หรือปรับไม่เกิน 1 แสนบาท", "ข": "จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 3 แสนบาท", "ค": "จำคุกไม่เกิน 5 ปี หรือปรับไม่เกิน 5 แสนบาท หรือทั้งจำทั้งปรับ", "ง": "ปรับไม่เกิน 1 ล้านบาท และเพิกถอนใบอนุญาตพนักงาน", "จ": "เป็นเพียงความผิดทางวินัยร้ายแรง แต่ไม่มีบทลงโทษทางอาญา"}, "answer": "ค", "explanation": "ตามมาตรา 22 และ 24 ของ พ.ร.บ. การประกอบธุรกิจข้อมูลเครดิต การรักษาความลับเป็นเรื่องที่กฎหมาย ซีเรียสมาก หากฝ่าฝืนนำข้อมูลไปเปิดเผยหรือเผยแพร่ให้ผู้ที่ไม่มีสิทธิรับรู้ จะมีบทลงโทษรุนแรงคือ **จำคุกไม่เกิน 5 ปี หรือ ปรับไม่เกิน 5 แสนบาท หรือทั้งจำทั้งปรับ**"}, {"num": 71, "q": "ในการวิเคราะห์ความเสี่ยงด้านหลักประกัน (Collateral Risk) นอกเหนือจากการพิจารณากรรมสิทธิ์และทำเลที่ตั้งของ ทรัพย์สินแล้ว ธนาคารยังกำหนดให้พนักงานต้องวิเคราะห์ปัจจัยใดเพิ่มเติม เพื่อเป็นตัวช่วยในการปิดความเสี่ยงหากลูกค้าหลัก ไม่สามารถชำระหนี้ได้", "choices": {"ก": "โครงสร้างเงินทุนของกิจการ", "ข": "ความตั้งใจในการชำระหนี้ (Willing to pay)", "ค": "ภาวะอุตสาหกรรมและการแข่งขัน", "ง": "การพิจารณาความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม", "จ": "สถานการณ์เศรษฐกิจในระดับมหภาค"}, "answer": "ง", "explanation": "ในมิติของการวิเคราะห์ด้านหลักประกัน (Collateral Risk) ธนาคารไม่ได้ดูแค่ตัวที่ดินหรือสิ่งปลูกสร้าง แต่ต้อง พิจารณาครอบคลุมไปถึง **\"ความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม\"** ด้วย ว่าหากเกิดปัญหาขึ้น ผู้ค้ำประกันมีกำลังทรัพย์ พอที่จะเข้ามาช่วยรับผิดชอบภาระหนี้แทนได้หรือไม่ [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"}, {"num": 72, "q": "หากลูกค้าผู้ประกอบการประสงค์จะกู้เงินเพื่อนำไปทำธุรกิจค้าระหว่างประเทศ (Trade Finance) พนักงานสินเชื่อจะต้อง เพิ่มการวิเคราะห์หลัก 7'C ในด้านใดเข้ามาเป็นพิเศษ เพื่อประเมินความเสี่ยงด้านการเมือง เศรษฐกิจ และอัตราแลกเปลี่ยน ของประเทศปลายทาง", "choices": {"ก": "Character (คุณลักษณะ)", "ข": "Capacity (ความสามารถชำระหนี้)", "ค": "Condition (สถานการณ์)", "ง": "Control (การควบคุมเงื่อนไข)", "จ": "Country (ประเทศคู่ค้า)"}, "answer": "จ", "explanation": "หลักการ **Country (ประเทศคู่ค้า)** ใน 7'C เป็นองค์ประกอบที่ธนาคารบังคับให้เพิ่มเข้ามาใช้ประเมิน \"เฉพาะ กับสินเชื่อเพื่อการค้าระหว่างประเทศ (Trade Finance) เท่านั้น\" เพื่อสแกนความเสี่ยงเรื่องอัตราแลกเปลี่ยน กฎหมาย และ การเมืองของประเทศปลายทาง [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"}, {"num": 73, "q": "จากการตรวจสอบข้อมูลเครดิต (Credit Bureau Screening) สถานะข้อมูลเครดิตในข้อใดต่อไปนี้ที่ธนาคารถือว่า \"ยอมรับ ได้ และ ไม่ขัด UWS (Underwriting Standard)\" แต่พนักงานต้องแสดงเหตุผลประกอบและกำหนดเงื่อนไขควบคุมให้รัดกุม", "choices": {"ก": "Normal (ไม่มีสี)", "ข": "Small (Sm - สีเขียว)", "ค": "Minor (Mi - สีเหลือง)", "ง": "Major (Ma - สีส้ม)", "จ": "Alarming (Al - สีแดง)"}, "answer": "ค", "explanation": "การจำแนกสีในเครดิตบูโร (NCB) แบ่งความรุนแรงดังนี้: ขาว (Normal), เขียว (Small), และ **เหลือง (Minor) ซึ่ง หมายถึงเสี่ยงปานกลาง \"ยอมรับได้และไม่ขัด UWS\" แต่พนักงานต้องแสดงเหตุผลพร้อมกำหนดเงื่อนไขควบคุมให้รัดกุม** (ส่วน สีส้ม Major ขัด UWS ต้องขอ Override / สีแดง Alarming ห้ามปล่อยเด็ดขาด) [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อน ให้กู้]"}, {"num": 74, "q": "ในกรณีที่ลูกค้ายื่นขอสินเชื่อ แต่ธนาคารพบว่ามีประวัติเครดิตบูโรที่ค้างชำระอย่างหนักจึงต้อง \"ปฏิเสธการให้สินเชื่อ\" ธนาคารมีหน้าที่ต้องออกหนังสือปฏิเสธให้ลูกค้าทราบ โดยลูกค้าสามารถนำหนังสือนี้ไปตรวจสอบความถูกต้องของข้อมูล ตนเองที่บริษัทข้อมูลเครดิตแห่งชาติได้ฟรี \"ภายในระยะเวลากี่วัน\"", "choices": {"ก": "ภายใน 7 วัน นับแต่วันที่ได้รับคำปฏิเสธ", "ข": "ภายใน 15 วัน นับแต่วันที่ได้รับคำปฏิเสธ", "ค": "ภายใน 30 วัน นับแต่วันที่ได้รับคำปฏิเสธ ง. ภายใน 45 วัน นับแต่วันที่ได้รับคำปฏิเสธ", "จ": "ภายใน 60 วัน นับแต่วันที่ได้รับคำปฏิเสธ", "ง": "ต้องได้รับมติเอกฉันท์ 30 เสียง จากผู้ที่มาร่วมประชุมทุกคน"}, "answer": "ค", "explanation": "ตามมาตรา 28 หากธนาคารปฏิเสธสินเชื่อโดยมีเหตุจากข้อมูลเครดิต ธนาคารต้องแจ้งแหล่งที่มาให้ชัดเจน เพื่อให้สิทธิลูกค้าสามารถไปยื่นเรื่องขอตรวจสอบข้อมูลที่บริษัทข้อมูลเครดิตได้ฟรี **\"ภายใน 30 วัน นับแต่วันที่ได้รับคำ ปฏิเสธ\"**"}, {"num": 75, "q": "ตามหลักการวิเคราะห์สินเชื่อ 7'C การประเมินในข้อใดต่อไปนี้ที่ตรงกับความหมายของการวิเคราะห์ด้าน \"Capital (เงินทุนของกิจการ)\" มากที่สุด", "choices": {"ก": "การวิเคราะห์ประวัติความซื่อสัตย์และเครดิตบูโรของลูกค้า", "ข": "การวิเคราะห์งบกระแสเงินสดและกำไรสุทธิในแต่ละเดือน", "ค": "การประเมินโครงสร้างเงินทุนและสัดส่วนหนี้สินต่อทุน (D/E Ratio)", "ง": "การตั้งเงื่อนไขการเบิกจ่ายเงินกู้เป็นงวดๆ ตามความก้าวหน้า", "จ": "การประเมินสภาพคล่องในการขายทอดตลาดของที่ดินจำนอง"}, "answer": "ค", "explanation": "ในหลัก 7'C คำว่า **Capital (เงินทุนของกิจการ)** หมายถึงการวิเคราะห์ **โครงสร้างเงินทุนและสัดส่วนหนี้สิน ต่อทุน (D/E Ratio)** ว่าลูกค้ามีส่วนของเจ้าของ (ทุนตัวเอง) ร่วมลงในโครงการมากน้อยแค่ไหน เพื่อลดความเสี่ยงที่ธนาคารต้อง แบกรับไว้ฝ่ายเดียว [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"}, {"num": 76, "q": "ในการกำหนด \"สมมติฐานทางการเงิน (Financial Assumption)\" เพื่อวิเคราะห์ความเสี่ยงด้านการเงิน (Financial Risk) ของ ลูกค้า กฎเหล็กที่พนักงานสินเชื่อจะต้องยึดถือในการจัดทำตัวเลขคือข้อใด", "choices": {"ก": "สมมติฐานต้องกำหนดให้กิจการมีกำไรสุทธิไม่น้อยกว่าร้อยละ 20 ของยอดขาย", "ข": "สมมติฐานต้องสะท้อนกำไรสูงสุดที่เป็นไปได้ในกรณีที่ดีที่สุด (Best Case) เท่านั้น", "ค": "สมมติฐานทางการเงินต้องสอดคล้องกับภาวะอุตสาหกรรมและสภาพแวดล้อมที่แท้จริง", "ง": "สมมติฐานต้องคำนวณย้อนหลังจากรายได้ในอดีต 10 ปี", "จ": "สมมติฐานต้องกำหนดให้ลูกค้าสามารถคืนทุนได้ภายใน 1 ปีแรก"}, "answer": "ค", "explanation": "การตั้งสมมติฐานเพื่อวิเคราะห์ความเสี่ยงด้านการเงิน (Financial Risk) จะต้องตั้งอยู่บนหลักของความเป็นจริง ดังนั้นกฎเหล็กคือ **\"สมมติฐานทางการเงินต้องสอดคล้องกับภาวะอุตสาหกรรม (Industrial Conditions)\"** เช่น หากอุตสาหกรรม ยางพารากำลังราคาตก สมมติฐานก็ไม่สามารถตั้งรายได้สูงๆ สวนทางกับความเป็นจริงได้ [Artifact: เบื้องหลังวิธีธนาคารสแกน ความเสี่ยงก่อนให้กู้]"}, {"num": 77, "q": "ตามหลักเกณฑ์การกำกับลูกหนี้รายใหญ่ (Single Lending Limit : SLL) เพื่อป้องกันการกระจุกตัวของหนี้ ธนาคารจะต้อง สืบหาความสัมพันธ์ของนิติบุคคล หากพบว่า \"บริษัท A\" และ \"บริษัท B\" มี \"ผู้ถือหุ้นกลุ่มเดียวกันถือหุ้นเกินร้อยละเท่าใด\" จึงจะ ถูกจับให้นับรวมเป็นกลุ่มลูกหนี้เดียวกัน (Total Group Exposure)", "choices": {"ก": "ถือหุ้นเกินร้อยละ 10", "ข": "ถือหุ้นเกินร้อยละ 25", "ค": "ถือหุ้นเกินร้อยละ 50", "ง": "ถือหุ้นเกินร้อยละ 75", "จ": "ต้องถือหุ้นร้อยละ 100 เต็มเท่านั้น"}, "answer": "ค", "explanation": "หลักการสืบหาความสัมพันธ์ (Sherlock Holmes Test) เพื่อคำนวณเพดาน SLL ธนาคารจะนับรวมภาระหนี้เป็น กลุ่มเดียวกัน (Total Group Exposure) หากพิสูจน์ได้ว่าเป็น \"บริษัทในเครือเดียวกัน\" หรือ \"มีผู้ถือหุ้นกลุ่มเดียวกัน **ถือหุ้นเกิน ร้อยละ 50**\" เนื่องจากถือว่ามีอำนาจเบ็ดเสร็จในการควบคุมกิจการทั้งสองแห่ง [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยง ก่อนให้กู้]"}, {"num": 78, "q": "ในการตรวจสอบข้อมูลเครดิต (NCB) หากลูกค้ามีสถานะประวัติการชำระหนี้เป็น \"Normal (ปกติ - ไม่มีสี)\" มีความหมาย ตรงกับข้อใด", "choices": {"ก": "ลูกค้าเคยมีประวัติค้างชำระ 1-2 เดือนแต่ปัจจุบันเคลียร์หมดแล้ว", "ข": "ลูกค้าไม่เคยมีประวัติค้างชำระหนี้เลย", "ค": "ลูกค้าที่เพิ่งปรับปรุงโครงสร้างหนี้เสร็จสิ้น", "ง": "ลูกค้าที่มีหนี้สินเกินตัวแต่ยังจ่ายตรง", "จ": "ลูกค้าที่ไม่มีข้อมูลในระบบฐานข้อมูลเครดิตบูโร (No Bureau)"}, "answer": "ข", "explanation": "สถานะเครดิตบูโรระดับแรกสุดคือ **Normal (ปกติ - ไม่มีสี)** ซึ่งหมายความตรงตัวว่า **\"ไม่เคยมีประวัติค้าง ชำระ\"** (ประวัติดีเยี่ยม จ่ายตรงเวลามาโดยตลอด) [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"}, {"num": 79, "q": "แม้ว่ากฎเหล็กของการพิจารณาสินเชื่อคือการระมัดระวังลูกค้าที่มีประวัติหนี้เสีย แต่ธนาคารมี \"ข้อยกเว้นพิเศษ\" ที่ให้ ผ่อนปรนการสนับสนุนสินเชื่อได้ สำหรับลูกค้าที่มีประวัติตกอยู่ในกลุ่มสีแดง หรือเป็น NPL ในกรณีใดต่อไปนี้", "choices": {"ก": "ลูกค้าที่ขอกู้เงินเพื่อนำไป Refinance ปิดหนี้บัตรเครดิต", "ข": "ลูกค้าขอกู้เงินไปซื้อสินทรัพย์เก็งกำไรและยินยอมจ่ายดอกเบี้ยสูง", "ค": "ลูกค้า NPL ของ ธ.ก.ส. ที่ขอเข้าปรับปรุงโครงสร้างหนี้แล้ว และต้องการขอ \"สินเชื่อเพื่อฟื้นฟูอาชีพ\"", "ง": "ลูกค้าที่เป็นนิติบุคคลจดทะเบียนในตลาดหลักทรัพย์ที่กำลังเข้าสู่กระบวนการล้มละลาย จ. ลูกค้านำเงินสดหรือสลาก ธ.ก.ส. มาวางค้ำประกันในสัดส่วนร้อยละ 50 ของวงเงิน --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 13 : กิ่งที่ 3)** **121. เฉลย: ค.** **คำอธิบาย:** ตามมาตรา 22 และ 24 ของ พ.ร.บ. การประกอบธุรกิจข้อมูลเครดิต การรักษาความลับเป็นเรื่องที่กฎหมาย ซีเรียสมาก หากฝ่าฝืนนำข้อมูลไปเปิดเผยหรือเผยแพร่ให้ผู้ที่ไม่มีสิทธิรับรู้ จะมีบทลงโทษรุนแรงคือ **จำคุกไม่เกิน 5 ปี หรือ ปรับไม่เกิน 5 แสนบาท หรือทั้งจำทั้งปรับ** **122. เฉลย: ง.** **คำอธิบาย:** ในมิติของการวิเคราะห์ด้านหลักประกัน (Collateral Risk) ธนาคารไม่ได้ดูแค่ตัวที่ดินหรือสิ่งปลูกสร้าง แต่ต้อง พิจารณาครอบคลุมไปถึง **\"ความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม\"** ด้วย ว่าหากเกิดปัญหาขึ้น ผู้ค้ำประกันมีกำลังทรัพย์ พอที่จะเข้ามาช่วยรับผิดชอบภาระหนี้แทนได้หรือไม่ [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้] **123. เฉลย: จ.** **คำอธิบาย:** หลักการ **Country (ประเทศคู่ค้า)** ใน 7'C เป็นองค์ประกอบที่ธนาคารบังคับให้เพิ่มเข้ามาใช้ประเมิน \"เฉพาะ กั..."}, "answer": "ค", "explanation": "แม้หน้าเครดิตบูโรจะแดง (Alarming) และมีกฎห้ามปล่อย (NO Override) แต่มีข้อยกเว้นพิเศษเพื่อการช่วยเหลือ คือ **\"หากเป็นลูกค้า NPL ของ ธ.ก.ส. เอง ที่ขอเข้าปรับปรุงโครงสร้างหนี้แล้ว และต้องการขอ สินเชื่อเพื่อฟื้นฟูอาชีพ\"** ธนาคารจะอนุโลมให้เสนอขอสินเชื่อได้ เพื่อให้เขามีรายได้กลับมาชำระหนี้ [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อน ให้กู้] --- ### **แบบทดสอบ Batch 14: การบริหารจัดการหนี้ และ อำนาจอนุมัติ (ข้อ 131 - 140)**"}, {"num": 80, "q": "ตามข้อบังคับและนโยบายการรับลูกค้า หากลูกค้ามีภูมิลำเนาอยู่จังหวัดหนึ่ง (เช่น ทะเบียนบ้านอยู่ จ.ชลบุรี) แต่มี โครงการเกษตรกรรมที่จะขอสินเชื่ออยู่อีกจังหวัดหนึ่ง (เช่น สวนทุเรียนอยู่ จ.ระยอง) ธนาคารมีแนวทางปฏิบัติในการรับขึ้น ทะเบียนลูกค้าอย่างไร", "choices": {"ก": "ให้สาขาที่ลูกค้ามีภูมิลำเนา (ชลบุรี) รับขึ้นทะเบียน และให้พนักงานออกไปประเมินที่ดินข้ามเขต", "ข": "ให้สาขาที่ตั้งโครงการ (ระยอง) รับขึ้นทะเบียน พร้อมทำหนังสือขอความร่วมมือสาขาชลบุรีให้ช่วยสอบสวนรายการ ทรัพย์สินที่ภูมิลำเนา", "ค": "ไม่อนุญาตให้รับขึ้นทะเบียนข้ามเขต ลูกค้าต้องย้ายทะเบียนบ้านมาอยู่ระยองให้ครบ 6 เดือนก่อน", "ง": "ให้ลูกค้าเลือกขึ้นทะเบียนได้เพียงสาขาเดียวโดยสาขานั้นต้องดำเนินการสอบสวนเองทั้งหมด"}, "answer": "ข", "explanation": "ตามแนวทางการปฏิบัติ หากที่ตั้งโครงการกับภูมิลำเนาอยู่คนละพื้นที่ ให้ **\"สาขาที่เป็นที่ตั้งของโครงการ\"** (สาขาแกลง) เป็นผู้รับขึ้นทะเบียน และจัดทำหนังสือขอความร่วมมือส่งไปให้สาขาที่ลูกค้ามีภูมิลำเนา (สาขาชลบุรี) เป็น ผู้ดำเนินการสอบสวนรายการทรัพย์สินครับ"}, {"num": 81, "q": "กลุ่มลูกค้าแห่งหนึ่งมีสมาชิกรวมทั้งหมด 40 คน ได้นัดประชุมเพื่อพิจารณารับเกษตรกรรายใหม่เข้าสังกัดกลุ่ม โดยมี สมาชิกมาประชุม 30 คน มติที่ประชุมเพื่อรับสมาชิกใหม่เข้ากลุ่มจะต้องได้รับคะแนนเสียงรับรองตามข้อใดจึงจะสมบูรณ์", "choices": {"ก": "ไม่น้อยกว่า 16 เสียง (เกินกึ่งหนึ่งของผู้มาประชุม)", "ข": "ไม่น้อยกว่า 21 เสียง (เกินกึ่งหนึ่งของสมาชิกทั้งหมดในกลุ่ม)", "ค": "ไม่น้อยกว่า 20 เสียง (สองในสามของผู้มาประชุม)", "ง": "ต้องได้คะแนนเสียงเอกฉันท์จากผู้มาประชุมทั้ง 30 เสียง"}, "answer": "ข", "explanation": "กฎของการรับลูกค้าเข้าสังกัดกลุ่ม มติที่ประชุมต้องได้รับคะแนนเสียง **\"เกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมด ในกลุ่มนั้น\"** (ไม่ใช่นับจากคนที่มาประชุม) ดังนั้นกลุ่มมี 40 คน กึ่งหนึ่งคือ 20 จึงต้องได้มติรับรองตั้งแต่ 21 คนขึ้นไปครับ"}, {"num": 82, "q": "กรณีที่มีเหตุพิเศษอันควร \"ยกเว้นลักษณะหรือคุณสมบัติ\" การรับขึ้นทะเบียนลูกค้าบุคคลตามข้อบังคับฉบับที่ 45 (เช่น ระยะเวลาในพื้นที่ไม่ครบ) ระเบียบให้อำนาจผู้จัดการสาขาพิจารณาผ่อนผันได้ หากผู้จัดการสาขาต้องการมอบอำนาจช่วง จะ สามารถมอบให้ผู้ใดพิจารณาแทนได้", "choices": {"ก": "พนักงานพัฒนาธุรกิจ (พพธ.) ระดับ 7 ขึ้นไป", "ข": "หัวหน้าหน่วยอำเภอ (หนภ.)", "ค": "ผู้ช่วยผู้จัดการสาขา (ผช.ผจข.) โดยต้องจัดทำคำสั่งเป็นลายลักษณ์อักษร", "ง": "ไม่สามารถมอบอำนาจช่วงเพื่อการผ่อนผันได้"}, "answer": "ค", "explanation": "การยกเว้นคุณสมบัติตามข้อบังคับ ฉ.45 ให้อำนาจผู้จัดการสาขา (ผจข.) เป็นผู้ผ่อนผันรับขึ้นทะเบียนได้ และ ผจข. มีอำนาจมอบหมายหรือมอบอำนาจช่วงให้ **\"ผู้ช่วยผู้จัดการสาขา\"** ทำการแทนได้ โดยต้องจัดทำคำสั่งเป็นลายลักษณ์ อักษร (ห้ามมอบให้ หนภ. ในกรณีผ่อนผันครับ)"}, {"num": 83, "q": "ข้อใดต่อไปนี้ กล่าว \"ไม่ถูกต้อง\" เกี่ยวกับการโอนลูกค้าบุคคล (ฉ.45) เปลี่ยนประเภทมาเป็นเกษตรกรลูกค้า (ฉ.44)", "choices": {"ก": "หากข้อมูลสถานภาพและที่ตั้งไม่เปลี่ยนแปลง ธนาคารอนุโลมให้ไม่ต้องสอบสวนข้อมูลตามแบบขอขึ้นทะเบียนใหม่", "ข": "หากลูกค้ายังมีหนี้เงินกู้ฉบับเดิมค้างอยู่ เงื่อนไขสัญญาเช่น อัตราดอกเบี้ย ให้ปรับเปลี่ยนมาใช้เงื่อนไขตาม ฉ.44 ทันที", "ค": "หากลูกค้ายังมีหนี้เดิมค้างอยู่ เงื่อนไขสัญญาเดิมเช่นอัตราดอกเบี้ย ให้บังคับใช้ตามเงื่อนไขเดิมต่อไปจนกว่าจะชำระหนี้เสร็จ สิ้น ง. ในการรับโอน ให้สาขารับเข้าเป็นลูกค้าประเภทสังกัดกลุ่มเป็นลำดับแรก", "ง": "ในการรับโอน ให้สาขารับเข้าเป็นลูกค้าประเภทสั
