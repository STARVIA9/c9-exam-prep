งกัดกลุ่มเป็นลำดับแรก"}, "answer": "ข", "explanation": "สิ่งที่ **ไม่ถูกต้อง** คือ ข. เพราะตามระเบียบ หากลูกค้ายังคงมีหนี้เงินกู้ตาม ฉ.45 เดิมและยังชำระไม่เสร็จสิ้น **เงื่อนไขของสัญญาเดิม เช่น อัตราดอกเบี้ย ให้บังคับใช้ตามเงื่อนไขเดิมต่อไปจนกว่าจะชำระหนี้เสร็จสิ้น** (ห้ามปรับเปลี่ยน ทันที)"}, {"num": 84, "q": "ตามทิศทางนโยบายการให้สินเชื่อ (Credit Policy) การขอสินเชื่อเพื่อดำเนินธุรกิจร้านทองคำ (ซื้อ-ขาย/รับฝากขาย/จำนำ) จัดอยู่ในนโยบายกลุ่มใด และมีเงื่อนไขอย่างไร", "choices": {"ก": "กลุ่มนโยบายที่ไม่สนับสนุน (Negative List) ธนาคารห้ามปล่อยกู้เด็ดขาด", "ข": "กลุ่มสนับสนุนหลัก หากลูกค้านำทองคำมาวางค้ำประกันเต็มมูลค่าหนี้ 100%", "ค": "กลุ่มสนับสนุนอย่างระมัดระวัง (Caution List) โดยให้กู้เพื่อเป็นค่าลงทุนก่อสร้างร้านทองสาขาใหม่ได้", "ง": "กลุ่มสนับสนุนอย่างระมัดระวัง (Caution List) โดยให้กู้เพื่อ \"เสริมสภาพคล่อง\" ในกิจการเท่านั้น และผู้กู้ต้องมีประสบการณ์"}, "answer": "ง", "explanation": "ธุรกิจร้านทองคำจัดอยู่ในกลุ่ม **นโยบายสนับสนุนอย่างระมัดระวัง (Caution List)** โดยธนาคารอนุญาตให้กู้ได้ **\"เฉพาะเพื่อเสริมสภาพคล่องในกิจการเท่านั้น\"** และผู้กู้จะต้องมีประสบการณ์ในการดำเนินธุรกิจนี้มาแล้ว เนื่องจากเป็น ธุรกิจที่มีความเสี่ยงด้านราคาผันผวนสูง"}, {"num": 85, "q": "ตามระเบียบข้อบังคับฉบับที่ 46 ว่าด้วยการให้สหกรณ์นอกภาคการเกษตรกู้เงิน สหกรณ์ที่มีสิทธิ์กู้ต้องมีคุณสมบัติ เบื้องต้นคือ \"ดำเนินธุรกิจมาแล้วไม่น้อยกว่า\" ระยะเวลาเท่าใด", "choices": {"ก": "6 เดือน", "ข": "1 ปี", "ค": "2 ปี", "ง": "3 ปี"}, "answer": "ข", "explanation": "สหกรณ์ที่จะมีสิทธิ์ขอกู้เงินตามข้อบังคับฉบับที่ 46 ต้องมีคุณสมบัติเบื้องต้นคือ **\"ดำเนินธุรกิจมาแล้วไม่น้อย กว่า 1 ปี\"** และมีฐานะการเงินที่มั่นคง **147. เฉลย: ค.** **คำอธิบาย:** เพื่อรักษาวินัยการเงินระดับมหภาค ธนาคารกำหนดเพดานว่า วงเงินกู้รวมของลูกค้านิติบุคคลตามฉบับที่ 45 และฉบับที่ 46 รวมกัน ต้อง **\"ไม่เกินร้อยละ 20\"** ของหนี้เงินกู้ทั้งหมด ณ สิ้นปีบัญชี"}, {"num": 86, "q": "สัดส่วนยอดหนี้เงินกู้คงเหลือรวมกันของกลุ่มลูกค้านิติบุคคลตามข้อบังคับฉบับที่ 45 และข้อบังคับฉบับที่ 46 ณ วันสิ้นปี บัญชี ต้องไม่เกินร้อยละเท่าใดของยอดหนี้เงินกู้ทั้งหมดของธนาคาร", "choices": {"ก": "ร้อยละ 10", "ข": "ร้อยละ 15", "ค": "ร้อยละ 20", "ง": "ร้อยละ 25"}, "answer": "ค", "explanation": "เพื่อรักษาวินัยการเงินระดับมหภาค ธนาคารกำหนดเพดานว่า วงเงินกู้รวมของลูกค้านิติบุคคลตามฉบับที่ 45 และฉบับที่ 46 รวมกัน ต้อง **\"ไม่เกินร้อยละ 20\"** ของหนี้เงินกู้ทั้งหมด ณ สิ้นปีบัญชี **148. เฉลย: ข.** **คำอธิบาย:** การลาออกจากการเป็นลูกค้าประจำสาขาจะทำได้ก็ต่อเมื่อตนเองไม่มีหนี้สินกับธนาคารในฐานะผู้กู้ **และ \"ต้องไม่มีภาระค้ำประกันหนี้\" ให้กับบุคคลอื่นด้วย** หากยังมีภาระค้ำประกันอยู่ ธนาคารจะไม่อนุมัติให้ลาออกจนกว่าจะ เปลี่ยนตัวผู้ค้ำประกันสำเร็จครับ"}, {"num": 87, "q": "หากลูกค้ายื่นความประสงค์ขอ \"ลาออก\" จากการเป็นลูกค้าประจำสาขาเพื่อพ้นสภาพการเป็นลูกค้า ธนาคารจะ พิจารณา \"ไม่อนุมัติ\" ให้ลาออกหากลูกค้าติดเงื่อนไขในข้อใด", "choices": {"ก": "ลูกค้าย้ายถิ่นฐานออกจากเขตพื้นที่ดำเนินงานของสาขา", "ข": "ลูกค้าชำระหนี้ในฐานะผู้กู้หมดแล้ว แต่ยังมีภาระผูกพันเป็น \"ผู้ค้ำประกัน\" หนี้เงินกู้ให้สมาชิกในกลุ่ม", "ค": "ลูกค้าเปลี่ยนอาชีพจากเกษตรกรไปประกอบธุรกิจส่วนตัว", "ง": "ลูกค้าเคยมีประวัติผิดนัดชำระหนี้อย่างรุนแรงมาก่อน"}, "answer": "ข", "explanation": "การลาออกจากการเป็นลูกค้าประจำสาขาจะทำได้ก็ต่อเมื่อตนเองไม่มีหนี้สินกับธนาคารในฐานะผู้กู้ **และ \"ต้องไม่มีภาระค้ำประกันหนี้\" ให้กับบุคคลอื่นด้วย** หากยังมีภาระค้ำประกันอยู่ ธนาคารจะไม่อนุมัติให้ลาออกจนกว่าจะ เปลี่ยนตัวผู้ค้ำประกันสำเร็จครับ"}, {"num": 88, "q": "บุคคลในข้อใดต่อไปนี้ ที่ธนาคารกำหนดให้เป็นลักษณะ \"ต้องห้าม\" และไม่สามารถรับขึ้นทะเบียนเป็นลูกค้าประจำสาขา ตามข้อบังคับฉบับที่ 44 ได้อย่างเด็ดขาด", "choices": {"ก": "ผู้ที่เคยถูกธนาคารสั่งให้ออกจากการเป็นลูกค้าประจำสาขามาก่อน", "ข": "ผู้ที่มีประวัติค้างชำระหนี้กับธนาคารพาณิชย์อื่น", "ค": "ผู้ที่มีความพิการทางร่างกาย แต่ไม่เป็นอุปสรรคต่อการประกอบอาชีพ", "ง": "ผู้ที่มีอายุ 65 ปีบริบูรณ์"}, "answer": "ก", "explanation": "ลักษณะต้องห้ามของผู้ขอขึ้นทะเบียนลูกค้าตามข้อบังคับ ฉ.44 ที่ผู้จัดการไม่สามารถผ่อนผันให้ได้ คือ การเป็น บุคคลล้มละลาย, วิกลจริต, และ **\"ผู้ที่เคยถูกให้ออกจากการเป็นลูกค้าประจำสาขาของธนาคารมาก่อน\"** ครับ"}, {"num": 89, "q": "ลูกค้าประจำสาขาประเภทเกษตรกร (ตามข้อบังคับฉบับที่ 44) จะพ้นจากการเป็นลูกค้าประจำสาขาในทันทีเมื่อเกิด เหตุการณ์ใด", "choices": {"ก": "ขาดการเข้าร่วมประชุมกลุ่มลูกค้าติดต่อกัน 3 ครั้ง", "ข": "เลิกประกอบอาชีพการเกษตร", "ค": "ค้างชำระหนี้เกินกว่า 1 ปีปฏิทิน", "ง": "เสียชีวิต --- --- ### **เฉลยพร้อมคำอธิบาย (Batch 22 : กิ่งที่ 2 นโยบายและการรับลูกค้า)** **141. เฉลย: ข.** **คำอธิบาย:** ตามแนวทางการปฏิบัติ หากที่ตั้งโครงการกับภูมิลำเนาอยู่คนละพื้นที่ ให้ **\"สาขาที่เป็นที่ตั้งของโครงการ\"** (สาขาแกลง) เป็นผู้รับขึ้นทะเบียน และจัดทำหนังสือขอความร่วมมือส่งไปให้สาขาที่ลูกค้ามีภูมิลำเนา (สาขาชลบุรี) เป็น ผู้ดำเนินการสอบสวนรายการทรัพย์สินครับ **142. เฉลย: ข.** **คำอธิบาย:** กฎของการรับลูกค้าเข้าสังกัดกลุ่ม มติที่ประชุมต้องได้รับคะแนนเสียง **\"เกินกึ่งหนึ่งของจำนวนลูกค้าทั้งหมด ในกลุ่มนั้น\"** (ไม่ใช่นับจากคนที่มาประชุม) ดังนั้นกลุ่มมี 40 คน กึ่งหนึ่งคือ 20 จึงต้องได้มติรับรองตั้งแต่ 21 คนขึ้นไปครับ **143. เฉลย: ค.** **คำอธิบาย:** การยกเว้นคุณสมบัติตามข้อบังคับ ฉ.45 ให้อำนาจผู้จัดการสาขา (ผจข.) เป็นผู้ผ่อนผันรับขึ้นทะเบียนได้ และ ผจข. มีอำนาจมอบหมายหรือมอบอำนาจช่วงให้ **\"ผู้ช่วยผู้จัดการสาขา\"** ทำการแทนได้ โดยต้องจัดทำคำสั่งเป็นลายลักษณ์ อักษร (ห้ามมอบให้ หนภ. ในกรณีผ่อนผันครับ) **144. เฉลย: ข.** **คำอธิบาย:** สิ่งที่ **ไม่ถูกต้อง** คือ"}, "answer": "ง", "explanation": "ตามข้อบังคับฉบับที่ 44 การสิ้นสภาพจากการเป็นลูกค้าประจำสาขา (พ้นสภาพทันทีโดยปริยาย) จะเกิดขึ้นใน กรณีที่ลูกค้า **\"เสียชีวิต\"** ครับ (ส่วนกรณีอื่นเช่น เลิกอาชีพ หรือ ค้างชำระหนี้ จะต้องเข้าสู่กระบวนการที่ธนาคาร \"สั่งให้ ออก\" หรือลูกค้าทำเรื่อง \"ขอลาออก\") --- ### **แบบทดสอบ Batch 23: กิ่งที่ 3 การวิเคราะห์และประเมินความเสี่ยง (ข้อ 151 - 160)**"}];
let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'. </span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! 🎉":pct2>=60?"ดีมาก! 💪":"ต้องฝึกเพิ่ม 💪";
document.getElementById("resultText").textContent=pct2+"% — "+msg;
}
}
init();
</script>
