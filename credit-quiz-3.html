<script>
const questions=[{"num":151,"q":"ในการประเมินความเสี่ยงด้านการเงิน (Financial Risk) การพิจารณาอัตราส่วนทางการเงินในข้อใด ที่เป็นตัวช่วยชี้วัดและ ทำให้ความเสี่ยงของธนาคารลดลงได้มากที่สุด?","choices":[{"key":"ก","text":"Current Ratio (อัตราส่วนทุนหมุนเวียน)"},{"key":"ข","text":"D/E Ratio (อัตราส่วนหนี้สินต่อทุน)"},{"key":"ค","text":"ICR (อัตราส่วนความสามารถในการชำระดอกเบี้ย)"},{"key":"ง","text":"NPV และ IRR (มูลค่าปัจจุบันสุทธิ และ อัตราผลตอบแทนภายใน)"}],"answer":"ข","explanation":"ในการประเมิน Financial Risk อัตราส่วนที่ธนาคารให้ความสำคัญและช่วยลดความเสี่ยงได้มากที่สุดคือ D/E Ratio (Debt to Equity Ratio หรือ อัตราส่วนหนี้สินต่อทุน) เพราะเป็นการดูโครงสร้างทุนว่ากิจการใช้เงินกู้ (หนี้) หรือใช้เงินทุน"},{"num":152,"q":"กิจการแห่งหนึ่งมีรายได้ปีละ 2.5 ล้านบาท มีต้นทุนขาย 1.8 ล้านบาท ค่าใช้จ่ายในการบริหาร 0.25 ล้านบาท มีค่า เสื่อมราคาปีละ 0.05 ล้านบาท ภาษีจ่ายร้อยละ 20 และมีภาระต้องชำระต้นเงินกู้ปีละ 0.15 ล้านบาท ดอกเบี้ยจ่าย 0.10 ล้าน บาท จากข้อมูลนี้ กิจการมีอัตราส่วน ICR และ DSCR เท่ากับข้อใด?","choices":[{"key":"ก","text":"ICR = 4.50 เท่า, DSCR = 1.80 เท่า"},{"key":"ข","text":"ICR = 4.00 เท่า, DSCR = 1.60 เท่า"},{"key":"ค","text":"ICR = 5.00 เท่า, DSCR = 2.00 เท่า"},{"key":"ง","text":"ICR = 1.80 เท่า, DSCR = 4.50 เท่า"}],"answer":"ค","explanation":"การคำนวณ ICR และ DSCR ต้องหา EBITDA ก่อนครับ * หากำไรจากการดำเนินงาน: รายได้ 2.5 - ต้นทุน 1.8 - ค่าบริหาร 0.25 = 0.45 ลบ. * หา EBITDA: นำกำไรจากการดำเนินงาน (0.45) + ค่าเสื่อมราคา (0.05) = 0.50 ลบ. (ภาษีไม่ต้องนำมาหักเพราะ EBITDA คือกำไรก่อนภาษี) * หา ICR (ความสามารถจ่ายดอกเบี้ย): EBITDA / ดอกเบี้ยจ่าย = 0.50 / 0.10 = 5.00 เท่า * หา DSCR (ความสามารถจ่ายต้นและดอก): EBITDA / (ต้นเงิน + ดอกเบี้ย) = 0.50 / (0.15 + 0.10) = 0.50 / 0.25 ="},{"num":153,"q":"การจัดทำสมมติฐานทางการเงิน (Financial Assumption) เพื่อประเมินความสามารถในการชำระหนี้ของลูกค้า หากพบว่า \"อุตสาหกรรมไม้ยางพารา\" ปัจจุบันมีแนวโน้มอยู่ในภาวะ \"ถดถอย\" อย่างต่อเนื่อง การพิจารณาความเสี่ยงด้านอุตสาหกรรม (Industry Risk) นี้ จะส่งผลต่อเนื่องกับความเสี่ยงด้านการเงิน (Financial Risk) ตามข้อใด?","choices":[{"key":"ก","text":"สมมติฐานด้านผลดำเนินงาน จะต้องสอดคล้องกับภาวะถดถอยของอุตสาหกรรม"},{"key":"ข","text":"สมมติฐานด้านผลดำเนินงาน สามารถคาดการณ์ให้เติบโตผกผันกับภาวะอุตสาหกรรมได้"},{"key":"ค","text":"สมมติฐานด้านผลดำเนินงาน ให้พิจารณาจากผลกำไรในอดีตย้อนหลัง 5 ปีเป็นหลัก"},{"key":"ง","text":"สมมติฐานด้านผลดำเนินงาน ให้มองข้ามรายได้จากยางพาราและประเมินรายได้ธุรกิจอื่นแทน"}],"answer":"ก","explanation":"กฎเหล็กของการทำสมมติฐานทางการเงิน (Assumption) คือ \"ต้องสอดคล้องกับภาวะอุตสาหกรรม (Industry) ที่แท้จริง\" หากอุตสาหกรรมกำลังถดถอย สมมติฐานรายได้ก็ต้องปรับลดลงให้สอดคล้องกับความเป็นจริง ห้ามตั้งตัวเลข เติบโตสวนทางเศรษฐกิจครับ [20, 21, Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"},{"num":154,"q":"ในการวิเคราะห์และประเมินความเสี่ยง 5 ด้าน ข้อใดต่อไปนี้ \"จับคู่สถานการณ์กับประเภทของความเสี่ยงได้ไม่ ถูกต้อง\"?","choices":[{"key":"ก","text":"การกำหนดเงื่อนไขและข้อปฏิบัติในการให้สินเชื่อไม่รัดกุม – Credit Risk & Other Risk"},{"key":"ข","text":"ลูกค้าถูกรอนสิทธิ์ในที่ดินแปลงที่เป็นหลักประกัน – Legal Risk"},{"key":"ค","text":"ธุรกิจต้องพึ่งพา Supplier เพียงรายเดียวในการผลิตสินค้า – Industrial & Business Risk"}],"answer":"ข","explanation":"ข้อที่จับคู่ผิดคือ ข. ครับ เพราะ \"การถูกรอนสิทธิ์ หรือปัญหาที่ดินตาบอด ไม่มีทางเข้าออก ตลอดจนการบุก รุกที่สาธารณะ\" จัดอยู่ในหมวด Collateral Risk (ความเสี่ยงด้านหลักประกัน) ครับ ไม่ใช่ Legal Risk (ส่วน Legal Risk จะเป็น เรื่องข้อกฎหมาย, กฎกระทรวง, หรือคดีความฟ้องร้อง)"},{"num":155,"q":"ลูกค้ายื่นประสงค์ขอกู้เงินเพื่อก่อสร้างโรงงาน โดยนำโฉนดที่ดินแปลงที่เป็นที่ตั้งโรงงาน (Core Asset) มาจำนอง แต่ พนักงานตรวจสอบพบว่า \"ที่ดินแปลงดังกล่าวถูกล้อมรอบด้วยที่ดินแปลงอื่นและไม่มีทางเข้า-ออกสู่ถนนสาธารณะ\" พนักงาน ต้องประเมินความเสี่ยงด้านหลักประกัน (Collateral Risk) และหาทางออกอย่างไร?","choices":[{"key":"ก","text":"ไม่มีความเสี่ยง เนื่องจากเป็น Core Asset สามารถรับเป็นหลักประกันได้ตามระเบียบ"},{"key":"ข","text":"มีความเสี่ยง แต่หากราคาประเมินที่ดินสูงครอบคลุมวงเงินกู้ ก็สามารถพิจารณาสินเชื่อได้เลย"},{"key":"ค","text":"มีความเสี่ยง ต้องให้ลูกค้าไปหาหลักทรัพย์ประเภทอื่นมาค้ำประกันเพิ่มเติมแทนที่ดินตาบอด"},{"key":"ง","text":"มีความเสี่ยง ต้องให้ลูกค้าดำเนินการจดทะเบียน \"ภาระจำยอม\" เพื่อให้มีทางเข้า-ออกก่อน จึงจะพิจารณาสินเชื่อได้"}],"answer":"ง","explanation":"หากหลักประกันเป็นที่ดินตาบอด (ไม่มีทางเข้าออก) จัดว่ามีความเสี่ยงด้าน Collateral Risk อย่างมาก แนว ทางแก้ไขคือพนักงาน ต้องให้ลูกค้าไปติดต่อเจ้าของที่ดินข้างเคียงเพื่อจดทะเบียน \"ภาระจำยอม\" ให้ถูกต้องตามกฎหมาย ก่อน จึงจะสามารถนำมาเป็นหลักประกันและพิจารณาสินเชื่อได้ครับ [24, 25, Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยง ก่อนให้กู้]"},{"num":156,"q":"ในการพิจารณาประเมินความเสี่ยงด้านหลักประกัน (Collateral Risk) นอกเหนือจากการพิจารณากรรมสิทธิ์และทำเล ที่ตั้งแล้ว ธนาคารยังกำหนดให้พนักงานวิเคราะห์ปัจจัยใดเพิ่มเติม เพื่อป้องกันความเสี่ยงหากลูกค้าหลักไม่สามารถชำระหนี้ ได้?","choices":[{"key":"ก","text":"การคำนวณหา Working Capital จากรายได้ลูกค้า"},{"key":"ข","text":"การประเมินสถานการณ์และแนวโน้มเศรษฐกิจมหภาค"},{"key":"ค","text":"การพิจารณาความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม"},{"key":"ง","text":"การตรวจสอบภาพถ่ายดาวเทียมของพื้นที่ข้างเคียงทั้งหมด"}],"answer":"ค","explanation":"ในมิติของการวิเคราะห์ความเสี่ยงด้านหลักประกัน (Collateral Risk) นอกจากที่ดิน/สิ่งปลูกสร้างแล้ว ธนาคารยัง บังคับให้พิจารณาถึง \"ความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม\" ด้วย ว่าผู้ค้ำประกันมีกำลังทรัพย์พอที่จะมารับผิดชอบหนี้ แทนได้หรือไม่หากลูกหนี้หลักมีปัญหา [21, 22, Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"},{"num":157,"q":"นิติบุคคล A และ นิติบุคคล B เป็นกลุ่มลูกค้าเงินกู้ที่มีความเป็นเจ้าของเดียวกัน (จัดเป็นกลุ่มเดียวกันตามเกณฑ์ SLL) หากทั้ง 2 บริษัทมีภาระหนี้เดิมกับ ธ.ก.ส. ดังนี้: - นิติบุคคล A: สัญญากู้ Loan วงเงิน 20 ลบ. (หนี้คงเหลือ 10 ลบ.), O/D วงเงิน 10 ลบ. (หนี้คงเหลือ 5 ลบ.), P/C วงเงิน 10 ลบ. (หนี้คงเหลือ 5 ลบ.), FX วงเงิน 10 ลบ. (คิดความเสี่ยงร้อยละ 8) - นิติบุคคล B: สัญญากู้ Loan วงเงิน 50 ลบ. (หนี้คงเหลือ 20 ลบ.), L/G วงเงิน 10 ลบ. (ยังไม่มีภาระเคลม), L/C+Loan เป็น T/R 10 ลบ. ในการพิจารณาสินเชื่อใหม่ วงเงินกู้รวมของกลุ่ม (Total Group Exposure) ที่ใช้ในการหาอำนาจอนุมัติคือเท่าใด?","choices":[{"key":"ก","text":"40.80 ล้านบาท"},{"key":"ข","text":"60.80 ล้านบาท"},{"key":"ค","text":"70.80 ล้านบาท"},{"key":"ง","text":"120.00 ล้านบาท"}],"answer":"ค","explanation":"วิธีคิดรวมวงเงิน (Total Group Exposure) เพื่อกำกับลูกหนี้รายใหญ่ (SLL) ให้นับวงเงินเทียบเท่าสินเชื่อ (CEQA) ดังนี้ ครับ: * บริษัท A: Loan (เบิกแล้วใช้วงเงินคงเหลือ) = 10 / OD (ใช้หน้าตั๋ว) = 10 / P/C (ใช้หน้าตั๋ว) = 10 / FX (ใช้วงเงิน x 8%) = 0.8 -> รวม A = 30.8 ลบ. * บริษัท B: Loan = 20 / L/G (ใช้วงเงินหน้าตั๋วแม้ยังไม่เคลม) = 10 / T/R = 10 -> รวม B = 40.0 ลบ. * Total Group Exposure = 30.8 + 40.0 = 70.80 ล้านบาท"},{"num":158,"q":"หากพนักงานวิเคราะห์สินเชื่อรวบรวมข้อมูลแล้วพบว่า \"วัตถุประสงค์การขอกู้เงินของลูกค้า ไม่เป็นไปตามนโยบาย สินเชื่อ (Credit Policy) ของธนาคาร\" พนักงานควรมีแนวทางดำเนินการตามข้อใดจึงจะถูกต้องที่สุด?","choices":[{"key":"ก","text":"ให้เสนอเป็นข้อเบี่ยงเบนมาตรฐาน (UWS) และส่งให้ผู้จัดการสาขาอนุมัติเป็นกรณีพิเศษ"},{"key":"ข","text":"ให้ปฏิเสธการสนับสนุนสินเชื่อ และไม่ส่งเรื่องเข้าสู่กระบวนการพิจารณาอนุมัติการให้สินเชื่อ"},{"key":"ค","text":"ให้รับเรื่องไว้พิจารณา แต่ลดวงเงินกู้ลงเหลือ 50% ของที่ลูกค้าขอ"},{"key":"ง","text":"ให้ปรับเพิ่มอัตราดอกเบี้ยเป็น MRR + 3.00 เพื่อชดเชยความเสี่ยงที่ขัดต่อนโยบาย"}],"answer":"ข","explanation":"ตามคู่มือกระบวนการพิจารณาสินเชื่อ หากพบว่าวัตถุประสงค์ไม่เป็นไปตามนโยบายสินเชื่อของธนาคาร (เช่น อยู่ใน Negative List ห้ามปล่อยเด็ดขาด) แนวทางปฏิบัติคือ \"ให้ปฏิเสธการสนับสนุนสินเชื่อ และไม่ส่งเรื่องเข้าสู่กระบวนการ พิจารณาอนุมัติการให้สินเชื่อ\" ทันทีครับ"},{"num":159,"q":"บริษัท นึกว่ารอด จำกัด ดำเนินธุรกิจผลิตสับปะรดกระป๋องจำหน่าย แต่ปัจจุบันพบปัญหา \"สภาพคล่องในการ หมุนเวียนสินค้าไม่ทันกับความต้องการของตลาด\" จึงต้องการขอกู้เงินเพื่อขยายกิจการ การที่ธนาคารเข้าไปวิเคราะห์และช่วย วางแผนแก้ปัญหาในจุดนี้ จัดเป็นการบริหารจัดการความเสี่ยงในด้านใด?","choices":[{"key":"ก","text":"ความเสี่ยงด้านธุรกิจ (Business Risk)"},{"key":"ข","text":"ความเสี่ยงด้านการเงิน (Financial Risk)"},{"key":"ค","text":"ความเสี่ยงด้านสินเชื่อ (Credit Risk)"},{"key":"ง","text":"ความเสี่ยงด้านหลักประกัน (Collateral Risk)"}],"answer":"ก","explanation":"ปัญหาเรื่อง \"สภาพคล่องในการหมุนเวียนสินค้าไม่ทัน\" หรือปัญหาด้านการผลิต การสต๊อกสินค้า การแข่งขัน และการบริหารจัดการธุรกิจ ล้วนจัดอยู่ในหมวด ความเสี่ยงด้านธุรกิจและอุตสาหกรรม (Industrial & Business Risk) ครับ"},{"num":160,"q":"ในการวิเคราะห์ความสามารถในการชำระหนี้ (Capacity) ค่าความสามารถในการทำกำไร หรือ \"EBITDA\" ซึ่งใช้เป็นตัวตั้ง ในการคำนวณค่า ICR และ DSCR มีความหมายตรงกับข้อใด?","choices":[{"key":"ก","text":"กำไรสุทธิหลังหักภาษี (Net Profit After Tax)"},{"key":"ข","text":"รายได้รวมทั้งหมดหักด้วยต้นทุนขายเท่านั้น (Gross Profit)"},{"key":"ค","text":"กำไรก่อนหักดอกเบี้ย ภาษี ค่าเสื่อมราคา และค่าตัดจำหน่าย"},{"key":"ง","text":"เงินสดสุทธิจากกิจกรรมจัดหาเงินและการลงทุน"}],"answer":"ค","explanation":"EBITDA ย่อมาจาก Earnings Before Interest, Taxes, Depreciation, and Amortization ซึ่งแปลตรงตัวว่า \"กำไร ก่อนหักดอกเบี้ย ภาษี ค่าเสื่อมราคา และค่าตัดจำหน่าย\" เป็นกระแสเงินสดจากการดำเนินงานที่แท้จริงที่กิจการสามารถ นำมาจ่ายชำระหนี้ได้ครับ"},{"num":161,"q":"ในการตรวจสอบข้อมูลเครดิต (Credit Bureau) หากลูกค้าถูกประเมินสถานะความเสี่ยงอยู่ในระดับ \"Major (Ma - สีส้ม)\" พนักงานควรดำเนินการตามกฎข้อบังคับ (UWS) อย่างไร?","choices":[{"key":"ก","text":"ถือว่ามีความเสี่ยงต่ำ ยอมรับได้ ไม่ขัด UWS สามารถดำเนินการพิจารณาสินเชื่อต่อไปได้ทันที"},{"key":"ข","text":"ถือว่ามีความเสี่ยงปานกลาง ยอมรับได้ ไม่ขัด UWS แต่ต้องกำหนดเงื่อนไขควบคุมให้รัดกุม"},{"key":"ค","text":"ถือว่าเสี่ยงสูง ขัดต่อมาตรฐาน UWS แต่สามารถ \"ขอเบี่ยงเบนหลักเกณฑ์ (Override)\" ได้ โดยต้องแสดงเหตุผลและกำหนด"},{"key":"ง","text":"ถือว่าเสี่ยงสูงมาก โอกาสผิดนัดชำระสูง \"ห้ามปล่อยสินเชื่อเด็ดขาด (NO Override)\" และให้ปฏิเสธคำขอทันที"}],"answer":"ค","explanation":"ตามคู่มือการวิเคราะห์ Credit Bureau หากประวัติลูกค้าตกอยู่ในระดับ Major (สีส้ม) ถือว่ามีความเสี่ยงสูง และ \"ขัดต่อมาตรฐาน UWS (Underwriting Standard)\" แต่ยังไม่ถึงขั้นห้ามปล่อยเด็ดขาด พนักงานสามารถเสนอ ขออนุมัติ"},{"num":162,"q":"จากผลการตรวจสอบข้อมูลเครดิต (Credit Bureau) สถานะความเสี่ยงในระดับใดต่อไปนี้ ที่ธนาคารมีคำสั่ง \"ห้ามปล่อย สินเชื่อเด็ดขาด (NO Override)\" โดยไม่มีข้อยกเว้นในสภาวะปกติ?","choices":[{"key":"ก","text":"Small (Sm - สีเขียว)"},{"key":"ข","text":"Minor (Mi - สีเหลือง)"},{"key":"ค","text":"Major (Ma - สีส้ม)"},{"key":"ง","text":"Alarming (Al - สีแดง)"}],"answer":"ง","explanation":"ระดับเครดิตบูโรที่ถือว่ามีโอกาสผิดนัดชำระสูงมากและธนาคารใช้กฎเหล็กคือ \"ห้ามปล่อยสินเชื่อเด็ดขาด (NO Override)\" คือระดับ Alarming (Al - สีแดง) ครับ (ส่วน Normal ไม่มีประวัติค้าง, Small เสี่ยงต่ำ, Minor เสี่ยงปานกลาง) [Artifact 4]"},{"num":163,"q":"แม้ธนาคารจะมีกฎเหล็กปฏิเสธลูกค้าที่มีประวัติเครดิตบูโรในระดับ Alarming หรือ Major แต่ธนาคารก็มี \"ข้อยกเว้นผ่อน ปรน\" ให้สามารถพิจารณาสินเชื่อได้ในกรณีใดต่อไปนี้?","choices":[{"key":"ก","text":"กรณีที่ลูกค้านำที่ดินและสิ่งปลูกสร้างมาค้ำประกันเต็มมูลค่าวงเงิน 100%"},{"key":"ข","text":"กรณีที่เป็นลูกค้า NPLs ที่ขอเข้าปรับปรุงโครงสร้างหนี้ แล้วต้องการขอสินเชื่อเพื่อฟื้นฟูอาชีพ"},{"key":"ค","text":"กรณีที่ลูกค้าเป็นข้าราชการระดับสูงหรือพนักงานรัฐวิสาหกิจที่มีเงินเดือนประจำ"},{"key":"ง","text":"กรณีที่ลูกค้ามีบุคคลค้ำประกันระดับ AAA จำนวน 3 คนขึ้นไป"}],"answer":"ข","explanation":"ข้อยกเว้นเดียวที่ทำให้ธนาคารสามารถผ่อนปรนให้สินเชื่อแก่ลูกค้าที่มีประวัติเสียระดับ Major หรือ Alarming ได้ คือ \"กรณีที่เป็นลูกค้า NPLs ที่ขอเข้ากระบวนการปรับปรุงโครงสร้างหนี้เรียบร้อยแล้ว และมีความจำเป็นต้องขอสินเชื่อใหม่ เพื่อนำไปฟื้นฟูอาชีพ\" หรือลูกค้าเงินกู้เดิมที่เพิ่งส่งชำระหนี้เก่าจนครบถ้วนและขอสินเชื่อไปประกอบอาชีพต่อครับ [Artifact 4]"},{"num":164,"q":"วัตถุประสงค์หลักของการใช้เครื่องมือ \"การกำกับลูกหนี้รายใหญ่ (Single Lending Limit : SLL)\" ในกระบวนการวิเคราะห์ สินเชื่อคือข้อใด?","choices":[{"key":"ก","text":"เพื่อกำหนดเพดานอัตราดอกเบี้ยสูงสุดที่ไม่ขัดต่อกฎหมายของธนาคารแห่งประเทศไทย"},{"key":"ข","text":"เพื่อจำกัดวงเงินกู้ยืมของกลุ่มลูกค้ารายย่อย (Micro Finance) ไม่ให้สร้างภาระหนี้สินล้นพ้นตัว"},{"key":"ค","text":"เพื่อป้องกันการกระจุกตัวของสินเชื่อ ไม่ให้ธนาคารปล่อยกู้ให้กลุ่มธุรกิจใดธุรกิจหนึ่งมากเกินไปจนเกิดความเสี่ยง"},{"key":"ง","text":"เพื่อคัดกรองเฉพาะลูกค้ารายใหญ่ที่มีผลกำไรสุทธิ (EBITDA) เป็นบวกติดต่อกัน 3 ปี"}],"answer":"ค","explanation":"กฎหมาย SLL (Single Lending Limit) ถูกสร้างขึ้นมาเพื่อ \"ป้องกันการกระจุกตัวของสินเชื่อ\" ไม่ให้ธนาคารทุ่ม ปล่อยกู้ให้กับกลุ่มธุรกิจใดธุรกิจหนึ่งมากเกินไป เพราะหากกลุ่มธุรกิจนั้นล้ม ธนาคารก็จะล้มตามไปด้วย SLL จึงเป็นการ กระจายความเสี่ยงระดับมหภาคครับ [Artifact 4]"},{"num":165,"q":"ตามเกณฑ์การกำกับลูกหนี้รายใหญ่ (SLL) ภาระหนี้รวมของกลุ่มธุรกิจ (Total Group Exposure) จะต้องมีเพดาน \"ไม่เกิน\" สัดส่วนเท่าใดของธนาคาร?","choices":[{"key":"ก","text":"ไม่เกินร้อยละ 10 ของสินทรัพย์รวมทั้งหมดของธนาคาร"},{"key":"ข","text":"ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"},{"key":"ค","text":"ไม่เกินร้อยละ 20 ของยอดสินเชื่อรวม (Total Loan Outstanding)"},{"key":"ง","text":"ไม่เกินร้อยละ 25 ของเงินกองทุนธนาคาร"}],"answer":"ข","explanation":"เพดานจำกัดความเสี่ยงของการกระจุกตัว (SLL) กำหนดไว้ว่า ภาระหนี้รวมของลูกค้าหนึ่งรายหรือกลุ่มหนึ่งกลุ่ม (Total Group Exposure) จะต้อง \"ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร\" [Artifact 4]"},{"num":166,"q":"ในการสืบหาผู้ใช้เงินกู้ที่แท้จริง (True Borrower) เพื่อรวมกลุ่มตามเกณฑ์ SLL (Affiliation) บุคคลหรือนิติบุคคลในข้อใด ต่อไปนี้ที่ \"ไม่ถูกนำมานับรวม\" เป็นกลุ่มเดียวกัน?","choices":[{"key":"ก","text":"คู่สมรส และบุตรที่ยังไม่บรรลุนิติภาวะของลูกหนี้"},{"key":"ข","text":"บริษัทที่ลูกหนี้ถือหุ้นอยู่เกินกว่าร้อยละ 50"},{"key":"ค","text":"บริษัทในเครือที่มีคณะกรรมการบริหารชุดเดียวกันกับลูกหนี้"},{"key":"ง","text":"เพื่อนสนิทที่มาเป็น \"ผู้ค้ำประกันเงินกู้\" ให้กับลูกหนี้"}],"answer":"ง","explanation":"การสืบหาผู้ใช้เงินกู้ที่แท้จริง (True Borrower) เพื่อรวมกลุ่มหนี้ (Affiliation) จะพิจารณาจากอำนาจควบคุมและ ความเกี่ยวโยงกันทางสายเลือด/ธุรกิจ เช่น คู่สมรส, บุตร, บริษัทแม่-ลูก, หรือการถือหุ้นเกิน 50% แต่ \"ผู้ค้ำประกัน\" ที่เป็น บุคคลภายนอก/เพื่อนสนิท จะไม่ถูกนับรวมในกลุ่มภาระหนี้ SLL ของลูกหนี้ครับ [Artifact 4]"},{"num":167,"q":"การคำนวณวงเงินกู้รวมของกลุ่ม (Total Group Exposure) หากลูกค้ามีสินเชื่อประเภทเบิกเงินเกินบัญชี (O/D) ซึ่งธนาคาร อนุมัติวงเงินไว้ 10 ล้านบาท แต่ปัจจุบันลูกค้าเบิกเงินไปใช้เพียง 2 ล้านบาท (ยอดหนี้คงเหลือ 2 ล้าน) ธนาคารจะต้องนำ ตัวเลขใดมาใช้คำนวณเพื่อกำกับ SLL?","choices":[{"key":"ก","text":"2 ล้านบาท (ใช้ยอดหนี้คงเหลือเป็นหลัก)"},{"key":"ข","text":"8 ล้านบาท (ใช้วงเงินส่วนที่ยังไม่ได้เบิกไปใช้)"},{"key":"ค","text":"10 ล้านบาท (ใช้วงเงินกู้ที่ธนาคารอนุมัติ)"},{"key":"ง","text":"12 ล้านบาท (ใช้วงเงินอนุมัติรวมกับยอดหนี้คงเหลือ)"}],"answer":"ค","explanation":"กฎการคำนวณวงเงินกู้รวมเพื่อกำกับ SLL (รวมถึงการหาอำนาจอนุมัติ) กำหนดว่า หากเป็นสินเชื่อประเภทเบิก เงินกู้ยังไม่ครบ เช่น O/D (Overdraft) หรือ P/C (ตั๋วสัญญาใช้เงิน) ธนาคารจะยึด \"วงเงินกู้ที่อนุมัติตามหน้าตั๋ว (10 ล้านบาท)\" มาคิดความเสี่ยงทันทีครับ ไม่ได้มองที่ยอดหนี้คงเหลือในขณะนั้น [Artifact 4]"},{"num":168,"q":"ในการวิเคราะห์ศักยภาพลูกค้าด้วยหลัก 7'C ปัจจัยในข้อใดที่มุ่งเน้นประเมินเรื่อง \"ความซื่อสัตย์ ประสบการณ์ ความ ตั้งใจในการชำระหนี้ (Willing to pay) รวมถึงผลการตรวจ Credit Bureau\"?","choices":[{"key":"ก","text":"Capacity (ความสามารถในการชำระหนี้)"},{"key":"ข","text":"Character (คุณลักษณะของลูกค้า)"},{"key":"ค","text":"Capital (เงินทุนของกิจการ)"},{"key":"ง","text":"Condition (สถานการณ์และสภาพแวดล้อม)"}],"answer":"ข","explanation":"หลัก 7'C ในข้อ Character (คุณลักษณะ) จะมุ่งเน้นเจาะไปที่ \"ตัวตน\" ของลูกค้าเป็นหลัก ได้แก่ ความ ซื่อสัตย์, ความตั้งใจในการชำระหนี้ (Willing to pay), ผลการตรวจสอบ Credit Bureau, การประเมิน SLL รวมถึงประวัติการ ล้มละลายครับ [Artifact 4]"},{"num":169,"q":"หลัก 7'C ปัจจัยด้านที่ 7 คือ \"Country (ประเทศคู่ค้า)\" จะถูกนำมาใช้พิจารณาวิเคราะห์ความเสี่ยงในกรณีใดเท่านั้น?","choices":[{"key":"ก","text":"กรณีการให้สินเชื่อแก่ลูกค้าต่างด้าวที่เข้ามาจดทะเบียนนิติบุคคลในไทย"},{"key":"ข","text":"กรณีการให้สินเชื่อเพื่อนำไปลงทุนซื้อที่ดินหรืออสังหาริมทรัพย์ในต่างประเทศ"},{"key":"ค","text":"กรณีสินเชื่อเพื่อการค้าระหว่างประเทศ (Trade Finance) เพื่อประเมินความเสี่ยงด้านอัตราแลกเปลี่ยน"},{"key":"ง","text":"กรณีลูกค้าขอกู้เพื่อ Refinance หนี้สกุลเงินตราต่างประเทศ"}],"answer":"ค","explanation":"ปัจจัยด้าน Country (ประเทศคู่ค้า) จะถูกงัดออกมาใช้พิจารณาเฉพาะ \"กรณีสินเชื่อเพื่อการค้าระหว่าง ประเทศ (Trade Finance)\" เท่านั้น เพื่อดูความเสี่ยงด้านนโยบายรัฐบาลต่างประเทศ, อัตราแลกเปลี่ยน, หรือกฎหมายการ นำเข้า-ส่งออกครับ [Artifact 4]"},{"num":170,"q":"ลูกค้านิติบุคคลยื่นขอกู้เงินเพื่อขยายโรงงาน พนักงานวิเคราะห์แล้วพบว่า \"กระแสเงินสดและกำไรจากการดำเนินงาน ของกิจการ (EBITDA) มีความสม่ำเสมอและเพียงพอต่อการจ่ายคืนทั้งต้นเงินและดอกเบี้ย\" การประเมินนี้จัดอยู่ในหลัก 7'C ข้อ ใด?","choices":[{"key":"ก","text":"Character"},{"key":"ข","text":"Capacity"},{"key":"ค","text":"Capital"},{"key":"ง","text":"Control"}],"answer":"ข","explanation":"การประเมินความสม่ำเสมอของกระแสเงินสดและกำไรสุทธิของกิจการ (EBITDA) เพื่อดูว่ามีรายได้เพียงพอที่จะ นำมาจ่ายชำระต้นเงินและดอกเบี้ยหรือไม่ จัดเป็นการวิเคราะห์ในมิติของ Capacity (ความสามารถในการชำระหนี้) ครับ [Artifact 4]"},{"num":171,"q":"ในการประเมินความเสี่ยงและโครงสร้างทางการเงิน หากธนาคารต้องการคำนวณหา \"ความต้องการเงินทุนหมุนเวียน (Working Capital)\" สำหรับให้สินเชื่อแก่นิติบุคคลหรือสถาบันเกษตรกร ธนาคารกำหนดให้ใช้สูตรการคำนวณตามข้อใด?","choices":[{"key":"ก","text":"(ยอดขายรวม + ลูกหนี้การค้า) - เจ้าหนี้การค้า"},{"key":"ข","text":"(ลูกหนี้การค้า + สต็อกสินค้าและวัตถุดิบ) - เจ้าหนี้การค้า"},{"key":"ค","text":"กำไรสุทธิ + ค่าเสื่อมราคา + สต็อกสินค้า"},{"key":"ง","text":"สินทรัพย์หมุนเวียนรวม - หนี้สินระยะยาว"}],"answer":"ข","explanation":"ในการวิเคราะห์การเงิน สูตรมาตรฐานที่ธนาคารใช้ในการคำนวณหาความต้องการเงินทุนหมุนเวียน (Working Capital) เพื่อดูสภาพคล่องของกิจการ คือ \"ลูกหนี้การค้า + (บวก) สต็อกสินค้าและวัตถุดิบ - (หัก) เจ้าหนี้การค้า\""},{"num":172,"q":"ในการวิเคราะห์ความเสี่ยงด้านโครงสร้างเงินทุน (Capital) สำหรับ \"สหกรณ์ออมทรัพย์ขนาดใหญ่\" (ที่มีสินทรัพย์ตั้งแต่ 5,000 ล้านบาทขึ้นไป) ธนาคารกำหนดเพดานอัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1.50 เท่า"},{"key":"ข","text":"ไม่เกิน 2.00 เท่า"},{"key":"ค","text":"ไม่เกิน 2.50 เท่า"},{"key":"ง","text":"ไม่เกิน 3.00 เท่า"}],"answer":"ข","explanation":"ตามเกณฑ์คุณสมบัติการรับความเสี่ยง หากเป็นสหกรณ์ออมทรัพย์ขนาดใหญ่ (มีสินทรัพย์ตั้งแต่ 5,000 ล้านบาท ขึ้นไป) ธนาคารกำหนดอัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้ที่ ไม่เกิน 2.00 เท่า (ส่วนสหกรณ์ขนาดเล็กที่ สินทรัพย์ต่ำกว่า 5,000 ล้านบาท อนุโลมให้ไม่เกิน 2.50 เท่า)"},{"num":173,"q":"พนักงานวิเคราะห์สินเชื่อได้ตรวจสอบงบการเงินและบัญชีของสหกรณ์การเกษตรแห่งหนึ่ง พบว่าในงบมีสถานะ \"เจ้าหนี้ มีจำนวนมากกว่าลูกหนี้เงินกู้\" พนักงานควรตั้งข้อสังเกตและประเมินความเสี่ยงว่าสหกรณ์แห่งนี้อาจมีข้อบกพร่องในเรื่องใด?","choices":[{"key":"ก","text":"สหกรณ์นำเงินไปลงทุนในสินทรัพย์ถาวรมากเกินไป"},{"key":"ข","text":"สหกรณ์ใช้เงินกู้ผิดวัตถุประสงค์"},{"key":"ค","text":"สหกรณ์มีการทุจริตในคณะกรรมการบริหาร"},{"key":"ง","text":"สหกรณ์มีการตั้งค่าเผื่อหนี้สงสัยจะสูญไม่ถูกต้อง"}],"answer":"ข","explanation":"การตรวจสอบความเสี่ยงในงบการเงินของสถาบันเกษตรกร กฎระบุไว้ชัดเจนว่า หากตัวเลขฝั่ง \"เจ้าหนี้มี จำนวนมากกว่าลูกหนี้เงินกู้\" จะเป็นข้อบ่งชี้สำคัญที่แสดงให้เห็นว่ากิจการอาจมีปัญหาการนำเงินไป \"ใช้เงินกู้ผิด วัตถุประสงค์\" (เช่น นำเงินกู้ระยะสั้นไปจมกับสินทรัพย์ถาวร หรือนำไปใช้ผิดประเภท)"},{"num":174,"q":"ตามหลักเกณฑ์การกำกับลูกหนี้รายใหญ่ (SLL) กรณีสหกรณ์ ก. ขอกู้เงิน โดยมีกรรมการดำเนินงานชื่อนาย บี ซึ่งสืบ ทราบว่า \"คู่สมรสของนาย บี\" ได้ทำธุรกิจส่วนตัวและขอกู้เงินจากธนาคารด้วยวัตถุประสงค์ \"เดียวกันกับสหกรณ์\" ธนาคาร จะต้องประเมินความเสี่ยงและจัดการหนี้ของคู่นี้อย่างไร?","choices":[{"key":"ก","text":"ให้นับแยกภาระหนี้กัน เนื่องจากเป็นนิติบุคคลและบุคคลธรรมดาแยกส่วนกันชัดเจน"},{"key":"ข","text":"ให้นับรวมภาระหนี้ของคู่สมรสนาย บี เข้าเป็นกลุ่มลูกหนี้เดียวกันกับสหกรณ์ (Total Group Exposure)"},{"key":"ค","text":"ให้ถือว่าคู่สมรสนาย บี เป็นเพียงผู้ค้ำประกัน ไม่ต้องนำยอดหนี้มาคิด SLL รวม"},{"key":"ง","text":"ให้ปฏิเสธการให้สินเชื่อแก่คู่สมรสนาย บี ทันทีเพื่อป้องกันผลประโยชน์ทับซ้อน"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก ต้องรวมยอดหนี้ เนื่องจากมีกรรมการร่วมกัน (Affiliation)"},{"num":175,"q":"เพื่อเป็นการควบคุมความเสี่ยงด้านหลักประกัน (Collateral Risk) ในการให้สินเชื่อประเภท \"ตั๋วสัญญาใช้เงิน (P/N)\" ธนาคาร มีกฎเหล็ก \"ห้าม\" นำหลักประกันประเภทใดต่อไปนี้มาใช้ค้ำประกันโดยเด็ดขาด?","choices":[{"key":"ก","text":"เงินฝาก หรือ สลากออมทรัพย์ ธ.ก.ส."}],"answer":"ง","explanation":"กฎระเบียบด้านหลักประกัน (Collateral Risk) กำหนดไว้ว่า สินเชื่อประเภทตั๋วสัญญาใช้เงิน (P/N) ซึ่งเป็นหนี้ หมุนเวียนระยะสั้น \"ยกเว้น (ห้าม) นำหลักประกันประเภทบุคคลค้ำประกัน และ บุคคลค้ำประกันแบบรับรองรับผิดอย่าง ลูกหนี้ร่วม มาใช้ค้ำประกันตั๋ว P/N\" เด็ดขาดครับ"},{"num":176,"q":"จากการประเมินความเสี่ยงด้วยข้อมูลเครดิต (Credit Bureau) หากลูกค้ามีสถานะประวัติอยู่ในระดับ \"Minor (Mi - สีเหลือง)\" แนวทางปฏิบัติในการวิเคราะห์สินเชื่อตามมาตรฐาน UWS คือข้อใด?","choices":[{"key":"ก","text":"ถือว่าเสี่ยงต่ำ ยอมรับได้ ไม่ขัด UWS อนุมัติได้ทันทีโดยไม่ต้องมีเงื่อนไข"},{"key":"ข","text":"ถือว่าเสี่ยงปานกลาง ยอมรับได้ ไม่ขัด UWS แต่ต้องแสดงเหตุผลและกำหนดเงื่อนไขควบคุม"},{"key":"ค","text":"ถือว่าเสี่ยงสูง ขัด UWS ต้องขอเบี่ยงเบนหลักเกณฑ์ (Override) ไปยังผู้มีอำนาจ"},{"key":"ง","text":"ถือว่าเสี่ยงสูงมาก ห้ามปล่อยสินเชื่อเด็ดขาด (No Override)"}],"answer":"ข","explanation":"ในเกณฑ์สีของ Credit Bureau หากลูกค้ามีสถานะ Minor (สีเหลือง) ถือว่ามีความเสี่ยงปานกลาง \"ยอมรับได้ ไม่ขัด UWS แต่พนักงานต้องแสดงเหตุผลและกำหนดเงื่อนไขควบคุม\" ให้รัดกุมครับ (ส่วนระดับที่ขัด UWS และต้องขอ Override คือ Major สีส้ม) [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"},{"num":177,"q":"เครื่องมือวิเคราะห์หลัก 7'C ในมิติของปัจจัยด้าน \"Control (ข้อกำหนดและเงื่อนไข)\" มุ่งเน้นการประเมินในเรื่องใดเป็น สำคัญเพื่อให้ธนาคารปลอดภัยจากความเสี่ยง?","choices":[{"key":"ก","text":"การควบคุมยอดหนี้รวมไม่ให้เกิน 15% ของเงินกองทุน (SLL)"},{"key":"ข","text":"การกำหนดเงื่อนไขควบคุมการจ่ายเงินกู้ และควบคุมการนำเงินไปใช้ให้ตรงตามวัตถุประสงค์"},{"key":"ค","text":"การตรวจสอบและควบคุมผลกระทบจากอัตราแลกเปลี่ยนเงินตราต่างประเทศ"},{"key":"ง","text":"การประเมินสถานการณ์เศรษฐกิจมหภาคเพื่อควบคุมดอกเบี้ย"}],"answer":"ข","explanation":"หลัก 7'C ในด้าน Control (เงื่อนไขและข้อกำหนด) คือการประเมินเพื่อหาทางควบคุมความเสี่ยงของสินเชื่อ เช่น การวางเงื่อนไขเบิกจ่ายเงินกู้เป็นงวดๆ ตามความคืบหน้าของงาน, การติดตามให้ใช้เงินกู้ตรงตามวัตถุประสงค์ เพื่อให้แน่ใจ ว่าธนาคารจะไม่เสียเปรียบครับ [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อนให้กู้]"},{"num":178,"q":"แม้ธนาคารจะมีกฎห้ามอนุมัติสินเชื่อให้ลูกค้าที่มีประวัติเครดิตระดับ Major (สีส้ม) หรือ Alarming (สีแดง) แต่มี \"ข้อยกเว้น\" ที่พนักงานสามารถทำเรื่องขอ Override เพื่อให้สินเชื่อได้ในกรณีใดต่อไปนี้?","choices":[{"key":"ก","text":"ลูกค้านำพันธบัตรรัฐบาลมาค้ำประกัน 100%"},{"key":"ข","text":"ลูกค้าเป็นนิติบุคคลที่มีกำไรติดต่อกัน 5 ปี"},{"key":"ค","text":"ลูกค้าเดิมที่เพิ่งส่งชำระหนี้เก่าจนครบถ้วน และมีความจำเป็นต้องขอสินเชื่อเพื่อไปประกอบอาชีพต่อ"},{"key":"ง","text":"ลูกค้ากู้เงินเพื่อนำไป Refinance หนี้ที่กำลังเป็น NPLs กับธนาคารพาณิชย์อื่น"}],"answer":"ค","explanation":"แม้ประวัติจะเป็นสีส้ม (Major) หรือสีแดง (Alarming) แต่ธนาคารเปิดช่องผ่อนปรน (Override) ให้เฉพาะกรณีการให้ โอกาส เช่น \"ลูกค้า NPL ที่เข้าร่วมปรับปรุงโครงสร้างหนี้แล้วมีความจำเป็นต้องขอสินเชื่อเพื่อฟื้นฟูอาชีพ\" หรือ \"ลูกค้าเงินกู้ เดิมที่เพิ่งส่งชำระหนี้เก่าจนครบถ้วนและขอสินเชื่อไปประกอบอาชีพต่อ\" [Artifact: เบื้องหลังวิธีธนาคารสแกนความเสี่ยงก่อน ให้กู้]"},{"num":179,"q":"การควบคุมความเสี่ยงด้านระยะเวลาชำระหนี้ หากกลุ่มบุคคลหรือกองทุนหมู่บ้าน ขอกู้เงินสินเชื่อระยะสั้นเพื่อ \"เป็น ค่าใช้จ่ายหรือหมุนเวียนในการดำเนินกิจการ\" ธนาคารกำหนดให้ต้องชำระคืนต้นเงินและดอกเบี้ยให้เสร็จสิ้นภายในระยะเวลา ไม่เกินกี่ปี?","choices":[{"key":"ก","text":"ไม่เกิน 1 ปี"},{"key":"ข","text":"ไม่เกิน 3 ปี"}],"answer":"ค","explanation":"ตามคู่มือวิธีปฏิบัติสินเชื่อกลุ่มบุคคลและองค์กร เงินกู้ระยะสั้นเพื่อเป็น \"ค่าใช้จ่ายหรือเงินทุนหมุนเวียน\" กำหนดให้ต้องส่งชำระคืนต้นเงินและดอกเบี้ยให้แล้วเสร็จ ไม่เกิน 5 ปี นับแต่วันจัดทำสัญญา"},{"num":180,"q":"เพื่อเป็นการลดความเสี่ยงด้านสภาพคล่องทางการเงิน (Financial Risk) ให้กับองค์กรปกครองส่วนท้องถิ่น (อปท.) หรือนิติ บุคคลที่ขอกู้เงิน \"เพื่อการลงทุน\" ซึ่งโครงการยังต้องใช้เวลาสร้างและยังไม่มีรายได้ในช่วงแรก พนักงานวิเคราะห์สามารถใช้ เครื่องมือบริหารความเสี่ยงใดช่วยเหลือลูกค้าได้?","choices":[{"key":"ก","text":"การเพิ่มวงเงินกู้ให้อีก 20% เพื่อเป็นทุนสำรอง"},{"key":"ข","text":"การพิจารณาให้ \"ปลอดชำระต้นเงิน (Grace Period)\" ในช่วงแรก โดยให้จ่ายเฉพาะดอกเบี้ย"},{"key":"ค","text":"การยกเว้นดอกเบี้ยให้ทั้งหมดในช่วง 3 ปีแรก"},{"key":"ง","text":"การลดอัตราดอกเบี้ยเป็น 0.01% ต่อปี จนกว่าจะสร้างเสร็จ"}],"answer":"ข","explanation":"โครงการขนาดใหญ่ที่ต้องใช้เงินลงทุนสูงและต้องใช้เวลาสร้าง (เช่น อปท. กู้เพื่อลงทุน) ในช่วงแรกที่ยังไม่มี กระแสเงินสดรับ (รายได้) เข้ามา พนักงานสามารถลดความเสี่ยงจากการผิดนัดชำระหนี้ได้โดยการให้ \"ระยะเวลาปลอดชำระ ต้นเงิน (Grace Period)\" ซึ่งลูกค้าจะต้องส่งชำระแค่ \"ดอกเบี้ย\" ไปก่อนในช่วงระยะเวลาหนึ่งครับ"},{"num":181,"q":"[Case Study] สหกรณ์การเกษตร B ขอกู้เงินเพื่อเป็นทุนหมุนเวียน 50 ล้านบาท, กู้เพื่อเป็นค่าลงทุน 20 ล้านบาท และกู้ รวบรวมผลผลิต 10 ล้านบาท จากการตรวจสอบพบว่า \"คู่สมรสของคณะกรรมการดำเนินงานของสหกรณ์จำนวน 2 ท่าน\" มี การกู้เงินส่วนตัวเพื่อทำธุรกิจรวบรวมผลผลิตเกษตรกับธนาคารด้วย วงเงินรายละ 1 ล้านบาท ตามหลักการกำกับลูกหนี้ราย ใหญ่ (SLL) ธนาคารต้องนับรวมภาระหนี้ของกลุ่มนี้ (Total Group Exposure) เป็นจำนวนเงินเท่าใด?","choices":[{"key":"ก","text":"80 ล้านบาท"},{"key":"ข","text":"81 ล้านบาท"},{"key":"ค","text":"82 ล้านบาท"},{"key":"ง","text":"84 ล้านบาท"}],"answer":"ค","explanation":"ตาม Case Study การกำกับ SLL ต้องสืบหา True Borrower เนื่องจากคู่สมรสของกรรมการทำธุรกิจที่มีวัตถุประสงค์ เดียวกับสหกรณ์ (รวบรวมผลผลิต) จึงต้องนับรวมเป็นกลุ่มเดียวกัน การคิด Total Group Exposure = หนี้สหกรณ์ (50+20+10) + หนี้คู่สมรสกรรมการ 2 ท่าน (1+1) = 82 ล้านบาท ครับ"},{"num":182,"q":"จากหลักเกณฑ์การกำกับลูกหนี้รายใหญ่ (Single Lending Limit : SLL) ภาระหนี้รวมของกลุ่ม (Total Group Exposure) ที่ ธนาคารปล่อยกู้จะต้องถูกจำกัดเพดานไว้สูงสุด \"ไม่เกินสัดส่วนเท่าใด\" เพื่อป้องกันความเสี่ยงจากการกระจุกตัว?","choices":[{"key":"ก","text":"ไม่เกินร้อยละ 10 ของยอดสินเชื่อรวมของธนาคาร"},{"key":"ข","text":"ไม่เกินร้อยละ 15 ของยอดสินเชื่อรวมของธนาคาร"},{"key":"ค","text":"ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"},{"key":"ง","text":"ไม่เกินร้อยละ 25 ของเงินกองทุนธนาคาร"}],"answer":"ค","explanation":"เพดานจำกัดความเสี่ยงของการกระจุกตัวตามเกณฑ์ Single Lending Limit (SLL) กำหนดไว้ว่า ภาระหนี้รวมของ ลูกค้ากลุ่มเดียวกัน (Total Group Exposure) จะต้อง \"ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร\" เสมอครับ [Artifact 4]"},{"num":183,"q":"ตามคู่มือการวิเคราะห์ความเสี่ยง 5 ด้าน หากลูกค้าประสบปัญหา \"ถูกรอนสิทธิ์ในที่ดินแปลงที่เป็นหลักประกัน\" (เช่น ถูก ฟ้องร้องเรื่องสิทธิครอบครองหรือมีข้อบัญญัติกฎหมายใหม่มากระทบ) ปัญหานี้จัดอยู่ในความเสี่ยงด้านใด?","choices":[{"key":"ก","text":"ความเสี่ยงด้านธุรกิจ (Business Risk)"},{"key":"ข","text":"ความเสี่ยงด้านการเงิน (Financial Risk)"},{"key":"ค","text":"ความเสี่ยงด้านกฎหมาย (Legal Risk)"},{"key":"ง","text":"ความเสี่ยงด้านหลักประกัน (Collateral Risk)"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก ความเสี่ยงด้านหลักประกัน (Collateral Risk)"},{"num":184,"q":"ในการพิจารณาความเสี่ยงด้านธุรกิจและอุตสาหกรรม (Industrial & Business Risk) ข้อใดต่อไปนี้ถือเป็น \"ความเสี่ยง\" ที่ ธนาคารต้องระมัดระวังและหาทางควบคุมป้องกัน?","choices":[{"key":"ก","text":"ธุรกิจของลูกค้ามีลูกค้าประจำจำนวนมากและกระจายตัว"},{"key":"ข","text":"ธุรกิจของลูกค้าจำเป็นต้อง \"พึ่งพา Supplier เพียงรายเดียว\" ในการป้อนวัตถุดิบ"},{"key":"ค","text":"ธุรกิจของลูกค้ามีการนำเทคโนโลยี BCG Economy มาใช้"}],"answer":"ข","explanation":"ความเสี่ยงด้านธุรกิจและอุตสาหกรรม (Business Risk) ที่มักพบและต้องระวังคือ \"การพึ่งพา Supplier เพียงราย เดียว\" เพราะหาก Supplier รายนั้นมีปัญหา ส่งของไม่ได้ หรือขึ้นราคา ธุรกิจของลูกค้าจะหยุดชะงักทันที ธนาคารจึงมองว่า เป็นความเสี่ยงสูงที่ต้องหาแผนสำรองครับ [Artifact 4]"},{"num":185,"q":"สหกรณ์ออมทรัพย์แห่งหนึ่ง มีสินทรัพย์รวม \"400 ล้านบาท\" ต้องการขอกู้เงินตามมาตรการสนับสนุนสินเชื่อให้กับ สหกรณ์ออมทรัพย์ประเภทราชการ/รัฐวิสาหกิจ ตามเกณฑ์ความเสี่ยง ธนาคารกำหนดให้สหกรณ์แห่งนี้ต้องมีอัตราส่วนหนี้สิน รวมต่อทุนตนเอง (D/E Ratio) ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1.50 เท่า"},{"key":"ข","text":"ไม่เกิน 2.00 เท่า"},{"key":"ค","text":"ไม่เกิน 2.50 เท่า"},{"key":"ง","text":"ไม่เกิน 3.00 เท่า"}],"answer":"ค","explanation":"ตามเกณฑ์ D/E Ratio ของสถาบันเกษตรกร หากเป็นสหกรณ์ขนาดเล็ก (มีสินทรัพย์ต่ำกว่า 5,000 ล้านบาท - ใน เคสนี้คือ 400 ล้านบาท) ธนาคารกำหนดให้ต้องมีอัตราส่วนหนี้สินรวมต่อทุนตนเอง ไม่เกิน 2.50 เท่า ครับ (ส่วน 2.00 เท่าใช้ กับสหกรณ์ขนาดใหญ่ที่มีสินทรัพย์ตั้งแต่ 5,000 ล้านขึ้นไป)"},{"num":186,"q":"ในการวิเคราะห์ศักยภาพลูกค้าด้วยหลัก 7'C การประเมินถึง \"กระแสเงินสด (Cash Flow) และความสามารถในการทำกำไร (EBITDA)\" จัดเป็นการวิเคราะห์ปัจจัยในด้านใด?","choices":[{"key":"ก","text":"Capital (เงินทุนของกิจการ)"},{"key":"ข","text":"Capacity (ความสามารถในการชำระหนี้)"},{"key":"ค","text":"Condition (สถานการณ์และสภาพแวดล้อม)"},{"key":"ง","text":"Character (คุณลักษณะของลูกค้า)"}],"answer":"ข","explanation":"ปัจจัยด้าน Capacity (ความสามารถในการชำระหนี้) ในหลัก 7'C คือการประเมินว่าลูกค้ามีศักยภาพในการ จ่ายคืนหนี้ได้หรือไม่ โดยเครื่องมือหลักที่ใช้พิจารณาคือ กระแสเงินสด (Cash Flow) และกำไร (EBITDA) ครับ [Artifact 4]"},{"num":187,"q":"ในการวิเคราะห์ศักยภาพลูกค้าด้วยหลัก 7'C การประเมินถึง \"สถานการณ์เศรษฐกิจมหภาค นโยบายภาครัฐ แนวโน้ม ตลาด และสภาวะการแข่งขัน\" ที่อาจส่งผลกระทบต่อธุรกิจของลูกค้า จัดเป็นการวิเคราะห์ปัจจัยในด้านใด?","choices":[{"key":"ก","text":"Character"},{"key":"ข","text":"Control"},{"key":"ค","text":"Condition"},{"key":"ง","text":"Country"}],"answer":"ค","explanation":"การพิจารณาถึงสภาพแวดล้อมภายนอก เช่น เศรษฐกิจมหภาค นโยบายรัฐ ภาวะตลาด โรคระบาด หรือ สงครามที่อาจกระทบต่อธุรกิจ จัดเป็นการวิเคราะห์ในมิติของ Condition (สถานการณ์และสภาพแวดล้อม) ตามหลัก 7'C ครับ [Artifact 4]"},{"num":188,"q":"หากการตรวจสอบข้อมูลเครดิตบูโร (Bureau Screening) พบว่าลูกค้ามีประวัติค้างชำระจนสถานะตกอยู่ในระดับ \"Major\" ระบบของธนาคารจะประเมินสีและความเสี่ยงในระดับนี้อย่างไร?","choices":[{"key":"ก","text":"สีเหลือง - เสี่ยงปานกลาง (ยอมรับได้ ไม่ขัด UWS)"},{"key":"ข","text":"สีส้ม - เสี่ยงสูง (ขัด UWS ต้องขอเบี่ยงเบนหลักเกณฑ์/Override)"},{"key":"ค","text":"สีแดง - เสี่ยงสูงมาก (ห้ามปล่อยสินเชื่อเด็ดขาด/NO Override)"},{"key":"ง","text":"สีดำ - ห้ามทำธุรกรรมการเงินทุกประเภท"}],"answer":"ข","explanation":"สถานะระดับ Major (สีส้ม) คือลูกค้าที่มีประวัติเสียระดับที่ธนาคารมองว่า \"เสี่ยงสูง\" ซึ่ง \"ขัดต่อมาตรฐาน UWS\" หากจะปล่อยกู้ พนักงานไม่สามารถใช้อำนาจปกติได้ แต่ต้องทำบันทึกชี้แจงเพื่อ ขอเบี่ยงเบนหลักเกณฑ์ (Override) พร้อมกำหนดเงื่อนไขควบคุมที่รัดกุมครับ [Artifact 4]"},{"num":189,"q":"ในกรณีที่ผลตรวจเครดิตบูโรของลูกค้าอยู่ในระดับ \"Alarming (สีแดง)\" ธนาคารมีกฎเหล็กให้ปฏิเสธการให้สินเชื่อ (NO Override) อย่างเด็ดขาด \"ยกเว้น\" ลูกค้าในกลุ่มใดต่อไปนี้ ที่ธนาคารอนุโลมให้สามารถพิจารณาเบี่ยงเบนเกณฑ์ (Override) ได้?","choices":[{"key":"ก","text":"ลูกค้าที่มีหลักประกันเป็นเงินฝากคุ้มวงเงิน 100%"},{"key":"ข","text":"ลูกค้านิติบุคคลที่มีผลกำไรสุทธิติดต่อกัน 3 ปีขึ้นไป"},{"key":"ค","text":"ลูกค้า NPLs ที่ขอเข้าปรับปรุงโครงสร้างหนี้แล้ว และต้องการขอสินเชื่อเพื่อฟื้นฟูอาชีพ"},{"key":"ง","text":"ลูกค้าข้าราชการบำนาญที่มีหนังสือรับรองสิทธิบำเหน็จตกทอด"}],"answer":"ค","explanation":"สำหรับสีแดง (Alarming) ธนาคารมีกฎเหล็กให้ปฏิเสธการขอสินเชื่อทันที (NO Override) แต่มีข้อยกเว้นพิเศษเพื่อ ช่วยเหลือคือ \"ลูกค้า NPLs ที่ขอเข้ากระบวนการปรับปรุงโครงสร้างหนี้แล้ว และมีความจำเป็นต้องขอสินเชื่อเพื่อฟื้นฟู อาชีพ\" ธนาคารจึงจะยอมให้ Override ได้ครับ [Artifact 4]"},{"num":190,"q":"ในการรวมกลุ่มเพื่อคิดยอด Total Group Exposure (SLL) หากธุรกิจในกลุ่มของลูกค้ามีการทำธุรกรรมประเภท \"หนังสือค้ำ ประกัน (L/G)\" กับธนาคารไว้ แม้จะยังไม่มีการเคลมหรือเรียกเก็บเงิน ธนาคารจะนำยอด L/G นี้มาคำนวณภาระหนี้อย่างไร?","choices":[{"key":"ก","text":"ไม่นำมาคำนวณจนกว่าจะเกิดการเคลมจริง"},{"key":"ข","text":"นำมาคำนวณเพียงร้อยละ 50 ของหน้าตั๋ว"},{"key":"ค","text":"นำยอดวงเงินที่ระบุหน้าตั๋ว L/G มาคำนวณรวมเป็นภาระหนี้ของกลุ่มเต็มจำนวน"},{"key":"ง","text":"ให้คิดเฉพาะค่าธรรมเนียม L/G มารวมเป็นภาระหนี้"}],"answer":"ค","explanation":"การคำนวณวงเงินกู้รวมเพื่อกำกับ SLL ให้นับความเสี่ยงจากหนี้ทุกประเภท โดยเฉพาะสินเชื่อภาระผูกพันอย่าง L/G หรือตั๋ว P/C แม้ลูกค้าจะยังไม่เบิกเงินหรือยังไม่ถูกเคลม ธนาคารก็จะคิดความเสี่ยงจาก \"วงเงินอนุมัติตามหน้าตั๋ว\" นำมารวมเป็น Total Group Exposure ทันทีครับ [Artifact 4]"},{"num":191,"q":"[Case Study] สหกรณ์การเกษตรแห่งหนึ่ง มีวงเงินนายทะเบียน 190 ล้านบาท ปัจจุบันมีวงเงินเครดิตเงินสดเป็นทุนให้กู้ แก่สมาชิกเดิม 110 ล้านบาท และมีวงเงินลงทุน 30 ล้านบาท หากประเมินคะแนนความเสี่ยงได้ \"77 คะแนน\" สหกรณ์แห่งนี้ จะสามารถขอวงเงินเครดิตเงินสดเพิ่มได้สูงสุดเท่าใด และใช้อัตราดอกเบี้ยโครงสร้างใด?","choices":[{"key":"ก","text":"ขอเพิ่มได้ 50 ล้านบาท / อัตราดอกเบี้ย MLR + 0.50"},{"key":"ข","text":"ขอเพิ่มได้ 50 ล้านบาท / อัตราดอกเบี้ย 6.775% (MLR + 0.75)"},{"key":"ค","text":"ขอเพิ่มได้ 80 ล้านบาท / อัตราดอกเบี้ย 6.775% (MLR + 0.75)"},{"key":"ง","text":"ขอเพิ่มได้ 80 ล้านบาท / อัตราดอกเบี้ย MLR + 0.50"}],"answer":"ข","explanation":"1. การคำนวณวงเงิน: วงเงินนายทะเบียน 190 ลบ. - (ให้กู้สมาชิก 110 ลบ. + ลงทุน 30 ลบ.) = สามารถขอเพิ่มได้อีก 50 ล้านบาท 2. อัตราดอกเบี้ย: ได้คะแนนประเมิน 77 คะแนน ตามตารางโครงสร้างดอกเบี้ยสถาบันเกษตรกรตกอยู่ในเกณฑ์ (มากกว่า 72 ไม่เกิน 77) ซึ่งจะใช้อัตราดอกเบี้ย MLR + 0.75 (หรือเท่ากับ 6.775%)"},{"num":192,"q":"[Case Study] สหกรณ์ออมทรัพย์แห่งหนึ่ง (มีสินทรัพย์ 400 ล้านบาท) ขอกู้เงินตามมาตรการสนับสนุนสินเชื่อให้กับ สหกรณ์ออมทรัพย์ประเภทราชการ/รัฐวิสาหกิจ ธนาคารจะต้องประเมินความเสี่ยงและกำหนดอัตราส่วนหนี้สินรวมต่อทุน ตนเอง (D/E Ratio) ไว้ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1.50 เท่า"},{"key":"ข","text":"ไม่เกิน 2.00 เท่า"},{"key":"ค","text":"ไม่เกิน 2.50 เท่า"},{"key":"ง","text":"ไม่เกิน 3.00 เท่า"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก D/E Ratio ต้องไม่เกิน 2.50 เท่า"},{"num":193,"q":"[Case Study] สหกรณ์ออมทรัพย์แห่งหนึ่ง มีคะแนนประเมินปัจจัยความเสี่ยงเพื่อกำหนดอัตราชั้นประจำปี \"80 คะแนน\" ขอกู้เงิน 2 สัญญา คือ 1) เครดิตเงินสดเป็นทุนให้กู้แก่สมาชิก และ 2) เงินลงทุนทำ Application เพื่อโอนเงินปันผล สาขาจะต้อง กำหนดอัตราดอกเบี้ยของทั้ง 2 สัญญาเพื่อถือใช้ในปีถัดไปตามข้อใด?","choices":[{"key":"ก","text":"สัญญาที่ 1 = MLR + 0 / สัญญาที่ 2 = MLR + 0"},{"key":"ข","text":"สัญญาที่ 1 = MLR + 0 / สัญญาที่ 2 = MLR + 1.50"},{"key":"ค","text":"สัญญาที่ 1 = MLR + 0.125 / สัญญาที่ 2 = MLR + 1.25"},{"key":"ง","text":"สัญญาที่ 1 = MLR + 0.125 / สัญญาที่ 2 = MLR + 1.50"}],"answer":"ข","explanation":"ตามตารางโครงสร้างอัตราดอกเบี้ย สหกรณ์ออมทรัพย์ที่ได้คะแนน 80 (ไม่เกิน 80) จะได้อัตราดอกเบี้ย MLR + 0.125 แต่ในเคสนี้ สัญญาที่ 1 (ทุนให้กู้แก่สมาชิก) จะได้อิงตามคะแนนปัจจุบันคือ MLR + 0 (หากเข้าเกณฑ์พิเศษ) ส่วน สัญญาที่ 2 (เงินลงทุนทำ App) กฎระบุชัดเจนว่า \"กู้เงินเพื่อเป็นค่าลงทุน ให้ถือใช้ชั้นดอกเบี้ยเงินกู้เดิมไปตลอดอายุ สัญญา\" จึงต้องคงไว้ที่ MLR + 1.50"},{"num":194,"q":"สหกรณ์การเกษตร A ต้องการขอขยายวงเงินกู้ \"เพื่อเป็นทุนจัดหาวัสดุมาจำหน่าย\" จากเดิม 40 ล้านบาท เพิ่มเป็น 61 ล้านบาท การอนุมัติขยายวงเงินกู้ในครั้งนี้ จัดอยู่ในอำนาจอนุมัติของบุคคลหรือคณะบุคคลใด?","choices":[{"key":"ก","text":"ผู้อำนวยการสำนักงาน ธ.ก.ส. จังหวัด (ผอจ.)"},{"key":"ข","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับสำนักงาน ธ.ก.ส. จังหวัด"},{"key":"ค","text":"คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับกลาง"}],"answer":"ง","explanation":"การขอขอกู้เงินเพื่อเป็นทุนจัดหาวัสดุมาจำหน่าย วงเงินตั้งแต่ 60 ล้านบาทขึ้นไป (ในข้อนี้คือ 61 ลบ.) จะเกิน เพดานของคณะกรรมการระดับกลาง และตกไปอยู่ในอำนาจอนุมัติของ คณะกรรมการพิจารณาอนุมัติสินเชื่อระดับ ธนาคาร (เพดานไม่เกิน 9 เท่าแห่งทุน)"},{"num":195,"q":"สหกรณ์การเกษตร B ต้องการกู้เงิน \"เพื่อเป็นทุนขายผลผลิต\" วงเงิน 90 ล้านบาท การขอกู้ในครั้งนี้อยู่ในอำนาจอนุมัติ ของคณะกรรมการระดับใด และต้องเสียค่าธรรมเนียมสินเชื่อเท่าใด?","choices":[{"key":"ก","text":"คณะกรรมการระดับกลาง / ไม่เก็บค่าธรรมเนียม"},{"key":"ข","text":"คณะกรรมการระดับกลาง / เสียค่าธรรมเนียม 450,000 บาท"},{"key":"ค","text":"คณะกรรมการระดับธนาคาร / ไม่เก็บค่าธรรมเนียม"},{"key":"ง","text":"คณะกรรมการระดับธนาคาร / เสียค่าธรรมเนียม 450,000 บาท"}],"answer":"ง","explanation":"กู้เพื่อเป็นทุนขายผลผลิต 90 ล้านบาท เกิน 80 ล้านบาท จึงเป็นอำนาจของ คณะกรรมการระดับธนาคาร (เพดานไม่เกิน 100 ลบ.) และตามระเบียบวงเงินกู้มากกว่า 10 ล้านบาทขึ้นไป จะต้องเสียค่าธรรมเนียม ร้อยละ 0.50 ของ วงเงินกู้ (90 ลบ. x 0.50% = 450,000 บาท)"},{"num":196,"q":"หากสหกรณ์การเกษตร C ต้องการ \"ต่ออายุสัญญา\" เพื่อเป็นทุนขายผลผลิตในวงเงินเท่าเดิม โดยไม่เปลี่ยนแปลง โครงการและมีคุณสมบัติครบตามเกณฑ์ 31 ข้อ ธนาคารอนุโลมให้ \"ยกเว้น\" ขั้นตอนการปฏิบัติงานหลายข้อ ยกเว้นข้อใด ต่อไปนี้ที่สาขา \"ยังคงต้องดำเนินการ\" ตามปกติ?","choices":[{"key":"ก","text":"การบันทึกข้อมูลในระบบวิเคราะห์สินเชื่อฟีนิกซ์ (Phoenix)"},{"key":"ข","text":"การจัดทำเอกสาร Credit Approval และ Underwriting Criteria"},{"key":"ค","text":"การกลั่นกรองการวิเคราะห์สินเชื่อ โดยพนักงานกลั่นกรอง (Credit Write up)"},{"key":"ง","text":"การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่"}],"answer":"ง","explanation":"การต่ออายุสัญญาเดิมในวงเงินเท่าเดิมที่เข้าเกณฑ์ผ่อนปรน จะได้รับการ \"ยกเว้น\" การทำฟีนิกซ์, เอกสาร Credit Approval, และ Credit Write up แต่ \"ไม่ยกเว้น\" การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวย สินเชื่อลูกค้ารายใหญ่ (ต้องบันทึกเป็นหลักฐานเสมอ)"},{"num":197,"q":"สหกรณ์ออมทรัพย์ขอกู้เงินแบบตั๋วสัญญาใช้เงิน (P/N) อายุไม่เกิน 90 วัน โดยออกตั๋วเมื่อวันที่ 1 เมษายน 2569 แนว ทางการปฏิบัติในการชำระหนี้และการ Roll Over ตั๋วตามข้อใดถูกต้องที่สุด?","choices":[{"key":"ก","text":"ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน / ชำระเสร็จสิ้น 30 มิ.ย. 69 / และ Roll ตั๋วได้ตั้งแต่ 23 - 30 มิ.ย."},{"key":"ข","text":"ชำระต้นเงินและดอกเบี้ยทั้งหมดในวันทำการสุดท้ายของเดือน เม.ย. 2569"},{"key":"ค","text":"ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน / ชำระเสร็จ 31 ธ.ค. 69 / และ Roll ตั๋วได้ตั้งแต่ 24 - 31 ธ.ค. 69"},{"key":"ง","text":"ชำระต้นเงินและดอกเบี้ยทั้งหมดในวันทำการสุดท้ายของเดือน มิ.ย. 2569 เพียงครั้งเดียว"}],"answer":"ก","explanation":"สำหรับตั๋ว P/N ที่อายุเกิน 1 เดือน ลูกค้าต้อง \"ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน\" และ ชำระเสร็จสิ้นเมื่อตั๋วครบกำหนด (1 เม.ย. + 90 วัน = 30 มิ.ย.) และธนาคารอนุญาตให้สามารถทำเรื่อง Roll Over ตั๋วได้ ล่วงหน้าไม่เกิน 7 วันก่อนวันครบกำหนด (คือช่วงวันที่ 23 - 30 มิ.ย.)"},{"num":198,"q":"การตรวจเยี่ยมและทบทวนความเสี่ยงผ่านระบบ CRS สำหรับกลุ่มลูกค้าประเภท \"สหกรณ์ออมทรัพย์ และ สหกรณ์ นอกภาคการเกษตร\" ธนาคารกำหนดความถี่และระยะเวลาที่ควรดำเนินการไว้อย่างไร?","choices":[{"key":"ก","text":"อย่างน้อยปีละ 1 ครั้ง ก่อนสิ้นปีบัญชีสหกรณ์"},{"key":"ข","text":"อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)"},{"key":"ค","text":"อย่างน้อยปีละ 2 ครั้ง ภายใน 1 เดือนหลังการประชุมใหญ่"}],"answer":"ข","explanation":"สำหรับสหกรณ์นอกภาคการเกษตร (เช่น สหกรณ์ออมทรัพย์ สหกรณ์ร้านค้า) การตรวจเยี่ยมผ่านระบบ CRS ควรกระทำ อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีของสหกรณ์ก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากตรวจเยี่ยมครั้งแรก ประมาณ 6 เดือน)"},{"num":199,"q":"จากการประเมินปฏิทินงานสหกรณ์ ข้อใดคือจุดที่ \"แตกต่างกัน\" ระหว่างสหกรณ์การเกษตร (ในภาค) กับ สหกรณ์ออม ทรัพย์ (นอกภาค)?","choices":[{"key":"ก","text":"การเข้าร่วมประชุมใหญ่ประจำปี"},{"key":"ข","text":"การทบทวนหลักประกันและตัวอย่างลายมือชื่อ"},{"key":"ค","text":"การรวบรวมบันทึกการจัดชั้นดอกเบี้ย"},{"key":"ง","text":"การจัดทำตารางกำหนดชำระหนี้"}],"answer":"ง","explanation":"จากตารางปฏิทินงานสหกรณ์ สิ่งที่แตกต่างกันคือ \"การจัดทำตารางกำหนดชำระหนี้\" (สหกรณ์ในภาค = ภายใน 1 เดือนหลังสิ้นปีบัญชี / ส่วนสหกรณ์นอกภาค = ก่อนสิ้นปีบัญชี)"},{"num":200,"q":"ในการประเมินงบการเงินและศักยภาพของสถาบันเกษตรกร หากพนักงานพบความเสี่ยงที่ระบุว่า \"เจ้าหนี้มีจำนวน มากกว่าลูกหนี้เงินกู้\" พนักงานควรตั้งข้อสังเกตเบื้องต้นว่าสหกรณ์แห่งนี้มีข้อบกพร่องในเรื่องใด?","choices":[{"key":"ก","text":"ขาดทุนสะสมติดต่อกัน 3 ปี"},{"key":"ข","text":"ใช้เงินกู้ผิดวัตถุประสงค์"},{"key":"ค","text":"ขาดทุนเกินกึ่งหนึ่งของทุนเรือนหุ้น"},{"key":"ง","text":"มีการทุจริตในคณะกรรมการบริหาร"}],"answer":"ข","explanation":"คู่มือการประเมินระบุไว้ว่า การที่สหกรณ์มีสถานะ \"เจ้าหนี้มีจำนวนมากกว่าลูกหนี้เงินกู้\" เป็นสัญญาณบ่งชี้ ความเสี่ยงที่ชัดเจนว่า สหกรณ์อาจมีการนำเงินไป \"ใช้เงินกู้ผิดวัตถุประสงค์\" (เช่น เอาเงินกู้ระยะสั้นไปจมกับสินทรัพย์ ถาวร)"},{"num":201,"q":"ในการกำหนดอัตราดอกเบี้ยเงินกู้ (Risk Premium) สำหรับกองทุนหมู่บ้าน ธนาคารใช้คะแนนจาก 2 หมวดมารวมกัน (คะแนนเต็ม 100) อยากทราบว่า \"หมวดด้านฐานะทางการเงินและผลการดำเนินงาน\" ธนาคารกำหนดคะแนนเต็มไว้ที่ เท่าใด?","choices":[{"key":"ก","text":"45 คะแนน"},{"key":"ข","text":"50 คะแนน"},{"key":"ค","text":"55 คะแนน"},{"key":"ง","text":"70 คะแนน"}],"answer":"ค","explanation":"ในการกำหนดอัตราดอกเบี้ยเงินกู้ (Risk Premium) สำหรับกองทุนหมู่บ้าน ธนาคารจะคิดจาก 2 หมวดรวม 100 คะแนน คือ หมวดที่ 1 ด้านการบริหารและควบคุมภายใน (45 คะแนน) และ หมวดที่ 2 ด้านฐานะทางการเงินและผล การดำเนินงาน (55 คะแนน) ครับ"},{"num":202,"q":"หากกองทุนหมู่บ้าน C ได้รับการประเมินศักยภาพรวมและได้คะแนนสูงถึง \"85 คะแนน\" (อยู่ในระดับดีเยี่ยม) ธนาคาร จะสามารถพิจารณาวงเงินกู้ให้กองทุนหมู่บ้านแห่งนี้ได้สูงสุดไม่เกินกี่เท่าของเงินทุนตนเอง?","choices":[{"key":"ก","text":"8 เท่า"},{"key":"ข","text":"9 เท่า"},{"key":"ค","text":"10 เท่า"},{"key":"ง","text":"12 เท่า"}],"answer":"ค","explanation":"ตามเกณฑ์การประเมินศักยภาพกองทุนหมู่บ้าน หากได้คะแนน 80-100 คะแนน จะจัดอยู่ในระดับ \"ดีเยี่ยม\" และสามารถขอกู้เงินได้สูงสุด ไม่เกิน 10 เท่าของทุนตนเอง (หากได้ 70-79 จะได้ 9 เท่า และ 60-69 จะได้ 8 เท่า)"},{"num":203,"q":"[Case Study] กองทุนหมู่บ้าน A ได้รับการประเมินศักยภาพเพื่อจัดระดับชั้นและกำหนดอัตราดอกเบี้ย โดยได้คะแนน \"หมวดการบริหาร 20 คะแนน\" และ \"หมวดฐานะทางการเงิน 50 คะแนน\" กองทุนหมู่บ้านแห่งนี้จะได้รับการจัดชั้นและใช้ อัตราดอกเบี้ยตามข้อใด?","choices":[{"key":"ก","text":"ระดับ 4 / อัตราดอกเบี้ย MLR + 0.75"},{"key":"ข","text":"ระดับ 5 / อัตราดอกเบี้ย MLR + 1.00"},{"key":"ค","text":"ระดับ 6 / อัตราดอกเบี้ย MLR + 1.25"},{"key":"ง","text":"ระดับ 7 / อัตราดอกเบี้ย MLR + 1.50"}],"answer":"ข","explanation":"หมวดที่ 1 (20) + หมวดที่ 2 (50) = ได้คะแนนรวม 70 คะแนน. เมื่อนำไปเทียบกับตารางโครงสร้างอัตรา ดอกเบี้ย กองทุนหมู่บ้านที่ได้คะแนน 69 - 71 จะจัดอยู่ใน ระดับ 5 และใช้อัตราดอกเบี้ย MLR + 1.00 ครับ"},{"num":204,"q":"ในการประเมินศักยภาพเพื่อกำหนด \"วงเงินกู้ขั้นสูง\" สำหรับกลุ่มลูกค้ารหัส 712 (วิสาหกิจชุมชน) หากวิสาหกิจชุมชน ประเมินได้คะแนน \"75 คะแนน\" จะได้รับการพิจารณาวงเงินกู้สูงสุดไม่เกินกี่เท่าของทุนตนเอง?","choices":[{"key":"ก","text":"14 เท่า"},{"key":"ข","text":"16 เท่า"},{"key":"ค","text":"18 เท่า"},{"key":"ง","text":"20 เท่า"}],"answer":"ข","explanation":"คำตอบที่ถูกต้องคือ ข เนื่องจาก กำไรสุทธิ x คูณ 5 = วงเงินกู้ขั้นสูง"},{"num":205,"q":"เพื่อเป็นการลดความเสี่ยงในการลงทุนของธนาคาร หากกองทุนหมู่บ้านประสงค์ขอกู้เงิน \"เพื่อเป็นค่าลงทุน\" ธนาคาร กำหนดให้กองทุนจะต้องมีเงินทุนสมทบของตนเองร่วมด้วยอย่างน้อยร้อยละเท่าใดของค่าลงทุนทั้งหมด?","choices":[{"key":"ก","text":"ร้อยละ 10"}],"answer":"ค","explanation":"กฎของการให้สินเชื่อเพื่อเป็น \"ค่าลงทุน\" สำหรับกองทุนหมู่บ้าน เพื่อความมั่นใจว่ากองทุนมีความพร้อมในการ ลงทุน ธนาคารบังคับว่า \"กองทุนต้องมีเงินทุนสมทบเองอย่างน้อยร้อยละ 20 ของค่าลงทุนทั้งหมด\""},{"num":206,"q":"ในการประเมินความเสี่ยงด้านสภาพคล่องให้กับ \"องค์กรปกครองส่วนท้องถิ่น (อปท.)\" ที่ขอกู้เงินเพื่อการลงทุน หาก โครงการนั้นยังต้องใช้เวลาก่อสร้างและยังไม่มีรายได้ในช่วงแรก ธนาคารอาจพิจารณาผ่อนปรน \"ปลอดชำระต้นเงิน (Grace Period)\" ให้สูงสุดได้ไม่เกินกี่ปีแรก?","choices":[{"key":"ก","text":"ไม่เกิน 1 ปี"},{"key":"ข","text":"ไม่เกิน 2 ปี"},{"key":"ค","text":"ไม่เกิน 3 ปี"},{"key":"ง","text":"ไม่เกิน 5 ปี"}],"answer":"ค","explanation":"สำหรับองค์กรปกครองส่วนท้องถิ่น (อปท.) ที่กู้เงินเพื่อการลงทุน ซึ่งเป็นโครงการใหญ่และอาจยังไม่สร้าง กระแสเงินสดในระยะแรก พนักงานวิเคราะห์สามารถช่วยลดความเสี่ยงได้โดยการกำหนดระยะเวลา ปลอดชำระต้นเงิน (Grace Period) ให้ได้ไม่เกิน 3 ปีแรก ครับ"},{"num":207,"q":"ในการพิจารณาคุณสมบัติและการประเมินความเสี่ยงของ \"สหกรณ์ภาคการเกษตร\" ปัจจัยในข้อใดต่อไปนี้ที่ \"ไม่ใช่\" ข้อบกพร่องที่เป็นสาระสำคัญตามเกณฑ์ของธนาคาร?","choices":[{"key":"ก","text":"ขาดทุนสะสมติดต่อกันเกินกว่า 3 ปี"},{"key":"ข","text":"ขาดทุนเกินกึ่งหนึ่งของทุนเรือนหุ้น"},{"key":"ค","text":"ปิดบัญชีไม่ได้ภายใน 150 วัน นับแต่วันสิ้นปีบัญชี"},{"key":"ง","text":"สหกรณ์มีสถานะ \"เจ้าหนี้เงินกู้น้อยกว่าลูกหนี้เงินกู้\""}],"answer":"ง","explanation":"ข้อบกพร่องที่เป็นสาระสำคัญในการประเมินสหกรณ์คือ การขาดทุนสะสม 3 ปี, ขาดทุนเกินกึ่งหนึ่ง, หรือปิด บัญชีไม่ได้ แต่ประเด็นเรื่อง \"เจ้าหนี้เงินกู้น้อยกว่าลูกหนี้เงินกู้\" ถือว่าเป็นเรื่องปกติของการปล่อยสินเชื่อ จึงไม่ใช่ ข้อบกพร่อง (แต่ถ้าเมื่อไหร่ \"เจ้าหนี้มีมากกว่าลูกหนี้\" อันนี้คือสัญญาณอันตรายที่ชี้ว่ามีการใช้เงินกู้ผิดวัตถุประสงค์ครับ)"},{"num":208,"q":"ในการประเมินความเสี่ยงด้านโครงสร้างทางการเงิน (Capital) สำหรับ \"สหกรณ์ออมทรัพย์ขนาดเล็ก\" (ที่มีสินทรัพย์รวม น้อยกว่า 5,000 ล้านบาท) ธนาคารกำหนดอัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้สูงสุดไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1.50 เท่า"},{"key":"ข","text":"ไม่เกิน 2.00 เท่า"},{"key":"ค","text":"ไม่เกิน 2.50 เท่า"},{"key":"ง","text":"ไม่เกิน 3.00 เท่า"}],"answer":"ค","explanation":"ตามคุณสมบัติของสหกรณ์ออมทรัพย์ที่ขอกู้ หากเป็นสหกรณ์ขนาดเล็ก (สินทรัพย์ < 5,000 ล้านบาท) จะถูก ควบคุม D/E Ratio ให้ ไม่เกิน 2.50 เท่า (ส่วนสหกรณ์ขนาดใหญ่ สินทรัพย์ >= 5,000 ล้านบาท D/E ต้องไม่เกิน 2.00 เท่า)"},{"num":209,"q":"เพื่อเป็นการควบคุมความเสี่ยงด้านหลักประกัน สำหรับเงินกู้ \"กลุ่มบุคคล\" ที่ใช้หลักประกันประเภท \"รับรองรับผิด อย่างลูกหนี้ร่วมกัน\" หากกลุ่มนั้นมีสมาชิกมากถึง 20 คน ธนาคารกำหนดจำนวนผู้ที่ต้องลงนามค้ำประกันไว้อย่างไร?","choices":[{"key":"ก","text":"ต้องลงนามทุกคนทั้ง 20 คนโดยไม่มีข้อยกเว้น"},{"key":"ข","text":"ลงนามอย่างน้อย 15 คน ตามที่มติที่ประชุมกลุ่มมอบหมาย"}],"answer":"ข","explanation":"หลักประกันแบบรับรองรับผิดอย่างลูกหนี้ร่วมกัน สำหรับกลุ่มบุคคล หากกลุ่มนั้นมีสมาชิกตั้งแต่ 15 คนขึ้นไป ธนาคารกำหนดให้ \"ลงนามอย่างน้อย 15 คน ตามที่มติที่ประชุมกลุ่มมอบหมาย\" (ไม่ต้องลงนามทุกคนหากเกิน 15 คน)"},{"num":210,"q":"แม้การตรวจข้อมูลเครดิตบูโร (Credit Bureau) จะเป็นเครื่องมือสำคัญในการสแกนความเสี่ยง แต่หากพบว่าลูกค้ามี ประวัติอยู่ในระดับ \"Alarming (สีแดง)\" ซึ่งมีกฎเหล็กห้ามปล่อยสินเชื่อเด็ดขาด ธนาคารยังมี \"ข้อยกเว้น (Override)\" ให้ในกรณี ใด?","choices":[{"key":"ก","text":"กรณีที่ลูกค้าหาบุคคลที่มีรายได้ประจำมาเป็นผู้ค้ำประกันร่วมได้ 3 คน"},{"key":"ข","text":"กรณีลูกค้านำที่ดินพร้อมสิ่งปลูกสร้างในเขตเมืองมาจำนอง 100%"},{"key":"ค","text":"กรณีลูกค้าเป็นข้าราชการที่กู้เงินเพื่อนำไป Refinance หนี้บัตรเครดิต"},{"key":"ง","text":"กรณีเป็นลูกค้า NPLs ของธนาคารที่เข้ากระบวนการปรับปรุงโครงสร้างหนี้แล้ว และต้องการกู้เพื่อไปฟื้นฟูอาชีพ"}],"answer":"ง","explanation":"สีแดง (Alarming) คือประวัติหนี้เสียที่ห้ามพิจารณาสินเชื่อ (NO Override) อย่างเด็ดขาด แต่ธนาคารเปิดช่องผ่อน ปรน (Override) ให้เฉพาะกรณีการให้โอกาส คือ \"ลูกค้า NPLs ที่เข้าร่วมปรับปรุงโครงสร้างหนี้แล้วมีความจำเป็นต้องขอสินเชื่อ ใหม่เพื่อนำไปฟื้นฟูอาชีพ\" ครับ [Artifact 4]"},{"num":211,"q":"ในการประเมินและควบคุมความเสี่ยงของลูกค้ารหัส 712 (วิสาหกิจชุมชน) หากธนาคารตรวจสอบพบว่ามีคณะกรรมการ ดำเนินงานของกลุ่มไปทับซ้อนกับกลุ่มวิสาหกิจชุมชนอื่นจำนวน \"3 คน\" ธนาคารจะต้องบริหารจัดการวงเงินกู้ใหม่อย่างไรเมื่อมี การชำระหนี้บางส่วน?","choices":[{"key":"ก","text":"อนุโลมให้คงวงเงินกู้ไว้เท่าเดิม"},{"key":"ข","text":"ให้ปรับลดวงเงินกู้ลงร้อยละ 2 ของวงเงินกู้เดิม"},{"key":"ค","text":"ให้ปรับลดวงเงินกู้ลงร้อยละ 4 ของวงเงินกู้เดิม"},{"key":"ง","text":"ให้ปรับลดวงเงินกู้ลงร้อยละ 6 ของวงเงินกู้เดิม"}],"answer":"ง","explanation":"ตามวิธีปฏิบัติ หากพบว่าวิสาหกิจชุมชนมีคณะกรรมการไปทับซ้อนกับกลุ่มอื่น ธนาคารมีมาตรการลดความ เสี่ยงโดยการปรับลดวงเงินกู้ใหม่เมื่อมีการชำระหนี้ดังนี้: ทับซ้อน 1 คน = ลด 2%, ทับซ้อน 2 คน = ลด 4%, ทับซ้อน 3 คน = ลด 6%, และหากทับซ้อนตั้งแต่ 4 คนขึ้นไป = ลด 10% ครับ"},{"num":212,"q":"[Case Study] สหกรณ์การเกษตร ก. ขอกู้เงินเพื่อเป็นทุนหมุนเวียน 50 ล้านบาท, ค่าลงทุน 20 ล้านบาท และรวบรวม ผลผลิต 10 ล้านบาท จากการตรวจสอบความเสี่ยงพบว่า \"คู่สมรส\" ของประธานกรรมการและรองประธาน (รวม 2 ท่าน) มี การกู้เงินส่วนตัวทำธุรกิจรวบรวมผลผลิตกับธนาคารด้วยวงเงินคนละ 1 ล้านบาท การคำนวณวงเงินกู้รวมของกลุ่ม (Total Group Exposure) เพื่อกำกับ SLL จะต้องเป็นยอดเท่าใด?","choices":[{"key":"ก","text":"80 ล้านบาท"},{"key":"ข","text":"81 ล้านบาท"},{"key":"ค","text":"82 ล้านบาท"},{"key":"ง","text":"84 ล้านบาท"}],"answer":"ค","explanation":"ตาม Case Study การกำกับลูกหนี้รายใหญ่ (SLL) จะต้องสืบหา True Borrower ในกรณีนี้คู่สมรสของประธานและ รองประธานกู้ไปทำธุรกิจที่มีวัตถุประสงค์เดียวกับสหกรณ์ (รวบรวมผลผลิต) จึงต้องนับความเสี่ยงรวมกัน (Total Group Exposure) เท่ากับ ยอดกู้สหกรณ์ 80 ลบ. + ยอดกู้ส่วนตัวของคู่สมรส 2 ลบ. = 82 ล้านบาท ครับ"},{"num":213,"q":"ในการวิเคราะห์ความเสี่ยงด้านโครงสร้างทางการเงิน สหกรณ์ออมทรัพย์ที่มีสินทรัพย์รวม \"400 ล้านบาท\" ขอกู้เงินตาม มาตรการสนับสนุนสินเชื่อให้กับสหกรณ์ออมทรัพย์ประเภทราชการ/รัฐวิสาหกิจ ธนาคารกำหนดให้สหกรณ์ต้องรักษา อัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้ไม่เกินเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 1.50 เท่า"},{"key":"ข","text":"ไม่เกิน 2.00 เท่า"},{"key":"ค","text":"ไม่เกิน 2.50 เท่า"},{"key":"ง","text":"ไม่เกิน 3.00 เท่า"}],"answer":"ค","explanation":"ตามเกณฑ์คุณสมบัติของสหกรณ์ออมทรัพย์ที่ขอกู้เงิน หากเป็น \"สหกรณ์ขนาดเล็ก\" (มีสินทรัพย์น้อยกว่า 5,000 ล้านบาท) ธนาคารกำหนดให้มีอัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้ที่ ไม่เกิน 2.50 เท่า ครับ (ส่วน สหกรณ์ขนาดใหญ่ สินทรัพย์ >= 5,000 ล้านบาท ต้องไม่เกิน 2.00 เท่า)"},{"num":214,"q":"การให้สินเชื่อแก่สหกรณ์ออมทรัพย์ประเภท \"ตั๋วสัญญาใช้เงิน (Promissory Note : P/N)\" ที่มีอายุไม่เกิน 90 วัน ธนาคาร กำหนดวิธีควบคุมความเสี่ยงและแนวทางการชำระหนี้ที่ถูกต้องที่สุดตามข้อใด?","choices":[{"key":"ก","text":"ให้ชำระต้นเงินและดอกเบี้ยทั้งหมดในวันทำการสุดท้ายของเดือนแรก"},{"key":"ข","text":"ให้ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน และชำระเสร็จสิ้นเมื่อครบกำหนด"}],"answer":"ข","explanation":"สำหรับการให้สินเชื่อด้วยตั๋วสัญญาใช้เงิน (P/N) ที่มีอายุมากกว่า 1 เดือนขึ้นไป (เช่น 90 วัน) ธนาคารจะควบคุม กระแสเงินสดโดยให้ลูกค้า \"ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน\" และให้ชำระคืนต้นเงินพร้อมดอกเบี้ย งวดสุดท้ายเมื่อครบกำหนดอายุตั๋วครับ"},{"num":215,"q":"[Case Study] สหกรณ์ออมทรัพย์แห่งหนึ่งได้คะแนนประเมินปัจจัยความเสี่ยงเพื่อกำหนดอัตราชั้น \"80 คะแนน\" โดยขอกู้ 2 สัญญา คือ 1) เครดิตเงินสดเป็นทุนให้กู้แก่สมาชิก (เดิม MLR+1.50) 2) เงินลงทุนทำ Application เพื่อโอนเงินปันผล (เดิม MLR+1.50) สาขาจะต้องกำหนดอัตราดอกเบี้ยใหม่ของ 2 สัญญานี้ตามข้อใด?","choices":[{"key":"ก","text":"สัญญา 1 = MLR + 0.00 / สัญญา 2 = MLR + 0.00"},{"key":"ข","text":"สัญญา 1 = MLR + 0.125 / สัญญา 2 = MLR + 1.50"},{"key":"ค","text":"สัญญา 1 = MLR + 0.125 / สัญญา 2 = MLR + 1.25"},{"key":"ง","text":"สัญญา 1 = MLR + 1.50 / สัญญา 2 = MLR + 1.50"}],"answer":"ข","explanation":"สหกรณ์ออมทรัพย์ที่ได้คะแนนประเมิน 80 คะแนน ตามโครงสร้างจะตกในระดับ 2 คือได้อัตรา MLR + 0.125 ซึ่งจะนำไปใช้กับ \"สัญญาที่ 1 (เครดิตเงินสด)\" ทันที แต่สำหรับ \"สัญญาที่ 2 (กู้เพื่อลงทุนทำ App)\" ธนาคารมีกฎห้ามปรับลด ให้ถือใช้ชั้นดอกเบี้ยเงินกู้เดิม (MLR + 1.50) ไปตลอดอายุสัญญาครับ"},{"num":216,"q":"เพื่อเป็นการบริหารและควบคุมความเสี่ยงในการจัดทำผลิตภัณฑ์ \"หนังสือค้ำประกัน (Letter of Guarantee : L/G)\" ข้อใดถือ เป็นกฎเหล็กหรือข้อพึงระวังสำคัญที่สุดที่ธนาคารห้ามปฏิบัติอย่างเด็ดขาด?","choices":[{"key":"ก","text":"ห้ามคิดค่าธรรมเนียมกับหน่วยงานของรัฐ"},{"key":"ข","text":"ห้ามรับหลักประกันประเภทเงินฝากออมทรัพย์"},{"key":"ค","text":"ห้ามออกหนังสือค้ำประกันย้อนหลัง (เริ่มงานก่อนอนุมัติ)"},{"key":"ง","text":"ห้ามออกหนังสือค้ำประกันเกินกว่า 5 ล้านบาทในทุกกรณี"}],"answer":"ค","explanation":"ในหน้าสรุปข้อพึงระวังของการออกหนังสือค้ำประกัน (LG) ข้อที่ถูกเน้นย้ำ (Highlight) มากที่สุดคือ \"ห้ามออก LG ย้อนหลัง (หรือการเริ่มงานไปแล้วก่อนที่ธนาคารจะอนุมัติ LG)\" เนื่องจากมีความเสี่ยงสูงที่จะเกิดข้อพิพาทครับ"},{"num":217,"q":"การบริหารและทบทวนความเสี่ยงผ่านระบบ CRS (Credit Review System) สำหรับลูกค้ากลุ่ม \"สหกรณ์ออมทรัพย์\" หรือ สหกรณ์นอกภาคการเกษตร ธนาคารกำหนดความถี่ในการตรวจเยี่ยมไว้อย่างไร?","choices":[{"key":"ก","text":"อย่างน้อยปีละ 1 ครั้ง ภายใน 150 วันหลังสิ้นปีบัญชี"},{"key":"ข","text":"อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)"},{"key":"ค","text":"อย่างน้อยปีละ 2 ครั้ง ก่อนการจ่ายเงินกู้ทุกรอบการผลิต"},{"key":"ง","text":"อย่างน้อยปีละ 1 ครั้ง ก่อนสิ้นสุดอายุสัญญากู้เงิน"}],"answer":"ข","explanation":"ตามตารางปฏิทินงานสหกรณ์ การออกตรวจเยี่ยมผ่านระบบ CRS สำหรับสหกรณ์นอกภาคการเกษตร (เช่น สหกรณ์ออมทรัพย์ สหกรณ์ร้านค้า) ควรกระทำ อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 หลังจากสิ้นปีบัญชีก่อนการประชุมใหญ่ และ ครั้งที่ 2 หลังจากครั้งแรกประมาณ 6 เดือน)"},{"num":218,"q":"ตามปฏิทินงานเพื่อประเมินความเสี่ยงและจัดชั้นอัตราดอกเบี้ยของ \"สหกรณ์นอกภาคการเกษตร\" พนักงานจะต้อง รวบรวมบันทึกข้อมูลการจัดชั้นในช่วงเวลาใด และให้มีผลบังคับใช้อย่างไร?","choices":[{"key":"ก","text":"ดำเนินการเดือน ม.ค. ของทุกปี / ถือใช้ 1 พ.ค. - 30 เม.ย. ปีถัดไป"},{"key":"ข","text":"ดำเนินการเดือน มี.ค. ของทุกปี / ถือใช้ 1 เม.ย. เป็นต้นไป"},{"key":"ค","text":"ดำเนินการเดือน พ.ย. ของทุกปี / ถือใช้ 1 ม.ค. - 31 ธ.ค. ปีถัดไป"}],"answer":"ค","explanation":"สำหรับสหกรณ์นอกภาคการเกษตร การรวบรวมบันทึกการจัดชั้นดอกเบี้ยจะต้องดำเนินการใน \"เดือน พฤศจิกายนของทุกปี\" และให้ถือใช้อัตราดอกเบี้ยใหม่ตั้งแต่ \"วันที่ 1 ม.ค. - 31 ธ.ค. ของปีถัดไป\" ครับ"},{"num":219,"q":"เพื่อควบคุมความเสี่ยงด้านสภาพคล่องของกลุ่มบุคคล กองทุนหมู่บ้าน หรือองค์กรที่ขอกู้เงิน \"เพื่อเป็นค่าลงทุน\" ธนาคารสามารถพิจารณาให้ระยะเวลา \"ปลอดชำระต้นเงิน (Grace Period)\" ได้สูงสุดไม่เกินกี่ปี?","choices":[{"key":"ก","text":"ไม่เกิน 1 ปี"},{"key":"ข","text":"ไม่เกิน 3 ปี"},{"key":"ค","text":"ไม่เกิน 5 ปี"},{"key":"ง","text":"ไม่เกิน 10 ปี"}],"answer":"ค","explanation":"สินเชื่อเพื่อเป็น \"ค่าลงทุน\" ในการดำเนินกิจการสำหรับกลุ่มบุคคล หรือองค์กร (รหัส 45) ธนาคารกำหนดให้ ชำระคืนต้นเงินและดอกเบี้ยให้แล้วเสร็จภายใน 15 ปี (กรณีพิเศษไม่เกิน 20 ปี) โดยผู้มีอำนาจสามารถอนุมัติผ่อนปรน \"ปลอดชำระต้นเงิน (Grace Period) ได้ไม่เกิน 5 ปีแรก\" ครับ"},{"num":220,"q":"การบริหารความเสี่ยงในการ \"ต่ออายุสัญญาเครดิตเงินสด\" วงเงินเท่าเดิมของสถาบันเกษตรกร หากเข้าเงื่อนไขผ่อนปรน (ไม่เปลี่ยนแปลงโครงการและคุณสมบัติครบ) ธนาคารจะอนุโลมให้ \"ยกเว้น\" หลายขั้นตอน ยกเว้นข้อใดต่อไปนี้ที่สาขายังคง ต้องดำเนินการอยู่?","choices":[{"key":"ก","text":"การบันทึกข้อมูลในระบบวิเคราะห์สินเชื่อฟีนิกซ์ (Phoenix)"},{"key":"ข","text":"การจัดทำแบบรวบรวมข้อมูลและรายงานวิเคราะห์สินเชื่อ (Credit Approval)"},{"key":"ค","text":"การกลั่นกรองการวิเคราะห์สินเชื่อเพื่อจัดทำ Credit Write up โดยพนักงาน CO"},{"key":"ง","text":"การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่"}],"answer":"ง","explanation":"การต่ออายุสัญญาเครดิตเงินสดที่เข้าเงื่อนไขผ่อนปรน (วงเงินเดิม ไม่เปลี่ยนโครงการ) ธนาคารจะให้ \"ยกเว้น\" การลงข้อมูลฟีนิกซ์, เอกสาร Credit Approval, และ Credit Write up ของ CO แต่ \"ไม่ยกเว้น การบันทึกใบคำขอ สินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่\" ครับ"},{"num":221,"q":"ในการประเมินศักยภาพขององค์กรปกครองส่วนท้องถิ่น (อปท.) เพื่อพิจารณากำหนดอัตราดอกเบี้ย ธนาคาร กำหนดให้ต้องใช้ \"คะแนนเต็ม\" จำนวนเท่าใดในการประเมินเบื้องต้น ก่อนที่จะนำมาถ่วงน้ำหนักให้เหลือ 100 คะแนน?","choices":[{"key":"ก","text":"100 คะแนน"},{"key":"ข","text":"150 คะแนน"},{"key":"ค","text":"200 คะแนน"},{"key":"ง","text":"300 คะแนน"}],"answer":"ค","explanation":"ในการประเมินศักยภาพขององค์กรปกครองส่วนท้องถิ่น (อปท.) เพื่อนำมากำหนดอัตราดอกเบี้ย แบบประเมิน จะใช้คะแนนเต็มที่ 200 คะแนน ก่อนที่จะนำผลลัพธ์มาถ่วงน้ำหนักให้เหลือ 100 คะแนน เพื่อจัดเกรดความเสี่ยงครับ"},{"num":222,"q":"กลุ่มวิสาหกิจชุมชนที่มีความประสงค์จะขอนำขึ้นทะเบียนเป็นลูกค้าเงินกู้รหัส 712 ตามระเบียบจะต้องได้รับการ \"จด ทะเบียน\" มาแล้วไม่น้อยกว่าระยะเวลาเท่าใด จึงจะผ่านเกณฑ์ความเสี่ยงเบื้องต้น?","choices":[{"key":"ก","text":"ไม่น้อยกว่า 3 เดือน"},{"key":"ข","text":"ไม่น้อยกว่า 6 เดือน"},{"key":"ค","text":"ไม่น้อยกว่า 12 เดือน"},{"key":"ง","text":"ไม่น้อยกว่า 24 เดือน"}],"answer":"ข","explanation":"ตามคู่มือการให้สินเชื่อกลุ่มองค์กร วิสาหกิจชุมชนที่จะสามารถขอนำขึ้นทะเบียนเป็นลูกค้าเงินกู้ (รหัส 712) ได้ จะต้องมีประสบการณ์และ ได้รับการจดทะเบียนมาแล้วไม่น้อยกว่า 6 เดือน ครับ"},{"num":223,"q":"เพื่อเป็นการควบคุมความเสี่ยง หากกองทุนหมู่บ้านประสบปัญหา \"ผิดนัดชำระหนี้\" โดยไม่มีเหตุผลอันควรผ่อนผัน ธนาคารจะเรียกเก็บดอกเบี้ยเพิ่มจากต้นเงินส่วนที่มิได้ส่งชำระในอัตราเท่าใด?","choices":[{"key":"ก","text":"เพิ่มขึ้นอีกร้อยละ 1 ต่อปี"},{"key":"ข","text":"เพิ่มขึ้นอีกร้อยละ 2 ต่อปี"},{"key":"ค","text":"เพิ่มขึ้นอีกร้อยละ 3 ต่อปี"},{"key":"ง","text":"เปลี่ยนเป็นอัตรา MRR + 3 ต่อปี"}],"answer":"ค","explanation":"หากกองทุนหมู่บ้านผิดนัดชำระหนี้ โดยที่ไม่ได้เกิดจากเหตุภัยพิบัติหรือเหตุผ่อนผัน ธนาคารจะเรียกเก็บ ดอกเบี้ยปรับเพิ่มจากต้นเงินส่วนที่มิได้ส่งชำระ เพิ่มขึ้นอีกร้อยละ 3 ต่อปี จนกว่าจะชำระต้นเงินส่วนที่ค้างเสร็จสิ้นครับ"},{"num":224,"q":"จากข้อที่แล้ว หากกองทุนหมู่บ้านผิดนัดชำระหนี้เนื่องจาก \"ประสบภัยพิบัติทางธรรมชาติอย่างร้ายแรง\" ซึ่งไม่ได้เกิด จากความประมาทเลินเล่อ ผู้ใดมีอำนาจในการพิจารณา \"งดเรียกดอกเบี้ยเพิ่ม\" จากการผิดนัดชำระหนี้นั้น?","choices":[{"key":"ก","text":"ผู้จัดการสาขา (ซึ่งธนาคารมอบอำนาจให้ ผอจ. ดำเนินการแทนได้)"},{"key":"ข","text":"ผู้ช่วยผู้จัดการสาขา"},{"key":"ค","text":"คณะกรรมการบริหารจัดการหนี้ระดับภาค"},{"key":"ง","text":"หัวหน้าหน่วยอำเภอ"}],"answer":"ก","explanation":"หากความเสียหายเกิดจากภัยธรรมชาติร้ายแรง ซึ่งไม่ได้เกิดจากความประมาทเลินเล่อหรือเจตนาของกองทุน หมู่บ้าน ผู้จัดการสาขา (ผจก.) มีอำนาจพิจารณางดเรียกดอกเบี้ยเพิ่มได้ (ซึ่งธนาคารได้มีการมอบอำนาจให้ ผอจ. เป็นผู้ พิจารณาดำเนินการแทนครับ)"},{"num":225,"q":"สถาบันเกษตรกรที่เป็น \"สหกรณ์จัดตั้งใหม่\" และมีงบการเงินที่ได้รับการรับรองจากผู้สอบบัญชีมาแล้ว \"น้อยกว่า 2 ปี\" ธนาคารจะกำหนดคะแนนการประเมินความเสี่ยงเพื่อจัดชั้นดอกเบี้ยให้ที่เท่าใดโดยอัตโนมัติ?","choices":[{"key":"ก","text":"60 คะแนน"},{"key":"ข","text":"75 คะแนน"},{"key":"ค","text":"80 คะแนน"},{"key":"ง","text":"87 คะแนน"}],"answer":"ข","explanation":"สำหรับสถาบันเกษตรกร (สกก.) ที่เปิดใหม่และเพิ่งมีงบการเงินที่ได้รับรองจากผู้สอบบัญชี \"น้อยกว่า 2 ปี\" ระบบจะจัดเกรดคะแนนให้ที่ 75 คะแนน โดยอัตโนมัติ เพื่อนำไปใช้อ้างอิงโครงสร้างอัตราดอกเบี้ยครับ"},{"num":226,"q":"ในการวิเคราะห์สินเชื่อสำหรับ \"สหกรณ์การเกษตร\" เพื่อวัตถุประสงค์เป็นทุนให้กู้ยืมแก่สมาชิก, ทุนจัดหาวัสดุอุปกรณ์, หรือทุนรวบรวมผลผลิต พนักงานจะต้องดำเนินการวิเคราะห์และอ้างอิงวัตถุประสงค์การให้กู้ภายใต้ข้อบังคับฉบับใด?","choices":[{"key":"ก","text":"ข้อบังคับฉบับที่ 26"},{"key":"ข","text":"ข้อบังคับฉบับที่ 31"},{"key":"ค","text":"ข้อบังคับฉบับที่ 45"},{"key":"ง","text":"ข้อบังคับฉบับที่ 46"}],"answer":"ข","explanation":"วัตถุประสงค์การให้สินเชื่อสำหรับ \"สหกรณ์การเกษตร (สหกรณ์ในภาค)\" เช่น การให้กู้แก่สมาชิก, การจัดหา วัสดุอุปกรณ์, หรือการรวบรวมผลผลิต จะต้องดำเนินการอ้างอิงภายใต้ ข้อบังคับฉบับที่ 31 ครับ"},{"num":227,"q":"ในการต่ออายุสัญญาสินเชื่อธุรกิจสหกรณ์ กรณีที่ไม่เข้าเกณฑ์ผ่อนปรนและ \"ต้องวิเคราะห์สินเชื่อตามขั้นตอนปกติ\" ธนาคารได้กำหนดกฎเหล็กด้านประวัติการชำระหนี้ไว้อย่างไร เพื่อไม่ให้ขัดต่อมาตรฐานความเสี่ยง?","choices":[{"key":"ก","text":"ต้องไม่มีประวัติการปรับปรุงโครงสร้างหนี้ในรอบ 5 ปี"},{"key":"ข","text":"ต้องไม่มีดอกเบี้ยค้างชำระเกิน 15 เดือน"},{"key":"ค","text":"ต้องไม่มีต้นเงินค้างชำระเกิน 3 เดือน"},{"key":"ง","text":"ต้องมีกำไรสุทธิ (EBITDA) เป็นบวกติดต่อกัน 3 ปี"}],"answer":"ข","explanation":"ในการพิจารณาต่ออายุสัญญากรณีที่ ต้องวิเคราะห์สินเชื่อตามขั้นตอนปกติ (ไม่เข้าเกณฑ์ผ่อนปรน) มีกฎ เหล็กด้านประวัติหนี้คือ ต้องไม่ใช่หนี้ NPLs, ไม่เป็นหนี้ค้างชำระ 0-3 เดือน, และที่สำคัญคือ \"ต้องไม่มีดอกเบี้ยค้างชำระเกิน 15 เดือน\" ครับ"},{"num":228,"q":"ในการคำนวณสัดส่วนภาระหนี้ต่อรายได้ (DSR) เพื่อคัดกรองความเสี่ยงรายบุคคล หากผู้กู้มีอายุ 56 ปี (ตกอยู่ในช่วง อายุตั้งแต่ 55 ปี แต่ไม่เกิน 59 ปี) ในกรณีปกติ ธนาคารกำหนดค่า DSR สูงสุดไว้ไม่เกินร้อยละเท่าใด?","choices":[{"key":"ก","text":"ไม่เกินร้อยละ 50"},{"key":"ข","text":"ไม่เกินร้อยละ 60"},{"key":"ค","text":"ไม่เกินร้อยละ 70"},{"key":"ง","text":"ไม่เกินร้อยละ 80"}],"answer":"ข","explanation":"การคำนวณ DSR สำหรับลูกค้ารายบุคคล (กรณีปกติ) หากผู้ขอกู้มีอายุ 40 - 54 ปี จะให้ DSR ไม่เกินร้อยละ 70 แต่หากผู้ขอกู้มีอายุ ตั้งแต่ 55 ปี แต่ไม่เกิน 59 ปี ธนาคารกำหนดให้บีบความเสี่ยงลง โดยให้ DSR ไม่เกินร้อยละ 60 ครับ"},{"num":229,"q":"ในการคำนวณรายได้เพื่อหาค่า DSR สำหรับ \"รายได้อื่นที่ได้รับจากส่วนงานต้นสังกัดแต่มิใช่เงินเดือน\" หากรายได้ ดังกล่าวลูกค้า \"ได้รับไม่เท่ากันทุกเดือน\" ธนาคารกำหนดให้ใช้หลักเกณฑ์ใดมาคำนวณเป็นรายได้ต่อเดือน?","choices":[{"key":"ก","text":"ให้ใช้รายได้เดือนที่ต่ำที่สุดในรอบปี"},{"key":"ข","text":"ให้ใช้ค่าเฉลี่ยย้อนหลัง 3 เดือนล่าสุด"},{"key":"ค","text":"ให้ใช้ค่าเฉลี่ยย้อนหลัง 6 เดือนล่าสุด"},{"key":"ง","text":"ให้ใช้ค่าเฉลี่ยย้อนหลัง 12 เดือนล่าสุด"}],"answer":"ค","explanation":"ในการประเมินรายได้เพื่อคำนวณ DSR หากเป็นรายได้ประจำแต่ไม่ใช่เงินเดือน และ \"ได้รับไม่เท่ากันทุกเดือน\" (เช่น ค่าล่วงเวลา หรือค่าคอมมิชชัน) ให้พนักงานคิดจาก \"ค่าเฉลี่ยย้อนหลัง 6 เดือนล่าสุด\" ครับ"},{"num":230,"q":"ตามหลักเกณฑ์การประเมินเพื่อกำหนดอัตราดอกเบี้ยเงินกู้ของ \"กองทุนหมู่บ้าน\" พนักงานสาขาจะต้องดำเนินการ ประเมินตามความถี่และระยะเวลาในข้อใด?","choices":[{"key":"ก","text":"ประเมินปีละ 2 ครั้ง ภายใน 1 เดือนหลังสิ้นปีบัญชี"},{"key":"ข","text":"ประเมินปีละ 1 ครั้ง พร้อมกับการตรวจเยี่ยมครั้งที่ 1 หรือภายในไตรมาสที่ 2 ของทุกปี"},{"key":"ค","text":"ประเมินทุกครั้งก่อนที่มีการเบิกจ่ายเงินกู้ในแต่ละงวด"},{"key":"ง","text":"ประเมินปีละ 1 ครั้ง ในช่วงเดือนพฤศจิกายนของทุกปี"}],"answer":"ข","explanation":"การกำหนดอัตราดอกเบี้ยเงินกู้ของ \"กองทุนหมู่บ้าน\" สาขาจะต้องทำการประเมิน ปีละ 1 ครั้ง พร้อมกับการ ตรวจเยี่ยมครั้งที่ 1 หรือดำเนินการภายในไตรมาสที่ 2 ของทุกปี ครับ"},{"num":231,"q":"กลุ่มวิสาหกิจชุมชนแห่งหนึ่ง ขอกู้เงินกับธนาคาร แต่จากการตรวจสอบพบว่า \"มีคณะกรรมการดำเนินงานของกลุ่ม ไป เป็นกรรมการทับซ้อนกับกลุ่มวิสาหกิจชุมชนอื่นถึง 4 คน\" เพื่อเป็นการลดความเสี่ยง ธนาคารจะต้องปรับลดวงเงินกู้ของกลุ่มนี้ ลงในสัดส่วนเท่าใด?","choices":[{"key":"ก","text":"ลดวงเงินกู้ลงร้อยละ 2 ของวงเงินกู้เดิม"},{"key":"ข","text":"ลดวงเงินกู้ลงร้อยละ 4 ของวงเงินกู้เดิม"},{"key":"ค","text":"ลดวงเงินกู้ลงร้อยละ 6 ของวงเงินกู้เดิม"},{"key":"ง","text":"ลดวงเงินกู้ลงร้อยละ 10 ของวงเงินกู้เดิม"}],"answer":"ง","explanation":"ตามระเบียบการควบคุมวงเงินของวิสาหกิจชุมชน หากตรวจพบว่ามีคณะกรรมการซ้ำซ้อน 1 คน = อนุโลม, ซ้ำซ้อน 2 คน = ลด 2%, ซ้ำซ้อน 3 คน = ลด 4%, และหาก \"ซ้ำซ้อน 4 คนขึ้นไป = ให้ปรับลดวงเงินกู้ลงร้อยละ 10 ของ วงเงินกู้เดิม\" ครับ"},{"num":232,"q":"[Case Study] กองทุนหมู่บ้าน B ได้รับการประเมินศักยภาพการดำเนินงาน โดยได้คะแนนหมวดที่ 1 (การบริหาร) 23 คะแนน และ หมวดที่ 2 (ฐานะทางการเงิน) 70 คะแนน รวมเป็น 93 คะแนน หากกองทุนแห่งนี้มี \"เงินทุนของตนเอง 300,000 บาท\" ธนาคารจะสามารถพิจารณาวงเงินกู้สูงสุดให้ได้เท่าใด?","choices":[{"key":"ก","text":"2,400,000 บาท (8 เท่า)"},{"key":"ข","text":"3,000,000 บาท (10 เท่า)"},{"key":"ค","text":"4,800,000 บาท (16 เท่า)"},{"key":"ง","text":"6,000,000 บาท (20 เท่า)"}],"answer":"ง","explanation":"1. กองทุนหมู่บ้าน B ได้คะแนนรวม 93 คะแนน (อยู่ในช่วง 90 - 100 คะแนน) ซึ่งตามเกณฑ์จะได้วงเงินกู้สูงสุด \"20 เท่า ของทุนตนเอง\""},{"num":233,"q":"ในการวิเคราะห์ความเสี่ยงด้านสภาพคล่องสำหรับองค์กรปกครองส่วนท้องถิ่น (อปท.) หากขอกู้เงินเพื่อเป็น \"ค่าใช้จ่าย หมุนเวียน\" ในกรณีปกติ ธนาคารกำหนดให้ต้องชำระคืนเงินกู้เสร็จสิ้นภายในระยะเวลาเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 6 เดือน"},{"key":"ข","text":"ไม่เกิน 12 เดือน"},{"key":"ค","text":"ไม่เกิน 2 ปี"},{"key":"ง","text":"ไม่เกิน 3 ปี"}],"answer":"ข","explanation":"สำหรับองค์กรปกครองส่วนท้องถิ่น (อปท.) หากเป็นสินเชื่อประเภท \"ค่าใช้จ่ายหมุนเวียน\" ธนาคารกำหนดให้ ชำระเสร็จสิ้น ภายใน 12 เดือน (แต่หากมีเหตุจำเป็นสามารถอนุมัติเป็นกรณีพิเศษได้ไม่เกิน 18 เดือน)"},{"num":234,"q":"เพื่อเป็นการควบคุมความเสี่ยงด้านหลักประกัน (Collateral Risk) ในโครงการสินเชื่อเคหะเพื่อที่อยู่อาศัย (BAAC Housing Loan) ธนาคารกำหนดเพดาน \"วงเงินกู้ขั้นสูง\" ของผู้ขอกู้แต่ละรายไว้อย่างไร?","choices":[{"key":"ก","text":"ไม่เกิน 2 ล้านบาท ต่อ 1 หลักประกัน และไม่เกิน 2 หลักประกันต่อราย"},{"key":"ข","text":"ไม่เกิน 3 ล้านบาท ต่อ 1 หลักประกัน และไม่เกิน 3 หลักประกันต่อราย"},{"key":"ค","text":"ไม่เกิน 5 ล้านบาท ต่อ 1 หลักประกัน (1 หลัง) และไม่เกิน 3 หลักประกัน (3 หลัง) ต่อราย"}],"answer":"ค","explanation":"เพื่อป้องกันความเสี่ยงและคุมวงเงินไม่ให้สูงเกินไป โครงการสินเชื่อเคหะ (BAAC Housing Loan) กำหนดเพดาน วงเงินกู้ขั้นสูงไว้ที่ \"ไม่เกิน 5 ล้านบาท ต่อ 1 หลักประกัน (1 หลัง) และให้รวมกันได้ไม่เกิน 3 หลักประกัน (3 หลัง) ต่อ ราย\" ครับ"},{"num":235,"q":"จากการตรวจสอบข้อมูลเครดิต (Bureau Screening) หากพบว่าลูกค้ามีประวัติอยู่ในระดับความเสี่ยง \"สีแดง (Alarming)\" ธนาคารมีกฎเหล็กให้ \"ปฏิเสธ\" การพิจารณาสินเชื่อทันที เนื่องจากสาเหตุหลักในข้อใด?","choices":[{"key":"ก","text":"ลูกค้ามียอดหนี้ค้างชำระเกิน 30 วัน"},{"key":"ข","text":"ลูกค้ามียอดหนี้ค้างชำระเกิน 60 วัน"},{"key":"ค","text":"ลูกค้ามียอดหนี้ค้างชำระเกิน 90 วัน"},{"key":"ง","text":"ลูกค้ามีประวัติค้างชำระบัตรเครดิตเกิน 3 ใบ"}],"answer":"ค","explanation":"สาเหตุหลักที่ทำให้สถานะเครดิตบูโรตกเป็น สีแดง (Alarming) และเป็นกฎเหล็กให้ธนาคารปฏิเสธการพิจารณา สินเชื่อโดยไม่มีข้อผ่อนปรน คือ \"การมีสถานะหนี้ค้างชำระเกินกว่า 90 วัน\" ครับ"},{"num":236,"q":"ในการพิจารณาสัดส่วนภาระหนี้ต่อรายได้ (DSR) เพื่อประเมินความสามารถในการชำระหนี้ (Capacity) สำหรับลูกค้า บุคคลธรรมดาใน \"กรณีปกติ\" หากผู้ขอกู้มีอายุ \"45 ปี\" ธนาคารกำหนดค่า DSR สูงสุดไว้ไม่เกินร้อยละเท่าใด?","choices":[{"key":"ก","text":"ไม่เกินร้อยละ 50"},{"key":"ข","text":"ไม่เกินร้อยละ 60"},{"key":"ค","text":"ไม่เกินร้อยละ 70"},{"key":"ง","text":"ไม่เกินร้อยละ 80"}],"answer":"ค","explanation":"ในการประเมินสัดส่วนภาระหนี้ต่อรายได้ (DSR) ของบุคคลปกติ ธนาคารกำหนดค่าความเสี่ยงตามอายุ ดังนี้: * ผู้กู้อายุ 40 ปี แต่ไม่เกิน 54 ปี = DSR ต้อง ไม่เกินร้อยละ 70 * ผู้กู้อายุ 55 ปี แต่ไม่เกิน 59 ปี = DSR ต้อง ไม่เกินร้อยละ 60"},{"num":237,"q":"ในการพิจารณาความเสี่ยงและออก \"หนังสือค้ำประกัน (L/G)\" ข้อใดต่อไปนี้ ถือเป็นข้อพึงระวังสำคัญที่สุด (Highlight) ที่ พนักงานห้ามปฏิบัติอย่างเด็ดขาด?","choices":[{"key":"ก","text":"ห้ามออก L/G ให้กับธุรกิจก่อสร้างที่มีทุนจดทะเบียนต่ำกว่า 1 ล้านบาท"},{"key":"ข","text":"ห้ามออก L/G ย้อนหลัง (การที่ลูกค้าเริ่มงานไปแล้วก่อนที่ธนาคารจะอนุมัติ L/G)"},{"key":"ค","text":"ห้ามรับหลักประกันประเภทเงินฝากออมทรัพย์"},{"key":"ง","text":"ห้ามออก L/G เกินกว่าวงเงิน 5 ล้านบาท โดยไม่ผ่านการประเมินจาก สนจ."}],"answer":"ข","explanation":"กฎเหล็กของการออกหนังสือค้ำประกัน (L/G) ที่เป็นข้อควรระวังสำคัญที่สุดและอาจทำให้ธนาคารเกิดข้อพิพาท รุนแรงคือ \"ห้ามออก L/G ย้อนหลัง หรือออกหลังจากที่ลูกค้าเริ่มดำเนินงานไปแล้วก่อนที่ธนาคารจะอนุมัติ\" ครับ"},{"num":238,"q":"สหกรณ์การเกษตรแห่งหนึ่ง ขอกู้เงินเพื่อต่ออายุสัญญา \"เครดิตเงินสดเพื่อเป็นทุนขายผลผลิต\" ในวงเงินเท่าเดิม โดยไม่ เปลี่ยนแปลงโครงการและคุณสมบัติครบ ขั้นตอนใดในการวิเคราะห์สินเชื่อที่ธนาคาร \"ไม่ยกเว้น\" และพนักงานยังคงต้อง ดำเนินการ?","choices":[{"key":"ก","text":"การบันทึกข้อมูลในระบบวิเคราะห์สินเชื่อฟีนิกซ์ (Phoenix)"},{"key":"ข","text":"การจัดทำเอกสาร Credit Approval และเอกสาร Underwriting Criteria"},{"key":"ค","text":"การกลั่นกรองการวิเคราะห์สินเชื่อเพื่อจัดทำ Credit Write up โดยพนักงาน CO"},{"key":"ง","text":"การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่"}],"answer":"ง","explanation":"สำหรับสหกรณ์ที่เข้าเกณฑ์ผ่อนปรนในการต่ออายุสัญญาเดิม ธนาคารจะอนุโลมให้ \"ยกเว้น\" การทำฟีนิกซ์, เอกสาร Credit Approval, และ Credit Write up แต่ \"ไม่ยกเว้น การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการ อำนวยสินเชื่อลูกค้ารายใหญ่\" ครับ ซึ่งสาขาจะต้องดำเนินการให้ครบถ้วน"},{"num":239,"q":"จากหลักเกณฑ์ Bureau Screening หากพบว่าลูกค้า \"เคยมี\" ประวัติเป็น สีส้ม (Major) หรือ สีแดง (Alarming) แต่ปัจจุบัน ลูกค้าได้ดำเนินการ \"ชำระปิดบัญชีหนี้ดังกล่าวจนครบถ้วนและสถานะกลับเป็นปกติแล้ว\" พนักงานควรพิจารณาเคสนี้ อย่างไร?","choices":[{"key":"ก","text":"ปฏิเสธการขอสินเชื่อทุกกรณี เนื่องจากเคยมีประวัติร้ายแรง"},{"key":"ข","text":"สามารถพิจารณาผ่อนปรนขอสินเชื่อได้ เนื่องจากหนี้เดิมถูกปิดบัญชีและสถานะเป็นปกติแล้ว"},{"key":"ค","text":"ต้องรอ 3 ปี ให้ประวัติถูกลบออกจากระบบจึงจะพิจารณาให้กู้ได้"},{"key":"ง","text":"อนุมัติได้เฉพาะกรณีที่ลูกค้านำสลากออมทรัพย์มาค้ำประกันเต็มวงเงินเท่านั้น"}],"answer":"ข","explanation":"แม้ในอดีตลูกค้าเคยมีประวัติค้างชำระอยู่ในระดับ Major หรือ Alarming แต่หากลูกค้า \"สามารถชำระปิดบัญชี ได้ครบถ้วนจนมีสถานะเป็นปกติแล้ว\" ธนาคารเปิดช่องให้สามารถ \"พิจารณาผ่อนปรน\" ให้ขอสินเชื่อโครงการนี้ได้ครับ"},{"num":240,"q":"การบริหารความเสี่ยงด้านหลักประกันผ่านการจัดทำ \"ประกันอัคคีภัย\" หากธนาคารอนุมัติสินเชื่อเคหะและลูกค้าตกลง จัดทำประกันในวันที่ \"1 มกราคม 2568\" ธนาคารจะกำหนดให้วันสิ้นสุดความคุ้มครอง (สมมติให้ทำครั้งแรก 5 ปี) คือวันที่ เท่าใด?","choices":[{"key":"ก","text":"1 มกราคม 2573"},{"key":"ข","text":"31 ธันวาคม 2573"},{"key":"ค","text":"31 ตุลาคม 2573"},{"key":"ง","text":"31 ตุลาคม 2572"}],"answer":"ค","explanation":"การตั้งปฏิทินประกันอัคคีภัย ธนาคารมีรอบดิวประจำปีคือ \"31 ตุลาคม\" ของทุกปี กฎคือ หากทำประกันช่วง วันที่ 1 มกราคม ถึง 1 พฤศจิกายน ให้บวกไป 5 ปี และสิ้นสุดที่ 31 ตุลาคม (พ.ศ. 2568 + 5 = 2573 ดังนั้นจะสิ้นสุดที่ 31 ตุลาคม 2573)"},{"num":241,"q":"ในการบริหารความเสี่ยงด้านตั๋วสัญญาใช้เงิน (Promissory Note : P/N) หากสหกรณ์ประสงค์จะขอทำ \"Roll Over\" หรือต่อ อายุตั๋วก่อนครบกำหนด ธนาคารอนุญาตให้สามารถดำเนินการล่วงหน้าได้ภายในระยะเวลาเท่าใด?","choices":[{"key":"ก","text":"ไม่เกิน 3 วัน นับจากวันก่อนวันครบกำหนดชำระ"}],"answer":"ค","explanation":"คำตอบที่ถูกต้องคือ ค เนื่องจาก คณะกรรมการระดับธนาคาร"},{"num":242,"q":"เพื่อเป็นการบริหารต้นทุนและควบคุมความเสี่ยงในการออก \"หนังสือค้ำประกัน (L/G)\" กรณีที่ลูกค้าใช้ \"เงินฝากหรือ สลากออมทรัพย์ ธ.ก.ส.\" มาเป็นหลักประกัน ธนาคารกำหนดให้จัดเก็บค่าธรรมเนียมการค้ำประกันในอัตราเท่าใด?","choices":[{"key":"ก","text":"ร้อยละ 1.0 ต่อปี (ขั้นต่ำไม่น้อยกว่า 500 บาทต่อฉบับ)"},{"key":"ข","text":"ร้อยละ 1.5 ต่อปี (ขั้นต่ำไม่น้อยกว่า 500 บาทต่อฉบับ)"},{"key":"ค","text":"ร้อยละ 2.0 ต่อปี (ขั้นต่ำไม่น้อยกว่า 1,000 บาทต่อฉบับ)"},{"key":"ง","text":"ร้อยละ 2.5 ต่อปี (ขั้นต่ำไม่น้อยกว่า 1,000 บาทต่อฉบับ)"}],"answer":"ก","explanation":"ตามระเบียบการออกหนังสือค้ำประกัน (L/G) หากลูกค้าใช้เงินฝาก หรือ สลากออมทรัพย์ ธ.ก.ส. เป็น หลักประกัน ธนาคารจะคิดค่าธรรมเนียมต่ำกว่าปกติคือ \"ร้อยละ 1.0 ต่อปี\" โดยมีขั้นต่ำในการคิดค่าธรรมเนียมไม่น้อยกว่า 500 บาทต่อฉบับ (แต่หากใช้อสังหาริมทรัพย์จะคิดร้อยละ 2.5 ต่อปี)"},{"num":243,"q":"จากข้อที่แล้ว หากลูกค้าขอยื่นทำหนังสือค้ำประกัน (L/G) แบบกำหนดวงเงินสัญญา ธนาคารจะสามารถอนุมัติ ระยะเวลาค้ำประกันวงเงินสัญญาให้ได้สูงสุด \"ไม่เกิน\" กี่ปีในกรณีปกติ?","choices":[{"key":"ก","text":"ไม่เกิน 1 ปี"},{"key":"ข","text":"ไม่เกิน 3 ปี"},{"key":"ค","text":"ไม่เกิน 5 ปี"},{"key":"ง","text":"ไม่เกิน 10 ปี"}],"answer":"ค","explanation":"การอนุมัติวงเงินเพื่อทำหนังสือค้ำประกัน (L/G) ธนาคารกำหนดระยะเวลาค้ำประกันวงเงินสัญญาให้ \"สูงสุด ไม่เกิน 5 ปี\" (แต่สามารถพิจารณายืดหยุ่นได้ตามความจำเป็นของแต่ละโครงการ)"},{"num":244,"q":"ในการพิจารณาสัดส่วนภาระหนี้ต่อรายได้ (DSR) สำหรับลูกค้าโครงการ Secure Port ตามเกณฑ์ \"กรณีลดหย่อน DSR (MK 3083)\" หากผู้ขอกู้มีอายุ \"56 ปี\" (อายุ 55 แต่ไม่เกิน 59 ปี) ธนาคารกำหนดค่าความเสี่ยง DSR ขั้นสูงไว้ที่เท่าใด?","choices":[{"key":"ก","text":"มากกว่าร้อยละ 50 แต่ไม่เกินร้อยละ 60"},{"key":"ข","text":"มากกว่าร้อยละ 60 แต่ไม่เกินร้อยละ 70"},{"key":"ค","text":"ไม่เกินร้อยละ 60 อย่างเด็ดขาด"},{"key":"ง","text":"ไม่เกินร้อยละ 80"}],"answer":"ข","explanation":"ตามคู่มือสินเชื่อ Secure Port การคำนวณ DSR สำหรับผู้กู้อายุตั้งแต่ 55 ปี แต่ไม่เกิน 59 ปี หากเป็นกรณีปกติจะ จำกัดไว้ที่ไม่เกินร้อยละ 60 แต่หากเข้าเกณฑ์ \"กรณีลดหย่อน DSR (MK 3083)\" ธนาคารจะผ่อนปรนความเสี่ยงให้โดย กำหนด DSR ไว้ที่ \"มากกว่าร้อยละ 60 แต่ไม่เกินร้อยละ 70\""},{"num":245,"q":"การประเมินเพื่อจัดชั้นและจัดประวัติการชำระหนี้ของลูกค้าเกษตรกร (ตามข้อบังคับ ฉ.44) หากลูกค้ามีประวัติ \"ชำระ หนี้ได้ตามกำหนดติดต่อกันมาแล้ว 3 ปี\" ลูกค้ารายนี้จะได้รับการจัดประวัติอยู่ในระดับชั้นใด และได้โครงสร้างอัตราดอกเบี้ย เท่าใด?","choices":[{"key":"ก","text":"ชั้น AA / โครงสร้างอัตราดอกเบี้ย MRR + 1.50"},{"key":"ข","text":"ชั้น AAA / โครงสร้างอัตราดอกเบี้ย MRR + 0.75"},{"key":"ค","text":"ชั้น AAA+ / โครงสร้างอัตราดอกเบี้ย MRR + 0.00"},{"key":"ง","text":"ชั้น A / โครงสร้างอัตราดอกเบี้ย MRR + 2.25"}],"answer":"ข","explanation":"ตามการจัดชั้นและประวัติชำระหนี้ (ข้อบังคับ ฉ.44) หากลูกค้ามีประวัติชำระหนี้ตรงตามกำหนด ติดต่อกัน 3 ปี จะได้เลื่อนเป็นชั้น \"AAA\" ซึ่งจะได้รับสิทธิประโยชน์โครงสร้างอัตราดอกเบี้ยเป็น \"MRR + 0.75\" (หาก 4 ปีขึ้นไปจะ เป็น AAA+ ได้ MRR+0.00)"},{"num":246,"q":"การให้สินเชื่อตามนโยบายเศรษฐกิจสีเขียว (Green Credit) ธนาคารมีข้อห้ามเด็ดขาดและจะไม่สนับสนุน (Negative List) แก่ลูกค้าที่นำเงินไปดำเนินธุรกิจหรือกิจกรรมที่มีลักษณะใดต่อไปนี้?","choices":[{"key":"ก","text":"การผลิตสินค้าเกษตรอินทรีย์ที่ไม่ได้ใบรับรอง GAP"},{"key":"ข","text":"การทำธุรกิจรีไซเคิลขยะพลาสติกขนาดเล็ก"},{"key":"ค","text":"การผลิตพลังงานไฟฟ้าจากเชื้อเพลิงฟอสซิล"},{"key":"ง","text":"การลงทุนติดตั้งแผงโซลาร์เซลล์บนหลังคาโรงงานที่ไม่ได้ขออนุญาตเทศบาล"}],"answer":"ค","explanation":"ภายใต้นโยบายสินเชื่อสีเขียว (Green Credit) และทุน Green Bond ธนาคารมีข้อห้ามเด็ดขาดที่จะไม่สนับสนุน โครงการที่มีผลกระทบต่อสิ่งแวดล้อม ซึ่งได้แก่ \"การดำเนินกิจกรรมการผลิตพลังงานไฟฟ้าจากเชื้อเพลิงฟอสซิล\", การใช้ แรงงานเด็ก, หรือการค้าที่ผิดกฎหมาย"},{"num":247,"q":"[Case Study] สหกรณ์ออมทรัพย์แห่งหนึ่ง มีคะแนนประเมินปัจจัยความเสี่ยงเพื่อกำหนดอัตราชั้นประจำปีรวมได้ \"85 คะแนน\" (อยู่ในเกณฑ์ มากกว่า 80 คะแนน) หากสหกรณ์ขอกู้ประเภท \"เครดิตเงินสดเป็นทุนให้กู้แก่สมาชิก\" สาขาจะต้อง กำหนดอัตราดอกเบี้ยให้สหกรณ์แห่งนี้ในอัตราเท่าใด?","choices":[{"key":"ก","text":"MLR + 0.00"},{"key":"ข","text":"MLR + 0.125"},{"key":"ค","text":"MLR + 0.50"},{"key":"ง","text":"MLR + 1.50"}],"answer":"ก","explanation":"ตามโครงสร้างคะแนนความเสี่ยงของสหกรณ์ออมทรัพย์ หากประเมินได้คะแนนระดับดีเยี่ยม คือ \"มากกว่า 80 คะแนน\" ธนาคารจะกำหนดอัตราดอกเบี้ยเงินกู้สำหรับทุนให้กู้แก่สมาชิก ในอัตรา \"MLR + 0.00\" ครับ"},{"num":248,"q":"การวิเคราะห์ความเสี่ยงและคำนวณสมมติฐานทางการเงินสำหรับสถาบันเกษตรกร สูตร \"ลูกหนี้การค้า + (บวก) สต็อกสินค้าและวัตถุดิบ - (หัก) เจ้าหนี้การค้า\" (Working Capital) ถูกนำมาใช้ประเมินวงเงินกู้ในวัตถุประสงค์ใด?","choices":[{"key":"ก","text":"เงินกู้เพื่อเป็นค่าใช้จ่ายหมุนเวียนในการผลิตทางการเกษตรของเกษตรกรทั่วไป"},{"key":"ข","text":"เงินลงทุนระยะยาวเกี่ยวกับการส่งเสริมและพัฒนาการเกษตร"},{"key":"ค","text":"ทุนหมุนเวียนสำหรับให้สมาชิกของสถาบันเกษตรกรกู้ยืมต่อ (Two Step Loan)"},{"key":"ง","text":"เงินทุนหมุนเวียนในการดำเนินธุรกิจรวบรวมหรือแปรรูปเพื่อขายผลิตผลการเกษตร"}],"answer":"ง","explanation":"สูตรการหาความต้องการเงินทุนหมุนเวียน (Working Capital) ที่นำ \"ลูกหนี้การค้า + สต็อกสินค้าและวัตถุดิบ - เจ้าหนี้การค้า\" มาวิเคราะห์นั้น จะใช้สำหรับประเมินวงเงินกู้ในวัตถุประสงค์ \"เพื่อเป็นเงินทุนหมุนเวียนในการดำเนินธุรกิจ รวบรวมหรือแปรรูปเพื่อขายผลิตผลการเกษตร\" ของสถาบันเกษตรกรและผู้ประกอบการครับ"},{"num":249,"q":"การประเมินรายได้เพื่อคิดอัตราส่วน DSR สำหรับข้าราชการ/พนักงานรัฐวิสาหกิจ หากลูกค้ามี \"รายได้อื่นที่ได้รับจาก ส่วนงานต้นสังกัด แต่ได้รับไม่เท่ากันทุกเดือน\" (เช่น ค่าล่วงเวลา) พนักงานจะต้องใช้หลักเกณฑ์ใดในการคำนวณเพื่อหารายได้ เฉลี่ยต่อเดือน?","choices":[{"key":"ก","text":"ให้ใช้รายได้เดือนที่ต่ำที่สุด"},{"key":"ข","text":"ให้ใช้ค่าเฉลี่ยย้อนหลัง 3 เดือนล่าสุด"},{"key":"ค","text":"ให้ใช้ค่าเฉลี่ยย้อนหลัง 6 เดือนล่าสุด"},{"key":"ง","text":"ให้ใช้ค่าเฉลี่ยย้อนหลัง 12 เดือนล่าสุด"}],"answer":"ค","explanation":"การคำนวณ DSR สำหรับรายได้อื่นที่ได้รับจากส่วนงานต้นสังกัด แต่ลักษณะรายได้ \"ได้รับไม่เท่ากันทุกเดือน\" ธนาคารกำหนดให้นำตัวเลขมาหา \"ค่าเฉลี่ยย้อนหลัง 6 เดือนล่าสุด\" เพื่อใช้เป็นฐานรายได้ที่แท้จริงครับ"},{"num":250,"q":"ในการควบคุมความเสี่ยงของการเบิกจ่ายเงินกู้ (Disbursement) สำหรับสินเชื่อเคหะเพื่อที่อยู่อาศัย กรณีที่กู้ไป \"ไถ่ถอน จำนองที่ดินพร้อมอาคารจากสถาบันการเงินอื่น (Refinance)\" ธนาคารกำหนดวิธีปฏิบัติในการเบิกจ่ายเงินกู้ที่ถูกต้องที่สุดตามข้อ ใด?","choices":[{"key":"ก","text":"แบ่งจ่ายเป็นงวดๆ ตามความก้าวหน้าของงานปรับปรุงซ่อมแซม"},{"key":"ข","text":"กำหนดให้จ่ายเงินกู้เพียงงวดเดียว ภายหลังจากทำนิติกรรมสัญญาและนิติกรรมจำนองเสร็จสิ้น และต้องจ่ายภายในวัน"},{"key":"ค","text":"จ่าย 50% ในวันทำสัญญา และอีก 50% หลังจากที่ลูกค้านำโฉนดมามอบให้ธนาคาร"},{"key":"ง","text":"จ่ายเข้าบัญชีสถาบันการเงินเดิมล่วงหน้า 3 วันทำการ ก่อนไปทำนิติกรรมไถ่ถอน"}],"answer":"ข","explanation":"การเบิกรับเงินกู้ตามความก้าวหน้า สำหรับวัตถุประสงค์ซื้อที่ดินพร้อมอาคาร (ไถ่ถอนจำนองจากสถาบัน การเงินอื่น หรือ Refinance) ธนาคารมีข้อกำหนดในการจ่ายเงินเพื่อปิดความเสี่ยงคือ \"ให้จ่ายเงินกู้เพียงงวดเดียว ภายหลัง จากทำนิติกรรมสัญญาและนิติกรรมจำนองเสร็จสิ้น และต้องจ่ายภายในวันเดียวกัน\" เท่านั้นครับ"}];
let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
let msg=pct2>=80?"ยอดเยี่ยม! \uD83C\uDF89":pct2>=60?"ดีมาก! \uD83D\uDCAA":"ต้องฝึกเพิ่ม \uD83D\uDCAA";
document.getElementById("resultText").textContent=pct2+"% \u2014 "+msg;
}
}
init();
</script>
</body>
</html>
