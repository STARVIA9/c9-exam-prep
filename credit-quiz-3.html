<script>
const questions=[{"num": 151, "q": "ในการประเมินความเสี่ยงด้านการเงิน (Financial Risk) การพิจารณาอัตราส่วนทางการเงินในข้อใด ที่เป็นตัวช่วยชี้วัดและ ทำให้ความเสี่ยงของธนาคารลดลงได้มากที่สุด?", "choices": [{"key": "ก", "text": "Current Ratio (อัตราส่วนทุนหมุนเวียน)"}, {"key": "ข", "text": "D/E Ratio (อัตราส่วนหนี้สินต่อทุน)"}, {"key": "ค", "text": "ICR (อัตราส่วนความสามารถในการชำระดอกเบี้ย)"}, {"key": "ง", "text": "NPV และ IRR (มูลค่าปัจจุบันสุทธิ และ อัตราผลตอบแทนภายใน)"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก D/E Ratio (อัตราส่วนหนี้สินต่อทุน)"}, {"num": 152, "q": "กิจการแห่งหนึ่งมีรายได้ปีละ 2.5 ล้านบาท มีต้นทุนขาย 1.8 ล้านบาท ค่าใช้จ่ายในการบริหาร 0.25 ล้านบาท มีค่า เสื่อมราคาปีละ 0.05 ล้านบาท ภาษีจ่ายร้อยละ 20 และมีภาระต้องชำระต้นเงินกู้ปีละ 0.15 ล้านบาท ดอกเบี้ยจ่าย 0.10 ล้าน บาท จากข้อมูลนี้ กิจการมีอัตราส่วน ICR และ DSCR เท่ากับข้อใด?", "choices": [{"key": "ก", "text": "ICR = 4.50 เท่า, DSCR = 1.80 เท่า"}, {"key": "ข", "text": "ICR = 4.00 เท่า, DSCR = 1.60 เท่า"}, {"key": "ค", "text": "ICR = 5.00 เท่า, DSCR = 2.00 เท่า"}, {"key": "ง", "text": "ICR = 1.80 เท่า, DSCR = 4.50 เท่า"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 5.00 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 153, "q": "การจัดทำสมมติฐานทางการเงิน (Financial Assumption) เพื่อประเมินความสามารถในการชำระหนี้ของลูกค้า หากพบว่า \"อุตสาหกรรมไม้ยางพารา\" ปัจจุบันมีแนวโน้มอยู่ในภาวะ \"ถดถอย\" อย่างต่อเนื่อง การพิจารณาความเสี่ยงด้านอุตสาหกรรม (Industry Risk) นี้ จะส่งผลต่อเนื่องกับความเสี่ยงด้านการเงิน (Financial Risk) ตามข้อใด?", "choices": [{"key": "ก", "text": "สมมติฐานด้านผลดำเนินงาน จะต้องสอดคล้องกับภาวะถดถอยของอุตสาหกรรม"}, {"key": "ข", "text": "สมมติฐานด้านผลดำเนินงาน สามารถคาดการณ์ให้เติบโตผกผันกับภาวะอุตสาหกรรมได้"}, {"key": "ค", "text": "สมมติฐานด้านผลดำเนินงาน ให้พิจารณาจากผลกำไรในอดีตย้อนหลัง 5 ปีเป็นหลัก"}, {"key": "ง", "text": "สมมติฐานด้านผลดำเนินงาน ให้มองข้ามรายได้จากยางพาราและประเมินรายได้ธุรกิจอื่นแทน"}], "answer": "ก", "explanation": "คำตอบที่ถูกต้องคือ ก เนื่องจาก สมมติฐานด้านผลดำเนินงาน จะต้องสอดคล้องกับภาวะถดถอยของอุตสาหกรรม"}, {"num": 154, "q": "ในการวิเคราะห์และประเมินความเสี่ยง 5 ด้าน ข้อใดต่อไปนี้ \"จับคู่สถานการณ์กับประเภทของความเสี่ยงได้ไม่ ถูกต้อง\"?", "choices": [{"key": "ก", "text": "การกำหนดเงื่อนไขและข้อปฏิบัติในการให้สินเชื่อไม่รัดกุม – Credit Risk & Other Risk"}, {"key": "ข", "text": "ลูกค้าถูกรอนสิทธิ์ในที่ดินแปลงที่เป็นหลักประกัน – Legal Risk"}, {"key": "ค", "text": "ธุรกิจต้องพึ่งพา Supplier เพียงรายเดียวในการผลิตสินค้า – Industrial & Business Risk"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ลูกค้าถูกรอนสิทธิ์ในที่ดินแปลงที่เป็นหลักประกัน – Legal Risk"}, {"num": 155, "q": "ลูกค้ายื่นประสงค์ขอกู้เงินเพื่อก่อสร้างโรงงาน โดยนำโฉนดที่ดินแปลงที่เป็นที่ตั้งโรงงาน (Core Asset) มาจำนอง แต่ พนักงานตรวจสอบพบว่า \"ที่ดินแปลงดังกล่าวถูกล้อมรอบด้วยที่ดินแปลงอื่นและไม่มีทางเข้า-ออกสู่ถนนสาธารณะ\" พนักงาน ต้องประเมินความเสี่ยงด้านหลักประกัน (Collateral Risk) และหาทางออกอย่างไร?", "choices": [{"key": "ก", "text": "ไม่มีความเสี่ยง เนื่องจากเป็น Core Asset สามารถรับเป็นหลักประกันได้ตามระเบียบ"}, {"key": "ข", "text": "มีความเสี่ยง แต่หากราคาประเมินที่ดินสูงครอบคลุมวงเงินกู้ ก็สามารถพิจารณาสินเชื่อได้เลย"}, {"key": "ค", "text": "มีความเสี่ยง ต้องให้ลูกค้าไปหาหลักทรัพย์ประเภทอื่นมาค้ำประกันเพิ่มเติมแทนที่ดินตาบอด"}, {"key": "ง", "text": "มีความเสี่ยง ต้องให้ลูกค้าดำเนินการจดทะเบียน \"ภาระจำยอม\" เพื่อให้มีทางเข้า-ออกก่อน จึงจะพิจารณาสินเชื่อได้"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก มีความเสี่ยง ต้องให้ลูกค้าดำเนินการจดทะเบียน \"ภาระจำยอม\" เพื่อให้มีทางเข้า-ออกก่อน จึงจะพิจารณาสินเชื่อได้"}, {"num": 156, "q": "ในการพิจารณาประเมินความเสี่ยงด้านหลักประกัน (Collateral Risk) นอกเหนือจากการพิจารณากรรมสิทธิ์และทำเล ที่ตั้งแล้ว ธนาคารยังกำหนดให้พนักงานวิเคราะห์ปัจจัยใดเพิ่มเติม เพื่อป้องกันความเสี่ยงหากลูกค้าหลักไม่สามารถชำระหนี้ ได้?", "choices": [{"key": "ก", "text": "การคำนวณหา Working Capital จากรายได้ลูกค้า"}, {"key": "ข", "text": "การประเมินสถานการณ์และแนวโน้มเศรษฐกิจมหภาค"}, {"key": "ค", "text": "การพิจารณาความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม"}, {"key": "ง", "text": "การตรวจสอบภาพถ่ายดาวเทียมของพื้นที่ข้างเคียงทั้งหมด"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก การพิจารณาความมั่งคั่ง (Wealth) ของผู้ค้ำประกันร่วม"}, {"num": 157, "q": "นิติบุคคล A และ นิติบุคคล B เป็นกลุ่มลูกค้าเงินกู้ที่มีความเป็นเจ้าของเดียวกัน (จัดเป็นกลุ่มเดียวกันตามเกณฑ์ SLL) หากทั้ง 2 บริษัทมีภาระหนี้เดิมกับ ธ.ก.ส. ดังนี้: - นิติบุคคล A: สัญญากู้ Loan วงเงิน 20 ลบ. (หนี้คงเหลือ 10 ลบ.), O/D วงเงิน 10 ลบ. (หนี้คงเหลือ 5 ลบ.), P/C วงเงิน 10 ลบ. (หนี้คงเหลือ 5 ลบ.), FX วงเงิน 10 ลบ. (คิดความเสี่ยงร้อยละ 8) - นิติบุคคล B: สัญญากู้ Loan วงเงิน 50 ลบ. (หนี้คงเหลือ 20 ลบ.), L/G วงเงิน 10 ลบ. (ยังไม่มีภาระเคลม), L/C+Loan เป็น T/R 10 ลบ. ในการพิจารณาสินเชื่อใหม่ วงเงินกู้รวมของกลุ่ม (Total Group Exposure) ที่ใช้ในการหาอำนาจอนุมัติคือเท่าใด?", "choices": [{"key": "ก", "text": "40.80 ล้านบาท"}, {"key": "ข", "text": "60.80 ล้านบาท"}, {"key": "ค", "text": "70.80 ล้านบาท"}, {"key": "ง", "text": "120.00 ล้านบาท"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค อำนาจในการอนุมัติตามลำดับชั้น คือ 70.80 ล้านบาท"}, {"num": 158, "q": "หากพนักงานวิเคราะห์สินเชื่อรวบรวมข้อมูลแล้วพบว่า \"วัตถุประสงค์การขอกู้เงินของลูกค้า ไม่เป็นไปตามนโยบาย สินเชื่อ (Credit Policy) ของธนาคาร\" พนักงานควรมีแนวทางดำเนินการตามข้อใดจึงจะถูกต้องที่สุด?", "choices": [{"key": "ก", "text": "ให้เสนอเป็นข้อเบี่ยงเบนมาตรฐาน (UWS) และส่งให้ผู้จัดการสาขาอนุมัติเป็นกรณีพิเศษ"}, {"key": "ข", "text": "ให้ปฏิเสธการสนับสนุนสินเชื่อ และไม่ส่งเรื่องเข้าสู่กระบวนการพิจารณาอนุมัติการให้สินเชื่อ"}, {"key": "ค", "text": "ให้รับเรื่องไว้พิจารณา แต่ลดวงเงินกู้ลงเหลือ 50% ของที่ลูกค้าขอ"}, {"key": "ง", "text": "ให้ปรับเพิ่มอัตราดอกเบี้ยเป็น MRR + 3.00 เพื่อชดเชยความเสี่ยงที่ขัดต่อนโยบาย"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข ขั้นตอนการดำเนินการ คือ ให้ปฏิเสธการสนับสนุนสินเชื่อ และไม่ส่งเรื่องเข้าสู่กระบวนการพิจารณาอนุมัติการให้สินเชื่อ"}, {"num": 159, "q": "บริษัท นึกว่ารอด จำกัด ดำเนินธุรกิจผลิตสับปะรดกระป๋องจำหน่าย แต่ปัจจุบันพบปัญหา \"สภาพคล่องในการ หมุนเวียนสินค้าไม่ทันกับความต้องการของตลาด\" จึงต้องการขอกู้เงินเพื่อขยายกิจการ การที่ธนาคารเข้าไปวิเคราะห์และช่วย วางแผนแก้ปัญหาในจุดนี้ จัดเป็นการบริหารจัดการความเสี่ยงในด้านใด?", "choices": [{"key": "ก", "text": "ความเสี่ยงด้านธุรกิจ (Business Risk)"}, {"key": "ข", "text": "ความเสี่ยงด้านการเงิน (Financial Risk)"}, {"key": "ค", "text": "ความเสี่ยงด้านสินเชื่อ (Credit Risk)"}, {"key": "ง", "text": "ความเสี่ยงด้านหลักประกัน (Collateral Risk)"}], "answer": "ก", "explanation": "คำตอบที่ถูกต้องคือ ก เนื่องจาก ความเสี่ยงด้านธุรกิจ (Business Risk)"}, {"num": 160, "q": "ในการวิเคราะห์ความสามารถในการชำระหนี้ (Capacity) ค่าความสามารถในการทำกำไร หรือ \"EBITDA\" ซึ่งใช้เป็นตัวตั้ง ในการคำนวณค่า ICR และ DSCR มีความหมายตรงกับข้อใด?", "choices": [{"key": "ก", "text": "กำไรสุทธิหลังหักภาษี (Net Profit After Tax)"}, {"key": "ข", "text": "รายได้รวมทั้งหมดหักด้วยต้นทุนขายเท่านั้น (Gross Profit)"}, {"key": "ค", "text": "กำไรก่อนหักดอกเบี้ย ภาษี ค่าเสื่อมราคา และค่าตัดจำหน่าย"}, {"key": "ง", "text": "เงินสดสุทธิจากกิจกรรมจัดหาเงินและการลงทุน"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก กำไรก่อนหักดอกเบี้ย ภาษี ค่าเสื่อมราคา และค่าตัดจำหน่าย"}, {"num": 161, "q": "ในการตรวจสอบข้อมูลเครดิต (Credit Bureau) หากลูกค้าถูกประเมินสถานะความเสี่ยงอยู่ในระดับ \"Major (Ma - สีส้ม)\" พนักงานควรดำเนินการตามกฎข้อบังคับ (UWS) อย่างไร?", "choices": [{"key": "ก", "text": "ถือว่ามีความเสี่ยงต่ำ ยอมรับได้ ไม่ขัด UWS สามารถดำเนินการพิจารณาสินเชื่อต่อไปได้ทันที"}, {"key": "ข", "text": "ถือว่ามีความเสี่ยงปานกลาง ยอมรับได้ ไม่ขัด UWS แต่ต้องกำหนดเงื่อนไขควบคุมให้รัดกุม"}, {"key": "ค", "text": "ถือว่าเสี่ยงสูง ขัดต่อมาตรฐาน UWS แต่สามารถ \"ขอเบี่ยงเบนหลักเกณฑ์ (Override)\" ได้ โดยต้องแสดงเหตุผลและกำหนด"}, {"key": "ง", "text": "ถือว่าเสี่ยงสูงมาก โอกาสผิดนัดชำระสูง \"ห้ามปล่อยสินเชื่อเด็ดขาด (NO Override)\" และให้ปฏิเสธคำขอทันที"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค กำหนดไว้ว่า ถือว่าเสี่ยงสูง ขัดต่อมาตรฐาน UWS แต่สามารถ \"ขอเบี่ยงเบนหลักเกณฑ์ (Override)\" ได้ โดยต้องแสดงเหตุผลแ"}, {"num": 162, "q": "จากผลการตรวจสอบข้อมูลเครดิต (Credit Bureau) สถานะความเสี่ยงในระดับใดต่อไปนี้ ที่ธนาคารมีคำสั่ง \"ห้ามปล่อย สินเชื่อเด็ดขาด (NO Override)\" โดยไม่มีข้อยกเว้นในสภาวะปกติ?", "choices": [{"key": "ก", "text": "Small (Sm - สีเขียว)"}, {"key": "ข", "text": "Minor (Mi - สีเหลือง)"}, {"key": "ค", "text": "Major (Ma - สีส้ม)"}, {"key": "ง", "text": "Alarming (Al - สีแดง)"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก Alarming (Al - สีแดง)"}, {"num": 163, "q": "แม้ธนาคารจะมีกฎเหล็กปฏิเสธลูกค้าที่มีประวัติเครดิตบูโรในระดับ Alarming หรือ Major แต่ธนาคารก็มี \"ข้อยกเว้นผ่อน ปรน\" ให้สามารถพิจารณาสินเชื่อได้ในกรณีใดต่อไปนี้?", "choices": [{"key": "ก", "text": "กรณีที่ลูกค้านำที่ดินและสิ่งปลูกสร้างมาค้ำประกันเต็มมูลค่าวงเงิน 100%"}, {"key": "ข", "text": "กรณีที่เป็นลูกค้า NPLs ที่ขอเข้าปรับปรุงโครงสร้างหนี้ แล้วต้องการขอสินเชื่อเพื่อฟื้นฟูอาชีพ"}, {"key": "ค", "text": "กรณีที่ลูกค้าเป็นข้าราชการระดับสูงหรือพนักงานรัฐวิสาหกิจที่มีเงินเดือนประจำ"}, {"key": "ง", "text": "กรณีที่ลูกค้ามีบุคคลค้ำประกันระดับ AAA จำนวน 3 คนขึ้นไป"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก กรณีที่เป็นลูกค้า NPLs ที่ขอเข้าปรับปรุงโครงสร้างหนี้ แล้วต้องการขอสินเชื่อเพื่อฟื้นฟูอาชีพ"}, {"num": 164, "q": "วัตถุประสงค์หลักของการใช้เครื่องมือ \"การกำกับลูกหนี้รายใหญ่ (Single Lending Limit : SLL)\" ในกระบวนการวิเคราะห์ สินเชื่อคือข้อใด?", "choices": [{"key": "ก", "text": "เพื่อกำหนดเพดานอัตราดอกเบี้ยสูงสุดที่ไม่ขัดต่อกฎหมายของธนาคารแห่งประเทศไทย"}, {"key": "ข", "text": "เพื่อจำกัดวงเงินกู้ยืมของกลุ่มลูกค้ารายย่อย (Micro Finance) ไม่ให้สร้างภาระหนี้สินล้นพ้นตัว"}, {"key": "ค", "text": "เพื่อป้องกันการกระจุกตัวของสินเชื่อ ไม่ให้ธนาคารปล่อยกู้ให้กลุ่มธุรกิจใดธุรกิจหนึ่งมากเกินไปจนเกิดความเสี่ยง"}, {"key": "ง", "text": "เพื่อคัดกรองเฉพาะลูกค้ารายใหญ่ที่มีผลกำไรสุทธิ (EBITDA) เป็นบวกติดต่อกัน 3 ปี"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก เพื่อป้องกันการกระจุกตัวของสินเชื่อ ไม่ให้ธนาคารปล่อยกู้ให้กลุ่มธุรกิจใดธุรกิจหนึ่งมากเกินไปจนเกิดความเสี่ยง"}, {"num": 165, "q": "ตามเกณฑ์การกำกับลูกหนี้รายใหญ่ (SLL) ภาระหนี้รวมของกลุ่มธุรกิจ (Total Group Exposure) จะต้องมีเพดาน \"ไม่เกิน\" สัดส่วนเท่าใดของธนาคาร?", "choices": [{"key": "ก", "text": "ไม่เกินร้อยละ 10 ของสินทรัพย์รวมทั้งหมดของธนาคาร"}, {"key": "ข", "text": "ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"}, {"key": "ค", "text": "ไม่เกินร้อยละ 20 ของยอดสินเชื่อรวม (Total Loan Outstanding)"}, {"key": "ง", "text": "ไม่เกินร้อยละ 25 ของเงินกองทุนธนาคาร"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"}, {"num": 166, "q": "ในการสืบหาผู้ใช้เงินกู้ที่แท้จริง (True Borrower) เพื่อรวมกลุ่มตามเกณฑ์ SLL (Affiliation) บุคคลหรือนิติบุคคลในข้อใด ต่อไปนี้ที่ \"ไม่ถูกนำมานับรวม\" เป็นกลุ่มเดียวกัน?", "choices": [{"key": "ก", "text": "คู่สมรส และบุตรที่ยังไม่บรรลุนิติภาวะของลูกหนี้"}, {"key": "ข", "text": "บริษัทที่ลูกหนี้ถือหุ้นอยู่เกินกว่าร้อยละ 50"}, {"key": "ค", "text": "บริษัทในเครือที่มีคณะกรรมการบริหารชุดเดียวกันกับลูกหนี้"}, {"key": "ง", "text": "เพื่อนสนิทที่มาเป็น \"ผู้ค้ำประกันเงินกู้\" ให้กับลูกหนี้"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก เพื่อนสนิทที่มาเป็น \"ผู้ค้ำประกันเงินกู้\" ให้กับลูกหนี้"}, {"num": 167, "q": "การคำนวณวงเงินกู้รวมของกลุ่ม (Total Group Exposure) หากลูกค้ามีสินเชื่อประเภทเบิกเงินเกินบัญชี (O/D) ซึ่งธนาคาร อนุมัติวงเงินไว้ 10 ล้านบาท แต่ปัจจุบันลูกค้าเบิกเงินไปใช้เพียง 2 ล้านบาท (ยอดหนี้คงเหลือ 2 ล้าน) ธนาคารจะต้องนำ ตัวเลขใดมาใช้คำนวณเพื่อกำกับ SLL?", "choices": [{"key": "ก", "text": "2 ล้านบาท (ใช้ยอดหนี้คงเหลือเป็นหลัก)"}, {"key": "ข", "text": "8 ล้านบาท (ใช้วงเงินส่วนที่ยังไม่ได้เบิกไปใช้)"}, {"key": "ค", "text": "10 ล้านบาท (ใช้วงเงินกู้ที่ธนาคารอนุมัติ)"}, {"key": "ง", "text": "12 ล้านบาท (ใช้วงเงินอนุมัติรวมกับยอดหนี้คงเหลือ)"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค คือ 10 ล้านบาท (ใช้วงเงินกู้ที่ธนาคารอนุมัติ)"}, {"num": 168, "q": "ในการวิเคราะห์ศักยภาพลูกค้าด้วยหลัก 7'C ปัจจัยในข้อใดที่มุ่งเน้นประเมินเรื่อง \"ความซื่อสัตย์ ประสบการณ์ ความ ตั้งใจในการชำระหนี้ (Willing to pay) รวมถึงผลการตรวจ Credit Bureau\"?", "choices": [{"key": "ก", "text": "Capacity (ความสามารถในการชำระหนี้)"}, {"key": "ข", "text": "Character (คุณลักษณะของลูกค้า)"}, {"key": "ค", "text": "Capital (เงินทุนของกิจการ)"}, {"key": "ง", "text": "Condition (สถานการณ์และสภาพแวดล้อม)"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก Character (คุณลักษณะของลูกค้า)"}, {"num": 169, "q": "หลัก 7'C ปัจจัยด้านที่ 7 คือ \"Country (ประเทศคู่ค้า)\" จะถูกนำมาใช้พิจารณาวิเคราะห์ความเสี่ยงในกรณีใดเท่านั้น?", "choices": [{"key": "ก", "text": "กรณีการให้สินเชื่อแก่ลูกค้าต่างด้าวที่เข้ามาจดทะเบียนนิติบุคคลในไทย"}, {"key": "ข", "text": "กรณีการให้สินเชื่อเพื่อนำไปลงทุนซื้อที่ดินหรืออสังหาริมทรัพย์ในต่างประเทศ"}, {"key": "ค", "text": "กรณีสินเชื่อเพื่อการค้าระหว่างประเทศ (Trade Finance) เพื่อประเมินความเสี่ยงด้านอัตราแลกเปลี่ยน"}, {"key": "ง", "text": "กรณีลูกค้าขอกู้เพื่อ Refinance หนี้สกุลเงินตราต่างประเทศ"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 170, "q": "ลูกค้านิติบุคคลยื่นขอกู้เงินเพื่อขยายโรงงาน พนักงานวิเคราะห์แล้วพบว่า \"กระแสเงินสดและกำไรจากการดำเนินงาน ของกิจการ (EBITDA) มีความสม่ำเสมอและเพียงพอต่อการจ่ายคืนทั้งต้นเงินและดอกเบี้ย\" การประเมินนี้จัดอยู่ในหลัก 7'C ข้อ ใด?", "choices": [{"key": "ก", "text": "Character"}, {"key": "ข", "text": "Capacity"}, {"key": "ค", "text": "Capital"}, {"key": "ง", "text": "Control"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก Capacity"}, {"num": 171, "q": "ในการประเมินความเสี่ยงและโครงสร้างทางการเงิน หากธนาคารต้องการคำนวณหา \"ความต้องการเงินทุนหมุนเวียน (Working Capital)\" สำหรับให้สินเชื่อแก่นิติบุคคลหรือสถาบันเกษตรกร ธนาคารกำหนดให้ใช้สูตรการคำนวณตามข้อใด?", "choices": [{"key": "ก", "text": "(ยอดขายรวม + ลูกหนี้การค้า) - เจ้าหนี้การค้า"}, {"key": "ข", "text": "(ลูกหนี้การค้า + สต็อกสินค้าและวัตถุดิบ) - เจ้าหนี้การค้า"}, {"key": "ค", "text": "กำไรสุทธิ + ค่าเสื่อมราคา + สต็อกสินค้า"}, {"key": "ง", "text": "สินทรัพย์หมุนเวียนรวม - หนี้สินระยะยาว"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก (ลูกหนี้การค้า + สต็อกสินค้าและวัตถุดิบ) - เจ้าหนี้การค้า"}, {"num": 172, "q": "ในการวิเคราะห์ความเสี่ยงด้านโครงสร้างเงินทุน (Capital) สำหรับ \"สหกรณ์ออมทรัพย์ขนาดใหญ่\" (ที่มีสินทรัพย์ตั้งแต่ 5,000 ล้านบาทขึ้นไป) ธนาคารกำหนดเพดานอัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้สูงสุดไม่เกินเท่าใด?", "choices": [{"key": "ก", "text": "ไม่เกิน 1.50 เท่า"}, {"key": "ข", "text": "ไม่เกิน 2.00 เท่า"}, {"key": "ค", "text": "ไม่เกิน 2.50 เท่า"}, {"key": "ง", "text": "ไม่เกิน 3.00 เท่า"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 2.00 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 173, "q": "พนักงานวิเคราะห์สินเชื่อได้ตรวจสอบงบการเงินและบัญชีของสหกรณ์การเกษตรแห่งหนึ่ง พบว่าในงบมีสถานะ \"เจ้าหนี้ มีจำนวนมากกว่าลูกหนี้เงินกู้\" พนักงานควรตั้งข้อสังเกตและประเมินความเสี่ยงว่าสหกรณ์แห่งนี้อาจมีข้อบกพร่องในเรื่องใด?", "choices": [{"key": "ก", "text": "สหกรณ์นำเงินไปลงทุนในสินทรัพย์ถาวรมากเกินไป"}, {"key": "ข", "text": "สหกรณ์ใช้เงินกู้ผิดวัตถุประสงค์"}, {"key": "ค", "text": "สหกรณ์มีการทุจริตในคณะกรรมการบริหาร"}, {"key": "ง", "text": "สหกรณ์มีการตั้งค่าเผื่อหนี้สงสัยจะสูญไม่ถูกต้อง"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก สหกรณ์ใช้เงินกู้ผิดวัตถุประสงค์"}, {"num": 174, "q": "ตามหลักเกณฑ์การกำกับลูกหนี้รายใหญ่ (SLL) กรณีสหกรณ์ ก. ขอกู้เงิน โดยมีกรรมการดำเนินงานชื่อนาย บี ซึ่งสืบ ทราบว่า \"คู่สมรสของนาย บี\" ได้ทำธุรกิจส่วนตัวและขอกู้เงินจากธนาคารด้วยวัตถุประสงค์ \"เดียวกันกับสหกรณ์\" ธนาคาร จะต้องประเมินความเสี่ยงและจัดการหนี้ของคู่นี้อย่างไร?", "choices": [{"key": "ก", "text": "ให้นับแยกภาระหนี้กัน เนื่องจากเป็นนิติบุคคลและบุคคลธรรมดาแยกส่วนกันชัดเจน"}, {"key": "ข", "text": "ให้นับรวมภาระหนี้ของคู่สมรสนาย บี เข้าเป็นกลุ่มลูกหนี้เดียวกันกับสหกรณ์ (Total Group Exposure)"}, {"key": "ค", "text": "ให้ถือว่าคู่สมรสนาย บี เป็นเพียงผู้ค้ำประกัน ไม่ต้องนำยอดหนี้มาคิด SLL รวม"}, {"key": "ง", "text": "ให้ปฏิเสธการให้สินเชื่อแก่คู่สมรสนาย บี ทันทีเพื่อป้องกันผลประโยชน์ทับซ้อน"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ให้นับรวมภาระหนี้ของคู่สมรสนาย บี เข้าเป็นกลุ่มลูกหนี้เดียวกันกับสหกรณ์ (Total Group Exposure)"}, {"num": 175, "q": "เพื่อเป็นการควบคุมความเสี่ยงด้านหลักประกัน (Collateral Risk) ในการให้สินเชื่อประเภท \"ตั๋วสัญญาใช้เงิน (P/N)\" ธนาคาร มีกฎเหล็ก \"ห้าม\" นำหลักประกันประเภทใดต่อไปนี้มาใช้ค้ำประกันโดยเด็ดขาด?", "choices": [{"key": "ก", "text": "เงินฝาก หรือ สลากออมทรัพย์ ธ.ก.ส."}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก "}, {"num": 176, "q": "จากการประเมินความเสี่ยงด้วยข้อมูลเครดิต (Credit Bureau) หากลูกค้ามีสถานะประวัติอยู่ในระดับ \"Minor (Mi - สีเหลือง)\" แนวทางปฏิบัติในการวิเคราะห์สินเชื่อตามมาตรฐาน UWS คือข้อใด?", "choices": [{"key": "ก", "text": "ถือว่าเสี่ยงต่ำ ยอมรับได้ ไม่ขัด UWS อนุมัติได้ทันทีโดยไม่ต้องมีเงื่อนไข"}, {"key": "ข", "text": "ถือว่าเสี่ยงปานกลาง ยอมรับได้ ไม่ขัด UWS แต่ต้องแสดงเหตุผลและกำหนดเงื่อนไขควบคุม"}, {"key": "ค", "text": "ถือว่าเสี่ยงสูง ขัด UWS ต้องขอเบี่ยงเบนหลักเกณฑ์ (Override) ไปยังผู้มีอำนาจ"}, {"key": "ง", "text": "ถือว่าเสี่ยงสูงมาก ห้ามปล่อยสินเชื่อเด็ดขาด (No Override)"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ถือว่าเสี่ยงปานกลาง ยอมรับได้ ไม่ขัด UWS แต่ต้องแสดงเหตุผลและกำหนดเงื่อนไขควบคุม"}, {"num": 177, "q": "เครื่องมือวิเคราะห์หลัก 7'C ในมิติของปัจจัยด้าน \"Control (ข้อกำหนดและเงื่อนไข)\" มุ่งเน้นการประเมินในเรื่องใดเป็น สำคัญเพื่อให้ธนาคารปลอดภัยจากความเสี่ยง?", "choices": [{"key": "ก", "text": "การควบคุมยอดหนี้รวมไม่ให้เกิน 15% ของเงินกองทุน (SLL)"}, {"key": "ข", "text": "การกำหนดเงื่อนไขควบคุมการจ่ายเงินกู้ และควบคุมการนำเงินไปใช้ให้ตรงตามวัตถุประสงค์"}, {"key": "ค", "text": "การตรวจสอบและควบคุมผลกระทบจากอัตราแลกเปลี่ยนเงินตราต่างประเทศ"}, {"key": "ง", "text": "การประเมินสถานการณ์เศรษฐกิจมหภาคเพื่อควบคุมดอกเบี้ย"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก การกำหนดเงื่อนไขควบคุมการจ่ายเงินกู้ และควบคุมการนำเงินไปใช้ให้ตรงตามวัตถุประสงค์"}, {"num": 178, "q": "แม้ธนาคารจะมีกฎห้ามอนุมัติสินเชื่อให้ลูกค้าที่มีประวัติเครดิตระดับ Major (สีส้ม) หรือ Alarming (สีแดง) แต่มี \"ข้อยกเว้น\" ที่พนักงานสามารถทำเรื่องขอ Override เพื่อให้สินเชื่อได้ในกรณีใดต่อไปนี้?", "choices": [{"key": "ก", "text": "ลูกค้านำพันธบัตรรัฐบาลมาค้ำประกัน 100%"}, {"key": "ข", "text": "ลูกค้าเป็นนิติบุคคลที่มีกำไรติดต่อกัน 5 ปี"}, {"key": "ค", "text": "ลูกค้าเดิมที่เพิ่งส่งชำระหนี้เก่าจนครบถ้วน และมีความจำเป็นต้องขอสินเชื่อเพื่อไปประกอบอาชีพต่อ"}, {"key": "ง", "text": "ลูกค้ากู้เงินเพื่อนำไป Refinance หนี้ที่กำลังเป็น NPLs กับธนาคารพาณิชย์อื่น"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค คือ ลูกค้าเดิมที่เพิ่งส่งชำระหนี้เก่าจนครบถ้วน และมีความจำเป็นต้องขอสินเชื่อเพื่อไปประกอบอาชีพต่อ"}, {"num": 179, "q": "การควบคุมความเสี่ยงด้านระยะเวลาชำระหนี้ หากกลุ่มบุคคลหรือกองทุนหมู่บ้าน ขอกู้เงินสินเชื่อระยะสั้นเพื่อ \"เป็น ค่าใช้จ่ายหรือหมุนเวียนในการดำเนินกิจการ\" ธนาคารกำหนดให้ต้องชำระคืนต้นเงินและดอกเบี้ยให้เสร็จสิ้นภายในระยะเวลา ไม่เกินกี่ปี?", "choices": [{"key": "ก", "text": "ไม่เกิน 1 ปี"}, {"key": "ข", "text": "ไม่เกิน 3 ปี"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก "}, {"num": 180, "q": "เพื่อเป็นการลดความเสี่ยงด้านสภาพคล่องทางการเงิน (Financial Risk) ให้กับองค์กรปกครองส่วนท้องถิ่น (อปท.) หรือนิติ บุคคลที่ขอกู้เงิน \"เพื่อการลงทุน\" ซึ่งโครงการยังต้องใช้เวลาสร้างและยังไม่มีรายได้ในช่วงแรก พนักงานวิเคราะห์สามารถใช้ เครื่องมือบริหารความเสี่ยงใดช่วยเหลือลูกค้าได้?", "choices": [{"key": "ก", "text": "การเพิ่มวงเงินกู้ให้อีก 20% เพื่อเป็นทุนสำรอง"}, {"key": "ข", "text": "การพิจารณาให้ \"ปลอดชำระต้นเงิน (Grace Period)\" ในช่วงแรก โดยให้จ่ายเฉพาะดอกเบี้ย"}, {"key": "ค", "text": "การยกเว้นดอกเบี้ยให้ทั้งหมดในช่วง 3 ปีแรก"}, {"key": "ง", "text": "การลดอัตราดอกเบี้ยเป็น 0.01% ต่อปี จนกว่าจะสร้างเสร็จ"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก การพิจารณาให้ \"ปลอดชำระต้นเงิน (Grace Period)\" ในช่วงแรก โดยให้จ่ายเฉพาะดอกเบี้ย"}, {"num": 181, "q": "[Case Study] สหกรณ์การเกษตร B ขอกู้เงินเพื่อเป็นทุนหมุนเวียน 50 ล้านบาท, กู้เพื่อเป็นค่าลงทุน 20 ล้านบาท และกู้ รวบรวมผลผลิต 10 ล้านบาท จากการตรวจสอบพบว่า \"คู่สมรสของคณะกรรมการดำเนินงานของสหกรณ์จำนวน 2 ท่าน\" มี การกู้เงินส่วนตัวเพื่อทำธุรกิจรวบรวมผลผลิตเกษตรกับธนาคารด้วย วงเงินรายละ 1 ล้านบาท ตามหลักการกำกับลูกหนี้ราย ใหญ่ (SLL) ธนาคารต้องนับรวมภาระหนี้ของกลุ่มนี้ (Total Group Exposure) เป็นจำนวนเงินเท่าใด?", "choices": [{"key": "ก", "text": "80 ล้านบาท"}, {"key": "ข", "text": "81 ล้านบาท"}, {"key": "ค", "text": "82 ล้านบาท"}, {"key": "ง", "text": "84 ล้านบาท"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 82 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 182, "q": "จากหลักเกณฑ์การกำกับลูกหนี้รายใหญ่ (Single Lending Limit : SLL) ภาระหนี้รวมของกลุ่ม (Total Group Exposure) ที่ ธนาคารปล่อยกู้จะต้องถูกจำกัดเพดานไว้สูงสุด \"ไม่เกินสัดส่วนเท่าใด\" เพื่อป้องกันความเสี่ยงจากการกระจุกตัว?", "choices": [{"key": "ก", "text": "ไม่เกินร้อยละ 10 ของยอดสินเชื่อรวมของธนาคาร"}, {"key": "ข", "text": "ไม่เกินร้อยละ 15 ของยอดสินเชื่อรวมของธนาคาร"}, {"key": "ค", "text": "ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"}, {"key": "ง", "text": "ไม่เกินร้อยละ 25 ของเงินกองทุนธนาคาร"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ไม่เกินร้อยละ 15 ของเงินกองทุนธนาคาร"}, {"num": 183, "q": "ตามคู่มือการวิเคราะห์ความเสี่ยง 5 ด้าน หากลูกค้าประสบปัญหา \"ถูกรอนสิทธิ์ในที่ดินแปลงที่เป็นหลักประกัน\" (เช่น ถูก ฟ้องร้องเรื่องสิทธิครอบครองหรือมีข้อบัญญัติกฎหมายใหม่มากระทบ) ปัญหานี้จัดอยู่ในความเสี่ยงด้านใด?", "choices": [{"key": "ก", "text": "ความเสี่ยงด้านธุรกิจ (Business Risk)"}, {"key": "ข", "text": "ความเสี่ยงด้านการเงิน (Financial Risk)"}, {"key": "ค", "text": "ความเสี่ยงด้านกฎหมาย (Legal Risk)"}, {"key": "ง", "text": "ความเสี่ยงด้านหลักประกัน (Collateral Risk)"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ความเสี่ยงด้านกฎหมาย (Legal Risk)"}, {"num": 184, "q": "ในการพิจารณาความเสี่ยงด้านธุรกิจและอุตสาหกรรม (Industrial & Busine ation": "คำตอบที่ถูกต้องคือ ง ขั้นตอนการดำเนินการ คือ การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่"}, {"num": 197, "q": "สหกรณ์ออมทรัพย์ขอกู้เงินแบบตั๋วสัญญาใช้เงิน (P/N) อายุไม่เกิน 90 วัน โดยออกตั๋วเมื่อวันที่ 1 เมษายน 2569 แนว ทางการปฏิบัติในการชำระหนี้และการ Roll Over ตั๋วตามข้อใดถูกต้องที่สุด?", "choices": [{"key": "ก", "text": "ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน / ชำระเสร็จสิ้น 30 มิ.ย. 69 / และ Roll ตั๋วได้ตั้งแต่ 23 - 30 มิ.ย."}, {"key": "ข", "text": "ชำระต้นเงินและดอกเบี้ยทั้งหมดในวันทำการสุดท้ายของเดือน เม.ย. 2569"}, {"key": "ค", "text": "ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน / ชำระเสร็จ 31 ธ.ค. 69 / และ Roll ตั๋วได้ตั้งแต่ 24 - 31 ธ.ค. 69"}, {"key": "ง", "text": "ชำระต้นเงินและดอกเบี้ยทั้งหมดในวันทำการสุดท้ายของเดือน มิ.ย. 2569 เพียงครั้งเดียว"}], "answer": "ก", "explanation": "คำตอบที่ถูกต้องคือ ก เนื่องจาก ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน / ชำระเสร็จสิ้น 30 มิ.ย. 69 / และ Roll ตั๋วได้ตั้งแต่ 23 - 30 มิ.ย."}, {"num": 198, "q": "การตรวจเยี่ยมและทบทวนความเสี่ยงผ่านระบบ CRS สำหรับกลุ่มลูกค้าประเภท \"สหกรณ์ออมทรัพย์ และ สหกรณ์ นอกภาคการเกษตร\" ธนาคารกำหนดความถี่และระยะเวลาที่ควรดำเนินการไว้อย่างไร?", "choices": [{"key": "ก", "text": "อย่างน้อยปีละ 1 ครั้ง ก่อนสิ้นปีบัญชีสหกรณ์"}, {"key": "ข", "text": "อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)"}, {"key": "ค", "text": "อย่างน้อยปีละ 2 ครั้ง ภายใน 1 เดือนหลังการประชุมใหญ่"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข ขั้นตอนการดำเนินการ คือ อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)"}, {"num": 199, "q": "จากการประเมินปฏิทินงานสหกรณ์ ข้อใดคือจุดที่ \"แตกต่างกัน\" ระหว่างสหกรณ์การเกษตร (ในภาค) กับ สหกรณ์ออม ทรัพย์ (นอกภาค)?", "choices": [{"key": "ก", "text": "การเข้าร่วมประชุมใหญ่ประจำปี"}, {"key": "ข", "text": "การทบทวนหลักประกันและตัวอย่างลายมือชื่อ"}, {"key": "ค", "text": "การรวบรวมบันทึกการจัดชั้นดอกเบี้ย"}, {"key": "ง", "text": "การจัดทำตารางกำหนดชำระหนี้"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก การจัดทำตารางกำหนดชำระหนี้"}, {"num": 200, "q": "ในการประเมินงบการเงินและศักยภาพของสถาบันเกษตรกร หากพนักงานพบความเสี่ยงที่ระบุว่า \"เจ้าหนี้มีจำนวน มากกว่าลูกหนี้เงินกู้\" พนักงานควรตั้งข้อสังเกตเบื้องต้นว่าสหกรณ์แห่งนี้มีข้อบกพร่องในเรื่องใด?", "choices": [{"key": "ก", "text": "ขาดทุนสะสมติดต่อกัน 3 ปี"}, {"key": "ข", "text": "ใช้เงินกู้ผิดวัตถุประสงค์"}, {"key": "ค", "text": "ขาดทุนเกินกึ่งหนึ่งของทุนเรือนหุ้น"}, {"key": "ง", "text": "มีการทุจริตในคณะกรรมการบริหาร"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ใช้เงินกู้ผิดวัตถุประสงค์"}, {"num": 201, "q": "ในการกำหนดอัตราดอกเบี้ยเงินกู้ (Risk Premium) สำหรับกองทุนหมู่บ้าน ธนาคารใช้คะแนนจาก 2 หมวดมารวมกัน (คะแนนเต็ม 100) อยากทราบว่า \"หมวดด้านฐานะทางการเงินและผลการดำเนินงาน\" ธนาคารกำหนดคะแนนเต็มไว้ที่ เท่าใด?", "choices": [{"key": "ก", "text": "45 คะแนน"}, {"key": "ข", "text": "50 คะแนน"}, {"key": "ค", "text": "55 คะแนน"}, {"key": "ง", "text": "70 คะแนน"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 55 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 202, "q": "หากกองทุนหมู่บ้าน C ได้รับการประเมินศักยภาพรวมและได้คะแนนสูงถึง \"85 คะแนน\" (อยู่ในระดับดีเยี่ยม) ธนาคาร จะสามารถพิจารณาวงเงินกู้ให้กองทุนหมู่บ้านแห่งนี้ได้สูงสุดไม่เกินกี่เท่าของเงินทุนตนเอง?", "choices": [{"key": "ก", "text": "8 เท่า"}, {"key": "ข", "text": "9 เท่า"}, {"key": "ค", "text": "10 เท่า"}, {"key": "ง", "text": "12 เท่า"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 10 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 203, "q": "[Case Study] กองทุนหมู่บ้าน A ได้รับการประเมินศักยภาพเพื่อจัดระดับชั้นและกำหนดอัตราดอกเบี้ย โดยได้คะแนน \"หมวดการบริหาร 20 คะแนน\" และ \"หมวดฐานะทางการเงิน 50 คะแนน\" กองทุนหมู่บ้านแห่งนี้จะได้รับการจัดชั้นและใช้ อัตราดอกเบี้ยตามข้อใด?", "choices": [{"key": "ก", "text": "ระดับ 4 / อัตราดอกเบี้ย MLR + 0.75"}, {"key": "ข", "text": "ระดับ 5 / อัตราดอกเบี้ย MLR + 1.00"}, {"key": "ค", "text": "ระดับ 6 / อัตราดอกเบี้ย MLR + 1.25"}, {"key": "ง", "text": "ระดับ 7 / อัตราดอกเบี้ย MLR + 1.50"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ระดับ 5 / อัตราดอกเบี้ย MLR + 1.00"}, {"num": 204, "q": "ในการประเมินศักยภาพเพื่อกำหนด \"วงเงินกู้ขั้นสูง\" สำหรับกลุ่มลูกค้ารหัส 712 (วิสาหกิจชุมชน) หากวิสาหกิจชุมชน ประเมินได้คะแนน \"75 คะแนน\" จะได้รับการพิจารณาวงเงินกู้สูงสุดไม่เกินกี่เท่าของทุนตนเอง?", "choices": [{"key": "ก", "text": "14 เท่า"}, {"key": "ข", "text": "16 เท่า"}, {"key": "ค", "text": "18 เท่า"}, {"key": "ง", "text": "20 เท่า"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 16 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 205, "q": "เพื่อเป็นการลดความเสี่ยงในการลงทุนของธนาคาร หากกองทุนหมู่บ้านประสงค์ขอกู้เงิน \"เพื่อเป็นค่าลงทุน\" ธนาคาร กำหนดให้กองทุนจะต้องมีเงินทุนสมทบของตนเองร่วมด้วยอย่างน้อยร้อยละเท่าใดของค่าลงทุนทั้งหมด?", "choices": [{"key": "ก", "text": "ร้อยละ 10"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก "}, {"num": 206, "q": "ในการประเมินความเสี่ยงด้านสภาพคล่องให้กับ \"องค์กรปกครองส่วนท้องถิ่น (อปท.)\" ที่ขอกู้เงินเพื่อการลงทุน หาก โครงการนั้นยังต้องใช้เวลาก่อสร้างและยังไม่มีรายได้ในช่วงแรก ธนาคารอาจพิจารณาผ่อนปรน \"ปลอดชำระต้นเงิน (Grace Period)\" ให้สูงสุดได้ไม่เกินกี่ปีแรก?", "choices": [{"key": "ก", "text": "ไม่เกิน 1 ปี"}, {"key": "ข", "text": "ไม่เกิน 2 ปี"}, {"key": "ค", "text": "ไม่เกิน 3 ปี"}, {"key": "ง", "text": "ไม่เกิน 5 ปี"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ไม่เกิน 3 ปี"}, {"num": 207, "q": "ในการพิจารณาคุณสมบัติและการประเมินความเสี่ยงของ \"สหกรณ์ภาคการเกษตร\" ปัจจัยในข้อใดต่อไปนี้ที่ \"ไม่ใช่\" ข้อบกพร่องที่เป็นสาระสำคัญตามเกณฑ์ของธนาคาร?", "choices": [{"key": "ก", "text": "ขาดทุนสะสมติดต่อกันเกินกว่า 3 ปี"}, {"key": "ข", "text": "ขาดทุนเกินกึ่งหนึ่งของทุนเรือนหุ้น"}, {"key": "ค", "text": "ปิดบัญชีไม่ได้ภายใน 150 วัน นับแต่วันสิ้นปีบัญชี"}, {"key": "ง", "text": "สหกรณ์มีสถานะ \"เจ้าหนี้เงินกู้น้อยกว่าลูกหนี้เงินกู้\""}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก สหกรณ์มีสถานะ \"เจ้าหนี้เงินกู้น้อยกว่าลูกหนี้เงินกู้\""}, {"num": 208, "q": "ในการประเมินความเสี่ยงด้านโครงสร้างทางการเงิน (Capital) สำหรับ \"สหกรณ์ออมทรัพย์ขนาดเล็ก\" (ที่มีสินทรัพย์รวม น้อยกว่า 5,000 ล้านบาท) ธนาคารกำหนดอัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้สูงสุดไม่เกินเท่าใด?", "choices": [{"key": "ก", "text": "ไม่เกิน 1.50 เท่า"}, {"key": "ข", "text": "ไม่เกิน 2.00 เท่า"}, {"key": "ค", "text": "ไม่เกิน 2.50 เท่า"}, {"key": "ง", "text": "ไม่เกิน 3.00 เท่า"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 2.50 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 209, "q": "เพื่อเป็นการควบคุมความเสี่ยงด้านหลักประกัน สำหรับเงินกู้ \"กลุ่มบุคคล\" ที่ใช้หลักประกันประเภท \"รับรองรับผิด อย่างลูกหนี้ร่วมกัน\" หากกลุ่มนั้นมีสมาชิกมากถึง 20 คน ธนาคารกำหนดจำนวนผู้ที่ต้องลงนามค้ำประกันไว้อย่างไร?", "choices": [{"key": "ก", "text": "ต้องลงนามทุกคนทั้ง 20 คนโดยไม่มีข้อยกเว้น"}, {"key": "ข", "text": "ลงนามอย่างน้อย 15 คน ตามที่มติที่ประชุมกลุ่มมอบหมาย"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ลงนามอย่างน้อย 15 คน ตามที่มติที่ประชุมกลุ่มมอบหมาย"}, {"num": 210, "q": "แม้การตรวจข้อมูลเครดิตบูโร (Credit Bureau) จะเป็นเครื่องมือสำคัญในการสแกนความเสี่ยง แต่หากพบว่าลูกค้ามี ประวัติอยู่ในระดับ \"Alarming (สีแดง)\" ซึ่งมีกฎเหล็กห้ามปล่อยสินเชื่อเด็ดขาด ธนาคารยังมี \"ข้อยกเว้น (Override)\" ให้ในกรณี ใด?", "choices": [{"key": "ก", "text": "กรณีที่ลูกค้าหาบุคคลที่มีรายได้ประจำมาเป็นผู้ค้ำประกันร่วมได้ 3 คน"}, {"key": "ข", "text": "กรณีลูกค้านำที่ดินพร้อมสิ่งปลูกสร้างในเขตเมืองมาจำนอง 100%"}, {"key": "ค", "text": "กรณีลูกค้าเป็นข้าราชการที่กู้เงินเพื่อนำไป Refinance หนี้บัตรเครดิต"}, {"key": "ง", "text": "กรณีเป็นลูกค้า NPLs ของธนาคารที่เข้ากระบวนการปรับปรุงโครงสร้างหนี้แล้ว และต้องการกู้เพื่อไปฟื้นฟูอาชีพ"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก กรณีเป็นลูกค้า NPLs ของธนาคารที่เข้ากระบวนการปรับปรุงโครงสร้างหนี้แล้ว และต้องการกู้เพื่อไปฟื้นฟูอาชีพ"}, {"num": 211, "q": "ในการประเมินและควบคุมความเสี่ยงของลูกค้ารหัส 712 (วิสาหกิจชุมชน) หากธนาคารตรวจสอบพบว่ามีคณะกรรมการ ดำเนินงานของกลุ่มไปทับซ้อนกับกลุ่มวิสาหกิจชุมชนอื่นจำนวน \"3 คน\" ธนาคารจะต้องบริหารจัดการวงเงินกู้ใหม่อย่างไรเมื่อมี การชำระหนี้บางส่วน?", "choices": [{"key": "ก", "text": "อนุโลมให้คงวงเงินกู้ไว้เท่าเดิม"}, {"key": "ข", "text": "ให้ปรับลดวงเงินกู้ลงร้อยละ 2 ของวงเงินกู้เดิม"}, {"key": "ค", "text": "ให้ปรับลดวงเงินกู้ลงร้อยละ 4 ของวงเงินกู้เดิม"}, {"key": "ง", "text": "ให้ปรับลดวงเงินกู้ลงร้อยละ 6 ของวงเงินกู้เดิม"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง เนื่องจาก ให้ปรับลดวงเงินกู้ลงร้อยละ 6 ของวงเงินกู้เดิม"}, {"num": 212, "q": "[Case Study] สหกรณ์การเกษตร ก. ขอกู้เงินเพื่อเป็นทุนหมุนเวียน 50 ล้านบาท, ค่าลงทุน 20 ล้านบาท และรวบรวม ผลผลิต 10 ล้านบาท จากการตรวจสอบความเสี่ยงพบว่า \"คู่สมรส\" ของประธานกรรมการและรองประธาน (รวม 2 ท่าน) มี การกู้เงินส่วนตัวทำธุรกิจรวบรวมผลผลิตกับธนาคารด้วยวงเงินคนละ 1 ล้านบาท การคำนวณวงเงินกู้รวมของกลุ่ม (Total Group Exposure) เพื่อกำกับ SLL จะต้องเป็นยอดเท่าใด?", "choices": [{"key": "ก", "text": "80 ล้านบาท"}, {"key": "ข", "text": "81 ล้านบาท"}, {"key": "ค", "text": "82 ล้านบาท"}, {"key": "ง", "text": "84 ล้านบาท"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 82 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 213, "q": "ในการวิเคราะห์ความเสี่ยงด้านโครงสร้างทางการเงิน สหกรณ์ออมทรัพย์ที่มีสินทรัพย์รวม \"400 ล้านบาท\" ขอกู้เงินตาม มาตรการสนับสนุนสินเชื่อให้กับสหกรณ์ออมทรัพย์ประเภทราชการ/รัฐวิสาหกิจ ธนาคารกำหนดให้สหกรณ์ต้องรักษา อัตราส่วนหนี้สินรวมต่อทุนตนเอง (D/E Ratio) ไว้ไม่เกินเท่าใด?", "choices": [{"key": "ก", "text": "ไม่เกิน 1.50 เท่า"}, {"key": "ข", "text": "ไม่เกิน 2.00 เท่า"}, {"key": "ค", "text": "ไม่เกิน 2.50 เท่า"}, {"key": "ง", "text": "ไม่เกิน 3.00 เท่า"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 2.50 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 214, "q": "การให้สินเชื่อแก่สหกรณ์ออมทรัพย์ประเภท \"ตั๋วสัญญาใช้เงิน (Promissory Note : P/N)\" ที่มีอายุไม่เกิน 90 วัน ธนาคาร กำหนดวิธีควบคุมความเสี่ยงและแนวทางการชำระหนี้ที่ถูกต้องที่สุดตามข้อใด?", "choices": [{"key": "ก", "text": "ให้ชำระต้นเงินและดอกเบี้ยทั้งหมดในวันทำการสุดท้ายของเดือนแรก"}, {"key": "ข", "text": "ให้ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน และชำระเสร็จสิ้นเมื่อครบกำหนด"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ให้ชำระดอกเบี้ยรายเดือนทุกวันทำการสุดท้ายของเดือน และชำระเสร็จสิ้นเมื่อครบกำหนด"}, {"num": 215, "q": "[Case Study] สหกรณ์ออมทรัพย์แห่งหนึ่งได้คะแนนประเมินปัจจัยความเสี่ยงเพื่อกำหนดอัตราชั้น \"80 คะแนน\" โดยขอกู้ 2 สัญญา คือ 1) เครดิตเงินสดเป็นทุนให้กู้แก่สมาชิก (เดิม MLR+1.50) 2) เงินลงทุนทำ Application เพื่อโอนเงินปันผล (เดิม MLR+1.50) สาขาจะต้องกำหนดอัตราดอกเบี้ยใหม่ของ 2 สัญญานี้ตามข้อใด?", "choices": [{"key": "ก", "text": "สัญญา 1 = MLR + 0.00 / สัญญา 2 = MLR + 0.00"}, {"key": "ข", "text": "สัญญา 1 = MLR + 0.125 / สัญญา 2 = MLR + 1.50"}, {"key": "ค", "text": "สัญญา 1 = MLR + 0.125 / สัญญา 2 = MLR + 1.25"}, {"key": "ง", "text": "สัญญา 1 = MLR + 1.50 / สัญญา 2 = MLR + 1.50"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก สัญญา 1 = MLR + 0.125 / สัญญา 2 = MLR + 1.50"}, {"num": 216, "q": "เพื่อเป็นการบริหารและควบคุมความเสี่ยงในการจัดทำผลิตภัณฑ์ \"หนังสือค้ำประกัน (Letter of Guarantee : L/G)\" ข้อใดถือ เป็นกฎเหล็กหรือข้อพึงระวังสำคัญที่สุดที่ธนาคารห้ามปฏิบัติอย่างเด็ดขาด?", "choices": [{"key": "ก", "text": "ห้ามคิดค่าธรรมเนียมกับหน่วยงานของรัฐ"}, {"key": "ข", "text": "ห้ามรับหลักประกันประเภทเงินฝากออมทรัพย์"}, {"key": "ค", "text": "ห้ามออกหนังสือค้ำประกันย้อนหลัง (เริ่มงานก่อนอนุมัติ)"}, {"key": "ง", "text": "ห้ามออกหนังสือค้ำประกันเกินกว่า 5 ล้านบาทในทุกกรณี"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ห้ามออกหนังสือค้ำประกันย้อนหลัง (เริ่มงานก่อนอนุมัติ)"}, {"num": 217, "q": "การบริหารและทบทวนความเสี่ยงผ่านระบบ CRS (Credit Review System) สำหรับลูกค้ากลุ่ม \"สหกรณ์ออมทรัพย์\" หรือ สหกรณ์นอกภาคการเกษตร ธนาคารกำหนดความถี่ในการตรวจเยี่ยมไว้อย่างไร?", "choices": [{"key": "ก", "text": "อย่างน้อยปีละ 1 ครั้ง ภายใน 150 วันหลังสิ้นปีบัญชี"}, {"key": "ข", "text": "อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)"}, {"key": "ค", "text": "อย่างน้อยปีละ 2 ครั้ง ก่อนการจ่ายเงินกู้ทุกรอบการผลิต"}, {"key": "ง", "text": "อย่างน้อยปีละ 1 ครั้ง ก่อนสิ้นสุดอายุสัญญากู้เงิน"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก อย่างน้อยปีละ 2 ครั้ง (ครั้งที่ 1 สิ้นปีบัญชีก่อนประชุมใหญ่ / ครั้งที่ 2 หลังจากครั้งแรก 6 เดือน)"}, {"num": 218, "q": "ตามปฏิทินงานเพื่อประเมินความเสี่ยงและจัดชั้นอัตราดอกเบี้ยของ \"สหกรณ์นอกภาคการเกษตร\" พนักงานจะต้อง รวบรวมบันทึกข้อมูลการจัดชั้นในช่วงเวลาใด และให้มีผลบังคับใช้อย่างไร?", "choices": [{"key": "ก", "text": "ดำเนินการเดือน ม.ค. ของทุกปี / ถือใช้ 1 พ.ค. - 30 เม.ย. ปีถัดไป"}, {"key": "ข", "text": "ดำเนินการเดือน มี.ค. ของทุกปี / ถือใช้ 1 เม.ย. เป็นต้นไป"}, {"key": "ค", "text": "ดำเนินการเดือน พ.ย. ของทุกปี / ถือใช้ 1 ม.ค. - 31 ธ.ค. ปีถัดไป"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ดำเนินการเดือน พ.ย. ของทุกปี / ถือใช้ 1 ม.ค. - 31 ธ.ค. ปีถัดไป"}, {"num": 219, "q": "เพื่อควบคุมความเสี่ยงด้านสภาพคล่องของกลุ่มบุคคล กองทุนหมู่บ้าน หรือองค์กรที่ขอกู้เงิน \"เพื่อเป็นค่าลงทุน\" ธนาคารสามารถพิจารณาให้ระยะเวลา \"ปลอดชำระต้นเงิน (Grace Period)\" ได้สูงสุดไม่เกินกี่ปี?", "choices": [{"key": "ก", "text": "ไม่เกิน 1 ปี"}, {"key": "ข", "text": "ไม่เกิน 3 ปี"}, {"key": "ค", "text": "ไม่เกิน 5 ปี"}, {"key": "ง", "text": "ไม่เกิน 10 ปี"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ไม่เกิน 5 ปี"}, {"num": 220, "q": "การบริหารความเสี่ยงในการ \"ต่ออายุสัญญาเครดิตเงินสด\" วงเงินเท่าเดิมของสถาบันเกษตรกร หากเข้าเงื่อนไขผ่อนปรน (ไม่เปลี่ยนแปลงโครงการและคุณสมบัติครบ) ธนาคารจะอนุโลมให้ \"ยกเว้น\" หลายขั้นตอน ยกเว้นข้อใดต่อไปนี้ที่สาขายังคง ต้องดำเนินการอยู่?", "choices": [{"key": "ก", "text": "การบันทึกข้อมูลในระบบวิเคราะห์สินเชื่อฟีนิกซ์ (Phoenix)"}, {"key": "ข", "text": "การจัดทำแบบรวบรวมข้อมูลและรายงานวิเคราะห์สินเชื่อ (Credit Approval)"}, {"key": "ค", "text": "การกลั่นกรองการวิเคราะห์สินเชื่อเพื่อจัดทำ Credit Write up โดยพนักงาน CO"}, {"key": "ง", "text": "การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่"}], "answer": "ง", "explanation": "คำตอบที่ถูกต้องคือ ง ขั้นตอนการดำเนินการ คือ การบันทึกใบคำขอสินเชื่อในระบบจัดการเอกสารกระบวนการอำนวยสินเชื่อลูกค้ารายใหญ่"}, {"num": 221, "q": "ในการประเมินศักยภาพขององค์กรปกครองส่วนท้องถิ่น (อปท.) เพื่อพิจารณากำหนดอัตราดอกเบี้ย ธนาคาร กำหนดให้ต้องใช้ \"คะแนนเต็ม\" จำนวนเท่าใดในการประเมินเบื้องต้น ก่อนที่จะนำมาถ่วงน้ำหนักให้เหลือ 100 คะแนน?", "choices": [{"key": "ก", "text": "100 คะแนน"}, {"key": "ข", "text": "150 คะแนน"}, {"key": "ค", "text": "200 คะแนน"}, {"key": "ง", "text": "300 คะแนน"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 200 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 222, "q": "กลุ่มวิสาหกิจชุมชนที่มีความประสงค์จะขอนำขึ้นทะเบียนเป็นลูกค้าเงินกู้รหัส 712 ตามระเบียบจะต้องได้รับการ \"จด ทะเบียน\" มาแล้วไม่น้อยกว่าระยะเวลาเท่าใด จึงจะผ่านเกณฑ์ความเสี่ยงเบื้องต้น?", "choices": [{"key": "ก", "text": "ไม่น้อยกว่า 3 เดือน"}, {"key": "ข", "text": "ไม่น้อยกว่า 6 เดือน"}, {"key": "ค", "text": "ไม่น้อยกว่า 12 เดือน"}, {"key": "ง", "text": "ไม่น้อยกว่า 24 เดือน"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข กำหนดไว้ว่า ไม่น้อยกว่า 6 เดือน"}, {"num": 223, "q": "เพื่อเป็นการควบคุมความเสี่ยง หากกองทุนหมู่บ้านประสบปัญหา \"ผิดนัดชำระหนี้\" โดยไม่มีเหตุผลอันควรผ่อนผัน ธนาคารจะเรียกเก็บดอกเบี้ยเพิ่มจากต้นเงินส่วนที่มิได้ส่งชำระในอัตราเท่าใด?", "choices": [{"key": "ก", "text": "เพิ่มขึ้นอีกร้อยละ 1 ต่อปี"}, {"key": "ข", "text": "เพิ่มขึ้นอีกร้อยละ 2 ต่อปี"}, {"key": "ค", "text": "เพิ่มขึ้นอีกร้อยละ 3 ต่อปี"}, {"key": "ง", "text": "เปลี่ยนเป็นอัตรา MRR + 3 ต่อปี"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก เพิ่มขึ้นอีกร้อยละ 3 ต่อปี"}, {"num": 224, "q": "จากข้อที่แล้ว หากกองทุนหมู่บ้านผิดนัดชำระหนี้เนื่องจาก \"ประสบภัยพิบัติทางธรรมชาติอย่างร้ายแรง\" ซึ่งไม่ได้เกิด จากความ  "ข", "explanation": "คำตอบที่ถูกต้องคือ ข เนื่องจาก ต้องไม่มีดอกเบี้ยค้างชำระเกิน 15 เดือน"}, {"num": 228, "q": "ในการคำนวณสัดส่วนภาระหนี้ต่อรายได้ (DSR) เพื่อคัดกรองความเสี่ยงรายบุคคล หากผู้กู้มีอายุ 56 ปี (ตกอยู่ในช่วง อายุตั้งแต่ 55 ปี แต่ไม่เกิน 59 ปี) ในกรณีปกติ ธนาคารกำหนดค่า DSR สูงสุดไว้ไม่เกินร้อยละเท่าใด?", "choices": [{"key": "ก", "text": "ไม่เกินร้อยละ 50"}, {"key": "ข", "text": "ไม่เกินร้อยละ 60"}, {"key": "ค", "text": "ไม่เกินร้อยละ 70"}, {"key": "ง", "text": "ไม่เกินร้อยละ 80"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข โดยมีตัวเลขกำหนดไว้ชัดเจนว่า 60 ตามเกณฑ์ที่ธนาคารกำหนด"}, {"num": 229, "q": "ในการคำนวณรายได้เพื่อหาค่า DSR สำหรับ \"รายได้อื่นที่ได้รับจากส่วนงานต้นสังกัดแต่มิใช่เงินเดือน\" หากรายได้ ดังกล่าวลูกค้า \"ได้รับไม่เท่ากันทุกเดือน\" ธนาคารกำหนดให้ใช้หลักเกณฑ์ใดมาคำนวณเป็นรายได้ต่อเดือน?", "choices": [{"key": "ก", "text": "ให้ใช้รายได้เดือนที่ต่ำที่สุดในรอบปี"}, {"key": "ข", "text": "ให้ใช้ค่าเฉลี่ยย้อนหลัง 3 เดือนล่าสุด"}, {"key": "ค", "text": "ให้ใช้ค่าเฉลี่ยย้อนหลัง 6 เดือนล่าสุด"}, {"key": "ง", "text": "ให้ใช้ค่าเฉลี่ยย้อนหลัง 12 เดือนล่าสุด"}], "answer": "ค", "explanation": "คำตอบที่ถูกต้องคือ ค เนื่องจาก ให้ใช้ค่าเฉลี่ยย้อนหลัง 6 เดือนล่าสุด"}, {"num": 230, "q": "ตามหลักเกณฑ์การประเมินเพื่อกำหนดอัตราดอกเบี้ยเงินกู้ของ \"กองทุนหมู่บ้าน\" พนักงานสาขาจะต้องดำเนินการ ประเมินตามความถี่และระยะเวลาในข้อใด?", "choices": [{"key": "ก", "text": "ประเมินปีละ 2 ครั้ง ภายใน 1 เดือนหลังสิ้นปีบัญชี"}, {"key": "ข", "text": "ประเมินปีละ 1 ครั้ง พร้อมกับการตรวจเยี่ยมครั้งที่ 1 หรือภายในไตรมาสที่ 2 ของทุกปี"}, {"key": "ค", "text": "ประเมินทุกครั้งก่อนที่มีการเบิกจ่ายเงินกู้ในแต่ละงวด"}, {"key": "ง", "text": "ประเมินปีละ 1 ครั้ง ในช่วงเดือนพฤศจิกายนของทุกปี"}], "answer": "ข", "explanation": "คำตอบที่ถูกต้องคือ ข ขั้นตอนการดำเนินการ คือ ประเมินปีละ 1 ครั้ง พร้อมกับการตรวจเยี่ยมครั้งที่ 1 หรือภายในไตรมาสที่ 2 ของทุกปี"}, {"num": 231, "q": "กลุ่มวิสาหกิจชุมชนแห่งหนึ่ง ขอกู้เงินกับธนาคาร แต่จากการตรวจสอบพบว่า \"มีคณะกรรมการดำเนินงานของกลุ่ม ไป เป็ let answeredCount=0,correctCount=0,showingAnswer={};
function init(){
const area=document.getElementById("quizArea");
area.innerHTML="";
questions.forEach((q,i)=>{
const card=document.createElement("div");
card.className="question-card";
card.id="q-"+q.num;
let ch=q.choices.map(c=>{
const isA=c.key===q.answer;
return '<div class="choice" data-q="'+q.num+'" data-key="'+c.key+'" data-correct="'+isA+'" onclick="selectChoice(this)"><span class="key">'+c.key+'.</span>'+c.text+'</div>';
}).join("");
card.innerHTML='<div class="q-num">ข้อ '+q.num+'</div><div class="q-text">'+q.q+'</div>'+ch;
area.appendChild(card);
});
}
function selectChoice(el){
const qNum=el.dataset.q;
if(showingAnswer[qNum])return;
showingAnswer[qNum]=true;
const q=questions.find(q=>q.num==qNum);
document.querySelectorAll('[data-q="'+qNum+'"]').forEach(c=>{
c.style.pointerEvents="none";
if(c.dataset.correct==="true")c.classList.add("correct");
else if(c.classList.contains("selected"))c.classList.add("wrong");
});
if(q&&q.explanation){
const card=el.closest(".question-card");
if(card){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
}
answeredCount++;
if(el.dataset.correct==="true")correctCount++;
updateStats();
}
function showAll(){
document.querySelectorAll(".choice").forEach(c=>{
if(!showingAnswer[c.dataset.q])selectChoice(c);
});
}
function showAnswers(){
document.querySelectorAll(".question-card").forEach(card=>{
const ch=card.querySelector(".choice");
if(!ch)return;
const qNum=ch.dataset.q;
if(!showingAnswer[qNum]){
const correct=card.querySelector('[data-correct="true"]');
if(correct)correct.classList.add("correct");
const q=questions.find(q=>q.num==qNum);
if(q&&q.explanation&&!card.querySelector(".explanation")){
const expDiv=document.createElement("div");
expDiv.className="explanation";
expDiv.innerHTML="<strong>💡 เฉลย:</strong> "+q.explanation;
card.appendChild(expDiv);
}
showingAnswer[qNum]=true;
answeredCount++;
correctCount++;
}
});
updateStats();
}
function reset(){
answeredCount=0;correctCount=0;showingAnswer={};
document.getElementById("result").style.display="none";
init();updateStats();
}
function updateStats(){
document.getElementById("answered").textContent=answeredCount;
document.getElementById("score").textContent=correctCount;
const pct=(answeredCount/questions.length)*100;
document.getElementById("progress").style.width=pct+"%";
if(answeredCount===questions.length){
document.getElementById("result").style.display="block";
document.getElementById("resultScore").textContent=correctCount+"/"+questions.length;
const pct2=Math.round(correctCount/questions.length*100);
