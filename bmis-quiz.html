:root{
  --bg:#0f172a; --s:#1e293b; --s2:#334155;
  --a:#f59e0b; --a2:#10b981; --a3:#3b82f6; --a4:#ef4444;
  --t:#f1f5f9; --t2:#94a3b8; --b:#475569
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Thai','Sarabun',sans-serif;background:var(--bg);color:var(--t);line-height:1.8}
nav{position:sticky;top:0;z-index:100;background:var(--s);border-bottom:1px solid var(--b);padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
nav h1{font-size:16px;color:var(--a);margin-right:6px}
nav a{color:var(--t2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:6px;white-space:nowrap}
nav a:hover{background:var(--s2);color:var(--a)}
nav a.back{margin-left:auto;color:var(--a);font-weight:600}
.ct{max-width:860px;margin:0 auto;padding:24px 16px 80px}
.hero{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid var(--a);border-radius:14px;padding:24px;text-align:center;margin-bottom:24px}
.hero h1{color:var(--a);font-size:1.5rem;margin-bottom:6px}
.hero p{color:var(--t2);font-size:0.9rem}
.sc{background:var(--s2);padding:14px 20px;border-radius:10px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin:20px 0}
.sc-info{font-size:0.9rem;color:var(--t2)}
.sc-info b{color:var(--a);font-size:1.1rem}
.btn{display:inline-block;padding:8px 18px;background:var(--a);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.9rem;text-decoration:none}
.btn:hover{background:#fbbf24}
.btn.secondary{background:var(--s2);color:var(--t)}
.btn.secondary:hover{background:var(--b);color:var(--a)}
.q{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:18px;margin:14px 0;border-left:4px solid var(--s2)}
.q.answered{border-left-color:var(--a)}
.q label{display:block;padding:10px 14px;margin:6px 0;background:var(--bg);border:1px solid var(--b);border-radius:8px;cursor:pointer;transition:all 0.2s}
.q label:hover:not(.disabled){background:var(--s2);border-color:var(--a3)}
.q label.correct{background:#14532d;border-color:var(--a2);color:#86efac;font-weight:600}
.q label.wrong{background:#7f1d1d;border-color:var(--a4);color:#fca5a5;text-decoration:line-through}
.q label.disabled{cursor:not-allowed;opacity:0.7}
.q b{color:var(--a);display:block;margin-bottom:8px}
.q button{margin-top:10px}
.rb{margin-top:10px;padding:10px 14px;border-radius:6px;display:none;font-size:0.9rem}
.rb.show{display:block}
.rb.ok{background:#14532d;color:#86efac;border-left:3px solid var(--a2)}
.rb.no{background:#7f1d1d;color:#fca5a5;border-left:3px solid var(--a4)}
footer{text-align:center;padding:30px 16px;color:var(--t2);font-size:0.8rem;border-top:1px solid var(--b);margin-top:40px}
footer a{color:var(--a);text-decoration:none}
.cat{display:inline-block;background:var(--s2);color:var(--t2);padding:2px 10px;border-radius:10px;font-size:0.72rem;margin-left:8px}
.cat.bm{background:#14532d;color:#86efac}
.cat.cls{background:#7c2d12;color:#fed7aa}
.cat.fn{background:#1e3a8a;color:#93c5fd}
</style>

    c:["เงินรับฝาก > เงินให้สินเชื่อ","เงินให้สินเชื่อ > เงินรับฝาก","พนักงานเท่ากัน 18 คน","NPL = 0%"],
    a:1,
    e:"<b>กรณีที่ 2:</b> เงินให้สินเชื่อ > เงินรับฝาก → ชดเชยเงินโอนเป็น<b>ต้นทุน</b>ที่ธนาคารคิดจากสาขา · <b>หัก</b>ออกจากกำไรสุทธิ · ตัวอย่างสไลด์: กำไรสุทธิ 4,697 หักชดเชย 5,805 = ขาดทุน 1,108"
  },
];

// Render
const quizEl = document.getElementById('quiz');
const scEl = document.getElementById('sc');
const ansEl = document.getElementById('ans');
const S = {};

Q.forEach((d, i) => {
  const num = i+1;
  const div = document.createElement('div');
  div.className = 'q';
  div.id = 'q' + num;
  let html = `<b>ข้อ ${num}. ${d.q} <span class="cat ${d.cat}">${catLabel(d.cat)}</span></b>`;
  d.c.forEach((opt, j) => {
    html += `<label id="q${num}_o${j}"><input type="radio" name="q${num}" value="${j}"><span>${String.fromCharCode(65+j)}. ${opt}</span></label>`;
  });
  html += `<button class="btn" onclick="ck(${num})">✅ ตรวจ</button>`;
  html += `<div class="rb" id="r${num}"></div>`;
  div.innerHTML = html;
  quizEl.appendChild(div);
});

function catLabel(c) {
  return ({bm:'BMIS Overview', cls:'จัดชั้น/สำรอง', fn:'การเงิน/สูตร'})[c] || c;
}

function ck(num) {
  const d = Q[num-1];
  const sel = document.querySelector(`input[name="q${num}"]:checked`);
  if (!sel) { alert('กรุณาเลือกคำตอบก่อนครับ'); return; }
  if (S[num]) return; // already answered
  const chosen = parseInt(sel.value);
  S[num] = chosen;
  // lock labels
  document.querySelectorAll(`#q${num} label`).forEach((l, j) => {
    l.classList.add('disabled');
    if (j === d.a) l.classList.add('correct');
    if (j === chosen && chosen !== d.a) l.classList.add('wrong');
  });
  // result box
  const rb = document.getElementById('r' + num);
  rb.classList.add('show');
  if (chosen === d.a) {
    rb.classList.add('ok');
    rb.innerHTML = `✅ <b>ถูกต้อง!</b><br>${d.e}`;
  } else {
    rb.classList.add('no');
    rb.innerHTML = `❌ <b>ผิด</b> · คำตอบที่ถูกคือข้อ ${String.fromCharCode(65+d.a)}<br>${d.e}`;
  }
  // update score
  let correct = Object.values(S).filter((v,i) => v === Q[i].a).length;
  scEl.textContent = correct;
  ansEl.textContent = Object.keys(S).length;
  // mark answered
  document.getElementById('q' + num).classList.add('answered');
}

function showAll() {
  Q.forEach((d, i) => {
    if (S[i+1]) return;
    document.querySelector(`#q${i+1} input[value="${d.a}"]`).checked = true;
    ck(i+1);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function reset() {
  if (!confirm('เริ่มทำข้อสอบใหม่ทั้งหมด?')) return;
  location.reload();
}
</script>
